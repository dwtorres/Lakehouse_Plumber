name: Build and Publish to PyPI

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches: [ "main" ]
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write    # Required for creating git tags
  id-token: write    # Required for trusted publishing to PyPI and SLSA provenance
  actions: read      # Required for SLSA provenance generation

jobs:
  check-version:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_publish: ${{ steps.check_pypi.outputs.should_publish }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Get current version from pyproject.toml
      id: get_version
      run: |
        VERSION=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        echo "Current version: $VERSION"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Check if version exists on PyPI
      id: check_pypi
      run: |
        PACKAGE_NAME="lakehouse-plumber"
        CURRENT_VERSION="${{ steps.get_version.outputs.version }}"
        HTTP_STATUS=$(curl -s -A "GitHub-Actions-CI" -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/${PACKAGE_NAME}/${CURRENT_VERSION}/json")
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "Version ${CURRENT_VERSION} already exists on PyPI"
          echo "should_publish=false" >> $GITHUB_OUTPUT
        elif [ "$HTTP_STATUS" = "404" ]; then
          echo "Version ${CURRENT_VERSION} does not exist on PyPI - will publish"
          echo "should_publish=true" >> $GITHUB_OUTPUT
        else
          echo "Unexpected HTTP status: $HTTP_STATUS - assuming new version"
          echo "should_publish=true" >> $GITHUB_OUTPUT
        fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.12"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Clean build artifacts
      run: |
        rm -rf build/ dist/ src/*.egg-info/
        find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
        find . -name "*.pyc" -delete 2>/dev/null || true

    - name: Build package (reproducible)
      run: |
        SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct) python -m build
        if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
          echo "Build failed - no distribution files found"
          exit 1
        fi

    - name: Verify package
      run: |
        python -m twine check dist/*
        echo "Files to upload:"
        ls -la dist/

    - name: Generate hashes
      id: hash
      run: |
        cd dist && echo "hashes=$(sha256sum * | base64 -w0)" >> $GITHUB_OUTPUT

    - name: Upload build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: dist
        path: dist/

  # SLSA provenance — generates a signed attestation linking artifacts to this build
  # Runs in parallel with publish; does not block the release
  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    # Reusable workflow from OpenSSF — referenced by tag (trusted org, signed releases)
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"

  publish:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        name: dist
        path: dist/

    - name: Show package information
      run: |
        echo "Package: lakehouse-plumber"
        echo "Version: ${{ needs.check-version.outputs.version }}"
        echo "Files:"
        ls -la dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
      with:
        print-hash: true
        verbose: true

  tag:
    needs: [check-version, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Create Git tag
      run: |
        VERSION="${{ needs.check-version.outputs.version }}"
        echo "Creating git tag v${VERSION}..."
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag -a "v${VERSION}" -m "Release version ${VERSION}"
        git push origin "v${VERSION}"
        echo "Successfully published lakehouse-plumber v${VERSION} to PyPI!"
        echo "PyPI page: https://pypi.org/project/lakehouse-plumber/${VERSION}/"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  skip:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'false'
    runs-on: ubuntu-latest
    steps:
    - run: echo "Version ${{ needs.check-version.outputs.version }} already exists on PyPI. Skipping publication."
