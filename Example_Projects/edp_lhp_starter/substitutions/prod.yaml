# Substitutions for `lhp generate -e prod` — prod target on shared qa/prod workspace.

prod:
  env: prod

  bronze_catalog: prod_edp_bronze
  silver_catalog: prod_edp_silver
  gold_catalog: prod_edp_gold
  landing_catalog: prod_edp_landing
  watermark_catalog: metadata

  bronze_schema: bronze
  silver_schema: silver
  gold_schema: gold
  landing_schema: landing
  watermark_schema: prod_orchestration

  landing_volume_root: /Volumes/${landing_catalog}/${landing_schema}/landing

  serverless: true

secrets:
  default_scope: prod_secrets
  scopes:
    database: prod_db_secrets
    api: prod_api_secrets
