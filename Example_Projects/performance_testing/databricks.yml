# This is a Databricks asset bundle definition for bdp4 gen2 ingestion framework.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dp-dbricks-dab-gen2-ingestion

include:
#-   resources/system_settings/bundle_config.yml
-   resources/*.yml
-   resources/**/*.yml
-   resources/**/**/*.yml
-   resources/**/**/**/*.yml
-   resources/**/**/**/**/*.yml

workspace:
  azure_tenant_id: fee9c112-179f-46e3-ab98-f8d58602cf19

variables:
  framework_version:
    default: 0.0.1
  default_pipeline_catalog:
    default: bdp4_dev_lh
  default_pipeline_schema:
    default: stg_rajat_gen2
  user_config_prefix:
    default: ${workspace.current_user.short_name}
  pause_status:
    default: "PAUSED"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-3596803518129938.18.azuredatabricks.net

    variables:
      default_pipeline_catalog: acme_edw_dev
      default_pipeline_schema: edw_bronze
  tst:
    mode: development
    workspace:
      host: https://adb-2994696794586481.1.azuredatabricks.net
    #permissions:
    #  - group_name: RES-CLD-AzureRM-BDP4-NPRD-DATAENGINEER
    #    level: CAN_RUN

    variables:
      default_pipeline_catalog: acme_edw_tst
      default_pipeline_schema: edw_bronze
  prod:
    mode: production
    workspace:
      host: https://adb-3128851484971204.4.azuredatabricks.net/
    variables:
      user_config_prefix: ""
      pause_status: "UNPAUSED"
    # permissions:
    #   - group_name: RES-CLD-AzureRM-BDP4-PRD-DATAENGINEER
    #     level: CAN_RUN
      default_pipeline_catalog: acme_edw_prod
      default_pipeline_schema: edw_bronze
