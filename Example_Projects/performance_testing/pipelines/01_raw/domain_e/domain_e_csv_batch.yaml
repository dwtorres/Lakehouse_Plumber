pipeline: domain_e_raw
use_template: csv_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: tracking_ingestion
    template_parameters:
      table_name: tracking_raw
      landing_folder: tracking
      schema_file: part_schema
    actions:
      - name: tst_tracking_raw_completeness
        type: test
        test_type: completeness
        source: v_tracking_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-tracking-R01"
      
      - name: tst_tracking_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_tracking_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-tracking-R02"

