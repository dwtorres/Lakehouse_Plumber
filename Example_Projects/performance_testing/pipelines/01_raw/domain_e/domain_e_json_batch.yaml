pipeline: domain_e_raw
use_template: json_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: route_ingestion
    template_parameters:
      table_name: route_raw
      landing_folder: route
      schema_file: nation_schema
    actions:
      - name: tst_route_raw_completeness
        type: test
        test_type: completeness
        source: v_route_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-route-R01"
      
      - name: tst_route_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_route_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-route-R02"

