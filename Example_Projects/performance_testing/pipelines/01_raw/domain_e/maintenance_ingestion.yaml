pipeline: domain_e_raw
flowgroup: maintenance_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_maintenance_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/maintenance/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_maintenance_cloudfiles
    description: "Load maintenance from landing volume"

  - name: write_maintenance_raw
    type: write
    source: v_maintenance_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "maintenance_raw"

  - name: tst_maintenance_raw_completeness
    type: test
    test_type: completeness
    source: v_maintenance_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-maintenance-R01"

  - name: tst_maintenance_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_maintenance_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-maintenance-R02"
