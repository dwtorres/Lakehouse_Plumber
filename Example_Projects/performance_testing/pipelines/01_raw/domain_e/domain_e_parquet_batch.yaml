pipeline: domain_e_raw
use_template: parquet_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: delivery_ingestion
    template_parameters:
      table_name: delivery_raw
      landing_folder: delivery
      schema_file: orders_schema
    actions:
      - name: tst_delivery_raw_completeness
        type: test
        test_type: completeness
        source: v_delivery_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-delivery-R01"
      
      - name: tst_delivery_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_delivery_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-delivery-R02"

