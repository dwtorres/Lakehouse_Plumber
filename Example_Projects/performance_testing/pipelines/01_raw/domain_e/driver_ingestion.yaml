pipeline: domain_e_raw
flowgroup: driver_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_driver_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/driver/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_driver_cloudfiles
    description: "Load driver from landing volume"

  - name: write_driver_raw
    type: write
    source: v_driver_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "driver_raw"

  - name: tst_driver_raw_completeness
    type: test
    test_type: completeness
    source: v_driver_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-driver-R01"

  - name: tst_driver_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_driver_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-driver-R02"
