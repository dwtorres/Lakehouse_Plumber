pipeline: domain_o_raw
flowgroup: lead_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: lead_raw
  landing_folder: lead
  schema_file: customer_schema
actions:
  - name: tst_lead_raw_completeness
    type: test
    test_type: completeness
    source: v_lead_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-lead-R01"

  - name: tst_lead_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_lead_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-lead-R02"
