pipeline: domain_o_raw
flowgroup: custom_audience_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: custom_audience_raw
  landing_folder: custom_audience
  schema_file: nation_schema
actions:
  - name: tst_custom_audience_raw_completeness
    type: test
    test_type: completeness
    source: v_custom_audience_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-custom_audience-R01"

  - name: tst_custom_audience_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_custom_audience_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-custom_audience-R02"
