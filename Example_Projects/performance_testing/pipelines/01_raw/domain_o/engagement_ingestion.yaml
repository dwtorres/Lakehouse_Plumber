pipeline: domain_o_raw
flowgroup: engagement_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: engagement_raw
  landing_folder: engagement
  schema_file: orders_schema
actions:
  - name: tst_engagement_raw_completeness
    type: test
    test_type: completeness
    source: v_engagement_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-engagement-R01"

  - name: tst_engagement_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_engagement_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-engagement-R02"
