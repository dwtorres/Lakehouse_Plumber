pipeline: domain_o_raw
flowgroup: bid_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: bid_raw
  landing_folder: bid
  schema_file: nation_schema
actions:
  - name: tst_bid_raw_completeness
    type: test
    test_type: completeness
    source: v_bid_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bid-R01"

  - name: tst_bid_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_bid_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bid-R02"
