pipeline: domain_o_raw
flowgroup: attribution_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: attribution_raw
  landing_folder: attribution
  schema_file: partsupp_schema
actions:
  - name: tst_attribution_raw_completeness
    type: test
    test_type: completeness
    source: v_attribution_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-attribution-R01"

  - name: tst_attribution_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_attribution_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-attribution-R02"
