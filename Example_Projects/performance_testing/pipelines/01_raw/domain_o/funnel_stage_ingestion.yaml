pipeline: domain_o_raw
flowgroup: funnel_stage_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: funnel_stage_raw
  landing_folder: funnel_stage
  schema_file: product_schema
actions:
  - name: tst_funnel_stage_raw_completeness
    type: test
    test_type: completeness
    source: v_funnel_stage_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-funnel_stage-R01"

  - name: tst_funnel_stage_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_funnel_stage_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-funnel_stage-R02"
