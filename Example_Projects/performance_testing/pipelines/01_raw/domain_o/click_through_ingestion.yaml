pipeline: domain_o_raw
flowgroup: click_through_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: click_through_raw
  landing_folder: click_through
  schema_file: lineitem_schema
actions:
  - name: tst_click_through_raw_completeness
    type: test
    test_type: completeness
    source: v_click_through_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-click_through-R01"

  - name: tst_click_through_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_click_through_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-click_through-R02"
