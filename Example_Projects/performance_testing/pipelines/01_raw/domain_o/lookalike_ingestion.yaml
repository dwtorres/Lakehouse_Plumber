pipeline: domain_o_raw
flowgroup: lookalike_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_lookalike_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/lookalike/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_lookalike_cloudfiles
    description: "Load lookalike from landing volume"

  - name: write_lookalike_raw
    type: write
    source: v_lookalike_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "lookalike_raw"

  - name: tst_lookalike_raw_completeness
    type: test
    test_type: completeness
    source: v_lookalike_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-lookalike-R01"

  - name: tst_lookalike_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_lookalike_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-lookalike-R02"
