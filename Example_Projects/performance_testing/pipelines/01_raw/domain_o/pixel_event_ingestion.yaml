pipeline: domain_o_raw
flowgroup: pixel_event_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: pixel_event_raw
  landing_folder: pixel_event
  schema_file: orders_schema
actions:
  - name: tst_pixel_event_raw_completeness
    type: test
    test_type: completeness
    source: v_pixel_event_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-pixel_event-R01"

  - name: tst_pixel_event_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_pixel_event_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-pixel_event-R02"
