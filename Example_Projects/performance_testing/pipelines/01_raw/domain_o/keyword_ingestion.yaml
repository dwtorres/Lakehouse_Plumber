pipeline: domain_o_raw
flowgroup: keyword_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: keyword_raw
  landing_folder: keyword
  schema_file: nation_schema
actions:
  - name: tst_keyword_raw_completeness
    type: test
    test_type: completeness
    source: v_keyword_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-keyword-R01"

  - name: tst_keyword_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_keyword_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-keyword-R02"
