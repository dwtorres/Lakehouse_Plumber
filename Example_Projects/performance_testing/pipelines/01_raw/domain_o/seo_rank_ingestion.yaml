pipeline: domain_o_raw
flowgroup: seo_rank_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_seo_rank_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/seo_rank/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_seo_rank_cloudfiles
    description: "Load seo_rank from landing volume"

  - name: write_seo_rank_raw
    type: write
    source: v_seo_rank_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "seo_rank_raw"

  - name: tst_seo_rank_raw_completeness
    type: test
    test_type: completeness
    source: v_seo_rank_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-seo_rank-R01"

  - name: tst_seo_rank_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_seo_rank_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-seo_rank-R02"
