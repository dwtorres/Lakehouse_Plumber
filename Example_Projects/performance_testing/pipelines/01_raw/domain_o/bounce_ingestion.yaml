pipeline: domain_o_raw
flowgroup: bounce_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: bounce_raw
  landing_folder: bounce
  schema_file: part_schema
actions:
  - name: tst_bounce_raw_completeness
    type: test
    test_type: completeness
    source: v_bounce_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bounce-R01"

  - name: tst_bounce_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_bounce_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bounce-R02"
