pipeline: domain_o_raw
flowgroup: hashtag_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: hashtag_raw
  landing_folder: hashtag
  schema_file: product_schema
actions:
  - name: tst_hashtag_raw_completeness
    type: test
    test_type: completeness
    source: v_hashtag_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-hashtag-R01"

  - name: tst_hashtag_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_hashtag_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-hashtag-R02"
