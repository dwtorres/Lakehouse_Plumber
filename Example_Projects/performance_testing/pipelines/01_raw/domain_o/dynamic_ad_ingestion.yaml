pipeline: domain_o_raw
flowgroup: dynamic_ad_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: dynamic_ad_raw
  landing_folder: dynamic_ad
  schema_file: part_schema
actions:
  - name: tst_dynamic_ad_raw_completeness
    type: test
    test_type: completeness
    source: v_dynamic_ad_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-dynamic_ad-R01"

  - name: tst_dynamic_ad_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_dynamic_ad_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-dynamic_ad-R02"
