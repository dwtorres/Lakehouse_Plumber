pipeline: domain_o_raw
flowgroup: spam_report_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: spam_report_raw
  landing_folder: spam_report
  schema_file: orders_schema
actions:
  - name: tst_spam_report_raw_completeness
    type: test
    test_type: completeness
    source: v_spam_report_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-spam_report-R01"

  - name: tst_spam_report_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_spam_report_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-spam_report-R02"
