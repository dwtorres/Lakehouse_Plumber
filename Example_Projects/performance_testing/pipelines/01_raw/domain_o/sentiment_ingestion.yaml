pipeline: domain_o_raw
flowgroup: sentiment_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: sentiment_raw
  landing_folder: sentiment
  schema_file: lineitem_schema
actions:
  - name: tst_sentiment_raw_completeness
    type: test
    test_type: completeness
    source: v_sentiment_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-sentiment-R01"

  - name: tst_sentiment_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_sentiment_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-sentiment-R02"
