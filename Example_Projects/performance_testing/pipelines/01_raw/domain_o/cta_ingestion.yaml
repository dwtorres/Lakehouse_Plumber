pipeline: domain_o_raw
flowgroup: cta_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: cta_raw
  landing_folder: cta
  schema_file: partsupp_schema
actions:
  - name: tst_cta_raw_completeness
    type: test
    test_type: completeness
    source: v_cta_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cta-R01"

  - name: tst_cta_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_cta_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cta-R02"
