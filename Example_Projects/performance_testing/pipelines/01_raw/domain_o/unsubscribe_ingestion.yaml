pipeline: domain_o_raw
flowgroup: unsubscribe_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: unsubscribe_raw
  landing_folder: unsubscribe
  schema_file: nation_schema
actions:
  - name: tst_unsubscribe_raw_completeness
    type: test
    test_type: completeness
    source: v_unsubscribe_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-unsubscribe-R01"

  - name: tst_unsubscribe_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_unsubscribe_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-unsubscribe-R02"
