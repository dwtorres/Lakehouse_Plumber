pipeline: domain_o_raw
flowgroup: impression_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: impression_raw
  landing_folder: impression
  schema_file: orders_schema
actions:
  - name: tst_impression_raw_completeness
    type: test
    test_type: completeness
    source: v_impression_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-impression-R01"

  - name: tst_impression_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_impression_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-impression-R02"
