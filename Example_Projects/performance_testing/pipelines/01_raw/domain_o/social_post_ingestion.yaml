pipeline: domain_o_raw
flowgroup: social_post_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_social_post_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/social_post/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_social_post_cloudfiles
    description: "Load social_post from landing volume"

  - name: write_social_post_raw
    type: write
    source: v_social_post_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "social_post_raw"

  - name: tst_social_post_raw_completeness
    type: test
    test_type: completeness
    source: v_social_post_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-social_post-R01"

  - name: tst_social_post_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_social_post_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-social_post-R02"
