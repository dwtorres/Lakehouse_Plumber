pipeline: domain_o_raw
flowgroup: sitemap_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: sitemap_raw
  landing_folder: sitemap
  schema_file: product_schema
actions:
  - name: tst_sitemap_raw_completeness
    type: test
    test_type: completeness
    source: v_sitemap_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-sitemap-R01"

  - name: tst_sitemap_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_sitemap_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-sitemap-R02"
