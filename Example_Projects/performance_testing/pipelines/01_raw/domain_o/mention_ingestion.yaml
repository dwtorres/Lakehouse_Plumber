pipeline: domain_o_raw
flowgroup: mention_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: mention_raw
  landing_folder: mention
  schema_file: customer_schema
actions:
  - name: tst_mention_raw_completeness
    type: test
    test_type: completeness
    source: v_mention_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mention-R01"

  - name: tst_mention_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_mention_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mention-R02"
