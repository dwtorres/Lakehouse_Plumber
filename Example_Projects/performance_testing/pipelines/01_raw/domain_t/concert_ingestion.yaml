pipeline: domain_t_raw
flowgroup: concert_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: concert_raw
  landing_folder: concert
  schema_file: customer_schema
actions:
  - name: tst_concert_raw_completeness
    type: test
    test_type: completeness
    source: v_concert_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-concert-R01"

  - name: tst_concert_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_concert_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-concert-R02"
