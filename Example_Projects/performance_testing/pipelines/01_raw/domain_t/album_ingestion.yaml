pipeline: domain_t_raw
flowgroup: album_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_album_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/album/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_album_cloudfiles
    description: "Load album from landing volume"

  - name: write_album_raw
    type: write
    source: v_album_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "album_raw"

  - name: tst_album_raw_completeness
    type: test
    test_type: completeness
    source: v_album_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-album-R01"

  - name: tst_album_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_album_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-album-R02"
