pipeline: domain_t_raw
flowgroup: listener_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: listener_raw
  landing_folder: listener
  schema_file: part_schema
actions:
  - name: tst_listener_raw_completeness
    type: test
    test_type: completeness
    source: v_listener_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-listener-R01"

  - name: tst_listener_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_listener_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-listener-R02"
