pipeline: domain_t_raw
flowgroup: setlist_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: setlist_raw
  landing_folder: setlist
  schema_file: orders_schema
actions:
  - name: tst_setlist_raw_completeness
    type: test
    test_type: completeness
    source: v_setlist_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-setlist-R01"

  - name: tst_setlist_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_setlist_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-setlist-R02"
