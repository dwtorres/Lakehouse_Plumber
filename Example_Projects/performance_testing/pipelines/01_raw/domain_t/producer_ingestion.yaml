pipeline: domain_t_raw
flowgroup: producer_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: producer_raw
  landing_folder: producer
  schema_file: nation_schema
actions:
  - name: tst_producer_raw_completeness
    type: test
    test_type: completeness
    source: v_producer_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-producer-R01"

  - name: tst_producer_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_producer_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-producer-R02"
