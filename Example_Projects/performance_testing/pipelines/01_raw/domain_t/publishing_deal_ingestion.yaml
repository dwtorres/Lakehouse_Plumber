pipeline: domain_t_raw
flowgroup: publishing_deal_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: publishing_deal_raw
  landing_folder: publishing_deal
  schema_file: lineitem_schema
actions:
  - name: tst_publishing_deal_raw_completeness
    type: test
    test_type: completeness
    source: v_publishing_deal_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-publishing_deal-R01"

  - name: tst_publishing_deal_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_publishing_deal_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-publishing_deal-R02"
