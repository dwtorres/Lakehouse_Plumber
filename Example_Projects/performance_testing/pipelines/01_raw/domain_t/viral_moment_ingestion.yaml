pipeline: domain_t_raw
flowgroup: viral_moment_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: viral_moment_raw
  landing_folder: viral_moment
  schema_file: part_schema
actions:
  - name: tst_viral_moment_raw_completeness
    type: test
    test_type: completeness
    source: v_viral_moment_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-viral_moment-R01"

  - name: tst_viral_moment_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_viral_moment_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-viral_moment-R02"
