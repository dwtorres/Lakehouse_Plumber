pipeline: domain_t_raw
flowgroup: radio_play_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_radio_play_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/radio_play/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_radio_play_cloudfiles
    description: "Load radio_play from landing volume"

  - name: write_radio_play_raw
    type: write
    source: v_radio_play_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "radio_play_raw"

  - name: tst_radio_play_raw_completeness
    type: test
    test_type: completeness
    source: v_radio_play_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-radio_play-R01"

  - name: tst_radio_play_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_radio_play_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-radio_play-R02"
