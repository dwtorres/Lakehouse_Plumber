pipeline: domain_t_raw
flowgroup: playlist_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: playlist_raw
  landing_folder: playlist
  schema_file: orders_schema
actions:
  - name: tst_playlist_raw_completeness
    type: test
    test_type: completeness
    source: v_playlist_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-playlist-R01"

  - name: tst_playlist_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_playlist_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-playlist-R02"
