pipeline: domain_t_raw
flowgroup: record_label_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: record_label_raw
  landing_folder: record_label
  schema_file: customer_schema
actions:
  - name: tst_record_label_raw_completeness
    type: test
    test_type: completeness
    source: v_record_label_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-record_label-R01"

  - name: tst_record_label_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_record_label_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-record_label-R02"
