pipeline: domain_t_raw
flowgroup: genre_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: genre_raw
  landing_folder: genre
  schema_file: lineitem_schema
actions:
  - name: tst_genre_raw_completeness
    type: test
    test_type: completeness
    source: v_genre_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-genre-R01"

  - name: tst_genre_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_genre_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-genre-R02"
