pipeline: domain_t_raw
flowgroup: music_video_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_music_video_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/music_video/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_music_video_cloudfiles
    description: "Load music_video from landing volume"

  - name: write_music_video_raw
    type: write
    source: v_music_video_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "music_video_raw"

  - name: tst_music_video_raw_completeness
    type: test
    test_type: completeness
    source: v_music_video_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-music_video-R01"

  - name: tst_music_video_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_music_video_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-music_video-R02"
