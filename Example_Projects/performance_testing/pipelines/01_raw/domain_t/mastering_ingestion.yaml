pipeline: domain_t_raw
flowgroup: mastering_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_mastering_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/mastering/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_mastering_cloudfiles
    description: "Load mastering from landing volume"

  - name: write_mastering_raw
    type: write
    source: v_mastering_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "mastering_raw"

  - name: tst_mastering_raw_completeness
    type: test
    test_type: completeness
    source: v_mastering_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mastering-R01"

  - name: tst_mastering_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_mastering_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mastering-R02"
