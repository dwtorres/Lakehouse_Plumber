pipeline: domain_t_raw
flowgroup: venue_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_venue_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/venue/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_venue_cloudfiles
    description: "Load venue from landing volume"

  - name: write_venue_raw
    type: write
    source: v_venue_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "venue_raw"

  - name: tst_venue_raw_completeness
    type: test
    test_type: completeness
    source: v_venue_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-venue-R01"

  - name: tst_venue_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_venue_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-venue-R02"
