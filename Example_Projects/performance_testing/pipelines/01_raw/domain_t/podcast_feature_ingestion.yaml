pipeline: domain_t_raw
flowgroup: podcast_feature_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_podcast_feature_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/podcast_feature/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_podcast_feature_cloudfiles
    description: "Load podcast_feature from landing volume"

  - name: write_podcast_feature_raw
    type: write
    source: v_podcast_feature_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "podcast_feature_raw"

  - name: tst_podcast_feature_raw_completeness
    type: test
    test_type: completeness
    source: v_podcast_feature_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-podcast_feature-R01"

  - name: tst_podcast_feature_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_podcast_feature_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-podcast_feature-R02"
