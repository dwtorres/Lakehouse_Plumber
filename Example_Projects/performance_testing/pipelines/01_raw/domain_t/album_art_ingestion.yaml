pipeline: domain_t_raw
flowgroup: album_art_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: album_art_raw
  landing_folder: album_art
  schema_file: partsupp_schema
actions:
  - name: tst_album_art_raw_completeness
    type: test
    test_type: completeness
    source: v_album_art_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-album_art-R01"

  - name: tst_album_art_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_album_art_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-album_art-R02"
