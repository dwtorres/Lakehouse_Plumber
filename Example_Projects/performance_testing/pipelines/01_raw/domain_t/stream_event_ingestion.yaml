pipeline: domain_t_raw
flowgroup: stream_event_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_stream_event_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/stream_event/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_stream_event_cloudfiles
    description: "Load stream_event from landing volume"

  - name: write_stream_event_raw
    type: write
    source: v_stream_event_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "stream_event_raw"

  - name: tst_stream_event_raw_completeness
    type: test
    test_type: completeness
    source: v_stream_event_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-stream_event-R01"

  - name: tst_stream_event_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_stream_event_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-stream_event-R02"
