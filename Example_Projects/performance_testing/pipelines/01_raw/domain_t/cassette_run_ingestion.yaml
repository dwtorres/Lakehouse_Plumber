pipeline: domain_t_raw
flowgroup: cassette_run_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: cassette_run_raw
  landing_folder: cassette_run
  schema_file: lineitem_schema
actions:
  - name: tst_cassette_run_raw_completeness
    type: test
    test_type: completeness
    source: v_cassette_run_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cassette_run-R01"

  - name: tst_cassette_run_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_cassette_run_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cassette_run-R02"
