pipeline: domain_t_raw
flowgroup: cd_pressing_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: cd_pressing_raw
  landing_folder: cd_pressing
  schema_file: customer_schema
actions:
  - name: tst_cd_pressing_raw_completeness
    type: test
    test_type: completeness
    source: v_cd_pressing_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cd_pressing-R01"

  - name: tst_cd_pressing_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_cd_pressing_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cd_pressing-R02"
