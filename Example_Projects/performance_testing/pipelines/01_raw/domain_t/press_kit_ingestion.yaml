pipeline: domain_t_raw
flowgroup: press_kit_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: press_kit_raw
  landing_folder: press_kit
  schema_file: product_schema
actions:
  - name: tst_press_kit_raw_completeness
    type: test
    test_type: completeness
    source: v_press_kit_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-press_kit-R01"

  - name: tst_press_kit_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_press_kit_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-press_kit-R02"
