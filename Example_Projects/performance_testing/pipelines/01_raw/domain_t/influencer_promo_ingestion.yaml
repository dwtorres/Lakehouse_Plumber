pipeline: domain_t_raw
flowgroup: influencer_promo_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: influencer_promo_raw
  landing_folder: influencer_promo
  schema_file: nation_schema
actions:
  - name: tst_influencer_promo_raw_completeness
    type: test
    test_type: completeness
    source: v_influencer_promo_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-influencer_promo-R01"

  - name: tst_influencer_promo_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_influencer_promo_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-influencer_promo-R02"
