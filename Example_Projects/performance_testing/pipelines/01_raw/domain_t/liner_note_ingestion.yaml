pipeline: domain_t_raw
flowgroup: liner_note_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: liner_note_raw
  landing_folder: liner_note
  schema_file: part_schema
actions:
  - name: tst_liner_note_raw_completeness
    type: test
    test_type: completeness
    source: v_liner_note_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-liner_note-R01"

  - name: tst_liner_note_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_liner_note_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-liner_note-R02"
