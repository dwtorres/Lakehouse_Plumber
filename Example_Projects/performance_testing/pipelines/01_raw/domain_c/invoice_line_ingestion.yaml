pipeline: domain_c_raw
flowgroup: invoice_line_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_invoice_line_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/invoice_line/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_invoice_line_cloudfiles
    description: "Load invoice_line from landing volume"

  - name: write_invoice_line_raw
    type: write
    source: v_invoice_line_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "invoice_line_raw"

  - name: tst_invoice_line_raw_completeness
    type: test
    test_type: completeness
    source: v_invoice_line_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-invoice_line-R01"

  - name: tst_invoice_line_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_invoice_line_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-invoice_line-R02"
