pipeline: domain_c_raw
flowgroup: account_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_account_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/account/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_account_cloudfiles
    description: "Load account from landing volume"

  - name: write_account_raw
    type: write
    source: v_account_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "account_raw"

  - name: tst_account_raw_completeness
    type: test
    test_type: completeness
    source: v_account_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-account-R01"

  - name: tst_account_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_account_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-account-R02"
