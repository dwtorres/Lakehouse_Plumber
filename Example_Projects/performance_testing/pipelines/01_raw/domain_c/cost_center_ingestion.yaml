pipeline: domain_c_raw
flowgroup: cost_center_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_cost_center_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/cost_center/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_cost_center_cloudfiles
    description: "Load cost_center from landing volume"

  - name: write_cost_center_raw
    type: write
    source: v_cost_center_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "cost_center_raw"

  - name: tst_cost_center_raw_completeness
    type: test
    test_type: completeness
    source: v_cost_center_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cost_center-R01"

  - name: tst_cost_center_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_cost_center_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cost_center-R02"
