pipeline: domain_c_raw
use_template: json_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: ledger_ingestion
    template_parameters:
      table_name: ledger_raw
      landing_folder: ledger
      schema_file: nation_schema
    actions:
      - name: tst_ledger_raw_completeness
        type: test
        test_type: completeness
        source: v_ledger_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-ledger-R01"
      
      - name: tst_ledger_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_ledger_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-ledger-R02"

