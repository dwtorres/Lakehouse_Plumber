pipeline: domain_c_raw
use_template: parquet_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: journal_ingestion
    template_parameters:
      table_name: journal_raw
      landing_folder: journal
      schema_file: orders_schema
    actions:
      - name: tst_journal_raw_completeness
        type: test
        test_type: completeness
        source: v_journal_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-journal-R01"
      
      - name: tst_journal_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_journal_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-journal-R02"

