pipeline: domain_c_raw
use_template: csv_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: budget_ingestion
    template_parameters:
      table_name: budget_raw
      landing_folder: budget
      schema_file: part_schema
    actions:
      - name: tst_budget_raw_completeness
        type: test
        test_type: completeness
        source: v_budget_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-budget-R01"
      
      - name: tst_budget_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_budget_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-budget-R02"

