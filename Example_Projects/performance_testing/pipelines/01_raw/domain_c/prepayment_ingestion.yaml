pipeline: domain_c_raw
flowgroup: prepayment_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_prepayment_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/prepayment/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_prepayment_cloudfiles
    description: "Load prepayment from landing volume"

  - name: write_prepayment_raw
    type: write
    source: v_prepayment_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "prepayment_raw"

  - name: tst_prepayment_raw_completeness
    type: test
    test_type: completeness
    source: v_prepayment_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-prepayment-R01"

  - name: tst_prepayment_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_prepayment_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-prepayment-R02"
