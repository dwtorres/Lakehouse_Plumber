pipeline: domain_c_raw
flowgroup: tax_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_tax_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/tax/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_tax_cloudfiles
    description: "Load tax from landing volume"

  - name: write_tax_raw
    type: write
    source: v_tax_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "tax_raw"

  - name: tst_tax_raw_completeness
    type: test
    test_type: completeness
    source: v_tax_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-tax-R01"

  - name: tst_tax_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_tax_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-tax-R02"
