pipeline: domain_g_raw
use_template: json_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: lease_ingestion
    template_parameters:
      table_name: lease_raw
      landing_folder: lease
      schema_file: nation_schema
    actions:
      - name: tst_lease_raw_completeness
        type: test
        test_type: completeness
        source: v_lease_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-lease-R01"
      
      - name: tst_lease_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_lease_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-lease-R02"

