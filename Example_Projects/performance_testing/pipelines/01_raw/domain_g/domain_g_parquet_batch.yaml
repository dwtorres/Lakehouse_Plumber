pipeline: domain_g_raw
use_template: parquet_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: landlord_ingestion
    template_parameters:
      table_name: landlord_raw
      landing_folder: landlord
      schema_file: orders_schema
    actions:
      - name: tst_landlord_raw_completeness
        type: test
        test_type: completeness
        source: v_landlord_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-landlord-R01"
      
      - name: tst_landlord_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_landlord_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-landlord-R02"

