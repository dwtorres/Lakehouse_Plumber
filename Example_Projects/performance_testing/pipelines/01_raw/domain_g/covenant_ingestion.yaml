pipeline: domain_g_raw
flowgroup: covenant_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_covenant_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/covenant/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_covenant_cloudfiles
    description: "Load covenant from landing volume"

  - name: write_covenant_raw
    type: write
    source: v_covenant_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "covenant_raw"

  - name: tst_covenant_raw_completeness
    type: test
    test_type: completeness
    source: v_covenant_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-covenant-R01"

  - name: tst_covenant_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_covenant_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-covenant-R02"
