pipeline: domain_g_raw
flowgroup: condo_fee_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_condo_fee_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/condo_fee/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_condo_fee_cloudfiles
    description: "Load condo_fee from landing volume"

  - name: write_condo_fee_raw
    type: write
    source: v_condo_fee_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "condo_fee_raw"

  - name: tst_condo_fee_raw_completeness
    type: test
    test_type: completeness
    source: v_condo_fee_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-condo_fee-R01"

  - name: tst_condo_fee_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_condo_fee_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-condo_fee-R02"
