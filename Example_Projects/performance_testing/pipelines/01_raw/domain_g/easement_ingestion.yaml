pipeline: domain_g_raw
flowgroup: easement_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_easement_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/easement/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_easement_cloudfiles
    description: "Load easement from landing volume"

  - name: write_easement_raw
    type: write
    source: v_easement_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "easement_raw"

  - name: tst_easement_raw_completeness
    type: test
    test_type: completeness
    source: v_easement_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-easement-R01"

  - name: tst_easement_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_easement_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-easement-R02"
