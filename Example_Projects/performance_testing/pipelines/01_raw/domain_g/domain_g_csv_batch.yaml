pipeline: domain_g_raw
use_template: csv_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: unit_ingestion
    template_parameters:
      table_name: unit_raw
      landing_folder: unit
      schema_file: part_schema
    actions:
      - name: tst_unit_raw_completeness
        type: test
        test_type: completeness
        source: v_unit_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-unit-R01"
      
      - name: tst_unit_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_unit_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-unit-R02"

