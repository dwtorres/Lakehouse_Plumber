pipeline: domain_r_raw
flowgroup: uplink_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_uplink_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/uplink/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_uplink_cloudfiles
    description: "Load uplink from landing volume"

  - name: write_uplink_raw
    type: write
    source: v_uplink_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "uplink_raw"

  - name: tst_uplink_raw_completeness
    type: test
    test_type: completeness
    source: v_uplink_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-uplink-R01"

  - name: tst_uplink_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_uplink_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-uplink-R02"
