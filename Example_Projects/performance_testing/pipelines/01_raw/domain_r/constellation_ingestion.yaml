pipeline: domain_r_raw
flowgroup: constellation_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_constellation_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/constellation/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_constellation_cloudfiles
    description: "Load constellation from landing volume"

  - name: write_constellation_raw
    type: write
    source: v_constellation_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "constellation_raw"

  - name: tst_constellation_raw_completeness
    type: test
    test_type: completeness
    source: v_constellation_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-constellation-R01"

  - name: tst_constellation_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_constellation_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-constellation-R02"
