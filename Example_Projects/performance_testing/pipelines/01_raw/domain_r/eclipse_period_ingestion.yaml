pipeline: domain_r_raw
flowgroup: eclipse_period_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: eclipse_period_raw
  landing_folder: eclipse_period
  schema_file: lineitem_schema
actions:
  - name: tst_eclipse_period_raw_completeness
    type: test
    test_type: completeness
    source: v_eclipse_period_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-eclipse_period-R01"

  - name: tst_eclipse_period_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_eclipse_period_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-eclipse_period-R02"
