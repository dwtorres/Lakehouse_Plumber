pipeline: domain_r_raw
flowgroup: interference_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: interference_raw
  landing_folder: interference
  schema_file: nation_schema
actions:
  - name: tst_interference_raw_completeness
    type: test
    test_type: completeness
    source: v_interference_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-interference-R01"

  - name: tst_interference_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_interference_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-interference-R02"
