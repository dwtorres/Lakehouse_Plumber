pipeline: domain_r_raw
flowgroup: doppler_shift_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_doppler_shift_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/doppler_shift/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_doppler_shift_cloudfiles
    description: "Load doppler_shift from landing volume"

  - name: write_doppler_shift_raw
    type: write
    source: v_doppler_shift_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "doppler_shift_raw"

  - name: tst_doppler_shift_raw_completeness
    type: test
    test_type: completeness
    source: v_doppler_shift_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-doppler_shift-R01"

  - name: tst_doppler_shift_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_doppler_shift_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-doppler_shift-R02"
