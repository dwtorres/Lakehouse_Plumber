pipeline: domain_r_raw
flowgroup: debris_track_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: debris_track_raw
  landing_folder: debris_track
  schema_file: orders_schema
actions:
  - name: tst_debris_track_raw_completeness
    type: test
    test_type: completeness
    source: v_debris_track_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-debris_track-R01"

  - name: tst_debris_track_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_debris_track_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-debris_track-R02"
