pipeline: domain_r_raw
flowgroup: attitude_control_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: attitude_control_raw
  landing_folder: attitude_control
  schema_file: lineitem_schema
actions:
  - name: tst_attitude_control_raw_completeness
    type: test
    test_type: completeness
    source: v_attitude_control_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-attitude_control-R01"

  - name: tst_attitude_control_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_attitude_control_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-attitude_control-R02"
