pipeline: domain_r_raw
flowgroup: orbit_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_orbit_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/orbit/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_orbit_cloudfiles
    description: "Load orbit from landing volume"

  - name: write_orbit_raw
    type: write
    source: v_orbit_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "orbit_raw"

  - name: tst_orbit_raw_completeness
    type: test
    test_type: completeness
    source: v_orbit_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-orbit-R01"

  - name: tst_orbit_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_orbit_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-orbit-R02"
