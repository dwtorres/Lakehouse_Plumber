pipeline: domain_r_raw
flowgroup: spectrum_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: spectrum_raw
  landing_folder: spectrum
  schema_file: lineitem_schema
actions:
  - name: tst_spectrum_raw_completeness
    type: test
    test_type: completeness
    source: v_spectrum_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-spectrum-R01"

  - name: tst_spectrum_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_spectrum_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-spectrum-R02"
