pipeline: domain_r_raw
flowgroup: antenna_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: antenna_raw
  landing_folder: antenna
  schema_file: orders_schema
actions:
  - name: tst_antenna_raw_completeness
    type: test
    test_type: completeness
    source: v_antenna_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-antenna-R01"

  - name: tst_antenna_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_antenna_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-antenna-R02"
