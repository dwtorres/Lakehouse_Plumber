pipeline: domain_r_raw
flowgroup: launch_vehicle_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: launch_vehicle_raw
  landing_folder: launch_vehicle
  schema_file: customer_schema
actions:
  - name: tst_launch_vehicle_raw_completeness
    type: test
    test_type: completeness
    source: v_launch_vehicle_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-launch_vehicle-R01"

  - name: tst_launch_vehicle_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_launch_vehicle_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-launch_vehicle-R02"
