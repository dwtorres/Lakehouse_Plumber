pipeline: domain_r_raw
flowgroup: multiplexing_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_multiplexing_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/multiplexing/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_multiplexing_cloudfiles
    description: "Load multiplexing from landing volume"

  - name: write_multiplexing_raw
    type: write
    source: v_multiplexing_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "multiplexing_raw"

  - name: tst_multiplexing_raw_completeness
    type: test
    test_type: completeness
    source: v_multiplexing_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-multiplexing-R01"

  - name: tst_multiplexing_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_multiplexing_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-multiplexing-R02"
