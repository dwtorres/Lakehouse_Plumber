pipeline: domain_r_raw
flowgroup: downlink_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: downlink_raw
  landing_folder: downlink
  schema_file: customer_schema
actions:
  - name: tst_downlink_raw_completeness
    type: test
    test_type: completeness
    source: v_downlink_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-downlink-R01"

  - name: tst_downlink_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_downlink_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-downlink-R02"
