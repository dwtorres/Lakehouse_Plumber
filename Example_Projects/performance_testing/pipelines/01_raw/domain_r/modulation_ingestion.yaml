pipeline: domain_r_raw
flowgroup: modulation_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: modulation_raw
  landing_folder: modulation
  schema_file: part_schema
actions:
  - name: tst_modulation_raw_completeness
    type: test
    test_type: completeness
    source: v_modulation_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-modulation-R01"

  - name: tst_modulation_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_modulation_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-modulation-R02"
