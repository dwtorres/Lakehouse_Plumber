pipeline: domain_r_raw
flowgroup: transponder_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: transponder_raw
  landing_folder: transponder
  schema_file: part_schema
actions:
  - name: tst_transponder_raw_completeness
    type: test
    test_type: completeness
    source: v_transponder_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-transponder-R01"

  - name: tst_transponder_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_transponder_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-transponder-R02"
