pipeline: domain_r_raw
flowgroup: bandwidth_alloc_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_bandwidth_alloc_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/bandwidth_alloc/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_bandwidth_alloc_cloudfiles
    description: "Load bandwidth_alloc from landing volume"

  - name: write_bandwidth_alloc_raw
    type: write
    source: v_bandwidth_alloc_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "bandwidth_alloc_raw"

  - name: tst_bandwidth_alloc_raw_completeness
    type: test
    test_type: completeness
    source: v_bandwidth_alloc_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bandwidth_alloc-R01"

  - name: tst_bandwidth_alloc_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_bandwidth_alloc_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bandwidth_alloc-R02"
