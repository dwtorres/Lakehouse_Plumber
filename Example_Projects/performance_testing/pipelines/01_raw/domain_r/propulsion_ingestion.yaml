pipeline: domain_r_raw
flowgroup: propulsion_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: propulsion_raw
  landing_folder: propulsion
  schema_file: nation_schema
actions:
  - name: tst_propulsion_raw_completeness
    type: test
    test_type: completeness
    source: v_propulsion_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-propulsion-R01"

  - name: tst_propulsion_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_propulsion_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-propulsion-R02"
