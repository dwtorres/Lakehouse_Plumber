pipeline: domain_r_raw
flowgroup: satellite_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_satellite_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/satellite/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_satellite_cloudfiles
    description: "Load satellite from landing volume"

  - name: write_satellite_raw
    type: write
    source: v_satellite_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "satellite_raw"

  - name: tst_satellite_raw_completeness
    type: test
    test_type: completeness
    source: v_satellite_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-satellite-R01"

  - name: tst_satellite_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_satellite_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-satellite-R02"
