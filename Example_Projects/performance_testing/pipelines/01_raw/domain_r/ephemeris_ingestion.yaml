pipeline: domain_r_raw
flowgroup: ephemeris_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: ephemeris_raw
  landing_folder: ephemeris
  schema_file: partsupp_schema
actions:
  - name: tst_ephemeris_raw_completeness
    type: test
    test_type: completeness
    source: v_ephemeris_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-ephemeris-R01"

  - name: tst_ephemeris_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_ephemeris_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-ephemeris-R02"
