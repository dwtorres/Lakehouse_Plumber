pipeline: domain_r_raw
flowgroup: tle_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: tle_raw
  landing_folder: tle
  schema_file: product_schema
actions:
  - name: tst_tle_raw_completeness
    type: test
    test_type: completeness
    source: v_tle_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-tle-R01"

  - name: tst_tle_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_tle_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-tle-R02"
