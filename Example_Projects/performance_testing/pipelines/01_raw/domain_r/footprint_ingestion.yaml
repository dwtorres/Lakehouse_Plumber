pipeline: domain_r_raw
flowgroup: footprint_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: footprint_raw
  landing_folder: footprint
  schema_file: nation_schema
actions:
  - name: tst_footprint_raw_completeness
    type: test
    test_type: completeness
    source: v_footprint_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-footprint-R01"

  - name: tst_footprint_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_footprint_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-footprint-R02"
