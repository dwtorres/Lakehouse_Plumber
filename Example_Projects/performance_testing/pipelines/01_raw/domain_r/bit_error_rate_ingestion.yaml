pipeline: domain_r_raw
flowgroup: bit_error_rate_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: bit_error_rate_raw
  landing_folder: bit_error_rate
  schema_file: partsupp_schema
actions:
  - name: tst_bit_error_rate_raw_completeness
    type: test
    test_type: completeness
    source: v_bit_error_rate_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bit_error_rate-R01"

  - name: tst_bit_error_rate_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_bit_error_rate_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bit_error_rate-R02"
