pipeline: domain_r_raw
flowgroup: telemetry_frame_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_telemetry_frame_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/telemetry_frame/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_telemetry_frame_cloudfiles
    description: "Load telemetry_frame from landing volume"

  - name: write_telemetry_frame_raw
    type: write
    source: v_telemetry_frame_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "telemetry_frame_raw"

  - name: tst_telemetry_frame_raw_completeness
    type: test
    test_type: completeness
    source: v_telemetry_frame_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-telemetry_frame-R01"

  - name: tst_telemetry_frame_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_telemetry_frame_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-telemetry_frame-R02"
