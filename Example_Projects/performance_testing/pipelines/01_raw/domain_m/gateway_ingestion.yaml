pipeline: domain_m_raw
flowgroup: gateway_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: gateway_raw
  landing_folder: gateway
  schema_file: part_schema
actions:
  - name: tst_gateway_raw_completeness
    type: test
    test_type: completeness
    source: v_gateway_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-gateway-R01"

  - name: tst_gateway_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_gateway_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-gateway-R02"
