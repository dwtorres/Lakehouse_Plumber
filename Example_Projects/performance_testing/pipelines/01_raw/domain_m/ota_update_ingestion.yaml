pipeline: domain_m_raw
flowgroup: ota_update_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_ota_update_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/ota_update/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_ota_update_cloudfiles
    description: "Load ota_update from landing volume"

  - name: write_ota_update_raw
    type: write
    source: v_ota_update_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "ota_update_raw"

  - name: tst_ota_update_raw_completeness
    type: test
    test_type: completeness
    source: v_ota_update_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-ota_update-R01"

  - name: tst_ota_update_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_ota_update_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-ota_update-R02"
