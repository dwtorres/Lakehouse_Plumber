pipeline: domain_m_raw
flowgroup: dashboard_widget_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: dashboard_widget_raw
  landing_folder: dashboard_widget
  schema_file: lineitem_schema
actions:
  - name: tst_dashboard_widget_raw_completeness
    type: test
    test_type: completeness
    source: v_dashboard_widget_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-dashboard_widget-R01"

  - name: tst_dashboard_widget_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_dashboard_widget_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-dashboard_widget-R02"
