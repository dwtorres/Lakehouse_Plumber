pipeline: domain_m_raw
flowgroup: digital_twin_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_digital_twin_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/digital_twin/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_digital_twin_cloudfiles
    description: "Load digital_twin from landing volume"

  - name: write_digital_twin_raw
    type: write
    source: v_digital_twin_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "digital_twin_raw"

  - name: tst_digital_twin_raw_completeness
    type: test
    test_type: completeness
    source: v_digital_twin_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-digital_twin-R01"

  - name: tst_digital_twin_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_digital_twin_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-digital_twin-R02"
