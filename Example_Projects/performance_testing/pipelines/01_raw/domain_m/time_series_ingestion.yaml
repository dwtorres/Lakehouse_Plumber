pipeline: domain_m_raw
flowgroup: time_series_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: time_series_raw
  landing_folder: time_series
  schema_file: nation_schema
actions:
  - name: tst_time_series_raw_completeness
    type: test
    test_type: completeness
    source: v_time_series_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-time_series-R01"

  - name: tst_time_series_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_time_series_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-time_series-R02"
