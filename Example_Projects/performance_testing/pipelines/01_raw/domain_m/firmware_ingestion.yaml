pipeline: domain_m_raw
flowgroup: firmware_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: firmware_raw
  landing_folder: firmware
  schema_file: orders_schema
actions:
  - name: tst_firmware_raw_completeness
    type: test
    test_type: completeness
    source: v_firmware_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-firmware-R01"

  - name: tst_firmware_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_firmware_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-firmware-R02"
