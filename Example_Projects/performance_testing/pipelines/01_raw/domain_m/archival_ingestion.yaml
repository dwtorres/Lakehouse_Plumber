pipeline: domain_m_raw
flowgroup: archival_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_archival_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/archival/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_archival_cloudfiles
    description: "Load archival from landing volume"

  - name: write_archival_raw
    type: write
    source: v_archival_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "archival_raw"

  - name: tst_archival_raw_completeness
    type: test
    test_type: completeness
    source: v_archival_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-archival-R01"

  - name: tst_archival_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_archival_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-archival-R02"
