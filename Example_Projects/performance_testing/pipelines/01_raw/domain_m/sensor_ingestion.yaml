pipeline: domain_m_raw
flowgroup: sensor_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_sensor_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/sensor/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_sensor_cloudfiles
    description: "Load sensor from landing volume"

  - name: write_sensor_raw
    type: write
    source: v_sensor_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "sensor_raw"

  - name: tst_sensor_raw_completeness
    type: test
    test_type: completeness
    source: v_sensor_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-sensor-R01"

  - name: tst_sensor_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_sensor_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-sensor-R02"
