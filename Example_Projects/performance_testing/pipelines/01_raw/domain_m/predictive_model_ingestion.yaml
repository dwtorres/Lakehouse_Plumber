pipeline: domain_m_raw
flowgroup: predictive_model_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: predictive_model_raw
  landing_folder: predictive_model
  schema_file: lineitem_schema
actions:
  - name: tst_predictive_model_raw_completeness
    type: test
    test_type: completeness
    source: v_predictive_model_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-predictive_model-R01"

  - name: tst_predictive_model_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_predictive_model_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-predictive_model-R02"
