pipeline: domain_m_raw
flowgroup: quality_rule_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: quality_rule_raw
  landing_folder: quality_rule
  schema_file: product_schema
actions:
  - name: tst_quality_rule_raw_completeness
    type: test
    test_type: completeness
    source: v_quality_rule_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-quality_rule-R01"

  - name: tst_quality_rule_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_quality_rule_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-quality_rule-R02"
