pipeline: domain_m_raw
flowgroup: event_stream_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: event_stream_raw
  landing_folder: event_stream
  schema_file: orders_schema
actions:
  - name: tst_event_stream_raw_completeness
    type: test
    test_type: completeness
    source: v_event_stream_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-event_stream-R01"

  - name: tst_event_stream_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_event_stream_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-event_stream-R02"
