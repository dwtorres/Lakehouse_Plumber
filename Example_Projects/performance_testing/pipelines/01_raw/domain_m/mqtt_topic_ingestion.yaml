pipeline: domain_m_raw
flowgroup: mqtt_topic_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: mqtt_topic_raw
  landing_folder: mqtt_topic
  schema_file: partsupp_schema
actions:
  - name: tst_mqtt_topic_raw_completeness
    type: test
    test_type: completeness
    source: v_mqtt_topic_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mqtt_topic-R01"

  - name: tst_mqtt_topic_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_mqtt_topic_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mqtt_topic-R02"
