pipeline: domain_m_raw
flowgroup: replay_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: replay_raw
  landing_folder: replay
  schema_file: nation_schema
actions:
  - name: tst_replay_raw_completeness
    type: test
    test_type: completeness
    source: v_replay_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-replay-R01"

  - name: tst_replay_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_replay_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-replay-R02"
