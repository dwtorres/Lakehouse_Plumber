pipeline: domain_m_raw
flowgroup: rule_engine_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_rule_engine_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/rule_engine/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_rule_engine_cloudfiles
    description: "Load rule_engine from landing volume"

  - name: write_rule_engine_raw
    type: write
    source: v_rule_engine_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "rule_engine_raw"

  - name: tst_rule_engine_raw_completeness
    type: test
    test_type: completeness
    source: v_rule_engine_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-rule_engine-R01"

  - name: tst_rule_engine_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_rule_engine_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-rule_engine-R02"
