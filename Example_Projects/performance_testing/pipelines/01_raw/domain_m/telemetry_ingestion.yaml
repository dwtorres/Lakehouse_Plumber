pipeline: domain_m_raw
flowgroup: telemetry_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: telemetry_raw
  landing_folder: telemetry
  schema_file: nation_schema
actions:
  - name: tst_telemetry_raw_completeness
    type: test
    test_type: completeness
    source: v_telemetry_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-telemetry-R01"

  - name: tst_telemetry_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_telemetry_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-telemetry-R02"
