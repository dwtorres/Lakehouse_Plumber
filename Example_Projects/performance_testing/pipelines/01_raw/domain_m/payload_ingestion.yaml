pipeline: domain_m_raw
flowgroup: payload_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: payload_raw
  landing_folder: payload
  schema_file: product_schema
actions:
  - name: tst_payload_raw_completeness
    type: test
    test_type: completeness
    source: v_payload_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-payload-R01"

  - name: tst_payload_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_payload_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-payload-R02"
