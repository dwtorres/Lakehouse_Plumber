pipeline: domain_m_raw
flowgroup: anomaly_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: anomaly_raw
  landing_folder: anomaly
  schema_file: nation_schema
actions:
  - name: tst_anomaly_raw_completeness
    type: test
    test_type: completeness
    source: v_anomaly_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-anomaly-R01"

  - name: tst_anomaly_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_anomaly_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-anomaly-R02"
