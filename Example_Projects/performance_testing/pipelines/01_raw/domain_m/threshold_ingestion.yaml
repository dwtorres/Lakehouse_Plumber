pipeline: domain_m_raw
flowgroup: threshold_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: threshold_raw
  landing_folder: threshold
  schema_file: lineitem_schema
actions:
  - name: tst_threshold_raw_completeness
    type: test
    test_type: completeness
    source: v_threshold_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-threshold-R01"

  - name: tst_threshold_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_threshold_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-threshold-R02"
