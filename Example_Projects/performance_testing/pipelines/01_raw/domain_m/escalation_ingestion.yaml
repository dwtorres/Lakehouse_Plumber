pipeline: domain_m_raw
flowgroup: escalation_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: escalation_raw
  landing_folder: escalation
  schema_file: product_schema
actions:
  - name: tst_escalation_raw_completeness
    type: test
    test_type: completeness
    source: v_escalation_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-escalation-R01"

  - name: tst_escalation_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_escalation_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-escalation-R02"
