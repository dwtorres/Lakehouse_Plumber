pipeline: domain_m_raw
flowgroup: diagnostic_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: diagnostic_raw
  landing_folder: diagnostic
  schema_file: part_schema
actions:
  - name: tst_diagnostic_raw_completeness
    type: test
    test_type: completeness
    source: v_diagnostic_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-diagnostic-R01"

  - name: tst_diagnostic_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_diagnostic_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-diagnostic-R02"
