pipeline: domain_m_raw
flowgroup: data_lake_ingestion_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_data_lake_ingestion_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/data_lake_ingestion/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_data_lake_ingestion_cloudfiles
    description: "Load data_lake_ingestion from landing volume"

  - name: write_data_lake_ingestion_raw
    type: write
    source: v_data_lake_ingestion_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "data_lake_ingestion_raw"

  - name: tst_data_lake_ingestion_raw_completeness
    type: test
    test_type: completeness
    source: v_data_lake_ingestion_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-data_lake_ingestion-R01"

  - name: tst_data_lake_ingestion_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_data_lake_ingestion_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-data_lake_ingestion-R02"
