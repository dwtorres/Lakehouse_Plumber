pipeline: domain_m_raw
flowgroup: partition_key_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: partition_key_raw
  landing_folder: partition_key
  schema_file: part_schema
actions:
  - name: tst_partition_key_raw_completeness
    type: test
    test_type: completeness
    source: v_partition_key_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-partition_key-R01"

  - name: tst_partition_key_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_partition_key_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-partition_key-R02"
