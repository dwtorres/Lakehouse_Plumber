pipeline: domain_j_raw
flowgroup: meter_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_meter_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/meter/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_meter_cloudfiles
    description: "Load meter from landing volume"

  - name: write_meter_raw
    type: write
    source: v_meter_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "meter_raw"

  - name: tst_meter_raw_completeness
    type: test
    test_type: completeness
    source: v_meter_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-meter-R01"

  - name: tst_meter_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_meter_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-meter-R02"
