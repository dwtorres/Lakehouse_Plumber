pipeline: domain_j_raw
flowgroup: off_peak_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_off_peak_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/off_peak/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_off_peak_cloudfiles
    description: "Load off_peak from landing volume"

  - name: write_off_peak_raw
    type: write
    source: v_off_peak_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "off_peak_raw"

  - name: tst_off_peak_raw_completeness
    type: test
    test_type: completeness
    source: v_off_peak_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-off_peak-R01"

  - name: tst_off_peak_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_off_peak_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-off_peak-R02"
