pipeline: domain_j_raw
flowgroup: capacitor_bank_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: capacitor_bank_raw
  landing_folder: capacitor_bank
  schema_file: lineitem_schema
actions:
  - name: tst_capacitor_bank_raw_completeness
    type: test
    test_type: completeness
    source: v_capacitor_bank_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-capacitor_bank-R01"

  - name: tst_capacitor_bank_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_capacitor_bank_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-capacitor_bank-R02"
