pipeline: domain_j_raw
flowgroup: load_profile_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_load_profile_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/load_profile/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_load_profile_cloudfiles
    description: "Load load_profile from landing volume"

  - name: write_load_profile_raw
    type: write
    source: v_load_profile_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "load_profile_raw"

  - name: tst_load_profile_raw_completeness
    type: test
    test_type: completeness
    source: v_load_profile_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-load_profile-R01"

  - name: tst_load_profile_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_load_profile_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-load_profile-R02"
