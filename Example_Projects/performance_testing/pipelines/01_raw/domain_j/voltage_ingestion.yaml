pipeline: domain_j_raw
flowgroup: voltage_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: voltage_raw
  landing_folder: voltage
  schema_file: partsupp_schema
actions:
  - name: tst_voltage_raw_completeness
    type: test
    test_type: completeness
    source: v_voltage_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-voltage-R01"

  - name: tst_voltage_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_voltage_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-voltage-R02"
