pipeline: domain_j_raw
flowgroup: battery_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_battery_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/battery/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_battery_cloudfiles
    description: "Load battery from landing volume"

  - name: write_battery_raw
    type: write
    source: v_battery_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "battery_raw"

  - name: tst_battery_raw_completeness
    type: test
    test_type: completeness
    source: v_battery_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-battery-R01"

  - name: tst_battery_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_battery_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-battery-R02"
