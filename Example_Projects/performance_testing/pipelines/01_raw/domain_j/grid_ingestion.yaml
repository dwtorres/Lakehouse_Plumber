pipeline: domain_j_raw
flowgroup: grid_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: grid_raw
  landing_folder: grid
  schema_file: nation_schema
actions:
  - name: tst_grid_raw_completeness
    type: test
    test_type: completeness
    source: v_grid_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-grid-R01"

  - name: tst_grid_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_grid_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-grid-R02"
