pipeline: domain_j_raw
flowgroup: spinning_reserve_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_spinning_reserve_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/spinning_reserve/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_spinning_reserve_cloudfiles
    description: "Load spinning_reserve from landing volume"

  - name: write_spinning_reserve_raw
    type: write
    source: v_spinning_reserve_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "spinning_reserve_raw"

  - name: tst_spinning_reserve_raw_completeness
    type: test
    test_type: completeness
    source: v_spinning_reserve_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-spinning_reserve-R01"

  - name: tst_spinning_reserve_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_spinning_reserve_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-spinning_reserve-R02"
