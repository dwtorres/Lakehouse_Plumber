pipeline: domain_j_raw
flowgroup: frequency_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_frequency_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/frequency/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_frequency_cloudfiles
    description: "Load frequency from landing volume"

  - name: write_frequency_raw
    type: write
    source: v_frequency_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "frequency_raw"

  - name: tst_frequency_raw_completeness
    type: test
    test_type: completeness
    source: v_frequency_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-frequency-R01"

  - name: tst_frequency_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_frequency_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-frequency-R02"
