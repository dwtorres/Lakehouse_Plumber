pipeline: domain_j_raw
flowgroup: demand_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: demand_raw
  landing_folder: demand
  schema_file: customer_schema
actions:
  - name: tst_demand_raw_completeness
    type: test
    test_type: completeness
    source: v_demand_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-demand-R01"

  - name: tst_demand_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_demand_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-demand-R02"
