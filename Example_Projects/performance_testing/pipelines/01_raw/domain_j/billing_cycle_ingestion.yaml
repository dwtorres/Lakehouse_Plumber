pipeline: domain_j_raw
flowgroup: billing_cycle_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: billing_cycle_raw
  landing_folder: billing_cycle
  schema_file: customer_schema
actions:
  - name: tst_billing_cycle_raw_completeness
    type: test
    test_type: completeness
    source: v_billing_cycle_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-billing_cycle-R01"

  - name: tst_billing_cycle_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_billing_cycle_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-billing_cycle-R02"
