pipeline: domain_j_raw
flowgroup: wheeling_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: wheeling_raw
  landing_folder: wheeling
  schema_file: partsupp_schema
actions:
  - name: tst_wheeling_raw_completeness
    type: test
    test_type: completeness
    source: v_wheeling_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-wheeling-R01"

  - name: tst_wheeling_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_wheeling_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-wheeling-R02"
