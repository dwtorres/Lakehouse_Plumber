pipeline: domain_j_raw
flowgroup: transmission_line_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: transmission_line_raw
  landing_folder: transmission_line
  schema_file: product_schema
actions:
  - name: tst_transmission_line_raw_completeness
    type: test
    test_type: completeness
    source: v_transmission_line_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-transmission_line-R01"

  - name: tst_transmission_line_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_transmission_line_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-transmission_line-R02"
