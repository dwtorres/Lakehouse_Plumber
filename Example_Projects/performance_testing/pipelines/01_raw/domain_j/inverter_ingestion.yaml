pipeline: domain_j_raw
flowgroup: inverter_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: inverter_raw
  landing_folder: inverter
  schema_file: partsupp_schema
actions:
  - name: tst_inverter_raw_completeness
    type: test
    test_type: completeness
    source: v_inverter_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-inverter-R01"

  - name: tst_inverter_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_inverter_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-inverter-R02"
