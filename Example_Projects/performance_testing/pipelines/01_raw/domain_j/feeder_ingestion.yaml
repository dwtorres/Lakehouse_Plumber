pipeline: domain_j_raw
flowgroup: feeder_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_feeder_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/feeder/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_feeder_cloudfiles
    description: "Load feeder from landing volume"

  - name: write_feeder_raw
    type: write
    source: v_feeder_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "feeder_raw"

  - name: tst_feeder_raw_completeness
    type: test
    test_type: completeness
    source: v_feeder_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-feeder-R01"

  - name: tst_feeder_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_feeder_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-feeder-R02"
