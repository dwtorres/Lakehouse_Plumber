pipeline: domain_j_raw
flowgroup: tariff_plan_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: tariff_plan_raw
  landing_folder: tariff_plan
  schema_file: product_schema
actions:
  - name: tst_tariff_plan_raw_completeness
    type: test
    test_type: completeness
    source: v_tariff_plan_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-tariff_plan-R01"

  - name: tst_tariff_plan_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_tariff_plan_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-tariff_plan-R02"
