pipeline: domain_j_raw
flowgroup: interconnection_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: interconnection_raw
  landing_folder: interconnection
  schema_file: part_schema
actions:
  - name: tst_interconnection_raw_completeness
    type: test
    test_type: completeness
    source: v_interconnection_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-interconnection-R01"

  - name: tst_interconnection_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_interconnection_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-interconnection-R02"
