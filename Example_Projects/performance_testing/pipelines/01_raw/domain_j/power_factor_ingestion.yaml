pipeline: domain_j_raw
flowgroup: power_factor_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: power_factor_raw
  landing_folder: power_factor
  schema_file: part_schema
actions:
  - name: tst_power_factor_raw_completeness
    type: test
    test_type: completeness
    source: v_power_factor_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-power_factor-R01"

  - name: tst_power_factor_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_power_factor_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-power_factor-R02"
