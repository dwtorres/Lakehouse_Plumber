pipeline: domain_j_raw
flowgroup: microgrid_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: microgrid_raw
  landing_folder: microgrid
  schema_file: orders_schema
actions:
  - name: tst_microgrid_raw_completeness
    type: test
    test_type: completeness
    source: v_microgrid_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-microgrid-R01"

  - name: tst_microgrid_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_microgrid_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-microgrid-R02"
