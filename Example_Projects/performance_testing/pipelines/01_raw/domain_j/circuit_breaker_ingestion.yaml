pipeline: domain_j_raw
flowgroup: circuit_breaker_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: circuit_breaker_raw
  landing_folder: circuit_breaker
  schema_file: orders_schema
actions:
  - name: tst_circuit_breaker_raw_completeness
    type: test
    test_type: completeness
    source: v_circuit_breaker_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-circuit_breaker-R01"

  - name: tst_circuit_breaker_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_circuit_breaker_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-circuit_breaker-R02"
