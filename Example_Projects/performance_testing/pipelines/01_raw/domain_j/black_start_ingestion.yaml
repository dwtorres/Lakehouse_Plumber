pipeline: domain_j_raw
flowgroup: black_start_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_black_start_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/black_start/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_black_start_cloudfiles
    description: "Load black_start from landing volume"

  - name: write_black_start_raw
    type: write
    source: v_black_start_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "black_start_raw"

  - name: tst_black_start_raw_completeness
    type: test
    test_type: completeness
    source: v_black_start_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-black_start-R01"

  - name: tst_black_start_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_black_start_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-black_start-R02"
