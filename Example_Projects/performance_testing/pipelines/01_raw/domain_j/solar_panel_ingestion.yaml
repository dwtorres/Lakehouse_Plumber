pipeline: domain_j_raw
flowgroup: solar_panel_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: solar_panel_raw
  landing_folder: solar_panel
  schema_file: nation_schema
actions:
  - name: tst_solar_panel_raw_completeness
    type: test
    test_type: completeness
    source: v_solar_panel_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-solar_panel-R01"

  - name: tst_solar_panel_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_solar_panel_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-solar_panel-R02"
