pipeline: domain_j_raw
flowgroup: transformer_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: transformer_raw
  landing_folder: transformer
  schema_file: orders_schema
actions:
  - name: tst_transformer_raw_completeness
    type: test
    test_type: completeness
    source: v_transformer_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-transformer-R01"

  - name: tst_transformer_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_transformer_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-transformer-R02"
