pipeline: domain_b_raw
flowgroup: employee_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_employee_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/employee/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_employee_cloudfiles
    description: "Load employee from landing volume"

  - name: write_employee_raw
    type: write
    source: v_employee_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "employee_raw"

  - name: tst_employee_raw_completeness
    type: test
    test_type: completeness
    source: v_employee_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-employee-R01"

  - name: tst_employee_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_employee_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-employee-R02"
