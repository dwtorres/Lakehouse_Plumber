pipeline: domain_b_raw
use_template: json_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: project_ingestion
    template_parameters:
      table_name: project_raw
      landing_folder: project
      schema_file: nation_schema
    actions:
      - name: tst_project_raw_completeness
        type: test
        test_type: completeness
        source: v_project_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-project-R01"
      
      - name: tst_project_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_project_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-project-R02"

