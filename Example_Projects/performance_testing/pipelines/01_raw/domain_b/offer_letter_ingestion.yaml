pipeline: domain_b_raw
flowgroup: offer_letter_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_offer_letter_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/offer_letter/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_offer_letter_cloudfiles
    description: "Load offer_letter from landing volume"

  - name: write_offer_letter_raw
    type: write
    source: v_offer_letter_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "offer_letter_raw"

  - name: tst_offer_letter_raw_completeness
    type: test
    test_type: completeness
    source: v_offer_letter_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-offer_letter-R01"

  - name: tst_offer_letter_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_offer_letter_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-offer_letter-R02"
