pipeline: domain_b_raw
flowgroup: goal_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_goal_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/goal/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_goal_cloudfiles
    description: "Load goal from landing volume"

  - name: write_goal_raw
    type: write
    source: v_goal_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "goal_raw"

  - name: tst_goal_raw_completeness
    type: test
    test_type: completeness
    source: v_goal_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-goal-R01"

  - name: tst_goal_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_goal_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-goal-R02"
