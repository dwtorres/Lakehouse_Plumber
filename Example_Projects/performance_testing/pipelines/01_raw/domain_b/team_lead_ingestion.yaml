pipeline: domain_b_raw
flowgroup: team_lead_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_team_lead_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/team_lead/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_team_lead_cloudfiles
    description: "Load team_lead from landing volume"

  - name: write_team_lead_raw
    type: write
    source: v_team_lead_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "team_lead_raw"

  - name: tst_team_lead_raw_completeness
    type: test
    test_type: completeness
    source: v_team_lead_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-team_lead-R01"

  - name: tst_team_lead_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_team_lead_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-team_lead-R02"
