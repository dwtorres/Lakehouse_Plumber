pipeline: domain_b_raw
use_template: parquet_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: task_ingestion
    template_parameters:
      table_name: task_raw
      landing_folder: task
      schema_file: orders_schema
    actions:
      - name: tst_task_raw_completeness
        type: test
        test_type: completeness
        source: v_task_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-task-R01"
      
      - name: tst_task_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_task_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-task-R02"

