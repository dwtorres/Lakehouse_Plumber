pipeline: domain_b_raw
flowgroup: commission_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_commission_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/commission/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_commission_cloudfiles
    description: "Load commission from landing volume"

  - name: write_commission_raw
    type: write
    source: v_commission_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "commission_raw"

  - name: tst_commission_raw_completeness
    type: test
    test_type: completeness
    source: v_commission_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-commission-R01"

  - name: tst_commission_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_commission_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-commission-R02"
