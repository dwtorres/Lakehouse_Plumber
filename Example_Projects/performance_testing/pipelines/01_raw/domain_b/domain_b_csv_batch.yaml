pipeline: domain_b_raw
use_template: csv_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: timesheet_ingestion
    template_parameters:
      table_name: timesheet_raw
      landing_folder: timesheet
      schema_file: part_schema
    actions:
      - name: tst_timesheet_raw_completeness
        type: test
        test_type: completeness
        source: v_timesheet_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-timesheet-R01"
      
      - name: tst_timesheet_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_timesheet_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-timesheet-R02"

