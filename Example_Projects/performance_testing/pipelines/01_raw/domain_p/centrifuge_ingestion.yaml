pipeline: domain_p_raw
flowgroup: centrifuge_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: centrifuge_raw
  landing_folder: centrifuge
  schema_file: nation_schema
actions:
  - name: tst_centrifuge_raw_completeness
    type: test
    test_type: completeness
    source: v_centrifuge_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-centrifuge-R01"

  - name: tst_centrifuge_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_centrifuge_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-centrifuge-R02"
