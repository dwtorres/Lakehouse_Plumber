pipeline: domain_p_raw
flowgroup: protein_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: protein_raw
  landing_folder: protein
  schema_file: nation_schema
actions:
  - name: tst_protein_raw_completeness
    type: test
    test_type: completeness
    source: v_protein_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-protein-R01"

  - name: tst_protein_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_protein_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-protein-R02"
