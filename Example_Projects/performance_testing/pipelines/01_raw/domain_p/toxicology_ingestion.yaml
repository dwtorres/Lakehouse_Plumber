pipeline: domain_p_raw
flowgroup: toxicology_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: toxicology_raw
  landing_folder: toxicology
  schema_file: orders_schema
actions:
  - name: tst_toxicology_raw_completeness
    type: test
    test_type: completeness
    source: v_toxicology_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-toxicology-R01"

  - name: tst_toxicology_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_toxicology_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-toxicology-R02"
