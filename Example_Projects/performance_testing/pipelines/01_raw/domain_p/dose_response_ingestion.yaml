pipeline: domain_p_raw
flowgroup: dose_response_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: dose_response_raw
  landing_folder: dose_response
  schema_file: nation_schema
actions:
  - name: tst_dose_response_raw_completeness
    type: test
    test_type: completeness
    source: v_dose_response_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-dose_response-R01"

  - name: tst_dose_response_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_dose_response_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-dose_response-R02"
