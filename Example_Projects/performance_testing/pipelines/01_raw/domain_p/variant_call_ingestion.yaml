pipeline: domain_p_raw
flowgroup: variant_call_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: variant_call_raw
  landing_folder: variant_call
  schema_file: part_schema
actions:
  - name: tst_variant_call_raw_completeness
    type: test
    test_type: completeness
    source: v_variant_call_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-variant_call-R01"

  - name: tst_variant_call_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_variant_call_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-variant_call-R02"
