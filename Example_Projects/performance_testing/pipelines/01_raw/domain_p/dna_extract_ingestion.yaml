pipeline: domain_p_raw
flowgroup: dna_extract_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: dna_extract_raw
  landing_folder: dna_extract
  schema_file: lineitem_schema
actions:
  - name: tst_dna_extract_raw_completeness
    type: test
    test_type: completeness
    source: v_dna_extract_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-dna_extract-R01"

  - name: tst_dna_extract_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_dna_extract_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-dna_extract-R02"
