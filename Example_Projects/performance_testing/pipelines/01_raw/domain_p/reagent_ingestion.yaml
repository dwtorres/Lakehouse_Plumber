pipeline: domain_p_raw
flowgroup: reagent_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: reagent_raw
  landing_folder: reagent
  schema_file: customer_schema
actions:
  - name: tst_reagent_raw_completeness
    type: test
    test_type: completeness
    source: v_reagent_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-reagent-R01"

  - name: tst_reagent_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_reagent_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-reagent-R02"
