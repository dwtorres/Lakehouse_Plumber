pipeline: domain_p_raw
flowgroup: phenotype_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: phenotype_raw
  landing_folder: phenotype
  schema_file: part_schema
actions:
  - name: tst_phenotype_raw_completeness
    type: test
    test_type: completeness
    source: v_phenotype_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-phenotype-R01"

  - name: tst_phenotype_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_phenotype_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-phenotype-R02"
