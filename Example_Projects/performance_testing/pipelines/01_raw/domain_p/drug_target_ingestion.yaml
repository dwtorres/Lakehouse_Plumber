pipeline: domain_p_raw
flowgroup: drug_target_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_drug_target_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/drug_target/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_drug_target_cloudfiles
    description: "Load drug_target from landing volume"

  - name: write_drug_target_raw
    type: write
    source: v_drug_target_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "drug_target_raw"

  - name: tst_drug_target_raw_completeness
    type: test
    test_type: completeness
    source: v_drug_target_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-drug_target-R01"

  - name: tst_drug_target_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_drug_target_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-drug_target-R02"
