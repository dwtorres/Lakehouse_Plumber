pipeline: domain_p_raw
flowgroup: annotation_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: annotation_raw
  landing_folder: annotation
  schema_file: partsupp_schema
actions:
  - name: tst_annotation_raw_completeness
    type: test
    test_type: completeness
    source: v_annotation_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-annotation-R01"

  - name: tst_annotation_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_annotation_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-annotation-R02"
