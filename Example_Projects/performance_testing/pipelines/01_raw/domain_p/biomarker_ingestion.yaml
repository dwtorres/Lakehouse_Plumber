pipeline: domain_p_raw
flowgroup: biomarker_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: biomarker_raw
  landing_folder: biomarker
  schema_file: customer_schema
actions:
  - name: tst_biomarker_raw_completeness
    type: test
    test_type: completeness
    source: v_biomarker_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-biomarker-R01"

  - name: tst_biomarker_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_biomarker_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-biomarker-R02"
