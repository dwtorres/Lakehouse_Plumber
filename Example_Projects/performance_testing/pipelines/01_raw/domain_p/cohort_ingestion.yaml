pipeline: domain_p_raw
flowgroup: cohort_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: cohort_raw
  landing_folder: cohort
  schema_file: orders_schema
actions:
  - name: tst_cohort_raw_completeness
    type: test
    test_type: completeness
    source: v_cohort_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cohort-R01"

  - name: tst_cohort_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_cohort_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cohort-R02"
