pipeline: domain_p_raw
flowgroup: placebo_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_placebo_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/placebo/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_placebo_cloudfiles
    description: "Load placebo from landing volume"

  - name: write_placebo_raw
    type: write
    source: v_placebo_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "placebo_raw"

  - name: tst_placebo_raw_completeness
    type: test
    test_type: completeness
    source: v_placebo_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-placebo-R01"

  - name: tst_placebo_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_placebo_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-placebo-R02"
