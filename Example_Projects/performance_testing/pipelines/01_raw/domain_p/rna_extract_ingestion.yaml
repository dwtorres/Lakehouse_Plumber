pipeline: domain_p_raw
flowgroup: rna_extract_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: rna_extract_raw
  landing_folder: rna_extract
  schema_file: nation_schema
actions:
  - name: tst_rna_extract_raw_completeness
    type: test
    test_type: completeness
    source: v_rna_extract_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-rna_extract-R01"

  - name: tst_rna_extract_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_rna_extract_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-rna_extract-R02"
