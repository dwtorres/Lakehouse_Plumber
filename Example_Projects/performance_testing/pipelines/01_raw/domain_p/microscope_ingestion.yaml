pipeline: domain_p_raw
flowgroup: microscope_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: microscope_raw
  landing_folder: microscope
  schema_file: lineitem_schema
actions:
  - name: tst_microscope_raw_completeness
    type: test
    test_type: completeness
    source: v_microscope_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-microscope-R01"

  - name: tst_microscope_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_microscope_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-microscope-R02"
