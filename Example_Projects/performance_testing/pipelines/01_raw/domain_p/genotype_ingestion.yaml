pipeline: domain_p_raw
flowgroup: genotype_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: genotype_raw
  landing_folder: genotype
  schema_file: partsupp_schema
actions:
  - name: tst_genotype_raw_completeness
    type: test
    test_type: completeness
    source: v_genotype_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-genotype-R01"

  - name: tst_genotype_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_genotype_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-genotype-R02"
