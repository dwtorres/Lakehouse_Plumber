pipeline: domain_p_raw
flowgroup: mass_spec_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: mass_spec_raw
  landing_folder: mass_spec
  schema_file: lineitem_schema
actions:
  - name: tst_mass_spec_raw_completeness
    type: test
    test_type: completeness
    source: v_mass_spec_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mass_spec-R01"

  - name: tst_mass_spec_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_mass_spec_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mass_spec-R02"
