pipeline: domain_p_raw
flowgroup: experiment_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_experiment_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/experiment/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_experiment_cloudfiles
    description: "Load experiment from landing volume"

  - name: write_experiment_raw
    type: write
    source: v_experiment_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "experiment_raw"

  - name: tst_experiment_raw_completeness
    type: test
    test_type: completeness
    source: v_experiment_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-experiment-R01"

  - name: tst_experiment_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_experiment_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-experiment-R02"
