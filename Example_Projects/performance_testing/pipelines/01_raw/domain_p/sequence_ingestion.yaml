pipeline: domain_p_raw
flowgroup: sequence_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_sequence_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/sequence/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_sequence_cloudfiles
    description: "Load sequence from landing volume"

  - name: write_sequence_raw
    type: write
    source: v_sequence_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "sequence_raw"

  - name: tst_sequence_raw_completeness
    type: test
    test_type: completeness
    source: v_sequence_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-sequence-R01"

  - name: tst_sequence_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_sequence_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-sequence-R02"
