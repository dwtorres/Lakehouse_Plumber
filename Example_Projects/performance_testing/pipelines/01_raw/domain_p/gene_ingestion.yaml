pipeline: domain_p_raw
flowgroup: gene_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: gene_raw
  landing_folder: gene
  schema_file: orders_schema
actions:
  - name: tst_gene_raw_completeness
    type: test
    test_type: completeness
    source: v_gene_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-gene-R01"

  - name: tst_gene_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_gene_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-gene-R02"
