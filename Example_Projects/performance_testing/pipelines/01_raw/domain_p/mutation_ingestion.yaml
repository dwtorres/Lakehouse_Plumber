pipeline: domain_p_raw
flowgroup: mutation_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: mutation_raw
  landing_folder: mutation
  schema_file: part_schema
actions:
  - name: tst_mutation_raw_completeness
    type: test
    test_type: completeness
    source: v_mutation_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mutation-R01"

  - name: tst_mutation_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_mutation_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mutation-R02"
