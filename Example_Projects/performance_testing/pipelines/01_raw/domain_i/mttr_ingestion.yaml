pipeline: domain_i_raw
flowgroup: mttr_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: mttr_raw
  landing_folder: mttr
  schema_file: orders_schema
actions:
  - name: tst_mttr_raw_completeness
    type: test
    test_type: completeness
    source: v_mttr_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mttr-R01"

  - name: tst_mttr_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_mttr_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mttr-R02"
