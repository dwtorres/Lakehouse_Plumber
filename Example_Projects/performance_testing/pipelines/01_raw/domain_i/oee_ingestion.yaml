pipeline: domain_i_raw
flowgroup: oee_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_oee_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/oee/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_oee_cloudfiles
    description: "Load oee from landing volume"

  - name: write_oee_raw
    type: write
    source: v_oee_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "oee_raw"

  - name: tst_oee_raw_completeness
    type: test
    test_type: completeness
    source: v_oee_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-oee-R01"

  - name: tst_oee_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_oee_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-oee-R02"
