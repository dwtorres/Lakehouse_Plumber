pipeline: domain_i_raw
flowgroup: specification_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: specification_raw
  landing_folder: specification
  schema_file: part_schema
actions:
  - name: tst_specification_raw_completeness
    type: test
    test_type: completeness
    source: v_specification_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-specification-R01"

  - name: tst_specification_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_specification_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-specification-R02"
