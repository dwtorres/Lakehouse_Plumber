pipeline: domain_i_raw
flowgroup: capability_study_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: capability_study_raw
  landing_folder: capability_study
  schema_file: product_schema
actions:
  - name: tst_capability_study_raw_completeness
    type: test
    test_type: completeness
    source: v_capability_study_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-capability_study-R01"

  - name: tst_capability_study_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_capability_study_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-capability_study-R02"
