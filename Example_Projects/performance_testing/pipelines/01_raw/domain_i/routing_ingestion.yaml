pipeline: domain_i_raw
flowgroup: routing_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_routing_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/routing/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_routing_cloudfiles
    description: "Load routing from landing volume"

  - name: write_routing_raw
    type: write
    source: v_routing_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "routing_raw"

  - name: tst_routing_raw_completeness
    type: test
    test_type: completeness
    source: v_routing_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-routing-R01"

  - name: tst_routing_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_routing_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-routing-R02"
