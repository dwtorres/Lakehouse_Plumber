pipeline: domain_i_raw
flowgroup: downtime_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_downtime_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/downtime/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_downtime_cloudfiles
    description: "Load downtime from landing volume"

  - name: write_downtime_raw
    type: write
    source: v_downtime_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "downtime_raw"

  - name: tst_downtime_raw_completeness
    type: test
    test_type: completeness
    source: v_downtime_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-downtime-R01"

  - name: tst_downtime_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_downtime_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-downtime-R02"
