pipeline: domain_i_raw
flowgroup: preventive_action_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: preventive_action_raw
  landing_folder: preventive_action
  schema_file: lineitem_schema
actions:
  - name: tst_preventive_action_raw_completeness
    type: test
    test_type: completeness
    source: v_preventive_action_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-preventive_action-R01"

  - name: tst_preventive_action_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_preventive_action_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-preventive_action-R02"
