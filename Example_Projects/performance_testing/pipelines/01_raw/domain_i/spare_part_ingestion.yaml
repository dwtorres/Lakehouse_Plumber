pipeline: domain_i_raw
flowgroup: spare_part_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: spare_part_raw
  landing_folder: spare_part
  schema_file: part_schema
actions:
  - name: tst_spare_part_raw_completeness
    type: test
    test_type: completeness
    source: v_spare_part_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-spare_part-R01"

  - name: tst_spare_part_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_spare_part_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-spare_part-R02"
