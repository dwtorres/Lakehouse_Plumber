pipeline: domain_i_raw
flowgroup: yield_rate_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: yield_rate_raw
  landing_folder: yield_rate
  schema_file: product_schema
actions:
  - name: tst_yield_rate_raw_completeness
    type: test
    test_type: completeness
    source: v_yield_rate_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-yield_rate-R01"

  - name: tst_yield_rate_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_yield_rate_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-yield_rate-R02"
