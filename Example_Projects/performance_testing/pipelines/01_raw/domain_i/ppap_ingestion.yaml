pipeline: domain_i_raw
flowgroup: ppap_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: ppap_raw
  landing_folder: ppap
  schema_file: orders_schema
actions:
  - name: tst_ppap_raw_completeness
    type: test
    test_type: completeness
    source: v_ppap_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-ppap-R01"

  - name: tst_ppap_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_ppap_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-ppap-R02"
