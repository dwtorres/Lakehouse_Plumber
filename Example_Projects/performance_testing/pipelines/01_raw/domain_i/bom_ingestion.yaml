pipeline: domain_i_raw
flowgroup: bom_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: bom_raw
  landing_folder: bom
  schema_file: nation_schema
actions:
  - name: tst_bom_raw_completeness
    type: test
    test_type: completeness
    source: v_bom_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bom-R01"

  - name: tst_bom_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_bom_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bom-R02"
