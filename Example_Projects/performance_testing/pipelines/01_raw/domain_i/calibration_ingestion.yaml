pipeline: domain_i_raw
flowgroup: calibration_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: calibration_raw
  landing_folder: calibration
  schema_file: orders_schema
actions:
  - name: tst_calibration_raw_completeness
    type: test
    test_type: completeness
    source: v_calibration_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-calibration-R01"

  - name: tst_calibration_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_calibration_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-calibration-R02"
