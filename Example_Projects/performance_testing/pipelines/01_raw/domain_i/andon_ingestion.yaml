pipeline: domain_i_raw
flowgroup: andon_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: andon_raw
  landing_folder: andon
  schema_file: part_schema
actions:
  - name: tst_andon_raw_completeness
    type: test
    test_type: completeness
    source: v_andon_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-andon-R01"

  - name: tst_andon_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_andon_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-andon-R02"
