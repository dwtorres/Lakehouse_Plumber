pipeline: domain_i_raw
flowgroup: work_cell_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: work_cell_raw
  landing_folder: work_cell
  schema_file: part_schema
actions:
  - name: tst_work_cell_raw_completeness
    type: test
    test_type: completeness
    source: v_work_cell_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-work_cell-R01"

  - name: tst_work_cell_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_work_cell_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-work_cell-R02"
