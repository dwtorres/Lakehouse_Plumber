pipeline: domain_i_raw
flowgroup: control_plan_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: control_plan_raw
  landing_folder: control_plan
  schema_file: lineitem_schema
actions:
  - name: tst_control_plan_raw_completeness
    type: test
    test_type: completeness
    source: v_control_plan_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-control_plan-R01"

  - name: tst_control_plan_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_control_plan_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-control_plan-R02"
