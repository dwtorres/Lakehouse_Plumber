pipeline: domain_i_raw
flowgroup: changeover_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: changeover_raw
  landing_folder: changeover
  schema_file: partsupp_schema
actions:
  - name: tst_changeover_raw_completeness
    type: test
    test_type: completeness
    source: v_changeover_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-changeover-R01"

  - name: tst_changeover_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_changeover_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-changeover-R02"
