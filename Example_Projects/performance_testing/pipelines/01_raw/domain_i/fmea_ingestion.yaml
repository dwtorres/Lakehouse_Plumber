pipeline: domain_i_raw
flowgroup: fmea_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: fmea_raw
  landing_folder: fmea
  schema_file: nation_schema
actions:
  - name: tst_fmea_raw_completeness
    type: test
    test_type: completeness
    source: v_fmea_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fmea-R01"

  - name: tst_fmea_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_fmea_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fmea-R02"
