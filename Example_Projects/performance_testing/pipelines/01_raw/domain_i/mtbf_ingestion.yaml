pipeline: domain_i_raw
flowgroup: mtbf_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: mtbf_raw
  landing_folder: mtbf
  schema_file: nation_schema
actions:
  - name: tst_mtbf_raw_completeness
    type: test
    test_type: completeness
    source: v_mtbf_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mtbf-R01"

  - name: tst_mtbf_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_mtbf_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-mtbf-R02"
