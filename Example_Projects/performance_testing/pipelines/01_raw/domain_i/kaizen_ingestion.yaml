pipeline: domain_i_raw
flowgroup: kaizen_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_kaizen_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/kaizen/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_kaizen_cloudfiles
    description: "Load kaizen from landing volume"

  - name: write_kaizen_raw
    type: write
    source: v_kaizen_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "kaizen_raw"

  - name: tst_kaizen_raw_completeness
    type: test
    test_type: completeness
    source: v_kaizen_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-kaizen-R01"

  - name: tst_kaizen_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_kaizen_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-kaizen-R02"
