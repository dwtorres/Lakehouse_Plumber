pipeline: domain_i_raw
flowgroup: batch_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: batch_raw
  landing_folder: batch
  schema_file: lineitem_schema
actions:
  - name: tst_batch_raw_completeness
    type: test
    test_type: completeness
    source: v_batch_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-batch-R01"

  - name: tst_batch_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_batch_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-batch-R02"
