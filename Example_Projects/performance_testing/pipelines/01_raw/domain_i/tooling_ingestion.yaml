pipeline: domain_i_raw
flowgroup: tooling_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_tooling_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/tooling/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_tooling_cloudfiles
    description: "Load tooling from landing volume"

  - name: write_tooling_raw
    type: write
    source: v_tooling_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "tooling_raw"

  - name: tst_tooling_raw_completeness
    type: test
    test_type: completeness
    source: v_tooling_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-tooling-R01"

  - name: tst_tooling_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_tooling_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-tooling-R02"
