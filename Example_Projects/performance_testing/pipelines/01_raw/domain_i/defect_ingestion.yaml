pipeline: domain_i_raw
flowgroup: defect_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: defect_raw
  landing_folder: defect
  schema_file: customer_schema
actions:
  - name: tst_defect_raw_completeness
    type: test
    test_type: completeness
    source: v_defect_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-defect-R01"

  - name: tst_defect_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_defect_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-defect-R02"
