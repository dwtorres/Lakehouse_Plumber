pipeline: domain_i_raw
flowgroup: corrective_action_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: corrective_action_raw
  landing_folder: corrective_action
  schema_file: customer_schema
actions:
  - name: tst_corrective_action_raw_completeness
    type: test
    test_type: completeness
    source: v_corrective_action_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-corrective_action-R01"

  - name: tst_corrective_action_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_corrective_action_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-corrective_action-R02"
