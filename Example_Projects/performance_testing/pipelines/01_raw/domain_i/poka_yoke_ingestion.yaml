pipeline: domain_i_raw
flowgroup: poka_yoke_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: poka_yoke_raw
  landing_folder: poka_yoke
  schema_file: partsupp_schema
actions:
  - name: tst_poka_yoke_raw_completeness
    type: test
    test_type: completeness
    source: v_poka_yoke_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-poka_yoke-R01"

  - name: tst_poka_yoke_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_poka_yoke_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-poka_yoke-R02"
