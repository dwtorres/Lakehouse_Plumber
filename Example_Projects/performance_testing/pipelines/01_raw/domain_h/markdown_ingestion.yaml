pipeline: domain_h_raw
flowgroup: markdown_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_markdown_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/markdown/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_markdown_cloudfiles
    description: "Load markdown from landing volume"

  - name: write_markdown_raw
    type: write
    source: v_markdown_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "markdown_raw"

  - name: tst_markdown_raw_completeness
    type: test
    test_type: completeness
    source: v_markdown_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-markdown-R01"

  - name: tst_markdown_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_markdown_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-markdown-R02"
