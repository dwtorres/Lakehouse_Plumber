pipeline: domain_h_raw
use_template: parquet_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: return_item_ingestion
    template_parameters:
      table_name: return_item_raw
      landing_folder: return_item
      schema_file: orders_schema
    actions:
      - name: tst_return_item_raw_completeness
        type: test
        test_type: completeness
        source: v_return_item_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-return_item-R01"
      
      - name: tst_return_item_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_return_item_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-return_item-R02"

