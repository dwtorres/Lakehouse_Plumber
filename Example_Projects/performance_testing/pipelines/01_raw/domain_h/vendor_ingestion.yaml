pipeline: domain_h_raw
flowgroup: vendor_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_vendor_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/vendor/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_vendor_cloudfiles
    description: "Load vendor from landing volume"

  - name: write_vendor_raw
    type: write
    source: v_vendor_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "vendor_raw"

  - name: tst_vendor_raw_completeness
    type: test
    test_type: completeness
    source: v_vendor_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-vendor-R01"

  - name: tst_vendor_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_vendor_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-vendor-R02"
