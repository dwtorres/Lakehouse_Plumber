pipeline: domain_h_raw
use_template: json_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: purchase_ingestion
    template_parameters:
      table_name: purchase_raw
      landing_folder: purchase
      schema_file: nation_schema
    actions:
      - name: tst_purchase_raw_completeness
        type: test
        test_type: completeness
        source: v_purchase_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-purchase-R01"
      
      - name: tst_purchase_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_purchase_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-purchase-R02"

