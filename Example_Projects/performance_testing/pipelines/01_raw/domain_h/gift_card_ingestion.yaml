pipeline: domain_h_raw
flowgroup: gift_card_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_gift_card_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/gift_card/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_gift_card_cloudfiles
    description: "Load gift_card from landing volume"

  - name: write_gift_card_raw
    type: write
    source: v_gift_card_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "gift_card_raw"

  - name: tst_gift_card_raw_completeness
    type: test
    test_type: completeness
    source: v_gift_card_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-gift_card-R01"

  - name: tst_gift_card_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_gift_card_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-gift_card-R02"
