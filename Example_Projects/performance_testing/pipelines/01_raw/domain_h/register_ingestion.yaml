pipeline: domain_h_raw
flowgroup: register_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_register_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/register/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_register_cloudfiles
    description: "Load register from landing volume"

  - name: write_register_raw
    type: write
    source: v_register_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "register_raw"

  - name: tst_register_raw_completeness
    type: test
    test_type: completeness
    source: v_register_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-register-R01"

  - name: tst_register_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_register_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-register-R02"
