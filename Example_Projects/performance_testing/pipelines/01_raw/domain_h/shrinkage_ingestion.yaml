pipeline: domain_h_raw
flowgroup: shrinkage_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_shrinkage_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/shrinkage/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_shrinkage_cloudfiles
    description: "Load shrinkage from landing volume"

  - name: write_shrinkage_raw
    type: write
    source: v_shrinkage_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "shrinkage_raw"

  - name: tst_shrinkage_raw_completeness
    type: test
    test_type: completeness
    source: v_shrinkage_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-shrinkage-R01"

  - name: tst_shrinkage_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_shrinkage_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-shrinkage-R02"
