pipeline: domain_h_raw
use_template: csv_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: loyalty_ingestion
    template_parameters:
      table_name: loyalty_raw
      landing_folder: loyalty
      schema_file: part_schema
    actions:
      - name: tst_loyalty_raw_completeness
        type: test
        test_type: completeness
        source: v_loyalty_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-loyalty-R01"
      
      - name: tst_loyalty_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_loyalty_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-loyalty-R02"

