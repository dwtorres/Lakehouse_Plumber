pipeline: domain_l_raw
flowgroup: prep_station_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_prep_station_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/prep_station/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_prep_station_cloudfiles
    description: "Load prep_station from landing volume"

  - name: write_prep_station_raw
    type: write
    source: v_prep_station_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "prep_station_raw"

  - name: tst_prep_station_raw_completeness
    type: test
    test_type: completeness
    source: v_prep_station_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-prep_station-R01"

  - name: tst_prep_station_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_prep_station_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-prep_station-R02"
