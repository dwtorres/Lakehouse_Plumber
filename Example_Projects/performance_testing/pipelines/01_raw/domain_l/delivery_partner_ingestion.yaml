pipeline: domain_l_raw
flowgroup: delivery_partner_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: delivery_partner_raw
  landing_folder: delivery_partner
  schema_file: partsupp_schema
actions:
  - name: tst_delivery_partner_raw_completeness
    type: test
    test_type: completeness
    source: v_delivery_partner_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-delivery_partner-R01"

  - name: tst_delivery_partner_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_delivery_partner_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-delivery_partner-R02"
