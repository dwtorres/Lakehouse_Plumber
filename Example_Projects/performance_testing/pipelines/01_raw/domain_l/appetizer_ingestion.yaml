pipeline: domain_l_raw
flowgroup: appetizer_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: appetizer_raw
  landing_folder: appetizer
  schema_file: orders_schema
actions:
  - name: tst_appetizer_raw_completeness
    type: test
    test_type: completeness
    source: v_appetizer_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-appetizer-R01"

  - name: tst_appetizer_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_appetizer_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-appetizer-R02"
