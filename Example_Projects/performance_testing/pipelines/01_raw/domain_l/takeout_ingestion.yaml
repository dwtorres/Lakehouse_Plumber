pipeline: domain_l_raw
flowgroup: takeout_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: takeout_raw
  landing_folder: takeout
  schema_file: part_schema
actions:
  - name: tst_takeout_raw_completeness
    type: test
    test_type: completeness
    source: v_takeout_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-takeout-R01"

  - name: tst_takeout_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_takeout_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-takeout-R02"
