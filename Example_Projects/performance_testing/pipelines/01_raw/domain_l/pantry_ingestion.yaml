pipeline: domain_l_raw
flowgroup: pantry_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: pantry_raw
  landing_folder: pantry
  schema_file: customer_schema
actions:
  - name: tst_pantry_raw_completeness
    type: test
    test_type: completeness
    source: v_pantry_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-pantry-R01"

  - name: tst_pantry_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_pantry_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-pantry-R02"
