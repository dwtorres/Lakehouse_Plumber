pipeline: domain_l_raw
flowgroup: special_menu_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: special_menu_raw
  landing_folder: special_menu
  schema_file: partsupp_schema
actions:
  - name: tst_special_menu_raw_completeness
    type: test
    test_type: completeness
    source: v_special_menu_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-special_menu-R01"

  - name: tst_special_menu_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_special_menu_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-special_menu-R02"
