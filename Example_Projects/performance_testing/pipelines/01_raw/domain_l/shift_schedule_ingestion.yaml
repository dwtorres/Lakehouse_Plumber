pipeline: domain_l_raw
flowgroup: shift_schedule_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: shift_schedule_raw
  landing_folder: shift_schedule
  schema_file: product_schema
actions:
  - name: tst_shift_schedule_raw_completeness
    type: test
    test_type: completeness
    source: v_shift_schedule_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-shift_schedule-R01"

  - name: tst_shift_schedule_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_shift_schedule_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-shift_schedule-R02"
