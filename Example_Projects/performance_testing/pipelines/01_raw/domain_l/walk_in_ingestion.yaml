pipeline: domain_l_raw
flowgroup: walk_in_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_walk_in_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/walk_in/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_walk_in_cloudfiles
    description: "Load walk_in from landing volume"

  - name: write_walk_in_raw
    type: write
    source: v_walk_in_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "walk_in_raw"

  - name: tst_walk_in_raw_completeness
    type: test
    test_type: completeness
    source: v_walk_in_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-walk_in-R01"

  - name: tst_walk_in_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_walk_in_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-walk_in-R02"
