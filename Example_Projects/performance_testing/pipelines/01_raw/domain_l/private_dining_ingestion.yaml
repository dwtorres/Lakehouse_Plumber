pipeline: domain_l_raw
flowgroup: private_dining_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: private_dining_raw
  landing_folder: private_dining
  schema_file: part_schema
actions:
  - name: tst_private_dining_raw_completeness
    type: test
    test_type: completeness
    source: v_private_dining_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-private_dining-R01"

  - name: tst_private_dining_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_private_dining_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-private_dining-R02"
