pipeline: domain_l_raw
flowgroup: restaurant_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_restaurant_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/restaurant/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_restaurant_cloudfiles
    description: "Load restaurant from landing volume"

  - name: write_restaurant_raw
    type: write
    source: v_restaurant_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "restaurant_raw"

  - name: tst_restaurant_raw_completeness
    type: test
    test_type: completeness
    source: v_restaurant_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-restaurant-R01"

  - name: tst_restaurant_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_restaurant_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-restaurant-R02"
