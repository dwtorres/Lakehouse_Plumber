pipeline: domain_l_raw
flowgroup: freezer_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: freezer_raw
  landing_folder: freezer
  schema_file: nation_schema
actions:
  - name: tst_freezer_raw_completeness
    type: test
    test_type: completeness
    source: v_freezer_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-freezer-R01"

  - name: tst_freezer_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_freezer_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-freezer-R02"
