pipeline: domain_l_raw
flowgroup: tip_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: tip_raw
  landing_folder: tip
  schema_file: partsupp_schema
actions:
  - name: tst_tip_raw_completeness
    type: test
    test_type: completeness
    source: v_tip_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-tip-R01"

  - name: tst_tip_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_tip_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-tip-R02"
