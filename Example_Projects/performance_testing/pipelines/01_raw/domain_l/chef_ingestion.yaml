pipeline: domain_l_raw
flowgroup: chef_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: chef_raw
  landing_folder: chef
  schema_file: part_schema
actions:
  - name: tst_chef_raw_completeness
    type: test
    test_type: completeness
    source: v_chef_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-chef-R01"

  - name: tst_chef_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_chef_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-chef-R02"
