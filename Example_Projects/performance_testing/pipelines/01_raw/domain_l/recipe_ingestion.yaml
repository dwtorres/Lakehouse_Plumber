pipeline: domain_l_raw
flowgroup: recipe_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: recipe_raw
  landing_folder: recipe
  schema_file: nation_schema
actions:
  - name: tst_recipe_raw_completeness
    type: test
    test_type: completeness
    source: v_recipe_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-recipe-R01"

  - name: tst_recipe_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_recipe_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-recipe-R02"
