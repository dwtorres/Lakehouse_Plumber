pipeline: domain_l_raw
flowgroup: table_seat_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: table_seat_raw
  landing_folder: table_seat
  schema_file: nation_schema
actions:
  - name: tst_table_seat_raw_completeness
    type: test
    test_type: completeness
    source: v_table_seat_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-table_seat-R01"

  - name: tst_table_seat_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_table_seat_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-table_seat-R02"
