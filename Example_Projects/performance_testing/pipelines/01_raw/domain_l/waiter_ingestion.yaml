pipeline: domain_l_raw
flowgroup: waiter_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_waiter_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/waiter/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_waiter_cloudfiles
    description: "Load waiter from landing volume"

  - name: write_waiter_raw
    type: write
    source: v_waiter_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "waiter_raw"

  - name: tst_waiter_raw_completeness
    type: test
    test_type: completeness
    source: v_waiter_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-waiter-R01"

  - name: tst_waiter_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_waiter_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-waiter-R02"
