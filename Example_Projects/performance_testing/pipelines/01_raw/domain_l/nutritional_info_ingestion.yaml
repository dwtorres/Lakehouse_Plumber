pipeline: domain_l_raw
flowgroup: nutritional_info_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: nutritional_info_raw
  landing_folder: nutritional_info
  schema_file: lineitem_schema
actions:
  - name: tst_nutritional_info_raw_completeness
    type: test
    test_type: completeness
    source: v_nutritional_info_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-nutritional_info-R01"

  - name: tst_nutritional_info_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_nutritional_info_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-nutritional_info-R02"
