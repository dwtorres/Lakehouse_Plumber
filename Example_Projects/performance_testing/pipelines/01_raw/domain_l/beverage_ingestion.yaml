pipeline: domain_l_raw
flowgroup: beverage_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_beverage_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/beverage/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_beverage_cloudfiles
    description: "Load beverage from landing volume"

  - name: write_beverage_raw
    type: write
    source: v_beverage_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "beverage_raw"

  - name: tst_beverage_raw_completeness
    type: test
    test_type: completeness
    source: v_beverage_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-beverage-R01"

  - name: tst_beverage_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_beverage_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-beverage-R02"
