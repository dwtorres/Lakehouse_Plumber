pipeline: domain_l_raw
flowgroup: allergen_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: allergen_raw
  landing_folder: allergen
  schema_file: customer_schema
actions:
  - name: tst_allergen_raw_completeness
    type: test
    test_type: completeness
    source: v_allergen_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-allergen-R01"

  - name: tst_allergen_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_allergen_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-allergen-R02"
