pipeline: domain_l_raw
flowgroup: patio_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: patio_raw
  landing_folder: patio
  schema_file: orders_schema
actions:
  - name: tst_patio_raw_completeness
    type: test
    test_type: completeness
    source: v_patio_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-patio-R01"

  - name: tst_patio_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_patio_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-patio-R02"
