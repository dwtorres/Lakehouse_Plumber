pipeline: domain_l_raw
flowgroup: supplier_contract_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_supplier_contract_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/supplier_contract/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_supplier_contract_cloudfiles
    description: "Load supplier_contract from landing volume"

  - name: write_supplier_contract_raw
    type: write
    source: v_supplier_contract_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "supplier_contract_raw"

  - name: tst_supplier_contract_raw_completeness
    type: test
    test_type: completeness
    source: v_supplier_contract_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-supplier_contract-R01"

  - name: tst_supplier_contract_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_supplier_contract_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-supplier_contract-R02"
