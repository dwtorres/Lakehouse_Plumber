pipeline: domain_l_raw
flowgroup: waste_log_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: waste_log_raw
  landing_folder: waste_log
  schema_file: product_schema
actions:
  - name: tst_waste_log_raw_completeness
    type: test
    test_type: completeness
    source: v_waste_log_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-waste_log-R01"

  - name: tst_waste_log_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_waste_log_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-waste_log-R02"
