pipeline: domain_l_raw
flowgroup: dry_storage_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: dry_storage_raw
  landing_folder: dry_storage
  schema_file: orders_schema
actions:
  - name: tst_dry_storage_raw_completeness
    type: test
    test_type: completeness
    source: v_dry_storage_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-dry_storage-R01"

  - name: tst_dry_storage_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_dry_storage_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-dry_storage-R02"
