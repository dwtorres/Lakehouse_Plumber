pipeline: domain_l_raw
flowgroup: cooler_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: cooler_raw
  landing_folder: cooler
  schema_file: lineitem_schema
actions:
  - name: tst_cooler_raw_completeness
    type: test
    test_type: completeness
    source: v_cooler_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cooler-R01"

  - name: tst_cooler_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_cooler_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cooler-R02"
