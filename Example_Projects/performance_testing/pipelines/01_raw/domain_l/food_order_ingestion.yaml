pipeline: domain_l_raw
flowgroup: food_order_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: food_order_raw
  landing_folder: food_order
  schema_file: customer_schema
actions:
  - name: tst_food_order_raw_completeness
    type: test
    test_type: completeness
    source: v_food_order_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-food_order-R01"

  - name: tst_food_order_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_food_order_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-food_order-R02"
