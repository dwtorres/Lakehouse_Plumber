pipeline: domain_l_raw
flowgroup: ingredient_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: ingredient_raw
  landing_folder: ingredient
  schema_file: lineitem_schema
actions:
  - name: tst_ingredient_raw_completeness
    type: test
    test_type: completeness
    source: v_ingredient_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-ingredient-R01"

  - name: tst_ingredient_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_ingredient_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-ingredient-R02"
