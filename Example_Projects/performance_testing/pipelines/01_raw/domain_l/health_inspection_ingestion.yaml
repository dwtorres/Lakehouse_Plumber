pipeline: domain_l_raw
flowgroup: health_inspection_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_health_inspection_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/health_inspection/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_health_inspection_cloudfiles
    description: "Load health_inspection from landing volume"

  - name: write_health_inspection_raw
    type: write
    source: v_health_inspection_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "health_inspection_raw"

  - name: tst_health_inspection_raw_completeness
    type: test
    test_type: completeness
    source: v_health_inspection_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-health_inspection-R01"

  - name: tst_health_inspection_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_health_inspection_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-health_inspection-R02"
