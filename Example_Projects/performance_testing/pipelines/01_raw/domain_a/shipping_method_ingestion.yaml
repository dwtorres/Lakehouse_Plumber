pipeline: domain_a_raw
flowgroup: shipping_method_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_shipping_method_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/shipping_method/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_shipping_method_cloudfiles
    description: "Load shipping_method from landing volume"

  - name: write_shipping_method_raw
    type: write
    source: v_shipping_method_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "shipping_method_raw"

  - name: tst_shipping_method_raw_completeness
    type: test
    test_type: completeness
    source: v_shipping_method_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-shipping_method-R01"

  - name: tst_shipping_method_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_shipping_method_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-shipping_method-R02"
