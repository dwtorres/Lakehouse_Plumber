pipeline: domain_a_raw
flowgroup: backorder_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_backorder_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/backorder/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_backorder_cloudfiles
    description: "Load backorder from landing volume"

  - name: write_backorder_raw
    type: write
    source: v_backorder_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "backorder_raw"

  - name: tst_backorder_raw_completeness
    type: test
    test_type: completeness
    source: v_backorder_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-backorder-R01"

  - name: tst_backorder_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_backorder_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-backorder-R02"
