pipeline: domain_a_raw
flowgroup: customer_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_customer_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/customer/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_customer_cloudfiles
    description: "Load customer from landing volume"

  - name: write_customer_raw
    type: write
    source: v_customer_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "customer_raw"

  - name: tst_customer_raw_completeness
    type: test
    test_type: completeness
    source: v_customer_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-customer-R01"

  - name: tst_customer_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_customer_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-customer-R02"
