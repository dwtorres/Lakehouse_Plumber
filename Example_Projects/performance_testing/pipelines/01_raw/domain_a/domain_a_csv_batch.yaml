pipeline: domain_a_raw
use_template: csv_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: shipment_ingestion
    template_parameters:
      table_name: shipment_raw
      landing_folder: shipment
      schema_file: part_schema
    actions:
      - name: tst_shipment_raw_completeness
        type: test
        test_type: completeness
        source: v_shipment_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-shipment-R01"
      
      - name: tst_shipment_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_shipment_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-shipment-R02"

