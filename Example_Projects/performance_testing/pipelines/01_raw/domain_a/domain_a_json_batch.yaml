pipeline: domain_a_raw
use_template: json_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: product_ingestion
    template_parameters:
      table_name: product_raw
      landing_folder: product
      schema_file: nation_schema
    actions:
      - name: tst_product_raw_completeness
        type: test
        test_type: completeness
        source: v_product_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-product-R01"
      
      - name: tst_product_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_product_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-product-R02"

