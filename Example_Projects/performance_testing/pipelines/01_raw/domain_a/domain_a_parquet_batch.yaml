pipeline: domain_a_raw
use_template: parquet_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: supplier_ingestion
    template_parameters:
      table_name: supplier_raw
      landing_folder: supplier
      schema_file: orders_schema
    actions:
      - name: tst_supplier_raw_completeness
        type: test
        test_type: completeness
        source: v_supplier_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-supplier-R01"
      
      - name: tst_supplier_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_supplier_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-supplier-R02"

