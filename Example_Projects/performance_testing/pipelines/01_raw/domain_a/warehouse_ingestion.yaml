pipeline: domain_a_raw
flowgroup: warehouse_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_warehouse_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/warehouse/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_warehouse_cloudfiles
    description: "Load warehouse from landing volume"

  - name: write_warehouse_raw
    type: write
    source: v_warehouse_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "warehouse_raw"

  - name: tst_warehouse_raw_completeness
    type: test
    test_type: completeness
    source: v_warehouse_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-warehouse-R01"

  - name: tst_warehouse_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_warehouse_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-warehouse-R02"
