pipeline: domain_a_raw
flowgroup: order_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_order_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/order/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_order_cloudfiles
    description: "Load order from landing volume"

  - name: write_order_raw
    type: write
    source: v_order_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "order_raw"

  - name: tst_order_raw_completeness
    type: test
    test_type: completeness
    source: v_order_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-order-R01"

  - name: tst_order_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_order_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-order-R02"
