pipeline: domain_n_raw
flowgroup: exclusion_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: exclusion_raw
  landing_folder: exclusion
  schema_file: nation_schema
actions:
  - name: tst_exclusion_raw_completeness
    type: test
    test_type: completeness
    source: v_exclusion_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-exclusion-R01"

  - name: tst_exclusion_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_exclusion_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-exclusion-R02"
