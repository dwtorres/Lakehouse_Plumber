pipeline: domain_n_raw
flowgroup: settlement_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: settlement_raw
  landing_folder: settlement
  schema_file: part_schema
actions:
  - name: tst_settlement_raw_completeness
    type: test
    test_type: completeness
    source: v_settlement_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-settlement-R01"

  - name: tst_settlement_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_settlement_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-settlement-R02"
