pipeline: domain_n_raw
flowgroup: fraud_flag_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: fraud_flag_raw
  landing_folder: fraud_flag
  schema_file: customer_schema
actions:
  - name: tst_fraud_flag_raw_completeness
    type: test
    test_type: completeness
    source: v_fraud_flag_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fraud_flag-R01"

  - name: tst_fraud_flag_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_fraud_flag_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fraud_flag-R02"
