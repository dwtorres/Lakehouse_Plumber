pipeline: domain_n_raw
flowgroup: agent_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_agent_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/agent/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_agent_cloudfiles
    description: "Load agent from landing volume"

  - name: write_agent_raw
    type: write
    source: v_agent_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "agent_raw"

  - name: tst_agent_raw_completeness
    type: test
    test_type: completeness
    source: v_agent_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-agent-R01"

  - name: tst_agent_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_agent_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-agent-R02"
