pipeline: domain_n_raw
flowgroup: occurrence_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: occurrence_raw
  landing_folder: occurrence
  schema_file: partsupp_schema
actions:
  - name: tst_occurrence_raw_completeness
    type: test
    test_type: completeness
    source: v_occurrence_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-occurrence-R01"

  - name: tst_occurrence_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_occurrence_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-occurrence-R02"
