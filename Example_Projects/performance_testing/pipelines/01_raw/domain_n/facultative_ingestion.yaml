pipeline: domain_n_raw
flowgroup: facultative_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_facultative_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/facultative/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_facultative_cloudfiles
    description: "Load facultative from landing volume"

  - name: write_facultative_raw
    type: write
    source: v_facultative_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "facultative_raw"

  - name: tst_facultative_raw_completeness
    type: test
    test_type: completeness
    source: v_facultative_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-facultative-R01"

  - name: tst_facultative_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_facultative_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-facultative-R02"
