pipeline: domain_n_raw
flowgroup: aggregate_limit_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: aggregate_limit_raw
  landing_folder: aggregate_limit
  schema_file: part_schema
actions:
  - name: tst_aggregate_limit_raw_completeness
    type: test
    test_type: completeness
    source: v_aggregate_limit_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-aggregate_limit-R01"

  - name: tst_aggregate_limit_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_aggregate_limit_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-aggregate_limit-R02"
