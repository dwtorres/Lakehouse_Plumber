pipeline: domain_n_raw
flowgroup: inspection_report_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: inspection_report_raw
  landing_folder: inspection_report
  schema_file: product_schema
actions:
  - name: tst_inspection_report_raw_completeness
    type: test
    test_type: completeness
    source: v_inspection_report_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-inspection_report-R01"

  - name: tst_inspection_report_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_inspection_report_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-inspection_report-R02"
