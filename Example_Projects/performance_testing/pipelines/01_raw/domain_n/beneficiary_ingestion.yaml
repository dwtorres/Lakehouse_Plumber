pipeline: domain_n_raw
flowgroup: beneficiary_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: beneficiary_raw
  landing_folder: beneficiary
  schema_file: nation_schema
actions:
  - name: tst_beneficiary_raw_completeness
    type: test
    test_type: completeness
    source: v_beneficiary_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-beneficiary-R01"

  - name: tst_beneficiary_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_beneficiary_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-beneficiary-R02"
