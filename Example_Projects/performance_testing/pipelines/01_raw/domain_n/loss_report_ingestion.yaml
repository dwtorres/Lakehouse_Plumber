pipeline: domain_n_raw
flowgroup: loss_report_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: loss_report_raw
  landing_folder: loss_report
  schema_file: partsupp_schema
actions:
  - name: tst_loss_report_raw_completeness
    type: test
    test_type: completeness
    source: v_loss_report_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-loss_report-R01"

  - name: tst_loss_report_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_loss_report_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-loss_report-R02"
