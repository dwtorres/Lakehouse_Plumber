pipeline: domain_n_raw
flowgroup: commission_payout_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: commission_payout_raw
  landing_folder: commission_payout
  schema_file: nation_schema
actions:
  - name: tst_commission_payout_raw_completeness
    type: test
    test_type: completeness
    source: v_commission_payout_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-commission_payout-R01"

  - name: tst_commission_payout_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_commission_payout_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-commission_payout-R02"
