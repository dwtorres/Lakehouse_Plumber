pipeline: domain_n_raw
flowgroup: policy_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_policy_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/policy/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_policy_cloudfiles
    description: "Load policy from landing volume"

  - name: write_policy_raw
    type: write
    source: v_policy_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "policy_raw"

  - name: tst_policy_raw_completeness
    type: test
    test_type: completeness
    source: v_policy_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-policy-R01"

  - name: tst_policy_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_policy_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-policy-R02"
