pipeline: domain_n_raw
flowgroup: renewal_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_renewal_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/renewal/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_renewal_cloudfiles
    description: "Load renewal from landing volume"

  - name: write_renewal_raw
    type: write
    source: v_renewal_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "renewal_raw"

  - name: tst_renewal_raw_completeness
    type: test
    test_type: completeness
    source: v_renewal_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-renewal-R01"

  - name: tst_renewal_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_renewal_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-renewal-R02"
