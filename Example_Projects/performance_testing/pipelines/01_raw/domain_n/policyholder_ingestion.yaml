pipeline: domain_n_raw
flowgroup: policyholder_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_policyholder_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/policyholder/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_policyholder_cloudfiles
    description: "Load policyholder from landing volume"

  - name: write_policyholder_raw
    type: write
    source: v_policyholder_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "policyholder_raw"

  - name: tst_policyholder_raw_completeness
    type: test
    test_type: completeness
    source: v_policyholder_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-policyholder-R01"

  - name: tst_policyholder_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_policyholder_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-policyholder-R02"
