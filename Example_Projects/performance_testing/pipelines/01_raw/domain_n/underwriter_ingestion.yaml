pipeline: domain_n_raw
flowgroup: underwriter_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: underwriter_raw
  landing_folder: underwriter
  schema_file: part_schema
actions:
  - name: tst_underwriter_raw_completeness
    type: test
    test_type: completeness
    source: v_underwriter_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-underwriter-R01"

  - name: tst_underwriter_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_underwriter_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-underwriter-R02"
