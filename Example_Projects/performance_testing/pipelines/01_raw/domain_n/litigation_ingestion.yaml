pipeline: domain_n_raw
flowgroup: litigation_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: litigation_raw
  landing_folder: litigation
  schema_file: partsupp_schema
actions:
  - name: tst_litigation_raw_completeness
    type: test
    test_type: completeness
    source: v_litigation_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-litigation-R01"

  - name: tst_litigation_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_litigation_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-litigation-R02"
