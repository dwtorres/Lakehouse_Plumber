pipeline: domain_n_raw
flowgroup: deductible_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: deductible_raw
  landing_folder: deductible
  schema_file: customer_schema
actions:
  - name: tst_deductible_raw_completeness
    type: test
    test_type: completeness
    source: v_deductible_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-deductible-R01"

  - name: tst_deductible_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_deductible_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-deductible-R02"
