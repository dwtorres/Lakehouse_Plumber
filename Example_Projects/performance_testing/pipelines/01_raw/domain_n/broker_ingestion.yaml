pipeline: domain_n_raw
flowgroup: broker_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: broker_raw
  landing_folder: broker
  schema_file: lineitem_schema
actions:
  - name: tst_broker_raw_completeness
    type: test
    test_type: completeness
    source: v_broker_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-broker-R01"

  - name: tst_broker_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_broker_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-broker-R02"
