pipeline: domain_n_raw
flowgroup: investigation_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: investigation_raw
  landing_folder: investigation
  schema_file: lineitem_schema
actions:
  - name: tst_investigation_raw_completeness
    type: test
    test_type: completeness
    source: v_investigation_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-investigation-R01"

  - name: tst_investigation_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_investigation_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-investigation-R02"
