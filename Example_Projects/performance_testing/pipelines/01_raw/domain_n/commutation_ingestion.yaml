pipeline: domain_n_raw
flowgroup: commutation_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: commutation_raw
  landing_folder: commutation
  schema_file: orders_schema
actions:
  - name: tst_commutation_raw_completeness
    type: test
    test_type: completeness
    source: v_commutation_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-commutation-R01"

  - name: tst_commutation_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_commutation_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-commutation-R02"
