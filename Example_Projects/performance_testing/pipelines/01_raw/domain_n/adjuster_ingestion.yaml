pipeline: domain_n_raw
flowgroup: adjuster_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: adjuster_raw
  landing_folder: adjuster
  schema_file: orders_schema
actions:
  - name: tst_adjuster_raw_completeness
    type: test
    test_type: completeness
    source: v_adjuster_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-adjuster-R01"

  - name: tst_adjuster_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_adjuster_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-adjuster-R02"
