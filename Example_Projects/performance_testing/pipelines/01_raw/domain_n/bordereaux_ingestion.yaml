pipeline: domain_n_raw
flowgroup: bordereaux_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: bordereaux_raw
  landing_folder: bordereaux
  schema_file: nation_schema
actions:
  - name: tst_bordereaux_raw_completeness
    type: test
    test_type: completeness
    source: v_bordereaux_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bordereaux-R01"

  - name: tst_bordereaux_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_bordereaux_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-bordereaux-R02"
