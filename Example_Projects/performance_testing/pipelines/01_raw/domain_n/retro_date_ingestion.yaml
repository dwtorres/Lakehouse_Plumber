pipeline: domain_n_raw
flowgroup: retro_date_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: retro_date_raw
  landing_folder: retro_date
  schema_file: product_schema
actions:
  - name: tst_retro_date_raw_completeness
    type: test
    test_type: completeness
    source: v_retro_date_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-retro_date-R01"

  - name: tst_retro_date_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_retro_date_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-retro_date-R02"
