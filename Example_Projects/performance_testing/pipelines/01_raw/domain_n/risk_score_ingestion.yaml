pipeline: domain_n_raw
flowgroup: risk_score_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_risk_score_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/risk_score/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_risk_score_cloudfiles
    description: "Load risk_score from landing volume"

  - name: write_risk_score_raw
    type: write
    source: v_risk_score_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "risk_score_raw"

  - name: tst_risk_score_raw_completeness
    type: test
    test_type: completeness
    source: v_risk_score_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-risk_score-R01"

  - name: tst_risk_score_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_risk_score_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-risk_score-R02"
