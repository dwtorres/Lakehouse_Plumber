pipeline: domain_n_raw
flowgroup: reserve_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: reserve_raw
  landing_folder: reserve
  schema_file: orders_schema
actions:
  - name: tst_reserve_raw_completeness
    type: test
    test_type: completeness
    source: v_reserve_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-reserve-R01"

  - name: tst_reserve_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_reserve_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-reserve-R02"
