pipeline: domain_n_raw
flowgroup: premium_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_premium_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/premium/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_premium_cloudfiles
    description: "Load premium from landing volume"

  - name: write_premium_raw
    type: write
    source: v_premium_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "premium_raw"

  - name: tst_premium_raw_completeness
    type: test
    test_type: completeness
    source: v_premium_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-premium-R01"

  - name: tst_premium_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_premium_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-premium-R02"
