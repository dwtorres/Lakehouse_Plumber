pipeline: domain_k_raw
flowgroup: control_tower_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: control_tower_raw
  landing_folder: control_tower
  schema_file: lineitem_schema
actions:
  - name: tst_control_tower_raw_completeness
    type: test
    test_type: completeness
    source: v_control_tower_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-control_tower-R01"

  - name: tst_control_tower_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_control_tower_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-control_tower-R02"
