pipeline: domain_k_raw
flowgroup: standby_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: standby_raw
  landing_folder: standby
  schema_file: part_schema
actions:
  - name: tst_standby_raw_completeness
    type: test
    test_type: completeness
    source: v_standby_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-standby-R01"

  - name: tst_standby_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_standby_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-standby-R02"
