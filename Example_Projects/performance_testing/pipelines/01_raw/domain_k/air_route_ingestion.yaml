pipeline: domain_k_raw
flowgroup: air_route_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: air_route_raw
  landing_folder: air_route
  schema_file: partsupp_schema
actions:
  - name: tst_air_route_raw_completeness
    type: test
    test_type: completeness
    source: v_air_route_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-air_route-R01"

  - name: tst_air_route_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_air_route_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-air_route-R02"
