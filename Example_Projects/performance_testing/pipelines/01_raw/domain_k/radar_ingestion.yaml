pipeline: domain_k_raw
flowgroup: radar_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: radar_raw
  landing_folder: radar
  schema_file: nation_schema
actions:
  - name: tst_radar_raw_completeness
    type: test
    test_type: completeness
    source: v_radar_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-radar-R01"

  - name: tst_radar_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_radar_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-radar-R02"
