pipeline: domain_k_raw
flowgroup: flight_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_flight_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/flight/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_flight_cloudfiles
    description: "Load flight from landing volume"

  - name: write_flight_raw
    type: write
    source: v_flight_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "flight_raw"

  - name: tst_flight_raw_completeness
    type: test
    test_type: completeness
    source: v_flight_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-flight-R01"

  - name: tst_flight_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_flight_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-flight-R02"
