pipeline: domain_k_raw
flowgroup: customs_check_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: customs_check_raw
  landing_folder: customs_check
  schema_file: part_schema
actions:
  - name: tst_customs_check_raw_completeness
    type: test
    test_type: completeness
    source: v_customs_check_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-customs_check-R01"

  - name: tst_customs_check_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_customs_check_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-customs_check-R02"
