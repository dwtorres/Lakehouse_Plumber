pipeline: domain_k_raw
flowgroup: upgrade_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: upgrade_raw
  landing_folder: upgrade
  schema_file: orders_schema
actions:
  - name: tst_upgrade_raw_completeness
    type: test
    test_type: completeness
    source: v_upgrade_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-upgrade-R01"

  - name: tst_upgrade_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_upgrade_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-upgrade-R02"
