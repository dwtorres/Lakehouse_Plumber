pipeline: domain_k_raw
flowgroup: fuel_tank_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: fuel_tank_raw
  landing_folder: fuel_tank
  schema_file: orders_schema
actions:
  - name: tst_fuel_tank_raw_completeness
    type: test
    test_type: completeness
    source: v_fuel_tank_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fuel_tank-R01"

  - name: tst_fuel_tank_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_fuel_tank_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fuel_tank-R02"
