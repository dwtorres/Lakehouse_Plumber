pipeline: domain_k_raw
flowgroup: cockpit_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: cockpit_raw
  landing_folder: cockpit
  schema_file: nation_schema
actions:
  - name: tst_cockpit_raw_completeness
    type: test
    test_type: completeness
    source: v_cockpit_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cockpit-R01"

  - name: tst_cockpit_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_cockpit_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cockpit-R02"
