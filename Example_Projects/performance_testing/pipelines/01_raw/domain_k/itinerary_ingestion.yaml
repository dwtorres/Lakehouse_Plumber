pipeline: domain_k_raw
flowgroup: itinerary_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: itinerary_raw
  landing_folder: itinerary
  schema_file: partsupp_schema
actions:
  - name: tst_itinerary_raw_completeness
    type: test
    test_type: completeness
    source: v_itinerary_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-itinerary-R01"

  - name: tst_itinerary_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_itinerary_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-itinerary-R02"
