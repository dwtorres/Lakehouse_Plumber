pipeline: domain_k_raw
flowgroup: airspace_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_airspace_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/airspace/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_airspace_cloudfiles
    description: "Load airspace from landing volume"

  - name: write_airspace_raw
    type: write
    source: v_airspace_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "airspace_raw"

  - name: tst_airspace_raw_completeness
    type: test
    test_type: completeness
    source: v_airspace_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-airspace-R01"

  - name: tst_airspace_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_airspace_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-airspace-R02"
