pipeline: domain_k_raw
flowgroup: slot_time_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_slot_time_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/slot_time/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_slot_time_cloudfiles
    description: "Load slot_time from landing volume"

  - name: write_slot_time_raw
    type: write
    source: v_slot_time_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "slot_time_raw"

  - name: tst_slot_time_raw_completeness
    type: test
    test_type: completeness
    source: v_slot_time_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-slot_time-R01"

  - name: tst_slot_time_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_slot_time_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-slot_time-R02"
