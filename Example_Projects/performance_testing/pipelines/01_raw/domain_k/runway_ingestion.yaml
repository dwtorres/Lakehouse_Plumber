pipeline: domain_k_raw
flowgroup: runway_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: runway_raw
  landing_folder: runway
  schema_file: part_schema
actions:
  - name: tst_runway_raw_completeness
    type: test
    test_type: completeness
    source: v_runway_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-runway-R01"

  - name: tst_runway_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_runway_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-runway-R02"
