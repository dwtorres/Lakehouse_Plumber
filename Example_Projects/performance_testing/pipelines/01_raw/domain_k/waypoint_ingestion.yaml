pipeline: domain_k_raw
flowgroup: waypoint_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: waypoint_raw
  landing_folder: waypoint
  schema_file: orders_schema
actions:
  - name: tst_waypoint_raw_completeness
    type: test
    test_type: completeness
    source: v_waypoint_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-waypoint-R01"

  - name: tst_waypoint_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_waypoint_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-waypoint-R02"
