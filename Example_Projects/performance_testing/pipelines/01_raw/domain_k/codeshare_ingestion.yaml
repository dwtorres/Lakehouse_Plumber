pipeline: domain_k_raw
flowgroup: codeshare_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_codeshare_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/codeshare/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_codeshare_cloudfiles
    description: "Load codeshare from landing volume"

  - name: write_codeshare_raw
    type: write
    source: v_codeshare_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "codeshare_raw"

  - name: tst_codeshare_raw_completeness
    type: test
    test_type: completeness
    source: v_codeshare_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-codeshare-R01"

  - name: tst_codeshare_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_codeshare_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-codeshare-R02"
