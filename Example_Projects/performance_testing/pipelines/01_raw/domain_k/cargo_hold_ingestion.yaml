pipeline: domain_k_raw
flowgroup: cargo_hold_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: cargo_hold_raw
  landing_folder: cargo_hold
  schema_file: lineitem_schema
actions:
  - name: tst_cargo_hold_raw_completeness
    type: test
    test_type: completeness
    source: v_cargo_hold_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cargo_hold-R01"

  - name: tst_cargo_hold_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_cargo_hold_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cargo_hold-R02"
