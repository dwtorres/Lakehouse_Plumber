pipeline: domain_k_raw
flowgroup: hangar_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: hangar_raw
  landing_folder: hangar
  schema_file: part_schema
actions:
  - name: tst_hangar_raw_completeness
    type: test
    test_type: completeness
    source: v_hangar_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-hangar-R01"

  - name: tst_hangar_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_hangar_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-hangar-R02"
