pipeline: domain_k_raw
flowgroup: ground_handling_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: ground_handling_raw
  landing_folder: ground_handling
  schema_file: product_schema
actions:
  - name: tst_ground_handling_raw_completeness
    type: test
    test_type: completeness
    source: v_ground_handling_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-ground_handling-R01"

  - name: tst_ground_handling_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_ground_handling_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-ground_handling-R02"
