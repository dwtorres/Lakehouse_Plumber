pipeline: domain_k_raw
flowgroup: visa_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: visa_raw
  landing_folder: visa
  schema_file: partsupp_schema
actions:
  - name: tst_visa_raw_completeness
    type: test
    test_type: completeness
    source: v_visa_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-visa-R01"

  - name: tst_visa_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_visa_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-visa-R02"
