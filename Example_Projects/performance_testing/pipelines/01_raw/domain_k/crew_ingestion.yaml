pipeline: domain_k_raw
flowgroup: crew_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: crew_raw
  landing_folder: crew
  schema_file: lineitem_schema
actions:
  - name: tst_crew_raw_completeness
    type: test
    test_type: completeness
    source: v_crew_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-crew-R01"

  - name: tst_crew_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_crew_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-crew-R02"
