pipeline: domain_k_raw
flowgroup: lounge_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: lounge_raw
  landing_folder: lounge
  schema_file: product_schema
actions:
  - name: tst_lounge_raw_completeness
    type: test
    test_type: completeness
    source: v_lounge_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-lounge-R01"

  - name: tst_lounge_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_lounge_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-lounge-R02"
