pipeline: domain_d_raw
use_template: json_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: appointment_ingestion
    template_parameters:
      table_name: appointment_raw
      landing_folder: appointment
      schema_file: nation_schema
    actions:
      - name: tst_appointment_raw_completeness
        type: test
        test_type: completeness
        source: v_appointment_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-appointment-R01"
      
      - name: tst_appointment_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_appointment_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-appointment-R02"

