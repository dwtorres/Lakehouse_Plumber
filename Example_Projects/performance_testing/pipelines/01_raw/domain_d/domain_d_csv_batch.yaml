pipeline: domain_d_raw
use_template: csv_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: diagnosis_ingestion
    template_parameters:
      table_name: diagnosis_raw
      landing_folder: diagnosis
      schema_file: part_schema
    actions:
      - name: tst_diagnosis_raw_completeness
        type: test
        test_type: completeness
        source: v_diagnosis_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-diagnosis-R01"
      
      - name: tst_diagnosis_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_diagnosis_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-diagnosis-R02"

