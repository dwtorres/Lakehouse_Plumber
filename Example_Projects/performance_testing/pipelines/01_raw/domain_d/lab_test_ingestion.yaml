pipeline: domain_d_raw
flowgroup: lab_test_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_lab_test_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/lab_test/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_lab_test_cloudfiles
    description: "Load lab_test from landing volume"

  - name: write_lab_test_raw
    type: write
    source: v_lab_test_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "lab_test_raw"

  - name: tst_lab_test_raw_completeness
    type: test
    test_type: completeness
    source: v_lab_test_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-lab_test-R01"

  - name: tst_lab_test_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_lab_test_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-lab_test-R02"
