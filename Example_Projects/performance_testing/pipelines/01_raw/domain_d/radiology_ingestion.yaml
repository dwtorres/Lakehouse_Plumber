pipeline: domain_d_raw
flowgroup: radiology_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_radiology_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/radiology/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_radiology_cloudfiles
    description: "Load radiology from landing volume"

  - name: write_radiology_raw
    type: write
    source: v_radiology_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "radiology_raw"

  - name: tst_radiology_raw_completeness
    type: test
    test_type: completeness
    source: v_radiology_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-radiology-R01"

  - name: tst_radiology_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_radiology_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-radiology-R02"
