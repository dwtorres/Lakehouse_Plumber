pipeline: domain_d_raw
use_template: parquet_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: prescription_ingestion
    template_parameters:
      table_name: prescription_raw
      landing_folder: prescription
      schema_file: orders_schema
    actions:
      - name: tst_prescription_raw_completeness
        type: test
        test_type: completeness
        source: v_prescription_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-prescription-R01"
      
      - name: tst_prescription_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_prescription_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-prescription-R02"

