pipeline: domain_d_raw
flowgroup: discharge_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_discharge_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/discharge/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_discharge_cloudfiles
    description: "Load discharge from landing volume"

  - name: write_discharge_raw
    type: write
    source: v_discharge_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "discharge_raw"

  - name: tst_discharge_raw_completeness
    type: test
    test_type: completeness
    source: v_discharge_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-discharge-R01"

  - name: tst_discharge_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_discharge_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-discharge-R02"
