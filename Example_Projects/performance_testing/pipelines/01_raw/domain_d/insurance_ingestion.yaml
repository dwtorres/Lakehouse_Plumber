pipeline: domain_d_raw
flowgroup: insurance_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_insurance_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/insurance/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_insurance_cloudfiles
    description: "Load insurance from landing volume"

  - name: write_insurance_raw
    type: write
    source: v_insurance_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "insurance_raw"

  - name: tst_insurance_raw_completeness
    type: test
    test_type: completeness
    source: v_insurance_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-insurance-R01"

  - name: tst_insurance_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_insurance_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-insurance-R02"
