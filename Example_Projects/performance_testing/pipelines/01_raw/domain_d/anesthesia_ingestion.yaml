pipeline: domain_d_raw
flowgroup: anesthesia_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_anesthesia_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/anesthesia/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_anesthesia_cloudfiles
    description: "Load anesthesia from landing volume"

  - name: write_anesthesia_raw
    type: write
    source: v_anesthesia_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "anesthesia_raw"

  - name: tst_anesthesia_raw_completeness
    type: test
    test_type: completeness
    source: v_anesthesia_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-anesthesia-R01"

  - name: tst_anesthesia_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_anesthesia_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-anesthesia-R02"
