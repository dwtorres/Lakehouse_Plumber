pipeline: domain_d_raw
flowgroup: nursing_note_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_nursing_note_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/nursing_note/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_nursing_note_cloudfiles
    description: "Load nursing_note from landing volume"

  - name: write_nursing_note_raw
    type: write
    source: v_nursing_note_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "nursing_note_raw"

  - name: tst_nursing_note_raw_completeness
    type: test
    test_type: completeness
    source: v_nursing_note_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-nursing_note-R01"

  - name: tst_nursing_note_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_nursing_note_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-nursing_note-R02"
