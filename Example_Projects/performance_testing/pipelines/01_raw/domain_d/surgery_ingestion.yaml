pipeline: domain_d_raw
flowgroup: surgery_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_surgery_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/surgery/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_surgery_cloudfiles
    description: "Load surgery from landing volume"

  - name: write_surgery_raw
    type: write
    source: v_surgery_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "surgery_raw"

  - name: tst_surgery_raw_completeness
    type: test
    test_type: completeness
    source: v_surgery_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-surgery-R01"

  - name: tst_surgery_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_surgery_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-surgery-R02"
