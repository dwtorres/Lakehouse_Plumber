pipeline: domain_f_raw
flowgroup: course_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_course_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/course/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_course_cloudfiles
    description: "Load course from landing volume"

  - name: write_course_raw
    type: write
    source: v_course_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "course_raw"

  - name: tst_course_raw_completeness
    type: test
    test_type: completeness
    source: v_course_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-course-R01"

  - name: tst_course_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_course_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-course-R02"
