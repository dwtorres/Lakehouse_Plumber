pipeline: domain_f_raw
use_template: json_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: enrollment_ingestion
    template_parameters:
      table_name: enrollment_raw
      landing_folder: enrollment
      schema_file: nation_schema
    actions:
      - name: tst_enrollment_raw_completeness
        type: test
        test_type: completeness
        source: v_enrollment_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-enrollment-R01"
      
      - name: tst_enrollment_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_enrollment_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-enrollment-R02"

