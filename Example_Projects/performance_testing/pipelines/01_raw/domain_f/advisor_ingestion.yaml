pipeline: domain_f_raw
flowgroup: advisor_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_advisor_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/advisor/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_advisor_cloudfiles
    description: "Load advisor from landing volume"

  - name: write_advisor_raw
    type: write
    source: v_advisor_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "advisor_raw"

  - name: tst_advisor_raw_completeness
    type: test
    test_type: completeness
    source: v_advisor_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-advisor-R01"

  - name: tst_advisor_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_advisor_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-advisor-R02"
