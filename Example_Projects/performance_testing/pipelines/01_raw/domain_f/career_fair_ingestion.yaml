pipeline: domain_f_raw
flowgroup: career_fair_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_career_fair_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/career_fair/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_career_fair_cloudfiles
    description: "Load career_fair from landing volume"

  - name: write_career_fair_raw
    type: write
    source: v_career_fair_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "career_fair_raw"

  - name: tst_career_fair_raw_completeness
    type: test
    test_type: completeness
    source: v_career_fair_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-career_fair-R01"

  - name: tst_career_fair_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_career_fair_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-career_fair-R02"
