pipeline: domain_f_raw
flowgroup: student_club_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_student_club_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/student_club/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_student_club_cloudfiles
    description: "Load student_club from landing volume"

  - name: write_student_club_raw
    type: write
    source: v_student_club_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "student_club_raw"

  - name: tst_student_club_raw_completeness
    type: test
    test_type: completeness
    source: v_student_club_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-student_club-R01"

  - name: tst_student_club_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_student_club_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-student_club-R02"
