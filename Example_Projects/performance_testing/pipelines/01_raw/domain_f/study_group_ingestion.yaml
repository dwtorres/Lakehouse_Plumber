pipeline: domain_f_raw
flowgroup: study_group_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_study_group_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/study_group/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_study_group_cloudfiles
    description: "Load study_group from landing volume"

  - name: write_study_group_raw
    type: write
    source: v_study_group_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "study_group_raw"

  - name: tst_study_group_raw_completeness
    type: test
    test_type: completeness
    source: v_study_group_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-study_group-R01"

  - name: tst_study_group_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_study_group_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-study_group-R02"
