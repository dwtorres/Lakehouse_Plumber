pipeline: domain_f_raw
flowgroup: internship_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_internship_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/internship/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_internship_cloudfiles
    description: "Load internship from landing volume"

  - name: write_internship_raw
    type: write
    source: v_internship_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "internship_raw"

  - name: tst_internship_raw_completeness
    type: test
    test_type: completeness
    source: v_internship_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-internship-R01"

  - name: tst_internship_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_internship_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-internship-R02"
