pipeline: domain_f_raw
use_template: csv_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: classroom_ingestion
    template_parameters:
      table_name: classroom_raw
      landing_folder: classroom
      schema_file: part_schema
    actions:
      - name: tst_classroom_raw_completeness
        type: test
        test_type: completeness
        source: v_classroom_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-classroom-R01"
      
      - name: tst_classroom_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_classroom_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-classroom-R02"

