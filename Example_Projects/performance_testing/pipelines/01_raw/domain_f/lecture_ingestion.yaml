pipeline: domain_f_raw
flowgroup: lecture_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_lecture_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/lecture/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_lecture_cloudfiles
    description: "Load lecture from landing volume"

  - name: write_lecture_raw
    type: write
    source: v_lecture_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "lecture_raw"

  - name: tst_lecture_raw_completeness
    type: test
    test_type: completeness
    source: v_lecture_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-lecture-R01"

  - name: tst_lecture_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_lecture_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-lecture-R02"
