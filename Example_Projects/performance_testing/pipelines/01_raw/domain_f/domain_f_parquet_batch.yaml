pipeline: domain_f_raw
use_template: parquet_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: instructor_ingestion
    template_parameters:
      table_name: instructor_raw
      landing_folder: instructor
      schema_file: orders_schema
    actions:
      - name: tst_instructor_raw_completeness
        type: test
        test_type: completeness
        source: v_instructor_raw_cloudfiles
        required_columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-instructor-R01"
      
      - name: tst_instructor_raw_uniqueness
        type: test
        test_type: uniqueness
        source: v_instructor_raw_cloudfiles
        columns: [_processing_timestamp]
        on_violation: warn
        test_id: "PERF-instructor-R02"

