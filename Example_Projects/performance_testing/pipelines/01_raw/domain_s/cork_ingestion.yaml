pipeline: domain_s_raw
flowgroup: cork_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_cork_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/cork/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_cork_cloudfiles
    description: "Load cork from landing volume"

  - name: write_cork_raw
    type: write
    source: v_cork_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "cork_raw"

  - name: tst_cork_raw_completeness
    type: test
    test_type: completeness
    source: v_cork_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cork-R01"

  - name: tst_cork_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_cork_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-cork-R02"
