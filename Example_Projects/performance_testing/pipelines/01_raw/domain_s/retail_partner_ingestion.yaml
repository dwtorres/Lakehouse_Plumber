pipeline: domain_s_raw
flowgroup: retail_partner_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: retail_partner_raw
  landing_folder: retail_partner
  schema_file: customer_schema
actions:
  - name: tst_retail_partner_raw_completeness
    type: test
    test_type: completeness
    source: v_retail_partner_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-retail_partner-R01"

  - name: tst_retail_partner_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_retail_partner_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-retail_partner-R02"
