pipeline: domain_s_raw
flowgroup: critic_score_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: critic_score_raw
  landing_folder: critic_score
  schema_file: part_schema
actions:
  - name: tst_critic_score_raw_completeness
    type: test
    test_type: completeness
    source: v_critic_score_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-critic_score-R01"

  - name: tst_critic_score_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_critic_score_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-critic_score-R02"
