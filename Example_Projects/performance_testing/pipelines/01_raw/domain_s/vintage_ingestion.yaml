pipeline: domain_s_raw
flowgroup: vintage_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: vintage_raw
  landing_folder: vintage
  schema_file: customer_schema
actions:
  - name: tst_vintage_raw_completeness
    type: test
    test_type: completeness
    source: v_vintage_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-vintage-R01"

  - name: tst_vintage_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_vintage_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-vintage-R02"
