pipeline: domain_s_raw
flowgroup: racking_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_racking_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/racking/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_racking_cloudfiles
    description: "Load racking from landing volume"

  - name: write_racking_raw
    type: write
    source: v_racking_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "racking_raw"

  - name: tst_racking_raw_completeness
    type: test
    test_type: completeness
    source: v_racking_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-racking-R01"

  - name: tst_racking_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_racking_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-racking-R02"
