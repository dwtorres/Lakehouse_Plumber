pipeline: domain_s_raw
flowgroup: pressing_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: pressing_raw
  landing_folder: pressing
  schema_file: partsupp_schema
actions:
  - name: tst_pressing_raw_completeness
    type: test
    test_type: completeness
    source: v_pressing_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-pressing-R01"

  - name: tst_pressing_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_pressing_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-pressing-R02"
