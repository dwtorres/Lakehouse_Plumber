pipeline: domain_s_raw
flowgroup: auction_lot_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: auction_lot_raw
  landing_folder: auction_lot
  schema_file: partsupp_schema
actions:
  - name: tst_auction_lot_raw_completeness
    type: test
    test_type: completeness
    source: v_auction_lot_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-auction_lot-R01"

  - name: tst_auction_lot_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_auction_lot_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-auction_lot-R02"
