pipeline: domain_s_raw
flowgroup: filtration_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: filtration_raw
  landing_folder: filtration
  schema_file: product_schema
actions:
  - name: tst_filtration_raw_completeness
    type: test
    test_type: completeness
    source: v_filtration_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-filtration-R01"

  - name: tst_filtration_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_filtration_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-filtration-R02"
