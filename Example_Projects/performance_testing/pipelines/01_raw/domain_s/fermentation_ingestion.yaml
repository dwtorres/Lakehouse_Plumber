pipeline: domain_s_raw
flowgroup: fermentation_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: fermentation_raw
  landing_folder: fermentation
  schema_file: orders_schema
actions:
  - name: tst_fermentation_raw_completeness
    type: test
    test_type: completeness
    source: v_fermentation_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fermentation-R01"

  - name: tst_fermentation_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_fermentation_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fermentation-R02"
