pipeline: domain_s_raw
flowgroup: vineyard_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_vineyard_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/vineyard/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_vineyard_cloudfiles
    description: "Load vineyard from landing volume"

  - name: write_vineyard_raw
    type: write
    source: v_vineyard_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "vineyard_raw"

  - name: tst_vineyard_raw_completeness
    type: test
    test_type: completeness
    source: v_vineyard_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-vineyard-R01"

  - name: tst_vineyard_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_vineyard_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-vineyard-R02"
