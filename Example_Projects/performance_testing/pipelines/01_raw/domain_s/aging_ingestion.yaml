pipeline: domain_s_raw
flowgroup: aging_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: aging_raw
  landing_folder: aging
  schema_file: customer_schema
actions:
  - name: tst_aging_raw_completeness
    type: test
    test_type: completeness
    source: v_aging_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-aging-R01"

  - name: tst_aging_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_aging_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-aging-R02"
