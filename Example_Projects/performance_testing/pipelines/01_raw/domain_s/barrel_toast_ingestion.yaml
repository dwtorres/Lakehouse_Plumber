pipeline: domain_s_raw
flowgroup: barrel_toast_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: barrel_toast_raw
  landing_folder: barrel_toast
  schema_file: nation_schema
actions:
  - name: tst_barrel_toast_raw_completeness
    type: test
    test_type: completeness
    source: v_barrel_toast_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-barrel_toast-R01"

  - name: tst_barrel_toast_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_barrel_toast_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-barrel_toast-R02"
