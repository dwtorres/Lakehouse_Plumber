pipeline: domain_s_raw
flowgroup: distributor_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: distributor_raw
  landing_folder: distributor
  schema_file: product_schema
actions:
  - name: tst_distributor_raw_completeness
    type: test
    test_type: completeness
    source: v_distributor_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-distributor-R01"

  - name: tst_distributor_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_distributor_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-distributor-R02"
