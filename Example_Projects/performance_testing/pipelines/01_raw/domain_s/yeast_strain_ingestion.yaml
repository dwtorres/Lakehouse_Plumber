pipeline: domain_s_raw
flowgroup: yeast_strain_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: yeast_strain_raw
  landing_folder: yeast_strain
  schema_file: part_schema
actions:
  - name: tst_yeast_strain_raw_completeness
    type: test
    test_type: completeness
    source: v_yeast_strain_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-yeast_strain-R01"

  - name: tst_yeast_strain_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_yeast_strain_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-yeast_strain-R02"
