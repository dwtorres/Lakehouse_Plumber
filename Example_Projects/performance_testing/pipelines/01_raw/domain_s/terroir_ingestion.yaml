pipeline: domain_s_raw
flowgroup: terroir_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: terroir_raw
  landing_folder: terroir
  schema_file: part_schema
actions:
  - name: tst_terroir_raw_completeness
    type: test
    test_type: completeness
    source: v_terroir_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-terroir-R01"

  - name: tst_terroir_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_terroir_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-terroir-R02"
