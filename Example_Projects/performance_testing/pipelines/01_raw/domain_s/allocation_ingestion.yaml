pipeline: domain_s_raw
flowgroup: allocation_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_allocation_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/allocation/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_allocation_cloudfiles
    description: "Load allocation from landing volume"

  - name: write_allocation_raw
    type: write
    source: v_allocation_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "allocation_raw"

  - name: tst_allocation_raw_completeness
    type: test
    test_type: completeness
    source: v_allocation_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-allocation-R01"

  - name: tst_allocation_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_allocation_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-allocation-R02"
