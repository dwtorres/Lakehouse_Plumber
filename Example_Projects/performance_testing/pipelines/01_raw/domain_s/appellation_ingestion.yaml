pipeline: domain_s_raw
flowgroup: appellation_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: appellation_raw
  landing_folder: appellation
  schema_file: orders_schema
actions:
  - name: tst_appellation_raw_completeness
    type: test
    test_type: completeness
    source: v_appellation_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-appellation-R01"

  - name: tst_appellation_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_appellation_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-appellation-R02"
