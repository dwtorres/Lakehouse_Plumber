pipeline: domain_s_raw
flowgroup: malolactic_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_malolactic_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/malolactic/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_malolactic_cloudfiles
    description: "Load malolactic from landing volume"

  - name: write_malolactic_raw
    type: write
    source: v_malolactic_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "malolactic_raw"

  - name: tst_malolactic_raw_completeness
    type: test
    test_type: completeness
    source: v_malolactic_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-malolactic-R01"

  - name: tst_malolactic_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_malolactic_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-malolactic-R02"
