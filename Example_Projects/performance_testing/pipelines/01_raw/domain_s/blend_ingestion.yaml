pipeline: domain_s_raw
flowgroup: blend_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_blend_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/blend/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_blend_cloudfiles
    description: "Load blend from landing volume"

  - name: write_blend_raw
    type: write
    source: v_blend_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "blend_raw"

  - name: tst_blend_raw_completeness
    type: test
    test_type: completeness
    source: v_blend_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-blend-R01"

  - name: tst_blend_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_blend_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-blend-R02"
