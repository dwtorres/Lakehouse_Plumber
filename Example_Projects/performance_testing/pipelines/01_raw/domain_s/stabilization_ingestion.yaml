pipeline: domain_s_raw
flowgroup: stabilization_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: stabilization_raw
  landing_folder: stabilization
  schema_file: nation_schema
actions:
  - name: tst_stabilization_raw_completeness
    type: test
    test_type: completeness
    source: v_stabilization_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-stabilization-R01"

  - name: tst_stabilization_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_stabilization_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-stabilization-R02"
