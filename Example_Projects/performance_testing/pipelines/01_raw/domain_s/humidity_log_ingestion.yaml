pipeline: domain_s_raw
flowgroup: humidity_log_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_humidity_log_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/humidity_log/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_humidity_log_cloudfiles
    description: "Load humidity_log from landing volume"

  - name: write_humidity_log_raw
    type: write
    source: v_humidity_log_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "humidity_log_raw"

  - name: tst_humidity_log_raw_completeness
    type: test
    test_type: completeness
    source: v_humidity_log_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-humidity_log-R01"

  - name: tst_humidity_log_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_humidity_log_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-humidity_log-R02"
