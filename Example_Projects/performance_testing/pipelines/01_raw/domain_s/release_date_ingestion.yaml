pipeline: domain_s_raw
flowgroup: release_date_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_release_date_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/release_date/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_release_date_cloudfiles
    description: "Load release_date from landing volume"

  - name: write_release_date_raw
    type: write
    source: v_release_date_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "release_date_raw"

  - name: tst_release_date_raw_completeness
    type: test
    test_type: completeness
    source: v_release_date_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-release_date-R01"

  - name: tst_release_date_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_release_date_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-release_date-R02"
