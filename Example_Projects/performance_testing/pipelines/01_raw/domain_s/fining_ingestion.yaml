pipeline: domain_s_raw
flowgroup: fining_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: fining_raw
  landing_folder: fining
  schema_file: lineitem_schema
actions:
  - name: tst_fining_raw_completeness
    type: test
    test_type: completeness
    source: v_fining_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fining-R01"

  - name: tst_fining_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_fining_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fining-R02"
