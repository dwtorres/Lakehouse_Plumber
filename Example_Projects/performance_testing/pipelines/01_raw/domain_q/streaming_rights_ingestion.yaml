pipeline: domain_q_raw
flowgroup: streaming_rights_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: streaming_rights_raw
  landing_folder: streaming_rights
  schema_file: lineitem_schema
actions:
  - name: tst_streaming_rights_raw_completeness
    type: test
    test_type: completeness
    source: v_streaming_rights_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-streaming_rights-R01"

  - name: tst_streaming_rights_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_streaming_rights_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-streaming_rights-R02"
