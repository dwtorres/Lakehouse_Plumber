pipeline: domain_q_raw
flowgroup: red_card_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: red_card_raw
  landing_folder: red_card
  schema_file: product_schema
actions:
  - name: tst_red_card_raw_completeness
    type: test
    test_type: completeness
    source: v_red_card_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-red_card-R01"

  - name: tst_red_card_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_red_card_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-red_card-R02"
