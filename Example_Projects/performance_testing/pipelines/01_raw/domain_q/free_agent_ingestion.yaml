pipeline: domain_q_raw
flowgroup: free_agent_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: free_agent_raw
  landing_folder: free_agent
  schema_file: orders_schema
actions:
  - name: tst_free_agent_raw_completeness
    type: test
    test_type: completeness
    source: v_free_agent_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-free_agent-R01"

  - name: tst_free_agent_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_free_agent_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-free_agent-R02"
