pipeline: domain_q_raw
flowgroup: free_kick_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: free_kick_raw
  landing_folder: free_kick
  schema_file: nation_schema
actions:
  - name: tst_free_kick_raw_completeness
    type: test
    test_type: completeness
    source: v_free_kick_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-free_kick-R01"

  - name: tst_free_kick_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_free_kick_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-free_kick-R02"
