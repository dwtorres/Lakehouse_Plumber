pipeline: domain_q_raw
flowgroup: salary_cap_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_salary_cap_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/salary_cap/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_salary_cap_cloudfiles
    description: "Load salary_cap from landing volume"

  - name: write_salary_cap_raw
    type: write
    source: v_salary_cap_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "salary_cap_raw"

  - name: tst_salary_cap_raw_completeness
    type: test
    test_type: completeness
    source: v_salary_cap_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-salary_cap-R01"

  - name: tst_salary_cap_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_salary_cap_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-salary_cap-R02"
