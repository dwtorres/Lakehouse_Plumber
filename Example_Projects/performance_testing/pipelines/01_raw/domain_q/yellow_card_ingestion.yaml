pipeline: domain_q_raw
flowgroup: yellow_card_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_yellow_card_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/yellow_card/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_yellow_card_cloudfiles
    description: "Load yellow_card from landing volume"

  - name: write_yellow_card_raw
    type: write
    source: v_yellow_card_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "yellow_card_raw"

  - name: tst_yellow_card_raw_completeness
    type: test
    test_type: completeness
    source: v_yellow_card_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-yellow_card-R01"

  - name: tst_yellow_card_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_yellow_card_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-yellow_card-R02"
