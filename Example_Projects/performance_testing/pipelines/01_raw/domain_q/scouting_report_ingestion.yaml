pipeline: domain_q_raw
flowgroup: scouting_report_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: scouting_report_raw
  landing_folder: scouting_report
  schema_file: lineitem_schema
actions:
  - name: tst_scouting_report_raw_completeness
    type: test
    test_type: completeness
    source: v_scouting_report_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-scouting_report-R01"

  - name: tst_scouting_report_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_scouting_report_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-scouting_report-R02"
