pipeline: domain_q_raw
flowgroup: match_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_match_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/match/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_match_cloudfiles
    description: "Load match from landing volume"

  - name: write_match_raw
    type: write
    source: v_match_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "match_raw"

  - name: tst_match_raw_completeness
    type: test
    test_type: completeness
    source: v_match_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-match-R01"

  - name: tst_match_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_match_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-match-R02"
