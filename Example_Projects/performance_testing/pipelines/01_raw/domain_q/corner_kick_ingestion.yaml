pipeline: domain_q_raw
flowgroup: corner_kick_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_corner_kick_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/corner_kick/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_corner_kick_cloudfiles
    description: "Load corner_kick from landing volume"

  - name: write_corner_kick_raw
    type: write
    source: v_corner_kick_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "corner_kick_raw"

  - name: tst_corner_kick_raw_completeness
    type: test
    test_type: completeness
    source: v_corner_kick_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-corner_kick-R01"

  - name: tst_corner_kick_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_corner_kick_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-corner_kick-R02"
