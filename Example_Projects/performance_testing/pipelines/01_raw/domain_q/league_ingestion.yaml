pipeline: domain_q_raw
flowgroup: league_ingestion
presets:
  - default_delta_properties
use_template: csv_ingestion_template
template_parameters:
  table_name: league_raw
  landing_folder: league
  schema_file: customer_schema
actions:
  - name: tst_league_raw_completeness
    type: test
    test_type: completeness
    source: v_league_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-league-R01"

  - name: tst_league_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_league_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-league-R02"
