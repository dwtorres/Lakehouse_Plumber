pipeline: domain_q_raw
flowgroup: luxury_tax_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_luxury_tax_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/luxury_tax/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_luxury_tax_cloudfiles
    description: "Load luxury_tax from landing volume"

  - name: write_luxury_tax_raw
    type: write
    source: v_luxury_tax_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "luxury_tax_raw"

  - name: tst_luxury_tax_raw_completeness
    type: test
    test_type: completeness
    source: v_luxury_tax_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-luxury_tax-R01"

  - name: tst_luxury_tax_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_luxury_tax_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-luxury_tax-R02"
