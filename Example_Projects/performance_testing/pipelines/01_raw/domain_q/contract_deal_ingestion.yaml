pipeline: domain_q_raw
flowgroup: contract_deal_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_contract_deal_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/contract_deal/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_contract_deal_cloudfiles
    description: "Load contract_deal from landing volume"

  - name: write_contract_deal_raw
    type: write
    source: v_contract_deal_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "contract_deal_raw"

  - name: tst_contract_deal_raw_completeness
    type: test
    test_type: completeness
    source: v_contract_deal_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-contract_deal-R01"

  - name: tst_contract_deal_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_contract_deal_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-contract_deal-R02"
