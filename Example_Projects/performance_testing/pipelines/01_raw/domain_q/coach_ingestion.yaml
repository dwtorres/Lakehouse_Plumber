pipeline: domain_q_raw
flowgroup: coach_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: coach_raw
  landing_folder: coach
  schema_file: nation_schema
actions:
  - name: tst_coach_raw_completeness
    type: test
    test_type: completeness
    source: v_coach_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-coach-R01"

  - name: tst_coach_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_coach_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-coach-R02"
