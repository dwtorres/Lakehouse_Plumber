pipeline: domain_q_raw
flowgroup: draft_pick_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: draft_pick_raw
  landing_folder: draft_pick
  schema_file: nation_schema
actions:
  - name: tst_draft_pick_raw_completeness
    type: test
    test_type: completeness
    source: v_draft_pick_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-draft_pick-R01"

  - name: tst_draft_pick_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_draft_pick_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-draft_pick-R02"
