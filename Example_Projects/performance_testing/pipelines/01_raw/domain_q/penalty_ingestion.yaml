pipeline: domain_q_raw
flowgroup: penalty_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: penalty_raw
  landing_folder: penalty
  schema_file: partsupp_schema
actions:
  - name: tst_penalty_raw_completeness
    type: test
    test_type: completeness
    source: v_penalty_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-penalty-R01"

  - name: tst_penalty_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_penalty_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-penalty-R02"
