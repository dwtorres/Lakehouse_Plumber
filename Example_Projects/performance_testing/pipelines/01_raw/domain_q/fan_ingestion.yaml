pipeline: domain_q_raw
flowgroup: fan_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_fan_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/fan/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_fan_cloudfiles
    description: "Load fan from landing volume"

  - name: write_fan_raw
    type: write
    source: v_fan_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "fan_raw"

  - name: tst_fan_raw_completeness
    type: test
    test_type: completeness
    source: v_fan_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fan-R01"

  - name: tst_fan_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_fan_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-fan-R02"
