pipeline: domain_q_raw
flowgroup: stadium_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: stadium_raw
  landing_folder: stadium
  schema_file: orders_schema
actions:
  - name: tst_stadium_raw_completeness
    type: test
    test_type: completeness
    source: v_stadium_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-stadium-R01"

  - name: tst_stadium_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_stadium_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-stadium-R02"
