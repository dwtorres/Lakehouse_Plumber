pipeline: domain_q_raw
flowgroup: merchandise_ingestion
presets:
  - default_delta_properties
use_template: parquet_ingestion_template
template_parameters:
  table_name: merchandise_raw
  landing_folder: merchandise
  schema_file: part_schema
actions:
  - name: tst_merchandise_raw_completeness
    type: test
    test_type: completeness
    source: v_merchandise_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-merchandise-R01"

  - name: tst_merchandise_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_merchandise_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-merchandise-R02"
