pipeline: domain_q_raw
flowgroup: var_decision_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: var_decision_raw
  landing_folder: var_decision
  schema_file: part_schema
actions:
  - name: tst_var_decision_raw_completeness
    type: test
    test_type: completeness
    source: v_var_decision_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-var_decision-R01"

  - name: tst_var_decision_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_var_decision_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-var_decision-R02"
