pipeline: domain_q_raw
flowgroup: trophy_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: trophy_raw
  landing_folder: trophy
  schema_file: lineitem_schema
actions:
  - name: tst_trophy_raw_completeness
    type: test
    test_type: completeness
    source: v_trophy_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-trophy-R01"

  - name: tst_trophy_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_trophy_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-trophy-R02"
