pipeline: domain_q_raw
flowgroup: team_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: team_raw
  landing_folder: team
  schema_file: nation_schema
actions:
  - name: tst_team_raw_completeness
    type: test
    test_type: completeness
    source: v_team_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-team-R01"

  - name: tst_team_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_team_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-team-R02"
