pipeline: domain_q_raw
flowgroup: sponsor_ingestion
presets:
  - default_delta_properties
use_template: json_ingestion_template
template_parameters:
  table_name: sponsor_raw
  landing_folder: sponsor
  schema_file: orders_schema
actions:
  - name: tst_sponsor_raw_completeness
    type: test
    test_type: completeness
    source: v_sponsor_raw_cloudfiles
    required_columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-sponsor-R01"

  - name: tst_sponsor_raw_uniqueness
    type: test
    test_type: uniqueness
    source: v_sponsor_raw_cloudfiles
    columns: [_processing_timestamp]
    on_violation: warn
    test_id: "PERF-sponsor-R02"
