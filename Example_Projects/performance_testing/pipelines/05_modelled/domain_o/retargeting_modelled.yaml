pipeline: domain_o_modelled
flowgroup: retargeting_modelled
presets:
  - default_delta_properties
actions:
  - name: retargeting_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: retargeting_dim
    target: v_retargeting_silver
    description: "Load retargeting from silver for modelling"

  - name: retargeting_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_retargeting_silver
    target: v_retargeting_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_retargeting_silver

  - name: write_retargeting_modelled
    type: write
    source: v_retargeting_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "retargeting_modelled"

  - name: tst_retargeting_modelled_completeness
    type: test
    test_type: completeness
    source: v_retargeting_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-retargeting-M01"

  - name: tst_retargeting_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_retargeting_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-retargeting-M02"
