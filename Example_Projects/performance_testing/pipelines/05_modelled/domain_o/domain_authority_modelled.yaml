pipeline: domain_o_modelled
flowgroup: domain_authority_modelled
presets:
  - default_delta_properties
actions:
  - name: domain_authority_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: domain_authority_dim
    target: v_domain_authority_silver
    description: "Load domain_authority from silver for modelling"

  - name: domain_authority_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_domain_authority_silver
    target: v_domain_authority_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_domain_authority_silver

  - name: write_domain_authority_modelled
    type: write
    source: v_domain_authority_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "domain_authority_modelled"

  - name: tst_domain_authority_modelled_completeness
    type: test
    test_type: completeness
    source: v_domain_authority_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-domain_authority-M01"

  - name: tst_domain_authority_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_domain_authority_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-domain_authority-M02"
