pipeline: domain_o_modelled
flowgroup: cta_modelled
presets:
  - default_delta_properties
actions:
  - name: cta_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: cta_dim
    target: v_cta_silver
    description: "Load cta from silver for modelling"

  - name: cta_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_cta_silver
    target: v_cta_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_cta_silver

  - name: write_cta_modelled
    type: write
    source: v_cta_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "cta_modelled"

  - name: tst_cta_modelled_completeness
    type: test
    test_type: completeness
    source: v_cta_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-cta-M01"

  - name: tst_cta_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_cta_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-cta-M02"
