pipeline: domain_o_modelled
flowgroup: channel_modelled
presets:
  - default_delta_properties
actions:
  - name: channel_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: channel_dim
    target: v_channel_silver
    description: "Load channel from silver for modelling"

  - name: channel_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_channel_silver
    target: v_channel_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_channel_silver

  - name: write_channel_modelled
    type: write
    source: v_channel_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "channel_modelled"

  - name: tst_channel_modelled_completeness
    type: test
    test_type: completeness
    source: v_channel_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-channel-M01"

  - name: tst_channel_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_channel_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-channel-M02"
