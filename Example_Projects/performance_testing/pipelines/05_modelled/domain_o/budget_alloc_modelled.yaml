pipeline: domain_o_modelled
flowgroup: budget_alloc_modelled
presets:
  - default_delta_properties
actions:
  - name: budget_alloc_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: budget_alloc_dim
    target: v_budget_alloc_silver
    description: "Load budget_alloc from silver for modelling"

  - name: budget_alloc_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_budget_alloc_silver
    target: v_budget_alloc_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_budget_alloc_silver

  - name: write_budget_alloc_modelled
    type: write
    source: v_budget_alloc_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "budget_alloc_modelled"

  - name: tst_budget_alloc_modelled_completeness
    type: test
    test_type: completeness
    source: v_budget_alloc_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-budget_alloc-M01"

  - name: tst_budget_alloc_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_budget_alloc_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-budget_alloc-M02"
