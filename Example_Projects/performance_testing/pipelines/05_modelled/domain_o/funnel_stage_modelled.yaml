pipeline: domain_o_modelled
flowgroup: funnel_stage_modelled
presets:
  - default_delta_properties
actions:
  - name: funnel_stage_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: funnel_stage_dim
    target: v_funnel_stage_silver
    description: "Load funnel_stage from silver for modelling"

  - name: funnel_stage_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_funnel_stage_silver
    target: v_funnel_stage_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_funnel_stage_silver

  - name: write_funnel_stage_modelled
    type: write
    source: v_funnel_stage_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "funnel_stage_modelled"

  - name: tst_funnel_stage_modelled_completeness
    type: test
    test_type: completeness
    source: v_funnel_stage_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-funnel_stage-M01"

  - name: tst_funnel_stage_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_funnel_stage_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-funnel_stage-M02"
