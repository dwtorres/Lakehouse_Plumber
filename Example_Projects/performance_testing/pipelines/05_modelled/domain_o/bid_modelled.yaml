pipeline: domain_o_modelled
flowgroup: bid_modelled
presets:
  - default_delta_properties
actions:
  - name: bid_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: bid_fct
    target: v_bid_silver
    description: "Load bid from silver for modelling"

  - name: bid_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_bid_silver
    target: v_bid_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_bid_silver

  - name: write_bid_modelled
    type: write
    source: v_bid_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "bid_modelled"

  - name: tst_bid_modelled_completeness
    type: test
    test_type: completeness
    source: v_bid_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-bid-M01"

  - name: tst_bid_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_bid_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-bid-M02"
