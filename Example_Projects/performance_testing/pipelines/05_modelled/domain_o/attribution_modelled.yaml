pipeline: domain_o_modelled
flowgroup: attribution_modelled
presets:
  - default_delta_properties
actions:
  - name: attribution_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: attribution_fct
    target: v_attribution_silver
    description: "Load attribution from silver for modelling"

  - name: attribution_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_attribution_silver
    target: v_attribution_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_attribution_silver

  - name: write_attribution_modelled
    type: write
    source: v_attribution_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "attribution_modelled"

  - name: tst_attribution_modelled_completeness
    type: test
    test_type: completeness
    source: v_attribution_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-attribution-M01"

  - name: tst_attribution_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_attribution_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-attribution-M02"
