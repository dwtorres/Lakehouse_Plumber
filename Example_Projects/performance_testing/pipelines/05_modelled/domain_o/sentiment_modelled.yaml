pipeline: domain_o_modelled
flowgroup: sentiment_modelled
presets:
  - default_delta_properties
actions:
  - name: sentiment_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: sentiment_dim
    target: v_sentiment_silver
    description: "Load sentiment from silver for modelling"

  - name: sentiment_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_sentiment_silver
    target: v_sentiment_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_sentiment_silver

  - name: write_sentiment_modelled
    type: write
    source: v_sentiment_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "sentiment_modelled"

  - name: tst_sentiment_modelled_completeness
    type: test
    test_type: completeness
    source: v_sentiment_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-sentiment-M01"

  - name: tst_sentiment_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_sentiment_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-sentiment-M02"
