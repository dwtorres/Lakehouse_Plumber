pipeline: domain_o_modelled
flowgroup: landing_page_modelled
presets:
  - default_delta_properties
actions:
  - name: landing_page_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: landing_page_fct
    target: v_landing_page_silver
    description: "Load landing_page from silver for modelling"

  - name: landing_page_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_landing_page_silver
    target: v_landing_page_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_landing_page_silver

  - name: write_landing_page_modelled
    type: write
    source: v_landing_page_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "landing_page_modelled"

  - name: tst_landing_page_modelled_completeness
    type: test
    test_type: completeness
    source: v_landing_page_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-landing_page-M01"

  - name: tst_landing_page_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_landing_page_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-landing_page-M02"
