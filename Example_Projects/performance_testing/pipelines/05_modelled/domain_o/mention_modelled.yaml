pipeline: domain_o_modelled
flowgroup: mention_modelled
presets:
  - default_delta_properties
actions:
  - name: mention_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: mention_dim
    target: v_mention_silver
    description: "Load mention from silver for modelling"

  - name: mention_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_mention_silver
    target: v_mention_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_mention_silver

  - name: write_mention_modelled
    type: write
    source: v_mention_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "mention_modelled"

  - name: tst_mention_modelled_completeness
    type: test
    test_type: completeness
    source: v_mention_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-mention-M01"

  - name: tst_mention_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_mention_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-mention-M02"
