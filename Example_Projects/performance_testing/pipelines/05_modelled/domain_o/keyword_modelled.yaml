pipeline: domain_o_modelled
flowgroup: keyword_modelled
presets:
  - default_delta_properties
actions:
  - name: keyword_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: keyword_dim
    target: v_keyword_silver
    description: "Load keyword from silver for modelling"

  - name: keyword_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_keyword_silver
    target: v_keyword_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_keyword_silver

  - name: write_keyword_modelled
    type: write
    source: v_keyword_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "keyword_modelled"

  - name: tst_keyword_modelled_completeness
    type: test
    test_type: completeness
    source: v_keyword_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-keyword-M01"

  - name: tst_keyword_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_keyword_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-keyword-M02"
