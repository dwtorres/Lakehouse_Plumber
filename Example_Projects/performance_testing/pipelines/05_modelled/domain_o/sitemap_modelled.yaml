pipeline: domain_o_modelled
flowgroup: sitemap_modelled
presets:
  - default_delta_properties
actions:
  - name: sitemap_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: sitemap_dim
    target: v_sitemap_silver
    description: "Load sitemap from silver for modelling"

  - name: sitemap_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_sitemap_silver
    target: v_sitemap_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_sitemap_silver

  - name: write_sitemap_modelled
    type: write
    source: v_sitemap_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "sitemap_modelled"

  - name: tst_sitemap_modelled_completeness
    type: test
    test_type: completeness
    source: v_sitemap_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-sitemap-M01"

  - name: tst_sitemap_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_sitemap_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-sitemap-M02"
