pipeline: domain_o_modelled
flowgroup: engagement_modelled
presets:
  - default_delta_properties
actions:
  - name: engagement_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: engagement_dim
    target: v_engagement_silver
    description: "Load engagement from silver for modelling"

  - name: engagement_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_engagement_silver
    target: v_engagement_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_engagement_silver

  - name: write_engagement_modelled
    type: write
    source: v_engagement_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "engagement_modelled"

  - name: tst_engagement_modelled_completeness
    type: test
    test_type: completeness
    source: v_engagement_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-engagement-M01"

  - name: tst_engagement_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_engagement_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-engagement-M02"
