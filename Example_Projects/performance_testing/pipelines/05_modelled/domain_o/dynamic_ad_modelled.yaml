pipeline: domain_o_modelled
flowgroup: dynamic_ad_modelled
presets:
  - default_delta_properties
actions:
  - name: dynamic_ad_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: dynamic_ad_fct
    target: v_dynamic_ad_silver
    description: "Load dynamic_ad from silver for modelling"

  - name: dynamic_ad_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_dynamic_ad_silver
    target: v_dynamic_ad_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_dynamic_ad_silver

  - name: write_dynamic_ad_modelled
    type: write
    source: v_dynamic_ad_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "dynamic_ad_modelled"

  - name: tst_dynamic_ad_modelled_completeness
    type: test
    test_type: completeness
    source: v_dynamic_ad_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-dynamic_ad-M01"

  - name: tst_dynamic_ad_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_dynamic_ad_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-dynamic_ad-M02"
