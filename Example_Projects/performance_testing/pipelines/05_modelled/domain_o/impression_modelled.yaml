pipeline: domain_o_modelled
flowgroup: impression_modelled
presets:
  - default_delta_properties
actions:
  - name: impression_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: impression_fct
    target: v_impression_silver
    description: "Load impression from silver for modelling"

  - name: impression_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_impression_silver
    target: v_impression_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_impression_silver

  - name: write_impression_modelled
    type: write
    source: v_impression_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "impression_modelled"

  - name: tst_impression_modelled_completeness
    type: test
    test_type: completeness
    source: v_impression_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-impression-M01"

  - name: tst_impression_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_impression_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-impression-M02"
