pipeline: domain_o_modelled
flowgroup: campaign_modelled
presets:
  - default_delta_properties
actions:
  - name: campaign_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: campaign_fct
    target: v_campaign_silver
    description: "Load campaign from silver for modelling"

  - name: campaign_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_campaign_silver
    target: v_campaign_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_campaign_silver

  - name: write_campaign_modelled
    type: write
    source: v_campaign_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "campaign_modelled"

  - name: tst_campaign_modelled_completeness
    type: test
    test_type: completeness
    source: v_campaign_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-campaign-M01"

  - name: tst_campaign_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_campaign_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-campaign-M02"
