pipeline: domain_o_modelled
flowgroup: hashtag_modelled
presets:
  - default_delta_properties
actions:
  - name: hashtag_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: hashtag_fct
    target: v_hashtag_silver
    description: "Load hashtag from silver for modelling"

  - name: hashtag_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_hashtag_silver
    target: v_hashtag_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_hashtag_silver

  - name: write_hashtag_modelled
    type: write
    source: v_hashtag_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "hashtag_modelled"

  - name: tst_hashtag_modelled_completeness
    type: test
    test_type: completeness
    source: v_hashtag_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-hashtag-M01"

  - name: tst_hashtag_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_hashtag_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-hashtag-M02"
