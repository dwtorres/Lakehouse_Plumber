pipeline: domain_o_modelled
flowgroup: click_modelled
presets:
  - default_delta_properties
actions:
  - name: click_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: click_dim
    target: v_click_silver
    description: "Load click from silver for modelling"

  - name: click_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_click_silver
    target: v_click_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_click_silver

  - name: write_click_modelled
    type: write
    source: v_click_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "click_modelled"

  - name: tst_click_modelled_completeness
    type: test
    test_type: completeness
    source: v_click_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-click-M01"

  - name: tst_click_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_click_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-click-M02"
