pipeline: domain_o_modelled
flowgroup: crawl_error_modelled
presets:
  - default_delta_properties
actions:
  - name: crawl_error_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: crawl_error_fct
    target: v_crawl_error_silver
    description: "Load crawl_error from silver for modelling"

  - name: crawl_error_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_crawl_error_silver
    target: v_crawl_error_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_crawl_error_silver

  - name: write_crawl_error_modelled
    type: write
    source: v_crawl_error_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "crawl_error_modelled"

  - name: tst_crawl_error_modelled_completeness
    type: test
    test_type: completeness
    source: v_crawl_error_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-crawl_error-M01"

  - name: tst_crawl_error_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_crawl_error_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-crawl_error-M02"
