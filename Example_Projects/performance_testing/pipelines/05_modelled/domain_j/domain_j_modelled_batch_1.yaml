pipeline: domain_j_modelled
flowgroup: meter_modelled
presets:
  - default_delta_properties
actions:
  - name: meter_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: meter_fct
    target: v_meter_silver
    description: "Load meter from silver for modelling"

  - name: meter_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_meter_silver
    target: v_meter_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_meter_silver

  - name: write_meter_modelled
    type: write
    source: v_meter_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "meter_modelled"

  - name: tst_meter_modelled_completeness
    type: test
    test_type: completeness
    source: v_meter_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-meter-M01"

  - name: tst_meter_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_meter_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-meter-M02"
