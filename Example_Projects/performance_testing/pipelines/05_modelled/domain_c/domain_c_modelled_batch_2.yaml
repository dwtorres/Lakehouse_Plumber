pipeline: domain_c_modelled
flowgroup: invoice_line_modelled
presets:
  - default_delta_properties
actions:
  - name: invoice_line_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: invoice_line_dim
    target: v_invoice_line_silver
    description: "Load invoice_line from silver for modelling"

  - name: invoice_line_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_invoice_line_silver
    target: v_invoice_line_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_invoice_line_silver

  - name: write_invoice_line_modelled
    type: write
    source: v_invoice_line_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "invoice_line_modelled"

  - name: tst_invoice_line_modelled_completeness
    type: test
    test_type: completeness
    source: v_invoice_line_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-invoice_line-M01"

  - name: tst_invoice_line_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_invoice_line_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-invoice_line-M02"
