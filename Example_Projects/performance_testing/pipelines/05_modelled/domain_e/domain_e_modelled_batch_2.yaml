pipeline: domain_e_modelled
flowgroup: trailer_modelled
presets:
  - default_delta_properties
actions:
  - name: trailer_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: trailer_dim
    target: v_trailer_silver
    description: "Load trailer from silver for modelling"

  - name: trailer_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_trailer_silver
    target: v_trailer_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_trailer_silver

  - name: write_trailer_modelled
    type: write
    source: v_trailer_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "trailer_modelled"

  - name: tst_trailer_modelled_completeness
    type: test
    test_type: completeness
    source: v_trailer_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-trailer-M01"

  - name: tst_trailer_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_trailer_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-trailer-M02"
