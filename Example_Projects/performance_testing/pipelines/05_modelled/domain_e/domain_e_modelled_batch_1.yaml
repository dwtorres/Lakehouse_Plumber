  - default_delta_properties
actions:
  - name: zone_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: zone_dim
    target: v_zone_silver
    description: "Load zone from silver for modelling"

  - name: zone_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_zone_silver
    target: v_zone_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_zone_silver

  - name: write_zone_modelled
    type: write
    source: v_zone_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "zone_modelled"

  - name: tst_zone_modelled_completeness
    type: test
    test_type: completeness
    source: v_zone_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-zone-M01"

  - name: tst_zone_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_zone_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-zone-M02"
