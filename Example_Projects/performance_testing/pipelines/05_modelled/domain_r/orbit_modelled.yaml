pipeline: domain_r_modelled
flowgroup: orbit_modelled
presets:
  - default_delta_properties
actions:
  - name: orbit_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: orbit_dim
    target: v_orbit_silver
    description: "Load orbit from silver for modelling"

  - name: orbit_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_orbit_silver
    target: v_orbit_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_orbit_silver

  - name: write_orbit_modelled
    type: write
    source: v_orbit_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "orbit_modelled"

  - name: tst_orbit_modelled_completeness
    type: test
    test_type: completeness
    source: v_orbit_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-orbit-M01"

  - name: tst_orbit_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_orbit_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-orbit-M02"
