pipeline: domain_r_modelled
flowgroup: downlink_modelled
presets:
  - default_delta_properties
actions:
  - name: downlink_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: downlink_dim
    target: v_downlink_silver
    description: "Load downlink from silver for modelling"

  - name: downlink_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_downlink_silver
    target: v_downlink_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_downlink_silver

  - name: write_downlink_modelled
    type: write
    source: v_downlink_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "downlink_modelled"

  - name: tst_downlink_modelled_completeness
    type: test
    test_type: completeness
    source: v_downlink_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-downlink-M01"

  - name: tst_downlink_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_downlink_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-downlink-M02"
