pipeline: domain_r_modelled
flowgroup: coding_scheme_modelled
presets:
  - default_delta_properties
actions:
  - name: coding_scheme_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: coding_scheme_dim
    target: v_coding_scheme_silver
    description: "Load coding_scheme from silver for modelling"

  - name: coding_scheme_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_coding_scheme_silver
    target: v_coding_scheme_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_coding_scheme_silver

  - name: write_coding_scheme_modelled
    type: write
    source: v_coding_scheme_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "coding_scheme_modelled"

  - name: tst_coding_scheme_modelled_completeness
    type: test
    test_type: completeness
    source: v_coding_scheme_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-coding_scheme-M01"

  - name: tst_coding_scheme_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_coding_scheme_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-coding_scheme-M02"
