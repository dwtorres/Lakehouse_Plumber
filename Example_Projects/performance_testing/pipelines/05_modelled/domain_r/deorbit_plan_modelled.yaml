pipeline: domain_r_modelled
flowgroup: deorbit_plan_modelled
presets:
  - default_delta_properties
actions:
  - name: deorbit_plan_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: deorbit_plan_dim
    target: v_deorbit_plan_silver
    description: "Load deorbit_plan from silver for modelling"

  - name: deorbit_plan_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_deorbit_plan_silver
    target: v_deorbit_plan_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_deorbit_plan_silver

  - name: write_deorbit_plan_modelled
    type: write
    source: v_deorbit_plan_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "deorbit_plan_modelled"

  - name: tst_deorbit_plan_modelled_completeness
    type: test
    test_type: completeness
    source: v_deorbit_plan_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-deorbit_plan-M01"

  - name: tst_deorbit_plan_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_deorbit_plan_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-deorbit_plan-M02"
