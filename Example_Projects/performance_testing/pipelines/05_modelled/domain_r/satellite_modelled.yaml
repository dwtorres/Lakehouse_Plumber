pipeline: domain_r_modelled
flowgroup: satellite_modelled
presets:
  - default_delta_properties
actions:
  - name: satellite_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: satellite_fct
    target: v_satellite_silver
    description: "Load satellite from silver for modelling"

  - name: satellite_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_satellite_silver
    target: v_satellite_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_satellite_silver

  - name: write_satellite_modelled
    type: write
    source: v_satellite_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "satellite_modelled"

  - name: tst_satellite_modelled_completeness
    type: test
    test_type: completeness
    source: v_satellite_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-satellite-M01"

  - name: tst_satellite_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_satellite_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-satellite-M02"
