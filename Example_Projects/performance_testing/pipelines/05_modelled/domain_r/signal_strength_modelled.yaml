pipeline: domain_r_modelled
flowgroup: signal_strength_modelled
presets:
  - default_delta_properties
actions:
  - name: signal_strength_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: signal_strength_dim
    target: v_signal_strength_silver
    description: "Load signal_strength from silver for modelling"

  - name: signal_strength_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_signal_strength_silver
    target: v_signal_strength_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_signal_strength_silver

  - name: write_signal_strength_modelled
    type: write
    source: v_signal_strength_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "signal_strength_modelled"

  - name: tst_signal_strength_modelled_completeness
    type: test
    test_type: completeness
    source: v_signal_strength_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-signal_strength-M01"

  - name: tst_signal_strength_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_signal_strength_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-signal_strength-M02"
