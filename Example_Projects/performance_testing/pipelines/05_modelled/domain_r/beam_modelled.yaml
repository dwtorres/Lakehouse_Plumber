pipeline: domain_r_modelled
flowgroup: beam_modelled
presets:
  - default_delta_properties
actions:
  - name: beam_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: beam_dim
    target: v_beam_silver
    description: "Load beam from silver for modelling"

  - name: beam_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_beam_silver
    target: v_beam_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_beam_silver

  - name: write_beam_modelled
    type: write
    source: v_beam_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "beam_modelled"

  - name: tst_beam_modelled_completeness
    type: test
    test_type: completeness
    source: v_beam_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-beam-M01"

  - name: tst_beam_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_beam_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-beam-M02"
