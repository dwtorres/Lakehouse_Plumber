pipeline: domain_r_modelled
flowgroup: multiplexing_modelled
presets:
  - default_delta_properties
actions:
  - name: multiplexing_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: multiplexing_dim
    target: v_multiplexing_silver
    description: "Load multiplexing from silver for modelling"

  - name: multiplexing_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_multiplexing_silver
    target: v_multiplexing_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_multiplexing_silver

  - name: write_multiplexing_modelled
    type: write
    source: v_multiplexing_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "multiplexing_modelled"

  - name: tst_multiplexing_modelled_completeness
    type: test
    test_type: completeness
    source: v_multiplexing_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-multiplexing-M01"

  - name: tst_multiplexing_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_multiplexing_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-multiplexing-M02"
