pipeline: domain_r_modelled
flowgroup: uplink_modelled
presets:
  - default_delta_properties
actions:
  - name: uplink_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: uplink_fct
    target: v_uplink_silver
    description: "Load uplink from silver for modelling"

  - name: uplink_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_uplink_silver
    target: v_uplink_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_uplink_silver

  - name: write_uplink_modelled
    type: write
    source: v_uplink_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "uplink_modelled"

  - name: tst_uplink_modelled_completeness
    type: test
    test_type: completeness
    source: v_uplink_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-uplink-M01"

  - name: tst_uplink_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_uplink_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-uplink-M02"
