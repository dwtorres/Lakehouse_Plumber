pipeline: domain_r_modelled
flowgroup: propulsion_modelled
presets:
  - default_delta_properties
actions:
  - name: propulsion_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: propulsion_dim
    target: v_propulsion_silver
    description: "Load propulsion from silver for modelling"

  - name: propulsion_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_propulsion_silver
    target: v_propulsion_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_propulsion_silver

  - name: write_propulsion_modelled
    type: write
    source: v_propulsion_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "propulsion_modelled"

  - name: tst_propulsion_modelled_completeness
    type: test
    test_type: completeness
    source: v_propulsion_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-propulsion-M01"

  - name: tst_propulsion_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_propulsion_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-propulsion-M02"
