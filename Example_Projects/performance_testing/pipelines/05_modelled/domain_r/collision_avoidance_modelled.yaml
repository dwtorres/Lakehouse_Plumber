pipeline: domain_r_modelled
flowgroup: collision_avoidance_modelled
presets:
  - default_delta_properties
actions:
  - name: collision_avoidance_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: collision_avoidance_dim
    target: v_collision_avoidance_silver
    description: "Load collision_avoidance from silver for modelling"

  - name: collision_avoidance_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_collision_avoidance_silver
    target: v_collision_avoidance_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_collision_avoidance_silver

  - name: write_collision_avoidance_modelled
    type: write
    source: v_collision_avoidance_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "collision_avoidance_modelled"

  - name: tst_collision_avoidance_modelled_completeness
    type: test
    test_type: completeness
    source: v_collision_avoidance_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-collision_avoidance-M01"

  - name: tst_collision_avoidance_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_collision_avoidance_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-collision_avoidance-M02"
