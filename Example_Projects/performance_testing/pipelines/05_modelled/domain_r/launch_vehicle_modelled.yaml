pipeline: domain_r_modelled
flowgroup: launch_vehicle_modelled
presets:
  - default_delta_properties
actions:
  - name: launch_vehicle_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: launch_vehicle_dim
    target: v_launch_vehicle_silver
    description: "Load launch_vehicle from silver for modelling"

  - name: launch_vehicle_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_launch_vehicle_silver
    target: v_launch_vehicle_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_launch_vehicle_silver

  - name: write_launch_vehicle_modelled
    type: write
    source: v_launch_vehicle_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "launch_vehicle_modelled"

  - name: tst_launch_vehicle_modelled_completeness
    type: test
    test_type: completeness
    source: v_launch_vehicle_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-launch_vehicle-M01"

  - name: tst_launch_vehicle_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_launch_vehicle_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-launch_vehicle-M02"
