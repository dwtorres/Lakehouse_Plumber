pipeline: domain_r_modelled
flowgroup: eclipse_period_modelled
presets:
  - default_delta_properties
actions:
  - name: eclipse_period_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: eclipse_period_dim
    target: v_eclipse_period_silver
    description: "Load eclipse_period from silver for modelling"

  - name: eclipse_period_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_eclipse_period_silver
    target: v_eclipse_period_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_eclipse_period_silver

  - name: write_eclipse_period_modelled
    type: write
    source: v_eclipse_period_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "eclipse_period_modelled"

  - name: tst_eclipse_period_modelled_completeness
    type: test
    test_type: completeness
    source: v_eclipse_period_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-eclipse_period-M01"

  - name: tst_eclipse_period_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_eclipse_period_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-eclipse_period-M02"
