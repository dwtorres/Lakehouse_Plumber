pipeline: domain_b_modelled
flowgroup: employee_modelled
presets:
  - default_delta_properties
actions:
  - name: employee_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: employee_fct
    target: v_employee_silver
    description: "Load employee from silver for modelling"

  - name: employee_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_employee_silver
    target: v_employee_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_employee_silver

  - name: write_employee_modelled
    type: write
    source: v_employee_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "employee_modelled"

  - name: tst_employee_modelled_completeness
    type: test
    test_type: completeness
    source: v_employee_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-employee-M01"

  - name: tst_employee_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_employee_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-employee-M02"
