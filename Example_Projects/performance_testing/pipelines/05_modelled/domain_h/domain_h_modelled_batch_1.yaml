pipeline: domain_h_modelled
flowgroup: store_modelled
presets:
  - default_delta_properties
actions:
  - name: store_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: store_fct
    target: v_store_silver
    description: "Load store from silver for modelling"

  - name: store_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_store_silver
    target: v_store_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_store_silver

  - name: write_store_modelled
    type: write
    source: v_store_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "store_modelled"

  - name: tst_store_modelled_completeness
    type: test
    test_type: completeness
    source: v_store_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-store-M01"

  - name: tst_store_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_store_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-store-M02"
