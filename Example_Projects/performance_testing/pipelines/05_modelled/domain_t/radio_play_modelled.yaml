pipeline: domain_t_modelled
flowgroup: radio_play_modelled
presets:
  - default_delta_properties
actions:
  - name: radio_play_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: radio_play_dim
    target: v_radio_play_silver
    description: "Load radio_play from silver for modelling"

  - name: radio_play_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_radio_play_silver
    target: v_radio_play_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_radio_play_silver

  - name: write_radio_play_modelled
    type: write
    source: v_radio_play_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "radio_play_modelled"

  - name: tst_radio_play_modelled_completeness
    type: test
    test_type: completeness
    source: v_radio_play_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-radio_play-M01"

  - name: tst_radio_play_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_radio_play_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-radio_play-M02"
