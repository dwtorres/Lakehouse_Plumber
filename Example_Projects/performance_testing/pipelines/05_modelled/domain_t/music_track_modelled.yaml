pipeline: domain_t_modelled
flowgroup: music_track_modelled
presets:
  - default_delta_properties
actions:
  - name: music_track_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: music_track_fct
    target: v_music_track_silver
    description: "Load music_track from silver for modelling"

  - name: music_track_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_music_track_silver
    target: v_music_track_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_music_track_silver

  - name: write_music_track_modelled
    type: write
    source: v_music_track_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "music_track_modelled"

  - name: tst_music_track_modelled_completeness
    type: test
    test_type: completeness
    source: v_music_track_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-music_track-M01"

  - name: tst_music_track_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_music_track_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-music_track-M02"
