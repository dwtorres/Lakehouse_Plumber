pipeline: domain_t_modelled
flowgroup: genre_modelled
presets:
  - default_delta_properties
actions:
  - name: genre_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: genre_dim
    target: v_genre_silver
    description: "Load genre from silver for modelling"

  - name: genre_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_genre_silver
    target: v_genre_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_genre_silver

  - name: write_genre_modelled
    type: write
    source: v_genre_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "genre_modelled"

  - name: tst_genre_modelled_completeness
    type: test
    test_type: completeness
    source: v_genre_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-genre-M01"

  - name: tst_genre_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_genre_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-genre-M02"
