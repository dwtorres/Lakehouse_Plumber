pipeline: domain_t_modelled
flowgroup: chart_position_modelled
presets:
  - default_delta_properties
actions:
  - name: chart_position_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: chart_position_dim
    target: v_chart_position_silver
    description: "Load chart_position from silver for modelling"

  - name: chart_position_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_chart_position_silver
    target: v_chart_position_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_chart_position_silver

  - name: write_chart_position_modelled
    type: write
    source: v_chart_position_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "chart_position_modelled"

  - name: tst_chart_position_modelled_completeness
    type: test
    test_type: completeness
    source: v_chart_position_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-chart_position-M01"

  - name: tst_chart_position_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_chart_position_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-chart_position-M02"
