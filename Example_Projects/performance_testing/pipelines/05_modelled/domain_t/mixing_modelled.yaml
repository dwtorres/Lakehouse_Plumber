pipeline: domain_t_modelled
flowgroup: mixing_modelled
presets:
  - default_delta_properties
actions:
  - name: mixing_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: mixing_dim
    target: v_mixing_silver
    description: "Load mixing from silver for modelling"

  - name: mixing_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_mixing_silver
    target: v_mixing_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_mixing_silver

  - name: write_mixing_modelled
    type: write
    source: v_mixing_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "mixing_modelled"

  - name: tst_mixing_modelled_completeness
    type: test
    test_type: completeness
    source: v_mixing_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-mixing-M01"

  - name: tst_mixing_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_mixing_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-mixing-M02"
