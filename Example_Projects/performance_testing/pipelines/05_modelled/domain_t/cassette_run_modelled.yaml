pipeline: domain_t_modelled
flowgroup: cassette_run_modelled
presets:
  - default_delta_properties
actions:
  - name: cassette_run_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: cassette_run_dim
    target: v_cassette_run_silver
    description: "Load cassette_run from silver for modelling"

  - name: cassette_run_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_cassette_run_silver
    target: v_cassette_run_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_cassette_run_silver

  - name: write_cassette_run_modelled
    type: write
    source: v_cassette_run_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "cassette_run_modelled"

  - name: tst_cassette_run_modelled_completeness
    type: test
    test_type: completeness
    source: v_cassette_run_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-cassette_run-M01"

  - name: tst_cassette_run_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_cassette_run_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-cassette_run-M02"
