pipeline: domain_t_modelled
flowgroup: concert_modelled
presets:
  - default_delta_properties
actions:
  - name: concert_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: concert_dim
    target: v_concert_silver
    description: "Load concert from silver for modelling"

  - name: concert_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_concert_silver
    target: v_concert_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_concert_silver

  - name: write_concert_modelled
    type: write
    source: v_concert_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "concert_modelled"

  - name: tst_concert_modelled_completeness
    type: test
    test_type: completeness
    source: v_concert_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-concert-M01"

  - name: tst_concert_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_concert_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-concert-M02"
