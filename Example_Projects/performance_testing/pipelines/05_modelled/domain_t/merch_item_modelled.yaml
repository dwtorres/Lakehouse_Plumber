pipeline: domain_t_modelled
flowgroup: merch_item_modelled
presets:
  - default_delta_properties
actions:
  - name: merch_item_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: merch_item_fct
    target: v_merch_item_silver
    description: "Load merch_item from silver for modelling"

  - name: merch_item_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_merch_item_silver
    target: v_merch_item_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_merch_item_silver

  - name: write_merch_item_modelled
    type: write
    source: v_merch_item_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "merch_item_modelled"

  - name: tst_merch_item_modelled_completeness
    type: test
    test_type: completeness
    source: v_merch_item_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-merch_item-M01"

  - name: tst_merch_item_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_merch_item_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-merch_item-M02"
