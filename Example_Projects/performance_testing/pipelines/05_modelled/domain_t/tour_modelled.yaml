pipeline: domain_t_modelled
flowgroup: tour_modelled
presets:
  - default_delta_properties
actions:
  - name: tour_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: tour_dim
    target: v_tour_silver
    description: "Load tour from silver for modelling"

  - name: tour_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_tour_silver
    target: v_tour_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_tour_silver

  - name: write_tour_modelled
    type: write
    source: v_tour_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "tour_modelled"

  - name: tst_tour_modelled_completeness
    type: test
    test_type: completeness
    source: v_tour_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-tour-M01"

  - name: tst_tour_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_tour_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-tour-M02"
