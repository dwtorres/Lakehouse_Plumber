pipeline: domain_t_modelled
flowgroup: producer_modelled
presets:
  - default_delta_properties
actions:
  - name: producer_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: producer_fct
    target: v_producer_silver
    description: "Load producer from silver for modelling"

  - name: producer_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_producer_silver
    target: v_producer_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_producer_silver

  - name: write_producer_modelled
    type: write
    source: v_producer_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "producer_modelled"

  - name: tst_producer_modelled_completeness
    type: test
    test_type: completeness
    source: v_producer_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-producer-M01"

  - name: tst_producer_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_producer_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-producer-M02"
