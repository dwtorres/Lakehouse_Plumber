pipeline: domain_t_modelled
flowgroup: mastering_modelled
presets:
  - default_delta_properties
actions:
  - name: mastering_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: mastering_dim
    target: v_mastering_silver
    description: "Load mastering from silver for modelling"

  - name: mastering_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_mastering_silver
    target: v_mastering_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_mastering_silver

  - name: write_mastering_modelled
    type: write
    source: v_mastering_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "mastering_modelled"

  - name: tst_mastering_modelled_completeness
    type: test
    test_type: completeness
    source: v_mastering_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-mastering-M01"

  - name: tst_mastering_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_mastering_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-mastering-M02"
