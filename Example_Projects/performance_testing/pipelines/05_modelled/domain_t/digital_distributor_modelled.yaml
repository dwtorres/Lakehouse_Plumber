pipeline: domain_t_modelled
flowgroup: digital_distributor_modelled
presets:
  - default_delta_properties
actions:
  - name: digital_distributor_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: digital_distributor_dim
    target: v_digital_distributor_silver
    description: "Load digital_distributor from silver for modelling"

  - name: digital_distributor_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_digital_distributor_silver
    target: v_digital_distributor_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_digital_distributor_silver

  - name: write_digital_distributor_modelled
    type: write
    source: v_digital_distributor_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "digital_distributor_modelled"

  - name: tst_digital_distributor_modelled_completeness
    type: test
    test_type: completeness
    source: v_digital_distributor_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-digital_distributor-M01"

  - name: tst_digital_distributor_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_digital_distributor_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-digital_distributor-M02"
