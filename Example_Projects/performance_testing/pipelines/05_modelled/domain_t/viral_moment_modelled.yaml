pipeline: domain_t_modelled
flowgroup: viral_moment_modelled
presets:
  - default_delta_properties
actions:
  - name: viral_moment_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: viral_moment_fct
    target: v_viral_moment_silver
    description: "Load viral_moment from silver for modelling"

  - name: viral_moment_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_viral_moment_silver
    target: v_viral_moment_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_viral_moment_silver

  - name: write_viral_moment_modelled
    type: write
    source: v_viral_moment_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "viral_moment_modelled"

  - name: tst_viral_moment_modelled_completeness
    type: test
    test_type: completeness
    source: v_viral_moment_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-viral_moment-M01"

  - name: tst_viral_moment_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_viral_moment_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-viral_moment-M02"
