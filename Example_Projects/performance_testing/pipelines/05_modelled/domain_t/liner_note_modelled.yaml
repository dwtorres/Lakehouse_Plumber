pipeline: domain_t_modelled
flowgroup: liner_note_modelled
presets:
  - default_delta_properties
actions:
  - name: liner_note_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: liner_note_dim
    target: v_liner_note_silver
    description: "Load liner_note from silver for modelling"

  - name: liner_note_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_liner_note_silver
    target: v_liner_note_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_liner_note_silver

  - name: write_liner_note_modelled
    type: write
    source: v_liner_note_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "liner_note_modelled"

  - name: tst_liner_note_modelled_completeness
    type: test
    test_type: completeness
    source: v_liner_note_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-liner_note-M01"

  - name: tst_liner_note_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_liner_note_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-liner_note-M02"
