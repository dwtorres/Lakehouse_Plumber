pipeline: domain_t_modelled
flowgroup: stream_event_modelled
presets:
  - default_delta_properties
actions:
  - name: stream_event_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: stream_event_dim
    target: v_stream_event_silver
    description: "Load stream_event from silver for modelling"

  - name: stream_event_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_stream_event_silver
    target: v_stream_event_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_stream_event_silver

  - name: write_stream_event_modelled
    type: write
    source: v_stream_event_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "stream_event_modelled"

  - name: tst_stream_event_modelled_completeness
    type: test
    test_type: completeness
    source: v_stream_event_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-stream_event-M01"

  - name: tst_stream_event_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_stream_event_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-stream_event-M02"
