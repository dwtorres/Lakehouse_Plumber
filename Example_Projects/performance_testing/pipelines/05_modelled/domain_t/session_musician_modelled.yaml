pipeline: domain_t_modelled
flowgroup: session_musician_modelled
presets:
  - default_delta_properties
actions:
  - name: session_musician_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: session_musician_dim
    target: v_session_musician_silver
    description: "Load session_musician from silver for modelling"

  - name: session_musician_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_session_musician_silver
    target: v_session_musician_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_session_musician_silver

  - name: write_session_musician_modelled
    type: write
    source: v_session_musician_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "session_musician_modelled"

  - name: tst_session_musician_modelled_completeness
    type: test
    test_type: completeness
    source: v_session_musician_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-session_musician-M01"

  - name: tst_session_musician_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_session_musician_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-session_musician-M02"
