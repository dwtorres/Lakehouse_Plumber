pipeline: domain_n_modelled
flowgroup: reinsurance_modelled
presets:
  - default_delta_properties
actions:
  - name: reinsurance_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: reinsurance_fct
    target: v_reinsurance_silver
    description: "Load reinsurance from silver for modelling"

  - name: reinsurance_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_reinsurance_silver
    target: v_reinsurance_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_reinsurance_silver

  - name: write_reinsurance_modelled
    type: write
    source: v_reinsurance_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "reinsurance_modelled"

  - name: tst_reinsurance_modelled_completeness
    type: test
    test_type: completeness
    source: v_reinsurance_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-reinsurance-M01"

  - name: tst_reinsurance_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_reinsurance_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-reinsurance-M02"
