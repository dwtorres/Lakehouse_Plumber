pipeline: domain_n_modelled
flowgroup: commutation_modelled
presets:
  - default_delta_properties
actions:
  - name: commutation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: commutation_dim
    target: v_commutation_silver
    description: "Load commutation from silver for modelling"

  - name: commutation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_commutation_silver
    target: v_commutation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_commutation_silver

  - name: write_commutation_modelled
    type: write
    source: v_commutation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "commutation_modelled"

  - name: tst_commutation_modelled_completeness
    type: test
    test_type: completeness
    source: v_commutation_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-commutation-M01"

  - name: tst_commutation_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_commutation_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-commutation-M02"
