pipeline: domain_n_modelled
flowgroup: adjuster_modelled
presets:
  - default_delta_properties
actions:
  - name: adjuster_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: adjuster_fct
    target: v_adjuster_silver
    description: "Load adjuster from silver for modelling"

  - name: adjuster_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_adjuster_silver
    target: v_adjuster_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_adjuster_silver

  - name: write_adjuster_modelled
    type: write
    source: v_adjuster_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "adjuster_modelled"

  - name: tst_adjuster_modelled_completeness
    type: test
    test_type: completeness
    source: v_adjuster_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-adjuster-M01"

  - name: tst_adjuster_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_adjuster_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-adjuster-M02"
