pipeline: domain_n_modelled
flowgroup: endorsement_modelled
presets:
  - default_delta_properties
actions:
  - name: endorsement_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: endorsement_dim
    target: v_endorsement_silver
    description: "Load endorsement from silver for modelling"

  - name: endorsement_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_endorsement_silver
    target: v_endorsement_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_endorsement_silver

  - name: write_endorsement_modelled
    type: write
    source: v_endorsement_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "endorsement_modelled"

  - name: tst_endorsement_modelled_completeness
    type: test
    test_type: completeness
    source: v_endorsement_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-endorsement-M01"

  - name: tst_endorsement_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_endorsement_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-endorsement-M02"
