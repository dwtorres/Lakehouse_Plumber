pipeline: domain_n_modelled
flowgroup: risk_score_modelled
presets:
  - default_delta_properties
actions:
  - name: risk_score_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: risk_score_dim
    target: v_risk_score_silver
    description: "Load risk_score from silver for modelling"

  - name: risk_score_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_risk_score_silver
    target: v_risk_score_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_risk_score_silver

  - name: write_risk_score_modelled
    type: write
    source: v_risk_score_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "risk_score_modelled"

  - name: tst_risk_score_modelled_completeness
    type: test
    test_type: completeness
    source: v_risk_score_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-risk_score-M01"

  - name: tst_risk_score_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_risk_score_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-risk_score-M02"
