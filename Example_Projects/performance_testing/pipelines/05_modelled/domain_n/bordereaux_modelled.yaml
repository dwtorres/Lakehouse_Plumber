pipeline: domain_n_modelled
flowgroup: bordereaux_modelled
presets:
  - default_delta_properties
actions:
  - name: bordereaux_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: bordereaux_dim
    target: v_bordereaux_silver
    description: "Load bordereaux from silver for modelling"

  - name: bordereaux_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_bordereaux_silver
    target: v_bordereaux_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_bordereaux_silver

  - name: write_bordereaux_modelled
    type: write
    source: v_bordereaux_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "bordereaux_modelled"

  - name: tst_bordereaux_modelled_completeness
    type: test
    test_type: completeness
    source: v_bordereaux_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-bordereaux-M01"

  - name: tst_bordereaux_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_bordereaux_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-bordereaux-M02"
