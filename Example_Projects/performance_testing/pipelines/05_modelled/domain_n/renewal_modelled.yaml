pipeline: domain_n_modelled
flowgroup: renewal_modelled
presets:
  - default_delta_properties
actions:
  - name: renewal_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: renewal_dim
    target: v_renewal_silver
    description: "Load renewal from silver for modelling"

  - name: renewal_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_renewal_silver
    target: v_renewal_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_renewal_silver

  - name: write_renewal_modelled
    type: write
    source: v_renewal_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "renewal_modelled"

  - name: tst_renewal_modelled_completeness
    type: test
    test_type: completeness
    source: v_renewal_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-renewal-M01"

  - name: tst_renewal_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_renewal_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-renewal-M02"
