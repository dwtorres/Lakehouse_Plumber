pipeline: domain_n_modelled
flowgroup: broker_modelled
presets:
  - default_delta_properties
actions:
  - name: broker_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: broker_dim
    target: v_broker_silver
    description: "Load broker from silver for modelling"

  - name: broker_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_broker_silver
    target: v_broker_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_broker_silver

  - name: write_broker_modelled
    type: write
    source: v_broker_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "broker_modelled"

  - name: tst_broker_modelled_completeness
    type: test
    test_type: completeness
    source: v_broker_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-broker-M01"

  - name: tst_broker_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_broker_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-broker-M02"
