pipeline: domain_n_modelled
flowgroup: exclusion_modelled
presets:
  - default_delta_properties
actions:
  - name: exclusion_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: exclusion_fct
    target: v_exclusion_silver
    description: "Load exclusion from silver for modelling"

  - name: exclusion_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_exclusion_silver
    target: v_exclusion_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_exclusion_silver

  - name: write_exclusion_modelled
    type: write
    source: v_exclusion_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "exclusion_modelled"

  - name: tst_exclusion_modelled_completeness
    type: test
    test_type: completeness
    source: v_exclusion_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-exclusion-M01"

  - name: tst_exclusion_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_exclusion_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-exclusion-M02"
