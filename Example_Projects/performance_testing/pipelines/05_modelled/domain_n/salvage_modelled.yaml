pipeline: domain_n_modelled
flowgroup: salvage_modelled
presets:
  - default_delta_properties
actions:
  - name: salvage_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: salvage_dim
    target: v_salvage_silver
    description: "Load salvage from silver for modelling"

  - name: salvage_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_salvage_silver
    target: v_salvage_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_salvage_silver

  - name: write_salvage_modelled
    type: write
    source: v_salvage_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "salvage_modelled"

  - name: tst_salvage_modelled_completeness
    type: test
    test_type: completeness
    source: v_salvage_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-salvage-M01"

  - name: tst_salvage_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_salvage_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-salvage-M02"
