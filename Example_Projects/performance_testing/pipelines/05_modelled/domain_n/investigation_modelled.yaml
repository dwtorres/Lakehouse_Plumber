pipeline: domain_n_modelled
flowgroup: investigation_modelled
presets:
  - default_delta_properties
actions:
  - name: investigation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: investigation_dim
    target: v_investigation_silver
    description: "Load investigation from silver for modelling"

  - name: investigation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_investigation_silver
    target: v_investigation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_investigation_silver

  - name: write_investigation_modelled
    type: write
    source: v_investigation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "investigation_modelled"

  - name: tst_investigation_modelled_completeness
    type: test
    test_type: completeness
    source: v_investigation_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-investigation-M01"

  - name: tst_investigation_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_investigation_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-investigation-M02"
