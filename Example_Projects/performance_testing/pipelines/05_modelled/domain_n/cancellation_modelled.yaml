pipeline: domain_n_modelled
flowgroup: cancellation_modelled
presets:
  - default_delta_properties
actions:
  - name: cancellation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: cancellation_dim
    target: v_cancellation_silver
    description: "Load cancellation from silver for modelling"

  - name: cancellation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_cancellation_silver
    target: v_cancellation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_cancellation_silver

  - name: write_cancellation_modelled
    type: write
    source: v_cancellation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "cancellation_modelled"

  - name: tst_cancellation_modelled_completeness
    type: test
    test_type: completeness
    source: v_cancellation_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-cancellation-M01"

  - name: tst_cancellation_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_cancellation_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-cancellation-M02"
