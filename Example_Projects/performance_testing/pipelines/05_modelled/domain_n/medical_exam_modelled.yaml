pipeline: domain_n_modelled
flowgroup: medical_exam_modelled
presets:
  - default_delta_properties
actions:
  - name: medical_exam_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: medical_exam_dim
    target: v_medical_exam_silver
    description: "Load medical_exam from silver for modelling"

  - name: medical_exam_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_medical_exam_silver
    target: v_medical_exam_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_medical_exam_silver

  - name: write_medical_exam_modelled
    type: write
    source: v_medical_exam_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "medical_exam_modelled"

  - name: tst_medical_exam_modelled_completeness
    type: test
    test_type: completeness
    source: v_medical_exam_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-medical_exam-M01"

  - name: tst_medical_exam_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_medical_exam_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-medical_exam-M02"
