pipeline: domain_q_modelled
flowgroup: substitution_modelled
presets:
  - default_delta_properties
actions:
  - name: substitution_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: substitution_dim
    target: v_substitution_silver
    description: "Load substitution from silver for modelling"

  - name: substitution_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_substitution_silver
    target: v_substitution_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_substitution_silver

  - name: write_substitution_modelled
    type: write
    source: v_substitution_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "substitution_modelled"

  - name: tst_substitution_modelled_completeness
    type: test
    test_type: completeness
    source: v_substitution_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-substitution-M01"

  - name: tst_substitution_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_substitution_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-substitution-M02"
