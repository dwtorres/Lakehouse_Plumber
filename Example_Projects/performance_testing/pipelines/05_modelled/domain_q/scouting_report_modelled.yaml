pipeline: domain_q_modelled
flowgroup: scouting_report_modelled
presets:
  - default_delta_properties
actions:
  - name: scouting_report_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: scouting_report_dim
    target: v_scouting_report_silver
    description: "Load scouting_report from silver for modelling"

  - name: scouting_report_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_scouting_report_silver
    target: v_scouting_report_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_scouting_report_silver

  - name: write_scouting_report_modelled
    type: write
    source: v_scouting_report_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "scouting_report_modelled"

  - name: tst_scouting_report_modelled_completeness
    type: test
    test_type: completeness
    source: v_scouting_report_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-scouting_report-M01"

  - name: tst_scouting_report_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_scouting_report_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-scouting_report-M02"
