pipeline: domain_q_modelled
flowgroup: highlight_modelled
presets:
  - default_delta_properties
actions:
  - name: highlight_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: highlight_fct
    target: v_highlight_silver
    description: "Load highlight from silver for modelling"

  - name: highlight_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_highlight_silver
    target: v_highlight_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_highlight_silver

  - name: write_highlight_modelled
    type: write
    source: v_highlight_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "highlight_modelled"

  - name: tst_highlight_modelled_completeness
    type: test
    test_type: completeness
    source: v_highlight_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-highlight-M01"

  - name: tst_highlight_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_highlight_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-highlight-M02"
