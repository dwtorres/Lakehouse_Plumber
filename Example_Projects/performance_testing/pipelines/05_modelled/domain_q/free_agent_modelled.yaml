pipeline: domain_q_modelled
flowgroup: free_agent_modelled
presets:
  - default_delta_properties
actions:
  - name: free_agent_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: free_agent_fct
    target: v_free_agent_silver
    description: "Load free_agent from silver for modelling"

  - name: free_agent_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_free_agent_silver
    target: v_free_agent_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_free_agent_silver

  - name: write_free_agent_modelled
    type: write
    source: v_free_agent_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "free_agent_modelled"

  - name: tst_free_agent_modelled_completeness
    type: test
    test_type: completeness
    source: v_free_agent_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-free_agent-M01"

  - name: tst_free_agent_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_free_agent_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-free_agent-M02"
