pipeline: domain_q_modelled
flowgroup: merchandise_modelled
presets:
  - default_delta_properties
actions:
  - name: merchandise_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: merchandise_fct
    target: v_merchandise_silver
    description: "Load merchandise from silver for modelling"

  - name: merchandise_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_merchandise_silver
    target: v_merchandise_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_merchandise_silver

  - name: write_merchandise_modelled
    type: write
    source: v_merchandise_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "merchandise_modelled"

  - name: tst_merchandise_modelled_completeness
    type: test
    test_type: completeness
    source: v_merchandise_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-merchandise-M01"

  - name: tst_merchandise_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_merchandise_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-merchandise-M02"
