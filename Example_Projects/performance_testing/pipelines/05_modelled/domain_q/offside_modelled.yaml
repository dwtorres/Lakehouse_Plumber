pipeline: domain_q_modelled
flowgroup: offside_modelled
presets:
  - default_delta_properties
actions:
  - name: offside_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: offside_dim
    target: v_offside_silver
    description: "Load offside from silver for modelling"

  - name: offside_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_offside_silver
    target: v_offside_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_offside_silver

  - name: write_offside_modelled
    type: write
    source: v_offside_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "offside_modelled"

  - name: tst_offside_modelled_completeness
    type: test
    test_type: completeness
    source: v_offside_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-offside-M01"

  - name: tst_offside_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_offside_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-offside-M02"
