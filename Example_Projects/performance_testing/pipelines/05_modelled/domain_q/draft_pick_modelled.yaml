pipeline: domain_q_modelled
flowgroup: draft_pick_modelled
presets:
  - default_delta_properties
actions:
  - name: draft_pick_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: draft_pick_dim
    target: v_draft_pick_silver
    description: "Load draft_pick from silver for modelling"

  - name: draft_pick_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_draft_pick_silver
    target: v_draft_pick_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_draft_pick_silver

  - name: write_draft_pick_modelled
    type: write
    source: v_draft_pick_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "draft_pick_modelled"

  - name: tst_draft_pick_modelled_completeness
    type: test
    test_type: completeness
    source: v_draft_pick_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-draft_pick-M01"

  - name: tst_draft_pick_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_draft_pick_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-draft_pick-M02"
