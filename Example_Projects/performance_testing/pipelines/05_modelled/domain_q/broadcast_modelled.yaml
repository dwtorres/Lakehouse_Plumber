pipeline: domain_q_modelled
flowgroup: broadcast_modelled
presets:
  - default_delta_properties
actions:
  - name: broadcast_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: broadcast_dim
    target: v_broadcast_silver
    description: "Load broadcast from silver for modelling"

  - name: broadcast_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_broadcast_silver
    target: v_broadcast_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_broadcast_silver

  - name: write_broadcast_modelled
    type: write
    source: v_broadcast_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "broadcast_modelled"

  - name: tst_broadcast_modelled_completeness
    type: test
    test_type: completeness
    source: v_broadcast_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-broadcast-M01"

  - name: tst_broadcast_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_broadcast_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-broadcast-M02"
