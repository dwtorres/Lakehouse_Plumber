pipeline: domain_q_modelled
flowgroup: transfer_modelled
presets:
  - default_delta_properties
actions:
  - name: transfer_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: transfer_dim
    target: v_transfer_silver
    description: "Load transfer from silver for modelling"

  - name: transfer_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_transfer_silver
    target: v_transfer_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_transfer_silver

  - name: write_transfer_modelled
    type: write
    source: v_transfer_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "transfer_modelled"

  - name: tst_transfer_modelled_completeness
    type: test
    test_type: completeness
    source: v_transfer_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-transfer-M01"

  - name: tst_transfer_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_transfer_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-transfer-M02"
