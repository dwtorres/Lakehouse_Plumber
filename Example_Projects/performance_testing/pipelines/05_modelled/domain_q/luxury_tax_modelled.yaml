pipeline: domain_q_modelled
flowgroup: luxury_tax_modelled
presets:
  - default_delta_properties
actions:
  - name: luxury_tax_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: luxury_tax_dim
    target: v_luxury_tax_silver
    description: "Load luxury_tax from silver for modelling"

  - name: luxury_tax_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_luxury_tax_silver
    target: v_luxury_tax_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_luxury_tax_silver

  - name: write_luxury_tax_modelled
    type: write
    source: v_luxury_tax_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "luxury_tax_modelled"

  - name: tst_luxury_tax_modelled_completeness
    type: test
    test_type: completeness
    source: v_luxury_tax_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-luxury_tax-M01"

  - name: tst_luxury_tax_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_luxury_tax_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-luxury_tax-M02"
