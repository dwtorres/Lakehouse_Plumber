pipeline: domain_q_modelled
flowgroup: yellow_card_modelled
presets:
  - default_delta_properties
actions:
  - name: yellow_card_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: yellow_card_dim
    target: v_yellow_card_silver
    description: "Load yellow_card from silver for modelling"

  - name: yellow_card_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_yellow_card_silver
    target: v_yellow_card_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_yellow_card_silver

  - name: write_yellow_card_modelled
    type: write
    source: v_yellow_card_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "yellow_card_modelled"

  - name: tst_yellow_card_modelled_completeness
    type: test
    test_type: completeness
    source: v_yellow_card_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-yellow_card-M01"

  - name: tst_yellow_card_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_yellow_card_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-yellow_card-M02"
