pipeline: domain_q_modelled
flowgroup: match_replay_modelled
presets:
  - default_delta_properties
actions:
  - name: match_replay_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: match_replay_dim
    target: v_match_replay_silver
    description: "Load match_replay from silver for modelling"

  - name: match_replay_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_match_replay_silver
    target: v_match_replay_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_match_replay_silver

  - name: write_match_replay_modelled
    type: write
    source: v_match_replay_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "match_replay_modelled"

  - name: tst_match_replay_modelled_completeness
    type: test
    test_type: completeness
    source: v_match_replay_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-match_replay-M01"

  - name: tst_match_replay_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_match_replay_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-match_replay-M02"
