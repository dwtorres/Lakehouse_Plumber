pipeline: domain_q_modelled
flowgroup: corner_kick_modelled
presets:
  - default_delta_properties
actions:
  - name: corner_kick_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: corner_kick_fct
    target: v_corner_kick_silver
    description: "Load corner_kick from silver for modelling"

  - name: corner_kick_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_corner_kick_silver
    target: v_corner_kick_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_corner_kick_silver

  - name: write_corner_kick_modelled
    type: write
    source: v_corner_kick_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "corner_kick_modelled"

  - name: tst_corner_kick_modelled_completeness
    type: test
    test_type: completeness
    source: v_corner_kick_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-corner_kick-M01"

  - name: tst_corner_kick_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_corner_kick_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-corner_kick-M02"
