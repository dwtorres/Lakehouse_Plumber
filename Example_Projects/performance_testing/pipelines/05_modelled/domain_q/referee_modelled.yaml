pipeline: domain_q_modelled
flowgroup: referee_modelled
presets:
  - default_delta_properties
actions:
  - name: referee_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: referee_dim
    target: v_referee_silver
    description: "Load referee from silver for modelling"

  - name: referee_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_referee_silver
    target: v_referee_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_referee_silver

  - name: write_referee_modelled
    type: write
    source: v_referee_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "referee_modelled"

  - name: tst_referee_modelled_completeness
    type: test
    test_type: completeness
    source: v_referee_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-referee-M01"

  - name: tst_referee_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_referee_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-referee-M02"
