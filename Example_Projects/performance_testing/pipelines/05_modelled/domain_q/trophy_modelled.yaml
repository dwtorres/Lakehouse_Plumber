pipeline: domain_q_modelled
flowgroup: trophy_modelled
presets:
  - default_delta_properties
actions:
  - name: trophy_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: trophy_dim
    target: v_trophy_silver
    description: "Load trophy from silver for modelling"

  - name: trophy_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_trophy_silver
    target: v_trophy_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_trophy_silver

  - name: write_trophy_modelled
    type: write
    source: v_trophy_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "trophy_modelled"

  - name: tst_trophy_modelled_completeness
    type: test
    test_type: completeness
    source: v_trophy_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-trophy-M01"

  - name: tst_trophy_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_trophy_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-trophy-M02"
