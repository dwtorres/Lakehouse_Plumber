pipeline: domain_q_modelled
flowgroup: streaming_rights_modelled
presets:
  - default_delta_properties
actions:
  - name: streaming_rights_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: streaming_rights_dim
    target: v_streaming_rights_silver
    description: "Load streaming_rights from silver for modelling"

  - name: streaming_rights_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_streaming_rights_silver
    target: v_streaming_rights_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_streaming_rights_silver

  - name: write_streaming_rights_modelled
    type: write
    source: v_streaming_rights_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "streaming_rights_modelled"

  - name: tst_streaming_rights_modelled_completeness
    type: test
    test_type: completeness
    source: v_streaming_rights_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-streaming_rights-M01"

  - name: tst_streaming_rights_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_streaming_rights_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-streaming_rights-M02"
