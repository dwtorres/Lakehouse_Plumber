pipeline: domain_q_modelled
flowgroup: fan_modelled
presets:
  - default_delta_properties
actions:
  - name: fan_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: fan_fct
    target: v_fan_silver
    description: "Load fan from silver for modelling"

  - name: fan_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_fan_silver
    target: v_fan_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_fan_silver

  - name: write_fan_modelled
    type: write
    source: v_fan_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "fan_modelled"

  - name: tst_fan_modelled_completeness
    type: test
    test_type: completeness
    source: v_fan_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-fan-M01"

  - name: tst_fan_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_fan_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-fan-M02"
