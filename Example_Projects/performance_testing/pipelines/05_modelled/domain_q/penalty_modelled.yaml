pipeline: domain_q_modelled
flowgroup: penalty_modelled
presets:
  - default_delta_properties
actions:
  - name: penalty_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: penalty_fct
    target: v_penalty_silver
    description: "Load penalty from silver for modelling"

  - name: penalty_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_penalty_silver
    target: v_penalty_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_penalty_silver

  - name: write_penalty_modelled
    type: write
    source: v_penalty_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "penalty_modelled"

  - name: tst_penalty_modelled_completeness
    type: test
    test_type: completeness
    source: v_penalty_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-penalty-M01"

  - name: tst_penalty_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_penalty_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-penalty-M02"
