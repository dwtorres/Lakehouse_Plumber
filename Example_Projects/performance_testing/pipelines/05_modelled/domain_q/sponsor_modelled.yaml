pipeline: domain_q_modelled
flowgroup: sponsor_modelled
presets:
  - default_delta_properties
actions:
  - name: sponsor_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: sponsor_dim
    target: v_sponsor_silver
    description: "Load sponsor from silver for modelling"

  - name: sponsor_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_sponsor_silver
    target: v_sponsor_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_sponsor_silver

  - name: write_sponsor_modelled
    type: write
    source: v_sponsor_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "sponsor_modelled"

  - name: tst_sponsor_modelled_completeness
    type: test
    test_type: completeness
    source: v_sponsor_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-sponsor-M01"

  - name: tst_sponsor_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_sponsor_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-sponsor-M02"
