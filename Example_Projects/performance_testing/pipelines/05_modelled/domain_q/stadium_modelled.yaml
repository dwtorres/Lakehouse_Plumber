pipeline: domain_q_modelled
flowgroup: stadium_modelled
presets:
  - default_delta_properties
actions:
  - name: stadium_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: stadium_fct
    target: v_stadium_silver
    description: "Load stadium from silver for modelling"

  - name: stadium_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_stadium_silver
    target: v_stadium_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_stadium_silver

  - name: write_stadium_modelled
    type: write
    source: v_stadium_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "stadium_modelled"

  - name: tst_stadium_modelled_completeness
    type: test
    test_type: completeness
    source: v_stadium_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-stadium-M01"

  - name: tst_stadium_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_stadium_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-stadium-M02"
