pipeline: domain_p_modelled
flowgroup: mass_spec_modelled
presets:
  - default_delta_properties
actions:
  - name: mass_spec_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: mass_spec_dim
    target: v_mass_spec_silver
    description: "Load mass_spec from silver for modelling"

  - name: mass_spec_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_mass_spec_silver
    target: v_mass_spec_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_mass_spec_silver

  - name: write_mass_spec_modelled
    type: write
    source: v_mass_spec_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "mass_spec_modelled"

  - name: tst_mass_spec_modelled_completeness
    type: test
    test_type: completeness
    source: v_mass_spec_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-mass_spec-M01"

  - name: tst_mass_spec_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_mass_spec_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-mass_spec-M02"
