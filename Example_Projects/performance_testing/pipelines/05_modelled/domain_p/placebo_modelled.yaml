pipeline: domain_p_modelled
flowgroup: placebo_modelled
presets:
  - default_delta_properties
actions:
  - name: placebo_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: placebo_dim
    target: v_placebo_silver
    description: "Load placebo from silver for modelling"

  - name: placebo_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_placebo_silver
    target: v_placebo_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_placebo_silver

  - name: write_placebo_modelled
    type: write
    source: v_placebo_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "placebo_modelled"

  - name: tst_placebo_modelled_completeness
    type: test
    test_type: completeness
    source: v_placebo_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-placebo-M01"

  - name: tst_placebo_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_placebo_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-placebo-M02"
