pipeline: domain_p_modelled
flowgroup: gene_modelled
presets:
  - default_delta_properties
actions:
  - name: gene_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: gene_fct
    target: v_gene_silver
    description: "Load gene from silver for modelling"

  - name: gene_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_gene_silver
    target: v_gene_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_gene_silver

  - name: write_gene_modelled
    type: write
    source: v_gene_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "gene_modelled"

  - name: tst_gene_modelled_completeness
    type: test
    test_type: completeness
    source: v_gene_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-gene-M01"

  - name: tst_gene_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_gene_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-gene-M02"
