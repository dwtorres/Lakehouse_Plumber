pipeline: domain_p_modelled
flowgroup: bioinformatics_pipeline_modelled
presets:
  - default_delta_properties
actions:
  - name: bioinformatics_pipeline_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: bioinformatics_pipeline_fct
    target: v_bioinformatics_pipeline_silver
    description: "Load bioinformatics_pipeline from silver for modelling"

  - name: bioinformatics_pipeline_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_bioinformatics_pipeline_silver
    target: v_bioinformatics_pipeline_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_bioinformatics_pipeline_silver

  - name: write_bioinformatics_pipeline_modelled
    type: write
    source: v_bioinformatics_pipeline_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "bioinformatics_pipeline_modelled"

  - name: tst_bioinformatics_pipeline_modelled_completeness
    type: test
    test_type: completeness
    source: v_bioinformatics_pipeline_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-bioinformatics_pipeline-M01"

  - name: tst_bioinformatics_pipeline_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_bioinformatics_pipeline_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-bioinformatics_pipeline-M02"
