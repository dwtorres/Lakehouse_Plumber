pipeline: domain_p_modelled
flowgroup: pathway_modelled
presets:
  - default_delta_properties
actions:
  - name: pathway_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: pathway_dim
    target: v_pathway_silver
    description: "Load pathway from silver for modelling"

  - name: pathway_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_pathway_silver
    target: v_pathway_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_pathway_silver

  - name: write_pathway_modelled
    type: write
    source: v_pathway_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "pathway_modelled"

  - name: tst_pathway_modelled_completeness
    type: test
    test_type: completeness
    source: v_pathway_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-pathway-M01"

  - name: tst_pathway_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_pathway_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-pathway-M02"
