pipeline: domain_p_modelled
flowgroup: allele_modelled
presets:
  - default_delta_properties
actions:
  - name: allele_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: allele_dim
    target: v_allele_silver
    description: "Load allele from silver for modelling"

  - name: allele_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_allele_silver
    target: v_allele_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_allele_silver

  - name: write_allele_modelled
    type: write
    source: v_allele_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "allele_modelled"

  - name: tst_allele_modelled_completeness
    type: test
    test_type: completeness
    source: v_allele_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-allele-M01"

  - name: tst_allele_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_allele_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-allele-M02"
