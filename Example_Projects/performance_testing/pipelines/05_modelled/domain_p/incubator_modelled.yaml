pipeline: domain_p_modelled
flowgroup: incubator_modelled
presets:
  - default_delta_properties
actions:
  - name: incubator_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: incubator_dim
    target: v_incubator_silver
    description: "Load incubator from silver for modelling"

  - name: incubator_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_incubator_silver
    target: v_incubator_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_incubator_silver

  - name: write_incubator_modelled
    type: write
    source: v_incubator_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "incubator_modelled"

  - name: tst_incubator_modelled_completeness
    type: test
    test_type: completeness
    source: v_incubator_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-incubator-M01"

  - name: tst_incubator_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_incubator_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-incubator-M02"
