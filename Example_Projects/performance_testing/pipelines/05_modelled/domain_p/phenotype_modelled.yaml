pipeline: domain_p_modelled
flowgroup: phenotype_modelled
presets:
  - default_delta_properties
actions:
  - name: phenotype_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: phenotype_fct
    target: v_phenotype_silver
    description: "Load phenotype from silver for modelling"

  - name: phenotype_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_phenotype_silver
    target: v_phenotype_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_phenotype_silver

  - name: write_phenotype_modelled
    type: write
    source: v_phenotype_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "phenotype_modelled"

  - name: tst_phenotype_modelled_completeness
    type: test
    test_type: completeness
    source: v_phenotype_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-phenotype-M01"

  - name: tst_phenotype_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_phenotype_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-phenotype-M02"
