pipeline: domain_p_modelled
flowgroup: compound_modelled
presets:
  - default_delta_properties
actions:
  - name: compound_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: compound_fct
    target: v_compound_silver
    description: "Load compound from silver for modelling"

  - name: compound_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_compound_silver
    target: v_compound_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_compound_silver

  - name: write_compound_modelled
    type: write
    source: v_compound_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "compound_modelled"

  - name: tst_compound_modelled_completeness
    type: test
    test_type: completeness
    source: v_compound_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-compound-M01"

  - name: tst_compound_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_compound_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-compound-M02"
