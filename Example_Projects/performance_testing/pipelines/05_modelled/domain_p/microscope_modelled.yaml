pipeline: domain_p_modelled
flowgroup: microscope_modelled
presets:
  - default_delta_properties
actions:
  - name: microscope_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: microscope_dim
    target: v_microscope_silver
    description: "Load microscope from silver for modelling"

  - name: microscope_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_microscope_silver
    target: v_microscope_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_microscope_silver

  - name: write_microscope_modelled
    type: write
    source: v_microscope_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "microscope_modelled"

  - name: tst_microscope_modelled_completeness
    type: test
    test_type: completeness
    source: v_microscope_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-microscope-M01"

  - name: tst_microscope_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_microscope_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-microscope-M02"
