pipeline: domain_p_modelled
flowgroup: western_blot_modelled
presets:
  - default_delta_properties
actions:
  - name: western_blot_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: western_blot_dim
    target: v_western_blot_silver
    description: "Load western_blot from silver for modelling"

  - name: western_blot_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_western_blot_silver
    target: v_western_blot_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_western_blot_silver

  - name: write_western_blot_modelled
    type: write
    source: v_western_blot_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "western_blot_modelled"

  - name: tst_western_blot_modelled_completeness
    type: test
    test_type: completeness
    source: v_western_blot_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-western_blot-M01"

  - name: tst_western_blot_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_western_blot_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-western_blot-M02"
