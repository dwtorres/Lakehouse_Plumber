pipeline: domain_p_modelled
flowgroup: pharmacokinetics_modelled
presets:
  - default_delta_properties
actions:
  - name: pharmacokinetics_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: pharmacokinetics_fct
    target: v_pharmacokinetics_silver
    description: "Load pharmacokinetics from silver for modelling"

  - name: pharmacokinetics_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_pharmacokinetics_silver
    target: v_pharmacokinetics_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_pharmacokinetics_silver

  - name: write_pharmacokinetics_modelled
    type: write
    source: v_pharmacokinetics_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "pharmacokinetics_modelled"

  - name: tst_pharmacokinetics_modelled_completeness
    type: test
    test_type: completeness
    source: v_pharmacokinetics_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-pharmacokinetics-M01"

  - name: tst_pharmacokinetics_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_pharmacokinetics_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-pharmacokinetics-M02"
