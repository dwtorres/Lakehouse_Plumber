pipeline: domain_p_modelled
flowgroup: chromosome_modelled
presets:
  - default_delta_properties
actions:
  - name: chromosome_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: chromosome_fct
    target: v_chromosome_silver
    description: "Load chromosome from silver for modelling"

  - name: chromosome_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_chromosome_silver
    target: v_chromosome_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_chromosome_silver

  - name: write_chromosome_modelled
    type: write
    source: v_chromosome_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "chromosome_modelled"

  - name: tst_chromosome_modelled_completeness
    type: test
    test_type: completeness
    source: v_chromosome_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-chromosome-M01"

  - name: tst_chromosome_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_chromosome_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-chromosome-M02"
