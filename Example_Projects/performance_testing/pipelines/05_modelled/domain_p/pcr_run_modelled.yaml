pipeline: domain_p_modelled
flowgroup: pcr_run_modelled
presets:
  - default_delta_properties
actions:
  - name: pcr_run_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: pcr_run_fct
    target: v_pcr_run_silver
    description: "Load pcr_run from silver for modelling"

  - name: pcr_run_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_pcr_run_silver
    target: v_pcr_run_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_pcr_run_silver

  - name: write_pcr_run_modelled
    type: write
    source: v_pcr_run_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "pcr_run_modelled"

  - name: tst_pcr_run_modelled_completeness
    type: test
    test_type: completeness
    source: v_pcr_run_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-pcr_run-M01"

  - name: tst_pcr_run_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_pcr_run_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-pcr_run-M02"
