pipeline: domain_p_modelled
flowgroup: sequence_modelled
presets:
  - default_delta_properties
actions:
  - name: sequence_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: sequence_dim
    target: v_sequence_silver
    description: "Load sequence from silver for modelling"

  - name: sequence_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_sequence_silver
    target: v_sequence_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_sequence_silver

  - name: write_sequence_modelled
    type: write
    source: v_sequence_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "sequence_modelled"

  - name: tst_sequence_modelled_completeness
    type: test
    test_type: completeness
    source: v_sequence_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-sequence-M01"

  - name: tst_sequence_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_sequence_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-sequence-M02"
