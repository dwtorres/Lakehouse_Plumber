pipeline: domain_p_modelled
flowgroup: sample_modelled
presets:
  - default_delta_properties
actions:
  - name: sample_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: sample_dim
    target: v_sample_silver
    description: "Load sample from silver for modelling"

  - name: sample_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_sample_silver
    target: v_sample_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_sample_silver

  - name: write_sample_modelled
    type: write
    source: v_sample_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "sample_modelled"

  - name: tst_sample_modelled_completeness
    type: test
    test_type: completeness
    source: v_sample_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-sample-M01"

  - name: tst_sample_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_sample_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-sample-M02"
