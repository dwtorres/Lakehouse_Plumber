pipeline: domain_p_modelled
flowgroup: annotation_modelled
presets:
  - default_delta_properties
actions:
  - name: annotation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: annotation_fct
    target: v_annotation_silver
    description: "Load annotation from silver for modelling"

  - name: annotation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_annotation_silver
    target: v_annotation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_annotation_silver

  - name: write_annotation_modelled
    type: write
    source: v_annotation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "annotation_modelled"

  - name: tst_annotation_modelled_completeness
    type: test
    test_type: completeness
    source: v_annotation_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-annotation-M01"

  - name: tst_annotation_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_annotation_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-annotation-M02"
