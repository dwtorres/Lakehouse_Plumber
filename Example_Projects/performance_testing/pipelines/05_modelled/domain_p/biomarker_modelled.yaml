pipeline: domain_p_modelled
flowgroup: biomarker_modelled
presets:
  - default_delta_properties
actions:
  - name: biomarker_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: biomarker_dim
    target: v_biomarker_silver
    description: "Load biomarker from silver for modelling"

  - name: biomarker_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_biomarker_silver
    target: v_biomarker_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_biomarker_silver

  - name: write_biomarker_modelled
    type: write
    source: v_biomarker_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "biomarker_modelled"

  - name: tst_biomarker_modelled_completeness
    type: test
    test_type: completeness
    source: v_biomarker_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-biomarker-M01"

  - name: tst_biomarker_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_biomarker_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-biomarker-M02"
