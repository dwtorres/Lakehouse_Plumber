pipeline: domain_p_modelled
flowgroup: trial_modelled
presets:
  - default_delta_properties
actions:
  - name: trial_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: trial_fct
    target: v_trial_silver
    description: "Load trial from silver for modelling"

  - name: trial_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_trial_silver
    target: v_trial_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_trial_silver

  - name: write_trial_modelled
    type: write
    source: v_trial_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "trial_modelled"

  - name: tst_trial_modelled_completeness
    type: test
    test_type: completeness
    source: v_trial_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-trial-M01"

  - name: tst_trial_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_trial_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-trial-M02"
