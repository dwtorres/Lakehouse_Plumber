pipeline: domain_p_modelled
flowgroup: rna_extract_modelled
presets:
  - default_delta_properties
actions:
  - name: rna_extract_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: rna_extract_dim
    target: v_rna_extract_silver
    description: "Load rna_extract from silver for modelling"

  - name: rna_extract_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_rna_extract_silver
    target: v_rna_extract_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_rna_extract_silver

  - name: write_rna_extract_modelled
    type: write
    source: v_rna_extract_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "rna_extract_modelled"

  - name: tst_rna_extract_modelled_completeness
    type: test
    test_type: completeness
    source: v_rna_extract_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-rna_extract-M01"

  - name: tst_rna_extract_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_rna_extract_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-rna_extract-M02"
