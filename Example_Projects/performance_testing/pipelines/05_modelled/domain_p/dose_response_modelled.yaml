pipeline: domain_p_modelled
flowgroup: dose_response_modelled
presets:
  - default_delta_properties
actions:
  - name: dose_response_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: dose_response_dim
    target: v_dose_response_silver
    description: "Load dose_response from silver for modelling"

  - name: dose_response_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_dose_response_silver
    target: v_dose_response_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_dose_response_silver

  - name: write_dose_response_modelled
    type: write
    source: v_dose_response_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "dose_response_modelled"

  - name: tst_dose_response_modelled_completeness
    type: test
    test_type: completeness
    source: v_dose_response_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-dose_response-M01"

  - name: tst_dose_response_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_dose_response_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-dose_response-M02"
