pipeline: domain_p_modelled
flowgroup: culture_modelled
presets:
  - default_delta_properties
actions:
  - name: culture_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: culture_fct
    target: v_culture_silver
    description: "Load culture from silver for modelling"

  - name: culture_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_culture_silver
    target: v_culture_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_culture_silver

  - name: write_culture_modelled
    type: write
    source: v_culture_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "culture_modelled"

  - name: tst_culture_modelled_completeness
    type: test
    test_type: completeness
    source: v_culture_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-culture-M01"

  - name: tst_culture_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_culture_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-culture-M02"
