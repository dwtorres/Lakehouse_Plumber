pipeline: domain_g_modelled
flowgroup: hoa_modelled
presets:
  - default_delta_properties
actions:
  - name: hoa_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: hoa_dim
    target: v_hoa_silver
    description: "Load hoa from silver for modelling"

  - name: hoa_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_hoa_silver
    target: v_hoa_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_hoa_silver

  - name: write_hoa_modelled
    type: write
    source: v_hoa_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "hoa_modelled"

  - name: tst_hoa_modelled_completeness
    type: test
    test_type: completeness
    source: v_hoa_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-hoa-M01"

  - name: tst_hoa_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_hoa_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-hoa-M02"
