pipeline: domain_g_modelled
flowgroup: property_modelled
presets:
  - default_delta_properties
actions:
  - name: property_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: property_fct
    target: v_property_silver
    description: "Load property from silver for modelling"

  - name: property_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_property_silver
    target: v_property_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_property_silver

  - name: write_property_modelled
    type: write
    source: v_property_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "property_modelled"

  - name: tst_property_modelled_completeness
    type: test
    test_type: completeness
    source: v_property_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-property-M01"

  - name: tst_property_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_property_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-property-M02"
