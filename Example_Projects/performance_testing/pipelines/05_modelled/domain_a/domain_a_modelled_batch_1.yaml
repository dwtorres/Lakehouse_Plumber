pipeline: domain_a_modelled
flowgroup: customer_modelled
presets:
  - default_delta_properties
actions:
  - name: customer_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: customer_fct
    target: v_customer_silver
    description: "Load customer from silver for modelling"

  - name: customer_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_customer_silver
    target: v_customer_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_customer_silver

  - name: write_customer_modelled
    type: write
    source: v_customer_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "customer_modelled"

  - name: tst_customer_modelled_completeness
    type: test
    test_type: completeness
    source: v_customer_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-customer-M01"

  - name: tst_customer_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_customer_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-customer-M02"
