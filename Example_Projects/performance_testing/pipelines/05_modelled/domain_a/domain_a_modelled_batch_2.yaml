pipeline: domain_a_modelled
flowgroup: return_request_modelled
presets:
  - default_delta_properties
actions:
  - name: return_request_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: return_request_dim
    target: v_return_request_silver
    description: "Load return_request from silver for modelling"

  - name: return_request_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_return_request_silver
    target: v_return_request_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_return_request_silver

  - name: write_return_request_modelled
    type: write
    source: v_return_request_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "return_request_modelled"

  - name: tst_return_request_modelled_completeness
    type: test
    test_type: completeness
    source: v_return_request_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-return_request-M01"

  - name: tst_return_request_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_return_request_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-return_request-M02"
