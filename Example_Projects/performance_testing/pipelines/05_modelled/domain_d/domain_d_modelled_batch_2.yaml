pipeline: domain_d_modelled
flowgroup: nursing_note_modelled
presets:
  - default_delta_properties
actions:
  - name: nursing_note_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: nursing_note_dim
    target: v_nursing_note_silver
    description: "Load nursing_note from silver for modelling"

  - name: nursing_note_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_nursing_note_silver
    target: v_nursing_note_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_nursing_note_silver

  - name: write_nursing_note_modelled
    type: write
    source: v_nursing_note_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "nursing_note_modelled"

  - name: tst_nursing_note_modelled_completeness
    type: test
    test_type: completeness
    source: v_nursing_note_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-nursing_note-M01"

  - name: tst_nursing_note_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_nursing_note_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-nursing_note-M02"
