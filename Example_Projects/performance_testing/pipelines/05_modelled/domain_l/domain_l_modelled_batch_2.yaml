pipeline: domain_l_modelled
flowgroup: prep_station_modelled
presets:
  - default_delta_properties
actions:
  - name: prep_station_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: prep_station_dim
    target: v_prep_station_silver
    description: "Load prep_station from silver for modelling"

  - name: prep_station_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_prep_station_silver
    target: v_prep_station_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_prep_station_silver

  - name: write_prep_station_modelled
    type: write
    source: v_prep_station_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "prep_station_modelled"

  - name: tst_prep_station_modelled_completeness
    type: test
    test_type: completeness
    source: v_prep_station_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-prep_station-M01"

  - name: tst_prep_station_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_prep_station_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-prep_station-M02"
