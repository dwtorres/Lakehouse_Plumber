pipeline: domain_l_modelled
flowgroup: restaurant_modelled
presets:
  - default_delta_properties
actions:
  - name: restaurant_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: restaurant_fct
    target: v_restaurant_silver
    description: "Load restaurant from silver for modelling"

  - name: restaurant_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_restaurant_silver
    target: v_restaurant_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_restaurant_silver

  - name: write_restaurant_modelled
    type: write
    source: v_restaurant_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "restaurant_modelled"

  - name: tst_restaurant_modelled_completeness
    type: test
    test_type: completeness
    source: v_restaurant_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-restaurant-M01"

  - name: tst_restaurant_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_restaurant_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-restaurant-M02"
