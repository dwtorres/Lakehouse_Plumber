pipeline: domain_s_modelled
flowgroup: humidity_log_modelled
presets:
  - default_delta_properties
actions:
  - name: humidity_log_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: humidity_log_fct
    target: v_humidity_log_silver
    description: "Load humidity_log from silver for modelling"

  - name: humidity_log_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_humidity_log_silver
    target: v_humidity_log_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_humidity_log_silver

  - name: write_humidity_log_modelled
    type: write
    source: v_humidity_log_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "humidity_log_modelled"

  - name: tst_humidity_log_modelled_completeness
    type: test
    test_type: completeness
    source: v_humidity_log_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-humidity_log-M01"

  - name: tst_humidity_log_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_humidity_log_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-humidity_log-M02"
