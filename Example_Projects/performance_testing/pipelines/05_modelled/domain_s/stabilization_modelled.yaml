pipeline: domain_s_modelled
flowgroup: stabilization_modelled
presets:
  - default_delta_properties
actions:
  - name: stabilization_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: stabilization_dim
    target: v_stabilization_silver
    description: "Load stabilization from silver for modelling"

  - name: stabilization_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_stabilization_silver
    target: v_stabilization_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_stabilization_silver

  - name: write_stabilization_modelled
    type: write
    source: v_stabilization_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "stabilization_modelled"

  - name: tst_stabilization_modelled_completeness
    type: test
    test_type: completeness
    source: v_stabilization_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-stabilization-M01"

  - name: tst_stabilization_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_stabilization_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-stabilization-M02"
