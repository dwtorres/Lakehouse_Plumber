pipeline: domain_s_modelled
flowgroup: case_production_modelled
presets:
  - default_delta_properties
actions:
  - name: case_production_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: case_production_dim
    target: v_case_production_silver
    description: "Load case_production from silver for modelling"

  - name: case_production_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_case_production_silver
    target: v_case_production_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_case_production_silver

  - name: write_case_production_modelled
    type: write
    source: v_case_production_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "case_production_modelled"

  - name: tst_case_production_modelled_completeness
    type: test
    test_type: completeness
    source: v_case_production_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-case_production-M01"

  - name: tst_case_production_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_case_production_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-case_production-M02"
