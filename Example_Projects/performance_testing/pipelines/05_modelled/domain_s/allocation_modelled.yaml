pipeline: domain_s_modelled
flowgroup: allocation_modelled
presets:
  - default_delta_properties
actions:
  - name: allocation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: allocation_dim
    target: v_allocation_silver
    description: "Load allocation from silver for modelling"

  - name: allocation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_allocation_silver
    target: v_allocation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_allocation_silver

  - name: write_allocation_modelled
    type: write
    source: v_allocation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "allocation_modelled"

  - name: tst_allocation_modelled_completeness
    type: test
    test_type: completeness
    source: v_allocation_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-allocation-M01"

  - name: tst_allocation_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_allocation_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-allocation-M02"
