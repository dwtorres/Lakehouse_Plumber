pipeline: domain_s_modelled
flowgroup: fining_modelled
presets:
  - default_delta_properties
actions:
  - name: fining_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: fining_dim
    target: v_fining_silver
    description: "Load fining from silver for modelling"

  - name: fining_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_fining_silver
    target: v_fining_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_fining_silver

  - name: write_fining_modelled
    type: write
    source: v_fining_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "fining_modelled"

  - name: tst_fining_modelled_completeness
    type: test
    test_type: completeness
    source: v_fining_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-fining-M01"

  - name: tst_fining_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_fining_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-fining-M02"
