pipeline: domain_s_modelled
flowgroup: malolactic_modelled
presets:
  - default_delta_properties
actions:
  - name: malolactic_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: malolactic_dim
    target: v_malolactic_silver
    description: "Load malolactic from silver for modelling"

  - name: malolactic_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_malolactic_silver
    target: v_malolactic_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_malolactic_silver

  - name: write_malolactic_modelled
    type: write
    source: v_malolactic_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "malolactic_modelled"

  - name: tst_malolactic_modelled_completeness
    type: test
    test_type: completeness
    source: v_malolactic_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-malolactic-M01"

  - name: tst_malolactic_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_malolactic_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-malolactic-M02"
