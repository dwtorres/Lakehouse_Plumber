pipeline: domain_s_modelled
flowgroup: fermentation_modelled
presets:
  - default_delta_properties
actions:
  - name: fermentation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: fermentation_fct
    target: v_fermentation_silver
    description: "Load fermentation from silver for modelling"

  - name: fermentation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_fermentation_silver
    target: v_fermentation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_fermentation_silver

  - name: write_fermentation_modelled
    type: write
    source: v_fermentation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "fermentation_modelled"

  - name: tst_fermentation_modelled_completeness
    type: test
    test_type: completeness
    source: v_fermentation_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-fermentation-M01"

  - name: tst_fermentation_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_fermentation_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-fermentation-M02"
