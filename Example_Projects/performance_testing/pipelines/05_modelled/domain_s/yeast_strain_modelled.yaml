pipeline: domain_s_modelled
flowgroup: yeast_strain_modelled
presets:
  - default_delta_properties
actions:
  - name: yeast_strain_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: yeast_strain_fct
    target: v_yeast_strain_silver
    description: "Load yeast_strain from silver for modelling"

  - name: yeast_strain_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_yeast_strain_silver
    target: v_yeast_strain_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_yeast_strain_silver

  - name: write_yeast_strain_modelled
    type: write
    source: v_yeast_strain_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "yeast_strain_modelled"

  - name: tst_yeast_strain_modelled_completeness
    type: test
    test_type: completeness
    source: v_yeast_strain_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-yeast_strain-M01"

  - name: tst_yeast_strain_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_yeast_strain_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-yeast_strain-M02"
