pipeline: domain_s_modelled
flowgroup: vineyard_modelled
presets:
  - default_delta_properties
actions:
  - name: vineyard_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: vineyard_fct
    target: v_vineyard_silver
    description: "Load vineyard from silver for modelling"

  - name: vineyard_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_vineyard_silver
    target: v_vineyard_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_vineyard_silver

  - name: write_vineyard_modelled
    type: write
    source: v_vineyard_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "vineyard_modelled"

  - name: tst_vineyard_modelled_completeness
    type: test
    test_type: completeness
    source: v_vineyard_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-vineyard-M01"

  - name: tst_vineyard_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_vineyard_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-vineyard-M02"
