pipeline: domain_s_modelled
flowgroup: capsule_modelled
presets:
  - default_delta_properties
actions:
  - name: capsule_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: capsule_dim
    target: v_capsule_silver
    description: "Load capsule from silver for modelling"

  - name: capsule_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_capsule_silver
    target: v_capsule_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_capsule_silver

  - name: write_capsule_modelled
    type: write
    source: v_capsule_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "capsule_modelled"

  - name: tst_capsule_modelled_completeness
    type: test
    test_type: completeness
    source: v_capsule_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-capsule-M01"

  - name: tst_capsule_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_capsule_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-capsule-M02"
