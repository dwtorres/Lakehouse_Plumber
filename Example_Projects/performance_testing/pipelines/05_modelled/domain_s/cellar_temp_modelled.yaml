pipeline: domain_s_modelled
flowgroup: cellar_temp_modelled
presets:
  - default_delta_properties
actions:
  - name: cellar_temp_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: cellar_temp_dim
    target: v_cellar_temp_silver
    description: "Load cellar_temp from silver for modelling"

  - name: cellar_temp_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_cellar_temp_silver
    target: v_cellar_temp_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_cellar_temp_silver

  - name: write_cellar_temp_modelled
    type: write
    source: v_cellar_temp_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "cellar_temp_modelled"

  - name: tst_cellar_temp_modelled_completeness
    type: test
    test_type: completeness
    source: v_cellar_temp_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-cellar_temp-M01"

  - name: tst_cellar_temp_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_cellar_temp_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-cellar_temp-M02"
