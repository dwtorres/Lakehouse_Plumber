pipeline: domain_s_modelled
flowgroup: oak_origin_modelled
presets:
  - default_delta_properties
actions:
  - name: oak_origin_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: oak_origin_dim
    target: v_oak_origin_silver
    description: "Load oak_origin from silver for modelling"

  - name: oak_origin_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_oak_origin_silver
    target: v_oak_origin_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_oak_origin_silver

  - name: write_oak_origin_modelled
    type: write
    source: v_oak_origin_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "oak_origin_modelled"

  - name: tst_oak_origin_modelled_completeness
    type: test
    test_type: completeness
    source: v_oak_origin_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-oak_origin-M01"

  - name: tst_oak_origin_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_oak_origin_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-oak_origin-M02"
