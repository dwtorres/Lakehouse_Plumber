pipeline: domain_s_modelled
flowgroup: appellation_modelled
presets:
  - default_delta_properties
actions:
  - name: appellation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: appellation_dim
    target: v_appellation_silver
    description: "Load appellation from silver for modelling"

  - name: appellation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_appellation_silver
    target: v_appellation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_appellation_silver

  - name: write_appellation_modelled
    type: write
    source: v_appellation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "appellation_modelled"

  - name: tst_appellation_modelled_completeness
    type: test
    test_type: completeness
    source: v_appellation_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-appellation-M01"

  - name: tst_appellation_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_appellation_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-appellation-M02"
