pipeline: domain_m_modelled
flowgroup: gateway_modelled
presets:
  - default_delta_properties
actions:
  - name: gateway_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: gateway_dim
    target: v_gateway_silver
    description: "Load gateway from silver for modelling"

  - name: gateway_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_gateway_silver
    target: v_gateway_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_gateway_silver

  - name: write_gateway_modelled
    type: write
    source: v_gateway_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "gateway_modelled"

  - name: tst_gateway_modelled_completeness
    type: test
    test_type: completeness
    source: v_gateway_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-gateway-M01"

  - name: tst_gateway_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_gateway_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-gateway-M02"
