pipeline: domain_m_modelled
flowgroup: edge_node_modelled
presets:
  - default_delta_properties
actions:
  - name: edge_node_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: edge_node_dim
    target: v_edge_node_silver
    description: "Load edge_node from silver for modelling"

  - name: edge_node_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_edge_node_silver
    target: v_edge_node_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_edge_node_silver

  - name: write_edge_node_modelled
    type: write
    source: v_edge_node_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "edge_node_modelled"

  - name: tst_edge_node_modelled_completeness
    type: test
    test_type: completeness
    source: v_edge_node_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-edge_node-M01"

  - name: tst_edge_node_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_edge_node_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-edge_node-M02"
