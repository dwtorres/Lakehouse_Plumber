pipeline: domain_m_modelled
flowgroup: archival_modelled
presets:
  - default_delta_properties
actions:
  - name: archival_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: archival_fct
    target: v_archival_silver
    description: "Load archival from silver for modelling"

  - name: archival_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_archival_silver
    target: v_archival_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_archival_silver

  - name: write_archival_modelled
    type: write
    source: v_archival_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "archival_modelled"

  - name: tst_archival_modelled_completeness
    type: test
    test_type: completeness
    source: v_archival_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-archival-M01"

  - name: tst_archival_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_archival_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-archival-M02"
