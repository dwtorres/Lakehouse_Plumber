pipeline: domain_m_modelled
flowgroup: simulation_modelled
presets:
  - default_delta_properties
actions:
  - name: simulation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: simulation_fct
    target: v_simulation_silver
    description: "Load simulation from silver for modelling"

  - name: simulation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_simulation_silver
    target: v_simulation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_simulation_silver

  - name: write_simulation_modelled
    type: write
    source: v_simulation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "simulation_modelled"

  - name: tst_simulation_modelled_completeness
    type: test
    test_type: completeness
    source: v_simulation_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-simulation-M01"

  - name: tst_simulation_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_simulation_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-simulation-M02"
