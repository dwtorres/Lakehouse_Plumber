pipeline: domain_m_modelled
flowgroup: threshold_modelled
presets:
  - default_delta_properties
actions:
  - name: threshold_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: threshold_dim
    target: v_threshold_silver
    description: "Load threshold from silver for modelling"

  - name: threshold_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_threshold_silver
    target: v_threshold_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_threshold_silver

  - name: write_threshold_modelled
    type: write
    source: v_threshold_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "threshold_modelled"

  - name: tst_threshold_modelled_completeness
    type: test
    test_type: completeness
    source: v_threshold_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-threshold-M01"

  - name: tst_threshold_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_threshold_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-threshold-M02"
