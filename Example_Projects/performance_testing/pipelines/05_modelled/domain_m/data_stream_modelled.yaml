pipeline: domain_m_modelled
flowgroup: data_stream_modelled
presets:
  - default_delta_properties
actions:
  - name: data_stream_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: data_stream_fct
    target: v_data_stream_silver
    description: "Load data_stream from silver for modelling"

  - name: data_stream_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_data_stream_silver
    target: v_data_stream_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_data_stream_silver

  - name: write_data_stream_modelled
    type: write
    source: v_data_stream_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "data_stream_modelled"

  - name: tst_data_stream_modelled_completeness
    type: test
    test_type: completeness
    source: v_data_stream_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-data_stream-M01"

  - name: tst_data_stream_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_data_stream_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-data_stream-M02"
