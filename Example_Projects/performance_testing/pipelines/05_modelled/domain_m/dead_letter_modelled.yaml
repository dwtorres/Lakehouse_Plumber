pipeline: domain_m_modelled
flowgroup: dead_letter_modelled
presets:
  - default_delta_properties
actions:
  - name: dead_letter_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: dead_letter_dim
    target: v_dead_letter_silver
    description: "Load dead_letter from silver for modelling"

  - name: dead_letter_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_dead_letter_silver
    target: v_dead_letter_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_dead_letter_silver

  - name: write_dead_letter_modelled
    type: write
    source: v_dead_letter_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "dead_letter_modelled"

  - name: tst_dead_letter_modelled_completeness
    type: test
    test_type: completeness
    source: v_dead_letter_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-dead_letter-M01"

  - name: tst_dead_letter_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_dead_letter_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-dead_letter-M02"
