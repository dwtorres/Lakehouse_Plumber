pipeline: domain_m_modelled
flowgroup: mqtt_topic_modelled
presets:
  - default_delta_properties
actions:
  - name: mqtt_topic_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: mqtt_topic_fct
    target: v_mqtt_topic_silver
    description: "Load mqtt_topic from silver for modelling"

  - name: mqtt_topic_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_mqtt_topic_silver
    target: v_mqtt_topic_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_mqtt_topic_silver

  - name: write_mqtt_topic_modelled
    type: write
    source: v_mqtt_topic_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "mqtt_topic_modelled"

  - name: tst_mqtt_topic_modelled_completeness
    type: test
    test_type: completeness
    source: v_mqtt_topic_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-mqtt_topic-M01"

  - name: tst_mqtt_topic_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_mqtt_topic_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-mqtt_topic-M02"
