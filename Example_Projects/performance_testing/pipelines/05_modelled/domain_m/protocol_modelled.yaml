pipeline: domain_m_modelled
flowgroup: protocol_modelled
presets:
  - default_delta_properties
actions:
  - name: protocol_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: protocol_dim
    target: v_protocol_silver
    description: "Load protocol from silver for modelling"

  - name: protocol_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_protocol_silver
    target: v_protocol_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_protocol_silver

  - name: write_protocol_modelled
    type: write
    source: v_protocol_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "protocol_modelled"

  - name: tst_protocol_modelled_completeness
    type: test
    test_type: completeness
    source: v_protocol_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-protocol-M01"

  - name: tst_protocol_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_protocol_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-protocol-M02"
