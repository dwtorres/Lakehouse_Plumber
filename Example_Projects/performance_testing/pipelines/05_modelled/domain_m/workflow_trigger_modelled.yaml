pipeline: domain_m_modelled
flowgroup: workflow_trigger_modelled
presets:
  - default_delta_properties
actions:
  - name: workflow_trigger_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: workflow_trigger_dim
    target: v_workflow_trigger_silver
    description: "Load workflow_trigger from silver for modelling"

  - name: workflow_trigger_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_workflow_trigger_silver
    target: v_workflow_trigger_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_workflow_trigger_silver

  - name: write_workflow_trigger_modelled
    type: write
    source: v_workflow_trigger_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "workflow_trigger_modelled"

  - name: tst_workflow_trigger_modelled_completeness
    type: test
    test_type: completeness
    source: v_workflow_trigger_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-workflow_trigger-M01"

  - name: tst_workflow_trigger_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_workflow_trigger_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-workflow_trigger-M02"
