pipeline: domain_m_modelled
flowgroup: firmware_modelled
presets:
  - default_delta_properties
actions:
  - name: firmware_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: firmware_fct
    target: v_firmware_silver
    description: "Load firmware from silver for modelling"

  - name: firmware_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_firmware_silver
    target: v_firmware_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_firmware_silver

  - name: write_firmware_modelled
    type: write
    source: v_firmware_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "firmware_modelled"

  - name: tst_firmware_modelled_completeness
    type: test
    test_type: completeness
    source: v_firmware_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-firmware-M01"

  - name: tst_firmware_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_firmware_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-firmware-M02"
