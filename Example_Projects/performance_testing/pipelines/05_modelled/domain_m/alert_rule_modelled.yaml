pipeline: domain_m_modelled
flowgroup: alert_rule_modelled
presets:
  - default_delta_properties
actions:
  - name: alert_rule_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: alert_rule_dim
    target: v_alert_rule_silver
    description: "Load alert_rule from silver for modelling"

  - name: alert_rule_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_alert_rule_silver
    target: v_alert_rule_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_alert_rule_silver

  - name: write_alert_rule_modelled
    type: write
    source: v_alert_rule_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "alert_rule_modelled"

  - name: tst_alert_rule_modelled_completeness
    type: test
    test_type: completeness
    source: v_alert_rule_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-alert_rule-M01"

  - name: tst_alert_rule_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_alert_rule_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-alert_rule-M02"
