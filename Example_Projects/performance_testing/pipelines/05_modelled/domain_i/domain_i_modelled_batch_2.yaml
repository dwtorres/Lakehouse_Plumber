pipeline: domain_i_modelled
flowgroup: work_instruction_modelled
presets:
  - default_delta_properties
actions:
  - name: work_instruction_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: work_instruction_dim
    target: v_work_instruction_silver
    description: "Load work_instruction from silver for modelling"

  - name: work_instruction_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_work_instruction_silver
    target: v_work_instruction_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_work_instruction_silver

  - name: write_work_instruction_modelled
    type: write
    source: v_work_instruction_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "work_instruction_modelled"

  - name: tst_work_instruction_modelled_completeness
    type: test
    test_type: completeness
    source: v_work_instruction_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-work_instruction-M01"

  - name: tst_work_instruction_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_work_instruction_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-work_instruction-M02"
