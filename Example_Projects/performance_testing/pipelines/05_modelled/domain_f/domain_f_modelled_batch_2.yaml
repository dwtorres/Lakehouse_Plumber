pipeline: domain_f_modelled
flowgroup: thesis_modelled
presets:
  - default_delta_properties
actions:
  - name: thesis_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: thesis_dim
    target: v_thesis_silver
    description: "Load thesis from silver for modelling"

  - name: thesis_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_thesis_silver
    target: v_thesis_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_thesis_silver

  - name: write_thesis_modelled
    type: write
    source: v_thesis_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "thesis_modelled"

  - name: tst_thesis_modelled_completeness
    type: test
    test_type: completeness
    source: v_thesis_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-thesis-M01"

  - name: tst_thesis_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_thesis_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-thesis-M02"
