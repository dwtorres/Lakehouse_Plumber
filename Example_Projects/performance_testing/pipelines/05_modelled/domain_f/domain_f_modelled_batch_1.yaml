pipeline: domain_f_modelled
flowgroup: student_modelled
presets:
  - default_delta_properties
actions:
  - name: student_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: student_fct
    target: v_student_silver
    description: "Load student from silver for modelling"

  - name: student_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_student_silver
    target: v_student_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_student_silver

  - name: write_student_modelled
    type: write
    source: v_student_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "student_modelled"

  - name: tst_student_modelled_completeness
    type: test
    test_type: completeness
    source: v_student_modelled
    required_columns: [_modelled_at, _model_version]
    on_violation: warn
    test_id: "PERF-student-M01"

  - name: tst_student_modelled_uniqueness
    type: test
    test_type: uniqueness
    source: v_student_modelled
    columns: [_modelled_at]
    on_violation: warn
    test_id: "PERF-student-M02"
