pipeline: domain_s_gold
flowgroup: vineyard_summary_mv
actions:
  - name: vineyard_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.vineyard_fct
    target: v_vineyard_summary

  - name: write_vineyard_summary_mv
    type: write
    source: v_vineyard_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "vineyard_summary_mv"

  - name: tst_vineyard_summary_completeness
    type: test
    test_type: completeness
    source: v_vineyard_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-vineyard-G01"

  - name: tst_vineyard_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_vineyard_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-vineyard-G02"
