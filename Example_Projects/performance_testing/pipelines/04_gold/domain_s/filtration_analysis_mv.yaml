pipeline: domain_s_gold
flowgroup: filtration_analysis_mv
actions:
  - name: filtration_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.filtration_dim
    target: v_filtration_analysis

  - name: write_filtration_analysis_mv
    type: write
    source: v_filtration_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "filtration_analysis_mv"

  - name: tst_filtration_analysis_completeness
    type: test
    test_type: completeness
    source: v_filtration_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-filtration-G01"

  - name: tst_filtration_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_filtration_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-filtration-G02"
