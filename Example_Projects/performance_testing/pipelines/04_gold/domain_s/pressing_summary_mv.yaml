pipeline: domain_s_gold
flowgroup: pressing_summary_mv
actions:
  - name: pressing_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.pressing_fct
    target: v_pressing_summary

  - name: write_pressing_summary_mv
    type: write
    source: v_pressing_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "pressing_summary_mv"

  - name: tst_pressing_summary_completeness
    type: test
    test_type: completeness
    source: v_pressing_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-pressing-G01"

  - name: tst_pressing_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_pressing_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-pressing-G02"
