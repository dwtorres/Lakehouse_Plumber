pipeline: domain_s_gold
flowgroup: label_report_mv
actions:
  - name: label_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.label_fct
    target: v_label_report

  - name: write_label_report_mv
    type: write
    source: v_label_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "label_report_mv"

  - name: tst_label_report_completeness
    type: test
    test_type: completeness
    source: v_label_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-label-G01"

  - name: tst_label_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_label_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-label-G02"
