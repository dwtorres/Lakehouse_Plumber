pipeline: domain_s_gold
flowgroup: cork_dashboard_mv
actions:
  - name: cork_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.cork_fct
    target: v_cork_dashboard

  - name: write_cork_dashboard_mv
    type: write
    source: v_cork_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "cork_dashboard_mv"

  - name: tst_cork_dashboard_completeness
    type: test
    test_type: completeness
    source: v_cork_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cork-G01"

  - name: tst_cork_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_cork_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cork-G02"
