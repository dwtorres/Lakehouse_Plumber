pipeline: domain_s_gold
flowgroup: sommelier_analysis_mv
actions:
  - name: sommelier_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.sommelier_fct
    target: v_sommelier_analysis

  - name: write_sommelier_analysis_mv
    type: write
    source: v_sommelier_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "sommelier_analysis_mv"

  - name: tst_sommelier_analysis_completeness
    type: test
    test_type: completeness
    source: v_sommelier_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-sommelier-G01"

  - name: tst_sommelier_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_sommelier_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-sommelier-G02"
