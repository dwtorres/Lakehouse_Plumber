pipeline: domain_s_gold
flowgroup: harvest_report_mv
actions:
  - name: harvest_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.harvest_dim
    target: v_harvest_report

  - name: write_harvest_report_mv
    type: write
    source: v_harvest_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "harvest_report_mv"

  - name: tst_harvest_report_completeness
    type: test
    test_type: completeness
    source: v_harvest_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-harvest-G01"

  - name: tst_harvest_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_harvest_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-harvest-G02"
