pipeline: domain_s_gold
flowgroup: appellation_analysis_mv
actions:
  - name: appellation_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.appellation_dim
    target: v_appellation_analysis

  - name: write_appellation_analysis_mv
    type: write
    source: v_appellation_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "appellation_analysis_mv"

  - name: tst_appellation_analysis_completeness
    type: test
    test_type: completeness
    source: v_appellation_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-appellation-G01"

  - name: tst_appellation_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_appellation_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-appellation-G02"
