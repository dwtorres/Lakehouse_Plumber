pipeline: domain_s_gold
flowgroup: bottle_analysis_mv
actions:
  - name: bottle_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.bottle_dim
    target: v_bottle_analysis

  - name: write_bottle_analysis_mv
    type: write
    source: v_bottle_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "bottle_analysis_mv"

  - name: tst_bottle_analysis_completeness
    type: test
    test_type: completeness
    source: v_bottle_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-bottle-G01"

  - name: tst_bottle_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_bottle_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-bottle-G02"
