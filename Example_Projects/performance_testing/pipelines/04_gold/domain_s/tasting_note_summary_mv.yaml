pipeline: domain_s_gold
flowgroup: tasting_note_summary_mv
actions:
  - name: tasting_note_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tasting_note_dim
    target: v_tasting_note_summary

  - name: write_tasting_note_summary_mv
    type: write
    source: v_tasting_note_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tasting_note_summary_mv"

  - name: tst_tasting_note_summary_completeness
    type: test
    test_type: completeness
    source: v_tasting_note_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tasting_note-G01"

  - name: tst_tasting_note_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_tasting_note_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tasting_note-G02"
