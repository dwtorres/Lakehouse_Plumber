pipeline: domain_k_gold
flowgroup: cabin_report_mv
actions:
  - name: cabin_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.cabin_dim
    target: v_cabin_report

  - name: write_cabin_report_mv
    type: write
    source: v_cabin_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "cabin_report_mv"

  - name: tst_cabin_report_completeness
    type: test
    test_type: completeness
    source: v_cabin_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cabin-G01"

  - name: tst_cabin_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_cabin_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cabin-G02"
