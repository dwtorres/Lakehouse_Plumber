pipeline: domain_k_gold
flowgroup: air_route_dashboard_mv
actions:
  - name: air_route_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.air_route_dim
    target: v_air_route_dashboard

  - name: write_air_route_dashboard_mv
    type: write
    source: v_air_route_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "air_route_dashboard_mv"

  - name: tst_air_route_dashboard_completeness
    type: test
    test_type: completeness
    source: v_air_route_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-air_route-G01"

  - name: tst_air_route_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_air_route_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-air_route-G02"
