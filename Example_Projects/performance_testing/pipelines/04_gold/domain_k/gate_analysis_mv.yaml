pipeline: domain_k_gold
flowgroup: gate_analysis_mv
actions:
  - name: gate_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.gate_dim
    target: v_gate_analysis

  - name: write_gate_analysis_mv
    type: write
    source: v_gate_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "gate_analysis_mv"

  - name: tst_gate_analysis_completeness
    type: test
    test_type: completeness
    source: v_gate_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-gate-G01"

  - name: tst_gate_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_gate_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-gate-G02"
