pipeline: domain_k_gold
flowgroup: airline_dashboard_mv
actions:
  - name: airline_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.airline_fct
    target: v_airline_dashboard

  - name: write_airline_dashboard_mv
    type: write
    source: v_airline_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "airline_dashboard_mv"

  - name: tst_airline_dashboard_completeness
    type: test
    test_type: completeness
    source: v_airline_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-airline-G01"

  - name: tst_airline_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_airline_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-airline-G02"
