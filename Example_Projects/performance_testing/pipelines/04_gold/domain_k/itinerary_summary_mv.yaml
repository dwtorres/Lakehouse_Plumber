pipeline: domain_k_gold
flowgroup: itinerary_summary_mv
actions:
  - name: itinerary_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.itinerary_fct
    target: v_itinerary_summary

  - name: write_itinerary_summary_mv
    type: write
    source: v_itinerary_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "itinerary_summary_mv"

  - name: tst_itinerary_summary_completeness
    type: test
    test_type: completeness
    source: v_itinerary_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-itinerary-G01"

  - name: tst_itinerary_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_itinerary_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-itinerary-G02"
