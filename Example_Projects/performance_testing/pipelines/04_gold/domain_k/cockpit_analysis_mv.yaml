pipeline: domain_k_gold
flowgroup: cockpit_analysis_mv
actions:
  - name: cockpit_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.cockpit_fct
    target: v_cockpit_analysis

  - name: write_cockpit_analysis_mv
    type: write
    source: v_cockpit_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "cockpit_analysis_mv"

  - name: tst_cockpit_analysis_completeness
    type: test
    test_type: completeness
    source: v_cockpit_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cockpit-G01"

  - name: tst_cockpit_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_cockpit_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cockpit-G02"
