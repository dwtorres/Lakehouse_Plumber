pipeline: domain_k_gold
flowgroup: hangar_report_mv
actions:
  - name: hangar_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.hangar_fct
    target: v_hangar_report

  - name: write_hangar_report_mv
    type: write
    source: v_hangar_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "hangar_report_mv"

  - name: tst_hangar_report_completeness
    type: test
    test_type: completeness
    source: v_hangar_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-hangar-G01"

  - name: tst_hangar_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_hangar_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-hangar-G02"
