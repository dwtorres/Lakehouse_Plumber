pipeline: domain_k_gold
flowgroup: flight_summary_mv
actions:
  - name: flight_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.flight_fct
    target: v_flight_summary

  - name: write_flight_summary_mv
    type: write
    source: v_flight_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "flight_summary_mv"

  - name: tst_flight_summary_completeness
    type: test
    test_type: completeness
    source: v_flight_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-flight-G01"

  - name: tst_flight_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_flight_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-flight-G02"
