pipeline: domain_k_gold
flowgroup: boarding_pass_dashboard_mv
actions:
  - name: boarding_pass_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.boarding_pass_dim
    target: v_boarding_pass_dashboard

  - name: write_boarding_pass_dashboard_mv
    type: write
    source: v_boarding_pass_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "boarding_pass_dashboard_mv"

  - name: tst_boarding_pass_dashboard_completeness
    type: test
    test_type: completeness
    source: v_boarding_pass_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-boarding_pass-G01"

  - name: tst_boarding_pass_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_boarding_pass_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-boarding_pass-G02"
