pipeline: domain_k_gold
flowgroup: ticket_dashboard_mv
actions:
  - name: ticket_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.ticket_dim
    target: v_ticket_dashboard

  - name: write_ticket_dashboard_mv
    type: write
    source: v_ticket_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "ticket_dashboard_mv"

  - name: tst_ticket_dashboard_completeness
    type: test
    test_type: completeness
    source: v_ticket_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-ticket-G01"

  - name: tst_ticket_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_ticket_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-ticket-G02"
