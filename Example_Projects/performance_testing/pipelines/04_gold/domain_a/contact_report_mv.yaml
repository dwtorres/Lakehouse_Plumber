pipeline: domain_a_gold
flowgroup: contact_report_mv
actions:
  - name: contact_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.contact_fct
    target: v_contact_report

  - name: write_contact_report_mv
    type: write
    source: v_contact_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "contact_report_mv"

  - name: tst_contact_report_completeness
    type: test
    test_type: completeness
    source: v_contact_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-contact-G01"

  - name: tst_contact_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_contact_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-contact-G02"
