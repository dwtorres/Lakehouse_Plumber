pipeline: domain_a_gold
flowgroup: shipment_summary_mv
actions:
  - name: shipment_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.shipment_dim
    target: v_shipment_summary

  - name: write_shipment_summary_mv
    type: write
    source: v_shipment_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "shipment_summary_mv"

  - name: tst_shipment_summary_completeness
    type: test
    test_type: completeness
    source: v_shipment_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-shipment-G01"

  - name: tst_shipment_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_shipment_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-shipment-G02"
