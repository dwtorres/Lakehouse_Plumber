pipeline: domain_a_gold
flowgroup: refund_dashboard_mv
actions:
  - name: refund_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.refund_dim
    target: v_refund_dashboard

  - name: write_refund_dashboard_mv
    type: write
    source: v_refund_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "refund_dashboard_mv"

  - name: tst_refund_dashboard_completeness
    type: test
    test_type: completeness
    source: v_refund_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-refund-G01"

  - name: tst_refund_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_refund_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-refund-G02"
