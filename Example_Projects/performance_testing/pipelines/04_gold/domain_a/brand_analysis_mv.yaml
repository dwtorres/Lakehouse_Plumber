pipeline: domain_a_gold
flowgroup: brand_analysis_mv
actions:
  - name: brand_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.brand_dim
    target: v_brand_analysis

  - name: write_brand_analysis_mv
    type: write
    source: v_brand_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "brand_analysis_mv"

  - name: tst_brand_analysis_completeness
    type: test
    test_type: completeness
    source: v_brand_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-brand-G01"

  - name: tst_brand_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_brand_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-brand-G02"
