pipeline: domain_a_gold
flowgroup: warehouse_report_mv
actions:
  - name: warehouse_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.warehouse_dim
    target: v_warehouse_report

  - name: write_warehouse_report_mv
    type: write
    source: v_warehouse_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "warehouse_report_mv"

  - name: tst_warehouse_report_completeness
    type: test
    test_type: completeness
    source: v_warehouse_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-warehouse-G01"

  - name: tst_warehouse_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_warehouse_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-warehouse-G02"
