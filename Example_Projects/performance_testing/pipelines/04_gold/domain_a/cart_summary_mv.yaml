pipeline: domain_a_gold
flowgroup: cart_summary_mv
actions:
  - name: cart_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.cart_dim
    target: v_cart_summary

  - name: write_cart_summary_mv
    type: write
    source: v_cart_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "cart_summary_mv"

  - name: tst_cart_summary_completeness
    type: test
    test_type: completeness
    source: v_cart_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cart-G01"

  - name: tst_cart_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_cart_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cart-G02"
