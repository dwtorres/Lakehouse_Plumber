pipeline: domain_a_gold
flowgroup: inventory_dashboard_mv
actions:
  - name: inventory_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.inventory_dim
    target: v_inventory_dashboard

  - name: write_inventory_dashboard_mv
    type: write
    source: v_inventory_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "inventory_dashboard_mv"

  - name: tst_inventory_dashboard_completeness
    type: test
    test_type: completeness
    source: v_inventory_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-inventory-G01"

  - name: tst_inventory_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_inventory_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-inventory-G02"
