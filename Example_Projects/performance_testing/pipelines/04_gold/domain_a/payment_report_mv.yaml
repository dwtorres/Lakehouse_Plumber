pipeline: domain_a_gold
flowgroup: payment_report_mv
actions:
  - name: payment_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.payment_fct
    target: v_payment_report

  - name: write_payment_report_mv
    type: write
    source: v_payment_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "payment_report_mv"

  - name: tst_payment_report_completeness
    type: test
    test_type: completeness
    source: v_payment_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-payment-G01"

  - name: tst_payment_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_payment_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-payment-G02"
