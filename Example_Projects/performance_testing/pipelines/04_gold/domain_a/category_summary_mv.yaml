pipeline: domain_a_gold
flowgroup: category_summary_mv
actions:
  - name: category_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.category_fct
    target: v_category_summary

  - name: write_category_summary_mv
    type: write
    source: v_category_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "category_summary_mv"

  - name: tst_category_summary_completeness
    type: test
    test_type: completeness
    source: v_category_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-category-G01"

  - name: tst_category_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_category_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-category-G02"
