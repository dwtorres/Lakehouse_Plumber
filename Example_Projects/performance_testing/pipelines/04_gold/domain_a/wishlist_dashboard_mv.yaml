pipeline: domain_a_gold
flowgroup: wishlist_dashboard_mv
actions:
  - name: wishlist_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.wishlist_fct
    target: v_wishlist_dashboard

  - name: write_wishlist_dashboard_mv
    type: write
    source: v_wishlist_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "wishlist_dashboard_mv"

  - name: tst_wishlist_dashboard_completeness
    type: test
    test_type: completeness
    source: v_wishlist_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-wishlist-G01"

  - name: tst_wishlist_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_wishlist_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-wishlist-G02"
