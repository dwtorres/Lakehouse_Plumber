pipeline: domain_a_gold
flowgroup: product_report_mv
actions:
  - name: product_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.product_dim
    target: v_product_report

  - name: write_product_report_mv
    type: write
    source: v_product_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "product_report_mv"

  - name: tst_product_report_completeness
    type: test
    test_type: completeness
    source: v_product_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-product-G01"

  - name: tst_product_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_product_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-product-G02"
