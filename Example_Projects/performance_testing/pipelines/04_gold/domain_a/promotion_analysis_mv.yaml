pipeline: domain_a_gold
flowgroup: promotion_analysis_mv
actions:
  - name: promotion_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.promotion_fct
    target: v_promotion_analysis

  - name: write_promotion_analysis_mv
    type: write
    source: v_promotion_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "promotion_analysis_mv"

  - name: tst_promotion_analysis_completeness
    type: test
    test_type: completeness
    source: v_promotion_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-promotion-G01"

  - name: tst_promotion_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_promotion_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-promotion-G02"
