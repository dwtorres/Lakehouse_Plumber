pipeline: domain_a_gold
flowgroup: customer_summary_mv
actions:
  - name: customer_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.customer_fct
    target: v_customer_summary

  - name: write_customer_summary_mv
    type: write
    source: v_customer_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "customer_summary_mv"

  - name: tst_customer_summary_completeness
    type: test
    test_type: completeness
    source: v_customer_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-customer-G01"

  - name: tst_customer_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_customer_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-customer-G02"
