pipeline: domain_p_gold
flowgroup: sequence_analysis_mv
actions:
  - name: sequence_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.sequence_dim
    target: v_sequence_analysis

  - name: write_sequence_analysis_mv
    type: write
    source: v_sequence_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "sequence_analysis_mv"

  - name: tst_sequence_analysis_completeness
    type: test
    test_type: completeness
    source: v_sequence_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-sequence-G01"

  - name: tst_sequence_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_sequence_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-sequence-G02"
