pipeline: domain_p_gold
flowgroup: centrifuge_analysis_mv
actions:
  - name: centrifuge_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.centrifuge_fct
    target: v_centrifuge_analysis

  - name: write_centrifuge_analysis_mv
    type: write
    source: v_centrifuge_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "centrifuge_analysis_mv"

  - name: tst_centrifuge_analysis_completeness
    type: test
    test_type: completeness
    source: v_centrifuge_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-centrifuge-G01"

  - name: tst_centrifuge_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_centrifuge_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-centrifuge-G02"
