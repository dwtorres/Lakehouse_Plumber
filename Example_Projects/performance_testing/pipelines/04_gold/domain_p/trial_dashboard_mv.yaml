pipeline: domain_p_gold
flowgroup: trial_dashboard_mv
actions:
  - name: trial_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.trial_fct
    target: v_trial_dashboard

  - name: write_trial_dashboard_mv
    type: write
    source: v_trial_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "trial_dashboard_mv"

  - name: tst_trial_dashboard_completeness
    type: test
    test_type: completeness
    source: v_trial_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-trial-G01"

  - name: tst_trial_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_trial_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-trial-G02"
