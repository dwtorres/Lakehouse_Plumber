pipeline: domain_p_gold
flowgroup: biomarker_report_mv
actions:
  - name: biomarker_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.biomarker_dim
    target: v_biomarker_report

  - name: write_biomarker_report_mv
    type: write
    source: v_biomarker_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "biomarker_report_mv"

  - name: tst_biomarker_report_completeness
    type: test
    test_type: completeness
    source: v_biomarker_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-biomarker-G01"

  - name: tst_biomarker_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_biomarker_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-biomarker-G02"
