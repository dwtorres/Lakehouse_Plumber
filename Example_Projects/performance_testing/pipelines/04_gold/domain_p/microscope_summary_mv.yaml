pipeline: domain_p_gold
flowgroup: microscope_summary_mv
actions:
  - name: microscope_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.microscope_dim
    target: v_microscope_summary

  - name: write_microscope_summary_mv
    type: write
    source: v_microscope_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "microscope_summary_mv"

  - name: tst_microscope_summary_completeness
    type: test
    test_type: completeness
    source: v_microscope_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-microscope-G01"

  - name: tst_microscope_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_microscope_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-microscope-G02"
