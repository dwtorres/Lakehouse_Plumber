pipeline: domain_p_gold
flowgroup: cohort_analysis_mv
actions:
  - name: cohort_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.cohort_dim
    target: v_cohort_analysis

  - name: write_cohort_analysis_mv
    type: write
    source: v_cohort_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "cohort_analysis_mv"

  - name: tst_cohort_analysis_completeness
    type: test
    test_type: completeness
    source: v_cohort_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cohort-G01"

  - name: tst_cohort_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_cohort_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cohort-G02"
