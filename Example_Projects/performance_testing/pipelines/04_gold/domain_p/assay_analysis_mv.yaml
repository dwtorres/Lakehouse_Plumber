pipeline: domain_p_gold
flowgroup: assay_analysis_mv
actions:
  - name: assay_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.assay_dim
    target: v_assay_analysis

  - name: write_assay_analysis_mv
    type: write
    source: v_assay_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "assay_analysis_mv"

  - name: tst_assay_analysis_completeness
    type: test
    test_type: completeness
    source: v_assay_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-assay-G01"

  - name: tst_assay_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_assay_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-assay-G02"
