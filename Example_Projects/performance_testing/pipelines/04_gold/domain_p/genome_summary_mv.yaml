pipeline: domain_p_gold
flowgroup: genome_summary_mv
actions:
  - name: genome_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.genome_fct
    target: v_genome_summary

  - name: write_genome_summary_mv
    type: write
    source: v_genome_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "genome_summary_mv"

  - name: tst_genome_summary_completeness
    type: test
    test_type: completeness
    source: v_genome_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-genome-G01"

  - name: tst_genome_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_genome_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-genome-G02"
