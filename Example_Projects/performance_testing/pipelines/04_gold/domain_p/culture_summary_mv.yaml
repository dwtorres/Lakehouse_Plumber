pipeline: domain_p_gold
flowgroup: culture_summary_mv
actions:
  - name: culture_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.culture_fct
    target: v_culture_summary

  - name: write_culture_summary_mv
    type: write
    source: v_culture_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "culture_summary_mv"

  - name: tst_culture_summary_completeness
    type: test
    test_type: completeness
    source: v_culture_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-culture-G01"

  - name: tst_culture_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_culture_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-culture-G02"
