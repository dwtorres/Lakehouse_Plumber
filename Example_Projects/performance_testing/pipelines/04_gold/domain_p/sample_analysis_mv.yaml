pipeline: domain_p_gold
flowgroup: sample_analysis_mv
actions:
  - name: sample_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.sample_dim
    target: v_sample_analysis

  - name: write_sample_analysis_mv
    type: write
    source: v_sample_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "sample_analysis_mv"

  - name: tst_sample_analysis_completeness
    type: test
    test_type: completeness
    source: v_sample_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-sample-G01"

  - name: tst_sample_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_sample_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-sample-G02"
