pipeline: domain_p_gold
flowgroup: phenotype_report_mv
actions:
  - name: phenotype_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.phenotype_fct
    target: v_phenotype_report

  - name: write_phenotype_report_mv
    type: write
    source: v_phenotype_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "phenotype_report_mv"

  - name: tst_phenotype_report_completeness
    type: test
    test_type: completeness
    source: v_phenotype_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-phenotype-G01"

  - name: tst_phenotype_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_phenotype_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-phenotype-G02"
