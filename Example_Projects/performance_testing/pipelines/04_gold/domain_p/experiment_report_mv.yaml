pipeline: domain_p_gold
flowgroup: experiment_report_mv
actions:
  - name: experiment_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.experiment_fct
    target: v_experiment_report

  - name: write_experiment_report_mv
    type: write
    source: v_experiment_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "experiment_report_mv"

  - name: tst_experiment_report_completeness
    type: test
    test_type: completeness
    source: v_experiment_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-experiment-G01"

  - name: tst_experiment_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_experiment_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-experiment-G02"
