pipeline: domain_p_gold
flowgroup: placebo_summary_mv
actions:
  - name: placebo_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.placebo_dim
    target: v_placebo_summary

  - name: write_placebo_summary_mv
    type: write
    source: v_placebo_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "placebo_summary_mv"

  - name: tst_placebo_summary_completeness
    type: test
    test_type: completeness
    source: v_placebo_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-placebo-G01"

  - name: tst_placebo_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_placebo_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-placebo-G02"
