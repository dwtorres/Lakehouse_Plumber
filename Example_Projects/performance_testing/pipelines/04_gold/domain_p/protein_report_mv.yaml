pipeline: domain_p_gold
flowgroup: protein_report_mv
actions:
  - name: protein_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.protein_dim
    target: v_protein_report

  - name: write_protein_report_mv
    type: write
    source: v_protein_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "protein_report_mv"

  - name: tst_protein_report_completeness
    type: test
    test_type: completeness
    source: v_protein_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-protein-G01"

  - name: tst_protein_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_protein_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-protein-G02"
