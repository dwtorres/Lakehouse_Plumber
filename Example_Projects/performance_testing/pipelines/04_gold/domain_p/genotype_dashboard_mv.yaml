pipeline: domain_p_gold
flowgroup: genotype_dashboard_mv
actions:
  - name: genotype_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.genotype_dim
    target: v_genotype_dashboard

  - name: write_genotype_dashboard_mv
    type: write
    source: v_genotype_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "genotype_dashboard_mv"

  - name: tst_genotype_dashboard_completeness
    type: test
    test_type: completeness
    source: v_genotype_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-genotype-G01"

  - name: tst_genotype_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_genotype_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-genotype-G02"
