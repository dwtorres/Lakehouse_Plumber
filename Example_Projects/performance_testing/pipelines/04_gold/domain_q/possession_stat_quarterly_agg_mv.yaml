pipeline: domain_q_gold
flowgroup: possession_stat_quarterly_agg_mv
actions:
  - name: possession_stat_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.possession_stat_fct
        GROUP BY 1
    target: v_possession_stat_quarterly_agg

  - name: write_possession_stat_quarterly_agg_mv
    type: write
    source: v_possession_stat_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "possession_stat_quarterly_agg_mv"

  - name: tst_possession_stat_quarterly_agg_completeness
    type: test
    test_type: completeness
    source: v_possession_stat_quarterly_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-possession_stat-G01"

  - name: tst_possession_stat_quarterly_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_possession_stat_quarterly_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-possession_stat-G02"
