pipeline: domain_q_gold
flowgroup: merchandise_report_mv
actions:
  - name: merchandise_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.merchandise_fct
    target: v_merchandise_report

  - name: write_merchandise_report_mv
    type: write
    source: v_merchandise_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "merchandise_report_mv"

  - name: tst_merchandise_report_completeness
    type: test
    test_type: completeness
    source: v_merchandise_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-merchandise-G01"

  - name: tst_merchandise_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_merchandise_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-merchandise-G02"
