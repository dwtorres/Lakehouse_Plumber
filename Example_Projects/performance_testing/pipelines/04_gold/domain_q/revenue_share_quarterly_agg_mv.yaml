pipeline: domain_q_gold
flowgroup: revenue_share_quarterly_agg_mv
actions:
  - name: revenue_share_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.revenue_share_fct
        GROUP BY 1
    target: v_revenue_share_quarterly_agg

  - name: write_revenue_share_quarterly_agg_mv
    type: write
    source: v_revenue_share_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "revenue_share_quarterly_agg_mv"

  - name: tst_revenue_share_quarterly_agg_completeness
    type: test
    test_type: completeness
    source: v_revenue_share_quarterly_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-revenue_share-G01"

  - name: tst_revenue_share_quarterly_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_revenue_share_quarterly_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-revenue_share-G02"
