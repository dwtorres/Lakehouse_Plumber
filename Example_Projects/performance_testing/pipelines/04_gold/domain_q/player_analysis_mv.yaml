pipeline: domain_q_gold
flowgroup: player_analysis_mv
actions:
  - name: player_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.player_dim
    target: v_player_analysis

  - name: write_player_analysis_mv
    type: write
    source: v_player_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "player_analysis_mv"

  - name: tst_player_analysis_completeness
    type: test
    test_type: completeness
    source: v_player_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-player-G01"

  - name: tst_player_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_player_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-player-G02"
