pipeline: domain_q_gold
flowgroup: match_summary_mv
actions:
  - name: match_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.match_fct
    target: v_match_summary

  - name: write_match_summary_mv
    type: write
    source: v_match_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "match_summary_mv"

  - name: tst_match_summary_completeness
    type: test
    test_type: completeness
    source: v_match_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-match-G01"

  - name: tst_match_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_match_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-match-G02"
