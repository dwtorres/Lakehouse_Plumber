pipeline: domain_q_gold
flowgroup: trophy_summary_mv
actions:
  - name: trophy_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.trophy_dim
    target: v_trophy_summary

  - name: write_trophy_summary_mv
    type: write
    source: v_trophy_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "trophy_summary_mv"

  - name: tst_trophy_summary_completeness
    type: test
    test_type: completeness
    source: v_trophy_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-trophy-G01"

  - name: tst_trophy_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_trophy_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-trophy-G02"
