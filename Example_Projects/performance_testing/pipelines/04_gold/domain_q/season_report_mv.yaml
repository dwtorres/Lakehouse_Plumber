pipeline: domain_q_gold
flowgroup: season_report_mv
actions:
  - name: season_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.season_fct
    target: v_season_report

  - name: write_season_report_mv
    type: write
    source: v_season_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "season_report_mv"

  - name: tst_season_report_completeness
    type: test
    test_type: completeness
    source: v_season_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-season-G01"

  - name: tst_season_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_season_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-season-G02"
