pipeline: domain_q_gold
flowgroup: league_dashboard_mv
actions:
  - name: league_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.league_dim
    target: v_league_dashboard

  - name: write_league_dashboard_mv
    type: write
    source: v_league_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "league_dashboard_mv"

  - name: tst_league_dashboard_completeness
    type: test
    test_type: completeness
    source: v_league_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-league-G01"

  - name: tst_league_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_league_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-league-G02"
