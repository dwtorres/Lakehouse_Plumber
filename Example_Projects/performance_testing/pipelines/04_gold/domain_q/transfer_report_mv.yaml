pipeline: domain_q_gold
flowgroup: transfer_report_mv
actions:
  - name: transfer_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.transfer_dim
    target: v_transfer_report

  - name: write_transfer_report_mv
    type: write
    source: v_transfer_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "transfer_report_mv"

  - name: tst_transfer_report_completeness
    type: test
    test_type: completeness
    source: v_transfer_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-transfer-G01"

  - name: tst_transfer_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_transfer_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-transfer-G02"
