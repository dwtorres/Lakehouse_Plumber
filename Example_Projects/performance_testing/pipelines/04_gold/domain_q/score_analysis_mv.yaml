pipeline: domain_q_gold
flowgroup: score_analysis_mv
actions:
  - name: score_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.score_dim
    target: v_score_analysis

  - name: write_score_analysis_mv
    type: write
    source: v_score_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "score_analysis_mv"

  - name: tst_score_analysis_completeness
    type: test
    test_type: completeness
    source: v_score_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-score-G01"

  - name: tst_score_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_score_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-score-G02"
