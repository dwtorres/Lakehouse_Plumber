pipeline: domain_q_gold
flowgroup: broadcast_summary_mv
actions:
  - name: broadcast_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.broadcast_dim
    target: v_broadcast_summary

  - name: write_broadcast_summary_mv
    type: write
    source: v_broadcast_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "broadcast_summary_mv"

  - name: tst_broadcast_summary_completeness
    type: test
    test_type: completeness
    source: v_broadcast_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-broadcast-G01"

  - name: tst_broadcast_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_broadcast_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-broadcast-G02"
