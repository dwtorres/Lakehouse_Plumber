pipeline: domain_i_gold
flowgroup: work_cell_summary_mv
actions:
  - name: work_cell_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.work_cell_dim
    target: v_work_cell_summary

  - name: write_work_cell_summary_mv
    type: write
    source: v_work_cell_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "work_cell_summary_mv"

  - name: tst_work_cell_summary_completeness
    type: test
    test_type: completeness
    source: v_work_cell_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-work_cell-G01"

  - name: tst_work_cell_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_work_cell_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-work_cell-G02"
