pipeline: domain_i_gold
flowgroup: tolerance_dashboard_mv
actions:
  - name: tolerance_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tolerance_dim
    target: v_tolerance_dashboard

  - name: write_tolerance_dashboard_mv
    type: write
    source: v_tolerance_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tolerance_dashboard_mv"

  - name: tst_tolerance_dashboard_completeness
    type: test
    test_type: completeness
    source: v_tolerance_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tolerance-G01"

  - name: tst_tolerance_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_tolerance_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tolerance-G02"
