pipeline: domain_i_gold
flowgroup: tooling_dashboard_mv
actions:
  - name: tooling_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tooling_fct
    target: v_tooling_dashboard

  - name: write_tooling_dashboard_mv
    type: write
    source: v_tooling_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tooling_dashboard_mv"

  - name: tst_tooling_dashboard_completeness
    type: test
    test_type: completeness
    source: v_tooling_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tooling-G01"

  - name: tst_tooling_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_tooling_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tooling-G02"
