pipeline: domain_i_gold
flowgroup: routing_report_mv
actions:
  - name: routing_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.routing_dim
    target: v_routing_report

  - name: write_routing_report_mv
    type: write
    source: v_routing_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "routing_report_mv"

  - name: tst_routing_report_completeness
    type: test
    test_type: completeness
    source: v_routing_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-routing-G01"

  - name: tst_routing_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_routing_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-routing-G02"
