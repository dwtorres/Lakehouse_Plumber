pipeline: domain_i_gold
flowgroup: assembly_analysis_mv
actions:
  - name: assembly_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.assembly_dim
    target: v_assembly_analysis

  - name: write_assembly_analysis_mv
    type: write
    source: v_assembly_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "assembly_analysis_mv"

  - name: tst_assembly_analysis_completeness
    type: test
    test_type: completeness
    source: v_assembly_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-assembly-G01"

  - name: tst_assembly_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_assembly_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-assembly-G02"
