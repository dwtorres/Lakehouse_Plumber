pipeline: domain_i_gold
flowgroup: operator_report_mv
actions:
  - name: operator_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.operator_fct
    target: v_operator_report

  - name: write_operator_report_mv
    type: write
    source: v_operator_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "operator_report_mv"

  - name: tst_operator_report_completeness
    type: test
    test_type: completeness
    source: v_operator_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-operator-G01"

  - name: tst_operator_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_operator_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-operator-G02"
