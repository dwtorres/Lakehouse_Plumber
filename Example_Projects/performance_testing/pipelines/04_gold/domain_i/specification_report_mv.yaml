pipeline: domain_i_gold
flowgroup: specification_report_mv
actions:
  - name: specification_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.specification_fct
    target: v_specification_report

  - name: write_specification_report_mv
    type: write
    source: v_specification_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "specification_report_mv"

  - name: tst_specification_report_completeness
    type: test
    test_type: completeness
    source: v_specification_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-specification-G01"

  - name: tst_specification_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_specification_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-specification-G02"
