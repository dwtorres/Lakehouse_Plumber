pipeline: domain_i_gold
flowgroup: bom_analysis_mv
actions:
  - name: bom_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.bom_fct
    target: v_bom_analysis

  - name: write_bom_analysis_mv
    type: write
    source: v_bom_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "bom_analysis_mv"

  - name: tst_bom_analysis_completeness
    type: test
    test_type: completeness
    source: v_bom_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-bom-G01"

  - name: tst_bom_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_bom_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-bom-G02"
