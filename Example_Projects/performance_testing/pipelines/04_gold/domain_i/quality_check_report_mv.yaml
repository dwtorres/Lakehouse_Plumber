pipeline: domain_i_gold
flowgroup: quality_check_report_mv
actions:
  - name: quality_check_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.quality_check_dim
    target: v_quality_check_report

  - name: write_quality_check_report_mv
    type: write
    source: v_quality_check_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "quality_check_report_mv"

  - name: tst_quality_check_report_completeness
    type: test
    test_type: completeness
    source: v_quality_check_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-quality_check-G01"

  - name: tst_quality_check_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_quality_check_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-quality_check-G02"
