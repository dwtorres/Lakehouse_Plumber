pipeline: domain_i_gold
flowgroup: yield_rate_analysis_mv
actions:
  - name: yield_rate_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.yield_rate_dim
    target: v_yield_rate_analysis

  - name: write_yield_rate_analysis_mv
    type: write
    source: v_yield_rate_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "yield_rate_analysis_mv"

  - name: tst_yield_rate_analysis_completeness
    type: test
    test_type: completeness
    source: v_yield_rate_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-yield_rate-G01"

  - name: tst_yield_rate_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_yield_rate_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-yield_rate-G02"
