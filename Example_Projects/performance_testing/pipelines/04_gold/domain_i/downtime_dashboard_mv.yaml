pipeline: domain_i_gold
flowgroup: downtime_dashboard_mv
actions:
  - name: downtime_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.downtime_dim
    target: v_downtime_dashboard

  - name: write_downtime_dashboard_mv
    type: write
    source: v_downtime_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "downtime_dashboard_mv"

  - name: tst_downtime_dashboard_completeness
    type: test
    test_type: completeness
    source: v_downtime_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-downtime-G01"

  - name: tst_downtime_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_downtime_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-downtime-G02"
