pipeline: domain_i_gold
flowgroup: shift_analysis_mv
actions:
  - name: shift_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.shift_dim
    target: v_shift_analysis

  - name: write_shift_analysis_mv
    type: write
    source: v_shift_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "shift_analysis_mv"

  - name: tst_shift_analysis_completeness
    type: test
    test_type: completeness
    source: v_shift_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-shift-G01"

  - name: tst_shift_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_shift_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-shift-G02"
