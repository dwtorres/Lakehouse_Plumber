pipeline: domain_i_gold
flowgroup: poka_yoke_weekly_agg_mv
actions:
  - name: poka_yoke_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.poka_yoke_fct
        GROUP BY 1
    target: v_poka_yoke_weekly_agg

  - name: write_poka_yoke_weekly_agg_mv
    type: write
    source: v_poka_yoke_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "poka_yoke_weekly_agg_mv"

  - name: tst_poka_yoke_weekly_agg_completeness
    type: test
    test_type: completeness
    source: v_poka_yoke_weekly_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-poka_yoke-G01"

  - name: tst_poka_yoke_weekly_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_poka_yoke_weekly_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-poka_yoke-G02"
