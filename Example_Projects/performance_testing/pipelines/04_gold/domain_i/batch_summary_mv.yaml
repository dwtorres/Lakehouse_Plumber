pipeline: domain_i_gold
flowgroup: batch_summary_mv
actions:
  - name: batch_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.batch_dim
    target: v_batch_summary

  - name: write_batch_summary_mv
    type: write
    source: v_batch_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "batch_summary_mv"

  - name: tst_batch_summary_completeness
    type: test
    test_type: completeness
    source: v_batch_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-batch-G01"

  - name: tst_batch_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_batch_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-batch-G02"
