pipeline: domain_i_gold
flowgroup: changeover_summary_mv
actions:
  - name: changeover_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.changeover_fct
    target: v_changeover_summary

  - name: write_changeover_summary_mv
    type: write
    source: v_changeover_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "changeover_summary_mv"

  - name: tst_changeover_summary_completeness
    type: test
    test_type: completeness
    source: v_changeover_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-changeover-G01"

  - name: tst_changeover_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_changeover_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-changeover-G02"
