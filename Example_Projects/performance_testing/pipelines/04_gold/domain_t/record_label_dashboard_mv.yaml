pipeline: domain_t_gold
flowgroup: record_label_dashboard_mv
actions:
  - name: record_label_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.record_label_dim
    target: v_record_label_dashboard

  - name: write_record_label_dashboard_mv
    type: write
    source: v_record_label_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "record_label_dashboard_mv"

  - name: tst_record_label_dashboard_completeness
    type: test
    test_type: completeness
    source: v_record_label_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-record_label-G01"

  - name: tst_record_label_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_record_label_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-record_label-G02"
