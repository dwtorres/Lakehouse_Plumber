pipeline: domain_t_gold
flowgroup: artist_report_mv
actions:
  - name: artist_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.artist_dim
    target: v_artist_report

  - name: write_artist_report_mv
    type: write
    source: v_artist_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "artist_report_mv"

  - name: tst_artist_report_completeness
    type: test
    test_type: completeness
    source: v_artist_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-artist-G01"

  - name: tst_artist_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_artist_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-artist-G02"
