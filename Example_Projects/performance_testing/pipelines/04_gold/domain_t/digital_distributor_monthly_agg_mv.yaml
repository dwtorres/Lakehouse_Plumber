pipeline: domain_t_gold
flowgroup: digital_distributor_monthly_agg_mv
actions:
  - name: digital_distributor_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.digital_distributor_dim
        GROUP BY 1
    target: v_digital_distributor_monthly_agg

  - name: write_digital_distributor_monthly_agg_mv
    type: write
    source: v_digital_distributor_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "digital_distributor_monthly_agg_mv"

  - name: tst_digital_distributor_monthly_agg_completeness
    type: test
    test_type: completeness
    source: v_digital_distributor_monthly_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-digital_distributor-G01"

  - name: tst_digital_distributor_monthly_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_digital_distributor_monthly_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-digital_distributor-G02"
