pipeline: domain_t_gold
flowgroup: podcast_feature_daily_agg_mv
actions:
  - name: podcast_feature_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.podcast_feature_fct
        GROUP BY 1
    target: v_podcast_feature_daily_agg

  - name: write_podcast_feature_daily_agg_mv
    type: write
    source: v_podcast_feature_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "podcast_feature_daily_agg_mv"

  - name: tst_podcast_feature_daily_agg_completeness
    type: test
    test_type: completeness
    source: v_podcast_feature_daily_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-podcast_feature-G01"

  - name: tst_podcast_feature_daily_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_podcast_feature_daily_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-podcast_feature-G02"
