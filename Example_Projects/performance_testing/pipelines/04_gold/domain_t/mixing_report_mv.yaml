pipeline: domain_t_gold
flowgroup: mixing_report_mv
actions:
  - name: mixing_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.mixing_dim
    target: v_mixing_report

  - name: write_mixing_report_mv
    type: write
    source: v_mixing_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "mixing_report_mv"

  - name: tst_mixing_report_completeness
    type: test
    test_type: completeness
    source: v_mixing_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-mixing-G01"

  - name: tst_mixing_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_mixing_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-mixing-G02"
