pipeline: domain_t_gold
flowgroup: royalty_report_mv
actions:
  - name: royalty_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.royalty_fct
    target: v_royalty_report

  - name: write_royalty_report_mv
    type: write
    source: v_royalty_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "royalty_report_mv"

  - name: tst_royalty_report_completeness
    type: test
    test_type: completeness
    source: v_royalty_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-royalty-G01"

  - name: tst_royalty_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_royalty_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-royalty-G02"
