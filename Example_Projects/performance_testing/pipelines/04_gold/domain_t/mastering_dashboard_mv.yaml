pipeline: domain_t_gold
flowgroup: mastering_dashboard_mv
actions:
  - name: mastering_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.mastering_dim
    target: v_mastering_dashboard

  - name: write_mastering_dashboard_mv
    type: write
    source: v_mastering_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "mastering_dashboard_mv"

  - name: tst_mastering_dashboard_completeness
    type: test
    test_type: completeness
    source: v_mastering_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-mastering-G01"

  - name: tst_mastering_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_mastering_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-mastering-G02"
