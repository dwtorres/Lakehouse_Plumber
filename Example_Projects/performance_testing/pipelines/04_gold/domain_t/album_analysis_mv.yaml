pipeline: domain_t_gold
flowgroup: album_analysis_mv
actions:
  - name: album_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.album_dim
    target: v_album_analysis

  - name: write_album_analysis_mv
    type: write
    source: v_album_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "album_analysis_mv"

  - name: tst_album_analysis_completeness
    type: test
    test_type: completeness
    source: v_album_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-album-G01"

  - name: tst_album_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_album_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-album-G02"
