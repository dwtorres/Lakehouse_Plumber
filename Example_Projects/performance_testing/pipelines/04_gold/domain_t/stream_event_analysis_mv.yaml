pipeline: domain_t_gold
flowgroup: stream_event_analysis_mv
actions:
  - name: stream_event_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.stream_event_dim
    target: v_stream_event_analysis

  - name: write_stream_event_analysis_mv
    type: write
    source: v_stream_event_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "stream_event_analysis_mv"

  - name: tst_stream_event_analysis_completeness
    type: test
    test_type: completeness
    source: v_stream_event_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-stream_event-G01"

  - name: tst_stream_event_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_stream_event_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-stream_event-G02"
