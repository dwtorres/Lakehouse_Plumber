pipeline: domain_t_gold
flowgroup: venue_dashboard_mv
actions:
  - name: venue_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.venue_fct
    target: v_venue_dashboard

  - name: write_venue_dashboard_mv
    type: write
    source: v_venue_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "venue_dashboard_mv"

  - name: tst_venue_dashboard_completeness
    type: test
    test_type: completeness
    source: v_venue_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-venue-G01"

  - name: tst_venue_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_venue_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-venue-G02"
