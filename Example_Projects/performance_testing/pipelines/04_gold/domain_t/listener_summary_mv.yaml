pipeline: domain_t_gold
flowgroup: listener_summary_mv
actions:
  - name: listener_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.listener_dim
    target: v_listener_summary

  - name: write_listener_summary_mv
    type: write
    source: v_listener_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "listener_summary_mv"

  - name: tst_listener_summary_completeness
    type: test
    test_type: completeness
    source: v_listener_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-listener-G01"

  - name: tst_listener_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_listener_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-listener-G02"
