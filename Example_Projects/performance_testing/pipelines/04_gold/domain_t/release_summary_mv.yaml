pipeline: domain_t_gold
flowgroup: release_summary_mv
actions:
  - name: release_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.release_fct
    target: v_release_summary

  - name: write_release_summary_mv
    type: write
    source: v_release_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "release_summary_mv"

  - name: tst_release_summary_completeness
    type: test
    test_type: completeness
    source: v_release_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-release-G01"

  - name: tst_release_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_release_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-release-G02"
