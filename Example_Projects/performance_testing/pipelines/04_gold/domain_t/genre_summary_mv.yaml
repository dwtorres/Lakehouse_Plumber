pipeline: domain_t_gold
flowgroup: genre_summary_mv
actions:
  - name: genre_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.genre_dim
    target: v_genre_summary

  - name: write_genre_summary_mv
    type: write
    source: v_genre_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "genre_summary_mv"

  - name: tst_genre_summary_completeness
    type: test
    test_type: completeness
    source: v_genre_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-genre-G01"

  - name: tst_genre_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_genre_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-genre-G02"
