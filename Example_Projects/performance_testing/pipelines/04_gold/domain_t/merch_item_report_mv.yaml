pipeline: domain_t_gold
flowgroup: merch_item_report_mv
actions:
  - name: merch_item_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.merch_item_fct
    target: v_merch_item_report

  - name: write_merch_item_report_mv
    type: write
    source: v_merch_item_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "merch_item_report_mv"

  - name: tst_merch_item_report_completeness
    type: test
    test_type: completeness
    source: v_merch_item_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-merch_item-G01"

  - name: tst_merch_item_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_merch_item_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-merch_item-G02"
