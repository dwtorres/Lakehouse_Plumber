pipeline: domain_t_gold
flowgroup: music_track_summary_mv
actions:
  - name: music_track_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.music_track_fct
    target: v_music_track_summary

  - name: write_music_track_summary_mv
    type: write
    source: v_music_track_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "music_track_summary_mv"

  - name: tst_music_track_summary_completeness
    type: test
    test_type: completeness
    source: v_music_track_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-music_track-G01"

  - name: tst_music_track_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_music_track_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-music_track-G02"
