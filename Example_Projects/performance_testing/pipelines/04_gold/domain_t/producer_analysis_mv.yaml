pipeline: domain_t_gold
flowgroup: producer_analysis_mv
actions:
  - name: producer_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.producer_fct
    target: v_producer_analysis

  - name: write_producer_analysis_mv
    type: write
    source: v_producer_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "producer_analysis_mv"

  - name: tst_producer_analysis_completeness
    type: test
    test_type: completeness
    source: v_producer_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-producer-G01"

  - name: tst_producer_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_producer_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-producer-G02"
