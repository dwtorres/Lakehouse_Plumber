pipeline: domain_t_gold
flowgroup: setlist_analysis_mv
actions:
  - name: setlist_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.setlist_dim
    target: v_setlist_analysis

  - name: write_setlist_analysis_mv
    type: write
    source: v_setlist_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "setlist_analysis_mv"

  - name: tst_setlist_analysis_completeness
    type: test
    test_type: completeness
    source: v_setlist_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-setlist-G01"

  - name: tst_setlist_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_setlist_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-setlist-G02"
