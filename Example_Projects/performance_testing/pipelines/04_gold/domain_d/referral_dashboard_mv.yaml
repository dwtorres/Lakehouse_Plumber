pipeline: domain_d_gold
flowgroup: referral_dashboard_mv
actions:
  - name: referral_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.referral_fct
    target: v_referral_dashboard

  - name: write_referral_dashboard_mv
    type: write
    source: v_referral_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "referral_dashboard_mv"

  - name: tst_referral_dashboard_completeness
    type: test
    test_type: completeness
    source: v_referral_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-referral-G01"

  - name: tst_referral_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_referral_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-referral-G02"
