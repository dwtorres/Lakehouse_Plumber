pipeline: domain_d_gold
flowgroup: treatment_analysis_mv
actions:
  - name: treatment_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.treatment_dim
    target: v_treatment_analysis

  - name: write_treatment_analysis_mv
    type: write
    source: v_treatment_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "treatment_analysis_mv"

  - name: tst_treatment_analysis_completeness
    type: test
    test_type: completeness
    source: v_treatment_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-treatment-G01"

  - name: tst_treatment_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_treatment_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-treatment-G02"
