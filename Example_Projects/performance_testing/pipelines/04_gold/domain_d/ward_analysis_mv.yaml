pipeline: domain_d_gold
flowgroup: ward_analysis_mv
actions:
  - name: ward_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.ward_fct
    target: v_ward_analysis

  - name: write_ward_analysis_mv
    type: write
    source: v_ward_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "ward_analysis_mv"

  - name: tst_ward_analysis_completeness
    type: test
    test_type: completeness
    source: v_ward_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-ward-G01"

  - name: tst_ward_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_ward_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-ward-G02"
