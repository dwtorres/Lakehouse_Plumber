pipeline: domain_d_gold
flowgroup: prescription_dashboard_mv
actions:
  - name: prescription_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.prescription_fct
    target: v_prescription_dashboard

  - name: write_prescription_dashboard_mv
    type: write
    source: v_prescription_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "prescription_dashboard_mv"

  - name: tst_prescription_dashboard_completeness
    type: test
    test_type: completeness
    source: v_prescription_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-prescription-G01"

  - name: tst_prescription_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_prescription_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-prescription-G02"
