pipeline: domain_d_gold
flowgroup: medical_procedure_report_mv
actions:
  - name: medical_procedure_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.medical_procedure_fct
    target: v_medical_procedure_report

  - name: write_medical_procedure_report_mv
    type: write
    source: v_medical_procedure_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "medical_procedure_report_mv"

  - name: tst_medical_procedure_report_completeness
    type: test
    test_type: completeness
    source: v_medical_procedure_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-medical_procedure-G01"

  - name: tst_medical_procedure_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_medical_procedure_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-medical_procedure-G02"
