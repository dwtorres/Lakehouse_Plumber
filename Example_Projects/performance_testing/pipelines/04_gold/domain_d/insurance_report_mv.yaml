pipeline: domain_d_gold
flowgroup: insurance_report_mv
actions:
  - name: insurance_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.insurance_fct
    target: v_insurance_report

  - name: write_insurance_report_mv
    type: write
    source: v_insurance_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "insurance_report_mv"

  - name: tst_insurance_report_completeness
    type: test
    test_type: completeness
    source: v_insurance_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-insurance-G01"

  - name: tst_insurance_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_insurance_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-insurance-G02"
