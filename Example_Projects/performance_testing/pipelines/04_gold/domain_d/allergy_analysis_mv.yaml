pipeline: domain_d_gold
flowgroup: allergy_analysis_mv
actions:
  - name: allergy_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.allergy_dim
    target: v_allergy_analysis

  - name: write_allergy_analysis_mv
    type: write
    source: v_allergy_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "allergy_analysis_mv"

  - name: tst_allergy_analysis_completeness
    type: test
    test_type: completeness
    source: v_allergy_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-allergy-G01"

  - name: tst_allergy_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_allergy_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-allergy-G02"
