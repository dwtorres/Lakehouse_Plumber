pipeline: domain_d_gold
flowgroup: doctor_analysis_mv
actions:
  - name: doctor_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.doctor_dim
    target: v_doctor_analysis

  - name: write_doctor_analysis_mv
    type: write
    source: v_doctor_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "doctor_analysis_mv"

  - name: tst_doctor_analysis_completeness
    type: test
    test_type: completeness
    source: v_doctor_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-doctor-G01"

  - name: tst_doctor_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_doctor_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-doctor-G02"
