pipeline: domain_d_gold
flowgroup: admission_analysis_mv
actions:
  - name: admission_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.admission_dim
    target: v_admission_analysis

  - name: write_admission_analysis_mv
    type: write
    source: v_admission_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "admission_analysis_mv"

  - name: tst_admission_analysis_completeness
    type: test
    test_type: completeness
    source: v_admission_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-admission-G01"

  - name: tst_admission_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_admission_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-admission-G02"
