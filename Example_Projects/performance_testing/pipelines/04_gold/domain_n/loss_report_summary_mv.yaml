pipeline: domain_n_gold
flowgroup: loss_report_summary_mv
actions:
  - name: loss_report_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.loss_report_fct
    target: v_loss_report_summary

  - name: write_loss_report_summary_mv
    type: write
    source: v_loss_report_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "loss_report_summary_mv"

  - name: tst_loss_report_summary_completeness
    type: test
    test_type: completeness
    source: v_loss_report_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-loss_report-G01"

  - name: tst_loss_report_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_loss_report_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-loss_report-G02"
