pipeline: domain_n_gold
flowgroup: reinsurance_dashboard_mv
actions:
  - name: reinsurance_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.reinsurance_fct
    target: v_reinsurance_dashboard

  - name: write_reinsurance_dashboard_mv
    type: write
    source: v_reinsurance_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "reinsurance_dashboard_mv"

  - name: tst_reinsurance_dashboard_completeness
    type: test
    test_type: completeness
    source: v_reinsurance_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-reinsurance-G01"

  - name: tst_reinsurance_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_reinsurance_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-reinsurance-G02"
