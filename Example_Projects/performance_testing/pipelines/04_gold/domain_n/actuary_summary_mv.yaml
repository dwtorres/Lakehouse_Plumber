pipeline: domain_n_gold
flowgroup: actuary_summary_mv
actions:
  - name: actuary_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.actuary_dim
    target: v_actuary_summary

  - name: write_actuary_summary_mv
    type: write
    source: v_actuary_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "actuary_summary_mv"

  - name: tst_actuary_summary_completeness
    type: test
    test_type: completeness
    source: v_actuary_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-actuary-G01"

  - name: tst_actuary_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_actuary_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-actuary-G02"
