pipeline: domain_n_gold
flowgroup: settlement_report_mv
actions:
  - name: settlement_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.settlement_fct
    target: v_settlement_report

  - name: write_settlement_report_mv
    type: write
    source: v_settlement_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "settlement_report_mv"

  - name: tst_settlement_report_completeness
    type: test
    test_type: completeness
    source: v_settlement_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-settlement-G01"

  - name: tst_settlement_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_settlement_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-settlement-G02"
