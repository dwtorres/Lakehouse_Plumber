pipeline: domain_n_gold
flowgroup: policy_summary_mv
actions:
  - name: policy_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.policy_fct
    target: v_policy_summary

  - name: write_policy_summary_mv
    type: write
    source: v_policy_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "policy_summary_mv"

  - name: tst_policy_summary_completeness
    type: test
    test_type: completeness
    source: v_policy_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-policy-G01"

  - name: tst_policy_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_policy_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-policy-G02"
