pipeline: domain_n_gold
flowgroup: subrogation_report_mv
actions:
  - name: subrogation_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.subrogation_dim
    target: v_subrogation_report

  - name: write_subrogation_report_mv
    type: write
    source: v_subrogation_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "subrogation_report_mv"

  - name: tst_subrogation_report_completeness
    type: test
    test_type: completeness
    source: v_subrogation_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-subrogation-G01"

  - name: tst_subrogation_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_subrogation_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-subrogation-G02"
