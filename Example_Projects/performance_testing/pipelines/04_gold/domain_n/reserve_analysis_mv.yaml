pipeline: domain_n_gold
flowgroup: reserve_analysis_mv
actions:
  - name: reserve_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.reserve_dim
    target: v_reserve_analysis

  - name: write_reserve_analysis_mv
    type: write
    source: v_reserve_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "reserve_analysis_mv"

  - name: tst_reserve_analysis_completeness
    type: test
    test_type: completeness
    source: v_reserve_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-reserve-G01"

  - name: tst_reserve_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_reserve_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-reserve-G02"
