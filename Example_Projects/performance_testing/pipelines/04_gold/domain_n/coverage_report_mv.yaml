pipeline: domain_n_gold
flowgroup: coverage_report_mv
actions:
  - name: coverage_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.coverage_fct
    target: v_coverage_report

  - name: write_coverage_report_mv
    type: write
    source: v_coverage_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "coverage_report_mv"

  - name: tst_coverage_report_completeness
    type: test
    test_type: completeness
    source: v_coverage_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-coverage-G01"

  - name: tst_coverage_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_coverage_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-coverage-G02"
