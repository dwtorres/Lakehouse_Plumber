pipeline: domain_n_gold
flowgroup: endorsement_summary_mv
actions:
  - name: endorsement_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.endorsement_dim
    target: v_endorsement_summary

  - name: write_endorsement_summary_mv
    type: write
    source: v_endorsement_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "endorsement_summary_mv"

  - name: tst_endorsement_summary_completeness
    type: test
    test_type: completeness
    source: v_endorsement_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-endorsement-G01"

  - name: tst_endorsement_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_endorsement_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-endorsement-G02"
