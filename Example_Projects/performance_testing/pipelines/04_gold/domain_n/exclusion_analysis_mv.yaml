pipeline: domain_n_gold
flowgroup: exclusion_analysis_mv
actions:
  - name: exclusion_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.exclusion_fct
    target: v_exclusion_analysis

  - name: write_exclusion_analysis_mv
    type: write
    source: v_exclusion_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "exclusion_analysis_mv"

  - name: tst_exclusion_analysis_completeness
    type: test
    test_type: completeness
    source: v_exclusion_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-exclusion-G01"

  - name: tst_exclusion_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_exclusion_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-exclusion-G02"
