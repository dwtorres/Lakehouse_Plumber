pipeline: domain_n_gold
flowgroup: adjuster_dashboard_mv
actions:
  - name: adjuster_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.adjuster_fct
    target: v_adjuster_dashboard

  - name: write_adjuster_dashboard_mv
    type: write
    source: v_adjuster_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "adjuster_dashboard_mv"

  - name: tst_adjuster_dashboard_completeness
    type: test
    test_type: completeness
    source: v_adjuster_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-adjuster-G01"

  - name: tst_adjuster_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_adjuster_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-adjuster-G02"
