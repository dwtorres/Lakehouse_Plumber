pipeline: domain_n_gold
flowgroup: litigation_dashboard_mv
actions:
  - name: litigation_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.litigation_dim
    target: v_litigation_dashboard

  - name: write_litigation_dashboard_mv
    type: write
    source: v_litigation_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "litigation_dashboard_mv"

  - name: tst_litigation_dashboard_completeness
    type: test
    test_type: completeness
    source: v_litigation_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-litigation-G01"

  - name: tst_litigation_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_litigation_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-litigation-G02"
