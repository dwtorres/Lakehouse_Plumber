pipeline: domain_n_gold
flowgroup: cancellation_dashboard_mv
actions:
  - name: cancellation_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.cancellation_dim
    target: v_cancellation_dashboard

  - name: write_cancellation_dashboard_mv
    type: write
    source: v_cancellation_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "cancellation_dashboard_mv"

  - name: tst_cancellation_dashboard_completeness
    type: test
    test_type: completeness
    source: v_cancellation_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cancellation-G01"

  - name: tst_cancellation_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_cancellation_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cancellation-G02"
