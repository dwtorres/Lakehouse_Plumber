pipeline: domain_l_gold
flowgroup: kitchen_report_mv
actions:
  - name: kitchen_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.kitchen_fct
    target: v_kitchen_report

  - name: write_kitchen_report_mv
    type: write
    source: v_kitchen_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "kitchen_report_mv"

  - name: tst_kitchen_report_completeness
    type: test
    test_type: completeness
    source: v_kitchen_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-kitchen-G01"

  - name: tst_kitchen_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_kitchen_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-kitchen-G02"
