pipeline: domain_l_gold
flowgroup: ingredient_summary_mv
actions:
  - name: ingredient_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.ingredient_dim
    target: v_ingredient_summary

  - name: write_ingredient_summary_mv
    type: write
    source: v_ingredient_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "ingredient_summary_mv"

  - name: tst_ingredient_summary_completeness
    type: test
    test_type: completeness
    source: v_ingredient_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-ingredient-G01"

  - name: tst_ingredient_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_ingredient_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-ingredient-G02"
