pipeline: domain_l_gold
flowgroup: tip_summary_mv
actions:
  - name: tip_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tip_fct
    target: v_tip_summary

  - name: write_tip_summary_mv
    type: write
    source: v_tip_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tip_summary_mv"

  - name: tst_tip_summary_completeness
    type: test
    test_type: completeness
    source: v_tip_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tip-G01"

  - name: tst_tip_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_tip_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tip-G02"
