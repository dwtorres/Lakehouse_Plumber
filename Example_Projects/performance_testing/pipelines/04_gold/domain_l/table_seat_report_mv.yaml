pipeline: domain_l_gold
flowgroup: table_seat_report_mv
actions:
  - name: table_seat_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.table_seat_dim
    target: v_table_seat_report

  - name: write_table_seat_report_mv
    type: write
    source: v_table_seat_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "table_seat_report_mv"

  - name: tst_table_seat_report_completeness
    type: test
    test_type: completeness
    source: v_table_seat_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-table_seat-G01"

  - name: tst_table_seat_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_table_seat_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-table_seat-G02"
