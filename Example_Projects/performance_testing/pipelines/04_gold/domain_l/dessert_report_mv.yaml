pipeline: domain_l_gold
flowgroup: dessert_report_mv
actions:
  - name: dessert_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.dessert_fct
    target: v_dessert_report

  - name: write_dessert_report_mv
    type: write
    source: v_dessert_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "dessert_report_mv"

  - name: tst_dessert_report_completeness
    type: test
    test_type: completeness
    source: v_dessert_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-dessert-G01"

  - name: tst_dessert_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_dessert_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-dessert-G02"
