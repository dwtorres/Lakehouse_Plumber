pipeline: domain_l_gold
flowgroup: walk_in_weekly_agg_mv
actions:
  - name: walk_in_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.walk_in_fct
        GROUP BY 1
    target: v_walk_in_weekly_agg

  - name: write_walk_in_weekly_agg_mv
    type: write
    source: v_walk_in_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "walk_in_weekly_agg_mv"

  - name: tst_walk_in_weekly_agg_completeness
    type: test
    test_type: completeness
    source: v_walk_in_weekly_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-walk_in-G01"

  - name: tst_walk_in_weekly_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_walk_in_weekly_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-walk_in-G02"
