pipeline: domain_l_gold
flowgroup: pantry_report_mv
actions:
  - name: pantry_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.pantry_dim
    target: v_pantry_report

  - name: write_pantry_report_mv
    type: write
    source: v_pantry_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "pantry_report_mv"

  - name: tst_pantry_report_completeness
    type: test
    test_type: completeness
    source: v_pantry_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-pantry-G01"

  - name: tst_pantry_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_pantry_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-pantry-G02"
