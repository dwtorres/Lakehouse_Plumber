pipeline: domain_l_gold
flowgroup: health_inspection_dashboard_mv
actions:
  - name: health_inspection_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.health_inspection_dim
    target: v_health_inspection_dashboard

  - name: write_health_inspection_dashboard_mv
    type: write
    source: v_health_inspection_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "health_inspection_dashboard_mv"

  - name: tst_health_inspection_dashboard_completeness
    type: test
    test_type: completeness
    source: v_health_inspection_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-health_inspection-G01"

  - name: tst_health_inspection_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_health_inspection_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-health_inspection-G02"
