pipeline: domain_l_gold
flowgroup: reservation_dashboard_mv
actions:
  - name: reservation_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.reservation_fct
    target: v_reservation_dashboard

  - name: write_reservation_dashboard_mv
    type: write
    source: v_reservation_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "reservation_dashboard_mv"

  - name: tst_reservation_dashboard_completeness
    type: test
    test_type: completeness
    source: v_reservation_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-reservation-G01"

  - name: tst_reservation_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_reservation_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-reservation-G02"
