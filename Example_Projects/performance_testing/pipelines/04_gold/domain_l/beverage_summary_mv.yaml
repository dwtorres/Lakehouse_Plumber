pipeline: domain_l_gold
flowgroup: beverage_summary_mv
actions:
  - name: beverage_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.beverage_dim
    target: v_beverage_summary

  - name: write_beverage_summary_mv
    type: write
    source: v_beverage_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "beverage_summary_mv"

  - name: tst_beverage_summary_completeness
    type: test
    test_type: completeness
    source: v_beverage_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-beverage-G01"

  - name: tst_beverage_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_beverage_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-beverage-G02"
