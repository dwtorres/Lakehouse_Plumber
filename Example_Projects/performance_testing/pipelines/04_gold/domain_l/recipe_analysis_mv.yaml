pipeline: domain_l_gold
flowgroup: recipe_analysis_mv
actions:
  - name: recipe_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.recipe_fct
    target: v_recipe_analysis

  - name: write_recipe_analysis_mv
    type: write
    source: v_recipe_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "recipe_analysis_mv"

  - name: tst_recipe_analysis_completeness
    type: test
    test_type: completeness
    source: v_recipe_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-recipe-G01"

  - name: tst_recipe_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_recipe_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-recipe-G02"
