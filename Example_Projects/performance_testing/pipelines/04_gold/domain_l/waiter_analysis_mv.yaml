pipeline: domain_l_gold
flowgroup: waiter_analysis_mv
actions:
  - name: waiter_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.waiter_dim
    target: v_waiter_analysis

  - name: write_waiter_analysis_mv
    type: write
    source: v_waiter_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "waiter_analysis_mv"

  - name: tst_waiter_analysis_completeness
    type: test
    test_type: completeness
    source: v_waiter_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-waiter-G01"

  - name: tst_waiter_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_waiter_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-waiter-G02"
