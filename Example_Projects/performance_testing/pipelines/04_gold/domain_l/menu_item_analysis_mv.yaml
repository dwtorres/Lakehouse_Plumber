pipeline: domain_l_gold
flowgroup: menu_item_analysis_mv
actions:
  - name: menu_item_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.menu_item_dim
    target: v_menu_item_analysis

  - name: write_menu_item_analysis_mv
    type: write
    source: v_menu_item_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "menu_item_analysis_mv"

  - name: tst_menu_item_analysis_completeness
    type: test
    test_type: completeness
    source: v_menu_item_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-menu_item-G01"

  - name: tst_menu_item_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_menu_item_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-menu_item-G02"
