pipeline: domain_l_gold
flowgroup: restaurant_summary_mv
actions:
  - name: restaurant_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.restaurant_fct
    target: v_restaurant_summary

  - name: write_restaurant_summary_mv
    type: write
    source: v_restaurant_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "restaurant_summary_mv"

  - name: tst_restaurant_summary_completeness
    type: test
    test_type: completeness
    source: v_restaurant_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-restaurant-G01"

  - name: tst_restaurant_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_restaurant_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-restaurant-G02"
