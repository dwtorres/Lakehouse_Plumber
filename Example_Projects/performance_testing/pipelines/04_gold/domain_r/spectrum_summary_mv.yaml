pipeline: domain_r_gold
flowgroup: spectrum_summary_mv
actions:
  - name: spectrum_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.spectrum_dim
    target: v_spectrum_summary

  - name: write_spectrum_summary_mv
    type: write
    source: v_spectrum_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "spectrum_summary_mv"

  - name: tst_spectrum_summary_completeness
    type: test
    test_type: completeness
    source: v_spectrum_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-spectrum-G01"

  - name: tst_spectrum_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_spectrum_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-spectrum-G02"
