pipeline: domain_r_gold
flowgroup: tle_analysis_mv
actions:
  - name: tle_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tle_dim
    target: v_tle_analysis

  - name: write_tle_analysis_mv
    type: write
    source: v_tle_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tle_analysis_mv"

  - name: tst_tle_analysis_completeness
    type: test
    test_type: completeness
    source: v_tle_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tle-G01"

  - name: tst_tle_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_tle_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tle-G02"
