pipeline: domain_r_gold
flowgroup: signal_strength_daily_agg_mv
actions:
  - name: signal_strength_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.signal_strength_dim
        GROUP BY 1
    target: v_signal_strength_daily_agg

  - name: write_signal_strength_daily_agg_mv
    type: write
    source: v_signal_strength_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "signal_strength_daily_agg_mv"

  - name: tst_signal_strength_daily_agg_completeness
    type: test
    test_type: completeness
    source: v_signal_strength_daily_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-signal_strength-G01"

  - name: tst_signal_strength_daily_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_signal_strength_daily_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-signal_strength-G02"
