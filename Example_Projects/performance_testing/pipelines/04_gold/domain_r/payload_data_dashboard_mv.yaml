pipeline: domain_r_gold
flowgroup: payload_data_dashboard_mv
actions:
  - name: payload_data_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.payload_data_dim
    target: v_payload_data_dashboard

  - name: write_payload_data_dashboard_mv
    type: write
    source: v_payload_data_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "payload_data_dashboard_mv"

  - name: tst_payload_data_dashboard_completeness
    type: test
    test_type: completeness
    source: v_payload_data_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-payload_data-G01"

  - name: tst_payload_data_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_payload_data_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-payload_data-G02"
