pipeline: domain_r_gold
flowgroup: antenna_dashboard_mv
actions:
  - name: antenna_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.antenna_fct
    target: v_antenna_dashboard

  - name: write_antenna_dashboard_mv
    type: write
    source: v_antenna_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "antenna_dashboard_mv"

  - name: tst_antenna_dashboard_completeness
    type: test
    test_type: completeness
    source: v_antenna_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-antenna-G01"

  - name: tst_antenna_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_antenna_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-antenna-G02"
