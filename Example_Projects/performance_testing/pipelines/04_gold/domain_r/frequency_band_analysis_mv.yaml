pipeline: domain_r_gold
flowgroup: frequency_band_analysis_mv
actions:
  - name: frequency_band_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.frequency_band_dim
    target: v_frequency_band_analysis

  - name: write_frequency_band_analysis_mv
    type: write
    source: v_frequency_band_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "frequency_band_analysis_mv"

  - name: tst_frequency_band_analysis_completeness
    type: test
    test_type: completeness
    source: v_frequency_band_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-frequency_band-G01"

  - name: tst_frequency_band_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_frequency_band_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-frequency_band-G02"
