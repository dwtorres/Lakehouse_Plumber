pipeline: domain_r_gold
flowgroup: link_budget_dashboard_mv
actions:
  - name: link_budget_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.link_budget_dim
    target: v_link_budget_dashboard

  - name: write_link_budget_dashboard_mv
    type: write
    source: v_link_budget_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "link_budget_dashboard_mv"

  - name: tst_link_budget_dashboard_completeness
    type: test
    test_type: completeness
    source: v_link_budget_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-link_budget-G01"

  - name: tst_link_budget_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_link_budget_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-link_budget-G02"
