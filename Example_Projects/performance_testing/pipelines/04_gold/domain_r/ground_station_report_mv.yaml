pipeline: domain_r_gold
flowgroup: ground_station_report_mv
actions:
  - name: ground_station_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.ground_station_dim
    target: v_ground_station_report

  - name: write_ground_station_report_mv
    type: write
    source: v_ground_station_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "ground_station_report_mv"

  - name: tst_ground_station_report_completeness
    type: test
    test_type: completeness
    source: v_ground_station_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-ground_station-G01"

  - name: tst_ground_station_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_ground_station_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-ground_station-G02"
