pipeline: domain_r_gold
flowgroup: launch_vehicle_report_mv
actions:
  - name: launch_vehicle_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.launch_vehicle_dim
    target: v_launch_vehicle_report

  - name: write_launch_vehicle_report_mv
    type: write
    source: v_launch_vehicle_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "launch_vehicle_report_mv"

  - name: tst_launch_vehicle_report_completeness
    type: test
    test_type: completeness
    source: v_launch_vehicle_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-launch_vehicle-G01"

  - name: tst_launch_vehicle_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_launch_vehicle_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-launch_vehicle-G02"
