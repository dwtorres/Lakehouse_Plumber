pipeline: domain_r_gold
flowgroup: mission_dashboard_mv
actions:
  - name: mission_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.mission_fct
    target: v_mission_dashboard

  - name: write_mission_dashboard_mv
    type: write
    source: v_mission_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "mission_dashboard_mv"

  - name: tst_mission_dashboard_completeness
    type: test
    test_type: completeness
    source: v_mission_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-mission-G01"

  - name: tst_mission_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_mission_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-mission-G02"
