pipeline: domain_r_gold
flowgroup: telemetry_frame_analysis_mv
actions:
  - name: telemetry_frame_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.telemetry_frame_dim
    target: v_telemetry_frame_analysis

  - name: write_telemetry_frame_analysis_mv
    type: write
    source: v_telemetry_frame_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "telemetry_frame_analysis_mv"

  - name: tst_telemetry_frame_analysis_completeness
    type: test
    test_type: completeness
    source: v_telemetry_frame_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-telemetry_frame-G01"

  - name: tst_telemetry_frame_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_telemetry_frame_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-telemetry_frame-G02"
