pipeline: domain_r_gold
flowgroup: ephemeris_summary_mv
actions:
  - name: ephemeris_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.ephemeris_fct
    target: v_ephemeris_summary

  - name: write_ephemeris_summary_mv
    type: write
    source: v_ephemeris_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "ephemeris_summary_mv"

  - name: tst_ephemeris_summary_completeness
    type: test
    test_type: completeness
    source: v_ephemeris_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-ephemeris-G01"

  - name: tst_ephemeris_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_ephemeris_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-ephemeris-G02"
