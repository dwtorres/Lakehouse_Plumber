pipeline: domain_j_gold
flowgroup: virtual_power_plant_quarterly_agg_mv
actions:
  - name: virtual_power_plant_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.virtual_power_plant_fct
        GROUP BY 1
    target: v_virtual_power_plant_quarterly_agg

  - name: write_virtual_power_plant_quarterly_agg_mv
    type: write
    source: v_virtual_power_plant_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "virtual_power_plant_quarterly_agg_mv"

  - name: tst_virtual_power_plant_quarterly_agg_completeness
    type: test
    test_type: completeness
    source: v_virtual_power_plant_quarterly_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-virtual_power_plant-G01"

  - name: tst_virtual_power_plant_quarterly_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_virtual_power_plant_quarterly_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-virtual_power_plant-G02"
