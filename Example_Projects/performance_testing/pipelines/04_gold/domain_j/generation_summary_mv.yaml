pipeline: domain_j_gold
flowgroup: generation_summary_mv
actions:
  - name: generation_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.generation_dim
    target: v_generation_summary

  - name: write_generation_summary_mv
    type: write
    source: v_generation_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "generation_summary_mv"

  - name: tst_generation_summary_completeness
    type: test
    test_type: completeness
    source: v_generation_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-generation-G01"

  - name: tst_generation_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_generation_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-generation-G02"
