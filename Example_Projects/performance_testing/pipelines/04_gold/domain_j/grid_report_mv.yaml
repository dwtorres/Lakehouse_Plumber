pipeline: domain_j_gold
flowgroup: grid_report_mv
actions:
  - name: grid_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.grid_dim
    target: v_grid_report

  - name: write_grid_report_mv
    type: write
    source: v_grid_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "grid_report_mv"

  - name: tst_grid_report_completeness
    type: test
    test_type: completeness
    source: v_grid_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-grid-G01"

  - name: tst_grid_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_grid_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-grid-G02"
