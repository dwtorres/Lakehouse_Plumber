pipeline: domain_j_gold
flowgroup: ancillary_service_monthly_agg_mv
actions:
  - name: ancillary_service_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.ancillary_service_dim
        GROUP BY 1
    target: v_ancillary_service_monthly_agg

  - name: write_ancillary_service_monthly_agg_mv
    type: write
    source: v_ancillary_service_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "ancillary_service_monthly_agg_mv"

  - name: tst_ancillary_service_monthly_agg_completeness
    type: test
    test_type: completeness
    source: v_ancillary_service_monthly_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-ancillary_service-G01"

  - name: tst_ancillary_service_monthly_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_ancillary_service_monthly_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-ancillary_service-G02"
