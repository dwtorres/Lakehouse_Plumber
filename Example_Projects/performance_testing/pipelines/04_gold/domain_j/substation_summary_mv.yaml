pipeline: domain_j_gold
flowgroup: substation_summary_mv
actions:
  - name: substation_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.substation_dim
    target: v_substation_summary

  - name: write_substation_summary_mv
    type: write
    source: v_substation_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "substation_summary_mv"

  - name: tst_substation_summary_completeness
    type: test
    test_type: completeness
    source: v_substation_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-substation-G01"

  - name: tst_substation_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_substation_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-substation-G02"
