pipeline: domain_j_gold
flowgroup: net_metering_analysis_mv
actions:
  - name: net_metering_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.net_metering_dim
    target: v_net_metering_analysis

  - name: write_net_metering_analysis_mv
    type: write
    source: v_net_metering_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "net_metering_analysis_mv"

  - name: tst_net_metering_analysis_completeness
    type: test
    test_type: completeness
    source: v_net_metering_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-net_metering-G01"

  - name: tst_net_metering_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_net_metering_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-net_metering-G02"
