pipeline: domain_j_gold
flowgroup: power_factor_report_mv
actions:
  - name: power_factor_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.power_factor_fct
    target: v_power_factor_report

  - name: write_power_factor_report_mv
    type: write
    source: v_power_factor_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "power_factor_report_mv"

  - name: tst_power_factor_report_completeness
    type: test
    test_type: completeness
    source: v_power_factor_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-power_factor-G01"

  - name: tst_power_factor_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_power_factor_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-power_factor-G02"
