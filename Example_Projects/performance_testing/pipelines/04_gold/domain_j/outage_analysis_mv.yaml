pipeline: domain_j_gold
flowgroup: outage_analysis_mv
actions:
  - name: outage_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.outage_dim
    target: v_outage_analysis

  - name: write_outage_analysis_mv
    type: write
    source: v_outage_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "outage_analysis_mv"

  - name: tst_outage_analysis_completeness
    type: test
    test_type: completeness
    source: v_outage_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-outage-G01"

  - name: tst_outage_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_outage_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-outage-G02"
