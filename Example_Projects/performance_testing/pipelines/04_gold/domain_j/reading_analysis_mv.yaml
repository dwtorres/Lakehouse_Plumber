pipeline: domain_j_gold
flowgroup: reading_analysis_mv
actions:
  - name: reading_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.reading_dim
    target: v_reading_analysis

  - name: write_reading_analysis_mv
    type: write
    source: v_reading_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "reading_analysis_mv"

  - name: tst_reading_analysis_completeness
    type: test
    test_type: completeness
    source: v_reading_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-reading-G01"

  - name: tst_reading_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_reading_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-reading-G02"
