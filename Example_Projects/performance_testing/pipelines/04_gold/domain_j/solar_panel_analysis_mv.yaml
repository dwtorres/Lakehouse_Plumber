pipeline: domain_j_gold
flowgroup: solar_panel_analysis_mv
actions:
  - name: solar_panel_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.solar_panel_fct
    target: v_solar_panel_analysis

  - name: write_solar_panel_analysis_mv
    type: write
    source: v_solar_panel_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "solar_panel_analysis_mv"

  - name: tst_solar_panel_analysis_completeness
    type: test
    test_type: completeness
    source: v_solar_panel_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-solar_panel-G01"

  - name: tst_solar_panel_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_solar_panel_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-solar_panel-G02"
