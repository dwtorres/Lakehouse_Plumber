pipeline: domain_j_gold
flowgroup: capacitor_bank_monthly_agg_mv
actions:
  - name: capacitor_bank_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.capacitor_bank_dim
        GROUP BY 1
    target: v_capacitor_bank_monthly_agg

  - name: write_capacitor_bank_monthly_agg_mv
    type: write
    source: v_capacitor_bank_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "capacitor_bank_monthly_agg_mv"

  - name: tst_capacitor_bank_monthly_agg_completeness
    type: test
    test_type: completeness
    source: v_capacitor_bank_monthly_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-capacitor_bank-G01"

  - name: tst_capacitor_bank_monthly_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_capacitor_bank_monthly_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-capacitor_bank-G02"
