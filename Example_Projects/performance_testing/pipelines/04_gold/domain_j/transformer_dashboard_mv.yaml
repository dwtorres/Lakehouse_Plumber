pipeline: domain_j_gold
flowgroup: transformer_dashboard_mv
actions:
  - name: transformer_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.transformer_fct
    target: v_transformer_dashboard

  - name: write_transformer_dashboard_mv
    type: write
    source: v_transformer_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "transformer_dashboard_mv"

  - name: tst_transformer_dashboard_completeness
    type: test
    test_type: completeness
    source: v_transformer_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-transformer-G01"

  - name: tst_transformer_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_transformer_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-transformer-G02"
