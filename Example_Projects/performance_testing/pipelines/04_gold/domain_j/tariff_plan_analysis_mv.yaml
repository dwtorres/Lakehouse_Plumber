pipeline: domain_j_gold
flowgroup: tariff_plan_analysis_mv
actions:
  - name: tariff_plan_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tariff_plan_dim
    target: v_tariff_plan_analysis

  - name: write_tariff_plan_analysis_mv
    type: write
    source: v_tariff_plan_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tariff_plan_analysis_mv"

  - name: tst_tariff_plan_analysis_completeness
    type: test
    test_type: completeness
    source: v_tariff_plan_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tariff_plan-G01"

  - name: tst_tariff_plan_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_tariff_plan_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tariff_plan-G02"
