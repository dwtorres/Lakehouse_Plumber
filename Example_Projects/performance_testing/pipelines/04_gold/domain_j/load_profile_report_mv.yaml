pipeline: domain_j_gold
flowgroup: load_profile_report_mv
actions:
  - name: load_profile_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.load_profile_fct
    target: v_load_profile_report

  - name: write_load_profile_report_mv
    type: write
    source: v_load_profile_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "load_profile_report_mv"

  - name: tst_load_profile_report_completeness
    type: test
    test_type: completeness
    source: v_load_profile_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-load_profile-G01"

  - name: tst_load_profile_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_load_profile_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-load_profile-G02"
