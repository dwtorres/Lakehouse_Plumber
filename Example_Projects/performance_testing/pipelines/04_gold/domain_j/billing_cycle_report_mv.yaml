pipeline: domain_j_gold
flowgroup: billing_cycle_report_mv
actions:
  - name: billing_cycle_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.billing_cycle_dim
    target: v_billing_cycle_report

  - name: write_billing_cycle_report_mv
    type: write
    source: v_billing_cycle_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "billing_cycle_report_mv"

  - name: tst_billing_cycle_report_completeness
    type: test
    test_type: completeness
    source: v_billing_cycle_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-billing_cycle-G01"

  - name: tst_billing_cycle_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_billing_cycle_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-billing_cycle-G02"
