pipeline: domain_b_gold
flowgroup: employee_summary_mv
actions:
  - name: employee_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.employee_fct
    target: v_employee_summary

  - name: write_employee_summary_mv
    type: write
    source: v_employee_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "employee_summary_mv"

  - name: tst_employee_summary_completeness
    type: test
    test_type: completeness
    source: v_employee_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-employee-G01"

  - name: tst_employee_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_employee_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-employee-G02"
