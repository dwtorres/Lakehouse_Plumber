pipeline: domain_b_gold
flowgroup: candidate_report_mv
actions:
  - name: candidate_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.candidate_dim
    target: v_candidate_report

  - name: write_candidate_report_mv
    type: write
    source: v_candidate_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "candidate_report_mv"

  - name: tst_candidate_report_completeness
    type: test
    test_type: completeness
    source: v_candidate_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-candidate-G01"

  - name: tst_candidate_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_candidate_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-candidate-G02"
