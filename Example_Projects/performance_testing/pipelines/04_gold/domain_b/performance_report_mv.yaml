pipeline: domain_b_gold
flowgroup: performance_report_mv
actions:
  - name: performance_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.performance_dim
    target: v_performance_report

  - name: write_performance_report_mv
    type: write
    source: v_performance_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "performance_report_mv"

  - name: tst_performance_report_completeness
    type: test
    test_type: completeness
    source: v_performance_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-performance-G01"

  - name: tst_performance_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_performance_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-performance-G02"
