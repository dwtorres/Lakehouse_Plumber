pipeline: domain_b_gold
flowgroup: leave_request_dashboard_mv
actions:
  - name: leave_request_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.leave_request_dim
    target: v_leave_request_dashboard

  - name: write_leave_request_dashboard_mv
    type: write
    source: v_leave_request_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "leave_request_dashboard_mv"

  - name: tst_leave_request_dashboard_completeness
    type: test
    test_type: completeness
    source: v_leave_request_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-leave_request-G01"

  - name: tst_leave_request_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_leave_request_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-leave_request-G02"
