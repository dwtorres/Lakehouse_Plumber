pipeline: domain_b_gold
flowgroup: department_analysis_mv
actions:
  - name: department_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.department_dim
    target: v_department_analysis

  - name: write_department_analysis_mv
    type: write
    source: v_department_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "department_analysis_mv"

  - name: tst_department_analysis_completeness
    type: test
    test_type: completeness
    source: v_department_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-department-G01"

  - name: tst_department_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_department_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-department-G02"
