pipeline: domain_b_gold
flowgroup: payroll_dashboard_mv
actions:
  - name: payroll_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.payroll_dim
    target: v_payroll_dashboard

  - name: write_payroll_dashboard_mv
    type: write
    source: v_payroll_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "payroll_dashboard_mv"

  - name: tst_payroll_dashboard_completeness
    type: test
    test_type: completeness
    source: v_payroll_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-payroll-G01"

  - name: tst_payroll_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_payroll_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-payroll-G02"
