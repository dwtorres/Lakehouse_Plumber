pipeline: domain_b_gold
flowgroup: job_posting_dashboard_mv
actions:
  - name: job_posting_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.job_posting_fct
    target: v_job_posting_dashboard

  - name: write_job_posting_dashboard_mv
    type: write
    source: v_job_posting_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "job_posting_dashboard_mv"

  - name: tst_job_posting_dashboard_completeness
    type: test
    test_type: completeness
    source: v_job_posting_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-job_posting-G01"

  - name: tst_job_posting_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_job_posting_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-job_posting-G02"
