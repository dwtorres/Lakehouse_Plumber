pipeline: domain_b_gold
flowgroup: offboarding_report_mv
actions:
  - name: offboarding_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.offboarding_fct
    target: v_offboarding_report

  - name: write_offboarding_report_mv
    type: write
    source: v_offboarding_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "offboarding_report_mv"

  - name: tst_offboarding_report_completeness
    type: test
    test_type: completeness
    source: v_offboarding_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-offboarding-G01"

  - name: tst_offboarding_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_offboarding_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-offboarding-G02"
