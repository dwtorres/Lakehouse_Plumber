pipeline: domain_b_gold
flowgroup: training_summary_mv
actions:
  - name: training_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.training_dim
    target: v_training_summary

  - name: write_training_summary_mv
    type: write
    source: v_training_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "training_summary_mv"

  - name: tst_training_summary_completeness
    type: test
    test_type: completeness
    source: v_training_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-training-G01"

  - name: tst_training_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_training_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-training-G02"
