pipeline: domain_b_gold
flowgroup: salary_analysis_mv
actions:
  - name: salary_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.salary_dim
    target: v_salary_analysis

  - name: write_salary_analysis_mv
    type: write
    source: v_salary_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "salary_analysis_mv"

  - name: tst_salary_analysis_completeness
    type: test
    test_type: completeness
    source: v_salary_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-salary-G01"

  - name: tst_salary_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_salary_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-salary-G02"
