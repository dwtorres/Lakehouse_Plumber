pipeline: domain_b_gold
flowgroup: goal_dashboard_mv
actions:
  - name: goal_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.goal_dim
    target: v_goal_dashboard

  - name: write_goal_dashboard_mv
    type: write
    source: v_goal_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "goal_dashboard_mv"

  - name: tst_goal_dashboard_completeness
    type: test
    test_type: completeness
    source: v_goal_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-goal-G01"

  - name: tst_goal_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_goal_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-goal-G02"
