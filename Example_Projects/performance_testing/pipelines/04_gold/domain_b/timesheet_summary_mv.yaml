pipeline: domain_b_gold
flowgroup: timesheet_summary_mv
actions:
  - name: timesheet_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.timesheet_dim
    target: v_timesheet_summary

  - name: write_timesheet_summary_mv
    type: write
    source: v_timesheet_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "timesheet_summary_mv"

  - name: tst_timesheet_summary_completeness
    type: test
    test_type: completeness
    source: v_timesheet_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-timesheet-G01"

  - name: tst_timesheet_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_timesheet_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-timesheet-G02"
