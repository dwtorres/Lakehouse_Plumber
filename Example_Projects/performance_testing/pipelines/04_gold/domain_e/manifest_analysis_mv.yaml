pipeline: domain_e_gold
flowgroup: manifest_analysis_mv
actions:
  - name: manifest_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.manifest_dim
    target: v_manifest_analysis

  - name: write_manifest_analysis_mv
    type: write
    source: v_manifest_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "manifest_analysis_mv"

  - name: tst_manifest_analysis_completeness
    type: test
    test_type: completeness
    source: v_manifest_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-manifest-G01"

  - name: tst_manifest_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_manifest_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-manifest-G02"
