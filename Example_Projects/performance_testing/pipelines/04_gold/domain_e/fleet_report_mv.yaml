pipeline: domain_e_gold
flowgroup: fleet_report_mv
actions:
  - name: fleet_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.fleet_dim
    target: v_fleet_report

  - name: write_fleet_report_mv
    type: write
    source: v_fleet_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "fleet_report_mv"

  - name: tst_fleet_report_completeness
    type: test
    test_type: completeness
    source: v_fleet_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-fleet-G01"

  - name: tst_fleet_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_fleet_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-fleet-G02"
