pipeline: domain_e_gold
flowgroup: parking_analysis_mv
actions:
  - name: parking_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.parking_fct
    target: v_parking_analysis

  - name: write_parking_analysis_mv
    type: write
    source: v_parking_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "parking_analysis_mv"

  - name: tst_parking_analysis_completeness
    type: test
    test_type: completeness
    source: v_parking_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-parking-G01"

  - name: tst_parking_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_parking_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-parking-G02"
