pipeline: domain_e_gold
flowgroup: zone_analysis_mv
actions:
  - name: zone_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.zone_dim
    target: v_zone_analysis

  - name: write_zone_analysis_mv
    type: write
    source: v_zone_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "zone_analysis_mv"

  - name: tst_zone_analysis_completeness
    type: test
    test_type: completeness
    source: v_zone_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-zone-G01"

  - name: tst_zone_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_zone_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-zone-G02"
