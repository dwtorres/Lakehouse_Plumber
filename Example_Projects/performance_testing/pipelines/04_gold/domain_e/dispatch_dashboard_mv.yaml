pipeline: domain_e_gold
flowgroup: dispatch_dashboard_mv
actions:
  - name: dispatch_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.dispatch_dim
    target: v_dispatch_dashboard

  - name: write_dispatch_dashboard_mv
    type: write
    source: v_dispatch_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "dispatch_dashboard_mv"

  - name: tst_dispatch_dashboard_completeness
    type: test
    test_type: completeness
    source: v_dispatch_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-dispatch-G01"

  - name: tst_dispatch_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_dispatch_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-dispatch-G02"
