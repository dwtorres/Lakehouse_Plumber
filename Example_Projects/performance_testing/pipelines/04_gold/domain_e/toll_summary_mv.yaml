pipeline: domain_e_gold
flowgroup: toll_summary_mv
actions:
  - name: toll_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.toll_dim
    target: v_toll_summary

  - name: write_toll_summary_mv
    type: write
    source: v_toll_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "toll_summary_mv"

  - name: tst_toll_summary_completeness
    type: test
    test_type: completeness
    source: v_toll_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-toll-G01"

  - name: tst_toll_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_toll_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-toll-G02"
