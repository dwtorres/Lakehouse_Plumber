pipeline: domain_e_gold
flowgroup: maintenance_report_mv
actions:
  - name: maintenance_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.maintenance_fct
    target: v_maintenance_report

  - name: write_maintenance_report_mv
    type: write
    source: v_maintenance_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "maintenance_report_mv"

  - name: tst_maintenance_report_completeness
    type: test
    test_type: completeness
    source: v_maintenance_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-maintenance-G01"

  - name: tst_maintenance_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_maintenance_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-maintenance-G02"
