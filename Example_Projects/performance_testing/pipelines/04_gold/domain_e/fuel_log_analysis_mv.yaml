pipeline: domain_e_gold
flowgroup: fuel_log_analysis_mv
actions:
  - name: fuel_log_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.fuel_log_dim
    target: v_fuel_log_analysis

  - name: write_fuel_log_analysis_mv
    type: write
    source: v_fuel_log_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "fuel_log_analysis_mv"

  - name: tst_fuel_log_analysis_completeness
    type: test
    test_type: completeness
    source: v_fuel_log_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-fuel_log-G01"

  - name: tst_fuel_log_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_fuel_log_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-fuel_log-G02"
