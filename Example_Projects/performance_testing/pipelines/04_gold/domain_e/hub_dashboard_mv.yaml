pipeline: domain_e_gold
flowgroup: hub_dashboard_mv
actions:
  - name: hub_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.hub_fct
    target: v_hub_dashboard

  - name: write_hub_dashboard_mv
    type: write
    source: v_hub_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "hub_dashboard_mv"

  - name: tst_hub_dashboard_completeness
    type: test
    test_type: completeness
    source: v_hub_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-hub-G01"

  - name: tst_hub_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_hub_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-hub-G02"
