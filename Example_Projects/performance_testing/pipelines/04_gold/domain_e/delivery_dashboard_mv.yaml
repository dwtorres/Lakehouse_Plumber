pipeline: domain_e_gold
flowgroup: delivery_dashboard_mv
actions:
  - name: delivery_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.delivery_fct
    target: v_delivery_dashboard

  - name: write_delivery_dashboard_mv
    type: write
    source: v_delivery_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "delivery_dashboard_mv"

  - name: tst_delivery_dashboard_completeness
    type: test
    test_type: completeness
    source: v_delivery_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-delivery-G01"

  - name: tst_delivery_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_delivery_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-delivery-G02"
