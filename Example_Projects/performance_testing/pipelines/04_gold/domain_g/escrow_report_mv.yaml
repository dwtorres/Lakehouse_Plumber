pipeline: domain_g_gold
flowgroup: escrow_report_mv
actions:
  - name: escrow_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.escrow_dim
    target: v_escrow_report

  - name: write_escrow_report_mv
    type: write
    source: v_escrow_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "escrow_report_mv"

  - name: tst_escrow_report_completeness
    type: test
    test_type: completeness
    source: v_escrow_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-escrow-G01"

  - name: tst_escrow_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_escrow_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-escrow-G02"
