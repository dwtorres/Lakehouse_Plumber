pipeline: domain_g_gold
flowgroup: eviction_analysis_mv
actions:
  - name: eviction_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.eviction_fct
    target: v_eviction_analysis

  - name: write_eviction_analysis_mv
    type: write
    source: v_eviction_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "eviction_analysis_mv"

  - name: tst_eviction_analysis_completeness
    type: test
    test_type: completeness
    source: v_eviction_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-eviction-G01"

  - name: tst_eviction_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_eviction_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-eviction-G02"
