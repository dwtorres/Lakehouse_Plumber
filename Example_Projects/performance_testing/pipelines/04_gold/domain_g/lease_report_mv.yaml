pipeline: domain_g_gold
flowgroup: lease_report_mv
actions:
  - name: lease_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.lease_dim
    target: v_lease_report

  - name: write_lease_report_mv
    type: write
    source: v_lease_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "lease_report_mv"

  - name: tst_lease_report_completeness
    type: test
    test_type: completeness
    source: v_lease_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-lease-G01"

  - name: tst_lease_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_lease_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-lease-G02"
