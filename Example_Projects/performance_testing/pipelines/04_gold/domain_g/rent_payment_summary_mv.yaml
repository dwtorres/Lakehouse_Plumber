pipeline: domain_g_gold
flowgroup: rent_payment_summary_mv
actions:
  - name: rent_payment_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.rent_payment_dim
    target: v_rent_payment_summary

  - name: write_rent_payment_summary_mv
    type: write
    source: v_rent_payment_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "rent_payment_summary_mv"

  - name: tst_rent_payment_summary_completeness
    type: test
    test_type: completeness
    source: v_rent_payment_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-rent_payment-G01"

  - name: tst_rent_payment_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_rent_payment_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-rent_payment-G02"
