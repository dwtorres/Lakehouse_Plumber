pipeline: domain_g_gold
flowgroup: amenity_report_mv
actions:
  - name: amenity_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.amenity_fct
    target: v_amenity_report

  - name: write_amenity_report_mv
    type: write
    source: v_amenity_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "amenity_report_mv"

  - name: tst_amenity_report_completeness
    type: test
    test_type: completeness
    source: v_amenity_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-amenity-G01"

  - name: tst_amenity_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_amenity_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-amenity-G02"
