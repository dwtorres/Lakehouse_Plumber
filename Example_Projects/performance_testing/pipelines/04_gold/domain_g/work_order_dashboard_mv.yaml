pipeline: domain_g_gold
flowgroup: work_order_dashboard_mv
actions:
  - name: work_order_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.work_order_dim
    target: v_work_order_dashboard

  - name: write_work_order_dashboard_mv
    type: write
    source: v_work_order_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "work_order_dashboard_mv"

  - name: tst_work_order_dashboard_completeness
    type: test
    test_type: completeness
    source: v_work_order_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-work_order-G01"

  - name: tst_work_order_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_work_order_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-work_order-G02"
