pipeline: domain_g_gold
flowgroup: deed_summary_mv
actions:
  - name: deed_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.deed_dim
    target: v_deed_summary

  - name: write_deed_summary_mv
    type: write
    source: v_deed_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "deed_summary_mv"

  - name: tst_deed_summary_completeness
    type: test
    test_type: completeness
    source: v_deed_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-deed-G01"

  - name: tst_deed_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_deed_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-deed-G02"
