pipeline: domain_g_gold
flowgroup: property_summary_mv
actions:
  - name: property_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.property_fct
    target: v_property_summary

  - name: write_property_summary_mv
    type: write
    source: v_property_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "property_summary_mv"

  - name: tst_property_summary_completeness
    type: test
    test_type: completeness
    source: v_property_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-property-G01"

  - name: tst_property_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_property_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-property-G02"
