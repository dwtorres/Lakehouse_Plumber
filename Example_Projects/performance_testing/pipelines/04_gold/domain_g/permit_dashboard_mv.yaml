pipeline: domain_g_gold
flowgroup: permit_dashboard_mv
actions:
  - name: permit_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.permit_dim
    target: v_permit_dashboard

  - name: write_permit_dashboard_mv
    type: write
    source: v_permit_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "permit_dashboard_mv"

  - name: tst_permit_dashboard_completeness
    type: test
    test_type: completeness
    source: v_permit_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-permit-G01"

  - name: tst_permit_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_permit_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-permit-G02"
