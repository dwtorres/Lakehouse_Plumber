pipeline: domain_g_gold
flowgroup: survey_analysis_mv
actions:
  - name: survey_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.survey_dim
    target: v_survey_analysis

  - name: write_survey_analysis_mv
    type: write
    source: v_survey_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "survey_analysis_mv"

  - name: tst_survey_analysis_completeness
    type: test
    test_type: completeness
    source: v_survey_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-survey-G01"

  - name: tst_survey_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_survey_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-survey-G02"
