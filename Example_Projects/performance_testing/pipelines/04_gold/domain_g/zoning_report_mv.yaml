pipeline: domain_g_gold
flowgroup: zoning_report_mv
actions:
  - name: zoning_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.zoning_fct
    target: v_zoning_report

  - name: write_zoning_report_mv
    type: write
    source: v_zoning_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "zoning_report_mv"

  - name: tst_zoning_report_completeness
    type: test
    test_type: completeness
    source: v_zoning_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-zoning-G01"

  - name: tst_zoning_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_zoning_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-zoning-G02"
