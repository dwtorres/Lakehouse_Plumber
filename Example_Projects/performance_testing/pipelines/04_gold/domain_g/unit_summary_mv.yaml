pipeline: domain_g_gold
flowgroup: unit_summary_mv
actions:
  - name: unit_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.unit_dim
    target: v_unit_summary

  - name: write_unit_summary_mv
    type: write
    source: v_unit_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "unit_summary_mv"

  - name: tst_unit_summary_completeness
    type: test
    test_type: completeness
    source: v_unit_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-unit-G01"

  - name: tst_unit_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_unit_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-unit-G02"
