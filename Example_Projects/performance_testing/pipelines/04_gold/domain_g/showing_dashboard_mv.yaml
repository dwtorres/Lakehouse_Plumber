pipeline: domain_g_gold
flowgroup: showing_dashboard_mv
actions:
  - name: showing_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.showing_dim
    target: v_showing_dashboard

  - name: write_showing_dashboard_mv
    type: write
    source: v_showing_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "showing_dashboard_mv"

  - name: tst_showing_dashboard_completeness
    type: test
    test_type: completeness
    source: v_showing_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-showing-G01"

  - name: tst_showing_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_showing_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-showing-G02"
