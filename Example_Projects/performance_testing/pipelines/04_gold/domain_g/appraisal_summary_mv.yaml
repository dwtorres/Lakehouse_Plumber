pipeline: domain_g_gold
flowgroup: appraisal_summary_mv
actions:
  - name: appraisal_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.appraisal_fct
    target: v_appraisal_summary

  - name: write_appraisal_summary_mv
    type: write
    source: v_appraisal_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "appraisal_summary_mv"

  - name: tst_appraisal_summary_completeness
    type: test
    test_type: completeness
    source: v_appraisal_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-appraisal-G01"

  - name: tst_appraisal_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_appraisal_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-appraisal-G02"
