pipeline: domain_g_gold
flowgroup: mortgage_analysis_mv
actions:
  - name: mortgage_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.mortgage_dim
    target: v_mortgage_analysis

  - name: write_mortgage_analysis_mv
    type: write
    source: v_mortgage_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "mortgage_analysis_mv"

  - name: tst_mortgage_analysis_completeness
    type: test
    test_type: completeness
    source: v_mortgage_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-mortgage-G01"

  - name: tst_mortgage_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_mortgage_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-mortgage-G02"
