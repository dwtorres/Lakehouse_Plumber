pipeline: domain_g_gold
flowgroup: tenant_analysis_mv
actions:
  - name: tenant_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tenant_dim
    target: v_tenant_analysis

  - name: write_tenant_analysis_mv
    type: write
    source: v_tenant_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tenant_analysis_mv"

  - name: tst_tenant_analysis_completeness
    type: test
    test_type: completeness
    source: v_tenant_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tenant-G01"

  - name: tst_tenant_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_tenant_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tenant-G02"
