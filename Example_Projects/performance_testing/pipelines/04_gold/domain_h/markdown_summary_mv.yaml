pipeline: domain_h_gold
flowgroup: markdown_summary_mv
actions:
  - name: markdown_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.markdown_dim
    target: v_markdown_summary

  - name: write_markdown_summary_mv
    type: write
    source: v_markdown_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "markdown_summary_mv"

  - name: tst_markdown_summary_completeness
    type: test
    test_type: completeness
    source: v_markdown_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-markdown-G01"

  - name: tst_markdown_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_markdown_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-markdown-G02"
