pipeline: domain_h_gold
flowgroup: receipt_summary_mv
actions:
  - name: receipt_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.receipt_fct
    target: v_receipt_summary

  - name: write_receipt_summary_mv
    type: write
    source: v_receipt_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "receipt_summary_mv"

  - name: tst_receipt_summary_completeness
    type: test
    test_type: completeness
    source: v_receipt_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-receipt-G01"

  - name: tst_receipt_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_receipt_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-receipt-G02"
