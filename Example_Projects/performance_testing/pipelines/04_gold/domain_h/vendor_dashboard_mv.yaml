pipeline: domain_h_gold
flowgroup: vendor_dashboard_mv
actions:
  - name: vendor_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.vendor_fct
    target: v_vendor_dashboard

  - name: write_vendor_dashboard_mv
    type: write
    source: v_vendor_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "vendor_dashboard_mv"

  - name: tst_vendor_dashboard_completeness
    type: test
    test_type: completeness
    source: v_vendor_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-vendor-G01"

  - name: tst_vendor_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_vendor_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-vendor-G02"
