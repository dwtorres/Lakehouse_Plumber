pipeline: domain_h_gold
flowgroup: nps_score_weekly_agg_mv
actions:
  - name: nps_score_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.nps_score_dim
        GROUP BY 1
    target: v_nps_score_weekly_agg

  - name: write_nps_score_weekly_agg_mv
    type: write
    source: v_nps_score_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "nps_score_weekly_agg_mv"

  - name: tst_nps_score_weekly_agg_completeness
    type: test
    test_type: completeness
    source: v_nps_score_weekly_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-nps_score-G01"

  - name: tst_nps_score_weekly_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_nps_score_weekly_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-nps_score-G02"
