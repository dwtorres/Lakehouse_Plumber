pipeline: domain_h_gold
flowgroup: return_item_dashboard_mv
actions:
  - name: return_item_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.return_item_fct
    target: v_return_item_dashboard

  - name: write_return_item_dashboard_mv
    type: write
    source: v_return_item_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "return_item_dashboard_mv"

  - name: tst_return_item_dashboard_completeness
    type: test
    test_type: completeness
    source: v_return_item_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-return_item-G01"

  - name: tst_return_item_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_return_item_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-return_item-G02"
