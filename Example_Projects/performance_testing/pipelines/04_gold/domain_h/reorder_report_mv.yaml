pipeline: domain_h_gold
flowgroup: reorder_report_mv
actions:
  - name: reorder_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.reorder_dim
    target: v_reorder_report

  - name: write_reorder_report_mv
    type: write
    source: v_reorder_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "reorder_report_mv"

  - name: tst_reorder_report_completeness
    type: test
    test_type: completeness
    source: v_reorder_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-reorder-G01"

  - name: tst_reorder_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_reorder_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-reorder-G02"
