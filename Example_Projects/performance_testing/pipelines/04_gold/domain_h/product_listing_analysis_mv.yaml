pipeline: domain_h_gold
flowgroup: product_listing_analysis_mv
actions:
  - name: product_listing_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.product_listing_dim
    target: v_product_listing_analysis

  - name: write_product_listing_analysis_mv
    type: write
    source: v_product_listing_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "product_listing_analysis_mv"

  - name: tst_product_listing_analysis_completeness
    type: test
    test_type: completeness
    source: v_product_listing_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-product_listing-G01"

  - name: tst_product_listing_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_product_listing_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-product_listing-G02"
