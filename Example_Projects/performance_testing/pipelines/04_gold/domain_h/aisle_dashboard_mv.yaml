pipeline: domain_h_gold
flowgroup: aisle_dashboard_mv
actions:
  - name: aisle_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.aisle_dim
    target: v_aisle_dashboard

  - name: write_aisle_dashboard_mv
    type: write
    source: v_aisle_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "aisle_dashboard_mv"

  - name: tst_aisle_dashboard_completeness
    type: test
    test_type: completeness
    source: v_aisle_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-aisle-G01"

  - name: tst_aisle_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_aisle_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-aisle-G02"
