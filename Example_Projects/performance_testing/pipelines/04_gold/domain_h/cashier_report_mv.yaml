pipeline: domain_h_gold
flowgroup: cashier_report_mv
actions:
  - name: cashier_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.cashier_dim
    target: v_cashier_report

  - name: write_cashier_report_mv
    type: write
    source: v_cashier_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "cashier_report_mv"

  - name: tst_cashier_report_completeness
    type: test
    test_type: completeness
    source: v_cashier_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cashier-G01"

  - name: tst_cashier_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_cashier_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-cashier-G02"
