pipeline: domain_h_gold
flowgroup: gift_card_analysis_mv
actions:
  - name: gift_card_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.gift_card_dim
    target: v_gift_card_analysis

  - name: write_gift_card_analysis_mv
    type: write
    source: v_gift_card_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "gift_card_analysis_mv"

  - name: tst_gift_card_analysis_completeness
    type: test
    test_type: completeness
    source: v_gift_card_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-gift_card-G01"

  - name: tst_gift_card_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_gift_card_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-gift_card-G02"
