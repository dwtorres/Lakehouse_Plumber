pipeline: domain_h_gold
flowgroup: barcode_analysis_mv
actions:
  - name: barcode_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.barcode_fct
    target: v_barcode_analysis

  - name: write_barcode_analysis_mv
    type: write
    source: v_barcode_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "barcode_analysis_mv"

  - name: tst_barcode_analysis_completeness
    type: test
    test_type: completeness
    source: v_barcode_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-barcode-G01"

  - name: tst_barcode_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_barcode_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-barcode-G02"
