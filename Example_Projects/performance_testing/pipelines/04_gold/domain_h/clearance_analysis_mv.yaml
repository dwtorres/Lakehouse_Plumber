pipeline: domain_h_gold
flowgroup: clearance_analysis_mv
actions:
  - name: clearance_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.clearance_dim
    target: v_clearance_analysis

  - name: write_clearance_analysis_mv
    type: write
    source: v_clearance_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "clearance_analysis_mv"

  - name: tst_clearance_analysis_completeness
    type: test
    test_type: completeness
    source: v_clearance_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-clearance-G01"

  - name: tst_clearance_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_clearance_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-clearance-G02"
