pipeline: domain_h_gold
flowgroup: shelf_report_mv
actions:
  - name: shelf_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.shelf_fct
    target: v_shelf_report

  - name: write_shelf_report_mv
    type: write
    source: v_shelf_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "shelf_report_mv"

  - name: tst_shelf_report_completeness
    type: test
    test_type: completeness
    source: v_shelf_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-shelf-G01"

  - name: tst_shelf_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_shelf_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-shelf-G02"
