pipeline: domain_c_gold
flowgroup: compliance_summary_mv
actions:
  - name: compliance_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.compliance_dim
    target: v_compliance_summary

  - name: write_compliance_summary_mv
    type: write
    source: v_compliance_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "compliance_summary_mv"

  - name: tst_compliance_summary_completeness
    type: test
    test_type: completeness
    source: v_compliance_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-compliance-G01"

  - name: tst_compliance_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_compliance_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-compliance-G02"
