pipeline: domain_c_gold
flowgroup: asset_report_mv
actions:
  - name: asset_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.asset_dim
    target: v_asset_report

  - name: write_asset_report_mv
    type: write
    source: v_asset_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "asset_report_mv"

  - name: tst_asset_report_completeness
    type: test
    test_type: completeness
    source: v_asset_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-asset-G01"

  - name: tst_asset_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_asset_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-asset-G02"
