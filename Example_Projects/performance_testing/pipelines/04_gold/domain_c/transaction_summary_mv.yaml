pipeline: domain_c_gold
flowgroup: transaction_summary_mv
actions:
  - name: transaction_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.transaction_fct
    target: v_transaction_summary

  - name: write_transaction_summary_mv
    type: write
    source: v_transaction_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "transaction_summary_mv"

  - name: tst_transaction_summary_completeness
    type: test
    test_type: completeness
    source: v_transaction_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-transaction-G01"

  - name: tst_transaction_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_transaction_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-transaction-G02"
