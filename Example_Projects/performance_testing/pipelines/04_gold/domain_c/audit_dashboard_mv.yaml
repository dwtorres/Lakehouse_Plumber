pipeline: domain_c_gold
flowgroup: audit_dashboard_mv
actions:
  - name: audit_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.audit_dim
    target: v_audit_dashboard

  - name: write_audit_dashboard_mv
    type: write
    source: v_audit_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "audit_dashboard_mv"

  - name: tst_audit_dashboard_completeness
    type: test
    test_type: completeness
    source: v_audit_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-audit-G01"

  - name: tst_audit_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_audit_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-audit-G02"
