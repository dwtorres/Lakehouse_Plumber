pipeline: domain_c_gold
flowgroup: regulation_analysis_mv
actions:
  - name: regulation_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.regulation_fct
    target: v_regulation_analysis

  - name: write_regulation_analysis_mv
    type: write
    source: v_regulation_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "regulation_analysis_mv"

  - name: tst_regulation_analysis_completeness
    type: test
    test_type: completeness
    source: v_regulation_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-regulation-G01"

  - name: tst_regulation_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_regulation_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-regulation-G02"
