pipeline: domain_c_gold
flowgroup: forecast_analysis_mv
actions:
  - name: forecast_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.forecast_dim
    target: v_forecast_analysis

  - name: write_forecast_analysis_mv
    type: write
    source: v_forecast_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "forecast_analysis_mv"

  - name: tst_forecast_analysis_completeness
    type: test
    test_type: completeness
    source: v_forecast_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-forecast-G01"

  - name: tst_forecast_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_forecast_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-forecast-G02"
