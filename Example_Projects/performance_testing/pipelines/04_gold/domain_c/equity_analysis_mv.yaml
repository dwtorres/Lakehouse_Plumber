pipeline: domain_c_gold
flowgroup: equity_analysis_mv
actions:
  - name: equity_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.equity_dim
    target: v_equity_analysis

  - name: write_equity_analysis_mv
    type: write
    source: v_equity_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "equity_analysis_mv"

  - name: tst_equity_analysis_completeness
    type: test
    test_type: completeness
    source: v_equity_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-equity-G01"

  - name: tst_equity_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_equity_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-equity-G02"
