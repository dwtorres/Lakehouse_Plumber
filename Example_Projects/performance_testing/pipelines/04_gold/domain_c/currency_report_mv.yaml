pipeline: domain_c_gold
flowgroup: currency_report_mv
actions:
  - name: currency_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.currency_fct
    target: v_currency_report

  - name: write_currency_report_mv
    type: write
    source: v_currency_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "currency_report_mv"

  - name: tst_currency_report_completeness
    type: test
    test_type: completeness
    source: v_currency_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-currency-G01"

  - name: tst_currency_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_currency_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-currency-G02"
