pipeline: domain_c_gold
flowgroup: liability_summary_mv
actions:
  - name: liability_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.liability_fct
    target: v_liability_summary

  - name: write_liability_summary_mv
    type: write
    source: v_liability_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "liability_summary_mv"

  - name: tst_liability_summary_completeness
    type: test
    test_type: completeness
    source: v_liability_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-liability-G01"

  - name: tst_liability_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_liability_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-liability-G02"
