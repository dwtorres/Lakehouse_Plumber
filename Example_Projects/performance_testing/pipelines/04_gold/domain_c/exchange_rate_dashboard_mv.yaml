pipeline: domain_c_gold
flowgroup: exchange_rate_dashboard_mv
actions:
  - name: exchange_rate_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.exchange_rate_dim
    target: v_exchange_rate_dashboard

  - name: write_exchange_rate_dashboard_mv
    type: write
    source: v_exchange_rate_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "exchange_rate_dashboard_mv"

  - name: tst_exchange_rate_dashboard_completeness
    type: test
    test_type: completeness
    source: v_exchange_rate_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-exchange_rate-G01"

  - name: tst_exchange_rate_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_exchange_rate_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-exchange_rate-G02"
