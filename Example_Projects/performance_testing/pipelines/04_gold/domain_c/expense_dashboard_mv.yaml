pipeline: domain_c_gold
flowgroup: expense_dashboard_mv
actions:
  - name: expense_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.expense_fct
    target: v_expense_dashboard

  - name: write_expense_dashboard_mv
    type: write
    source: v_expense_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "expense_dashboard_mv"

  - name: tst_expense_dashboard_completeness
    type: test
    test_type: completeness
    source: v_expense_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-expense-G01"

  - name: tst_expense_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_expense_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-expense-G02"
