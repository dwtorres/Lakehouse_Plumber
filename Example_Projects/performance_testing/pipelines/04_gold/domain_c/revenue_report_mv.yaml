pipeline: domain_c_gold
flowgroup: revenue_report_mv
actions:
  - name: revenue_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.revenue_dim
    target: v_revenue_report

  - name: write_revenue_report_mv
    type: write
    source: v_revenue_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "revenue_report_mv"

  - name: tst_revenue_report_completeness
    type: test
    test_type: completeness
    source: v_revenue_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-revenue-G01"

  - name: tst_revenue_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_revenue_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-revenue-G02"
