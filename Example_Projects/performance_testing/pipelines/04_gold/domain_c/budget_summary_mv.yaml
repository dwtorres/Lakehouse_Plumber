pipeline: domain_c_gold
flowgroup: budget_summary_mv
actions:
  - name: budget_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.budget_dim
    target: v_budget_summary

  - name: write_budget_summary_mv
    type: write
    source: v_budget_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "budget_summary_mv"

  - name: tst_budget_summary_completeness
    type: test
    test_type: completeness
    source: v_budget_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-budget-G01"

  - name: tst_budget_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_budget_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-budget-G02"
