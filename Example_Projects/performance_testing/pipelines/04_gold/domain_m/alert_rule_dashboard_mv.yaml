pipeline: domain_m_gold
flowgroup: alert_rule_dashboard_mv
actions:
  - name: alert_rule_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.alert_rule_dim
    target: v_alert_rule_dashboard

  - name: write_alert_rule_dashboard_mv
    type: write
    source: v_alert_rule_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "alert_rule_dashboard_mv"

  - name: tst_alert_rule_dashboard_completeness
    type: test
    test_type: completeness
    source: v_alert_rule_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-alert_rule-G01"

  - name: tst_alert_rule_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_alert_rule_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-alert_rule-G02"
