pipeline: domain_m_gold
flowgroup: actuator_report_mv
actions:
  - name: actuator_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.actuator_dim
    target: v_actuator_report

  - name: write_actuator_report_mv
    type: write
    source: v_actuator_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "actuator_report_mv"

  - name: tst_actuator_report_completeness
    type: test
    test_type: completeness
    source: v_actuator_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-actuator-G01"

  - name: tst_actuator_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_actuator_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-actuator-G02"
