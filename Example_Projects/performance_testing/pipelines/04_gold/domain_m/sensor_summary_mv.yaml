pipeline: domain_m_gold
flowgroup: sensor_summary_mv
actions:
  - name: sensor_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.sensor_fct
    target: v_sensor_summary

  - name: write_sensor_summary_mv
    type: write
    source: v_sensor_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "sensor_summary_mv"

  - name: tst_sensor_summary_completeness
    type: test
    test_type: completeness
    source: v_sensor_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-sensor-G01"

  - name: tst_sensor_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_sensor_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-sensor-G02"
