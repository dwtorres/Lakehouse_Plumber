pipeline: domain_m_gold
flowgroup: anomaly_analysis_mv
actions:
  - name: anomaly_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.anomaly_fct
    target: v_anomaly_analysis

  - name: write_anomaly_analysis_mv
    type: write
    source: v_anomaly_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "anomaly_analysis_mv"

  - name: tst_anomaly_analysis_completeness
    type: test
    test_type: completeness
    source: v_anomaly_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-anomaly-G01"

  - name: tst_anomaly_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_anomaly_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-anomaly-G02"
