pipeline: domain_m_gold
flowgroup: diagnostic_report_mv
actions:
  - name: diagnostic_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.diagnostic_fct
    target: v_diagnostic_report

  - name: write_diagnostic_report_mv
    type: write
    source: v_diagnostic_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "diagnostic_report_mv"

  - name: tst_diagnostic_report_completeness
    type: test
    test_type: completeness
    source: v_diagnostic_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-diagnostic-G01"

  - name: tst_diagnostic_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_diagnostic_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-diagnostic-G02"
