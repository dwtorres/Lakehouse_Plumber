pipeline: domain_m_gold
flowgroup: threshold_summary_mv
actions:
  - name: threshold_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.threshold_dim
    target: v_threshold_summary

  - name: write_threshold_summary_mv
    type: write
    source: v_threshold_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "threshold_summary_mv"

  - name: tst_threshold_summary_completeness
    type: test
    test_type: completeness
    source: v_threshold_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-threshold-G01"

  - name: tst_threshold_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_threshold_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-threshold-G02"
