pipeline: domain_m_gold
flowgroup: data_stream_report_mv
actions:
  - name: data_stream_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.data_stream_fct
    target: v_data_stream_report

  - name: write_data_stream_report_mv
    type: write
    source: v_data_stream_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "data_stream_report_mv"

  - name: tst_data_stream_report_completeness
    type: test
    test_type: completeness
    source: v_data_stream_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-data_stream-G01"

  - name: tst_data_stream_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_data_stream_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-data_stream-G02"
