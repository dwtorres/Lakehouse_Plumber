pipeline: domain_m_gold
flowgroup: configuration_analysis_mv
actions:
  - name: configuration_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.configuration_dim
    target: v_configuration_analysis

  - name: write_configuration_analysis_mv
    type: write
    source: v_configuration_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "configuration_analysis_mv"

  - name: tst_configuration_analysis_completeness
    type: test
    test_type: completeness
    source: v_configuration_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-configuration-G01"

  - name: tst_configuration_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_configuration_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-configuration-G02"
