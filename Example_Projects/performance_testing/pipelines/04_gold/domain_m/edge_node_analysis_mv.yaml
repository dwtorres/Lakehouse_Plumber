pipeline: domain_m_gold
flowgroup: edge_node_analysis_mv
actions:
  - name: edge_node_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.edge_node_dim
    target: v_edge_node_analysis

  - name: write_edge_node_analysis_mv
    type: write
    source: v_edge_node_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "edge_node_analysis_mv"

  - name: tst_edge_node_analysis_completeness
    type: test
    test_type: completeness
    source: v_edge_node_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-edge_node-G01"

  - name: tst_edge_node_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_edge_node_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-edge_node-G02"
