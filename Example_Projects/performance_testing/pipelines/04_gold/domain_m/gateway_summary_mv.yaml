pipeline: domain_m_gold
flowgroup: gateway_summary_mv
actions:
  - name: gateway_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.gateway_dim
    target: v_gateway_summary

  - name: write_gateway_summary_mv
    type: write
    source: v_gateway_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "gateway_summary_mv"

  - name: tst_gateway_summary_completeness
    type: test
    test_type: completeness
    source: v_gateway_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-gateway-G01"

  - name: tst_gateway_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_gateway_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-gateway-G02"
