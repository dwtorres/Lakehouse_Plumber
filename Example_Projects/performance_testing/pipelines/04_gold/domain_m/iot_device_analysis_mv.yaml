pipeline: domain_m_gold
flowgroup: iot_device_analysis_mv
actions:
  - name: iot_device_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.iot_device_dim
    target: v_iot_device_analysis

  - name: write_iot_device_analysis_mv
    type: write
    source: v_iot_device_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "iot_device_analysis_mv"

  - name: tst_iot_device_analysis_completeness
    type: test
    test_type: completeness
    source: v_iot_device_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-iot_device-G01"

  - name: tst_iot_device_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_iot_device_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-iot_device-G02"
