pipeline: domain_m_gold
flowgroup: protocol_dashboard_mv
actions:
  - name: protocol_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.protocol_dim
    target: v_protocol_dashboard

  - name: write_protocol_dashboard_mv
    type: write
    source: v_protocol_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "protocol_dashboard_mv"

  - name: tst_protocol_dashboard_completeness
    type: test
    test_type: completeness
    source: v_protocol_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-protocol-G01"

  - name: tst_protocol_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_protocol_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-protocol-G02"
