pipeline: domain_m_gold
flowgroup: data_catalog_daily_agg_mv
actions:
  - name: data_catalog_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.data_catalog_dim
        GROUP BY 1
    target: v_data_catalog_daily_agg

  - name: write_data_catalog_daily_agg_mv
    type: write
    source: v_data_catalog_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "data_catalog_daily_agg_mv"

  - name: tst_data_catalog_daily_agg_completeness
    type: test
    test_type: completeness
    source: v_data_catalog_daily_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-data_catalog-G01"

  - name: tst_data_catalog_daily_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_data_catalog_daily_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-data_catalog-G02"
