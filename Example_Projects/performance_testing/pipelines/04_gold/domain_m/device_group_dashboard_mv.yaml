pipeline: domain_m_gold
flowgroup: device_group_dashboard_mv
actions:
  - name: device_group_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.device_group_fct
    target: v_device_group_dashboard

  - name: write_device_group_dashboard_mv
    type: write
    source: v_device_group_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "device_group_dashboard_mv"

  - name: tst_device_group_dashboard_completeness
    type: test
    test_type: completeness
    source: v_device_group_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-device_group-G01"

  - name: tst_device_group_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_device_group_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-device_group-G02"
