pipeline: domain_m_gold
flowgroup: payload_analysis_mv
actions:
  - name: payload_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.payload_dim
    target: v_payload_analysis

  - name: write_payload_analysis_mv
    type: write
    source: v_payload_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "payload_analysis_mv"

  - name: tst_payload_analysis_completeness
    type: test
    test_type: completeness
    source: v_payload_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-payload-G01"

  - name: tst_payload_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_payload_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-payload-G02"
