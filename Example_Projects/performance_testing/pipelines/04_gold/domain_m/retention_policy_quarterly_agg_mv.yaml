pipeline: domain_m_gold
flowgroup: retention_policy_quarterly_agg_mv
actions:
  - name: retention_policy_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.retention_policy_dim
        GROUP BY 1
    target: v_retention_policy_quarterly_agg

  - name: write_retention_policy_quarterly_agg_mv
    type: write
    source: v_retention_policy_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "retention_policy_quarterly_agg_mv"

  - name: tst_retention_policy_quarterly_agg_completeness
    type: test
    test_type: completeness
    source: v_retention_policy_quarterly_agg
    required_columns: [period, record_count]
    on_violation: warn
    test_id: "PERF-retention_policy-G01"

  - name: tst_retention_policy_quarterly_agg_uniqueness
    type: test
    test_type: uniqueness
    source: v_retention_policy_quarterly_agg
    columns: [period]
    on_violation: warn
    test_id: "PERF-retention_policy-G02"
