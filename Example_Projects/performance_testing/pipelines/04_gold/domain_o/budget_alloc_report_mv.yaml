pipeline: domain_o_gold
flowgroup: budget_alloc_report_mv
actions:
  - name: budget_alloc_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.budget_alloc_dim
    target: v_budget_alloc_report

  - name: write_budget_alloc_report_mv
    type: write
    source: v_budget_alloc_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "budget_alloc_report_mv"

  - name: tst_budget_alloc_report_completeness
    type: test
    test_type: completeness
    source: v_budget_alloc_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-budget_alloc-G01"

  - name: tst_budget_alloc_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_budget_alloc_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-budget_alloc-G02"
