pipeline: domain_o_gold
flowgroup: engagement_analysis_mv
actions:
  - name: engagement_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.engagement_dim
    target: v_engagement_analysis

  - name: write_engagement_analysis_mv
    type: write
    source: v_engagement_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "engagement_analysis_mv"

  - name: tst_engagement_analysis_completeness
    type: test
    test_type: completeness
    source: v_engagement_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-engagement-G01"

  - name: tst_engagement_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_engagement_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-engagement-G02"
