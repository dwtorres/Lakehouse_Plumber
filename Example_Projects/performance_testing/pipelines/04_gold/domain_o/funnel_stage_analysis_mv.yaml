pipeline: domain_o_gold
flowgroup: funnel_stage_analysis_mv
actions:
  - name: funnel_stage_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.funnel_stage_dim
    target: v_funnel_stage_analysis

  - name: write_funnel_stage_analysis_mv
    type: write
    source: v_funnel_stage_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "funnel_stage_analysis_mv"

  - name: tst_funnel_stage_analysis_completeness
    type: test
    test_type: completeness
    source: v_funnel_stage_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-funnel_stage-G01"

  - name: tst_funnel_stage_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_funnel_stage_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-funnel_stage-G02"
