pipeline: domain_o_gold
flowgroup: creative_summary_mv
actions:
  - name: creative_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.creative_dim
    target: v_creative_summary

  - name: write_creative_summary_mv
    type: write
    source: v_creative_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "creative_summary_mv"

  - name: tst_creative_summary_completeness
    type: test
    test_type: completeness
    source: v_creative_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-creative-G01"

  - name: tst_creative_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_creative_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-creative-G02"
