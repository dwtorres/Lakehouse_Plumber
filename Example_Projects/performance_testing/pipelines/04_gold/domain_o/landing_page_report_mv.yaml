pipeline: domain_o_gold
flowgroup: landing_page_report_mv
actions:
  - name: landing_page_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.landing_page_fct
    target: v_landing_page_report

  - name: write_landing_page_report_mv
    type: write
    source: v_landing_page_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "landing_page_report_mv"

  - name: tst_landing_page_report_completeness
    type: test
    test_type: completeness
    source: v_landing_page_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-landing_page-G01"

  - name: tst_landing_page_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_landing_page_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-landing_page-G02"
