pipeline: domain_o_gold
flowgroup: audience_dashboard_mv
actions:
  - name: audience_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.audience_dim
    target: v_audience_dashboard

  - name: write_audience_dashboard_mv
    type: write
    source: v_audience_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "audience_dashboard_mv"

  - name: tst_audience_dashboard_completeness
    type: test
    test_type: completeness
    source: v_audience_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-audience-G01"

  - name: tst_audience_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_audience_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-audience-G02"
