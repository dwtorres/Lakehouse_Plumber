pipeline: domain_o_gold
flowgroup: segment_dashboard_mv
actions:
  - name: segment_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.segment_fct
    target: v_segment_dashboard

  - name: write_segment_dashboard_mv
    type: write
    source: v_segment_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "segment_dashboard_mv"

  - name: tst_segment_dashboard_completeness
    type: test
    test_type: completeness
    source: v_segment_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-segment-G01"

  - name: tst_segment_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_segment_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-segment-G02"
