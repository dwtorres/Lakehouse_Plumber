pipeline: domain_o_gold
flowgroup: click_summary_mv
actions:
  - name: click_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.click_dim
    target: v_click_summary

  - name: write_click_summary_mv
    type: write
    source: v_click_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "click_summary_mv"

  - name: tst_click_summary_completeness
    type: test
    test_type: completeness
    source: v_click_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-click-G01"

  - name: tst_click_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_click_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-click-G02"
