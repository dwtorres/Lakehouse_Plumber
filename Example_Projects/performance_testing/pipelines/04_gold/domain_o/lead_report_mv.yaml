pipeline: domain_o_gold
flowgroup: lead_report_mv
actions:
  - name: lead_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.lead_dim
    target: v_lead_report

  - name: write_lead_report_mv
    type: write
    source: v_lead_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "lead_report_mv"

  - name: tst_lead_report_completeness
    type: test
    test_type: completeness
    source: v_lead_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-lead-G01"

  - name: tst_lead_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_lead_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-lead-G02"
