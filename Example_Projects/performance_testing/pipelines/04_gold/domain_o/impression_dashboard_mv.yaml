pipeline: domain_o_gold
flowgroup: impression_dashboard_mv
actions:
  - name: impression_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.impression_fct
    target: v_impression_dashboard

  - name: write_impression_dashboard_mv
    type: write
    source: v_impression_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "impression_dashboard_mv"

  - name: tst_impression_dashboard_completeness
    type: test
    test_type: completeness
    source: v_impression_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-impression-G01"

  - name: tst_impression_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_impression_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-impression-G02"
