pipeline: domain_o_gold
flowgroup: bid_analysis_mv
actions:
  - name: bid_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.bid_fct
    target: v_bid_analysis

  - name: write_bid_analysis_mv
    type: write
    source: v_bid_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "bid_analysis_mv"

  - name: tst_bid_analysis_completeness
    type: test
    test_type: completeness
    source: v_bid_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-bid-G01"

  - name: tst_bid_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_bid_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-bid-G02"
