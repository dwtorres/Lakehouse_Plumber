pipeline: domain_o_gold
flowgroup: campaign_summary_mv
actions:
  - name: campaign_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.campaign_fct
    target: v_campaign_summary

  - name: write_campaign_summary_mv
    type: write
    source: v_campaign_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "campaign_summary_mv"

  - name: tst_campaign_summary_completeness
    type: test
    test_type: completeness
    source: v_campaign_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-campaign-G01"

  - name: tst_campaign_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_campaign_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-campaign-G02"
