pipeline: domain_f_gold
flowgroup: grade_report_mv
actions:
  - name: grade_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.grade_fct
    target: v_grade_report

  - name: write_grade_report_mv
    type: write
    source: v_grade_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "grade_report_mv"

  - name: tst_grade_report_completeness
    type: test
    test_type: completeness
    source: v_grade_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-grade-G01"

  - name: tst_grade_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_grade_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-grade-G02"
