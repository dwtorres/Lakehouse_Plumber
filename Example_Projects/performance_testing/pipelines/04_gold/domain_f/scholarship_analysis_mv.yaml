pipeline: domain_f_gold
flowgroup: scholarship_analysis_mv
actions:
  - name: scholarship_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.scholarship_fct
    target: v_scholarship_analysis

  - name: write_scholarship_analysis_mv
    type: write
    source: v_scholarship_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "scholarship_analysis_mv"

  - name: tst_scholarship_analysis_completeness
    type: test
    test_type: completeness
    source: v_scholarship_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-scholarship-G01"

  - name: tst_scholarship_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_scholarship_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-scholarship-G02"
