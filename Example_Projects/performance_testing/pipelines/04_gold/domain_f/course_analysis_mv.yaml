pipeline: domain_f_gold
flowgroup: course_analysis_mv
actions:
  - name: course_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.course_dim
    target: v_course_analysis

  - name: write_course_analysis_mv
    type: write
    source: v_course_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "course_analysis_mv"

  - name: tst_course_analysis_completeness
    type: test
    test_type: completeness
    source: v_course_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-course-G01"

  - name: tst_course_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_course_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-course-G02"
