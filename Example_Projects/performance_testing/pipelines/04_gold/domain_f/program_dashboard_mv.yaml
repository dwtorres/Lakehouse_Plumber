pipeline: domain_f_gold
flowgroup: program_dashboard_mv
actions:
  - name: program_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.program_dim
    target: v_program_dashboard

  - name: write_program_dashboard_mv
    type: write
    source: v_program_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "program_dashboard_mv"

  - name: tst_program_dashboard_completeness
    type: test
    test_type: completeness
    source: v_program_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-program-G01"

  - name: tst_program_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_program_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-program-G02"
