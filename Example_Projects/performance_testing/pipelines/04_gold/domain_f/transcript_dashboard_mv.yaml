pipeline: domain_f_gold
flowgroup: transcript_dashboard_mv
actions:
  - name: transcript_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.transcript_fct
    target: v_transcript_dashboard

  - name: write_transcript_dashboard_mv
    type: write
    source: v_transcript_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "transcript_dashboard_mv"

  - name: tst_transcript_dashboard_completeness
    type: test
    test_type: completeness
    source: v_transcript_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-transcript-G01"

  - name: tst_transcript_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_transcript_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-transcript-G02"
