pipeline: domain_f_gold
flowgroup: instructor_dashboard_mv
actions:
  - name: instructor_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.instructor_fct
    target: v_instructor_dashboard

  - name: write_instructor_dashboard_mv
    type: write
    source: v_instructor_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "instructor_dashboard_mv"

  - name: tst_instructor_dashboard_completeness
    type: test
    test_type: completeness
    source: v_instructor_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-instructor-G01"

  - name: tst_instructor_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_instructor_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-instructor-G02"
