pipeline: domain_f_gold
flowgroup: degree_summary_mv
actions:
  - name: degree_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.degree_dim
    target: v_degree_summary

  - name: write_degree_summary_mv
    type: write
    source: v_degree_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "degree_summary_mv"

  - name: tst_degree_summary_completeness
    type: test
    test_type: completeness
    source: v_degree_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-degree-G01"

  - name: tst_degree_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_degree_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-degree-G02"
