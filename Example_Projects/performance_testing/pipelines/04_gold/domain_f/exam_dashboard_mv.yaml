pipeline: domain_f_gold
flowgroup: exam_dashboard_mv
actions:
  - name: exam_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.exam_dim
    target: v_exam_dashboard

  - name: write_exam_dashboard_mv
    type: write
    source: v_exam_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "exam_dashboard_mv"

  - name: tst_exam_dashboard_completeness
    type: test
    test_type: completeness
    source: v_exam_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-exam-G01"

  - name: tst_exam_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_exam_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-exam-G02"
