pipeline: domain_f_gold
flowgroup: semester_dashboard_mv
actions:
  - name: semester_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.semester_dim
    target: v_semester_dashboard

  - name: write_semester_dashboard_mv
    type: write
    source: v_semester_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "semester_dashboard_mv"

  - name: tst_semester_dashboard_completeness
    type: test
    test_type: completeness
    source: v_semester_dashboard
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-semester-G01"

  - name: tst_semester_dashboard_uniqueness
    type: test
    test_type: uniqueness
    source: v_semester_dashboard
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-semester-G02"
