pipeline: domain_f_gold
flowgroup: tuition_report_mv
actions:
  - name: tuition_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tuition_dim
    target: v_tuition_report

  - name: write_tuition_report_mv
    type: write
    source: v_tuition_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tuition_report_mv"

  - name: tst_tuition_report_completeness
    type: test
    test_type: completeness
    source: v_tuition_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tuition-G01"

  - name: tst_tuition_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_tuition_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-tuition-G02"
