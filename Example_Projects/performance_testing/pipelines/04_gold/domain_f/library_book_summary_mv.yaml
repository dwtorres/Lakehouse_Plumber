pipeline: domain_f_gold
flowgroup: library_book_summary_mv
actions:
  - name: library_book_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.library_book_fct
    target: v_library_book_summary

  - name: write_library_book_summary_mv
    type: write
    source: v_library_book_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "library_book_summary_mv"

  - name: tst_library_book_summary_completeness
    type: test
    test_type: completeness
    source: v_library_book_summary
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-library_book-G01"

  - name: tst_library_book_summary_uniqueness
    type: test
    test_type: uniqueness
    source: v_library_book_summary
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-library_book-G02"
