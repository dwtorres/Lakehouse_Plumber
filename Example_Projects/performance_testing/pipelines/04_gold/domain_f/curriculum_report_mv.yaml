pipeline: domain_f_gold
flowgroup: curriculum_report_mv
actions:
  - name: curriculum_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.curriculum_fct
    target: v_curriculum_report

  - name: write_curriculum_report_mv
    type: write
    source: v_curriculum_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "curriculum_report_mv"

  - name: tst_curriculum_report_completeness
    type: test
    test_type: completeness
    source: v_curriculum_report
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-curriculum-G01"

  - name: tst_curriculum_report_uniqueness
    type: test
    test_type: uniqueness
    source: v_curriculum_report
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-curriculum-G02"
