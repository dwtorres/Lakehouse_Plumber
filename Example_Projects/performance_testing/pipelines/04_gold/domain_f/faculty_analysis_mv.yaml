pipeline: domain_f_gold
flowgroup: faculty_analysis_mv
actions:
  - name: faculty_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.faculty_dim
    target: v_faculty_analysis

  - name: write_faculty_analysis_mv
    type: write
    source: v_faculty_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "faculty_analysis_mv"

  - name: tst_faculty_analysis_completeness
    type: test
    test_type: completeness
    source: v_faculty_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-faculty-G01"

  - name: tst_faculty_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_faculty_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-faculty-G02"
