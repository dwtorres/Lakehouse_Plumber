pipeline: domain_f_gold
flowgroup: assignment_analysis_mv
actions:
  - name: assignment_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.assignment_dim
    target: v_assignment_analysis

  - name: write_assignment_analysis_mv
    type: write
    source: v_assignment_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "assignment_analysis_mv"

  - name: tst_assignment_analysis_completeness
    type: test
    test_type: completeness
    source: v_assignment_analysis
    required_columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-assignment-G01"

  - name: tst_assignment_analysis_uniqueness
    type: test
    test_type: uniqueness
    source: v_assignment_analysis
    columns: [_report_generated_at]
    on_violation: warn
    test_id: "PERF-assignment-G02"
