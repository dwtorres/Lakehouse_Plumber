pipeline: domain_e_silver
flowgroup: vehicle_silver_fct
presets:
  - default_delta_properties
actions:
  - name: vehicle_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: vehicle
    target: v_vehicle_bronze
    description: "Load vehicle from bronze for silver layer"

  - name: write_vehicle_silver
    type: write
    source: v_vehicle_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "vehicle_fct"
      mode: "cdc"
      cdc_config:
        keys: ["vehicle_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_vehicle_silver_completeness
    type: test
    test_type: completeness
    source: v_vehicle_bronze
    required_columns: [vehicle_key]
    on_violation: warn
    test_id: "PERF-vehicle-S01"

  - name: tst_vehicle_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_vehicle_bronze
    columns: [vehicle_key]
    on_violation: warn
    test_id: "PERF-vehicle-S02"
