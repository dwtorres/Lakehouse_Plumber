pipeline: domain_m_silver
flowgroup: workflow_trigger_silver_dim
presets:
  - default_delta_properties
actions:
  - name: workflow_trigger_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: workflow_trigger
    target: v_workflow_trigger_bronze
    description: "Load workflow_trigger from bronze for silver layer"

  - name: write_workflow_trigger_silver
    type: write
    source: v_workflow_trigger_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "workflow_trigger_dim"
      mode: "cdc"
      cdc_config:
        keys: ["workflow_trigger_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_workflow_trigger_silver_completeness
    type: test
    test_type: completeness
    source: v_workflow_trigger_bronze
    required_columns: [workflow_trigger_key]
    on_violation: warn
    test_id: "PERF-workflow_trigger-S01"

  - name: tst_workflow_trigger_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_workflow_trigger_bronze
    columns: [workflow_trigger_key]
    on_violation: warn
    test_id: "PERF-workflow_trigger-S02"
