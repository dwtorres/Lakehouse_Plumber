pipeline: domain_m_silver
flowgroup: sla_metric_silver_dim
presets:
  - default_delta_properties
actions:
  - name: sla_metric_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: sla_metric
    target: v_sla_metric_bronze
    description: "Load sla_metric from bronze for silver layer"

  - name: write_sla_metric_silver
    type: write
    source: v_sla_metric_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "sla_metric_dim"
      mode: "cdc"
      cdc_config:
        keys: ["sla_metric_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_sla_metric_silver_completeness
    type: test
    test_type: completeness
    source: v_sla_metric_bronze
    required_columns: [sla_metric_key]
    on_violation: warn
    test_id: "PERF-sla_metric-S01"

  - name: tst_sla_metric_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_sla_metric_bronze
    columns: [sla_metric_key]
    on_violation: warn
    test_id: "PERF-sla_metric-S02"
