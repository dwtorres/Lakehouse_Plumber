pipeline: domain_m_silver
flowgroup: predictive_model_silver_dim
presets:
  - default_delta_properties
actions:
  - name: predictive_model_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: predictive_model
    target: v_predictive_model_bronze
    description: "Load predictive_model from bronze for silver layer"

  - name: write_predictive_model_silver
    type: write
    source: v_predictive_model_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "predictive_model_dim"
      mode: "cdc"
      cdc_config:
        keys: ["predictive_model_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_predictive_model_silver_completeness
    type: test
    test_type: completeness
    source: v_predictive_model_bronze
    required_columns: [predictive_model_key]
    on_violation: warn
    test_id: "PERF-predictive_model-S01"

  - name: tst_predictive_model_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_predictive_model_bronze
    columns: [predictive_model_key]
    on_violation: warn
    test_id: "PERF-predictive_model-S02"
