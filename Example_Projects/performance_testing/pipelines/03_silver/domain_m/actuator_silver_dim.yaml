pipeline: domain_m_silver
flowgroup: actuator_silver_dim
presets:
  - default_delta_properties
actions:
  - name: actuator_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: actuator
    target: v_actuator_bronze
    description: "Load actuator from bronze for silver layer"

  - name: write_actuator_silver
    type: write
    source: v_actuator_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "actuator_dim"
      mode: "cdc"
      cdc_config:
        keys: ["actuator_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_actuator_silver_completeness
    type: test
    test_type: completeness
    source: v_actuator_bronze
    required_columns: [actuator_key]
    on_violation: warn
    test_id: "PERF-actuator-S01"

  - name: tst_actuator_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_actuator_bronze
    columns: [actuator_key]
    on_violation: warn
    test_id: "PERF-actuator-S02"
