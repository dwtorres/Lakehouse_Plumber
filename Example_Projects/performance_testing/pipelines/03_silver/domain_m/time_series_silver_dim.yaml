pipeline: domain_m_silver
flowgroup: time_series_silver_dim
presets:
  - default_delta_properties
actions:
  - name: time_series_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: time_series
    target: v_time_series_bronze
    description: "Load time_series from bronze for silver layer"

  - name: write_time_series_silver
    type: write
    source: v_time_series_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "time_series_dim"
      mode: "cdc"
      cdc_config:
        keys: ["time_series_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_time_series_silver_completeness
    type: test
    test_type: completeness
    source: v_time_series_bronze
    required_columns: [time_series_key]
    on_violation: warn
    test_id: "PERF-time_series-S01"

  - name: tst_time_series_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_time_series_bronze
    columns: [time_series_key]
    on_violation: warn
    test_id: "PERF-time_series-S02"
