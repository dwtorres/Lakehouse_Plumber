pipeline: domain_m_silver
flowgroup: configuration_silver_dim
presets:
  - default_delta_properties
actions:
  - name: configuration_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: configuration
    target: v_configuration_bronze
    description: "Load configuration from bronze for silver layer"

  - name: write_configuration_silver
    type: write
    source: v_configuration_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "configuration_dim"
      mode: "cdc"
      cdc_config:
        keys: ["configuration_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_configuration_silver_completeness
    type: test
    test_type: completeness
    source: v_configuration_bronze
    required_columns: [configuration_key]
    on_violation: warn
    test_id: "PERF-configuration-S01"

  - name: tst_configuration_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_configuration_bronze
    columns: [configuration_key]
    on_violation: warn
    test_id: "PERF-configuration-S02"
