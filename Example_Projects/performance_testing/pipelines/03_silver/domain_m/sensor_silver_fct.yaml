pipeline: domain_m_silver
flowgroup: sensor_silver_fct
presets:
  - default_delta_properties
actions:
  - name: sensor_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: sensor
    target: v_sensor_bronze
    description: "Load sensor from bronze for silver layer"

  - name: write_sensor_silver
    type: write
    source: v_sensor_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "sensor_fct"
      mode: "cdc"
      cdc_config:
        keys: ["sensor_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_sensor_silver_completeness
    type: test
    test_type: completeness
    source: v_sensor_bronze
    required_columns: [sensor_key]
    on_violation: warn
    test_id: "PERF-sensor-S01"

  - name: tst_sensor_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_sensor_bronze
    columns: [sensor_key]
    on_violation: warn
    test_id: "PERF-sensor-S02"
