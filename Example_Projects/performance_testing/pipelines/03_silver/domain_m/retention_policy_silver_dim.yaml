pipeline: domain_m_silver
flowgroup: retention_policy_silver_dim
presets:
  - default_delta_properties
actions:
  - name: retention_policy_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: retention_policy
    target: v_retention_policy_bronze
    description: "Load retention_policy from bronze for silver layer"

  - name: write_retention_policy_silver
    type: write
    source: v_retention_policy_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "retention_policy_dim"
      mode: "cdc"
      cdc_config:
        keys: ["retention_policy_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_retention_policy_silver_completeness
    type: test
    test_type: completeness
    source: v_retention_policy_bronze
    required_columns: [retention_policy_key]
    on_violation: warn
    test_id: "PERF-retention_policy-S01"

  - name: tst_retention_policy_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_retention_policy_bronze
    columns: [retention_policy_key]
    on_violation: warn
    test_id: "PERF-retention_policy-S02"
