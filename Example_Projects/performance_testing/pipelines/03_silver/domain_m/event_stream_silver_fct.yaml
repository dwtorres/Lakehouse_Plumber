pipeline: domain_m_silver
flowgroup: event_stream_silver_fct
presets:
  - default_delta_properties
actions:
  - name: event_stream_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: event_stream
    target: v_event_stream_bronze
    description: "Load event_stream from bronze for silver layer"

  - name: write_event_stream_silver
    type: write
    source: v_event_stream_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "event_stream_fct"
      mode: "cdc"
      cdc_config:
        keys: ["event_stream_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_event_stream_silver_completeness
    type: test
    test_type: completeness
    source: v_event_stream_bronze
    required_columns: [event_stream_key]
    on_violation: warn
    test_id: "PERF-event_stream-S01"

  - name: tst_event_stream_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_event_stream_bronze
    columns: [event_stream_key]
    on_violation: warn
    test_id: "PERF-event_stream-S02"
