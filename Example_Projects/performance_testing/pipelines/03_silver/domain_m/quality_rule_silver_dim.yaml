pipeline: domain_m_silver
flowgroup: quality_rule_silver_dim
presets:
  - default_delta_properties
actions:
  - name: quality_rule_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: quality_rule
    target: v_quality_rule_bronze
    description: "Load quality_rule from bronze for silver layer"

  - name: write_quality_rule_silver
    type: write
    source: v_quality_rule_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "quality_rule_dim"
      mode: "cdc"
      cdc_config:
        keys: ["quality_rule_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_quality_rule_silver_completeness
    type: test
    test_type: completeness
    source: v_quality_rule_bronze
    required_columns: [quality_rule_key]
    on_violation: warn
    test_id: "PERF-quality_rule-S01"

  - name: tst_quality_rule_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_quality_rule_bronze
    columns: [quality_rule_key]
    on_violation: warn
    test_id: "PERF-quality_rule-S02"
