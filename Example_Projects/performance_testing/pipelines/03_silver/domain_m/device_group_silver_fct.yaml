pipeline: domain_m_silver
flowgroup: device_group_silver_fct
presets:
  - default_delta_properties
actions:
  - name: device_group_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: device_group
    target: v_device_group_bronze
    description: "Load device_group from bronze for silver layer"

  - name: write_device_group_silver
    type: write
    source: v_device_group_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "device_group_fct"
      mode: "cdc"
      cdc_config:
        keys: ["device_group_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_device_group_silver_completeness
    type: test
    test_type: completeness
    source: v_device_group_bronze
    required_columns: [device_group_key]
    on_violation: warn
    test_id: "PERF-device_group-S01"

  - name: tst_device_group_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_device_group_bronze
    columns: [device_group_key]
    on_violation: warn
    test_id: "PERF-device_group-S02"
