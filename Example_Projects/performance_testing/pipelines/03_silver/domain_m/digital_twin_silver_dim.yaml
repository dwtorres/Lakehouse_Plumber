pipeline: domain_m_silver
flowgroup: digital_twin_silver_dim
presets:
  - default_delta_properties
actions:
  - name: digital_twin_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: digital_twin
    target: v_digital_twin_bronze
    description: "Load digital_twin from bronze for silver layer"

  - name: write_digital_twin_silver
    type: write
    source: v_digital_twin_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "digital_twin_dim"
      mode: "cdc"
      cdc_config:
        keys: ["digital_twin_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_digital_twin_silver_completeness
    type: test
    test_type: completeness
    source: v_digital_twin_bronze
    required_columns: [digital_twin_key]
    on_violation: warn
    test_id: "PERF-digital_twin-S01"

  - name: tst_digital_twin_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_digital_twin_bronze
    columns: [digital_twin_key]
    on_violation: warn
    test_id: "PERF-digital_twin-S02"
