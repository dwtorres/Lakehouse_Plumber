pipeline: domain_m_silver
flowgroup: threshold_silver_dim
presets:
  - default_delta_properties
actions:
  - name: threshold_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: threshold
    target: v_threshold_bronze
    description: "Load threshold from bronze for silver layer"

  - name: write_threshold_silver
    type: write
    source: v_threshold_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "threshold_dim"
      mode: "cdc"
      cdc_config:
        keys: ["threshold_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_threshold_silver_completeness
    type: test
    test_type: completeness
    source: v_threshold_bronze
    required_columns: [threshold_key]
    on_violation: warn
    test_id: "PERF-threshold-S01"

  - name: tst_threshold_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_threshold_bronze
    columns: [threshold_key]
    on_violation: warn
    test_id: "PERF-threshold-S02"
