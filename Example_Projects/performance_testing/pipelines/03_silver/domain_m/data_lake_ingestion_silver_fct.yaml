pipeline: domain_m_silver
flowgroup: data_lake_ingestion_silver_fct
presets:
  - default_delta_properties
actions:
  - name: data_lake_ingestion_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: data_lake_ingestion
    target: v_data_lake_ingestion_bronze
    description: "Load data_lake_ingestion from bronze for silver layer"

  - name: write_data_lake_ingestion_silver
    type: write
    source: v_data_lake_ingestion_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "data_lake_ingestion_fct"
      mode: "cdc"
      cdc_config:
        keys: ["data_lake_ingestion_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_data_lake_ingestion_silver_completeness
    type: test
    test_type: completeness
    source: v_data_lake_ingestion_bronze
    required_columns: [data_lake_ingestion_key]
    on_violation: warn
    test_id: "PERF-data_lake_ingestion-S01"

  - name: tst_data_lake_ingestion_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_data_lake_ingestion_bronze
    columns: [data_lake_ingestion_key]
    on_violation: warn
    test_id: "PERF-data_lake_ingestion-S02"
