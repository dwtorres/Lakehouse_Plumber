pipeline: domain_m_silver
flowgroup: simulation_silver_fct
presets:
  - default_delta_properties
actions:
  - name: simulation_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: simulation
    target: v_simulation_bronze
    description: "Load simulation from bronze for silver layer"

  - name: write_simulation_silver
    type: write
    source: v_simulation_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "simulation_fct"
      mode: "cdc"
      cdc_config:
        keys: ["simulation_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_simulation_silver_completeness
    type: test
    test_type: completeness
    source: v_simulation_bronze
    required_columns: [simulation_key]
    on_violation: warn
    test_id: "PERF-simulation-S01"

  - name: tst_simulation_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_simulation_bronze
    columns: [simulation_key]
    on_violation: warn
    test_id: "PERF-simulation-S02"
