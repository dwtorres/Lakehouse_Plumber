pipeline: domain_m_silver
flowgroup: replay_silver_dim
presets:
  - default_delta_properties
actions:
  - name: replay_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: replay
    target: v_replay_bronze
    description: "Load replay from bronze for silver layer"

  - name: write_replay_silver
    type: write
    source: v_replay_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "replay_dim"
      mode: "cdc"
      cdc_config:
        keys: ["replay_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_replay_silver_completeness
    type: test
    test_type: completeness
    source: v_replay_bronze
    required_columns: [replay_key]
    on_violation: warn
    test_id: "PERF-replay-S01"

  - name: tst_replay_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_replay_bronze
    columns: [replay_key]
    on_violation: warn
    test_id: "PERF-replay-S02"
