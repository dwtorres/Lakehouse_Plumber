pipeline: domain_m_silver
flowgroup: network_node_silver_dim
presets:
  - default_delta_properties
actions:
  - name: network_node_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: network_node
    target: v_network_node_bronze
    description: "Load network_node from bronze for silver layer"

  - name: write_network_node_silver
    type: write
    source: v_network_node_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "network_node_dim"
      mode: "cdc"
      cdc_config:
        keys: ["network_node_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_network_node_silver_completeness
    type: test
    test_type: completeness
    source: v_network_node_bronze
    required_columns: [network_node_key]
    on_violation: warn
    test_id: "PERF-network_node-S01"

  - name: tst_network_node_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_network_node_bronze
    columns: [network_node_key]
    on_violation: warn
    test_id: "PERF-network_node-S02"
