pipeline: domain_m_silver
flowgroup: dead_letter_silver_dim
presets:
  - default_delta_properties
actions:
  - name: dead_letter_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: dead_letter
    target: v_dead_letter_bronze
    description: "Load dead_letter from bronze for silver layer"

  - name: write_dead_letter_silver
    type: write
    source: v_dead_letter_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "dead_letter_dim"
      mode: "cdc"
      cdc_config:
        keys: ["dead_letter_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_dead_letter_silver_completeness
    type: test
    test_type: completeness
    source: v_dead_letter_bronze
    required_columns: [dead_letter_key]
    on_violation: warn
    test_id: "PERF-dead_letter-S01"

  - name: tst_dead_letter_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_dead_letter_bronze
    columns: [dead_letter_key]
    on_violation: warn
    test_id: "PERF-dead_letter-S02"
