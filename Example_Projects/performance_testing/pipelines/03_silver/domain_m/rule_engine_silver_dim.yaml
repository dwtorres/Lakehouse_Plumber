pipeline: domain_m_silver
flowgroup: rule_engine_silver_dim
presets:
  - default_delta_properties
actions:
  - name: rule_engine_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: rule_engine
    target: v_rule_engine_bronze
    description: "Load rule_engine from bronze for silver layer"

  - name: write_rule_engine_silver
    type: write
    source: v_rule_engine_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "rule_engine_dim"
      mode: "cdc"
      cdc_config:
        keys: ["rule_engine_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_rule_engine_silver_completeness
    type: test
    test_type: completeness
    source: v_rule_engine_bronze
    required_columns: [rule_engine_key]
    on_violation: warn
    test_id: "PERF-rule_engine-S01"

  - name: tst_rule_engine_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_rule_engine_bronze
    columns: [rule_engine_key]
    on_violation: warn
    test_id: "PERF-rule_engine-S02"
