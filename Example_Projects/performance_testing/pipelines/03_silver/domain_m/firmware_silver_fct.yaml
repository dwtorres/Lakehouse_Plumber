pipeline: domain_m_silver
flowgroup: firmware_silver_fct
presets:
  - default_delta_properties
actions:
  - name: firmware_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: firmware
    target: v_firmware_bronze
    description: "Load firmware from bronze for silver layer"

  - name: write_firmware_silver
    type: write
    source: v_firmware_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "firmware_fct"
      mode: "cdc"
      cdc_config:
        keys: ["firmware_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_firmware_silver_completeness
    type: test
    test_type: completeness
    source: v_firmware_bronze
    required_columns: [firmware_key]
    on_violation: warn
    test_id: "PERF-firmware-S01"

  - name: tst_firmware_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_firmware_bronze
    columns: [firmware_key]
    on_violation: warn
    test_id: "PERF-firmware-S02"
