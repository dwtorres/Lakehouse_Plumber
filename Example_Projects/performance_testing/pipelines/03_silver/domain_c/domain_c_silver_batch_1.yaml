pipeline: domain_c_silver
flowgroup: transaction_silver_fct
presets:
  - default_delta_properties
actions:
  - name: transaction_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: transaction
    target: v_transaction_bronze
    description: "Load transaction from bronze for silver layer"

  - name: write_transaction_silver
    type: write
    source: v_transaction_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "transaction_fct"
      mode: "cdc"
      cdc_config:
        keys: ["transaction_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_transaction_silver_completeness
    type: test
    test_type: completeness
    source: v_transaction_bronze
    required_columns: [transaction_key]
    on_violation: warn
    test_id: "PERF-transaction-S01"

  - name: tst_transaction_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_transaction_bronze
    columns: [transaction_key]
    on_violation: warn
    test_id: "PERF-transaction-S02"
---
