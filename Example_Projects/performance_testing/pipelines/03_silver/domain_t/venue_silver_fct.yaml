pipeline: domain_t_silver
flowgroup: venue_silver_fct
presets:
  - default_delta_properties
actions:
  - name: venue_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: venue
    target: v_venue_bronze
    description: "Load venue from bronze for silver layer"

  - name: write_venue_silver
    type: write
    source: v_venue_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "venue_fct"
      mode: "cdc"
      cdc_config:
        keys: ["venue_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_venue_silver_completeness
    type: test
    test_type: completeness
    source: v_venue_bronze
    required_columns: [venue_key]
    on_violation: warn
    test_id: "PERF-venue-S01"

  - name: tst_venue_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_venue_bronze
    columns: [venue_key]
    on_violation: warn
    test_id: "PERF-venue-S02"
