pipeline: domain_t_silver
flowgroup: cassette_run_silver_dim
presets:
  - default_delta_properties
actions:
  - name: cassette_run_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: cassette_run
    target: v_cassette_run_bronze
    description: "Load cassette_run from bronze for silver layer"

  - name: write_cassette_run_silver
    type: write
    source: v_cassette_run_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "cassette_run_dim"
      mode: "cdc"
      cdc_config:
        keys: ["cassette_run_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_cassette_run_silver_completeness
    type: test
    test_type: completeness
    source: v_cassette_run_bronze
    required_columns: [cassette_run_key]
    on_violation: warn
    test_id: "PERF-cassette_run-S01"

  - name: tst_cassette_run_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_cassette_run_bronze
    columns: [cassette_run_key]
    on_violation: warn
    test_id: "PERF-cassette_run-S02"
