pipeline: domain_t_silver
flowgroup: concert_silver_dim
presets:
  - default_delta_properties
actions:
  - name: concert_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: concert
    target: v_concert_bronze
    description: "Load concert from bronze for silver layer"

  - name: write_concert_silver
    type: write
    source: v_concert_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "concert_dim"
      mode: "cdc"
      cdc_config:
        keys: ["concert_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_concert_silver_completeness
    type: test
    test_type: completeness
    source: v_concert_bronze
    required_columns: [concert_key]
    on_violation: warn
    test_id: "PERF-concert-S01"

  - name: tst_concert_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_concert_bronze
    columns: [concert_key]
    on_violation: warn
    test_id: "PERF-concert-S02"
