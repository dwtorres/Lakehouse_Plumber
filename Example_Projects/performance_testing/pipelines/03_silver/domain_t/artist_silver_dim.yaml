pipeline: domain_t_silver
flowgroup: artist_silver_dim
presets:
  - default_delta_properties
actions:
  - name: artist_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: artist
    target: v_artist_bronze
    description: "Load artist from bronze for silver layer"

  - name: write_artist_silver
    type: write
    source: v_artist_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "artist_dim"
      mode: "cdc"
      cdc_config:
        keys: ["artist_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_artist_silver_completeness
    type: test
    test_type: completeness
    source: v_artist_bronze
    required_columns: [artist_key]
    on_violation: warn
    test_id: "PERF-artist-S01"

  - name: tst_artist_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_artist_bronze
    columns: [artist_key]
    on_violation: warn
    test_id: "PERF-artist-S02"
