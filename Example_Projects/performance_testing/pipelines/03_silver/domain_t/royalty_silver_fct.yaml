pipeline: domain_t_silver
flowgroup: royalty_silver_fct
presets:
  - default_delta_properties
actions:
  - name: royalty_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: royalty
    target: v_royalty_bronze
    description: "Load royalty from bronze for silver layer"

  - name: write_royalty_silver
    type: write
    source: v_royalty_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "royalty_fct"
      mode: "cdc"
      cdc_config:
        keys: ["royalty_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_royalty_silver_completeness
    type: test
    test_type: completeness
    source: v_royalty_bronze
    required_columns: [royalty_key]
    on_violation: warn
    test_id: "PERF-royalty-S01"

  - name: tst_royalty_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_royalty_bronze
    columns: [royalty_key]
    on_violation: warn
    test_id: "PERF-royalty-S02"
