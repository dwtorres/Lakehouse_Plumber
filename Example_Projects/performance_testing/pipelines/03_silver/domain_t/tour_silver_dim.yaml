pipeline: domain_t_silver
flowgroup: tour_silver_dim
presets:
  - default_delta_properties
actions:
  - name: tour_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: tour
    target: v_tour_bronze
    description: "Load tour from bronze for silver layer"

  - name: write_tour_silver
    type: write
    source: v_tour_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "tour_dim"
      mode: "cdc"
      cdc_config:
        keys: ["tour_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_tour_silver_completeness
    type: test
    test_type: completeness
    source: v_tour_bronze
    required_columns: [tour_key]
    on_violation: warn
    test_id: "PERF-tour-S01"

  - name: tst_tour_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_tour_bronze
    columns: [tour_key]
    on_violation: warn
    test_id: "PERF-tour-S02"
