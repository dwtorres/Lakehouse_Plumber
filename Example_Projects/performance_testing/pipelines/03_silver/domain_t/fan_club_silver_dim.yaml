pipeline: domain_t_silver
flowgroup: fan_club_silver_dim
presets:
  - default_delta_properties
actions:
  - name: fan_club_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: fan_club
    target: v_fan_club_bronze
    description: "Load fan_club from bronze for silver layer"

  - name: write_fan_club_silver
    type: write
    source: v_fan_club_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "fan_club_dim"
      mode: "cdc"
      cdc_config:
        keys: ["fan_club_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_fan_club_silver_completeness
    type: test
    test_type: completeness
    source: v_fan_club_bronze
    required_columns: [fan_club_key]
    on_violation: warn
    test_id: "PERF-fan_club-S01"

  - name: tst_fan_club_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_fan_club_bronze
    columns: [fan_club_key]
    on_violation: warn
    test_id: "PERF-fan_club-S02"
