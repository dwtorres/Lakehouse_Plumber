pipeline: domain_t_silver
flowgroup: press_kit_silver_dim
presets:
  - default_delta_properties
actions:
  - name: press_kit_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: press_kit
    target: v_press_kit_bronze
    description: "Load press_kit from bronze for silver layer"

  - name: write_press_kit_silver
    type: write
    source: v_press_kit_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "press_kit_dim"
      mode: "cdc"
      cdc_config:
        keys: ["press_kit_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_press_kit_silver_completeness
    type: test
    test_type: completeness
    source: v_press_kit_bronze
    required_columns: [press_kit_key]
    on_violation: warn
    test_id: "PERF-press_kit-S01"

  - name: tst_press_kit_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_press_kit_bronze
    columns: [press_kit_key]
    on_violation: warn
    test_id: "PERF-press_kit-S02"
