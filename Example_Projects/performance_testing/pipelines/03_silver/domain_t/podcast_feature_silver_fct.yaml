pipeline: domain_t_silver
flowgroup: podcast_feature_silver_fct
presets:
  - default_delta_properties
actions:
  - name: podcast_feature_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: podcast_feature
    target: v_podcast_feature_bronze
    description: "Load podcast_feature from bronze for silver layer"

  - name: write_podcast_feature_silver
    type: write
    source: v_podcast_feature_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "podcast_feature_fct"
      mode: "cdc"
      cdc_config:
        keys: ["podcast_feature_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_podcast_feature_silver_completeness
    type: test
    test_type: completeness
    source: v_podcast_feature_bronze
    required_columns: [podcast_feature_key]
    on_violation: warn
    test_id: "PERF-podcast_feature-S01"

  - name: tst_podcast_feature_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_podcast_feature_bronze
    columns: [podcast_feature_key]
    on_violation: warn
    test_id: "PERF-podcast_feature-S02"
