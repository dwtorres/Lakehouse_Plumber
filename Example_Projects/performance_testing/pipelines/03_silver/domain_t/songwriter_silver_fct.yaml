pipeline: domain_t_silver
flowgroup: songwriter_silver_fct
presets:
  - default_delta_properties
actions:
  - name: songwriter_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: songwriter
    target: v_songwriter_bronze
    description: "Load songwriter from bronze for silver layer"

  - name: write_songwriter_silver
    type: write
    source: v_songwriter_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "songwriter_fct"
      mode: "cdc"
      cdc_config:
        keys: ["songwriter_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_songwriter_silver_completeness
    type: test
    test_type: completeness
    source: v_songwriter_bronze
    required_columns: [songwriter_key]
    on_violation: warn
    test_id: "PERF-songwriter-S01"

  - name: tst_songwriter_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_songwriter_bronze
    columns: [songwriter_key]
    on_violation: warn
    test_id: "PERF-songwriter-S02"
