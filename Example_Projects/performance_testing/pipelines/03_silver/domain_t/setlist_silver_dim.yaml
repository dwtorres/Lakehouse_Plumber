pipeline: domain_t_silver
flowgroup: setlist_silver_dim
presets:
  - default_delta_properties
actions:
  - name: setlist_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: setlist
    target: v_setlist_bronze
    description: "Load setlist from bronze for silver layer"

  - name: write_setlist_silver
    type: write
    source: v_setlist_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "setlist_dim"
      mode: "cdc"
      cdc_config:
        keys: ["setlist_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_setlist_silver_completeness
    type: test
    test_type: completeness
    source: v_setlist_bronze
    required_columns: [setlist_key]
    on_violation: warn
    test_id: "PERF-setlist-S01"

  - name: tst_setlist_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_setlist_bronze
    columns: [setlist_key]
    on_violation: warn
    test_id: "PERF-setlist-S02"
