pipeline: domain_t_silver
flowgroup: music_track_silver_fct
presets:
  - default_delta_properties
actions:
  - name: music_track_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: music_track
    target: v_music_track_bronze
    description: "Load music_track from bronze for silver layer"

  - name: write_music_track_silver
    type: write
    source: v_music_track_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "music_track_fct"
      mode: "cdc"
      cdc_config:
        keys: ["music_track_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_music_track_silver_completeness
    type: test
    test_type: completeness
    source: v_music_track_bronze
    required_columns: [music_track_key]
    on_violation: warn
    test_id: "PERF-music_track-S01"

  - name: tst_music_track_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_music_track_bronze
    columns: [music_track_key]
    on_violation: warn
    test_id: "PERF-music_track-S02"
