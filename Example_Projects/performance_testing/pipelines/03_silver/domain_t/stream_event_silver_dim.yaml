pipeline: domain_t_silver
flowgroup: stream_event_silver_dim
presets:
  - default_delta_properties
actions:
  - name: stream_event_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: stream_event
    target: v_stream_event_bronze
    description: "Load stream_event from bronze for silver layer"

  - name: write_stream_event_silver
    type: write
    source: v_stream_event_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "stream_event_dim"
      mode: "cdc"
      cdc_config:
        keys: ["stream_event_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_stream_event_silver_completeness
    type: test
    test_type: completeness
    source: v_stream_event_bronze
    required_columns: [stream_event_key]
    on_violation: warn
    test_id: "PERF-stream_event-S01"

  - name: tst_stream_event_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_stream_event_bronze
    columns: [stream_event_key]
    on_violation: warn
    test_id: "PERF-stream_event-S02"
