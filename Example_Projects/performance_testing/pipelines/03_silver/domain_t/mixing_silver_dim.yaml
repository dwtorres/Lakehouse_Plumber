pipeline: domain_t_silver
flowgroup: mixing_silver_dim
presets:
  - default_delta_properties
actions:
  - name: mixing_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: mixing
    target: v_mixing_bronze
    description: "Load mixing from bronze for silver layer"

  - name: write_mixing_silver
    type: write
    source: v_mixing_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "mixing_dim"
      mode: "cdc"
      cdc_config:
        keys: ["mixing_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_mixing_silver_completeness
    type: test
    test_type: completeness
    source: v_mixing_bronze
    required_columns: [mixing_key]
    on_violation: warn
    test_id: "PERF-mixing-S01"

  - name: tst_mixing_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_mixing_bronze
    columns: [mixing_key]
    on_violation: warn
    test_id: "PERF-mixing-S02"
