pipeline: domain_t_silver
flowgroup: merch_item_silver_fct
presets:
  - default_delta_properties
actions:
  - name: merch_item_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: merch_item
    target: v_merch_item_bronze
    description: "Load merch_item from bronze for silver layer"

  - name: write_merch_item_silver
    type: write
    source: v_merch_item_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "merch_item_fct"
      mode: "cdc"
      cdc_config:
        keys: ["merch_item_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_merch_item_silver_completeness
    type: test
    test_type: completeness
    source: v_merch_item_bronze
    required_columns: [merch_item_key]
    on_violation: warn
    test_id: "PERF-merch_item-S01"

  - name: tst_merch_item_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_merch_item_bronze
    columns: [merch_item_key]
    on_violation: warn
    test_id: "PERF-merch_item-S02"
