pipeline: domain_t_silver
flowgroup: chart_position_silver_dim
presets:
  - default_delta_properties
actions:
  - name: chart_position_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: chart_position
    target: v_chart_position_bronze
    description: "Load chart_position from bronze for silver layer"

  - name: write_chart_position_silver
    type: write
    source: v_chart_position_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "chart_position_dim"
      mode: "cdc"
      cdc_config:
        keys: ["chart_position_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_chart_position_silver_completeness
    type: test
    test_type: completeness
    source: v_chart_position_bronze
    required_columns: [chart_position_key]
    on_violation: warn
    test_id: "PERF-chart_position-S01"

  - name: tst_chart_position_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_chart_position_bronze
    columns: [chart_position_key]
    on_violation: warn
    test_id: "PERF-chart_position-S02"
