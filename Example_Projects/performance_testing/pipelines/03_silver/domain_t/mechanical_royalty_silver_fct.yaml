pipeline: domain_t_silver
flowgroup: mechanical_royalty_silver_fct
presets:
  - default_delta_properties
actions:
  - name: mechanical_royalty_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: mechanical_royalty
    target: v_mechanical_royalty_bronze
    description: "Load mechanical_royalty from bronze for silver layer"

  - name: write_mechanical_royalty_silver
    type: write
    source: v_mechanical_royalty_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "mechanical_royalty_fct"
      mode: "cdc"
      cdc_config:
        keys: ["mechanical_royalty_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_mechanical_royalty_silver_completeness
    type: test
    test_type: completeness
    source: v_mechanical_royalty_bronze
    required_columns: [mechanical_royalty_key]
    on_violation: warn
    test_id: "PERF-mechanical_royalty-S01"

  - name: tst_mechanical_royalty_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_mechanical_royalty_bronze
    columns: [mechanical_royalty_key]
    on_violation: warn
    test_id: "PERF-mechanical_royalty-S02"
