pipeline: domain_t_silver
flowgroup: listener_silver_dim
presets:
  - default_delta_properties
actions:
  - name: listener_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: listener
    target: v_listener_bronze
    description: "Load listener from bronze for silver layer"

  - name: write_listener_silver
    type: write
    source: v_listener_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "listener_dim"
      mode: "cdc"
      cdc_config:
        keys: ["listener_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_listener_silver_completeness
    type: test
    test_type: completeness
    source: v_listener_bronze
    required_columns: [listener_key]
    on_violation: warn
    test_id: "PERF-listener-S01"

  - name: tst_listener_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_listener_bronze
    columns: [listener_key]
    on_violation: warn
    test_id: "PERF-listener-S02"
