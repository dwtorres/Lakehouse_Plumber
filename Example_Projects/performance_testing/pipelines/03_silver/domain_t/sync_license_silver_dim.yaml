pipeline: domain_t_silver
flowgroup: sync_license_silver_dim
presets:
  - default_delta_properties
actions:
  - name: sync_license_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: sync_license
    target: v_sync_license_bronze
    description: "Load sync_license from bronze for silver layer"

  - name: write_sync_license_silver
    type: write
    source: v_sync_license_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "sync_license_dim"
      mode: "cdc"
      cdc_config:
        keys: ["sync_license_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_sync_license_silver_completeness
    type: test
    test_type: completeness
    source: v_sync_license_bronze
    required_columns: [sync_license_key]
    on_violation: warn
    test_id: "PERF-sync_license-S01"

  - name: tst_sync_license_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_sync_license_bronze
    columns: [sync_license_key]
    on_violation: warn
    test_id: "PERF-sync_license-S02"
