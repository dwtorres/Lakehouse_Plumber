pipeline: domain_t_silver
flowgroup: viral_moment_silver_fct
presets:
  - default_delta_properties
actions:
  - name: viral_moment_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: viral_moment
    target: v_viral_moment_bronze
    description: "Load viral_moment from bronze for silver layer"

  - name: write_viral_moment_silver
    type: write
    source: v_viral_moment_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "viral_moment_fct"
      mode: "cdc"
      cdc_config:
        keys: ["viral_moment_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_viral_moment_silver_completeness
    type: test
    test_type: completeness
    source: v_viral_moment_bronze
    required_columns: [viral_moment_key]
    on_violation: warn
    test_id: "PERF-viral_moment-S01"

  - name: tst_viral_moment_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_viral_moment_bronze
    columns: [viral_moment_key]
    on_violation: warn
    test_id: "PERF-viral_moment-S02"
