pipeline: domain_t_silver
flowgroup: session_musician_silver_dim
presets:
  - default_delta_properties
actions:
  - name: session_musician_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: session_musician
    target: v_session_musician_bronze
    description: "Load session_musician from bronze for silver layer"

  - name: write_session_musician_silver
    type: write
    source: v_session_musician_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "session_musician_dim"
      mode: "cdc"
      cdc_config:
        keys: ["session_musician_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_session_musician_silver_completeness
    type: test
    test_type: completeness
    source: v_session_musician_bronze
    required_columns: [session_musician_key]
    on_violation: warn
    test_id: "PERF-session_musician-S01"

  - name: tst_session_musician_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_session_musician_bronze
    columns: [session_musician_key]
    on_violation: warn
    test_id: "PERF-session_musician-S02"
