pipeline: domain_t_silver
flowgroup: digital_distributor_silver_dim
presets:
  - default_delta_properties
actions:
  - name: digital_distributor_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: digital_distributor
    target: v_digital_distributor_bronze
    description: "Load digital_distributor from bronze for silver layer"

  - name: write_digital_distributor_silver
    type: write
    source: v_digital_distributor_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "digital_distributor_dim"
      mode: "cdc"
      cdc_config:
        keys: ["digital_distributor_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_digital_distributor_silver_completeness
    type: test
    test_type: completeness
    source: v_digital_distributor_bronze
    required_columns: [digital_distributor_key]
    on_violation: warn
    test_id: "PERF-digital_distributor-S01"

  - name: tst_digital_distributor_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_digital_distributor_bronze
    columns: [digital_distributor_key]
    on_violation: warn
    test_id: "PERF-digital_distributor-S02"
