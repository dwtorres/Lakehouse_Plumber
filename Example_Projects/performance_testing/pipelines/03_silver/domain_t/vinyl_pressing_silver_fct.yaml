pipeline: domain_t_silver
flowgroup: vinyl_pressing_silver_fct
presets:
  - default_delta_properties
actions:
  - name: vinyl_pressing_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: vinyl_pressing
    target: v_vinyl_pressing_bronze
    description: "Load vinyl_pressing from bronze for silver layer"

  - name: write_vinyl_pressing_silver
    type: write
    source: v_vinyl_pressing_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "vinyl_pressing_fct"
      mode: "cdc"
      cdc_config:
        keys: ["vinyl_pressing_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_vinyl_pressing_silver_completeness
    type: test
    test_type: completeness
    source: v_vinyl_pressing_bronze
    required_columns: [vinyl_pressing_key]
    on_violation: warn
    test_id: "PERF-vinyl_pressing-S01"

  - name: tst_vinyl_pressing_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_vinyl_pressing_bronze
    columns: [vinyl_pressing_key]
    on_violation: warn
    test_id: "PERF-vinyl_pressing-S02"
