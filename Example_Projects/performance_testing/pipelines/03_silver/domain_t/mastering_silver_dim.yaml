pipeline: domain_t_silver
flowgroup: mastering_silver_dim
presets:
  - default_delta_properties
actions:
  - name: mastering_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: mastering
    target: v_mastering_bronze
    description: "Load mastering from bronze for silver layer"

  - name: write_mastering_silver
    type: write
    source: v_mastering_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "mastering_dim"
      mode: "cdc"
      cdc_config:
        keys: ["mastering_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_mastering_silver_completeness
    type: test
    test_type: completeness
    source: v_mastering_bronze
    required_columns: [mastering_key]
    on_violation: warn
    test_id: "PERF-mastering-S01"

  - name: tst_mastering_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_mastering_bronze
    columns: [mastering_key]
    on_violation: warn
    test_id: "PERF-mastering-S02"
