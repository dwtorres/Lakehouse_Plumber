pipeline: domain_t_silver
flowgroup: playlist_silver_fct
presets:
  - default_delta_properties
actions:
  - name: playlist_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: playlist
    target: v_playlist_bronze
    description: "Load playlist from bronze for silver layer"

  - name: write_playlist_silver
    type: write
    source: v_playlist_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "playlist_fct"
      mode: "cdc"
      cdc_config:
        keys: ["playlist_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_playlist_silver_completeness
    type: test
    test_type: completeness
    source: v_playlist_bronze
    required_columns: [playlist_key]
    on_violation: warn
    test_id: "PERF-playlist-S01"

  - name: tst_playlist_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_playlist_bronze
    columns: [playlist_key]
    on_violation: warn
    test_id: "PERF-playlist-S02"
