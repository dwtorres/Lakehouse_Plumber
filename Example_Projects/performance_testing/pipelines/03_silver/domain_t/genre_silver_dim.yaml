pipeline: domain_t_silver
flowgroup: genre_silver_dim
presets:
  - default_delta_properties
actions:
  - name: genre_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: genre
    target: v_genre_bronze
    description: "Load genre from bronze for silver layer"

  - name: write_genre_silver
    type: write
    source: v_genre_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "genre_dim"
      mode: "cdc"
      cdc_config:
        keys: ["genre_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_genre_silver_completeness
    type: test
    test_type: completeness
    source: v_genre_bronze
    required_columns: [genre_key]
    on_violation: warn
    test_id: "PERF-genre-S01"

  - name: tst_genre_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_genre_bronze
    columns: [genre_key]
    on_violation: warn
    test_id: "PERF-genre-S02"
