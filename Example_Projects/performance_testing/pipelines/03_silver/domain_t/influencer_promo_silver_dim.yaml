pipeline: domain_t_silver
flowgroup: influencer_promo_silver_dim
presets:
  - default_delta_properties
actions:
  - name: influencer_promo_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: influencer_promo
    target: v_influencer_promo_bronze
    description: "Load influencer_promo from bronze for silver layer"

  - name: write_influencer_promo_silver
    type: write
    source: v_influencer_promo_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "influencer_promo_dim"
      mode: "cdc"
      cdc_config:
        keys: ["influencer_promo_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_influencer_promo_silver_completeness
    type: test
    test_type: completeness
    source: v_influencer_promo_bronze
    required_columns: [influencer_promo_key]
    on_violation: warn
    test_id: "PERF-influencer_promo-S01"

  - name: tst_influencer_promo_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_influencer_promo_bronze
    columns: [influencer_promo_key]
    on_violation: warn
    test_id: "PERF-influencer_promo-S02"
