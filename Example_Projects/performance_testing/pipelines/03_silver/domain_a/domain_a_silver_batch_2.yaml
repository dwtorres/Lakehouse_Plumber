pipeline: domain_a_silver
flowgroup: return_request_silver_dim
presets:
  - default_delta_properties
actions:
  - name: return_request_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: return_request
    target: v_return_request_bronze
    description: "Load return_request from bronze for silver layer"

  - name: write_return_request_silver
    type: write
    source: v_return_request_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "return_request_dim"
      mode: "cdc"
      cdc_config:
        keys: ["return_request_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_return_request_silver_completeness
    type: test
    test_type: completeness
    source: v_return_request_bronze
    required_columns: [return_request_key]
    on_violation: warn
    test_id: "PERF-return_request-S01"

  - name: tst_return_request_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_return_request_bronze
    columns: [return_request_key]
    on_violation: warn
    test_id: "PERF-return_request-S02"
---
