pipeline: domain_a_silver
flowgroup: customer_silver_fct
presets:
  - default_delta_properties
actions:
  - name: customer_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: customer
    target: v_customer_bronze
    description: "Load customer from bronze for silver layer"

  - name: write_customer_silver
    type: write
    source: v_customer_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "customer_fct"
      mode: "cdc"
      cdc_config:
        keys: ["customer_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_customer_silver_completeness
    type: test
    test_type: completeness
    source: v_customer_bronze
    required_columns: [customer_key]
    on_violation: warn
    test_id: "PERF-customer-S01"

  - name: tst_customer_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_customer_bronze
    columns: [customer_key]
    on_violation: warn
    test_id: "PERF-customer-S02"
---
