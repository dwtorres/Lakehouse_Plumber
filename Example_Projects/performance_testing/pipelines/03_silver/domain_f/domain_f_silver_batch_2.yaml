pipeline: domain_f_silver
flowgroup: thesis_silver_dim
presets:
  - default_delta_properties
actions:
  - name: thesis_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: thesis
    target: v_thesis_bronze
    description: "Load thesis from bronze for silver layer"

  - name: write_thesis_silver
    type: write
    source: v_thesis_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "thesis_dim"
      mode: "cdc"
      cdc_config:
        keys: ["thesis_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_thesis_silver_completeness
    type: test
    test_type: completeness
    source: v_thesis_bronze
    required_columns: [thesis_key]
    on_violation: warn
    test_id: "PERF-thesis-S01"

  - name: tst_thesis_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_thesis_bronze
    columns: [thesis_key]
    on_violation: warn
    test_id: "PERF-thesis-S02"
