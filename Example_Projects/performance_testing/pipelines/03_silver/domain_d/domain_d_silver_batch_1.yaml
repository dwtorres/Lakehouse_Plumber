pipeline: domain_d_silver
flowgroup: patient_silver_fct
presets:
  - default_delta_properties
actions:
  - name: patient_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: patient
    target: v_patient_bronze
    description: "Load patient from bronze for silver layer"

  - name: write_patient_silver
    type: write
    source: v_patient_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "patient_fct"
      mode: "cdc"
      cdc_config:
        keys: ["patient_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_patient_silver_completeness
    type: test
    test_type: completeness
    source: v_patient_bronze
    required_columns: [patient_key]
    on_violation: warn
    test_id: "PERF-patient-S01"

  - name: tst_patient_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_patient_bronze
    columns: [patient_key]
    on_violation: warn
    test_id: "PERF-patient-S02"
---
