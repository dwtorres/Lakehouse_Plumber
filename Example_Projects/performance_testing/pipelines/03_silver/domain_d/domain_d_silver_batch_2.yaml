pipeline: domain_d_silver
flowgroup: nursing_note_silver_dim
presets:
  - default_delta_properties
actions:
  - name: nursing_note_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: nursing_note
    target: v_nursing_note_bronze
    description: "Load nursing_note from bronze for silver layer"

  - name: write_nursing_note_silver
    type: write
    source: v_nursing_note_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "nursing_note_dim"
      mode: "cdc"
      cdc_config:
        keys: ["nursing_note_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_nursing_note_silver_completeness
    type: test
    test_type: completeness
    source: v_nursing_note_bronze
    required_columns: [nursing_note_key]
    on_violation: warn
    test_id: "PERF-nursing_note-S01"

  - name: tst_nursing_note_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_nursing_note_bronze
    columns: [nursing_note_key]
    on_violation: warn
    test_id: "PERF-nursing_note-S02"
