pipeline: domain_n_silver
flowgroup: adjuster_silver_fct
presets:
  - default_delta_properties
actions:
  - name: adjuster_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: adjuster
    target: v_adjuster_bronze
    description: "Load adjuster from bronze for silver layer"

  - name: write_adjuster_silver
    type: write
    source: v_adjuster_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "adjuster_fct"
      mode: "cdc"
      cdc_config:
        keys: ["adjuster_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_adjuster_silver_completeness
    type: test
    test_type: completeness
    source: v_adjuster_bronze
    required_columns: [adjuster_key]
    on_violation: warn
    test_id: "PERF-adjuster-S01"

  - name: tst_adjuster_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_adjuster_bronze
    columns: [adjuster_key]
    on_violation: warn
    test_id: "PERF-adjuster-S02"
