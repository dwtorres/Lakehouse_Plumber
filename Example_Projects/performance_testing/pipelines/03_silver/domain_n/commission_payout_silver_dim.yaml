pipeline: domain_n_silver
flowgroup: commission_payout_silver_dim
presets:
  - default_delta_properties
actions:
  - name: commission_payout_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: commission_payout
    target: v_commission_payout_bronze
    description: "Load commission_payout from bronze for silver layer"

  - name: write_commission_payout_silver
    type: write
    source: v_commission_payout_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "commission_payout_dim"
      mode: "cdc"
      cdc_config:
        keys: ["commission_payout_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_commission_payout_silver_completeness
    type: test
    test_type: completeness
    source: v_commission_payout_bronze
    required_columns: [commission_payout_key]
    on_violation: warn
    test_id: "PERF-commission_payout-S01"

  - name: tst_commission_payout_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_commission_payout_bronze
    columns: [commission_payout_key]
    on_violation: warn
    test_id: "PERF-commission_payout-S02"
