pipeline: domain_n_silver
flowgroup: loss_report_silver_fct
presets:
  - default_delta_properties
actions:
  - name: loss_report_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: loss_report
    target: v_loss_report_bronze
    description: "Load loss_report from bronze for silver layer"

  - name: write_loss_report_silver
    type: write
    source: v_loss_report_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "loss_report_fct"
      mode: "cdc"
      cdc_config:
        keys: ["loss_report_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_loss_report_silver_completeness
    type: test
    test_type: completeness
    source: v_loss_report_bronze
    required_columns: [loss_report_key]
    on_violation: warn
    test_id: "PERF-loss_report-S01"

  - name: tst_loss_report_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_loss_report_bronze
    columns: [loss_report_key]
    on_violation: warn
    test_id: "PERF-loss_report-S02"
