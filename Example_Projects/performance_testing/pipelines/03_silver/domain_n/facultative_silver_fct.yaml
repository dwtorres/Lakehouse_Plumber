pipeline: domain_n_silver
flowgroup: facultative_silver_fct
presets:
  - default_delta_properties
actions:
  - name: facultative_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: facultative
    target: v_facultative_bronze
    description: "Load facultative from bronze for silver layer"

  - name: write_facultative_silver
    type: write
    source: v_facultative_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "facultative_fct"
      mode: "cdc"
      cdc_config:
        keys: ["facultative_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_facultative_silver_completeness
    type: test
    test_type: completeness
    source: v_facultative_bronze
    required_columns: [facultative_key]
    on_violation: warn
    test_id: "PERF-facultative-S01"

  - name: tst_facultative_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_facultative_bronze
    columns: [facultative_key]
    on_violation: warn
    test_id: "PERF-facultative-S02"
