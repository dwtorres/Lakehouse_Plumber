pipeline: domain_n_silver
flowgroup: policyholder_silver_dim
presets:
  - default_delta_properties
actions:
  - name: policyholder_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: policyholder
    target: v_policyholder_bronze
    description: "Load policyholder from bronze for silver layer"

  - name: write_policyholder_silver
    type: write
    source: v_policyholder_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "policyholder_dim"
      mode: "cdc"
      cdc_config:
        keys: ["policyholder_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_policyholder_silver_completeness
    type: test
    test_type: completeness
    source: v_policyholder_bronze
    required_columns: [policyholder_key]
    on_violation: warn
    test_id: "PERF-policyholder-S01"

  - name: tst_policyholder_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_policyholder_bronze
    columns: [policyholder_key]
    on_violation: warn
    test_id: "PERF-policyholder-S02"
