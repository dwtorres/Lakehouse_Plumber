pipeline: domain_n_silver
flowgroup: litigation_silver_dim
presets:
  - default_delta_properties
actions:
  - name: litigation_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: litigation
    target: v_litigation_bronze
    description: "Load litigation from bronze for silver layer"

  - name: write_litigation_silver
    type: write
    source: v_litigation_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "litigation_dim"
      mode: "cdc"
      cdc_config:
        keys: ["litigation_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_litigation_silver_completeness
    type: test
    test_type: completeness
    source: v_litigation_bronze
    required_columns: [litigation_key]
    on_violation: warn
    test_id: "PERF-litigation-S01"

  - name: tst_litigation_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_litigation_bronze
    columns: [litigation_key]
    on_violation: warn
    test_id: "PERF-litigation-S02"
