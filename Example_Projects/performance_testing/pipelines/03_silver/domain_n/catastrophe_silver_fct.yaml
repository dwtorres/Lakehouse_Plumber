pipeline: domain_n_silver
flowgroup: catastrophe_silver_fct
presets:
  - default_delta_properties
actions:
  - name: catastrophe_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: catastrophe
    target: v_catastrophe_bronze
    description: "Load catastrophe from bronze for silver layer"

  - name: write_catastrophe_silver
    type: write
    source: v_catastrophe_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "catastrophe_fct"
      mode: "cdc"
      cdc_config:
        keys: ["catastrophe_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_catastrophe_silver_completeness
    type: test
    test_type: completeness
    source: v_catastrophe_bronze
    required_columns: [catastrophe_key]
    on_violation: warn
    test_id: "PERF-catastrophe-S01"

  - name: tst_catastrophe_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_catastrophe_bronze
    columns: [catastrophe_key]
    on_violation: warn
    test_id: "PERF-catastrophe-S02"
