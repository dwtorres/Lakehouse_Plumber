pipeline: domain_n_silver
flowgroup: treaty_silver_dim
presets:
  - default_delta_properties
actions:
  - name: treaty_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: treaty
    target: v_treaty_bronze
    description: "Load treaty from bronze for silver layer"

  - name: write_treaty_silver
    type: write
    source: v_treaty_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "treaty_dim"
      mode: "cdc"
      cdc_config:
        keys: ["treaty_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_treaty_silver_completeness
    type: test
    test_type: completeness
    source: v_treaty_bronze
    required_columns: [treaty_key]
    on_violation: warn
    test_id: "PERF-treaty-S01"

  - name: tst_treaty_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_treaty_bronze
    columns: [treaty_key]
    on_violation: warn
    test_id: "PERF-treaty-S02"
