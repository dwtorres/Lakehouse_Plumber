pipeline: domain_n_silver
flowgroup: reserve_silver_dim
presets:
  - default_delta_properties
actions:
  - name: reserve_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: reserve
    target: v_reserve_bronze
    description: "Load reserve from bronze for silver layer"

  - name: write_reserve_silver
    type: write
    source: v_reserve_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "reserve_dim"
      mode: "cdc"
      cdc_config:
        keys: ["reserve_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_reserve_silver_completeness
    type: test
    test_type: completeness
    source: v_reserve_bronze
    required_columns: [reserve_key]
    on_violation: warn
    test_id: "PERF-reserve-S01"

  - name: tst_reserve_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_reserve_bronze
    columns: [reserve_key]
    on_violation: warn
    test_id: "PERF-reserve-S02"
