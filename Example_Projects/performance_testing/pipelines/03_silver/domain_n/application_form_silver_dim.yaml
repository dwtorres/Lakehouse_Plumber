pipeline: domain_n_silver
flowgroup: application_form_silver_dim
presets:
  - default_delta_properties
actions:
  - name: application_form_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: application_form
    target: v_application_form_bronze
    description: "Load application_form from bronze for silver layer"

  - name: write_application_form_silver
    type: write
    source: v_application_form_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "application_form_dim"
      mode: "cdc"
      cdc_config:
        keys: ["application_form_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_application_form_silver_completeness
    type: test
    test_type: completeness
    source: v_application_form_bronze
    required_columns: [application_form_key]
    on_violation: warn
    test_id: "PERF-application_form-S01"

  - name: tst_application_form_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_application_form_bronze
    columns: [application_form_key]
    on_violation: warn
    test_id: "PERF-application_form-S02"
