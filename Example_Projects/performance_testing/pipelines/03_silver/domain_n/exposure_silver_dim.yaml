pipeline: domain_n_silver
flowgroup: exposure_silver_dim
presets:
  - default_delta_properties
actions:
  - name: exposure_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: exposure
    target: v_exposure_bronze
    description: "Load exposure from bronze for silver layer"

  - name: write_exposure_silver
    type: write
    source: v_exposure_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "exposure_dim"
      mode: "cdc"
      cdc_config:
        keys: ["exposure_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_exposure_silver_completeness
    type: test
    test_type: completeness
    source: v_exposure_bronze
    required_columns: [exposure_key]
    on_violation: warn
    test_id: "PERF-exposure-S01"

  - name: tst_exposure_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_exposure_bronze
    columns: [exposure_key]
    on_violation: warn
    test_id: "PERF-exposure-S02"
