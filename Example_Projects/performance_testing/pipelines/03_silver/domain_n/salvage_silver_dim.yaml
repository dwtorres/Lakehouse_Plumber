pipeline: domain_n_silver
flowgroup: salvage_silver_dim
presets:
  - default_delta_properties
actions:
  - name: salvage_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: salvage
    target: v_salvage_bronze
    description: "Load salvage from bronze for silver layer"

  - name: write_salvage_silver
    type: write
    source: v_salvage_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "salvage_dim"
      mode: "cdc"
      cdc_config:
        keys: ["salvage_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_salvage_silver_completeness
    type: test
    test_type: completeness
    source: v_salvage_bronze
    required_columns: [salvage_key]
    on_violation: warn
    test_id: "PERF-salvage-S01"

  - name: tst_salvage_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_salvage_bronze
    columns: [salvage_key]
    on_violation: warn
    test_id: "PERF-salvage-S02"
