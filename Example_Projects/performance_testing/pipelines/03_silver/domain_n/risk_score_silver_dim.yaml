pipeline: domain_n_silver
flowgroup: risk_score_silver_dim
presets:
  - default_delta_properties
actions:
  - name: risk_score_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: risk_score
    target: v_risk_score_bronze
    description: "Load risk_score from bronze for silver layer"

  - name: write_risk_score_silver
    type: write
    source: v_risk_score_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "risk_score_dim"
      mode: "cdc"
      cdc_config:
        keys: ["risk_score_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_risk_score_silver_completeness
    type: test
    test_type: completeness
    source: v_risk_score_bronze
    required_columns: [risk_score_key]
    on_violation: warn
    test_id: "PERF-risk_score-S01"

  - name: tst_risk_score_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_risk_score_bronze
    columns: [risk_score_key]
    on_violation: warn
    test_id: "PERF-risk_score-S02"
