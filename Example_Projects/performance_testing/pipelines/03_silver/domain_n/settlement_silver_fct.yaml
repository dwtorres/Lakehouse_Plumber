pipeline: domain_n_silver
flowgroup: settlement_silver_fct
presets:
  - default_delta_properties
actions:
  - name: settlement_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: settlement
    target: v_settlement_bronze
    description: "Load settlement from bronze for silver layer"

  - name: write_settlement_silver
    type: write
    source: v_settlement_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "settlement_fct"
      mode: "cdc"
      cdc_config:
        keys: ["settlement_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_settlement_silver_completeness
    type: test
    test_type: completeness
    source: v_settlement_bronze
    required_columns: [settlement_key]
    on_violation: warn
    test_id: "PERF-settlement-S01"

  - name: tst_settlement_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_settlement_bronze
    columns: [settlement_key]
    on_violation: warn
    test_id: "PERF-settlement-S02"
