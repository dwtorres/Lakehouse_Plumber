pipeline: domain_n_silver
flowgroup: endorsement_silver_dim
presets:
  - default_delta_properties
actions:
  - name: endorsement_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: endorsement
    target: v_endorsement_bronze
    description: "Load endorsement from bronze for silver layer"

  - name: write_endorsement_silver
    type: write
    source: v_endorsement_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "endorsement_dim"
      mode: "cdc"
      cdc_config:
        keys: ["endorsement_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_endorsement_silver_completeness
    type: test
    test_type: completeness
    source: v_endorsement_bronze
    required_columns: [endorsement_key]
    on_violation: warn
    test_id: "PERF-endorsement-S01"

  - name: tst_endorsement_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_endorsement_bronze
    columns: [endorsement_key]
    on_violation: warn
    test_id: "PERF-endorsement-S02"
