pipeline: domain_n_silver
flowgroup: actuary_silver_dim
presets:
  - default_delta_properties
actions:
  - name: actuary_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: actuary
    target: v_actuary_bronze
    description: "Load actuary from bronze for silver layer"

  - name: write_actuary_silver
    type: write
    source: v_actuary_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "actuary_dim"
      mode: "cdc"
      cdc_config:
        keys: ["actuary_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_actuary_silver_completeness
    type: test
    test_type: completeness
    source: v_actuary_bronze
    required_columns: [actuary_key]
    on_violation: warn
    test_id: "PERF-actuary-S01"

  - name: tst_actuary_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_actuary_bronze
    columns: [actuary_key]
    on_violation: warn
    test_id: "PERF-actuary-S02"
