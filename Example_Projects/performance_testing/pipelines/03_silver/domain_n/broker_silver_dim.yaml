pipeline: domain_n_silver
flowgroup: broker_silver_dim
presets:
  - default_delta_properties
actions:
  - name: broker_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: broker
    target: v_broker_bronze
    description: "Load broker from bronze for silver layer"

  - name: write_broker_silver
    type: write
    source: v_broker_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "broker_dim"
      mode: "cdc"
      cdc_config:
        keys: ["broker_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_broker_silver_completeness
    type: test
    test_type: completeness
    source: v_broker_bronze
    required_columns: [broker_key]
    on_violation: warn
    test_id: "PERF-broker-S01"

  - name: tst_broker_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_broker_bronze
    columns: [broker_key]
    on_violation: warn
    test_id: "PERF-broker-S02"
