pipeline: domain_n_silver
flowgroup: premium_silver_dim
presets:
  - default_delta_properties
actions:
  - name: premium_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: premium
    target: v_premium_bronze
    description: "Load premium from bronze for silver layer"

  - name: write_premium_silver
    type: write
    source: v_premium_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "premium_dim"
      mode: "cdc"
      cdc_config:
        keys: ["premium_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_premium_silver_completeness
    type: test
    test_type: completeness
    source: v_premium_bronze
    required_columns: [premium_key]
    on_violation: warn
    test_id: "PERF-premium-S01"

  - name: tst_premium_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_premium_bronze
    columns: [premium_key]
    on_violation: warn
    test_id: "PERF-premium-S02"
