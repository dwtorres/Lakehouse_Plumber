pipeline: domain_n_silver
flowgroup: medical_exam_silver_dim
presets:
  - default_delta_properties
actions:
  - name: medical_exam_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: medical_exam
    target: v_medical_exam_bronze
    description: "Load medical_exam from bronze for silver layer"

  - name: write_medical_exam_silver
    type: write
    source: v_medical_exam_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "medical_exam_dim"
      mode: "cdc"
      cdc_config:
        keys: ["medical_exam_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_medical_exam_silver_completeness
    type: test
    test_type: completeness
    source: v_medical_exam_bronze
    required_columns: [medical_exam_key]
    on_violation: warn
    test_id: "PERF-medical_exam-S01"

  - name: tst_medical_exam_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_medical_exam_bronze
    columns: [medical_exam_key]
    on_violation: warn
    test_id: "PERF-medical_exam-S02"
