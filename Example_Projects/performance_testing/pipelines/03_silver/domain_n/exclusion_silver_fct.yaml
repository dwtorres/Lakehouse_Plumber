pipeline: domain_n_silver
flowgroup: exclusion_silver_fct
presets:
  - default_delta_properties
actions:
  - name: exclusion_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: exclusion
    target: v_exclusion_bronze
    description: "Load exclusion from bronze for silver layer"

  - name: write_exclusion_silver
    type: write
    source: v_exclusion_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "exclusion_fct"
      mode: "cdc"
      cdc_config:
        keys: ["exclusion_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_exclusion_silver_completeness
    type: test
    test_type: completeness
    source: v_exclusion_bronze
    required_columns: [exclusion_key]
    on_violation: warn
    test_id: "PERF-exclusion-S01"

  - name: tst_exclusion_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_exclusion_bronze
    columns: [exclusion_key]
    on_violation: warn
    test_id: "PERF-exclusion-S02"
