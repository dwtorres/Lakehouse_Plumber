pipeline: domain_n_silver
flowgroup: aggregate_limit_silver_dim
presets:
  - default_delta_properties
actions:
  - name: aggregate_limit_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: aggregate_limit
    target: v_aggregate_limit_bronze
    description: "Load aggregate_limit from bronze for silver layer"

  - name: write_aggregate_limit_silver
    type: write
    source: v_aggregate_limit_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "aggregate_limit_dim"
      mode: "cdc"
      cdc_config:
        keys: ["aggregate_limit_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_aggregate_limit_silver_completeness
    type: test
    test_type: completeness
    source: v_aggregate_limit_bronze
    required_columns: [aggregate_limit_key]
    on_violation: warn
    test_id: "PERF-aggregate_limit-S01"

  - name: tst_aggregate_limit_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_aggregate_limit_bronze
    columns: [aggregate_limit_key]
    on_violation: warn
    test_id: "PERF-aggregate_limit-S02"
