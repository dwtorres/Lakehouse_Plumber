pipeline: domain_n_silver
flowgroup: policy_silver_fct
presets:
  - default_delta_properties
actions:
  - name: policy_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: policy
    target: v_policy_bronze
    description: "Load policy from bronze for silver layer"

  - name: write_policy_silver
    type: write
    source: v_policy_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "policy_fct"
      mode: "cdc"
      cdc_config:
        keys: ["policy_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_policy_silver_completeness
    type: test
    test_type: completeness
    source: v_policy_bronze
    required_columns: [policy_key]
    on_violation: warn
    test_id: "PERF-policy-S01"

  - name: tst_policy_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_policy_bronze
    columns: [policy_key]
    on_violation: warn
    test_id: "PERF-policy-S02"
