pipeline: domain_n_silver
flowgroup: subrogation_silver_dim
presets:
  - default_delta_properties
actions:
  - name: subrogation_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: subrogation
    target: v_subrogation_bronze
    description: "Load subrogation from bronze for silver layer"

  - name: write_subrogation_silver
    type: write
    source: v_subrogation_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "subrogation_dim"
      mode: "cdc"
      cdc_config:
        keys: ["subrogation_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_subrogation_silver_completeness
    type: test
    test_type: completeness
    source: v_subrogation_bronze
    required_columns: [subrogation_key]
    on_violation: warn
    test_id: "PERF-subrogation-S01"

  - name: tst_subrogation_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_subrogation_bronze
    columns: [subrogation_key]
    on_violation: warn
    test_id: "PERF-subrogation-S02"
