pipeline: domain_n_silver
flowgroup: quote_silver_fct
presets:
  - default_delta_properties
actions:
  - name: quote_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: quote
    target: v_quote_bronze
    description: "Load quote from bronze for silver layer"

  - name: write_quote_silver
    type: write
    source: v_quote_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "quote_fct"
      mode: "cdc"
      cdc_config:
        keys: ["quote_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_quote_silver_completeness
    type: test
    test_type: completeness
    source: v_quote_bronze
    required_columns: [quote_key]
    on_violation: warn
    test_id: "PERF-quote-S01"

  - name: tst_quote_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_quote_bronze
    columns: [quote_key]
    on_violation: warn
    test_id: "PERF-quote-S02"
