pipeline: domain_p_silver
flowgroup: incubator_silver_dim
presets:
  - default_delta_properties
actions:
  - name: incubator_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: incubator
    target: v_incubator_bronze
    description: "Load incubator from bronze for silver layer"

  - name: write_incubator_silver
    type: write
    source: v_incubator_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "incubator_dim"
      mode: "cdc"
      cdc_config:
        keys: ["incubator_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_incubator_silver_completeness
    type: test
    test_type: completeness
    source: v_incubator_bronze
    required_columns: [incubator_key]
    on_violation: warn
    test_id: "PERF-incubator-S01"

  - name: tst_incubator_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_incubator_bronze
    columns: [incubator_key]
    on_violation: warn
    test_id: "PERF-incubator-S02"
