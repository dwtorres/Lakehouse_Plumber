pipeline: domain_p_silver
flowgroup: mutation_silver_dim
presets:
  - default_delta_properties
actions:
  - name: mutation_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: mutation
    target: v_mutation_bronze
    description: "Load mutation from bronze for silver layer"

  - name: write_mutation_silver
    type: write
    source: v_mutation_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "mutation_dim"
      mode: "cdc"
      cdc_config:
        keys: ["mutation_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_mutation_silver_completeness
    type: test
    test_type: completeness
    source: v_mutation_bronze
    required_columns: [mutation_key]
    on_violation: warn
    test_id: "PERF-mutation-S01"

  - name: tst_mutation_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_mutation_bronze
    columns: [mutation_key]
    on_violation: warn
    test_id: "PERF-mutation-S02"
