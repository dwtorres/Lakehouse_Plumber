pipeline: domain_p_silver
flowgroup: placebo_silver_dim
presets:
  - default_delta_properties
actions:
  - name: placebo_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: placebo
    target: v_placebo_bronze
    description: "Load placebo from bronze for silver layer"

  - name: write_placebo_silver
    type: write
    source: v_placebo_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "placebo_dim"
      mode: "cdc"
      cdc_config:
        keys: ["placebo_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_placebo_silver_completeness
    type: test
    test_type: completeness
    source: v_placebo_bronze
    required_columns: [placebo_key]
    on_violation: warn
    test_id: "PERF-placebo-S01"

  - name: tst_placebo_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_placebo_bronze
    columns: [placebo_key]
    on_violation: warn
    test_id: "PERF-placebo-S02"
