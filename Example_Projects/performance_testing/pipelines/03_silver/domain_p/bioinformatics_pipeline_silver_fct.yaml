pipeline: domain_p_silver
flowgroup: bioinformatics_pipeline_silver_fct
presets:
  - default_delta_properties
actions:
  - name: bioinformatics_pipeline_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: bioinformatics_pipeline
    target: v_bioinformatics_pipeline_bronze
    description: "Load bioinformatics_pipeline from bronze for silver layer"

  - name: write_bioinformatics_pipeline_silver
    type: write
    source: v_bioinformatics_pipeline_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "bioinformatics_pipeline_fct"
      mode: "cdc"
      cdc_config:
        keys: ["bioinformatics_pipeline_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_bioinformatics_pipeline_silver_completeness
    type: test
    test_type: completeness
    source: v_bioinformatics_pipeline_bronze
    required_columns: [bioinformatics_pipeline_key]
    on_violation: warn
    test_id: "PERF-bioinformatics_pipeline-S01"

  - name: tst_bioinformatics_pipeline_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_bioinformatics_pipeline_bronze
    columns: [bioinformatics_pipeline_key]
    on_violation: warn
    test_id: "PERF-bioinformatics_pipeline-S02"
