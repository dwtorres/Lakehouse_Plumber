pipeline: domain_p_silver
flowgroup: phenotype_silver_fct
presets:
  - default_delta_properties
actions:
  - name: phenotype_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: phenotype
    target: v_phenotype_bronze
    description: "Load phenotype from bronze for silver layer"

  - name: write_phenotype_silver
    type: write
    source: v_phenotype_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "phenotype_fct"
      mode: "cdc"
      cdc_config:
        keys: ["phenotype_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_phenotype_silver_completeness
    type: test
    test_type: completeness
    source: v_phenotype_bronze
    required_columns: [phenotype_key]
    on_violation: warn
    test_id: "PERF-phenotype-S01"

  - name: tst_phenotype_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_phenotype_bronze
    columns: [phenotype_key]
    on_violation: warn
    test_id: "PERF-phenotype-S02"
