pipeline: domain_p_silver
flowgroup: gene_silver_fct
presets:
  - default_delta_properties
actions:
  - name: gene_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: gene
    target: v_gene_bronze
    description: "Load gene from bronze for silver layer"

  - name: write_gene_silver
    type: write
    source: v_gene_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "gene_fct"
      mode: "cdc"
      cdc_config:
        keys: ["gene_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_gene_silver_completeness
    type: test
    test_type: completeness
    source: v_gene_bronze
    required_columns: [gene_key]
    on_violation: warn
    test_id: "PERF-gene-S01"

  - name: tst_gene_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_gene_bronze
    columns: [gene_key]
    on_violation: warn
    test_id: "PERF-gene-S02"
