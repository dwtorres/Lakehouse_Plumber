pipeline: domain_p_silver
flowgroup: trial_silver_fct
presets:
  - default_delta_properties
actions:
  - name: trial_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: trial
    target: v_trial_bronze
    description: "Load trial from bronze for silver layer"

  - name: write_trial_silver
    type: write
    source: v_trial_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "trial_fct"
      mode: "cdc"
      cdc_config:
        keys: ["trial_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_trial_silver_completeness
    type: test
    test_type: completeness
    source: v_trial_bronze
    required_columns: [trial_key]
    on_violation: warn
    test_id: "PERF-trial-S01"

  - name: tst_trial_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_trial_bronze
    columns: [trial_key]
    on_violation: warn
    test_id: "PERF-trial-S02"
