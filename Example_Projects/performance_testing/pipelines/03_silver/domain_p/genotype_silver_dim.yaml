pipeline: domain_p_silver
flowgroup: genotype_silver_dim
presets:
  - default_delta_properties
actions:
  - name: genotype_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: genotype
    target: v_genotype_bronze
    description: "Load genotype from bronze for silver layer"

  - name: write_genotype_silver
    type: write
    source: v_genotype_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "genotype_dim"
      mode: "cdc"
      cdc_config:
        keys: ["genotype_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_genotype_silver_completeness
    type: test
    test_type: completeness
    source: v_genotype_bronze
    required_columns: [genotype_key]
    on_violation: warn
    test_id: "PERF-genotype-S01"

  - name: tst_genotype_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_genotype_bronze
    columns: [genotype_key]
    on_violation: warn
    test_id: "PERF-genotype-S02"
