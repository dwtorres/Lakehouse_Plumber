pipeline: domain_p_silver
flowgroup: western_blot_silver_dim
presets:
  - default_delta_properties
actions:
  - name: western_blot_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: western_blot
    target: v_western_blot_bronze
    description: "Load western_blot from bronze for silver layer"

  - name: write_western_blot_silver
    type: write
    source: v_western_blot_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "western_blot_dim"
      mode: "cdc"
      cdc_config:
        keys: ["western_blot_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_western_blot_silver_completeness
    type: test
    test_type: completeness
    source: v_western_blot_bronze
    required_columns: [western_blot_key]
    on_violation: warn
    test_id: "PERF-western_blot-S01"

  - name: tst_western_blot_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_western_blot_bronze
    columns: [western_blot_key]
    on_violation: warn
    test_id: "PERF-western_blot-S02"
