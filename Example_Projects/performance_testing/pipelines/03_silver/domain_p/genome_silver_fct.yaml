pipeline: domain_p_silver
flowgroup: genome_silver_fct
presets:
  - default_delta_properties
actions:
  - name: genome_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: genome
    target: v_genome_bronze
    description: "Load genome from bronze for silver layer"

  - name: write_genome_silver
    type: write
    source: v_genome_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "genome_fct"
      mode: "cdc"
      cdc_config:
        keys: ["genome_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_genome_silver_completeness
    type: test
    test_type: completeness
    source: v_genome_bronze
    required_columns: [genome_key]
    on_violation: warn
    test_id: "PERF-genome-S01"

  - name: tst_genome_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_genome_bronze
    columns: [genome_key]
    on_violation: warn
    test_id: "PERF-genome-S02"
