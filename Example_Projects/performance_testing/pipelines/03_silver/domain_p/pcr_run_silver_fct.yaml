pipeline: domain_p_silver
flowgroup: pcr_run_silver_fct
presets:
  - default_delta_properties
actions:
  - name: pcr_run_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: pcr_run
    target: v_pcr_run_bronze
    description: "Load pcr_run from bronze for silver layer"

  - name: write_pcr_run_silver
    type: write
    source: v_pcr_run_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "pcr_run_fct"
      mode: "cdc"
      cdc_config:
        keys: ["pcr_run_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_pcr_run_silver_completeness
    type: test
    test_type: completeness
    source: v_pcr_run_bronze
    required_columns: [pcr_run_key]
    on_violation: warn
    test_id: "PERF-pcr_run-S01"

  - name: tst_pcr_run_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_pcr_run_bronze
    columns: [pcr_run_key]
    on_violation: warn
    test_id: "PERF-pcr_run-S02"
