pipeline: domain_p_silver
flowgroup: dna_extract_silver_dim
presets:
  - default_delta_properties
actions:
  - name: dna_extract_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: dna_extract
    target: v_dna_extract_bronze
    description: "Load dna_extract from bronze for silver layer"

  - name: write_dna_extract_silver
    type: write
    source: v_dna_extract_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "dna_extract_dim"
      mode: "cdc"
      cdc_config:
        keys: ["dna_extract_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_dna_extract_silver_completeness
    type: test
    test_type: completeness
    source: v_dna_extract_bronze
    required_columns: [dna_extract_key]
    on_violation: warn
    test_id: "PERF-dna_extract-S01"

  - name: tst_dna_extract_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_dna_extract_bronze
    columns: [dna_extract_key]
    on_violation: warn
    test_id: "PERF-dna_extract-S02"
