pipeline: domain_p_silver
flowgroup: pathway_silver_dim
presets:
  - default_delta_properties
actions:
  - name: pathway_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: pathway
    target: v_pathway_bronze
    description: "Load pathway from bronze for silver layer"

  - name: write_pathway_silver
    type: write
    source: v_pathway_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "pathway_dim"
      mode: "cdc"
      cdc_config:
        keys: ["pathway_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_pathway_silver_completeness
    type: test
    test_type: completeness
    source: v_pathway_bronze
    required_columns: [pathway_key]
    on_violation: warn
    test_id: "PERF-pathway-S01"

  - name: tst_pathway_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_pathway_bronze
    columns: [pathway_key]
    on_violation: warn
    test_id: "PERF-pathway-S02"
