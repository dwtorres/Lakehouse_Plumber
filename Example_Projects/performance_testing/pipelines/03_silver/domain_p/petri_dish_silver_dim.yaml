pipeline: domain_p_silver
flowgroup: petri_dish_silver_dim
presets:
  - default_delta_properties
actions:
  - name: petri_dish_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: petri_dish
    target: v_petri_dish_bronze
    description: "Load petri_dish from bronze for silver layer"

  - name: write_petri_dish_silver
    type: write
    source: v_petri_dish_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "petri_dish_dim"
      mode: "cdc"
      cdc_config:
        keys: ["petri_dish_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_petri_dish_silver_completeness
    type: test
    test_type: completeness
    source: v_petri_dish_bronze
    required_columns: [petri_dish_key]
    on_violation: warn
    test_id: "PERF-petri_dish-S01"

  - name: tst_petri_dish_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_petri_dish_bronze
    columns: [petri_dish_key]
    on_violation: warn
    test_id: "PERF-petri_dish-S02"
