pipeline: domain_p_silver
flowgroup: cohort_silver_dim
presets:
  - default_delta_properties
actions:
  - name: cohort_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: cohort
    target: v_cohort_bronze
    description: "Load cohort from bronze for silver layer"

  - name: write_cohort_silver
    type: write
    source: v_cohort_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "cohort_dim"
      mode: "cdc"
      cdc_config:
        keys: ["cohort_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_cohort_silver_completeness
    type: test
    test_type: completeness
    source: v_cohort_bronze
    required_columns: [cohort_key]
    on_violation: warn
    test_id: "PERF-cohort-S01"

  - name: tst_cohort_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_cohort_bronze
    columns: [cohort_key]
    on_violation: warn
    test_id: "PERF-cohort-S02"
