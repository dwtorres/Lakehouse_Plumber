pipeline: domain_p_silver
flowgroup: toxicology_silver_dim
presets:
  - default_delta_properties
actions:
  - name: toxicology_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: toxicology
    target: v_toxicology_bronze
    description: "Load toxicology from bronze for silver layer"

  - name: write_toxicology_silver
    type: write
    source: v_toxicology_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "toxicology_dim"
      mode: "cdc"
      cdc_config:
        keys: ["toxicology_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_toxicology_silver_completeness
    type: test
    test_type: completeness
    source: v_toxicology_bronze
    required_columns: [toxicology_key]
    on_violation: warn
    test_id: "PERF-toxicology-S01"

  - name: tst_toxicology_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_toxicology_bronze
    columns: [toxicology_key]
    on_violation: warn
    test_id: "PERF-toxicology-S02"
