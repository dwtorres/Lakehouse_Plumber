pipeline: domain_p_silver
flowgroup: chromosome_silver_fct
presets:
  - default_delta_properties
actions:
  - name: chromosome_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: chromosome
    target: v_chromosome_bronze
    description: "Load chromosome from bronze for silver layer"

  - name: write_chromosome_silver
    type: write
    source: v_chromosome_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "chromosome_fct"
      mode: "cdc"
      cdc_config:
        keys: ["chromosome_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_chromosome_silver_completeness
    type: test
    test_type: completeness
    source: v_chromosome_bronze
    required_columns: [chromosome_key]
    on_violation: warn
    test_id: "PERF-chromosome-S01"

  - name: tst_chromosome_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_chromosome_bronze
    columns: [chromosome_key]
    on_violation: warn
    test_id: "PERF-chromosome-S02"
