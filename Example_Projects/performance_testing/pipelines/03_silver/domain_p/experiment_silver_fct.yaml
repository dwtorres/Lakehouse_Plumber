pipeline: domain_p_silver
flowgroup: experiment_silver_fct
presets:
  - default_delta_properties
actions:
  - name: experiment_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: experiment
    target: v_experiment_bronze
    description: "Load experiment from bronze for silver layer"

  - name: write_experiment_silver
    type: write
    source: v_experiment_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "experiment_fct"
      mode: "cdc"
      cdc_config:
        keys: ["experiment_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_experiment_silver_completeness
    type: test
    test_type: completeness
    source: v_experiment_bronze
    required_columns: [experiment_key]
    on_violation: warn
    test_id: "PERF-experiment-S01"

  - name: tst_experiment_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_experiment_bronze
    columns: [experiment_key]
    on_violation: warn
    test_id: "PERF-experiment-S02"
