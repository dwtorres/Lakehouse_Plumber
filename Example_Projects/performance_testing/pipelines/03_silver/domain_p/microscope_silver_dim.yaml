pipeline: domain_p_silver
flowgroup: microscope_silver_dim
presets:
  - default_delta_properties
actions:
  - name: microscope_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: microscope
    target: v_microscope_bronze
    description: "Load microscope from bronze for silver layer"

  - name: write_microscope_silver
    type: write
    source: v_microscope_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "microscope_dim"
      mode: "cdc"
      cdc_config:
        keys: ["microscope_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_microscope_silver_completeness
    type: test
    test_type: completeness
    source: v_microscope_bronze
    required_columns: [microscope_key]
    on_violation: warn
    test_id: "PERF-microscope-S01"

  - name: tst_microscope_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_microscope_bronze
    columns: [microscope_key]
    on_violation: warn
    test_id: "PERF-microscope-S02"
