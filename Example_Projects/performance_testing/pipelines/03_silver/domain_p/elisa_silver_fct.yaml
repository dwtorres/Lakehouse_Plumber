pipeline: domain_p_silver
flowgroup: elisa_silver_fct
presets:
  - default_delta_properties
actions:
  - name: elisa_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: elisa
    target: v_elisa_bronze
    description: "Load elisa from bronze for silver layer"

  - name: write_elisa_silver
    type: write
    source: v_elisa_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "elisa_fct"
      mode: "cdc"
      cdc_config:
        keys: ["elisa_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_elisa_silver_completeness
    type: test
    test_type: completeness
    source: v_elisa_bronze
    required_columns: [elisa_key]
    on_violation: warn
    test_id: "PERF-elisa-S01"

  - name: tst_elisa_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_elisa_bronze
    columns: [elisa_key]
    on_violation: warn
    test_id: "PERF-elisa-S02"
