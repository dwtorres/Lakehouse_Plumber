pipeline: domain_p_silver
flowgroup: protein_silver_dim
presets:
  - default_delta_properties
actions:
  - name: protein_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: protein
    target: v_protein_bronze
    description: "Load protein from bronze for silver layer"

  - name: write_protein_silver
    type: write
    source: v_protein_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "protein_dim"
      mode: "cdc"
      cdc_config:
        keys: ["protein_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_protein_silver_completeness
    type: test
    test_type: completeness
    source: v_protein_bronze
    required_columns: [protein_key]
    on_violation: warn
    test_id: "PERF-protein-S01"

  - name: tst_protein_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_protein_bronze
    columns: [protein_key]
    on_violation: warn
    test_id: "PERF-protein-S02"
