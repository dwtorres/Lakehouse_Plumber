pipeline: domain_p_silver
flowgroup: allele_silver_dim
presets:
  - default_delta_properties
actions:
  - name: allele_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: allele
    target: v_allele_bronze
    description: "Load allele from bronze for silver layer"

  - name: write_allele_silver
    type: write
    source: v_allele_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "allele_dim"
      mode: "cdc"
      cdc_config:
        keys: ["allele_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_allele_silver_completeness
    type: test
    test_type: completeness
    source: v_allele_bronze
    required_columns: [allele_key]
    on_violation: warn
    test_id: "PERF-allele-S01"

  - name: tst_allele_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_allele_bronze
    columns: [allele_key]
    on_violation: warn
    test_id: "PERF-allele-S02"
