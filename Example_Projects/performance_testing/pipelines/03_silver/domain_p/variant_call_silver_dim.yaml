pipeline: domain_p_silver
flowgroup: variant_call_silver_dim
presets:
  - default_delta_properties
actions:
  - name: variant_call_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: variant_call
    target: v_variant_call_bronze
    description: "Load variant_call from bronze for silver layer"

  - name: write_variant_call_silver
    type: write
    source: v_variant_call_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "variant_call_dim"
      mode: "cdc"
      cdc_config:
        keys: ["variant_call_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_variant_call_silver_completeness
    type: test
    test_type: completeness
    source: v_variant_call_bronze
    required_columns: [variant_call_key]
    on_violation: warn
    test_id: "PERF-variant_call-S01"

  - name: tst_variant_call_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_variant_call_bronze
    columns: [variant_call_key]
    on_violation: warn
    test_id: "PERF-variant_call-S02"
