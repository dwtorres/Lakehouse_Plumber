pipeline: domain_p_silver
flowgroup: flow_cytometry_silver_dim
presets:
  - default_delta_properties
actions:
  - name: flow_cytometry_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: flow_cytometry
    target: v_flow_cytometry_bronze
    description: "Load flow_cytometry from bronze for silver layer"

  - name: write_flow_cytometry_silver
    type: write
    source: v_flow_cytometry_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "flow_cytometry_dim"
      mode: "cdc"
      cdc_config:
        keys: ["flow_cytometry_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_flow_cytometry_silver_completeness
    type: test
    test_type: completeness
    source: v_flow_cytometry_bronze
    required_columns: [flow_cytometry_key]
    on_violation: warn
    test_id: "PERF-flow_cytometry-S01"

  - name: tst_flow_cytometry_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_flow_cytometry_bronze
    columns: [flow_cytometry_key]
    on_violation: warn
    test_id: "PERF-flow_cytometry-S02"
