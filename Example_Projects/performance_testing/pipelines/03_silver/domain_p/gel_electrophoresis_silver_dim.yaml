pipeline: domain_p_silver
flowgroup: gel_electrophoresis_silver_dim
presets:
  - default_delta_properties
actions:
  - name: gel_electrophoresis_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: gel_electrophoresis
    target: v_gel_electrophoresis_bronze
    description: "Load gel_electrophoresis from bronze for silver layer"

  - name: write_gel_electrophoresis_silver
    type: write
    source: v_gel_electrophoresis_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "gel_electrophoresis_dim"
      mode: "cdc"
      cdc_config:
        keys: ["gel_electrophoresis_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_gel_electrophoresis_silver_completeness
    type: test
    test_type: completeness
    source: v_gel_electrophoresis_bronze
    required_columns: [gel_electrophoresis_key]
    on_violation: warn
    test_id: "PERF-gel_electrophoresis-S01"

  - name: tst_gel_electrophoresis_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_gel_electrophoresis_bronze
    columns: [gel_electrophoresis_key]
    on_violation: warn
    test_id: "PERF-gel_electrophoresis-S02"
