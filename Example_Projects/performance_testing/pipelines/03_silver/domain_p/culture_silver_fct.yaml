pipeline: domain_p_silver
flowgroup: culture_silver_fct
presets:
  - default_delta_properties
actions:
  - name: culture_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: culture
    target: v_culture_bronze
    description: "Load culture from bronze for silver layer"

  - name: write_culture_silver
    type: write
    source: v_culture_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "culture_fct"
      mode: "cdc"
      cdc_config:
        keys: ["culture_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_culture_silver_completeness
    type: test
    test_type: completeness
    source: v_culture_bronze
    required_columns: [culture_key]
    on_violation: warn
    test_id: "PERF-culture-S01"

  - name: tst_culture_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_culture_bronze
    columns: [culture_key]
    on_violation: warn
    test_id: "PERF-culture-S02"
