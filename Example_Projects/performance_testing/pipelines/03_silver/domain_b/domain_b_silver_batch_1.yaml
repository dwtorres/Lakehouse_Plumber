pipeline: domain_b_silver
flowgroup: employee_silver_fct
presets:
  - default_delta_properties
actions:
  - name: employee_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: employee
    target: v_employee_bronze
    description: "Load employee from bronze for silver layer"

  - name: write_employee_silver
    type: write
    source: v_employee_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "employee_fct"
      mode: "cdc"
      cdc_config:
        keys: ["employee_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_employee_silver_completeness
    type: test
    test_type: completeness
    source: v_employee_bronze
    required_columns: [employee_key]
    on_violation: warn
    test_id: "PERF-employee-S01"

  - name: tst_employee_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_employee_bronze
    columns: [employee_key]
    on_violation: warn
    test_id: "PERF-employee-S02"
---
