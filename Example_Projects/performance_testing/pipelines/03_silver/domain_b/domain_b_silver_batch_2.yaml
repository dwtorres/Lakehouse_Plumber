pipeline: domain_b_silver
flowgroup: bonus_silver_dim
presets:
  - default_delta_properties
actions:
  - name: bonus_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: bonus
    target: v_bonus_bronze
    description: "Load bonus from bronze for silver layer"

  - name: write_bonus_silver
    type: write
    source: v_bonus_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "bonus_dim"
      mode: "cdc"
      cdc_config:
        keys: ["bonus_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_bonus_silver_completeness
    type: test
    test_type: completeness
    source: v_bonus_bronze
    required_columns: [bonus_key]
    on_violation: warn
    test_id: "PERF-bonus-S01"

  - name: tst_bonus_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_bonus_bronze
    columns: [bonus_key]
    on_violation: warn
    test_id: "PERF-bonus-S02"
