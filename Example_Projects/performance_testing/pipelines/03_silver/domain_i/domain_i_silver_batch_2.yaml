pipeline: domain_i_silver
flowgroup: work_instruction_silver_dim
presets:
  - default_delta_properties
actions:
  - name: work_instruction_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: work_instruction
    target: v_work_instruction_bronze
    description: "Load work_instruction from bronze for silver layer"

  - name: write_work_instruction_silver
    type: write
    source: v_work_instruction_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "work_instruction_dim"
      mode: "cdc"
      cdc_config:
        keys: ["work_instruction_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_work_instruction_silver_completeness
    type: test
    test_type: completeness
    source: v_work_instruction_bronze
    required_columns: [work_instruction_key]
    on_violation: warn
    test_id: "PERF-work_instruction-S01"

  - name: tst_work_instruction_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_work_instruction_bronze
    columns: [work_instruction_key]
    on_violation: warn
    test_id: "PERF-work_instruction-S02"
