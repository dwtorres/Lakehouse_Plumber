actions:
  - name: calibration_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: calibration
    target: v_calibration_bronze
    description: "Load calibration from bronze for silver layer"

  - name: write_calibration_silver
    type: write
    source: v_calibration_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "calibration_dim"
      mode: "cdc"
      cdc_config:
        keys: ["calibration_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_calibration_silver_completeness
    type: test
    test_type: completeness
    source: v_calibration_bronze
    required_columns: [calibration_key]
    on_violation: warn
    test_id: "PERF-calibration-S01"

  - name: tst_calibration_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_calibration_bronze
    columns: [calibration_key]
    on_violation: warn
    test_id: "PERF-calibration-S02"
