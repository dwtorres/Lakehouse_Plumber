pipeline: domain_q_silver
flowgroup: transfer_silver_dim
presets:
  - default_delta_properties
actions:
  - name: transfer_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: transfer
    target: v_transfer_bronze
    description: "Load transfer from bronze for silver layer"

  - name: write_transfer_silver
    type: write
    source: v_transfer_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "transfer_dim"
      mode: "cdc"
      cdc_config:
        keys: ["transfer_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_transfer_silver_completeness
    type: test
    test_type: completeness
    source: v_transfer_bronze
    required_columns: [transfer_key]
    on_violation: warn
    test_id: "PERF-transfer-S01"

  - name: tst_transfer_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_transfer_bronze
    columns: [transfer_key]
    on_violation: warn
    test_id: "PERF-transfer-S02"
