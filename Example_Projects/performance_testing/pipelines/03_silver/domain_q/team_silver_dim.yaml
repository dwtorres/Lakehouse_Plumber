pipeline: domain_q_silver
flowgroup: team_silver_dim
presets:
  - default_delta_properties
actions:
  - name: team_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: team
    target: v_team_bronze
    description: "Load team from bronze for silver layer"

  - name: write_team_silver
    type: write
    source: v_team_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "team_dim"
      mode: "cdc"
      cdc_config:
        keys: ["team_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_team_silver_completeness
    type: test
    test_type: completeness
    source: v_team_bronze
    required_columns: [team_key]
    on_violation: warn
    test_id: "PERF-team-S01"

  - name: tst_team_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_team_bronze
    columns: [team_key]
    on_violation: warn
    test_id: "PERF-team-S02"
