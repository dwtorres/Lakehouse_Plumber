pipeline: domain_q_silver
flowgroup: draft_pick_silver_dim
presets:
  - default_delta_properties
actions:
  - name: draft_pick_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: draft_pick
    target: v_draft_pick_bronze
    description: "Load draft_pick from bronze for silver layer"

  - name: write_draft_pick_silver
    type: write
    source: v_draft_pick_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "draft_pick_dim"
      mode: "cdc"
      cdc_config:
        keys: ["draft_pick_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_draft_pick_silver_completeness
    type: test
    test_type: completeness
    source: v_draft_pick_bronze
    required_columns: [draft_pick_key]
    on_violation: warn
    test_id: "PERF-draft_pick-S01"

  - name: tst_draft_pick_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_draft_pick_bronze
    columns: [draft_pick_key]
    on_violation: warn
    test_id: "PERF-draft_pick-S02"
