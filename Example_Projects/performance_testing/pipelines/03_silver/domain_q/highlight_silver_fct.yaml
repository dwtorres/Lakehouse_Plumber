pipeline: domain_q_silver
flowgroup: highlight_silver_fct
presets:
  - default_delta_properties
actions:
  - name: highlight_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: highlight
    target: v_highlight_bronze
    description: "Load highlight from bronze for silver layer"

  - name: write_highlight_silver
    type: write
    source: v_highlight_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "highlight_fct"
      mode: "cdc"
      cdc_config:
        keys: ["highlight_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_highlight_silver_completeness
    type: test
    test_type: completeness
    source: v_highlight_bronze
    required_columns: [highlight_key]
    on_violation: warn
    test_id: "PERF-highlight-S01"

  - name: tst_highlight_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_highlight_bronze
    columns: [highlight_key]
    on_violation: warn
    test_id: "PERF-highlight-S02"
