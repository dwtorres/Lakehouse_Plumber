pipeline: domain_q_silver
flowgroup: score_silver_dim
presets:
  - default_delta_properties
actions:
  - name: score_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: score
    target: v_score_bronze
    description: "Load score from bronze for silver layer"

  - name: write_score_silver
    type: write
    source: v_score_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "score_dim"
      mode: "cdc"
      cdc_config:
        keys: ["score_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_score_silver_completeness
    type: test
    test_type: completeness
    source: v_score_bronze
    required_columns: [score_key]
    on_violation: warn
    test_id: "PERF-score-S01"

  - name: tst_score_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_score_bronze
    columns: [score_key]
    on_violation: warn
    test_id: "PERF-score-S02"
