pipeline: domain_q_silver
flowgroup: corner_kick_silver_fct
presets:
  - default_delta_properties
actions:
  - name: corner_kick_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: corner_kick
    target: v_corner_kick_bronze
    description: "Load corner_kick from bronze for silver layer"

  - name: write_corner_kick_silver
    type: write
    source: v_corner_kick_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "corner_kick_fct"
      mode: "cdc"
      cdc_config:
        keys: ["corner_kick_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_corner_kick_silver_completeness
    type: test
    test_type: completeness
    source: v_corner_kick_bronze
    required_columns: [corner_kick_key]
    on_violation: warn
    test_id: "PERF-corner_kick-S01"

  - name: tst_corner_kick_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_corner_kick_bronze
    columns: [corner_kick_key]
    on_violation: warn
    test_id: "PERF-corner_kick-S02"
