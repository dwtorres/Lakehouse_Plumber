pipeline: domain_q_silver
flowgroup: injury_silver_fct
presets:
  - default_delta_properties
actions:
  - name: injury_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: injury
    target: v_injury_bronze
    description: "Load injury from bronze for silver layer"

  - name: write_injury_silver
    type: write
    source: v_injury_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "injury_fct"
      mode: "cdc"
      cdc_config:
        keys: ["injury_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_injury_silver_completeness
    type: test
    test_type: completeness
    source: v_injury_bronze
    required_columns: [injury_key]
    on_violation: warn
    test_id: "PERF-injury-S01"

  - name: tst_injury_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_injury_bronze
    columns: [injury_key]
    on_violation: warn
    test_id: "PERF-injury-S02"
