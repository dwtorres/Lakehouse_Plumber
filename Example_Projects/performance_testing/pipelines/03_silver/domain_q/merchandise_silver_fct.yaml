pipeline: domain_q_silver
flowgroup: merchandise_silver_fct
presets:
  - default_delta_properties
actions:
  - name: merchandise_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: merchandise
    target: v_merchandise_bronze
    description: "Load merchandise from bronze for silver layer"

  - name: write_merchandise_silver
    type: write
    source: v_merchandise_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "merchandise_fct"
      mode: "cdc"
      cdc_config:
        keys: ["merchandise_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_merchandise_silver_completeness
    type: test
    test_type: completeness
    source: v_merchandise_bronze
    required_columns: [merchandise_key]
    on_violation: warn
    test_id: "PERF-merchandise-S01"

  - name: tst_merchandise_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_merchandise_bronze
    columns: [merchandise_key]
    on_violation: warn
    test_id: "PERF-merchandise-S02"
