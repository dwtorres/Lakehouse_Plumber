pipeline: domain_q_silver
flowgroup: lineup_silver_dim
presets:
  - default_delta_properties
actions:
  - name: lineup_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: lineup
    target: v_lineup_bronze
    description: "Load lineup from bronze for silver layer"

  - name: write_lineup_silver
    type: write
    source: v_lineup_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "lineup_dim"
      mode: "cdc"
      cdc_config:
        keys: ["lineup_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_lineup_silver_completeness
    type: test
    test_type: completeness
    source: v_lineup_bronze
    required_columns: [lineup_key]
    on_violation: warn
    test_id: "PERF-lineup-S01"

  - name: tst_lineup_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_lineup_bronze
    columns: [lineup_key]
    on_violation: warn
    test_id: "PERF-lineup-S02"
