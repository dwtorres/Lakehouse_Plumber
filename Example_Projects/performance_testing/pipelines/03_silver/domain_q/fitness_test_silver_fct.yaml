pipeline: domain_q_silver
flowgroup: fitness_test_silver_fct
presets:
  - default_delta_properties
actions:
  - name: fitness_test_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: fitness_test
    target: v_fitness_test_bronze
    description: "Load fitness_test from bronze for silver layer"

  - name: write_fitness_test_silver
    type: write
    source: v_fitness_test_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "fitness_test_fct"
      mode: "cdc"
      cdc_config:
        keys: ["fitness_test_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_fitness_test_silver_completeness
    type: test
    test_type: completeness
    source: v_fitness_test_bronze
    required_columns: [fitness_test_key]
    on_violation: warn
    test_id: "PERF-fitness_test-S01"

  - name: tst_fitness_test_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_fitness_test_bronze
    columns: [fitness_test_key]
    on_violation: warn
    test_id: "PERF-fitness_test-S02"
