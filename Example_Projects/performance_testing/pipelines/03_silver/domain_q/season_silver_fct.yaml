pipeline: domain_q_silver
flowgroup: season_silver_fct
presets:
  - default_delta_properties
actions:
  - name: season_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: season
    target: v_season_bronze
    description: "Load season from bronze for silver layer"

  - name: write_season_silver
    type: write
    source: v_season_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "season_fct"
      mode: "cdc"
      cdc_config:
        keys: ["season_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_season_silver_completeness
    type: test
    test_type: completeness
    source: v_season_bronze
    required_columns: [season_key]
    on_violation: warn
    test_id: "PERF-season-S01"

  - name: tst_season_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_season_bronze
    columns: [season_key]
    on_violation: warn
    test_id: "PERF-season-S02"
