pipeline: domain_q_silver
flowgroup: referee_silver_dim
presets:
  - default_delta_properties
actions:
  - name: referee_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: referee
    target: v_referee_bronze
    description: "Load referee from bronze for silver layer"

  - name: write_referee_silver
    type: write
    source: v_referee_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "referee_dim"
      mode: "cdc"
      cdc_config:
        keys: ["referee_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_referee_silver_completeness
    type: test
    test_type: completeness
    source: v_referee_bronze
    required_columns: [referee_key]
    on_violation: warn
    test_id: "PERF-referee-S01"

  - name: tst_referee_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_referee_bronze
    columns: [referee_key]
    on_violation: warn
    test_id: "PERF-referee-S02"
