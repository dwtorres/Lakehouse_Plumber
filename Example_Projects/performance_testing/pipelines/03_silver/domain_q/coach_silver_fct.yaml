pipeline: domain_q_silver
flowgroup: coach_silver_fct
presets:
  - default_delta_properties
actions:
  - name: coach_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: coach
    target: v_coach_bronze
    description: "Load coach from bronze for silver layer"

  - name: write_coach_silver
    type: write
    source: v_coach_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "coach_fct"
      mode: "cdc"
      cdc_config:
        keys: ["coach_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_coach_silver_completeness
    type: test
    test_type: completeness
    source: v_coach_bronze
    required_columns: [coach_key]
    on_violation: warn
    test_id: "PERF-coach-S01"

  - name: tst_coach_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_coach_bronze
    columns: [coach_key]
    on_violation: warn
    test_id: "PERF-coach-S02"
