pipeline: domain_q_silver
flowgroup: fan_silver_fct
presets:
  - default_delta_properties
actions:
  - name: fan_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: fan
    target: v_fan_bronze
    description: "Load fan from bronze for silver layer"

  - name: write_fan_silver
    type: write
    source: v_fan_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "fan_fct"
      mode: "cdc"
      cdc_config:
        keys: ["fan_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_fan_silver_completeness
    type: test
    test_type: completeness
    source: v_fan_bronze
    required_columns: [fan_key]
    on_violation: warn
    test_id: "PERF-fan-S01"

  - name: tst_fan_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_fan_bronze
    columns: [fan_key]
    on_violation: warn
    test_id: "PERF-fan-S02"
