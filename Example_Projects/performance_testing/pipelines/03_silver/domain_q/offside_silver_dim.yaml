pipeline: domain_q_silver
flowgroup: offside_silver_dim
presets:
  - default_delta_properties
actions:
  - name: offside_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: offside
    target: v_offside_bronze
    description: "Load offside from bronze for silver layer"

  - name: write_offside_silver
    type: write
    source: v_offside_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "offside_dim"
      mode: "cdc"
      cdc_config:
        keys: ["offside_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_offside_silver_completeness
    type: test
    test_type: completeness
    source: v_offside_bronze
    required_columns: [offside_key]
    on_violation: warn
    test_id: "PERF-offside-S01"

  - name: tst_offside_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_offside_bronze
    columns: [offside_key]
    on_violation: warn
    test_id: "PERF-offside-S02"
