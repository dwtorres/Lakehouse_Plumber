pipeline: domain_q_silver
flowgroup: match_silver_fct
presets:
  - default_delta_properties
actions:
  - name: match_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: match
    target: v_match_bronze
    description: "Load match from bronze for silver layer"

  - name: write_match_silver
    type: write
    source: v_match_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "match_fct"
      mode: "cdc"
      cdc_config:
        keys: ["match_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_match_silver_completeness
    type: test
    test_type: completeness
    source: v_match_bronze
    required_columns: [match_key]
    on_violation: warn
    test_id: "PERF-match-S01"

  - name: tst_match_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_match_bronze
    columns: [match_key]
    on_violation: warn
    test_id: "PERF-match-S02"
