pipeline: domain_q_silver
flowgroup: substitution_silver_dim
presets:
  - default_delta_properties
actions:
  - name: substitution_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: substitution
    target: v_substitution_bronze
    description: "Load substitution from bronze for silver layer"

  - name: write_substitution_silver
    type: write
    source: v_substitution_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "substitution_dim"
      mode: "cdc"
      cdc_config:
        keys: ["substitution_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_substitution_silver_completeness
    type: test
    test_type: completeness
    source: v_substitution_bronze
    required_columns: [substitution_key]
    on_violation: warn
    test_id: "PERF-substitution-S01"

  - name: tst_substitution_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_substitution_bronze
    columns: [substitution_key]
    on_violation: warn
    test_id: "PERF-substitution-S02"
