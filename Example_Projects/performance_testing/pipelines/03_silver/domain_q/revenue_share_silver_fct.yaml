pipeline: domain_q_silver
flowgroup: revenue_share_silver_fct
presets:
  - default_delta_properties
actions:
  - name: revenue_share_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: revenue_share
    target: v_revenue_share_bronze
    description: "Load revenue_share from bronze for silver layer"

  - name: write_revenue_share_silver
    type: write
    source: v_revenue_share_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "revenue_share_fct"
      mode: "cdc"
      cdc_config:
        keys: ["revenue_share_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_revenue_share_silver_completeness
    type: test
    test_type: completeness
    source: v_revenue_share_bronze
    required_columns: [revenue_share_key]
    on_violation: warn
    test_id: "PERF-revenue_share-S01"

  - name: tst_revenue_share_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_revenue_share_bronze
    columns: [revenue_share_key]
    on_violation: warn
    test_id: "PERF-revenue_share-S02"
