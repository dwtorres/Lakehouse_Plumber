pipeline: domain_q_silver
flowgroup: ticket_sale_silver_dim
presets:
  - default_delta_properties
actions:
  - name: ticket_sale_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: ticket_sale
    target: v_ticket_sale_bronze
    description: "Load ticket_sale from bronze for silver layer"

  - name: write_ticket_sale_silver
    type: write
    source: v_ticket_sale_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "ticket_sale_dim"
      mode: "cdc"
      cdc_config:
        keys: ["ticket_sale_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_ticket_sale_silver_completeness
    type: test
    test_type: completeness
    source: v_ticket_sale_bronze
    required_columns: [ticket_sale_key]
    on_violation: warn
    test_id: "PERF-ticket_sale-S01"

  - name: tst_ticket_sale_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_ticket_sale_bronze
    columns: [ticket_sale_key]
    on_violation: warn
    test_id: "PERF-ticket_sale-S02"
