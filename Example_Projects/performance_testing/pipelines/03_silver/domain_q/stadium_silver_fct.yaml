pipeline: domain_q_silver
flowgroup: stadium_silver_fct
presets:
  - default_delta_properties
actions:
  - name: stadium_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: stadium
    target: v_stadium_bronze
    description: "Load stadium from bronze for silver layer"

  - name: write_stadium_silver
    type: write
    source: v_stadium_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "stadium_fct"
      mode: "cdc"
      cdc_config:
        keys: ["stadium_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_stadium_silver_completeness
    type: test
    test_type: completeness
    source: v_stadium_bronze
    required_columns: [stadium_key]
    on_violation: warn
    test_id: "PERF-stadium-S01"

  - name: tst_stadium_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_stadium_bronze
    columns: [stadium_key]
    on_violation: warn
    test_id: "PERF-stadium-S02"
