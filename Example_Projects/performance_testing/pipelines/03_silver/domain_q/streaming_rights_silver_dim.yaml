pipeline: domain_q_silver
flowgroup: streaming_rights_silver_dim
presets:
  - default_delta_properties
actions:
  - name: streaming_rights_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: streaming_rights
    target: v_streaming_rights_bronze
    description: "Load streaming_rights from bronze for silver layer"

  - name: write_streaming_rights_silver
    type: write
    source: v_streaming_rights_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "streaming_rights_dim"
      mode: "cdc"
      cdc_config:
        keys: ["streaming_rights_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_streaming_rights_silver_completeness
    type: test
    test_type: completeness
    source: v_streaming_rights_bronze
    required_columns: [streaming_rights_key]
    on_violation: warn
    test_id: "PERF-streaming_rights-S01"

  - name: tst_streaming_rights_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_streaming_rights_bronze
    columns: [streaming_rights_key]
    on_violation: warn
    test_id: "PERF-streaming_rights-S02"
