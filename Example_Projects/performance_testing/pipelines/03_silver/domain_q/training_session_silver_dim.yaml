pipeline: domain_q_silver
flowgroup: training_session_silver_dim
presets:
  - default_delta_properties
actions:
  - name: training_session_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: training_session
    target: v_training_session_bronze
    description: "Load training_session from bronze for silver layer"

  - name: write_training_session_silver
    type: write
    source: v_training_session_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "training_session_dim"
      mode: "cdc"
      cdc_config:
        keys: ["training_session_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_training_session_silver_completeness
    type: test
    test_type: completeness
    source: v_training_session_bronze
    required_columns: [training_session_key]
    on_violation: warn
    test_id: "PERF-training_session-S01"

  - name: tst_training_session_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_training_session_bronze
    columns: [training_session_key]
    on_violation: warn
    test_id: "PERF-training_session-S02"
