pipeline: domain_q_silver
flowgroup: possession_stat_silver_fct
presets:
  - default_delta_properties
actions:
  - name: possession_stat_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: possession_stat
    target: v_possession_stat_bronze
    description: "Load possession_stat from bronze for silver layer"

  - name: write_possession_stat_silver
    type: write
    source: v_possession_stat_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "possession_stat_fct"
      mode: "cdc"
      cdc_config:
        keys: ["possession_stat_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_possession_stat_silver_completeness
    type: test
    test_type: completeness
    source: v_possession_stat_bronze
    required_columns: [possession_stat_key]
    on_violation: warn
    test_id: "PERF-possession_stat-S01"

  - name: tst_possession_stat_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_possession_stat_bronze
    columns: [possession_stat_key]
    on_violation: warn
    test_id: "PERF-possession_stat-S02"
