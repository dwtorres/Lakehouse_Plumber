pipeline: domain_q_silver
flowgroup: luxury_tax_silver_dim
presets:
  - default_delta_properties
actions:
  - name: luxury_tax_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: luxury_tax
    target: v_luxury_tax_bronze
    description: "Load luxury_tax from bronze for silver layer"

  - name: write_luxury_tax_silver
    type: write
    source: v_luxury_tax_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "luxury_tax_dim"
      mode: "cdc"
      cdc_config:
        keys: ["luxury_tax_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_luxury_tax_silver_completeness
    type: test
    test_type: completeness
    source: v_luxury_tax_bronze
    required_columns: [luxury_tax_key]
    on_violation: warn
    test_id: "PERF-luxury_tax-S01"

  - name: tst_luxury_tax_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_luxury_tax_bronze
    columns: [luxury_tax_key]
    on_violation: warn
    test_id: "PERF-luxury_tax-S02"
