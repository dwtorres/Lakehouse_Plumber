pipeline: domain_q_silver
flowgroup: var_decision_silver_dim
presets:
  - default_delta_properties
actions:
  - name: var_decision_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: var_decision
    target: v_var_decision_bronze
    description: "Load var_decision from bronze for silver layer"

  - name: write_var_decision_silver
    type: write
    source: v_var_decision_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "var_decision_dim"
      mode: "cdc"
      cdc_config:
        keys: ["var_decision_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_var_decision_silver_completeness
    type: test
    test_type: completeness
    source: v_var_decision_bronze
    required_columns: [var_decision_key]
    on_violation: warn
    test_id: "PERF-var_decision-S01"

  - name: tst_var_decision_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_var_decision_bronze
    columns: [var_decision_key]
    on_violation: warn
    test_id: "PERF-var_decision-S02"
