pipeline: domain_q_silver
flowgroup: trophy_silver_dim
presets:
  - default_delta_properties
actions:
  - name: trophy_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: trophy
    target: v_trophy_bronze
    description: "Load trophy from bronze for silver layer"

  - name: write_trophy_silver
    type: write
    source: v_trophy_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "trophy_dim"
      mode: "cdc"
      cdc_config:
        keys: ["trophy_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_trophy_silver_completeness
    type: test
    test_type: completeness
    source: v_trophy_bronze
    required_columns: [trophy_key]
    on_violation: warn
    test_id: "PERF-trophy-S01"

  - name: tst_trophy_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_trophy_bronze
    columns: [trophy_key]
    on_violation: warn
    test_id: "PERF-trophy-S02"
