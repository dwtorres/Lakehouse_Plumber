pipeline: domain_q_silver
flowgroup: tv_deal_silver_dim
presets:
  - default_delta_properties
actions:
  - name: tv_deal_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: tv_deal
    target: v_tv_deal_bronze
    description: "Load tv_deal from bronze for silver layer"

  - name: write_tv_deal_silver
    type: write
    source: v_tv_deal_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "tv_deal_dim"
      mode: "cdc"
      cdc_config:
        keys: ["tv_deal_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_tv_deal_silver_completeness
    type: test
    test_type: completeness
    source: v_tv_deal_bronze
    required_columns: [tv_deal_key]
    on_violation: warn
    test_id: "PERF-tv_deal-S01"

  - name: tst_tv_deal_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_tv_deal_bronze
    columns: [tv_deal_key]
    on_violation: warn
    test_id: "PERF-tv_deal-S02"
