pipeline: domain_q_silver
flowgroup: salary_cap_silver_dim
presets:
  - default_delta_properties
actions:
  - name: salary_cap_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: salary_cap
    target: v_salary_cap_bronze
    description: "Load salary_cap from bronze for silver layer"

  - name: write_salary_cap_silver
    type: write
    source: v_salary_cap_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "salary_cap_dim"
      mode: "cdc"
      cdc_config:
        keys: ["salary_cap_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_salary_cap_silver_completeness
    type: test
    test_type: completeness
    source: v_salary_cap_bronze
    required_columns: [salary_cap_key]
    on_violation: warn
    test_id: "PERF-salary_cap-S01"

  - name: tst_salary_cap_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_salary_cap_bronze
    columns: [salary_cap_key]
    on_violation: warn
    test_id: "PERF-salary_cap-S02"
