pipeline: domain_q_silver
flowgroup: red_card_silver_dim
presets:
  - default_delta_properties
actions:
  - name: red_card_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: red_card
    target: v_red_card_bronze
    description: "Load red_card from bronze for silver layer"

  - name: write_red_card_silver
    type: write
    source: v_red_card_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "red_card_dim"
      mode: "cdc"
      cdc_config:
        keys: ["red_card_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_red_card_silver_completeness
    type: test
    test_type: completeness
    source: v_red_card_bronze
    required_columns: [red_card_key]
    on_violation: warn
    test_id: "PERF-red_card-S01"

  - name: tst_red_card_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_red_card_bronze
    columns: [red_card_key]
    on_violation: warn
    test_id: "PERF-red_card-S02"
