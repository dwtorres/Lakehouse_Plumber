pipeline: domain_o_silver
flowgroup: keyword_silver_dim
presets:
  - default_delta_properties
actions:
  - name: keyword_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: keyword
    target: v_keyword_bronze
    description: "Load keyword from bronze for silver layer"

  - name: write_keyword_silver
    type: write
    source: v_keyword_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "keyword_dim"
      mode: "cdc"
      cdc_config:
        keys: ["keyword_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_keyword_silver_completeness
    type: test
    test_type: completeness
    source: v_keyword_bronze
    required_columns: [keyword_key]
    on_violation: warn
    test_id: "PERF-keyword-S01"

  - name: tst_keyword_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_keyword_bronze
    columns: [keyword_key]
    on_violation: warn
    test_id: "PERF-keyword-S02"
