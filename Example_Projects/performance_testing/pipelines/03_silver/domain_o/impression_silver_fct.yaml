pipeline: domain_o_silver
flowgroup: impression_silver_fct
presets:
  - default_delta_properties
actions:
  - name: impression_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: impression
    target: v_impression_bronze
    description: "Load impression from bronze for silver layer"

  - name: write_impression_silver
    type: write
    source: v_impression_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "impression_fct"
      mode: "cdc"
      cdc_config:
        keys: ["impression_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_impression_silver_completeness
    type: test
    test_type: completeness
    source: v_impression_bronze
    required_columns: [impression_key]
    on_violation: warn
    test_id: "PERF-impression-S01"

  - name: tst_impression_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_impression_bronze
    columns: [impression_key]
    on_violation: warn
    test_id: "PERF-impression-S02"
