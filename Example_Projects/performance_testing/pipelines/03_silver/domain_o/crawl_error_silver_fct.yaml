pipeline: domain_o_silver
flowgroup: crawl_error_silver_fct
presets:
  - default_delta_properties
actions:
  - name: crawl_error_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: crawl_error
    target: v_crawl_error_bronze
    description: "Load crawl_error from bronze for silver layer"

  - name: write_crawl_error_silver
    type: write
    source: v_crawl_error_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "crawl_error_fct"
      mode: "cdc"
      cdc_config:
        keys: ["crawl_error_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_crawl_error_silver_completeness
    type: test
    test_type: completeness
    source: v_crawl_error_bronze
    required_columns: [crawl_error_key]
    on_violation: warn
    test_id: "PERF-crawl_error-S01"

  - name: tst_crawl_error_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_crawl_error_bronze
    columns: [crawl_error_key]
    on_violation: warn
    test_id: "PERF-crawl_error-S02"
