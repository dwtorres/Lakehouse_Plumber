pipeline: domain_o_silver
flowgroup: audience_silver_dim
presets:
  - default_delta_properties
actions:
  - name: audience_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: audience
    target: v_audience_bronze
    description: "Load audience from bronze for silver layer"

  - name: write_audience_silver
    type: write
    source: v_audience_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "audience_dim"
      mode: "cdc"
      cdc_config:
        keys: ["audience_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_audience_silver_completeness
    type: test
    test_type: completeness
    source: v_audience_bronze
    required_columns: [audience_key]
    on_violation: warn
    test_id: "PERF-audience-S01"

  - name: tst_audience_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_audience_bronze
    columns: [audience_key]
    on_violation: warn
    test_id: "PERF-audience-S02"
