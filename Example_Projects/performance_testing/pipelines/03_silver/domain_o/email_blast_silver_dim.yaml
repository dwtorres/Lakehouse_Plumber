pipeline: domain_o_silver
flowgroup: email_blast_silver_dim
presets:
  - default_delta_properties
actions:
  - name: email_blast_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: email_blast
    target: v_email_blast_bronze
    description: "Load email_blast from bronze for silver layer"

  - name: write_email_blast_silver
    type: write
    source: v_email_blast_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "email_blast_dim"
      mode: "cdc"
      cdc_config:
        keys: ["email_blast_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_email_blast_silver_completeness
    type: test
    test_type: completeness
    source: v_email_blast_bronze
    required_columns: [email_blast_key]
    on_violation: warn
    test_id: "PERF-email_blast-S01"

  - name: tst_email_blast_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_email_blast_bronze
    columns: [email_blast_key]
    on_violation: warn
    test_id: "PERF-email_blast-S02"
