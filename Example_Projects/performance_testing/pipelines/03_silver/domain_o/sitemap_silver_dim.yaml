pipeline: domain_o_silver
flowgroup: sitemap_silver_dim
presets:
  - default_delta_properties
actions:
  - name: sitemap_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: sitemap
    target: v_sitemap_bronze
    description: "Load sitemap from bronze for silver layer"

  - name: write_sitemap_silver
    type: write
    source: v_sitemap_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "sitemap_dim"
      mode: "cdc"
      cdc_config:
        keys: ["sitemap_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_sitemap_silver_completeness
    type: test
    test_type: completeness
    source: v_sitemap_bronze
    required_columns: [sitemap_key]
    on_violation: warn
    test_id: "PERF-sitemap-S01"

  - name: tst_sitemap_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_sitemap_bronze
    columns: [sitemap_key]
    on_violation: warn
    test_id: "PERF-sitemap-S02"
