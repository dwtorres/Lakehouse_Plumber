pipeline: domain_o_silver
flowgroup: domain_authority_silver_dim
presets:
  - default_delta_properties
actions:
  - name: domain_authority_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: domain_authority
    target: v_domain_authority_bronze
    description: "Load domain_authority from bronze for silver layer"

  - name: write_domain_authority_silver
    type: write
    source: v_domain_authority_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "domain_authority_dim"
      mode: "cdc"
      cdc_config:
        keys: ["domain_authority_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_domain_authority_silver_completeness
    type: test
    test_type: completeness
    source: v_domain_authority_bronze
    required_columns: [domain_authority_key]
    on_violation: warn
    test_id: "PERF-domain_authority-S01"

  - name: tst_domain_authority_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_domain_authority_bronze
    columns: [domain_authority_key]
    on_violation: warn
    test_id: "PERF-domain_authority-S02"
