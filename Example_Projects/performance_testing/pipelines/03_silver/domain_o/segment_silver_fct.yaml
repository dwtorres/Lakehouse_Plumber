pipeline: domain_o_silver
flowgroup: segment_silver_fct
presets:
  - default_delta_properties
actions:
  - name: segment_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: segment
    target: v_segment_bronze
    description: "Load segment from bronze for silver layer"

  - name: write_segment_silver
    type: write
    source: v_segment_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "segment_fct"
      mode: "cdc"
      cdc_config:
        keys: ["segment_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_segment_silver_completeness
    type: test
    test_type: completeness
    source: v_segment_bronze
    required_columns: [segment_key]
    on_violation: warn
    test_id: "PERF-segment-S01"

  - name: tst_segment_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_segment_bronze
    columns: [segment_key]
    on_violation: warn
    test_id: "PERF-segment-S02"
