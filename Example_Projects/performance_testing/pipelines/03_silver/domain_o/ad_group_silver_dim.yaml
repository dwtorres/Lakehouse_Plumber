pipeline: domain_o_silver
flowgroup: ad_group_silver_dim
presets:
  - default_delta_properties
actions:
  - name: ad_group_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: ad_group
    target: v_ad_group_bronze
    description: "Load ad_group from bronze for silver layer"

  - name: write_ad_group_silver
    type: write
    source: v_ad_group_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "ad_group_dim"
      mode: "cdc"
      cdc_config:
        keys: ["ad_group_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_ad_group_silver_completeness
    type: test
    test_type: completeness
    source: v_ad_group_bronze
    required_columns: [ad_group_key]
    on_violation: warn
    test_id: "PERF-ad_group-S01"

  - name: tst_ad_group_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_ad_group_bronze
    columns: [ad_group_key]
    on_violation: warn
    test_id: "PERF-ad_group-S02"
