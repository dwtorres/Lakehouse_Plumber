pipeline: domain_o_silver
flowgroup: seo_rank_silver_fct
presets:
  - default_delta_properties
actions:
  - name: seo_rank_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: seo_rank
    target: v_seo_rank_bronze
    description: "Load seo_rank from bronze for silver layer"

  - name: write_seo_rank_silver
    type: write
    source: v_seo_rank_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "seo_rank_fct"
      mode: "cdc"
      cdc_config:
        keys: ["seo_rank_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_seo_rank_silver_completeness
    type: test
    test_type: completeness
    source: v_seo_rank_bronze
    required_columns: [seo_rank_key]
    on_violation: warn
    test_id: "PERF-seo_rank-S01"

  - name: tst_seo_rank_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_seo_rank_bronze
    columns: [seo_rank_key]
    on_violation: warn
    test_id: "PERF-seo_rank-S02"
