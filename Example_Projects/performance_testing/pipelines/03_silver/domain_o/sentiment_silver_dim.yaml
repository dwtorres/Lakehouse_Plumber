pipeline: domain_o_silver
flowgroup: sentiment_silver_dim
presets:
  - default_delta_properties
actions:
  - name: sentiment_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: sentiment
    target: v_sentiment_bronze
    description: "Load sentiment from bronze for silver layer"

  - name: write_sentiment_silver
    type: write
    source: v_sentiment_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "sentiment_dim"
      mode: "cdc"
      cdc_config:
        keys: ["sentiment_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_sentiment_silver_completeness
    type: test
    test_type: completeness
    source: v_sentiment_bronze
    required_columns: [sentiment_key]
    on_violation: warn
    test_id: "PERF-sentiment-S01"

  - name: tst_sentiment_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_sentiment_bronze
    columns: [sentiment_key]
    on_violation: warn
    test_id: "PERF-sentiment-S02"
