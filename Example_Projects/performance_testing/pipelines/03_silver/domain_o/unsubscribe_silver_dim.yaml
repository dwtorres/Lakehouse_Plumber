pipeline: domain_o_silver
flowgroup: unsubscribe_silver_dim
presets:
  - default_delta_properties
actions:
  - name: unsubscribe_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: unsubscribe
    target: v_unsubscribe_bronze
    description: "Load unsubscribe from bronze for silver layer"

  - name: write_unsubscribe_silver
    type: write
    source: v_unsubscribe_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "unsubscribe_dim"
      mode: "cdc"
      cdc_config:
        keys: ["unsubscribe_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_unsubscribe_silver_completeness
    type: test
    test_type: completeness
    source: v_unsubscribe_bronze
    required_columns: [unsubscribe_key]
    on_violation: warn
    test_id: "PERF-unsubscribe-S01"

  - name: tst_unsubscribe_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_unsubscribe_bronze
    columns: [unsubscribe_key]
    on_violation: warn
    test_id: "PERF-unsubscribe-S02"
