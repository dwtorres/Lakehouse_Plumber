pipeline: domain_o_silver
flowgroup: backlink_silver_dim
presets:
  - default_delta_properties
actions:
  - name: backlink_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: backlink
    target: v_backlink_bronze
    description: "Load backlink from bronze for silver layer"

  - name: write_backlink_silver
    type: write
    source: v_backlink_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "backlink_dim"
      mode: "cdc"
      cdc_config:
        keys: ["backlink_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_backlink_silver_completeness
    type: test
    test_type: completeness
    source: v_backlink_bronze
    required_columns: [backlink_key]
    on_violation: warn
    test_id: "PERF-backlink-S01"

  - name: tst_backlink_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_backlink_bronze
    columns: [backlink_key]
    on_violation: warn
    test_id: "PERF-backlink-S02"
