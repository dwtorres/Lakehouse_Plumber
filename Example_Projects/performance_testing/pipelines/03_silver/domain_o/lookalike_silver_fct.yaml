pipeline: domain_o_silver
flowgroup: lookalike_silver_fct
presets:
  - default_delta_properties
actions:
  - name: lookalike_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: lookalike
    target: v_lookalike_bronze
    description: "Load lookalike from bronze for silver layer"

  - name: write_lookalike_silver
    type: write
    source: v_lookalike_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "lookalike_fct"
      mode: "cdc"
      cdc_config:
        keys: ["lookalike_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_lookalike_silver_completeness
    type: test
    test_type: completeness
    source: v_lookalike_bronze
    required_columns: [lookalike_key]
    on_violation: warn
    test_id: "PERF-lookalike-S01"

  - name: tst_lookalike_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_lookalike_bronze
    columns: [lookalike_key]
    on_violation: warn
    test_id: "PERF-lookalike-S02"
