pipeline: domain_o_silver
flowgroup: attribution_silver_fct
presets:
  - default_delta_properties
actions:
  - name: attribution_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: attribution
    target: v_attribution_bronze
    description: "Load attribution from bronze for silver layer"

  - name: write_attribution_silver
    type: write
    source: v_attribution_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "attribution_fct"
      mode: "cdc"
      cdc_config:
        keys: ["attribution_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_attribution_silver_completeness
    type: test
    test_type: completeness
    source: v_attribution_bronze
    required_columns: [attribution_key]
    on_violation: warn
    test_id: "PERF-attribution-S01"

  - name: tst_attribution_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_attribution_bronze
    columns: [attribution_key]
    on_violation: warn
    test_id: "PERF-attribution-S02"
