pipeline: domain_r_silver
flowgroup: attitude_control_silver_dim
presets:
  - default_delta_properties
actions:
  - name: attitude_control_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: attitude_control
    target: v_attitude_control_bronze
    description: "Load attitude_control from bronze for silver layer"

  - name: write_attitude_control_silver
    type: write
    source: v_attitude_control_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "attitude_control_dim"
      mode: "cdc"
      cdc_config:
        keys: ["attitude_control_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_attitude_control_silver_completeness
    type: test
    test_type: completeness
    source: v_attitude_control_bronze
    required_columns: [attitude_control_key]
    on_violation: warn
    test_id: "PERF-attitude_control-S01"

  - name: tst_attitude_control_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_attitude_control_bronze
    columns: [attitude_control_key]
    on_violation: warn
    test_id: "PERF-attitude_control-S02"
