pipeline: domain_r_silver
flowgroup: mission_silver_fct
presets:
  - default_delta_properties
actions:
  - name: mission_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: mission
    target: v_mission_bronze
    description: "Load mission from bronze for silver layer"

  - name: write_mission_silver
    type: write
    source: v_mission_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "mission_fct"
      mode: "cdc"
      cdc_config:
        keys: ["mission_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_mission_silver_completeness
    type: test
    test_type: completeness
    source: v_mission_bronze
    required_columns: [mission_key]
    on_violation: warn
    test_id: "PERF-mission-S01"

  - name: tst_mission_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_mission_bronze
    columns: [mission_key]
    on_violation: warn
    test_id: "PERF-mission-S02"
