pipeline: domain_r_silver
flowgroup: bit_error_rate_silver_fct
presets:
  - default_delta_properties
actions:
  - name: bit_error_rate_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: bit_error_rate
    target: v_bit_error_rate_bronze
    description: "Load bit_error_rate from bronze for silver layer"

  - name: write_bit_error_rate_silver
    type: write
    source: v_bit_error_rate_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "bit_error_rate_fct"
      mode: "cdc"
      cdc_config:
        keys: ["bit_error_rate_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_bit_error_rate_silver_completeness
    type: test
    test_type: completeness
    source: v_bit_error_rate_bronze
    required_columns: [bit_error_rate_key]
    on_violation: warn
    test_id: "PERF-bit_error_rate-S01"

  - name: tst_bit_error_rate_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_bit_error_rate_bronze
    columns: [bit_error_rate_key]
    on_violation: warn
    test_id: "PERF-bit_error_rate-S02"
