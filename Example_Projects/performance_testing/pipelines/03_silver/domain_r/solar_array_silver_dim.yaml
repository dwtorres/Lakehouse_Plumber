pipeline: domain_r_silver
flowgroup: solar_array_silver_dim
presets:
  - default_delta_properties
actions:
  - name: solar_array_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: solar_array
    target: v_solar_array_bronze
    description: "Load solar_array from bronze for silver layer"

  - name: write_solar_array_silver
    type: write
    source: v_solar_array_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "solar_array_dim"
      mode: "cdc"
      cdc_config:
        keys: ["solar_array_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_solar_array_silver_completeness
    type: test
    test_type: completeness
    source: v_solar_array_bronze
    required_columns: [solar_array_key]
    on_violation: warn
    test_id: "PERF-solar_array-S01"

  - name: tst_solar_array_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_solar_array_bronze
    columns: [solar_array_key]
    on_violation: warn
    test_id: "PERF-solar_array-S02"
