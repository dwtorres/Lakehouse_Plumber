pipeline: domain_r_silver
flowgroup: eclipse_period_silver_dim
presets:
  - default_delta_properties
actions:
  - name: eclipse_period_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: eclipse_period
    target: v_eclipse_period_bronze
    description: "Load eclipse_period from bronze for silver layer"

  - name: write_eclipse_period_silver
    type: write
    source: v_eclipse_period_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "eclipse_period_dim"
      mode: "cdc"
      cdc_config:
        keys: ["eclipse_period_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_eclipse_period_silver_completeness
    type: test
    test_type: completeness
    source: v_eclipse_period_bronze
    required_columns: [eclipse_period_key]
    on_violation: warn
    test_id: "PERF-eclipse_period-S01"

  - name: tst_eclipse_period_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_eclipse_period_bronze
    columns: [eclipse_period_key]
    on_violation: warn
    test_id: "PERF-eclipse_period-S02"
