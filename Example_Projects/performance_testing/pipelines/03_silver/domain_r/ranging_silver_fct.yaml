pipeline: domain_r_silver
flowgroup: ranging_silver_fct
presets:
  - default_delta_properties
actions:
  - name: ranging_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: ranging
    target: v_ranging_bronze
    description: "Load ranging from bronze for silver layer"

  - name: write_ranging_silver
    type: write
    source: v_ranging_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "ranging_fct"
      mode: "cdc"
      cdc_config:
        keys: ["ranging_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_ranging_silver_completeness
    type: test
    test_type: completeness
    source: v_ranging_bronze
    required_columns: [ranging_key]
    on_violation: warn
    test_id: "PERF-ranging-S01"

  - name: tst_ranging_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_ranging_bronze
    columns: [ranging_key]
    on_violation: warn
    test_id: "PERF-ranging-S02"
