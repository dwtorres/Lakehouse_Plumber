pipeline: domain_r_silver
flowgroup: spectrum_silver_dim
presets:
  - default_delta_properties
actions:
  - name: spectrum_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: spectrum
    target: v_spectrum_bronze
    description: "Load spectrum from bronze for silver layer"

  - name: write_spectrum_silver
    type: write
    source: v_spectrum_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "spectrum_dim"
      mode: "cdc"
      cdc_config:
        keys: ["spectrum_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_spectrum_silver_completeness
    type: test
    test_type: completeness
    source: v_spectrum_bronze
    required_columns: [spectrum_key]
    on_violation: warn
    test_id: "PERF-spectrum-S01"

  - name: tst_spectrum_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_spectrum_bronze
    columns: [spectrum_key]
    on_violation: warn
    test_id: "PERF-spectrum-S02"
