pipeline: domain_r_silver
flowgroup: antenna_silver_fct
presets:
  - default_delta_properties
actions:
  - name: antenna_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: antenna
    target: v_antenna_bronze
    description: "Load antenna from bronze for silver layer"

  - name: write_antenna_silver
    type: write
    source: v_antenna_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "antenna_fct"
      mode: "cdc"
      cdc_config:
        keys: ["antenna_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_antenna_silver_completeness
    type: test
    test_type: completeness
    source: v_antenna_bronze
    required_columns: [antenna_key]
    on_violation: warn
    test_id: "PERF-antenna-S01"

  - name: tst_antenna_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_antenna_bronze
    columns: [antenna_key]
    on_violation: warn
    test_id: "PERF-antenna-S02"
