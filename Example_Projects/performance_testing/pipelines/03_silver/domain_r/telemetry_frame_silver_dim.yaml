pipeline: domain_r_silver
flowgroup: telemetry_frame_silver_dim
presets:
  - default_delta_properties
actions:
  - name: telemetry_frame_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: telemetry_frame
    target: v_telemetry_frame_bronze
    description: "Load telemetry_frame from bronze for silver layer"

  - name: write_telemetry_frame_silver
    type: write
    source: v_telemetry_frame_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "telemetry_frame_dim"
      mode: "cdc"
      cdc_config:
        keys: ["telemetry_frame_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_telemetry_frame_silver_completeness
    type: test
    test_type: completeness
    source: v_telemetry_frame_bronze
    required_columns: [telemetry_frame_key]
    on_violation: warn
    test_id: "PERF-telemetry_frame-S01"

  - name: tst_telemetry_frame_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_telemetry_frame_bronze
    columns: [telemetry_frame_key]
    on_violation: warn
    test_id: "PERF-telemetry_frame-S02"
