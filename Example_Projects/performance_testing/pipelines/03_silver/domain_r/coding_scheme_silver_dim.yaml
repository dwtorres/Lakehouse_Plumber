pipeline: domain_r_silver
flowgroup: coding_scheme_silver_dim
presets:
  - default_delta_properties
actions:
  - name: coding_scheme_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: coding_scheme
    target: v_coding_scheme_bronze
    description: "Load coding_scheme from bronze for silver layer"

  - name: write_coding_scheme_silver
    type: write
    source: v_coding_scheme_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "coding_scheme_dim"
      mode: "cdc"
      cdc_config:
        keys: ["coding_scheme_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_coding_scheme_silver_completeness
    type: test
    test_type: completeness
    source: v_coding_scheme_bronze
    required_columns: [coding_scheme_key]
    on_violation: warn
    test_id: "PERF-coding_scheme-S01"

  - name: tst_coding_scheme_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_coding_scheme_bronze
    columns: [coding_scheme_key]
    on_violation: warn
    test_id: "PERF-coding_scheme-S02"
