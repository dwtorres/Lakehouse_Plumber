pipeline: domain_r_silver
flowgroup: collision_avoidance_silver_dim
presets:
  - default_delta_properties
actions:
  - name: collision_avoidance_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: collision_avoidance
    target: v_collision_avoidance_bronze
    description: "Load collision_avoidance from bronze for silver layer"

  - name: write_collision_avoidance_silver
    type: write
    source: v_collision_avoidance_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "collision_avoidance_dim"
      mode: "cdc"
      cdc_config:
        keys: ["collision_avoidance_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_collision_avoidance_silver_completeness
    type: test
    test_type: completeness
    source: v_collision_avoidance_bronze
    required_columns: [collision_avoidance_key]
    on_violation: warn
    test_id: "PERF-collision_avoidance-S01"

  - name: tst_collision_avoidance_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_collision_avoidance_bronze
    columns: [collision_avoidance_key]
    on_violation: warn
    test_id: "PERF-collision_avoidance-S02"
