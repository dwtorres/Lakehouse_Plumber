pipeline: domain_r_silver
flowgroup: interference_silver_dim
presets:
  - default_delta_properties
actions:
  - name: interference_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: interference
    target: v_interference_bronze
    description: "Load interference from bronze for silver layer"

  - name: write_interference_silver
    type: write
    source: v_interference_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "interference_dim"
      mode: "cdc"
      cdc_config:
        keys: ["interference_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_interference_silver_completeness
    type: test
    test_type: completeness
    source: v_interference_bronze
    required_columns: [interference_key]
    on_violation: warn
    test_id: "PERF-interference-S01"

  - name: tst_interference_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_interference_bronze
    columns: [interference_key]
    on_violation: warn
    test_id: "PERF-interference-S02"
