pipeline: domain_r_silver
flowgroup: thermal_control_silver_fct
presets:
  - default_delta_properties
actions:
  - name: thermal_control_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: thermal_control
    target: v_thermal_control_bronze
    description: "Load thermal_control from bronze for silver layer"

  - name: write_thermal_control_silver
    type: write
    source: v_thermal_control_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "thermal_control_fct"
      mode: "cdc"
      cdc_config:
        keys: ["thermal_control_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_thermal_control_silver_completeness
    type: test
    test_type: completeness
    source: v_thermal_control_bronze
    required_columns: [thermal_control_key]
    on_violation: warn
    test_id: "PERF-thermal_control-S01"

  - name: tst_thermal_control_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_thermal_control_bronze
    columns: [thermal_control_key]
    on_violation: warn
    test_id: "PERF-thermal_control-S02"
