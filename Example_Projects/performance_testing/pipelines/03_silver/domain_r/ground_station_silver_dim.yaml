pipeline: domain_r_silver
flowgroup: ground_station_silver_dim
presets:
  - default_delta_properties
actions:
  - name: ground_station_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: ground_station
    target: v_ground_station_bronze
    description: "Load ground_station from bronze for silver layer"

  - name: write_ground_station_silver
    type: write
    source: v_ground_station_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "ground_station_dim"
      mode: "cdc"
      cdc_config:
        keys: ["ground_station_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_ground_station_silver_completeness
    type: test
    test_type: completeness
    source: v_ground_station_bronze
    required_columns: [ground_station_key]
    on_violation: warn
    test_id: "PERF-ground_station-S01"

  - name: tst_ground_station_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_ground_station_bronze
    columns: [ground_station_key]
    on_violation: warn
    test_id: "PERF-ground_station-S02"
