pipeline: domain_r_silver
flowgroup: encryption_key_silver_fct
presets:
  - default_delta_properties
actions:
  - name: encryption_key_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: encryption_key
    target: v_encryption_key_bronze
    description: "Load encryption_key from bronze for silver layer"

  - name: write_encryption_key_silver
    type: write
    source: v_encryption_key_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "encryption_key_fct"
      mode: "cdc"
      cdc_config:
        keys: ["encryption_key_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_encryption_key_silver_completeness
    type: test
    test_type: completeness
    source: v_encryption_key_bronze
    required_columns: [encryption_key_key]
    on_violation: warn
    test_id: "PERF-encryption_key-S01"

  - name: tst_encryption_key_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_encryption_key_bronze
    columns: [encryption_key_key]
    on_violation: warn
    test_id: "PERF-encryption_key-S02"
