pipeline: domain_r_silver
flowgroup: transponder_silver_dim
presets:
  - default_delta_properties
actions:
  - name: transponder_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: transponder
    target: v_transponder_bronze
    description: "Load transponder from bronze for silver layer"

  - name: write_transponder_silver
    type: write
    source: v_transponder_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "transponder_dim"
      mode: "cdc"
      cdc_config:
        keys: ["transponder_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_transponder_silver_completeness
    type: test
    test_type: completeness
    source: v_transponder_bronze
    required_columns: [transponder_key]
    on_violation: warn
    test_id: "PERF-transponder-S01"

  - name: tst_transponder_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_transponder_bronze
    columns: [transponder_key]
    on_violation: warn
    test_id: "PERF-transponder-S02"
