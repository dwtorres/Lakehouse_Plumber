pipeline: domain_r_silver
flowgroup: orbit_silver_dim
presets:
  - default_delta_properties
actions:
  - name: orbit_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: orbit
    target: v_orbit_bronze
    description: "Load orbit from bronze for silver layer"

  - name: write_orbit_silver
    type: write
    source: v_orbit_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "orbit_dim"
      mode: "cdc"
      cdc_config:
        keys: ["orbit_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_orbit_silver_completeness
    type: test
    test_type: completeness
    source: v_orbit_bronze
    required_columns: [orbit_key]
    on_violation: warn
    test_id: "PERF-orbit-S01"

  - name: tst_orbit_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_orbit_bronze
    columns: [orbit_key]
    on_violation: warn
    test_id: "PERF-orbit-S02"
