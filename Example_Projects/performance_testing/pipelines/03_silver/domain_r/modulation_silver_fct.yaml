pipeline: domain_r_silver
flowgroup: modulation_silver_fct
presets:
  - default_delta_properties
actions:
  - name: modulation_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: modulation
    target: v_modulation_bronze
    description: "Load modulation from bronze for silver layer"

  - name: write_modulation_silver
    type: write
    source: v_modulation_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "modulation_fct"
      mode: "cdc"
      cdc_config:
        keys: ["modulation_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_modulation_silver_completeness
    type: test
    test_type: completeness
    source: v_modulation_bronze
    required_columns: [modulation_key]
    on_violation: warn
    test_id: "PERF-modulation-S01"

  - name: tst_modulation_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_modulation_bronze
    columns: [modulation_key]
    on_violation: warn
    test_id: "PERF-modulation-S02"
