pipeline: domain_r_silver
flowgroup: beam_silver_dim
presets:
  - default_delta_properties
actions:
  - name: beam_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: beam
    target: v_beam_bronze
    description: "Load beam from bronze for silver layer"

  - name: write_beam_silver
    type: write
    source: v_beam_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "beam_dim"
      mode: "cdc"
      cdc_config:
        keys: ["beam_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_beam_silver_completeness
    type: test
    test_type: completeness
    source: v_beam_bronze
    required_columns: [beam_key]
    on_violation: warn
    test_id: "PERF-beam-S01"

  - name: tst_beam_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_beam_bronze
    columns: [beam_key]
    on_violation: warn
    test_id: "PERF-beam-S02"
