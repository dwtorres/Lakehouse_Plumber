pipeline: domain_r_silver
flowgroup: downlink_silver_dim
presets:
  - default_delta_properties
actions:
  - name: downlink_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: downlink
    target: v_downlink_bronze
    description: "Load downlink from bronze for silver layer"

  - name: write_downlink_silver
    type: write
    source: v_downlink_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "downlink_dim"
      mode: "cdc"
      cdc_config:
        keys: ["downlink_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_downlink_silver_completeness
    type: test
    test_type: completeness
    source: v_downlink_bronze
    required_columns: [downlink_key]
    on_violation: warn
    test_id: "PERF-downlink-S01"

  - name: tst_downlink_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_downlink_bronze
    columns: [downlink_key]
    on_violation: warn
    test_id: "PERF-downlink-S02"
