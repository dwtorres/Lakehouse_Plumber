pipeline: domain_r_silver
flowgroup: satellite_silver_fct
presets:
  - default_delta_properties
actions:
  - name: satellite_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: satellite
    target: v_satellite_bronze
    description: "Load satellite from bronze for silver layer"

  - name: write_satellite_silver
    type: write
    source: v_satellite_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "satellite_fct"
      mode: "cdc"
      cdc_config:
        keys: ["satellite_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_satellite_silver_completeness
    type: test
    test_type: completeness
    source: v_satellite_bronze
    required_columns: [satellite_key]
    on_violation: warn
    test_id: "PERF-satellite-S01"

  - name: tst_satellite_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_satellite_bronze
    columns: [satellite_key]
    on_violation: warn
    test_id: "PERF-satellite-S02"
