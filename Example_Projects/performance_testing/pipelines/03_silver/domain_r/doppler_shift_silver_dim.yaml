pipeline: domain_r_silver
flowgroup: doppler_shift_silver_dim
presets:
  - default_delta_properties
actions:
  - name: doppler_shift_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: doppler_shift
    target: v_doppler_shift_bronze
    description: "Load doppler_shift from bronze for silver layer"

  - name: write_doppler_shift_silver
    type: write
    source: v_doppler_shift_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "doppler_shift_dim"
      mode: "cdc"
      cdc_config:
        keys: ["doppler_shift_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_doppler_shift_silver_completeness
    type: test
    test_type: completeness
    source: v_doppler_shift_bronze
    required_columns: [doppler_shift_key]
    on_violation: warn
    test_id: "PERF-doppler_shift-S01"

  - name: tst_doppler_shift_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_doppler_shift_bronze
    columns: [doppler_shift_key]
    on_violation: warn
    test_id: "PERF-doppler_shift-S02"
