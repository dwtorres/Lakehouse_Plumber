pipeline: domain_r_silver
flowgroup: link_budget_silver_dim
presets:
  - default_delta_properties
actions:
  - name: link_budget_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: link_budget
    target: v_link_budget_bronze
    description: "Load link_budget from bronze for silver layer"

  - name: write_link_budget_silver
    type: write
    source: v_link_budget_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "link_budget_dim"
      mode: "cdc"
      cdc_config:
        keys: ["link_budget_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_link_budget_silver_completeness
    type: test
    test_type: completeness
    source: v_link_budget_bronze
    required_columns: [link_budget_key]
    on_violation: warn
    test_id: "PERF-link_budget-S01"

  - name: tst_link_budget_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_link_budget_bronze
    columns: [link_budget_key]
    on_violation: warn
    test_id: "PERF-link_budget-S02"
