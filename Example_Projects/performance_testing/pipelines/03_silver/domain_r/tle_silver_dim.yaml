pipeline: domain_r_silver
flowgroup: tle_silver_dim
presets:
  - default_delta_properties
actions:
  - name: tle_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: tle
    target: v_tle_bronze
    description: "Load tle from bronze for silver layer"

  - name: write_tle_silver
    type: write
    source: v_tle_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "tle_dim"
      mode: "cdc"
      cdc_config:
        keys: ["tle_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_tle_silver_completeness
    type: test
    test_type: completeness
    source: v_tle_bronze
    required_columns: [tle_key]
    on_violation: warn
    test_id: "PERF-tle-S01"

  - name: tst_tle_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_tle_bronze
    columns: [tle_key]
    on_violation: warn
    test_id: "PERF-tle-S02"
