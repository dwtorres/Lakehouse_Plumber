pipeline: domain_r_silver
flowgroup: bandwidth_alloc_silver_fct
presets:
  - default_delta_properties
actions:
  - name: bandwidth_alloc_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: bandwidth_alloc
    target: v_bandwidth_alloc_bronze
    description: "Load bandwidth_alloc from bronze for silver layer"

  - name: write_bandwidth_alloc_silver
    type: write
    source: v_bandwidth_alloc_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "bandwidth_alloc_fct"
      mode: "cdc"
      cdc_config:
        keys: ["bandwidth_alloc_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_bandwidth_alloc_silver_completeness
    type: test
    test_type: completeness
    source: v_bandwidth_alloc_bronze
    required_columns: [bandwidth_alloc_key]
    on_violation: warn
    test_id: "PERF-bandwidth_alloc-S01"

  - name: tst_bandwidth_alloc_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_bandwidth_alloc_bronze
    columns: [bandwidth_alloc_key]
    on_violation: warn
    test_id: "PERF-bandwidth_alloc-S02"
