pipeline: domain_r_silver
flowgroup: signal_strength_silver_dim
presets:
  - default_delta_properties
actions:
  - name: signal_strength_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: signal_strength
    target: v_signal_strength_bronze
    description: "Load signal_strength from bronze for silver layer"

  - name: write_signal_strength_silver
    type: write
    source: v_signal_strength_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "signal_strength_dim"
      mode: "cdc"
      cdc_config:
        keys: ["signal_strength_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_signal_strength_silver_completeness
    type: test
    test_type: completeness
    source: v_signal_strength_bronze
    required_columns: [signal_strength_key]
    on_violation: warn
    test_id: "PERF-signal_strength-S01"

  - name: tst_signal_strength_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_signal_strength_bronze
    columns: [signal_strength_key]
    on_violation: warn
    test_id: "PERF-signal_strength-S02"
