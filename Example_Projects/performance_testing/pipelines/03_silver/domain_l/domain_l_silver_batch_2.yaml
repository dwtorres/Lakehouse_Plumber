pipeline: domain_l_silver
flowgroup: prep_station_silver_dim
presets:
  - default_delta_properties
actions:
  - name: prep_station_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: prep_station
    target: v_prep_station_bronze
    description: "Load prep_station from bronze for silver layer"

  - name: write_prep_station_silver
    type: write
    source: v_prep_station_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "prep_station_dim"
      mode: "cdc"
      cdc_config:
        keys: ["prep_station_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_prep_station_silver_completeness
    type: test
    test_type: completeness
    source: v_prep_station_bronze
    required_columns: [prep_station_key]
    on_violation: warn
    test_id: "PERF-prep_station-S01"

  - name: tst_prep_station_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_prep_station_bronze
    columns: [prep_station_key]
    on_violation: warn
    test_id: "PERF-prep_station-S02"
