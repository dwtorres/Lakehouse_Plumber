pipeline: domain_l_silver
flowgroup: restaurant_silver_fct
presets:
  - default_delta_properties
actions:
  - name: restaurant_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: restaurant
    target: v_restaurant_bronze
    description: "Load restaurant from bronze for silver layer"

  - name: write_restaurant_silver
    type: write
    source: v_restaurant_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "restaurant_fct"
      mode: "cdc"
      cdc_config:
        keys: ["restaurant_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_restaurant_silver_completeness
    type: test
    test_type: completeness
    source: v_restaurant_bronze
    required_columns: [restaurant_key]
    on_violation: warn
    test_id: "PERF-restaurant-S01"

  - name: tst_restaurant_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_restaurant_bronze
    columns: [restaurant_key]
    on_violation: warn
    test_id: "PERF-restaurant-S02"
---
