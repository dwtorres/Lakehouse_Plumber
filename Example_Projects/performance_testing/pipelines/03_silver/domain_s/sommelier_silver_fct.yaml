pipeline: domain_s_silver
flowgroup: sommelier_silver_fct
presets:
  - default_delta_properties
actions:
  - name: sommelier_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: sommelier
    target: v_sommelier_bronze
    description: "Load sommelier from bronze for silver layer"

  - name: write_sommelier_silver
    type: write
    source: v_sommelier_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "sommelier_fct"
      mode: "cdc"
      cdc_config:
        keys: ["sommelier_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_sommelier_silver_completeness
    type: test
    test_type: completeness
    source: v_sommelier_bronze
    required_columns: [sommelier_key]
    on_violation: warn
    test_id: "PERF-sommelier-S01"

  - name: tst_sommelier_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_sommelier_bronze
    columns: [sommelier_key]
    on_violation: warn
    test_id: "PERF-sommelier-S02"
