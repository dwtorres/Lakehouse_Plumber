pipeline: domain_s_silver
flowgroup: stabilization_silver_dim
presets:
  - default_delta_properties
actions:
  - name: stabilization_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: stabilization
    target: v_stabilization_bronze
    description: "Load stabilization from bronze for silver layer"

  - name: write_stabilization_silver
    type: write
    source: v_stabilization_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "stabilization_dim"
      mode: "cdc"
      cdc_config:
        keys: ["stabilization_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_stabilization_silver_completeness
    type: test
    test_type: completeness
    source: v_stabilization_bronze
    required_columns: [stabilization_key]
    on_violation: warn
    test_id: "PERF-stabilization-S01"

  - name: tst_stabilization_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_stabilization_bronze
    columns: [stabilization_key]
    on_violation: warn
    test_id: "PERF-stabilization-S02"
