pipeline: domain_s_silver
flowgroup: critic_score_silver_dim
presets:
  - default_delta_properties
actions:
  - name: critic_score_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: critic_score
    target: v_critic_score_bronze
    description: "Load critic_score from bronze for silver layer"

  - name: write_critic_score_silver
    type: write
    source: v_critic_score_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "critic_score_dim"
      mode: "cdc"
      cdc_config:
        keys: ["critic_score_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_critic_score_silver_completeness
    type: test
    test_type: completeness
    source: v_critic_score_bronze
    required_columns: [critic_score_key]
    on_violation: warn
    test_id: "PERF-critic_score-S01"

  - name: tst_critic_score_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_critic_score_bronze
    columns: [critic_score_key]
    on_violation: warn
    test_id: "PERF-critic_score-S02"
