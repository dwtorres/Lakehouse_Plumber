pipeline: domain_s_silver
flowgroup: cuvee_silver_dim
presets:
  - default_delta_properties
actions:
  - name: cuvee_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: cuvee
    target: v_cuvee_bronze
    description: "Load cuvee from bronze for silver layer"

  - name: write_cuvee_silver
    type: write
    source: v_cuvee_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "cuvee_dim"
      mode: "cdc"
      cdc_config:
        keys: ["cuvee_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_cuvee_silver_completeness
    type: test
    test_type: completeness
    source: v_cuvee_bronze
    required_columns: [cuvee_key]
    on_violation: warn
    test_id: "PERF-cuvee-S01"

  - name: tst_cuvee_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_cuvee_bronze
    columns: [cuvee_key]
    on_violation: warn
    test_id: "PERF-cuvee-S02"
