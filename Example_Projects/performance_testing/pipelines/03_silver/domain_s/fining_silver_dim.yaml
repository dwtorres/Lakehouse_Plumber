pipeline: domain_s_silver
flowgroup: fining_silver_dim
presets:
  - default_delta_properties
actions:
  - name: fining_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: fining
    target: v_fining_bronze
    description: "Load fining from bronze for silver layer"

  - name: write_fining_silver
    type: write
    source: v_fining_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "fining_dim"
      mode: "cdc"
      cdc_config:
        keys: ["fining_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_fining_silver_completeness
    type: test
    test_type: completeness
    source: v_fining_bronze
    required_columns: [fining_key]
    on_violation: warn
    test_id: "PERF-fining-S01"

  - name: tst_fining_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_fining_bronze
    columns: [fining_key]
    on_violation: warn
    test_id: "PERF-fining-S02"
