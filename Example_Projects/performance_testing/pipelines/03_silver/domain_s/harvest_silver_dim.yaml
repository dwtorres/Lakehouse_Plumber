pipeline: domain_s_silver
flowgroup: harvest_silver_dim
presets:
  - default_delta_properties
actions:
  - name: harvest_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: harvest
    target: v_harvest_bronze
    description: "Load harvest from bronze for silver layer"

  - name: write_harvest_silver
    type: write
    source: v_harvest_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "harvest_dim"
      mode: "cdc"
      cdc_config:
        keys: ["harvest_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_harvest_silver_completeness
    type: test
    test_type: completeness
    source: v_harvest_bronze
    required_columns: [harvest_key]
    on_violation: warn
    test_id: "PERF-harvest-S01"

  - name: tst_harvest_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_harvest_bronze
    columns: [harvest_key]
    on_violation: warn
    test_id: "PERF-harvest-S02"
