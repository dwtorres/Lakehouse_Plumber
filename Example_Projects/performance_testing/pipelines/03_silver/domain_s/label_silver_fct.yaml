pipeline: domain_s_silver
flowgroup: label_silver_fct
presets:
  - default_delta_properties
actions:
  - name: label_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: label
    target: v_label_bronze
    description: "Load label from bronze for silver layer"

  - name: write_label_silver
    type: write
    source: v_label_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "label_fct"
      mode: "cdc"
      cdc_config:
        keys: ["label_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_label_silver_completeness
    type: test
    test_type: completeness
    source: v_label_bronze
    required_columns: [label_key]
    on_violation: warn
    test_id: "PERF-label-S01"

  - name: tst_label_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_label_bronze
    columns: [label_key]
    on_violation: warn
    test_id: "PERF-label-S02"
