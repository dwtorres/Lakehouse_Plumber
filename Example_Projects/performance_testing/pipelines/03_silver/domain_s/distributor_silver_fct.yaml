pipeline: domain_s_silver
flowgroup: distributor_silver_fct
presets:
  - default_delta_properties
actions:
  - name: distributor_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: distributor
    target: v_distributor_bronze
    description: "Load distributor from bronze for silver layer"

  - name: write_distributor_silver
    type: write
    source: v_distributor_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "distributor_fct"
      mode: "cdc"
      cdc_config:
        keys: ["distributor_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_distributor_silver_completeness
    type: test
    test_type: completeness
    source: v_distributor_bronze
    required_columns: [distributor_key]
    on_violation: warn
    test_id: "PERF-distributor-S01"

  - name: tst_distributor_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_distributor_bronze
    columns: [distributor_key]
    on_violation: warn
    test_id: "PERF-distributor-S02"
