pipeline: domain_s_silver
flowgroup: vintage_silver_dim
presets:
  - default_delta_properties
actions:
  - name: vintage_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: vintage
    target: v_vintage_bronze
    description: "Load vintage from bronze for silver layer"

  - name: write_vintage_silver
    type: write
    source: v_vintage_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "vintage_dim"
      mode: "cdc"
      cdc_config:
        keys: ["vintage_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_vintage_silver_completeness
    type: test
    test_type: completeness
    source: v_vintage_bronze
    required_columns: [vintage_key]
    on_violation: warn
    test_id: "PERF-vintage-S01"

  - name: tst_vintage_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_vintage_bronze
    columns: [vintage_key]
    on_violation: warn
    test_id: "PERF-vintage-S02"
