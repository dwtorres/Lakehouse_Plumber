pipeline: domain_s_silver
flowgroup: barrel_toast_silver_dim
presets:
  - default_delta_properties
actions:
  - name: barrel_toast_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: barrel_toast
    target: v_barrel_toast_bronze
    description: "Load barrel_toast from bronze for silver layer"

  - name: write_barrel_toast_silver
    type: write
    source: v_barrel_toast_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "barrel_toast_dim"
      mode: "cdc"
      cdc_config:
        keys: ["barrel_toast_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_barrel_toast_silver_completeness
    type: test
    test_type: completeness
    source: v_barrel_toast_bronze
    required_columns: [barrel_toast_key]
    on_violation: warn
    test_id: "PERF-barrel_toast-S01"

  - name: tst_barrel_toast_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_barrel_toast_bronze
    columns: [barrel_toast_key]
    on_violation: warn
    test_id: "PERF-barrel_toast-S02"
