pipeline: domain_s_silver
flowgroup: grape_variety_silver_dim
presets:
  - default_delta_properties
actions:
  - name: grape_variety_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: grape_variety
    target: v_grape_variety_bronze
    description: "Load grape_variety from bronze for silver layer"

  - name: write_grape_variety_silver
    type: write
    source: v_grape_variety_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "grape_variety_dim"
      mode: "cdc"
      cdc_config:
        keys: ["grape_variety_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_grape_variety_silver_completeness
    type: test
    test_type: completeness
    source: v_grape_variety_bronze
    required_columns: [grape_variety_key]
    on_violation: warn
    test_id: "PERF-grape_variety-S01"

  - name: tst_grape_variety_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_grape_variety_bronze
    columns: [grape_variety_key]
    on_violation: warn
    test_id: "PERF-grape_variety-S02"
