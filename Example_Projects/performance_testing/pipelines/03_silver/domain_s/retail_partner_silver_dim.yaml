pipeline: domain_s_silver
flowgroup: retail_partner_silver_dim
presets:
  - default_delta_properties
actions:
  - name: retail_partner_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: retail_partner
    target: v_retail_partner_bronze
    description: "Load retail_partner from bronze for silver layer"

  - name: write_retail_partner_silver
    type: write
    source: v_retail_partner_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "retail_partner_dim"
      mode: "cdc"
      cdc_config:
        keys: ["retail_partner_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_retail_partner_silver_completeness
    type: test
    test_type: completeness
    source: v_retail_partner_bronze
    required_columns: [retail_partner_key]
    on_violation: warn
    test_id: "PERF-retail_partner-S01"

  - name: tst_retail_partner_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_retail_partner_bronze
    columns: [retail_partner_key]
    on_violation: warn
    test_id: "PERF-retail_partner-S02"
