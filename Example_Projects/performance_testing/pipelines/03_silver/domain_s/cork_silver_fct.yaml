pipeline: domain_s_silver
flowgroup: cork_silver_fct
presets:
  - default_delta_properties
actions:
  - name: cork_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: cork
    target: v_cork_bronze
    description: "Load cork from bronze for silver layer"

  - name: write_cork_silver
    type: write
    source: v_cork_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "cork_fct"
      mode: "cdc"
      cdc_config:
        keys: ["cork_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_cork_silver_completeness
    type: test
    test_type: completeness
    source: v_cork_bronze
    required_columns: [cork_key]
    on_violation: warn
    test_id: "PERF-cork-S01"

  - name: tst_cork_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_cork_bronze
    columns: [cork_key]
    on_violation: warn
    test_id: "PERF-cork-S02"
