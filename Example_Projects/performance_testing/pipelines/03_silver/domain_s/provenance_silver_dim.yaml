pipeline: domain_s_silver
flowgroup: provenance_silver_dim
presets:
  - default_delta_properties
actions:
  - name: provenance_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: provenance
    target: v_provenance_bronze
    description: "Load provenance from bronze for silver layer"

  - name: write_provenance_silver
    type: write
    source: v_provenance_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "provenance_dim"
      mode: "cdc"
      cdc_config:
        keys: ["provenance_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_provenance_silver_completeness
    type: test
    test_type: completeness
    source: v_provenance_bronze
    required_columns: [provenance_key]
    on_violation: warn
    test_id: "PERF-provenance-S01"

  - name: tst_provenance_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_provenance_bronze
    columns: [provenance_key]
    on_violation: warn
    test_id: "PERF-provenance-S02"
