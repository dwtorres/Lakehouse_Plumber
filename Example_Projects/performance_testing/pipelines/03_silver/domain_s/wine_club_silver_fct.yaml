pipeline: domain_s_silver
flowgroup: wine_club_silver_fct
presets:
  - default_delta_properties
actions:
  - name: wine_club_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: wine_club
    target: v_wine_club_bronze
    description: "Load wine_club from bronze for silver layer"

  - name: write_wine_club_silver
    type: write
    source: v_wine_club_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "wine_club_fct"
      mode: "cdc"
      cdc_config:
        keys: ["wine_club_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_wine_club_silver_completeness
    type: test
    test_type: completeness
    source: v_wine_club_bronze
    required_columns: [wine_club_key]
    on_violation: warn
    test_id: "PERF-wine_club-S01"

  - name: tst_wine_club_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_wine_club_bronze
    columns: [wine_club_key]
    on_violation: warn
    test_id: "PERF-wine_club-S02"
