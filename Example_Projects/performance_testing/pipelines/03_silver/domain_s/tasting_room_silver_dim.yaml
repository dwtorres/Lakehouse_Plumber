pipeline: domain_s_silver
flowgroup: tasting_room_silver_dim
presets:
  - default_delta_properties
actions:
  - name: tasting_room_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: tasting_room
    target: v_tasting_room_bronze
    description: "Load tasting_room from bronze for silver layer"

  - name: write_tasting_room_silver
    type: write
    source: v_tasting_room_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "tasting_room_dim"
      mode: "cdc"
      cdc_config:
        keys: ["tasting_room_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_tasting_room_silver_completeness
    type: test
    test_type: completeness
    source: v_tasting_room_bronze
    required_columns: [tasting_room_key]
    on_violation: warn
    test_id: "PERF-tasting_room-S01"

  - name: tst_tasting_room_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_tasting_room_bronze
    columns: [tasting_room_key]
    on_violation: warn
    test_id: "PERF-tasting_room-S02"
