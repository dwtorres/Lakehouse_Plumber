pipeline: domain_s_silver
flowgroup: allocation_silver_dim
presets:
  - default_delta_properties
actions:
  - name: allocation_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: allocation
    target: v_allocation_bronze
    description: "Load allocation from bronze for silver layer"

  - name: write_allocation_silver
    type: write
    source: v_allocation_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "allocation_dim"
      mode: "cdc"
      cdc_config:
        keys: ["allocation_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_allocation_silver_completeness
    type: test
    test_type: completeness
    source: v_allocation_bronze
    required_columns: [allocation_key]
    on_violation: warn
    test_id: "PERF-allocation-S01"

  - name: tst_allocation_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_allocation_bronze
    columns: [allocation_key]
    on_violation: warn
    test_id: "PERF-allocation-S02"
