pipeline: domain_s_silver
flowgroup: blend_silver_dim
presets:
  - default_delta_properties
actions:
  - name: blend_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: blend
    target: v_blend_bronze
    description: "Load blend from bronze for silver layer"

  - name: write_blend_silver
    type: write
    source: v_blend_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "blend_dim"
      mode: "cdc"
      cdc_config:
        keys: ["blend_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_blend_silver_completeness
    type: test
    test_type: completeness
    source: v_blend_bronze
    required_columns: [blend_key]
    on_violation: warn
    test_id: "PERF-blend-S01"

  - name: tst_blend_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_blend_bronze
    columns: [blend_key]
    on_violation: warn
    test_id: "PERF-blend-S02"
