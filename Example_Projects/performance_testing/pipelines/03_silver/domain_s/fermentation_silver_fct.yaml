pipeline: domain_s_silver
flowgroup: fermentation_silver_fct
presets:
  - default_delta_properties
actions:
  - name: fermentation_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: fermentation
    target: v_fermentation_bronze
    description: "Load fermentation from bronze for silver layer"

  - name: write_fermentation_silver
    type: write
    source: v_fermentation_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "fermentation_fct"
      mode: "cdc"
      cdc_config:
        keys: ["fermentation_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_fermentation_silver_completeness
    type: test
    test_type: completeness
    source: v_fermentation_bronze
    required_columns: [fermentation_key]
    on_violation: warn
    test_id: "PERF-fermentation-S01"

  - name: tst_fermentation_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_fermentation_bronze
    columns: [fermentation_key]
    on_violation: warn
    test_id: "PERF-fermentation-S02"
