pipeline: domain_s_silver
flowgroup: vineyard_silver_fct
presets:
  - default_delta_properties
actions:
  - name: vineyard_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: vineyard
    target: v_vineyard_bronze
    description: "Load vineyard from bronze for silver layer"

  - name: write_vineyard_silver
    type: write
    source: v_vineyard_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "vineyard_fct"
      mode: "cdc"
      cdc_config:
        keys: ["vineyard_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_vineyard_silver_completeness
    type: test
    test_type: completeness
    source: v_vineyard_bronze
    required_columns: [vineyard_key]
    on_violation: warn
    test_id: "PERF-vineyard-S01"

  - name: tst_vineyard_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_vineyard_bronze
    columns: [vineyard_key]
    on_violation: warn
    test_id: "PERF-vineyard-S02"
