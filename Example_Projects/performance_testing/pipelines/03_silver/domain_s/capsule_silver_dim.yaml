pipeline: domain_s_silver
flowgroup: capsule_silver_dim
presets:
  - default_delta_properties
actions:
  - name: capsule_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: capsule
    target: v_capsule_bronze
    description: "Load capsule from bronze for silver layer"

  - name: write_capsule_silver
    type: write
    source: v_capsule_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "capsule_dim"
      mode: "cdc"
      cdc_config:
        keys: ["capsule_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_capsule_silver_completeness
    type: test
    test_type: completeness
    source: v_capsule_bronze
    required_columns: [capsule_key]
    on_violation: warn
    test_id: "PERF-capsule-S01"

  - name: tst_capsule_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_capsule_bronze
    columns: [capsule_key]
    on_violation: warn
    test_id: "PERF-capsule-S02"
