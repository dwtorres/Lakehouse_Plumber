pipeline: domain_s_silver
flowgroup: bottle_silver_dim
presets:
  - default_delta_properties
actions:
  - name: bottle_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: bottle
    target: v_bottle_bronze
    description: "Load bottle from bronze for silver layer"

  - name: write_bottle_silver
    type: write
    source: v_bottle_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "bottle_dim"
      mode: "cdc"
      cdc_config:
        keys: ["bottle_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_bottle_silver_completeness
    type: test
    test_type: completeness
    source: v_bottle_bronze
    required_columns: [bottle_key]
    on_violation: warn
    test_id: "PERF-bottle-S01"

  - name: tst_bottle_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_bottle_bronze
    columns: [bottle_key]
    on_violation: warn
    test_id: "PERF-bottle-S02"
