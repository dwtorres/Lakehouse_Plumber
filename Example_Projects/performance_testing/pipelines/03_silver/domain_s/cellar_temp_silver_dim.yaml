pipeline: domain_s_silver
flowgroup: cellar_temp_silver_dim
presets:
  - default_delta_properties
actions:
  - name: cellar_temp_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: cellar_temp
    target: v_cellar_temp_bronze
    description: "Load cellar_temp from bronze for silver layer"

  - name: write_cellar_temp_silver
    type: write
    source: v_cellar_temp_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "cellar_temp_dim"
      mode: "cdc"
      cdc_config:
        keys: ["cellar_temp_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_cellar_temp_silver_completeness
    type: test
    test_type: completeness
    source: v_cellar_temp_bronze
    required_columns: [cellar_temp_key]
    on_violation: warn
    test_id: "PERF-cellar_temp-S01"

  - name: tst_cellar_temp_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_cellar_temp_bronze
    columns: [cellar_temp_key]
    on_violation: warn
    test_id: "PERF-cellar_temp-S02"
