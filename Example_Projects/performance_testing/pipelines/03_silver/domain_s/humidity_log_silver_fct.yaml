pipeline: domain_s_silver
flowgroup: humidity_log_silver_fct
presets:
  - default_delta_properties
actions:
  - name: humidity_log_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: humidity_log
    target: v_humidity_log_bronze
    description: "Load humidity_log from bronze for silver layer"

  - name: write_humidity_log_silver
    type: write
    source: v_humidity_log_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "humidity_log_fct"
      mode: "cdc"
      cdc_config:
        keys: ["humidity_log_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_humidity_log_silver_completeness
    type: test
    test_type: completeness
    source: v_humidity_log_bronze
    required_columns: [humidity_log_key]
    on_violation: warn
    test_id: "PERF-humidity_log-S01"

  - name: tst_humidity_log_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_humidity_log_bronze
    columns: [humidity_log_key]
    on_violation: warn
    test_id: "PERF-humidity_log-S02"
