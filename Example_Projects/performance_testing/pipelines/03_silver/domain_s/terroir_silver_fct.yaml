pipeline: domain_s_silver
flowgroup: terroir_silver_fct
presets:
  - default_delta_properties
actions:
  - name: terroir_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: terroir
    target: v_terroir_bronze
    description: "Load terroir from bronze for silver layer"

  - name: write_terroir_silver
    type: write
    source: v_terroir_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "terroir_fct"
      mode: "cdc"
      cdc_config:
        keys: ["terroir_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_terroir_silver_completeness
    type: test
    test_type: completeness
    source: v_terroir_bronze
    required_columns: [terroir_key]
    on_violation: warn
    test_id: "PERF-terroir-S01"

  - name: tst_terroir_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_terroir_bronze
    columns: [terroir_key]
    on_violation: warn
    test_id: "PERF-terroir-S02"
