pipeline: domain_s_silver
flowgroup: case_production_silver_dim
presets:
  - default_delta_properties
actions:
  - name: case_production_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: case_production
    target: v_case_production_bronze
    description: "Load case_production from bronze for silver layer"

  - name: write_case_production_silver
    type: write
    source: v_case_production_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "case_production_dim"
      mode: "cdc"
      cdc_config:
        keys: ["case_production_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_case_production_silver_completeness
    type: test
    test_type: completeness
    source: v_case_production_bronze
    required_columns: [case_production_key]
    on_violation: warn
    test_id: "PERF-case_production-S01"

  - name: tst_case_production_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_case_production_bronze
    columns: [case_production_key]
    on_violation: warn
    test_id: "PERF-case_production-S02"
