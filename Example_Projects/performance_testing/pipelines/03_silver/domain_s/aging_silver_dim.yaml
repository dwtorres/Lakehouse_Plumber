pipeline: domain_s_silver
flowgroup: aging_silver_dim
presets:
  - default_delta_properties
actions:
  - name: aging_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: aging
    target: v_aging_bronze
    description: "Load aging from bronze for silver layer"

  - name: write_aging_silver
    type: write
    source: v_aging_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "aging_dim"
      mode: "cdc"
      cdc_config:
        keys: ["aging_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_aging_silver_completeness
    type: test
    test_type: completeness
    source: v_aging_bronze
    required_columns: [aging_key]
    on_violation: warn
    test_id: "PERF-aging-S01"

  - name: tst_aging_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_aging_bronze
    columns: [aging_key]
    on_violation: warn
    test_id: "PERF-aging-S02"
