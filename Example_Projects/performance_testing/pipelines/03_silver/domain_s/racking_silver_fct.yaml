pipeline: domain_s_silver
flowgroup: racking_silver_fct
presets:
  - default_delta_properties
actions:
  - name: racking_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: racking
    target: v_racking_bronze
    description: "Load racking from bronze for silver layer"

  - name: write_racking_silver
    type: write
    source: v_racking_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "racking_fct"
      mode: "cdc"
      cdc_config:
        keys: ["racking_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_racking_silver_completeness
    type: test
    test_type: completeness
    source: v_racking_bronze
    required_columns: [racking_key]
    on_violation: warn
    test_id: "PERF-racking-S01"

  - name: tst_racking_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_racking_bronze
    columns: [racking_key]
    on_violation: warn
    test_id: "PERF-racking-S02"
