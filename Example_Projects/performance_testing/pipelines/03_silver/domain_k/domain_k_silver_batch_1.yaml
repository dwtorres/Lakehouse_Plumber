pipeline: domain_k_silver
flowgroup: flight_silver_fct
presets:
  - default_delta_properties
actions:
  - name: flight_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: flight
    target: v_flight_bronze
    description: "Load flight from bronze for silver layer"

  - name: write_flight_silver
    type: write
    source: v_flight_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "flight_fct"
      mode: "cdc"
      cdc_config:
        keys: ["flight_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_flight_silver_completeness
    type: test
    test_type: completeness
    source: v_flight_bronze
    required_columns: [flight_key]
    on_violation: warn
    test_id: "PERF-flight-S01"

  - name: tst_flight_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_flight_bronze
    columns: [flight_key]
    on_violation: warn
    test_id: "PERF-flight-S02"
---
