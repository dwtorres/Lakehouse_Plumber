pipeline: domain_k_silver
flowgroup: taxiway_silver_dim
presets:
  - default_delta_properties
actions:
  - name: taxiway_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: taxiway
    target: v_taxiway_bronze
    description: "Load taxiway from bronze for silver layer"

  - name: write_taxiway_silver
    type: write
    source: v_taxiway_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "taxiway_dim"
      mode: "cdc"
      cdc_config:
        keys: ["taxiway_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_taxiway_silver_completeness
    type: test
    test_type: completeness
    source: v_taxiway_bronze
    required_columns: [taxiway_key]
    on_violation: warn
    test_id: "PERF-taxiway-S01"

  - name: tst_taxiway_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_taxiway_bronze
    columns: [taxiway_key]
    on_violation: warn
    test_id: "PERF-taxiway-S02"
