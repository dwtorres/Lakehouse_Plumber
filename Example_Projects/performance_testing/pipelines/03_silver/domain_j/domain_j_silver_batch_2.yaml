pipeline: domain_j_silver
flowgroup: frequency_silver_dim
presets:
  - default_delta_properties
actions:
  - name: frequency_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: frequency
    target: v_frequency_bronze
    description: "Load frequency from bronze for silver layer"

  - name: write_frequency_silver
    type: write
    source: v_frequency_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "frequency_dim"
      mode: "cdc"
      cdc_config:
        keys: ["frequency_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_frequency_silver_completeness
    type: test
    test_type: completeness
    source: v_frequency_bronze
    required_columns: [frequency_key]
    on_violation: warn
    test_id: "PERF-frequency-S01"

  - name: tst_frequency_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_frequency_bronze
    columns: [frequency_key]
    on_violation: warn
    test_id: "PERF-frequency-S02"
---
