pipeline: domain_j_silver
flowgroup: meter_silver_fct
presets:
  - default_delta_properties
actions:
  - name: meter_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: meter
    target: v_meter_bronze
    description: "Load meter from bronze for silver layer"

  - name: write_meter_silver
    type: write
    source: v_meter_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "meter_fct"
      mode: "cdc"
      cdc_config:
        keys: ["meter_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_meter_silver_completeness
    type: test
    test_type: completeness
    source: v_meter_bronze
    required_columns: [meter_key]
    on_violation: warn
    test_id: "PERF-meter-S01"

  - name: tst_meter_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_meter_bronze
    columns: [meter_key]
    on_violation: warn
    test_id: "PERF-meter-S02"
---
