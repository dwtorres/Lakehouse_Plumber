pipeline: domain_g_silver
flowgroup: property_silver_fct
presets:
  - default_delta_properties
actions:
  - name: property_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: property
    target: v_property_bronze
    description: "Load property from bronze for silver layer"

  - name: write_property_silver
    type: write
    source: v_property_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "property_fct"
      mode: "cdc"
      cdc_config:
        keys: ["property_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]

  - name: tst_property_silver_completeness
    type: test
    test_type: completeness
    source: v_property_bronze
    required_columns: [property_key]
    on_violation: warn
    test_id: "PERF-property-S01"

  - name: tst_property_silver_uniqueness
    type: test
    test_type: uniqueness
    source: v_property_bronze
    columns: [property_key]
    on_violation: warn
    test_id: "PERF-property-S02"
---
