pipeline: domain_j_bronze
flowgroup: relay_bronze
presets:
  - default_delta_properties
actions:
  - name: relay_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: relay_raw
    target: v_relay_raw
    description: "Load relay from raw schema"

  - name: relay_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_relay_raw
    target: v_relay_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as relay_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_relay_raw
      WHERE 1=1

  - name: relay_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_relay_bronze_cleaned
    target: v_relay_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to relay"

  - name: write_relay_bronze
    type: write
    source: v_relay_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "relay"

  - name: tst_relay_bronze_completeness
    type: test
    test_type: completeness
    source: v_relay_bronze_cleaned
    required_columns: [relay_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-relay-B01"

  - name: tst_relay_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_relay_bronze_cleaned
    columns: [relay_key]
    on_violation: warn
    test_id: "PERF-relay-B02"
