pipeline: domain_j_bronze
flowgroup: power_factor_bronze
presets:
  - default_delta_properties
actions:
  - name: power_factor_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: power_factor_raw
    target: v_power_factor_raw
    description: "Load power_factor from raw schema"

  - name: power_factor_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_power_factor_raw
    target: v_power_factor_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as power_factor_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_power_factor_raw
      WHERE 1=1

  - name: power_factor_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_power_factor_bronze_cleaned
    target: v_power_factor_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to power_factor"

  - name: write_power_factor_bronze
    type: write
    source: v_power_factor_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "power_factor"

  - name: tst_power_factor_bronze_completeness
    type: test
    test_type: completeness
    source: v_power_factor_bronze_cleaned
    required_columns: [power_factor_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-power_factor-B01"

  - name: tst_power_factor_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_power_factor_bronze_cleaned
    columns: [power_factor_key]
    on_violation: warn
    test_id: "PERF-power_factor-B02"
