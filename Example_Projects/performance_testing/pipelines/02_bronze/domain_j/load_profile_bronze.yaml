pipeline: domain_j_bronze
flowgroup: load_profile_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: load_profile
  source_table: load_profile_raw
actions:
  - name: tst_load_profile_bronze_completeness
    type: test
    test_type: completeness
    source: v_load_profile_cleansed
    required_columns: [load_profile_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-load_profile-B01"

  - name: tst_load_profile_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_load_profile_cleansed
    columns: [load_profile_key]
    on_violation: warn
    test_id: "PERF-load_profile-B02"
