pipeline: domain_j_bronze
flowgroup: net_metering_bronze
presets:
  - default_delta_properties
actions:
  - name: net_metering_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: net_metering_raw
    target: v_net_metering_raw
    description: "Load net_metering from raw schema"

  - name: net_metering_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_net_metering_raw
    target: v_net_metering_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as net_metering_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_net_metering_raw
      WHERE 1=1

  - name: net_metering_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_net_metering_bronze_cleaned
    target: v_net_metering_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to net_metering"

  - name: write_net_metering_bronze
    type: write
    source: v_net_metering_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "net_metering"

  - name: tst_net_metering_bronze_completeness
    type: test
    test_type: completeness
    source: v_net_metering_bronze_cleaned
    required_columns: [net_metering_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-net_metering-B01"

  - name: tst_net_metering_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_net_metering_bronze_cleaned
    columns: [net_metering_key]
    on_violation: warn
    test_id: "PERF-net_metering-B02"
