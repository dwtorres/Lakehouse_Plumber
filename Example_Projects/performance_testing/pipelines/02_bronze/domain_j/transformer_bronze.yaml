pipeline: domain_j_bronze
flowgroup: transformer_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: transformer
  source_table: transformer_raw
actions:
  - name: tst_transformer_bronze_completeness
    type: test
    test_type: completeness
    source: v_transformer_cleansed
    required_columns: [transformer_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-transformer-B01"

  - name: tst_transformer_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_transformer_cleansed
    columns: [transformer_key]
    on_violation: warn
    test_id: "PERF-transformer-B02"
