pipeline: domain_j_bronze
flowgroup: peak_usage_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: peak_usage
  source_table: peak_usage_raw
actions:
  - name: tst_peak_usage_bronze_completeness
    type: test
    test_type: completeness
    source: v_peak_usage_cleansed
    required_columns: [peak_usage_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-peak_usage-B01"

  - name: tst_peak_usage_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_peak_usage_cleansed
    columns: [peak_usage_key]
    on_violation: warn
    test_id: "PERF-peak_usage-B02"
