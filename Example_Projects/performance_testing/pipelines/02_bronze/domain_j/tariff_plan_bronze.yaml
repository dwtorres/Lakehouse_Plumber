pipeline: domain_j_bronze
flowgroup: tariff_plan_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: tariff_plan
  source_table: tariff_plan_raw
actions:
  - name: tst_tariff_plan_bronze_completeness
    type: test
    test_type: completeness
    source: v_tariff_plan_cleansed
    required_columns: [tariff_plan_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-tariff_plan-B01"

  - name: tst_tariff_plan_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_tariff_plan_cleansed
    columns: [tariff_plan_key]
    on_violation: warn
    test_id: "PERF-tariff_plan-B02"
