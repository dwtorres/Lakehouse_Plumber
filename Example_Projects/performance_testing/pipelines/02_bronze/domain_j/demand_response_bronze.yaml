pipeline: domain_j_bronze
flowgroup: demand_response_bronze
presets:
  - default_delta_properties
actions:
  - name: demand_response_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: demand_response_raw
    target: v_demand_response_raw
    description: "Load demand_response from raw schema"

  - name: demand_response_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_demand_response_raw
    target: v_demand_response_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as demand_response_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_demand_response_raw
      WHERE 1=1

  - name: demand_response_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_demand_response_bronze_cleaned
    target: v_demand_response_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to demand_response"

  - name: write_demand_response_bronze
    type: write
    source: v_demand_response_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "demand_response"

  - name: tst_demand_response_bronze_completeness
    type: test
    test_type: completeness
    source: v_demand_response_bronze_cleaned
    required_columns: [demand_response_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-demand_response-B01"

  - name: tst_demand_response_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_demand_response_bronze_cleaned
    columns: [demand_response_key]
    on_violation: warn
    test_id: "PERF-demand_response-B02"
