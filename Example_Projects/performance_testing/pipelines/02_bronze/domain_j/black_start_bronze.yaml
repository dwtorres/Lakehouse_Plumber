pipeline: domain_j_bronze
flowgroup: black_start_bronze
presets:
  - default_delta_properties
actions:
  - name: black_start_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: black_start_raw
    target: v_black_start_raw
    description: "Load black_start from raw schema"

  - name: black_start_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_black_start_raw
    target: v_black_start_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as black_start_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_black_start_raw
      WHERE 1=1

  - name: black_start_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_black_start_bronze_cleaned
    target: v_black_start_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to black_start"

  - name: write_black_start_bronze
    type: write
    source: v_black_start_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "black_start"

  - name: tst_black_start_bronze_completeness
    type: test
    test_type: completeness
    source: v_black_start_bronze_cleaned
    required_columns: [black_start_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-black_start-B01"

  - name: tst_black_start_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_black_start_bronze_cleaned
    columns: [black_start_key]
    on_violation: warn
    test_id: "PERF-black_start-B02"
