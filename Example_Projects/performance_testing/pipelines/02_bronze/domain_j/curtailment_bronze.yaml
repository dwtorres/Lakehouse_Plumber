pipeline: domain_j_bronze
flowgroup: curtailment_bronze
presets:
  - default_delta_properties
actions:
  - name: curtailment_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: curtailment_raw
    target: v_curtailment_raw
    description: "Load curtailment from raw schema"

  - name: curtailment_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_curtailment_raw
    target: v_curtailment_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as curtailment_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_curtailment_raw
      WHERE 1=1

  - name: curtailment_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_curtailment_bronze_cleaned
    target: v_curtailment_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to curtailment"

  - name: write_curtailment_bronze
    type: write
    source: v_curtailment_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "curtailment"

  - name: tst_curtailment_bronze_completeness
    type: test
    test_type: completeness
    source: v_curtailment_bronze_cleaned
    required_columns: [curtailment_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-curtailment-B01"

  - name: tst_curtailment_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_curtailment_bronze_cleaned
    columns: [curtailment_key]
    on_violation: warn
    test_id: "PERF-curtailment-B02"
