pipeline: domain_j_bronze
flowgroup: grid_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: grid
  source_table: grid_raw
actions:
  - name: tst_grid_bronze_completeness
    type: test
    test_type: completeness
    source: v_grid_cleansed
    required_columns: [grid_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-grid-B01"

  - name: tst_grid_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_grid_cleansed
    columns: [grid_key]
    on_violation: warn
    test_id: "PERF-grid-B02"
