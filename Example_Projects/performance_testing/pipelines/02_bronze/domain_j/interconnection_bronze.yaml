pipeline: domain_j_bronze
flowgroup: interconnection_bronze
presets:
  - default_delta_properties
actions:
  - name: interconnection_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: interconnection_raw
    target: v_interconnection_raw
    description: "Load interconnection from raw schema"

  - name: interconnection_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_interconnection_raw
    target: v_interconnection_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as interconnection_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_interconnection_raw
      WHERE 1=1

  - name: interconnection_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_interconnection_bronze_cleaned
    target: v_interconnection_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to interconnection"

  - name: write_interconnection_bronze
    type: write
    source: v_interconnection_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "interconnection"

  - name: tst_interconnection_bronze_completeness
    type: test
    test_type: completeness
    source: v_interconnection_bronze_cleaned
    required_columns: [interconnection_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-interconnection-B01"

  - name: tst_interconnection_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_interconnection_bronze_cleaned
    columns: [interconnection_key]
    on_violation: warn
    test_id: "PERF-interconnection-B02"
