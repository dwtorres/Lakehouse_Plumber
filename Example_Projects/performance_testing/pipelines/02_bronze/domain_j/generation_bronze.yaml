pipeline: domain_j_bronze
flowgroup: generation_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: generation
  source_table: generation_raw
actions:
  - name: tst_generation_bronze_completeness
    type: test
    test_type: completeness
    source: v_generation_cleansed
    required_columns: [generation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-generation-B01"

  - name: tst_generation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_generation_cleansed
    columns: [generation_key]
    on_violation: warn
    test_id: "PERF-generation-B02"
