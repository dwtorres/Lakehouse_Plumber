pipeline: domain_j_bronze
flowgroup: inverter_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: inverter
  source_table: inverter_raw
actions:
  - name: tst_inverter_bronze_completeness
    type: test
    test_type: completeness
    source: v_inverter_cleansed
    required_columns: [inverter_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-inverter-B01"

  - name: tst_inverter_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_inverter_cleansed
    columns: [inverter_key]
    on_violation: warn
    test_id: "PERF-inverter-B02"
