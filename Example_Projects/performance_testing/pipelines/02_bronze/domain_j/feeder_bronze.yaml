pipeline: domain_j_bronze
flowgroup: feeder_bronze
presets:
  - default_delta_properties
actions:
  - name: feeder_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: feeder_raw
    target: v_feeder_raw
    description: "Load feeder from raw schema"

  - name: feeder_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_feeder_raw
    target: v_feeder_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as feeder_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_feeder_raw
      WHERE 1=1

  - name: feeder_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_feeder_bronze_cleaned
    target: v_feeder_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to feeder"

  - name: write_feeder_bronze
    type: write
    source: v_feeder_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "feeder"

  - name: tst_feeder_bronze_completeness
    type: test
    test_type: completeness
    source: v_feeder_bronze_cleaned
    required_columns: [feeder_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-feeder-B01"

  - name: tst_feeder_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_feeder_bronze_cleaned
    columns: [feeder_key]
    on_violation: warn
    test_id: "PERF-feeder-B02"
