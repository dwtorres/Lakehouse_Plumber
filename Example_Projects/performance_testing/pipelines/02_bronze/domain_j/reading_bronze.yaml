pipeline: domain_j_bronze
flowgroup: reading_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: reading
  source_table: reading_raw
actions:
  - name: tst_reading_bronze_completeness
    type: test
    test_type: completeness
    source: v_reading_cleansed
    required_columns: [reading_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-reading-B01"

  - name: tst_reading_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_reading_cleansed
    columns: [reading_key]
    on_violation: warn
    test_id: "PERF-reading-B02"
