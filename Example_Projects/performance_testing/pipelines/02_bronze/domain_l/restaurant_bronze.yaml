pipeline: domain_l_bronze
flowgroup: restaurant_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: restaurant
  source_table: restaurant_raw
actions:
  - name: tst_restaurant_bronze_completeness
    type: test
    test_type: completeness
    source: v_restaurant_cleansed
    required_columns: [restaurant_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-restaurant-B01"

  - name: tst_restaurant_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_restaurant_cleansed
    columns: [restaurant_key]
    on_violation: warn
    test_id: "PERF-restaurant-B02"
