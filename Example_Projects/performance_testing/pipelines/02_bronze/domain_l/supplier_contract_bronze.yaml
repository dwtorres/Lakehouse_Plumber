pipeline: domain_l_bronze
flowgroup: supplier_contract_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: supplier_contract
  source_table: supplier_contract_raw
actions:
  - name: tst_supplier_contract_bronze_completeness
    type: test
    test_type: completeness
    source: v_supplier_contract_cleansed
    required_columns: [supplier_contract_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-supplier_contract-B01"

  - name: tst_supplier_contract_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_supplier_contract_cleansed
    columns: [supplier_contract_key]
    on_violation: warn
    test_id: "PERF-supplier_contract-B02"
