pipeline: domain_l_bronze
flowgroup: host_stand_bronze
presets:
  - default_delta_properties
actions:
  - name: host_stand_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: host_stand_raw
    target: v_host_stand_raw
    description: "Load host_stand from raw schema"

  - name: host_stand_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_host_stand_raw
    target: v_host_stand_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as host_stand_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_host_stand_raw
      WHERE 1=1

  - name: host_stand_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_host_stand_bronze_cleaned
    target: v_host_stand_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to host_stand"

  - name: write_host_stand_bronze
    type: write
    source: v_host_stand_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "host_stand"

  - name: tst_host_stand_bronze_completeness
    type: test
    test_type: completeness
    source: v_host_stand_bronze_cleaned
    required_columns: [host_stand_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-host_stand-B01"

  - name: tst_host_stand_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_host_stand_bronze_cleaned
    columns: [host_stand_key]
    on_violation: warn
    test_id: "PERF-host_stand-B02"
