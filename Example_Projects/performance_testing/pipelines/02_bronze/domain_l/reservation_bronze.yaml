pipeline: domain_l_bronze
flowgroup: reservation_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: reservation
  source_table: reservation_raw
actions:
  - name: tst_reservation_bronze_completeness
    type: test
    test_type: completeness
    source: v_reservation_cleansed
    required_columns: [reservation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-reservation-B01"

  - name: tst_reservation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_reservation_cleansed
    columns: [reservation_key]
    on_violation: warn
    test_id: "PERF-reservation-B02"
