pipeline: domain_l_bronze
flowgroup: special_menu_bronze
presets:
  - default_delta_properties
actions:
  - name: special_menu_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: special_menu_raw
    target: v_special_menu_raw
    description: "Load special_menu from raw schema"

  - name: special_menu_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_special_menu_raw
    target: v_special_menu_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as special_menu_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_special_menu_raw

  - name: special_menu_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_special_menu_bronze_cleaned
    target: v_special_menu_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for special_menu bronze"

  - name: write_special_menu_bronze
    type: write
    source: v_special_menu_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "special_menu"

  - name: special_menu_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: special_menu_migration
    target: v_special_menu_migration
    description: "Load special_menu migration data"

  - name: special_menu_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_special_menu_migration
    target: v_special_menu_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as special_menu_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_special_menu_migration

  - name: write_special_menu_migration
    type: write
    source: v_special_menu_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "special_menu"

  - name: tst_special_menu_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_special_menu_bronze_cleaned
    required_columns: [special_menu_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-special_menu-B01"

  - name: tst_special_menu_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_special_menu_bronze_cleaned
    columns: [special_menu_key]
    on_violation: warn
    test_id: "PERF-special_menu-B02"
