pipeline: domain_l_bronze
flowgroup: beverage_bronze
presets:
  - default_delta_properties
actions:
  - name: beverage_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: beverage_raw
    target: v_beverage_raw
    description: "Load beverage from raw schema"

  - name: beverage_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_beverage_raw
    target: v_beverage_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as beverage_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_beverage_raw
      WHERE 1=1

  - name: beverage_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_beverage_bronze_cleaned
    target: v_beverage_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to beverage"

  - name: write_beverage_bronze
    type: write
    source: v_beverage_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "beverage"

  - name: tst_beverage_bronze_completeness
    type: test
    test_type: completeness
    source: v_beverage_bronze_cleaned
    required_columns: [beverage_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-beverage-B01"

  - name: tst_beverage_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_beverage_bronze_cleaned
    columns: [beverage_key]
    on_violation: warn
    test_id: "PERF-beverage-B02"
