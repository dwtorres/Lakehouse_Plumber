pipeline: domain_l_bronze
flowgroup: table_turn_bronze
presets:
  - default_delta_properties
actions:
  - name: table_turn_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: table_turn_raw
    target: v_table_turn_raw
    description: "Load table_turn from raw schema"

  - name: table_turn_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_table_turn_raw
    target: v_table_turn_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as table_turn_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_table_turn_raw
      WHERE 1=1

  - name: table_turn_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_table_turn_bronze_cleaned
    target: v_table_turn_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to table_turn"

  - name: write_table_turn_bronze
    type: write
    source: v_table_turn_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "table_turn"

  - name: tst_table_turn_bronze_completeness
    type: test
    test_type: completeness
    source: v_table_turn_bronze_cleaned
    required_columns: [table_turn_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-table_turn-B01"

  - name: tst_table_turn_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_table_turn_bronze_cleaned
    columns: [table_turn_key]
    on_violation: warn
    test_id: "PERF-table_turn-B02"
