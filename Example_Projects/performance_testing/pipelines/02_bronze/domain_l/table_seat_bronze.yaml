pipeline: domain_l_bronze
flowgroup: table_seat_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: table_seat
  source_table: table_seat_raw
actions:
  - name: tst_table_seat_bronze_completeness
    type: test
    test_type: completeness
    source: v_table_seat_cleansed
    required_columns: [table_seat_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-table_seat-B01"

  - name: tst_table_seat_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_table_seat_cleansed
    columns: [table_seat_key]
    on_violation: warn
    test_id: "PERF-table_seat-B02"
