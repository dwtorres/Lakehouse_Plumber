pipeline: domain_l_bronze
flowgroup: allergen_bronze
presets:
  - default_delta_properties
actions:
  - name: allergen_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: allergen_raw
    target: v_allergen_raw
    description: "Load allergen from raw schema"

  - name: allergen_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_allergen_raw
    target: v_allergen_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as allergen_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_allergen_raw
      WHERE 1=1

  - name: allergen_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_allergen_bronze_cleaned
    target: v_allergen_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to allergen"

  - name: write_allergen_bronze
    type: write
    source: v_allergen_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "allergen"

  - name: tst_allergen_bronze_completeness
    type: test
    test_type: completeness
    source: v_allergen_bronze_cleaned
    required_columns: [allergen_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-allergen-B01"

  - name: tst_allergen_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_allergen_bronze_cleaned
    columns: [allergen_key]
    on_violation: warn
    test_id: "PERF-allergen-B02"
