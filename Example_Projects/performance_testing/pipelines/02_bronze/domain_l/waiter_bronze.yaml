pipeline: domain_l_bronze
flowgroup: waiter_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: waiter
  source_table: waiter_raw
actions:
  - name: tst_waiter_bronze_completeness
    type: test
    test_type: completeness
    source: v_waiter_cleansed
    required_columns: [waiter_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-waiter-B01"

  - name: tst_waiter_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_waiter_cleansed
    columns: [waiter_key]
    on_violation: warn
    test_id: "PERF-waiter-B02"
