pipeline: domain_l_bronze
flowgroup: kitchen_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: kitchen
  source_table: kitchen_raw
actions:
  - name: tst_kitchen_bronze_completeness
    type: test
    test_type: completeness
    source: v_kitchen_cleansed
    required_columns: [kitchen_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-kitchen-B01"

  - name: tst_kitchen_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_kitchen_cleansed
    columns: [kitchen_key]
    on_violation: warn
    test_id: "PERF-kitchen-B02"
