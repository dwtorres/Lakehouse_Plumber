pipeline: domain_l_bronze
flowgroup: menu_item_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: menu_item
  source_table: menu_item_raw
actions:
  - name: tst_menu_item_bronze_completeness
    type: test
    test_type: completeness
    source: v_menu_item_cleansed
    required_columns: [menu_item_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-menu_item-B01"

  - name: tst_menu_item_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_menu_item_cleansed
    columns: [menu_item_key]
    on_violation: warn
    test_id: "PERF-menu_item-B02"
