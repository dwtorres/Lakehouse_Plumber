pipeline: domain_l_bronze
flowgroup: cooler_bronze
presets:
  - default_delta_properties
actions:
  - name: cooler_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: cooler_raw
    target: v_cooler_raw
    description: "Load cooler from raw schema"

  - name: cooler_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_cooler_raw
    target: v_cooler_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as cooler_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_cooler_raw
      WHERE 1=1

  - name: cooler_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_cooler_bronze_cleaned
    target: v_cooler_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to cooler"

  - name: write_cooler_bronze
    type: write
    source: v_cooler_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "cooler"

  - name: tst_cooler_bronze_completeness
    type: test
    test_type: completeness
    source: v_cooler_bronze_cleaned
    required_columns: [cooler_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-cooler-B01"

  - name: tst_cooler_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_cooler_bronze_cleaned
    columns: [cooler_key]
    on_violation: warn
    test_id: "PERF-cooler-B02"
