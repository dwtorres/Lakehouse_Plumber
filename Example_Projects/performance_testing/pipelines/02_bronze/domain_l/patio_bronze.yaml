pipeline: domain_l_bronze
flowgroup: patio_bronze
presets:
  - default_delta_properties
actions:
  - name: patio_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: patio_raw
    target: v_patio_raw
    description: "Load patio from raw schema"

  - name: patio_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_patio_raw
    target: v_patio_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as patio_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_patio_raw
      WHERE 1=1

  - name: patio_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_patio_bronze_cleaned
    target: v_patio_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to patio"

  - name: write_patio_bronze
    type: write
    source: v_patio_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "patio"

  - name: tst_patio_bronze_completeness
    type: test
    test_type: completeness
    source: v_patio_bronze_cleaned
    required_columns: [patio_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-patio-B01"

  - name: tst_patio_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_patio_bronze_cleaned
    columns: [patio_key]
    on_violation: warn
    test_id: "PERF-patio-B02"
