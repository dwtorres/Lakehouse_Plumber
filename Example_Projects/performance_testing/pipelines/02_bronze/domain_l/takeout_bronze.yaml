pipeline: domain_l_bronze
flowgroup: takeout_bronze
presets:
  - default_delta_properties
actions:
  - name: takeout_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: takeout_raw
    target: v_takeout_raw
    description: "Load takeout from raw schema"

  - name: takeout_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_takeout_raw
    target: v_takeout_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as takeout_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_takeout_raw
      WHERE 1=1

  - name: takeout_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_takeout_bronze_cleaned
    target: v_takeout_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to takeout"

  - name: write_takeout_bronze
    type: write
    source: v_takeout_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "takeout"

  - name: tst_takeout_bronze_completeness
    type: test
    test_type: completeness
    source: v_takeout_bronze_cleaned
    required_columns: [takeout_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-takeout-B01"

  - name: tst_takeout_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_takeout_bronze_cleaned
    columns: [takeout_key]
    on_violation: warn
    test_id: "PERF-takeout-B02"
