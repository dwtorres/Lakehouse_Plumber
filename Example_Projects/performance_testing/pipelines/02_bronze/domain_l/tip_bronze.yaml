pipeline: domain_l_bronze
flowgroup: tip_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: tip
  source_table: tip_raw
actions:
  - name: tst_tip_bronze_completeness
    type: test
    test_type: completeness
    source: v_tip_cleansed
    required_columns: [tip_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-tip-B01"

  - name: tst_tip_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_tip_cleansed
    columns: [tip_key]
    on_violation: warn
    test_id: "PERF-tip-B02"
