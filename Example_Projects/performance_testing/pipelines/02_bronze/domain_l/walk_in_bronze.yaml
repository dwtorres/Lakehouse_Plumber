pipeline: domain_l_bronze
flowgroup: walk_in_bronze
presets:
  - default_delta_properties
actions:
  - name: walk_in_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: walk_in_raw
    target: v_walk_in_raw
    description: "Load walk_in from raw schema"

  - name: walk_in_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_walk_in_raw
    target: v_walk_in_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as walk_in_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_walk_in_raw
      WHERE 1=1

  - name: walk_in_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_walk_in_bronze_cleaned
    target: v_walk_in_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to walk_in"

  - name: write_walk_in_bronze
    type: write
    source: v_walk_in_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "walk_in"

  - name: tst_walk_in_bronze_completeness
    type: test
    test_type: completeness
    source: v_walk_in_bronze_cleaned
    required_columns: [walk_in_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-walk_in-B01"

  - name: tst_walk_in_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_walk_in_bronze_cleaned
    columns: [walk_in_key]
    on_violation: warn
    test_id: "PERF-walk_in-B02"
