pipeline: domain_l_bronze
flowgroup: happy_hour_bronze
presets:
  - default_delta_properties
actions:
  - name: happy_hour_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: happy_hour_raw
    target: v_happy_hour_raw
    description: "Load happy_hour from raw schema"

  - name: happy_hour_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_happy_hour_raw
    target: v_happy_hour_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as happy_hour_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_happy_hour_raw
      WHERE 1=1

  - name: happy_hour_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_happy_hour_bronze_cleaned
    target: v_happy_hour_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to happy_hour"

  - name: write_happy_hour_bronze
    type: write
    source: v_happy_hour_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "happy_hour"

  - name: tst_happy_hour_bronze_completeness
    type: test
    test_type: completeness
    source: v_happy_hour_bronze_cleaned
    required_columns: [happy_hour_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-happy_hour-B01"

  - name: tst_happy_hour_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_happy_hour_bronze_cleaned
    columns: [happy_hour_key]
    on_violation: warn
    test_id: "PERF-happy_hour-B02"
