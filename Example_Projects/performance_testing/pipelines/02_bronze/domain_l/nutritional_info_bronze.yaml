pipeline: domain_l_bronze
flowgroup: nutritional_info_bronze
presets:
  - default_delta_properties
actions:
  - name: nutritional_info_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: nutritional_info_raw
    target: v_nutritional_info_raw
    description: "Load nutritional_info from raw schema"

  - name: nutritional_info_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_nutritional_info_raw
    target: v_nutritional_info_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as nutritional_info_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_nutritional_info_raw

  - name: nutritional_info_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_nutritional_info_bronze_cleaned
    target: v_nutritional_info_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for nutritional_info bronze"

  - name: write_nutritional_info_bronze
    type: write
    source: v_nutritional_info_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "nutritional_info"

  - name: nutritional_info_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: nutritional_info_migration
    target: v_nutritional_info_migration
    description: "Load nutritional_info migration data"

  - name: nutritional_info_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_nutritional_info_migration
    target: v_nutritional_info_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as nutritional_info_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_nutritional_info_migration

  - name: write_nutritional_info_migration
    type: write
    source: v_nutritional_info_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "nutritional_info"

  - name: tst_nutritional_info_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_nutritional_info_bronze_cleaned
    required_columns: [nutritional_info_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-nutritional_info-B01"

  - name: tst_nutritional_info_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_nutritional_info_bronze_cleaned
    columns: [nutritional_info_key]
    on_violation: warn
    test_id: "PERF-nutritional_info-B02"
