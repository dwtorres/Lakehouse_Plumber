pipeline: domain_l_bronze
flowgroup: freezer_bronze
presets:
  - default_delta_properties
actions:
  - name: freezer_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: freezer_raw
    target: v_freezer_raw
    description: "Load freezer from raw schema"

  - name: freezer_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_freezer_raw
    target: v_freezer_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as freezer_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_freezer_raw
      WHERE 1=1

  - name: freezer_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_freezer_bronze_cleaned
    target: v_freezer_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to freezer"

  - name: write_freezer_bronze
    type: write
    source: v_freezer_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "freezer"

  - name: tst_freezer_bronze_completeness
    type: test
    test_type: completeness
    source: v_freezer_bronze_cleaned
    required_columns: [freezer_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-freezer-B01"

  - name: tst_freezer_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_freezer_bronze_cleaned
    columns: [freezer_key]
    on_violation: warn
    test_id: "PERF-freezer-B02"
