pipeline: domain_l_bronze
flowgroup: food_cost_bronze
presets:
  - default_delta_properties
actions:
  - name: food_cost_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: food_cost_raw
    target: v_food_cost_raw
    description: "Load food_cost from raw schema"

  - name: food_cost_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_food_cost_raw
    target: v_food_cost_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as food_cost_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_food_cost_raw
      WHERE 1=1

  - name: food_cost_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_food_cost_bronze_cleaned
    target: v_food_cost_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to food_cost"

  - name: write_food_cost_bronze
    type: write
    source: v_food_cost_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "food_cost"

  - name: tst_food_cost_bronze_completeness
    type: test
    test_type: completeness
    source: v_food_cost_bronze_cleaned
    required_columns: [food_cost_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-food_cost-B01"

  - name: tst_food_cost_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_food_cost_bronze_cleaned
    columns: [food_cost_key]
    on_violation: warn
    test_id: "PERF-food_cost-B02"
