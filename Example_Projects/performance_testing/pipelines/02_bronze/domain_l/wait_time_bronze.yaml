pipeline: domain_l_bronze
flowgroup: wait_time_bronze
presets:
  - default_delta_properties
actions:
  - name: wait_time_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: wait_time_raw
    target: v_wait_time_raw
    description: "Load wait_time from raw schema"

  - name: wait_time_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_wait_time_raw
    target: v_wait_time_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as wait_time_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_wait_time_raw
      WHERE 1=1

  - name: wait_time_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_wait_time_bronze_cleaned
    target: v_wait_time_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to wait_time"

  - name: write_wait_time_bronze
    type: write
    source: v_wait_time_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "wait_time"

  - name: tst_wait_time_bronze_completeness
    type: test
    test_type: completeness
    source: v_wait_time_bronze_cleaned
    required_columns: [wait_time_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-wait_time-B01"

  - name: tst_wait_time_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_wait_time_bronze_cleaned
    columns: [wait_time_key]
    on_violation: warn
    test_id: "PERF-wait_time-B02"
