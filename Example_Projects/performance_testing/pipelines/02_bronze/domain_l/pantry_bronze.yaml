pipeline: domain_l_bronze
flowgroup: pantry_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: pantry
  source_table: pantry_raw
actions:
  - name: tst_pantry_bronze_completeness
    type: test
    test_type: completeness
    source: v_pantry_cleansed
    required_columns: [pantry_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-pantry-B01"

  - name: tst_pantry_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_pantry_cleansed
    columns: [pantry_key]
    on_violation: warn
    test_id: "PERF-pantry-B02"
