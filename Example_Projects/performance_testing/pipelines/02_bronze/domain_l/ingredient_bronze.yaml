pipeline: domain_l_bronze
flowgroup: ingredient_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: ingredient
  source_table: ingredient_raw
actions:
  - name: tst_ingredient_bronze_completeness
    type: test
    test_type: completeness
    source: v_ingredient_cleansed
    required_columns: [ingredient_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-ingredient-B01"

  - name: tst_ingredient_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_ingredient_cleansed
    columns: [ingredient_key]
    on_violation: warn
    test_id: "PERF-ingredient-B02"
