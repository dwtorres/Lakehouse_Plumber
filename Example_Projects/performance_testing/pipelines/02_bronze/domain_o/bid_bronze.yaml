pipeline: domain_o_bronze
flowgroup: bid_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: bid
  source_table: bid_raw
actions:
  - name: tst_bid_bronze_completeness
    type: test
    test_type: completeness
    source: v_bid_cleansed
    required_columns: [bid_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-bid-B01"

  - name: tst_bid_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_bid_cleansed
    columns: [bid_key]
    on_violation: warn
    test_id: "PERF-bid-B02"
