pipeline: domain_o_bronze
flowgroup: funnel_stage_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: funnel_stage
  source_table: funnel_stage_raw
actions:
  - name: tst_funnel_stage_bronze_completeness
    type: test
    test_type: completeness
    source: v_funnel_stage_cleansed
    required_columns: [funnel_stage_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-funnel_stage-B01"

  - name: tst_funnel_stage_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_funnel_stage_cleansed
    columns: [funnel_stage_key]
    on_violation: warn
    test_id: "PERF-funnel_stage-B02"
