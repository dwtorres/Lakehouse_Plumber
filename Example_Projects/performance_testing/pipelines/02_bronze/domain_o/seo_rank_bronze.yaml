pipeline: domain_o_bronze
flowgroup: seo_rank_bronze
presets:
  - default_delta_properties
actions:
  - name: seo_rank_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: seo_rank_raw
    target: v_seo_rank_raw
    description: "Load seo_rank from raw schema"

  - name: seo_rank_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_seo_rank_raw
    target: v_seo_rank_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as seo_rank_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_seo_rank_raw
      WHERE 1=1

  - name: seo_rank_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_seo_rank_bronze_cleaned
    target: v_seo_rank_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to seo_rank"

  - name: write_seo_rank_bronze
    type: write
    source: v_seo_rank_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "seo_rank"

  - name: tst_seo_rank_bronze_completeness
    type: test
    test_type: completeness
    source: v_seo_rank_bronze_cleaned
    required_columns: [seo_rank_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-seo_rank-B01"

  - name: tst_seo_rank_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_seo_rank_bronze_cleaned
    columns: [seo_rank_key]
    on_violation: warn
    test_id: "PERF-seo_rank-B02"
