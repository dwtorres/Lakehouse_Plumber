pipeline: domain_o_bronze
flowgroup: segment_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: segment
  source_table: segment_raw
actions:
  - name: tst_segment_bronze_completeness
    type: test
    test_type: completeness
    source: v_segment_cleansed
    required_columns: [segment_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-segment-B01"

  - name: tst_segment_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_segment_cleansed
    columns: [segment_key]
    on_violation: warn
    test_id: "PERF-segment-B02"
