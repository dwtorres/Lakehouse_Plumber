pipeline: domain_o_bronze
flowgroup: engagement_bronze
presets:
  - default_delta_properties
actions:
  - name: engagement_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: engagement_raw
    target: v_engagement_raw
    description: "Load engagement from raw schema"

  - name: engagement_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_engagement_raw
    target: v_engagement_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as engagement_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_engagement_raw
      WHERE 1=1

  - name: engagement_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_engagement_bronze_cleaned
    target: v_engagement_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to engagement"

  - name: write_engagement_bronze
    type: write
    source: v_engagement_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "engagement"

  - name: tst_engagement_bronze_completeness
    type: test
    test_type: completeness
    source: v_engagement_bronze_cleaned
    required_columns: [engagement_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-engagement-B01"

  - name: tst_engagement_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_engagement_bronze_cleaned
    columns: [engagement_key]
    on_violation: warn
    test_id: "PERF-engagement-B02"
