pipeline: domain_o_bronze
flowgroup: retargeting_bronze
presets:
  - default_delta_properties
actions:
  - name: retargeting_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: retargeting_raw
    target: v_retargeting_raw
    description: "Load retargeting from raw schema"

  - name: retargeting_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_retargeting_raw
    target: v_retargeting_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as retargeting_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_retargeting_raw
      WHERE 1=1

  - name: retargeting_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_retargeting_bronze_cleaned
    target: v_retargeting_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to retargeting"

  - name: write_retargeting_bronze
    type: write
    source: v_retargeting_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "retargeting"

  - name: tst_retargeting_bronze_completeness
    type: test
    test_type: completeness
    source: v_retargeting_bronze_cleaned
    required_columns: [retargeting_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-retargeting-B01"

  - name: tst_retargeting_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_retargeting_bronze_cleaned
    columns: [retargeting_key]
    on_violation: warn
    test_id: "PERF-retargeting-B02"
