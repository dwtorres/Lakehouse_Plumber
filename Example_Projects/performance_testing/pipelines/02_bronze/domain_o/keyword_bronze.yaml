pipeline: domain_o_bronze
flowgroup: keyword_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: keyword
  source_table: keyword_raw
actions:
  - name: tst_keyword_bronze_completeness
    type: test
    test_type: completeness
    source: v_keyword_cleansed
    required_columns: [keyword_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-keyword-B01"

  - name: tst_keyword_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_keyword_cleansed
    columns: [keyword_key]
    on_violation: warn
    test_id: "PERF-keyword-B02"
