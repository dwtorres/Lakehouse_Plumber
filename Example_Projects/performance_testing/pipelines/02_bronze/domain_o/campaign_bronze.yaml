pipeline: domain_o_bronze
flowgroup: campaign_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: campaign
  source_table: campaign_raw
actions:
  - name: tst_campaign_bronze_completeness
    type: test
    test_type: completeness
    source: v_campaign_cleansed
    required_columns: [campaign_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-campaign-B01"

  - name: tst_campaign_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_campaign_cleansed
    columns: [campaign_key]
    on_violation: warn
    test_id: "PERF-campaign-B02"
