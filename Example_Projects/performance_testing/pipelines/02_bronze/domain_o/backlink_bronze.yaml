pipeline: domain_o_bronze
flowgroup: backlink_bronze
presets:
  - default_delta_properties
actions:
  - name: backlink_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: backlink_raw
    target: v_backlink_raw
    description: "Load backlink from raw schema"

  - name: backlink_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_backlink_raw
    target: v_backlink_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as backlink_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_backlink_raw
      WHERE 1=1

  - name: backlink_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_backlink_bronze_cleaned
    target: v_backlink_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to backlink"

  - name: write_backlink_bronze
    type: write
    source: v_backlink_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "backlink"

  - name: tst_backlink_bronze_completeness
    type: test
    test_type: completeness
    source: v_backlink_bronze_cleaned
    required_columns: [backlink_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-backlink-B01"

  - name: tst_backlink_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_backlink_bronze_cleaned
    columns: [backlink_key]
    on_violation: warn
    test_id: "PERF-backlink-B02"
