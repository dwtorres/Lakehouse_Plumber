pipeline: domain_o_bronze
flowgroup: lookalike_bronze
presets:
  - default_delta_properties
actions:
  - name: lookalike_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: lookalike_raw
    target: v_lookalike_raw
    description: "Load lookalike from raw schema"

  - name: lookalike_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_lookalike_raw
    target: v_lookalike_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as lookalike_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_lookalike_raw
      WHERE 1=1

  - name: lookalike_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_lookalike_bronze_cleaned
    target: v_lookalike_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to lookalike"

  - name: write_lookalike_bronze
    type: write
    source: v_lookalike_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "lookalike"

  - name: tst_lookalike_bronze_completeness
    type: test
    test_type: completeness
    source: v_lookalike_bronze_cleaned
    required_columns: [lookalike_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-lookalike-B01"

  - name: tst_lookalike_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_lookalike_bronze_cleaned
    columns: [lookalike_key]
    on_violation: warn
    test_id: "PERF-lookalike-B02"
