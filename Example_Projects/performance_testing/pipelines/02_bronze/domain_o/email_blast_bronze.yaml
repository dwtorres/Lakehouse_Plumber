pipeline: domain_o_bronze
flowgroup: email_blast_bronze
presets:
  - default_delta_properties
actions:
  - name: email_blast_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: email_blast_raw
    target: v_email_blast_raw
    description: "Load email_blast from raw schema"

  - name: email_blast_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_email_blast_raw
    target: v_email_blast_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as email_blast_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_email_blast_raw
      WHERE 1=1

  - name: email_blast_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_email_blast_bronze_cleaned
    target: v_email_blast_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to email_blast"

  - name: write_email_blast_bronze
    type: write
    source: v_email_blast_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "email_blast"

  - name: tst_email_blast_bronze_completeness
    type: test
    test_type: completeness
    source: v_email_blast_bronze_cleaned
    required_columns: [email_blast_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-email_blast-B01"

  - name: tst_email_blast_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_email_blast_bronze_cleaned
    columns: [email_blast_key]
    on_violation: warn
    test_id: "PERF-email_blast-B02"
