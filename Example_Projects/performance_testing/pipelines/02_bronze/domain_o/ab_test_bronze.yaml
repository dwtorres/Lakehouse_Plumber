pipeline: domain_o_bronze
flowgroup: ab_test_bronze
presets:
  - default_delta_properties
actions:
  - name: ab_test_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: ab_test_raw
    target: v_ab_test_raw
    description: "Load ab_test from raw schema"

  - name: ab_test_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_ab_test_raw
    target: v_ab_test_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as ab_test_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_ab_test_raw
      WHERE 1=1

  - name: ab_test_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_ab_test_bronze_cleaned
    target: v_ab_test_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to ab_test"

  - name: write_ab_test_bronze
    type: write
    source: v_ab_test_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "ab_test"

  - name: tst_ab_test_bronze_completeness
    type: test
    test_type: completeness
    source: v_ab_test_bronze_cleaned
    required_columns: [ab_test_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-ab_test-B01"

  - name: tst_ab_test_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_ab_test_bronze_cleaned
    columns: [ab_test_key]
    on_violation: warn
    test_id: "PERF-ab_test-B02"
