pipeline: domain_o_bronze
flowgroup: open_rate_bronze
presets:
  - default_delta_properties
actions:
  - name: open_rate_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: open_rate_raw
    target: v_open_rate_raw
    description: "Load open_rate from raw schema"

  - name: open_rate_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_open_rate_raw
    target: v_open_rate_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as open_rate_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_open_rate_raw
      WHERE 1=1

  - name: open_rate_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_open_rate_bronze_cleaned
    target: v_open_rate_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to open_rate"

  - name: write_open_rate_bronze
    type: write
    source: v_open_rate_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "open_rate"

  - name: tst_open_rate_bronze_completeness
    type: test
    test_type: completeness
    source: v_open_rate_bronze_cleaned
    required_columns: [open_rate_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-open_rate-B01"

  - name: tst_open_rate_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_open_rate_bronze_cleaned
    columns: [open_rate_key]
    on_violation: warn
    test_id: "PERF-open_rate-B02"
