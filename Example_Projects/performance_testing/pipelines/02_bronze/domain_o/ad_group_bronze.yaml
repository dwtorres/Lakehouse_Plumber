pipeline: domain_o_bronze
flowgroup: ad_group_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: ad_group
  source_table: ad_group_raw
actions:
  - name: tst_ad_group_bronze_completeness
    type: test
    test_type: completeness
    source: v_ad_group_cleansed
    required_columns: [ad_group_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-ad_group-B01"

  - name: tst_ad_group_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_ad_group_cleansed
    columns: [ad_group_key]
    on_violation: warn
    test_id: "PERF-ad_group-B02"
