pipeline: domain_o_bronze
flowgroup: spam_report_bronze
presets:
  - default_delta_properties
actions:
  - name: spam_report_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: spam_report_raw
    target: v_spam_report_raw
    description: "Load spam_report from raw schema"

  - name: spam_report_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_spam_report_raw
    target: v_spam_report_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as spam_report_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_spam_report_raw

  - name: spam_report_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_spam_report_bronze_cleaned
    target: v_spam_report_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for spam_report bronze"

  - name: write_spam_report_bronze
    type: write
    source: v_spam_report_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "spam_report"

  - name: spam_report_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: spam_report_migration
    target: v_spam_report_migration
    description: "Load spam_report migration data"

  - name: spam_report_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_spam_report_migration
    target: v_spam_report_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as spam_report_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_spam_report_migration

  - name: write_spam_report_migration
    type: write
    source: v_spam_report_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "spam_report"

  - name: tst_spam_report_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_spam_report_bronze_cleaned
    required_columns: [spam_report_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-spam_report-B01"

  - name: tst_spam_report_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_spam_report_bronze_cleaned
    columns: [spam_report_key]
    on_violation: warn
    test_id: "PERF-spam_report-B02"
