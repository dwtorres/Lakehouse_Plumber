pipeline: domain_o_bronze
flowgroup: budget_alloc_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: budget_alloc
  source_table: budget_alloc_raw
actions:
  - name: tst_budget_alloc_bronze_completeness
    type: test
    test_type: completeness
    source: v_budget_alloc_cleansed
    required_columns: [budget_alloc_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-budget_alloc-B01"

  - name: tst_budget_alloc_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_budget_alloc_cleansed
    columns: [budget_alloc_key]
    on_violation: warn
    test_id: "PERF-budget_alloc-B02"
