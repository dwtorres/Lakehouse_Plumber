pipeline: domain_o_bronze
flowgroup: dynamic_ad_bronze
presets:
  - default_delta_properties
actions:
  - name: dynamic_ad_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: dynamic_ad_raw
    target: v_dynamic_ad_raw
    description: "Load dynamic_ad from raw schema"

  - name: dynamic_ad_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_dynamic_ad_raw
    target: v_dynamic_ad_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as dynamic_ad_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_dynamic_ad_raw

  - name: dynamic_ad_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_dynamic_ad_bronze_cleaned
    target: v_dynamic_ad_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for dynamic_ad bronze"

  - name: write_dynamic_ad_bronze
    type: write
    source: v_dynamic_ad_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "dynamic_ad"

  - name: dynamic_ad_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: dynamic_ad_migration
    target: v_dynamic_ad_migration
    description: "Load dynamic_ad migration data"

  - name: dynamic_ad_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_dynamic_ad_migration
    target: v_dynamic_ad_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as dynamic_ad_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_dynamic_ad_migration

  - name: write_dynamic_ad_migration
    type: write
    source: v_dynamic_ad_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "dynamic_ad"

  - name: tst_dynamic_ad_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_dynamic_ad_bronze_cleaned
    required_columns: [dynamic_ad_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-dynamic_ad-B01"

  - name: tst_dynamic_ad_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_dynamic_ad_bronze_cleaned
    columns: [dynamic_ad_key]
    on_violation: warn
    test_id: "PERF-dynamic_ad-B02"
