pipeline: domain_o_bronze
flowgroup: click_through_bronze
presets:
  - default_delta_properties
actions:
  - name: click_through_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: click_through_raw
    target: v_click_through_raw
    description: "Load click_through from raw schema"

  - name: click_through_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_click_through_raw
    target: v_click_through_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as click_through_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_click_through_raw
      WHERE 1=1

  - name: click_through_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_click_through_bronze_cleaned
    target: v_click_through_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to click_through"

  - name: write_click_through_bronze
    type: write
    source: v_click_through_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "click_through"

  - name: tst_click_through_bronze_completeness
    type: test
    test_type: completeness
    source: v_click_through_bronze_cleaned
    required_columns: [click_through_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-click_through-B01"

  - name: tst_click_through_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_click_through_bronze_cleaned
    columns: [click_through_key]
    on_violation: warn
    test_id: "PERF-click_through-B02"
