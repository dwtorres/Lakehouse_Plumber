pipeline: domain_a_bronze
flowgroup: flash_sale_bronze
presets:
  - default_delta_properties
actions:
  - name: flash_sale_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: flash_sale_raw
    target: v_flash_sale_raw
    description: "Load flash_sale from raw schema"

  - name: flash_sale_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_flash_sale_raw
    target: v_flash_sale_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as flash_sale_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_flash_sale_raw
      WHERE 1=1

  - name: flash_sale_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_flash_sale_bronze_cleaned
    target: v_flash_sale_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to flash_sale"

  - name: write_flash_sale_bronze
    type: write
    source: v_flash_sale_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "flash_sale"

  - name: tst_flash_sale_bronze_completeness
    type: test
    test_type: completeness
    source: v_flash_sale_bronze_cleaned
    required_columns: [flash_sale_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-flash_sale-B01"

  - name: tst_flash_sale_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_flash_sale_bronze_cleaned
    columns: [flash_sale_key]
    on_violation: warn
    test_id: "PERF-flash_sale-B02"
