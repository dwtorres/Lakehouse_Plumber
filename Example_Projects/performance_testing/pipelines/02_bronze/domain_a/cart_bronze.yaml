pipeline: domain_a_bronze
flowgroup: cart_bronze
presets:
  - default_delta_properties
actions:
  - name: cart_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: cart_raw
    target: v_cart_raw
    description: "Load cart from raw schema"

  - name: cart_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_cart_raw
    target: v_cart_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as cart_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_cart_raw
      WHERE 1=1

  - name: cart_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_cart_bronze_cleaned
    target: v_cart_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to cart"

  - name: write_cart_bronze
    type: write
    source: v_cart_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "cart"

  - name: tst_cart_bronze_completeness
    type: test
    test_type: completeness
    source: v_cart_bronze_cleaned
    required_columns: [cart_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-cart-B01"

  - name: tst_cart_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_cart_bronze_cleaned
    columns: [cart_key]
    on_violation: warn
    test_id: "PERF-cart-B02"
