pipeline: domain_a_bronze
flowgroup: address_bronze
presets:
  - default_delta_properties
actions:
  - name: address_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: address_raw
    target: v_address_raw
    description: "Load address from raw schema"

  - name: address_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_address_raw
    target: v_address_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as address_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_address_raw
      WHERE 1=1

  - name: address_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_address_bronze_cleaned
    target: v_address_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to address"

  - name: write_address_bronze
    type: write
    source: v_address_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "address"

  - name: tst_address_bronze_completeness
    type: test
    test_type: completeness
    source: v_address_bronze_cleaned
    required_columns: [address_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-address-B01"

  - name: tst_address_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_address_bronze_cleaned
    columns: [address_key]
    on_violation: warn
    test_id: "PERF-address-B02"
