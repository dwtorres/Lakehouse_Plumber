pipeline: domain_a_bronze
flowgroup: pick_list_bronze
presets:
  - default_delta_properties
actions:
  - name: pick_list_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: pick_list_raw
    target: v_pick_list_raw
    description: "Load pick_list from raw schema"

  - name: pick_list_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_pick_list_raw
    target: v_pick_list_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as pick_list_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_pick_list_raw
      WHERE 1=1

  - name: pick_list_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_pick_list_bronze_cleaned
    target: v_pick_list_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to pick_list"

  - name: write_pick_list_bronze
    type: write
    source: v_pick_list_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "pick_list"

  - name: tst_pick_list_bronze_completeness
    type: test
    test_type: completeness
    source: v_pick_list_bronze_cleaned
    required_columns: [pick_list_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-pick_list-B01"

  - name: tst_pick_list_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_pick_list_bronze_cleaned
    columns: [pick_list_key]
    on_violation: warn
    test_id: "PERF-pick_list-B02"
