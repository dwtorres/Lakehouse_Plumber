pipeline: domain_a_bronze
flowgroup: price_rule_bronze
presets:
  - default_delta_properties
actions:
  - name: price_rule_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: price_rule_raw
    target: v_price_rule_raw
    description: "Load price_rule from raw schema"

  - name: price_rule_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_price_rule_raw
    target: v_price_rule_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as price_rule_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_price_rule_raw
      WHERE 1=1

  - name: price_rule_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_price_rule_bronze_cleaned
    target: v_price_rule_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to price_rule"

  - name: write_price_rule_bronze
    type: write
    source: v_price_rule_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "price_rule"

  - name: tst_price_rule_bronze_completeness
    type: test
    test_type: completeness
    source: v_price_rule_bronze_cleaned
    required_columns: [price_rule_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-price_rule-B01"

  - name: tst_price_rule_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_price_rule_bronze_cleaned
    columns: [price_rule_key]
    on_violation: warn
    test_id: "PERF-price_rule-B02"
