pipeline: domain_a_bronze
flowgroup: backorder_bronze
presets:
  - default_delta_properties
actions:
  - name: backorder_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: backorder_raw
    target: v_backorder_raw
    description: "Load backorder from raw schema"

  - name: backorder_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_backorder_raw
    target: v_backorder_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as backorder_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_backorder_raw
      WHERE 1=1

  - name: backorder_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_backorder_bronze_cleaned
    target: v_backorder_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to backorder"

  - name: write_backorder_bronze
    type: write
    source: v_backorder_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "backorder"

  - name: tst_backorder_bronze_completeness
    type: test
    test_type: completeness
    source: v_backorder_bronze_cleaned
    required_columns: [backorder_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-backorder-B01"

  - name: tst_backorder_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_backorder_bronze_cleaned
    columns: [backorder_key]
    on_violation: warn
    test_id: "PERF-backorder-B02"
