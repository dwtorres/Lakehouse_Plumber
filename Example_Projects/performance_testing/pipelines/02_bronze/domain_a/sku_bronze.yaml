pipeline: domain_a_bronze
flowgroup: sku_bronze
presets:
  - default_delta_properties
actions:
  - name: sku_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: sku_raw
    target: v_sku_raw
    description: "Load sku from raw schema"

  - name: sku_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_sku_raw
    target: v_sku_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as sku_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_sku_raw
      WHERE 1=1

  - name: sku_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_sku_bronze_cleaned
    target: v_sku_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to sku"

  - name: write_sku_bronze
    type: write
    source: v_sku_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "sku"

  - name: tst_sku_bronze_completeness
    type: test
    test_type: completeness
    source: v_sku_bronze_cleaned
    required_columns: [sku_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-sku-B01"

  - name: tst_sku_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_sku_bronze_cleaned
    columns: [sku_key]
    on_violation: warn
    test_id: "PERF-sku-B02"
