pipeline: domain_a_bronze
use_template: bronze_cleanse_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: customer_bronze
    template_parameters:
      entity_name: customer
      source_table: customer_raw
    actions:
      - name: tst_customer_bronze_completeness
        type: test
        test_type: completeness
        source: v_customer_cleansed
        required_columns: [customer_key, _etl_timestamp]
        on_violation: warn
        test_id: "PERF-customer-B01"
      
      - name: tst_customer_bronze_uniqueness
        type: test
        test_type: uniqueness
        source: v_customer_cleansed
        columns: [customer_key]
        on_violation: warn
        test_id: "PERF-customer-B02"

