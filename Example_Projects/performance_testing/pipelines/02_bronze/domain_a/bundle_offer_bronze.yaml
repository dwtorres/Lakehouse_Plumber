pipeline: domain_a_bronze
flowgroup: bundle_offer_bronze
presets:
  - default_delta_properties
actions:
  - name: bundle_offer_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: bundle_offer_raw
    target: v_bundle_offer_raw
    description: "Load bundle_offer from raw schema"

  - name: bundle_offer_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_bundle_offer_raw
    target: v_bundle_offer_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as bundle_offer_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_bundle_offer_raw
      WHERE 1=1

  - name: bundle_offer_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_bundle_offer_bronze_cleaned
    target: v_bundle_offer_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to bundle_offer"

  - name: write_bundle_offer_bronze
    type: write
    source: v_bundle_offer_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "bundle_offer"

  - name: tst_bundle_offer_bronze_completeness
    type: test
    test_type: completeness
    source: v_bundle_offer_bronze_cleaned
    required_columns: [bundle_offer_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-bundle_offer-B01"

  - name: tst_bundle_offer_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_bundle_offer_bronze_cleaned
    columns: [bundle_offer_key]
    on_violation: warn
    test_id: "PERF-bundle_offer-B02"
