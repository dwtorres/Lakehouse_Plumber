pipeline: domain_a_bronze
flowgroup: shipping_method_bronze
presets:
  - default_delta_properties
actions:
  - name: shipping_method_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: shipping_method_raw
    target: v_shipping_method_raw
    description: "Load shipping_method from raw schema"

  - name: shipping_method_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_shipping_method_raw
    target: v_shipping_method_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as shipping_method_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_shipping_method_raw
      WHERE 1=1

  - name: shipping_method_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_shipping_method_bronze_cleaned
    target: v_shipping_method_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to shipping_method"

  - name: write_shipping_method_bronze
    type: write
    source: v_shipping_method_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "shipping_method"

  - name: tst_shipping_method_bronze_completeness
    type: test
    test_type: completeness
    source: v_shipping_method_bronze_cleaned
    required_columns: [shipping_method_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-shipping_method-B01"

  - name: tst_shipping_method_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_shipping_method_bronze_cleaned
    columns: [shipping_method_key]
    on_violation: warn
    test_id: "PERF-shipping_method-B02"
