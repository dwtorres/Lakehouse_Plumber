pipeline: domain_s_bronze
flowgroup: vineyard_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: vineyard
  source_table: vineyard_raw
actions:
  - name: tst_vineyard_bronze_completeness
    type: test
    test_type: completeness
    source: v_vineyard_cleansed
    required_columns: [vineyard_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-vineyard-B01"

  - name: tst_vineyard_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_vineyard_cleansed
    columns: [vineyard_key]
    on_violation: warn
    test_id: "PERF-vineyard-B02"
