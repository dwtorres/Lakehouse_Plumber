pipeline: domain_s_bronze
flowgroup: cuvee_bronze
presets:
  - default_delta_properties
actions:
  - name: cuvee_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: cuvee_raw
    target: v_cuvee_raw
    description: "Load cuvee from raw schema"

  - name: cuvee_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_cuvee_raw
    target: v_cuvee_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as cuvee_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_cuvee_raw

  - name: cuvee_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_cuvee_bronze_cleaned
    target: v_cuvee_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for cuvee bronze"

  - name: write_cuvee_bronze
    type: write
    source: v_cuvee_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "cuvee"

  - name: cuvee_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: cuvee_migration
    target: v_cuvee_migration
    description: "Load cuvee migration data"

  - name: cuvee_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_cuvee_migration
    target: v_cuvee_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as cuvee_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_cuvee_migration

  - name: write_cuvee_migration
    type: write
    source: v_cuvee_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "cuvee"

  - name: tst_cuvee_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_cuvee_bronze_cleaned
    required_columns: [cuvee_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-cuvee-B01"

  - name: tst_cuvee_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_cuvee_bronze_cleaned
    columns: [cuvee_key]
    on_violation: warn
    test_id: "PERF-cuvee-B02"
