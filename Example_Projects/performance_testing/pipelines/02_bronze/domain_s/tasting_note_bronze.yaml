pipeline: domain_s_bronze
flowgroup: tasting_note_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: tasting_note
  source_table: tasting_note_raw
actions:
  - name: tst_tasting_note_bronze_completeness
    type: test
    test_type: completeness
    source: v_tasting_note_cleansed
    required_columns: [tasting_note_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-tasting_note-B01"

  - name: tst_tasting_note_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_tasting_note_cleansed
    columns: [tasting_note_key]
    on_violation: warn
    test_id: "PERF-tasting_note-B02"
