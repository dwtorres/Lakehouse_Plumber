pipeline: domain_s_bronze
flowgroup: distributor_bronze
presets:
  - default_delta_properties
actions:
  - name: distributor_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: distributor_raw
    target: v_distributor_raw
    description: "Load distributor from raw schema"

  - name: distributor_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_distributor_raw
    target: v_distributor_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as distributor_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_distributor_raw
      WHERE 1=1

  - name: distributor_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_distributor_bronze_cleaned
    target: v_distributor_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to distributor"

  - name: write_distributor_bronze
    type: write
    source: v_distributor_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "distributor"

  - name: tst_distributor_bronze_completeness
    type: test
    test_type: completeness
    source: v_distributor_bronze_cleaned
    required_columns: [distributor_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-distributor-B01"

  - name: tst_distributor_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_distributor_bronze_cleaned
    columns: [distributor_key]
    on_violation: warn
    test_id: "PERF-distributor-B02"
