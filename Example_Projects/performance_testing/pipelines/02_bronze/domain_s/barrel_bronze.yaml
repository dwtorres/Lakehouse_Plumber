pipeline: domain_s_bronze
flowgroup: barrel_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: barrel
  source_table: barrel_raw
actions:
  - name: tst_barrel_bronze_completeness
    type: test
    test_type: completeness
    source: v_barrel_cleansed
    required_columns: [barrel_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-barrel-B01"

  - name: tst_barrel_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_barrel_cleansed
    columns: [barrel_key]
    on_violation: warn
    test_id: "PERF-barrel-B02"
