pipeline: domain_s_bronze
flowgroup: fermentation_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: fermentation
  source_table: fermentation_raw
actions:
  - name: tst_fermentation_bronze_completeness
    type: test
    test_type: completeness
    source: v_fermentation_cleansed
    required_columns: [fermentation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-fermentation-B01"

  - name: tst_fermentation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_fermentation_cleansed
    columns: [fermentation_key]
    on_violation: warn
    test_id: "PERF-fermentation-B02"
