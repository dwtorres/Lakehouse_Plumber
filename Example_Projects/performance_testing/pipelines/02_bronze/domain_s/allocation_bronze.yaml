pipeline: domain_s_bronze
flowgroup: allocation_bronze
presets:
  - default_delta_properties
actions:
  - name: allocation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: allocation_raw
    target: v_allocation_raw
    description: "Load allocation from raw schema"

  - name: allocation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_allocation_raw
    target: v_allocation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as allocation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_allocation_raw
      WHERE 1=1

  - name: allocation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_allocation_bronze_cleaned
    target: v_allocation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to allocation"

  - name: write_allocation_bronze
    type: write
    source: v_allocation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "allocation"

  - name: tst_allocation_bronze_completeness
    type: test
    test_type: completeness
    source: v_allocation_bronze_cleaned
    required_columns: [allocation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-allocation-B01"

  - name: tst_allocation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_allocation_bronze_cleaned
    columns: [allocation_key]
    on_violation: warn
    test_id: "PERF-allocation-B02"
