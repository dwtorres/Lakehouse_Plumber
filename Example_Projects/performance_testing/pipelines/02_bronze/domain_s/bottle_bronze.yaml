pipeline: domain_s_bronze
flowgroup: bottle_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: bottle
  source_table: bottle_raw
actions:
  - name: tst_bottle_bronze_completeness
    type: test
    test_type: completeness
    source: v_bottle_cleansed
    required_columns: [bottle_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-bottle-B01"

  - name: tst_bottle_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_bottle_cleansed
    columns: [bottle_key]
    on_violation: warn
    test_id: "PERF-bottle-B02"
