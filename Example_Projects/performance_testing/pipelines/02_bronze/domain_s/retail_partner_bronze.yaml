pipeline: domain_s_bronze
flowgroup: retail_partner_bronze
presets:
  - default_delta_properties
actions:
  - name: retail_partner_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: retail_partner_raw
    target: v_retail_partner_raw
    description: "Load retail_partner from raw schema"

  - name: retail_partner_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_retail_partner_raw
    target: v_retail_partner_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as retail_partner_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_retail_partner_raw
      WHERE 1=1

  - name: retail_partner_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_retail_partner_bronze_cleaned
    target: v_retail_partner_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to retail_partner"

  - name: write_retail_partner_bronze
    type: write
    source: v_retail_partner_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "retail_partner"

  - name: tst_retail_partner_bronze_completeness
    type: test
    test_type: completeness
    source: v_retail_partner_bronze_cleaned
    required_columns: [retail_partner_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-retail_partner-B01"

  - name: tst_retail_partner_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_retail_partner_bronze_cleaned
    columns: [retail_partner_key]
    on_violation: warn
    test_id: "PERF-retail_partner-B02"
