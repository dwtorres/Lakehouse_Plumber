pipeline: domain_s_bronze
flowgroup: vintage_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: vintage
  source_table: vintage_raw
actions:
  - name: tst_vintage_bronze_completeness
    type: test
    test_type: completeness
    source: v_vintage_cleansed
    required_columns: [vintage_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-vintage-B01"

  - name: tst_vintage_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_vintage_cleansed
    columns: [vintage_key]
    on_violation: warn
    test_id: "PERF-vintage-B02"
