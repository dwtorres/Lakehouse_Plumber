pipeline: domain_s_bronze
flowgroup: pressing_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: pressing
  source_table: pressing_raw
actions:
  - name: tst_pressing_bronze_completeness
    type: test
    test_type: completeness
    source: v_pressing_cleansed
    required_columns: [pressing_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-pressing-B01"

  - name: tst_pressing_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_pressing_cleansed
    columns: [pressing_key]
    on_violation: warn
    test_id: "PERF-pressing-B02"
