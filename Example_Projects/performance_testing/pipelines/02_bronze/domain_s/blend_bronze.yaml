pipeline: domain_s_bronze
flowgroup: blend_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: blend
  source_table: blend_raw
actions:
  - name: tst_blend_bronze_completeness
    type: test
    test_type: completeness
    source: v_blend_cleansed
    required_columns: [blend_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-blend-B01"

  - name: tst_blend_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_blend_cleansed
    columns: [blend_key]
    on_violation: warn
    test_id: "PERF-blend-B02"
