pipeline: domain_s_bronze
flowgroup: sommelier_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: sommelier
  source_table: sommelier_raw
actions:
  - name: tst_sommelier_bronze_completeness
    type: test
    test_type: completeness
    source: v_sommelier_cleansed
    required_columns: [sommelier_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-sommelier-B01"

  - name: tst_sommelier_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_sommelier_cleansed
    columns: [sommelier_key]
    on_violation: warn
    test_id: "PERF-sommelier-B02"
