pipeline: domain_s_bronze
flowgroup: label_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: label
  source_table: label_raw
actions:
  - name: tst_label_bronze_completeness
    type: test
    test_type: completeness
    source: v_label_cleansed
    required_columns: [label_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-label-B01"

  - name: tst_label_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_label_cleansed
    columns: [label_key]
    on_violation: warn
    test_id: "PERF-label-B02"
