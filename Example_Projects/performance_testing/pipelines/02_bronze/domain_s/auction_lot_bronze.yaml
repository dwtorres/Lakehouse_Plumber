pipeline: domain_s_bronze
flowgroup: auction_lot_bronze
presets:
  - default_delta_properties
actions:
  - name: auction_lot_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: auction_lot_raw
    target: v_auction_lot_raw
    description: "Load auction_lot from raw schema"

  - name: auction_lot_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_auction_lot_raw
    target: v_auction_lot_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as auction_lot_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_auction_lot_raw
      WHERE 1=1

  - name: auction_lot_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_auction_lot_bronze_cleaned
    target: v_auction_lot_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to auction_lot"

  - name: write_auction_lot_bronze
    type: write
    source: v_auction_lot_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "auction_lot"

  - name: tst_auction_lot_bronze_completeness
    type: test
    test_type: completeness
    source: v_auction_lot_bronze_cleaned
    required_columns: [auction_lot_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-auction_lot-B01"

  - name: tst_auction_lot_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_auction_lot_bronze_cleaned
    columns: [auction_lot_key]
    on_violation: warn
    test_id: "PERF-auction_lot-B02"
