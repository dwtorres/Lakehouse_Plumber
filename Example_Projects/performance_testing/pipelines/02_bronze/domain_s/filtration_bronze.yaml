pipeline: domain_s_bronze
flowgroup: filtration_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: filtration
  source_table: filtration_raw
actions:
  - name: tst_filtration_bronze_completeness
    type: test
    test_type: completeness
    source: v_filtration_cleansed
    required_columns: [filtration_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-filtration-B01"

  - name: tst_filtration_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_filtration_cleansed
    columns: [filtration_key]
    on_violation: warn
    test_id: "PERF-filtration-B02"
