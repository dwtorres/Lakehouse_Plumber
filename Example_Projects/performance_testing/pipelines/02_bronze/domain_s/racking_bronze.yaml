pipeline: domain_s_bronze
flowgroup: racking_bronze
presets:
  - default_delta_properties
actions:
  - name: racking_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: racking_raw
    target: v_racking_raw
    description: "Load racking from raw schema"

  - name: racking_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_racking_raw
    target: v_racking_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as racking_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_racking_raw
      WHERE 1=1

  - name: racking_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_racking_bronze_cleaned
    target: v_racking_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to racking"

  - name: write_racking_bronze
    type: write
    source: v_racking_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "racking"

  - name: tst_racking_bronze_completeness
    type: test
    test_type: completeness
    source: v_racking_bronze_cleaned
    required_columns: [racking_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-racking-B01"

  - name: tst_racking_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_racking_bronze_cleaned
    columns: [racking_key]
    on_violation: warn
    test_id: "PERF-racking-B02"
