pipeline: domain_q_bronze
flowgroup: season_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: season
  source_table: season_raw
actions:
  - name: tst_season_bronze_completeness
    type: test
    test_type: completeness
    source: v_season_cleansed
    required_columns: [season_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-season-B01"

  - name: tst_season_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_season_cleansed
    columns: [season_key]
    on_violation: warn
    test_id: "PERF-season-B02"
