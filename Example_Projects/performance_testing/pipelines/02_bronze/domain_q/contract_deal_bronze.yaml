pipeline: domain_q_bronze
flowgroup: contract_deal_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: contract_deal
  source_table: contract_deal_raw
actions:
  - name: tst_contract_deal_bronze_completeness
    type: test
    test_type: completeness
    source: v_contract_deal_cleansed
    required_columns: [contract_deal_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-contract_deal-B01"

  - name: tst_contract_deal_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_contract_deal_cleansed
    columns: [contract_deal_key]
    on_violation: warn
    test_id: "PERF-contract_deal-B02"
