pipeline: domain_q_bronze
flowgroup: scouting_report_bronze
presets:
  - default_delta_properties
actions:
  - name: scouting_report_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: scouting_report_raw
    target: v_scouting_report_raw
    description: "Load scouting_report from raw schema"

  - name: scouting_report_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_scouting_report_raw
    target: v_scouting_report_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as scouting_report_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_scouting_report_raw
      WHERE 1=1

  - name: scouting_report_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_scouting_report_bronze_cleaned
    target: v_scouting_report_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to scouting_report"

  - name: write_scouting_report_bronze
    type: write
    source: v_scouting_report_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "scouting_report"

  - name: tst_scouting_report_bronze_completeness
    type: test
    test_type: completeness
    source: v_scouting_report_bronze_cleaned
    required_columns: [scouting_report_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-scouting_report-B01"

  - name: tst_scouting_report_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_scouting_report_bronze_cleaned
    columns: [scouting_report_key]
    on_violation: warn
    test_id: "PERF-scouting_report-B02"
