pipeline: domain_q_bronze
flowgroup: fan_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: fan
  source_table: fan_raw
actions:
  - name: tst_fan_bronze_completeness
    type: test
    test_type: completeness
    source: v_fan_cleansed
    required_columns: [fan_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-fan-B01"

  - name: tst_fan_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_fan_cleansed
    columns: [fan_key]
    on_violation: warn
    test_id: "PERF-fan-B02"
