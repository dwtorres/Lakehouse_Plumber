pipeline: domain_q_bronze
flowgroup: ticket_sale_bronze
presets:
  - default_delta_properties
actions:
  - name: ticket_sale_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: ticket_sale_raw
    target: v_ticket_sale_raw
    description: "Load ticket_sale from raw schema"

  - name: ticket_sale_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_ticket_sale_raw
    target: v_ticket_sale_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as ticket_sale_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_ticket_sale_raw

  - name: ticket_sale_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_ticket_sale_bronze_cleaned
    target: v_ticket_sale_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for ticket_sale bronze"

  - name: write_ticket_sale_bronze
    type: write
    source: v_ticket_sale_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "ticket_sale"

  - name: ticket_sale_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: ticket_sale_migration
    target: v_ticket_sale_migration
    description: "Load ticket_sale migration data"

  - name: ticket_sale_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_ticket_sale_migration
    target: v_ticket_sale_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as ticket_sale_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_ticket_sale_migration

  - name: write_ticket_sale_migration
    type: write
    source: v_ticket_sale_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "ticket_sale"

  - name: tst_ticket_sale_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_ticket_sale_bronze_cleaned
    required_columns: [ticket_sale_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-ticket_sale-B01"

  - name: tst_ticket_sale_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_ticket_sale_bronze_cleaned
    columns: [ticket_sale_key]
    on_violation: warn
    test_id: "PERF-ticket_sale-B02"
