pipeline: domain_q_bronze
flowgroup: highlight_bronze
presets:
  - default_delta_properties
actions:
  - name: highlight_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: highlight_raw
    target: v_highlight_raw
    description: "Load highlight from raw schema"

  - name: highlight_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_highlight_raw
    target: v_highlight_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as highlight_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_highlight_raw
      WHERE 1=1

  - name: highlight_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_highlight_bronze_cleaned
    target: v_highlight_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to highlight"

  - name: write_highlight_bronze
    type: write
    source: v_highlight_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "highlight"

  - name: tst_highlight_bronze_completeness
    type: test
    test_type: completeness
    source: v_highlight_bronze_cleaned
    required_columns: [highlight_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-highlight-B01"

  - name: tst_highlight_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_highlight_bronze_cleaned
    columns: [highlight_key]
    on_violation: warn
    test_id: "PERF-highlight-B02"
