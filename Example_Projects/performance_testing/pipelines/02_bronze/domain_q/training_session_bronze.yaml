pipeline: domain_q_bronze
flowgroup: training_session_bronze
presets:
  - default_delta_properties
actions:
  - name: training_session_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: training_session_raw
    target: v_training_session_raw
    description: "Load training_session from raw schema"

  - name: training_session_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_training_session_raw
    target: v_training_session_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as training_session_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_training_session_raw
      WHERE 1=1

  - name: training_session_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_training_session_bronze_cleaned
    target: v_training_session_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to training_session"

  - name: write_training_session_bronze
    type: write
    source: v_training_session_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "training_session"

  - name: tst_training_session_bronze_completeness
    type: test
    test_type: completeness
    source: v_training_session_bronze_cleaned
    required_columns: [training_session_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-training_session-B01"

  - name: tst_training_session_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_training_session_bronze_cleaned
    columns: [training_session_key]
    on_violation: warn
    test_id: "PERF-training_session-B02"
