pipeline: domain_q_bronze
flowgroup: trophy_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: trophy
  source_table: trophy_raw
actions:
  - name: tst_trophy_bronze_completeness
    type: test
    test_type: completeness
    source: v_trophy_cleansed
    required_columns: [trophy_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-trophy-B01"

  - name: tst_trophy_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_trophy_cleansed
    columns: [trophy_key]
    on_violation: warn
    test_id: "PERF-trophy-B02"
