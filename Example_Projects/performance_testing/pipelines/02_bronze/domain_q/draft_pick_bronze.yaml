pipeline: domain_q_bronze
flowgroup: draft_pick_bronze
presets:
  - default_delta_properties
actions:
  - name: draft_pick_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: draft_pick_raw
    target: v_draft_pick_raw
    description: "Load draft_pick from raw schema"

  - name: draft_pick_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_draft_pick_raw
    target: v_draft_pick_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as draft_pick_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_draft_pick_raw
      WHERE 1=1

  - name: draft_pick_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_draft_pick_bronze_cleaned
    target: v_draft_pick_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to draft_pick"

  - name: write_draft_pick_bronze
    type: write
    source: v_draft_pick_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "draft_pick"

  - name: tst_draft_pick_bronze_completeness
    type: test
    test_type: completeness
    source: v_draft_pick_bronze_cleaned
    required_columns: [draft_pick_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-draft_pick-B01"

  - name: tst_draft_pick_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_draft_pick_bronze_cleaned
    columns: [draft_pick_key]
    on_violation: warn
    test_id: "PERF-draft_pick-B02"
