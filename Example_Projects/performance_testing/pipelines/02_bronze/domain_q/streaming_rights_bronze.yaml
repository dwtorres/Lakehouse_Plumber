pipeline: domain_q_bronze
flowgroup: streaming_rights_bronze
presets:
  - default_delta_properties
actions:
  - name: streaming_rights_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: streaming_rights_raw
    target: v_streaming_rights_raw
    description: "Load streaming_rights from raw schema"

  - name: streaming_rights_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_streaming_rights_raw
    target: v_streaming_rights_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as streaming_rights_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_streaming_rights_raw

  - name: streaming_rights_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_streaming_rights_bronze_cleaned
    target: v_streaming_rights_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for streaming_rights bronze"

  - name: write_streaming_rights_bronze
    type: write
    source: v_streaming_rights_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "streaming_rights"

  - name: streaming_rights_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: streaming_rights_migration
    target: v_streaming_rights_migration
    description: "Load streaming_rights migration data"

  - name: streaming_rights_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_streaming_rights_migration
    target: v_streaming_rights_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as streaming_rights_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_streaming_rights_migration

  - name: write_streaming_rights_migration
    type: write
    source: v_streaming_rights_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "streaming_rights"

  - name: tst_streaming_rights_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_streaming_rights_bronze_cleaned
    required_columns: [streaming_rights_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-streaming_rights-B01"

  - name: tst_streaming_rights_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_streaming_rights_bronze_cleaned
    columns: [streaming_rights_key]
    on_violation: warn
    test_id: "PERF-streaming_rights-B02"
