pipeline: domain_q_bronze
flowgroup: referee_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: referee
  source_table: referee_raw
actions:
  - name: tst_referee_bronze_completeness
    type: test
    test_type: completeness
    source: v_referee_cleansed
    required_columns: [referee_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-referee-B01"

  - name: tst_referee_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_referee_cleansed
    columns: [referee_key]
    on_violation: warn
    test_id: "PERF-referee-B02"
