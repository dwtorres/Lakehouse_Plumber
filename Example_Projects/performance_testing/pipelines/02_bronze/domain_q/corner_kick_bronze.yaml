pipeline: domain_q_bronze
flowgroup: corner_kick_bronze
presets:
  - default_delta_properties
actions:
  - name: corner_kick_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: corner_kick_raw
    target: v_corner_kick_raw
    description: "Load corner_kick from raw schema"

  - name: corner_kick_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_corner_kick_raw
    target: v_corner_kick_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as corner_kick_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_corner_kick_raw
      WHERE 1=1

  - name: corner_kick_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_corner_kick_bronze_cleaned
    target: v_corner_kick_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to corner_kick"

  - name: write_corner_kick_bronze
    type: write
    source: v_corner_kick_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "corner_kick"

  - name: tst_corner_kick_bronze_completeness
    type: test
    test_type: completeness
    source: v_corner_kick_bronze_cleaned
    required_columns: [corner_kick_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-corner_kick-B01"

  - name: tst_corner_kick_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_corner_kick_bronze_cleaned
    columns: [corner_kick_key]
    on_violation: warn
    test_id: "PERF-corner_kick-B02"
