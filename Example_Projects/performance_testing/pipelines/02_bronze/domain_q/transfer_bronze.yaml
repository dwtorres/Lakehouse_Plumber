pipeline: domain_q_bronze
flowgroup: transfer_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: transfer
  source_table: transfer_raw
actions:
  - name: tst_transfer_bronze_completeness
    type: test
    test_type: completeness
    source: v_transfer_cleansed
    required_columns: [transfer_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-transfer-B01"

  - name: tst_transfer_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_transfer_cleansed
    columns: [transfer_key]
    on_violation: warn
    test_id: "PERF-transfer-B02"
