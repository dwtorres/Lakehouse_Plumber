pipeline: domain_q_bronze
flowgroup: match_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: match
  source_table: match_raw
actions:
  - name: tst_match_bronze_completeness
    type: test
    test_type: completeness
    source: v_match_cleansed
    required_columns: [match_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-match-B01"

  - name: tst_match_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_match_cleansed
    columns: [match_key]
    on_violation: warn
    test_id: "PERF-match-B02"
