pipeline: domain_q_bronze
flowgroup: penalty_bronze
presets:
  - default_delta_properties
actions:
  - name: penalty_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: penalty_raw
    target: v_penalty_raw
    description: "Load penalty from raw schema"

  - name: penalty_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_penalty_raw
    target: v_penalty_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as penalty_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_penalty_raw
      WHERE 1=1

  - name: penalty_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_penalty_bronze_cleaned
    target: v_penalty_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to penalty"

  - name: write_penalty_bronze
    type: write
    source: v_penalty_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "penalty"

  - name: tst_penalty_bronze_completeness
    type: test
    test_type: completeness
    source: v_penalty_bronze_cleaned
    required_columns: [penalty_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-penalty-B01"

  - name: tst_penalty_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_penalty_bronze_cleaned
    columns: [penalty_key]
    on_violation: warn
    test_id: "PERF-penalty-B02"
