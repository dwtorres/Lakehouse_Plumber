pipeline: domain_q_bronze
flowgroup: player_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: player
  source_table: player_raw
actions:
  - name: tst_player_bronze_completeness
    type: test
    test_type: completeness
    source: v_player_cleansed
    required_columns: [player_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-player-B01"

  - name: tst_player_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_player_cleansed
    columns: [player_key]
    on_violation: warn
    test_id: "PERF-player-B02"
