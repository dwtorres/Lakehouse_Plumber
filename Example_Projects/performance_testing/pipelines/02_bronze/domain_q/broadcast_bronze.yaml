pipeline: domain_q_bronze
flowgroup: broadcast_bronze
presets:
  - default_delta_properties
actions:
  - name: broadcast_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: broadcast_raw
    target: v_broadcast_raw
    description: "Load broadcast from raw schema"

  - name: broadcast_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_broadcast_raw
    target: v_broadcast_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as broadcast_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_broadcast_raw
      WHERE 1=1

  - name: broadcast_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_broadcast_bronze_cleaned
    target: v_broadcast_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to broadcast"

  - name: write_broadcast_bronze
    type: write
    source: v_broadcast_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "broadcast"

  - name: tst_broadcast_bronze_completeness
    type: test
    test_type: completeness
    source: v_broadcast_bronze_cleaned
    required_columns: [broadcast_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-broadcast-B01"

  - name: tst_broadcast_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_broadcast_bronze_cleaned
    columns: [broadcast_key]
    on_violation: warn
    test_id: "PERF-broadcast-B02"
