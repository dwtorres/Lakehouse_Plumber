pipeline: domain_q_bronze
flowgroup: salary_cap_bronze
presets:
  - default_delta_properties
actions:
  - name: salary_cap_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: salary_cap_raw
    target: v_salary_cap_raw
    description: "Load salary_cap from raw schema"

  - name: salary_cap_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_salary_cap_raw
    target: v_salary_cap_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as salary_cap_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_salary_cap_raw
      WHERE 1=1

  - name: salary_cap_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_salary_cap_bronze_cleaned
    target: v_salary_cap_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to salary_cap"

  - name: write_salary_cap_bronze
    type: write
    source: v_salary_cap_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "salary_cap"

  - name: tst_salary_cap_bronze_completeness
    type: test
    test_type: completeness
    source: v_salary_cap_bronze_cleaned
    required_columns: [salary_cap_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-salary_cap-B01"

  - name: tst_salary_cap_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_salary_cap_bronze_cleaned
    columns: [salary_cap_key]
    on_violation: warn
    test_id: "PERF-salary_cap-B02"
