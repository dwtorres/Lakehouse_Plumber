pipeline: domain_q_bronze
flowgroup: league_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: league
  source_table: league_raw
actions:
  - name: tst_league_bronze_completeness
    type: test
    test_type: completeness
    source: v_league_cleansed
    required_columns: [league_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-league-B01"

  - name: tst_league_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_league_cleansed
    columns: [league_key]
    on_violation: warn
    test_id: "PERF-league-B02"
