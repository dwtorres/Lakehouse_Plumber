pipeline: domain_q_bronze
flowgroup: var_decision_bronze
presets:
  - default_delta_properties
actions:
  - name: var_decision_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: var_decision_raw
    target: v_var_decision_raw
    description: "Load var_decision from raw schema"

  - name: var_decision_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_var_decision_raw
    target: v_var_decision_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as var_decision_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_var_decision_raw
      WHERE 1=1

  - name: var_decision_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_var_decision_bronze_cleaned
    target: v_var_decision_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to var_decision"

  - name: write_var_decision_bronze
    type: write
    source: v_var_decision_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "var_decision"

  - name: tst_var_decision_bronze_completeness
    type: test
    test_type: completeness
    source: v_var_decision_bronze_cleaned
    required_columns: [var_decision_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-var_decision-B01"

  - name: tst_var_decision_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_var_decision_bronze_cleaned
    columns: [var_decision_key]
    on_violation: warn
    test_id: "PERF-var_decision-B02"
