pipeline: domain_q_bronze
flowgroup: coach_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: coach
  source_table: coach_raw
actions:
  - name: tst_coach_bronze_completeness
    type: test
    test_type: completeness
    source: v_coach_cleansed
    required_columns: [coach_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-coach-B01"

  - name: tst_coach_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_coach_cleansed
    columns: [coach_key]
    on_violation: warn
    test_id: "PERF-coach-B02"
