pipeline: domain_q_bronze
flowgroup: offside_bronze
presets:
  - default_delta_properties
actions:
  - name: offside_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: offside_raw
    target: v_offside_raw
    description: "Load offside from raw schema"

  - name: offside_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_offside_raw
    target: v_offside_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as offside_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_offside_raw
      WHERE 1=1

  - name: offside_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_offside_bronze_cleaned
    target: v_offside_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to offside"

  - name: write_offside_bronze
    type: write
    source: v_offside_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "offside"

  - name: tst_offside_bronze_completeness
    type: test
    test_type: completeness
    source: v_offside_bronze_cleaned
    required_columns: [offside_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-offside-B01"

  - name: tst_offside_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_offside_bronze_cleaned
    columns: [offside_key]
    on_violation: warn
    test_id: "PERF-offside-B02"
