pipeline: domain_q_bronze
flowgroup: yellow_card_bronze
presets:
  - default_delta_properties
actions:
  - name: yellow_card_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: yellow_card_raw
    target: v_yellow_card_raw
    description: "Load yellow_card from raw schema"

  - name: yellow_card_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_yellow_card_raw
    target: v_yellow_card_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as yellow_card_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_yellow_card_raw
      WHERE 1=1

  - name: yellow_card_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_yellow_card_bronze_cleaned
    target: v_yellow_card_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to yellow_card"

  - name: write_yellow_card_bronze
    type: write
    source: v_yellow_card_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "yellow_card"

  - name: tst_yellow_card_bronze_completeness
    type: test
    test_type: completeness
    source: v_yellow_card_bronze_cleaned
    required_columns: [yellow_card_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-yellow_card-B01"

  - name: tst_yellow_card_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_yellow_card_bronze_cleaned
    columns: [yellow_card_key]
    on_violation: warn
    test_id: "PERF-yellow_card-B02"
