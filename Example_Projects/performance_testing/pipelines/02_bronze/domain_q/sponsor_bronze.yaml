pipeline: domain_q_bronze
flowgroup: sponsor_bronze
presets:
  - default_delta_properties
actions:
  - name: sponsor_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: sponsor_raw
    target: v_sponsor_raw
    description: "Load sponsor from raw schema"

  - name: sponsor_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_sponsor_raw
    target: v_sponsor_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as sponsor_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_sponsor_raw
      WHERE 1=1

  - name: sponsor_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_sponsor_bronze_cleaned
    target: v_sponsor_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to sponsor"

  - name: write_sponsor_bronze
    type: write
    source: v_sponsor_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "sponsor"

  - name: tst_sponsor_bronze_completeness
    type: test
    test_type: completeness
    source: v_sponsor_bronze_cleaned
    required_columns: [sponsor_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-sponsor-B01"

  - name: tst_sponsor_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_sponsor_bronze_cleaned
    columns: [sponsor_key]
    on_violation: warn
    test_id: "PERF-sponsor-B02"
