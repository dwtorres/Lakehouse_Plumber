pipeline: domain_q_bronze
flowgroup: stadium_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: stadium
  source_table: stadium_raw
actions:
  - name: tst_stadium_bronze_completeness
    type: test
    test_type: completeness
    source: v_stadium_cleansed
    required_columns: [stadium_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-stadium-B01"

  - name: tst_stadium_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_stadium_cleansed
    columns: [stadium_key]
    on_violation: warn
    test_id: "PERF-stadium-B02"
