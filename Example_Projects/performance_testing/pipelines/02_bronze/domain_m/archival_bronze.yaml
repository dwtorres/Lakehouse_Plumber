pipeline: domain_m_bronze
flowgroup: archival_bronze
presets:
  - default_delta_properties
actions:
  - name: archival_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: archival_raw
    target: v_archival_raw
    description: "Load archival from raw schema"

  - name: archival_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_archival_raw
    target: v_archival_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as archival_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_archival_raw
      WHERE 1=1

  - name: archival_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_archival_bronze_cleaned
    target: v_archival_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to archival"

  - name: write_archival_bronze
    type: write
    source: v_archival_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "archival"

  - name: tst_archival_bronze_completeness
    type: test
    test_type: completeness
    source: v_archival_bronze_cleaned
    required_columns: [archival_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-archival-B01"

  - name: tst_archival_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_archival_bronze_cleaned
    columns: [archival_key]
    on_violation: warn
    test_id: "PERF-archival-B02"
