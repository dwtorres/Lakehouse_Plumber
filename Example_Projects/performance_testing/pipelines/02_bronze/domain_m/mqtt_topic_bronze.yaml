pipeline: domain_m_bronze
flowgroup: mqtt_topic_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: mqtt_topic
  source_table: mqtt_topic_raw
actions:
  - name: tst_mqtt_topic_bronze_completeness
    type: test
    test_type: completeness
    source: v_mqtt_topic_cleansed
    required_columns: [mqtt_topic_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-mqtt_topic-B01"

  - name: tst_mqtt_topic_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_mqtt_topic_cleansed
    columns: [mqtt_topic_key]
    on_violation: warn
    test_id: "PERF-mqtt_topic-B02"
