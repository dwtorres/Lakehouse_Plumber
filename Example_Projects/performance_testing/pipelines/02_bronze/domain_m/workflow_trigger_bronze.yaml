pipeline: domain_m_bronze
flowgroup: workflow_trigger_bronze
presets:
  - default_delta_properties
actions:
  - name: workflow_trigger_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: workflow_trigger_raw
    target: v_workflow_trigger_raw
    description: "Load workflow_trigger from raw schema"

  - name: workflow_trigger_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_workflow_trigger_raw
    target: v_workflow_trigger_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as workflow_trigger_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_workflow_trigger_raw
      WHERE 1=1

  - name: workflow_trigger_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_workflow_trigger_bronze_cleaned
    target: v_workflow_trigger_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to workflow_trigger"

  - name: write_workflow_trigger_bronze
    type: write
    source: v_workflow_trigger_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "workflow_trigger"

  - name: tst_workflow_trigger_bronze_completeness
    type: test
    test_type: completeness
    source: v_workflow_trigger_bronze_cleaned
    required_columns: [workflow_trigger_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-workflow_trigger-B01"

  - name: tst_workflow_trigger_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_workflow_trigger_bronze_cleaned
    columns: [workflow_trigger_key]
    on_violation: warn
    test_id: "PERF-workflow_trigger-B02"
