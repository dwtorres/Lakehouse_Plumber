pipeline: domain_m_bronze
flowgroup: digital_twin_bronze
presets:
  - default_delta_properties
actions:
  - name: digital_twin_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: digital_twin_raw
    target: v_digital_twin_raw
    description: "Load digital_twin from raw schema"

  - name: digital_twin_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_digital_twin_raw
    target: v_digital_twin_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as digital_twin_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_digital_twin_raw
      WHERE 1=1

  - name: digital_twin_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_digital_twin_bronze_cleaned
    target: v_digital_twin_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to digital_twin"

  - name: write_digital_twin_bronze
    type: write
    source: v_digital_twin_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "digital_twin"

  - name: tst_digital_twin_bronze_completeness
    type: test
    test_type: completeness
    source: v_digital_twin_bronze_cleaned
    required_columns: [digital_twin_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-digital_twin-B01"

  - name: tst_digital_twin_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_digital_twin_bronze_cleaned
    columns: [digital_twin_key]
    on_violation: warn
    test_id: "PERF-digital_twin-B02"
