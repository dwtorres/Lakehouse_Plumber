pipeline: domain_m_bronze
flowgroup: protocol_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: protocol
  source_table: protocol_raw
actions:
  - name: tst_protocol_bronze_completeness
    type: test
    test_type: completeness
    source: v_protocol_cleansed
    required_columns: [protocol_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-protocol-B01"

  - name: tst_protocol_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_protocol_cleansed
    columns: [protocol_key]
    on_violation: warn
    test_id: "PERF-protocol-B02"
