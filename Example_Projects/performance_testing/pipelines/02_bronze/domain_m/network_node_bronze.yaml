pipeline: domain_m_bronze
flowgroup: network_node_bronze
presets:
  - default_delta_properties
actions:
  - name: network_node_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: network_node_raw
    target: v_network_node_raw
    description: "Load network_node from raw schema"

  - name: network_node_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_network_node_raw
    target: v_network_node_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as network_node_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_network_node_raw

  - name: network_node_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_network_node_bronze_cleaned
    target: v_network_node_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for network_node bronze"

  - name: write_network_node_bronze
    type: write
    source: v_network_node_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "network_node"

  - name: network_node_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: network_node_migration
    target: v_network_node_migration
    description: "Load network_node migration data"

  - name: network_node_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_network_node_migration
    target: v_network_node_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as network_node_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_network_node_migration

  - name: write_network_node_migration
    type: write
    source: v_network_node_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "network_node"

  - name: tst_network_node_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_network_node_bronze_cleaned
    required_columns: [network_node_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-network_node-B01"

  - name: tst_network_node_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_network_node_bronze_cleaned
    columns: [network_node_key]
    on_violation: warn
    test_id: "PERF-network_node-B02"
