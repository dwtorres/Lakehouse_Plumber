pipeline: domain_m_bronze
flowgroup: sla_metric_bronze
presets:
  - default_delta_properties
actions:
  - name: sla_metric_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: sla_metric_raw
    target: v_sla_metric_raw
    description: "Load sla_metric from raw schema"

  - name: sla_metric_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_sla_metric_raw
    target: v_sla_metric_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as sla_metric_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_sla_metric_raw
      WHERE 1=1

  - name: sla_metric_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_sla_metric_bronze_cleaned
    target: v_sla_metric_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to sla_metric"

  - name: write_sla_metric_bronze
    type: write
    source: v_sla_metric_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "sla_metric"

  - name: tst_sla_metric_bronze_completeness
    type: test
    test_type: completeness
    source: v_sla_metric_bronze_cleaned
    required_columns: [sla_metric_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-sla_metric-B01"

  - name: tst_sla_metric_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_sla_metric_bronze_cleaned
    columns: [sla_metric_key]
    on_violation: warn
    test_id: "PERF-sla_metric-B02"
