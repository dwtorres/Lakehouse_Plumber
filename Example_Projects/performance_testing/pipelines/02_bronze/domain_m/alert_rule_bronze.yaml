pipeline: domain_m_bronze
flowgroup: alert_rule_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: alert_rule
  source_table: alert_rule_raw
actions:
  - name: tst_alert_rule_bronze_completeness
    type: test
    test_type: completeness
    source: v_alert_rule_cleansed
    required_columns: [alert_rule_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-alert_rule-B01"

  - name: tst_alert_rule_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_alert_rule_cleansed
    columns: [alert_rule_key]
    on_violation: warn
    test_id: "PERF-alert_rule-B02"
