pipeline: domain_m_bronze
flowgroup: diagnostic_bronze
presets:
  - default_delta_properties
actions:
  - name: diagnostic_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: diagnostic_raw
    target: v_diagnostic_raw
    description: "Load diagnostic from raw schema"

  - name: diagnostic_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_diagnostic_raw
    target: v_diagnostic_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as diagnostic_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_diagnostic_raw
      WHERE 1=1

  - name: diagnostic_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_diagnostic_bronze_cleaned
    target: v_diagnostic_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to diagnostic"

  - name: write_diagnostic_bronze
    type: write
    source: v_diagnostic_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "diagnostic"

  - name: tst_diagnostic_bronze_completeness
    type: test
    test_type: completeness
    source: v_diagnostic_bronze_cleaned
    required_columns: [diagnostic_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-diagnostic-B01"

  - name: tst_diagnostic_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_diagnostic_bronze_cleaned
    columns: [diagnostic_key]
    on_violation: warn
    test_id: "PERF-diagnostic-B02"
