pipeline: domain_m_bronze
flowgroup: dashboard_widget_bronze
presets:
  - default_delta_properties
actions:
  - name: dashboard_widget_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: dashboard_widget_raw
    target: v_dashboard_widget_raw
    description: "Load dashboard_widget from raw schema"

  - name: dashboard_widget_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_dashboard_widget_raw
    target: v_dashboard_widget_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as dashboard_widget_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_dashboard_widget_raw

  - name: dashboard_widget_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_dashboard_widget_bronze_cleaned
    target: v_dashboard_widget_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for dashboard_widget bronze"

  - name: write_dashboard_widget_bronze
    type: write
    source: v_dashboard_widget_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "dashboard_widget"

  - name: dashboard_widget_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: dashboard_widget_migration
    target: v_dashboard_widget_migration
    description: "Load dashboard_widget migration data"

  - name: dashboard_widget_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_dashboard_widget_migration
    target: v_dashboard_widget_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as dashboard_widget_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_dashboard_widget_migration

  - name: write_dashboard_widget_migration
    type: write
    source: v_dashboard_widget_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "dashboard_widget"

  - name: tst_dashboard_widget_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_dashboard_widget_bronze_cleaned
    required_columns: [dashboard_widget_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-dashboard_widget-B01"

  - name: tst_dashboard_widget_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_dashboard_widget_bronze_cleaned
    columns: [dashboard_widget_key]
    on_violation: warn
    test_id: "PERF-dashboard_widget-B02"
