pipeline: domain_m_bronze
flowgroup: edge_node_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: edge_node
  source_table: edge_node_raw
actions:
  - name: tst_edge_node_bronze_completeness
    type: test
    test_type: completeness
    source: v_edge_node_cleansed
    required_columns: [edge_node_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-edge_node-B01"

  - name: tst_edge_node_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_edge_node_cleansed
    columns: [edge_node_key]
    on_violation: warn
    test_id: "PERF-edge_node-B02"
