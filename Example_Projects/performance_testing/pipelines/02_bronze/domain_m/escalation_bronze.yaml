pipeline: domain_m_bronze
flowgroup: escalation_bronze
presets:
  - default_delta_properties
actions:
  - name: escalation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: escalation_raw
    target: v_escalation_raw
    description: "Load escalation from raw schema"

  - name: escalation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_escalation_raw
    target: v_escalation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as escalation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_escalation_raw
      WHERE 1=1

  - name: escalation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_escalation_bronze_cleaned
    target: v_escalation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to escalation"

  - name: write_escalation_bronze
    type: write
    source: v_escalation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "escalation"

  - name: tst_escalation_bronze_completeness
    type: test
    test_type: completeness
    source: v_escalation_bronze_cleaned
    required_columns: [escalation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-escalation-B01"

  - name: tst_escalation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_escalation_bronze_cleaned
    columns: [escalation_key]
    on_violation: warn
    test_id: "PERF-escalation-B02"
