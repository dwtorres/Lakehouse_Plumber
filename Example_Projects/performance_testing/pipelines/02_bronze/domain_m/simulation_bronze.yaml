pipeline: domain_m_bronze
flowgroup: simulation_bronze
presets:
  - default_delta_properties
actions:
  - name: simulation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: simulation_raw
    target: v_simulation_raw
    description: "Load simulation from raw schema"

  - name: simulation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_simulation_raw
    target: v_simulation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as simulation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_simulation_raw
      WHERE 1=1

  - name: simulation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_simulation_bronze_cleaned
    target: v_simulation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to simulation"

  - name: write_simulation_bronze
    type: write
    source: v_simulation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "simulation"

  - name: tst_simulation_bronze_completeness
    type: test
    test_type: completeness
    source: v_simulation_bronze_cleaned
    required_columns: [simulation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-simulation-B01"

  - name: tst_simulation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_simulation_bronze_cleaned
    columns: [simulation_key]
    on_violation: warn
    test_id: "PERF-simulation-B02"
