pipeline: domain_m_bronze
flowgroup: configuration_bronze
presets:
  - default_delta_properties
actions:
  - name: configuration_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: configuration_raw
    target: v_configuration_raw
    description: "Load configuration from raw schema"

  - name: configuration_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_configuration_raw
    target: v_configuration_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as configuration_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_configuration_raw
      WHERE 1=1

  - name: configuration_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_configuration_bronze_cleaned
    target: v_configuration_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to configuration"

  - name: write_configuration_bronze
    type: write
    source: v_configuration_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "configuration"

  - name: tst_configuration_bronze_completeness
    type: test
    test_type: completeness
    source: v_configuration_bronze_cleaned
    required_columns: [configuration_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-configuration-B01"

  - name: tst_configuration_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_configuration_bronze_cleaned
    columns: [configuration_key]
    on_violation: warn
    test_id: "PERF-configuration-B02"
