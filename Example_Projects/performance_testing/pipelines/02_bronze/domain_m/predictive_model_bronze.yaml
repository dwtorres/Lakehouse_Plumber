pipeline: domain_m_bronze
flowgroup: predictive_model_bronze
presets:
  - default_delta_properties
actions:
  - name: predictive_model_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: predictive_model_raw
    target: v_predictive_model_raw
    description: "Load predictive_model from raw schema"

  - name: predictive_model_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_predictive_model_raw
    target: v_predictive_model_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as predictive_model_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_predictive_model_raw
      WHERE 1=1

  - name: predictive_model_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_predictive_model_bronze_cleaned
    target: v_predictive_model_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to predictive_model"

  - name: write_predictive_model_bronze
    type: write
    source: v_predictive_model_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "predictive_model"

  - name: tst_predictive_model_bronze_completeness
    type: test
    test_type: completeness
    source: v_predictive_model_bronze_cleaned
    required_columns: [predictive_model_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-predictive_model-B01"

  - name: tst_predictive_model_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_predictive_model_bronze_cleaned
    columns: [predictive_model_key]
    on_violation: warn
    test_id: "PERF-predictive_model-B02"
