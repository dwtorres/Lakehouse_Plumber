pipeline: domain_m_bronze
flowgroup: gateway_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: gateway
  source_table: gateway_raw
actions:
  - name: tst_gateway_bronze_completeness
    type: test
    test_type: completeness
    source: v_gateway_cleansed
    required_columns: [gateway_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-gateway-B01"

  - name: tst_gateway_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_gateway_cleansed
    columns: [gateway_key]
    on_violation: warn
    test_id: "PERF-gateway-B02"
