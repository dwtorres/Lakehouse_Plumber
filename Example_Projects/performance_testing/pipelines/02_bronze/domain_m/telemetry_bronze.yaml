pipeline: domain_m_bronze
flowgroup: telemetry_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: telemetry
  source_table: telemetry_raw
actions:
  - name: tst_telemetry_bronze_completeness
    type: test
    test_type: completeness
    source: v_telemetry_cleansed
    required_columns: [telemetry_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-telemetry-B01"

  - name: tst_telemetry_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_telemetry_cleansed
    columns: [telemetry_key]
    on_violation: warn
    test_id: "PERF-telemetry-B02"
