pipeline: domain_c_bronze
flowgroup: accrual_bronze
presets:
  - default_delta_properties
actions:
  - name: accrual_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: accrual_raw
    target: v_accrual_raw
    description: "Load accrual from raw schema"

  - name: accrual_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_accrual_raw
    target: v_accrual_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as accrual_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_accrual_raw
      WHERE 1=1

  - name: accrual_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_accrual_bronze_cleaned
    target: v_accrual_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to accrual"

  - name: write_accrual_bronze
    type: write
    source: v_accrual_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "accrual"

  - name: tst_accrual_bronze_completeness
    type: test
    test_type: completeness
    source: v_accrual_bronze_cleaned
    required_columns: [accrual_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-accrual-B01"

  - name: tst_accrual_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_accrual_bronze_cleaned
    columns: [accrual_key]
    on_violation: warn
    test_id: "PERF-accrual-B02"
