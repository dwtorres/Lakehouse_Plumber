pipeline: domain_c_bronze
flowgroup: variance_bronze
presets:
  - default_delta_properties
actions:
  - name: variance_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: variance_raw
    target: v_variance_raw
    description: "Load variance from raw schema"

  - name: variance_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_variance_raw
    target: v_variance_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as variance_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_variance_raw

  - name: variance_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_variance_bronze_cleaned
    target: v_variance_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for variance bronze"

  - name: write_variance_bronze
    type: write
    source: v_variance_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "variance"

  - name: variance_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: variance_migration
    target: v_variance_migration
    description: "Load variance migration data"

  - name: variance_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_variance_migration
    target: v_variance_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as variance_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_variance_migration

  - name: write_variance_migration
    type: write
    source: v_variance_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "variance"

  - name: tst_variance_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_variance_bronze_cleaned
    required_columns: [variance_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-variance-B01"

  - name: tst_variance_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_variance_bronze_cleaned
    columns: [variance_key]
    on_violation: warn
    test_id: "PERF-variance-B02"
