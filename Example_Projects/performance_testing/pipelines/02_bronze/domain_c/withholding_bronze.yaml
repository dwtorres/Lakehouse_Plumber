pipeline: domain_c_bronze
flowgroup: withholding_bronze
presets:
  - default_delta_properties
actions:
  - name: withholding_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: withholding_raw
    target: v_withholding_raw
    description: "Load withholding from raw schema"

  - name: withholding_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_withholding_raw
    target: v_withholding_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as withholding_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_withholding_raw
      WHERE 1=1

  - name: withholding_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_withholding_bronze_cleaned
    target: v_withholding_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to withholding"

  - name: write_withholding_bronze
    type: write
    source: v_withholding_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "withholding"

  - name: tst_withholding_bronze_completeness
    type: test
    test_type: completeness
    source: v_withholding_bronze_cleaned
    required_columns: [withholding_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-withholding-B01"

  - name: tst_withholding_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_withholding_bronze_cleaned
    columns: [withholding_key]
    on_violation: warn
    test_id: "PERF-withholding-B02"
