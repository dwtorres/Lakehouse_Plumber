pipeline: domain_c_bronze
flowgroup: trial_balance_bronze
presets:
  - default_delta_properties
actions:
  - name: trial_balance_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: trial_balance_raw
    target: v_trial_balance_raw
    description: "Load trial_balance from raw schema"

  - name: trial_balance_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_trial_balance_raw
    target: v_trial_balance_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as trial_balance_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_trial_balance_raw
      WHERE 1=1

  - name: trial_balance_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_trial_balance_bronze_cleaned
    target: v_trial_balance_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to trial_balance"

  - name: write_trial_balance_bronze
    type: write
    source: v_trial_balance_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "trial_balance"

  - name: tst_trial_balance_bronze_completeness
    type: test
    test_type: completeness
    source: v_trial_balance_bronze_cleaned
    required_columns: [trial_balance_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-trial_balance-B01"

  - name: tst_trial_balance_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_trial_balance_bronze_cleaned
    columns: [trial_balance_key]
    on_violation: warn
    test_id: "PERF-trial_balance-B02"
