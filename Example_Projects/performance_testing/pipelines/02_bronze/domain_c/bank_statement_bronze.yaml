pipeline: domain_c_bronze
flowgroup: bank_statement_bronze
presets:
  - default_delta_properties
actions:
  - name: bank_statement_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: bank_statement_raw
    target: v_bank_statement_raw
    description: "Load bank_statement from raw schema"

  - name: bank_statement_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_bank_statement_raw
    target: v_bank_statement_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as bank_statement_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_bank_statement_raw
      WHERE 1=1

  - name: bank_statement_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_bank_statement_bronze_cleaned
    target: v_bank_statement_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to bank_statement"

  - name: write_bank_statement_bronze
    type: write
    source: v_bank_statement_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "bank_statement"

  - name: tst_bank_statement_bronze_completeness
    type: test
    test_type: completeness
    source: v_bank_statement_bronze_cleaned
    required_columns: [bank_statement_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-bank_statement-B01"

  - name: tst_bank_statement_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_bank_statement_bronze_cleaned
    columns: [bank_statement_key]
    on_violation: warn
    test_id: "PERF-bank_statement-B02"
