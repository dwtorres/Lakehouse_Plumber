pipeline: domain_c_bronze
flowgroup: balance_sheet_bronze
presets:
  - default_delta_properties
actions:
  - name: balance_sheet_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: balance_sheet_raw
    target: v_balance_sheet_raw
    description: "Load balance_sheet from raw schema"

  - name: balance_sheet_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_balance_sheet_raw
    target: v_balance_sheet_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as balance_sheet_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_balance_sheet_raw
      WHERE 1=1

  - name: balance_sheet_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_balance_sheet_bronze_cleaned
    target: v_balance_sheet_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to balance_sheet"

  - name: write_balance_sheet_bronze
    type: write
    source: v_balance_sheet_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "balance_sheet"

  - name: tst_balance_sheet_bronze_completeness
    type: test
    test_type: completeness
    source: v_balance_sheet_bronze_cleaned
    required_columns: [balance_sheet_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-balance_sheet-B01"

  - name: tst_balance_sheet_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_balance_sheet_bronze_cleaned
    columns: [balance_sheet_key]
    on_violation: warn
    test_id: "PERF-balance_sheet-B02"
