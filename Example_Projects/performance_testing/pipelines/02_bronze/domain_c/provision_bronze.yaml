pipeline: domain_c_bronze
flowgroup: provision_bronze
presets:
  - default_delta_properties
actions:
  - name: provision_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: provision_raw
    target: v_provision_raw
    description: "Load provision from raw schema"

  - name: provision_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_provision_raw
    target: v_provision_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as provision_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_provision_raw
      WHERE 1=1

  - name: provision_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_provision_bronze_cleaned
    target: v_provision_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to provision"

  - name: write_provision_bronze
    type: write
    source: v_provision_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "provision"

  - name: tst_provision_bronze_completeness
    type: test
    test_type: completeness
    source: v_provision_bronze_cleaned
    required_columns: [provision_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-provision-B01"

  - name: tst_provision_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_provision_bronze_cleaned
    columns: [provision_key]
    on_violation: warn
    test_id: "PERF-provision-B02"
