pipeline: domain_c_bronze
flowgroup: exchange_rate_bronze
presets:
  - default_delta_properties
actions:
  - name: exchange_rate_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: exchange_rate_raw
    target: v_exchange_rate_raw
    description: "Load exchange_rate from raw schema"

  - name: exchange_rate_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_exchange_rate_raw
    target: v_exchange_rate_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as exchange_rate_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_exchange_rate_raw

  - name: exchange_rate_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_exchange_rate_bronze_cleaned
    target: v_exchange_rate_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for exchange_rate bronze"

  - name: write_exchange_rate_bronze
    type: write
    source: v_exchange_rate_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "exchange_rate"

  - name: exchange_rate_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: exchange_rate_migration
    target: v_exchange_rate_migration
    description: "Load exchange_rate migration data"

  - name: exchange_rate_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_exchange_rate_migration
    target: v_exchange_rate_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as exchange_rate_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_exchange_rate_migration

  - name: write_exchange_rate_migration
    type: write
    source: v_exchange_rate_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "exchange_rate"

  - name: tst_exchange_rate_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_exchange_rate_bronze_cleaned
    required_columns: [exchange_rate_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-exchange_rate-B01"

  - name: tst_exchange_rate_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_exchange_rate_bronze_cleaned
    columns: [exchange_rate_key]
    on_violation: warn
    test_id: "PERF-exchange_rate-B02"
