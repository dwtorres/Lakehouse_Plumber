pipeline: domain_c_bronze
flowgroup: currency_bronze
presets:
  - default_delta_properties
actions:
  - name: currency_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: currency_raw
    target: v_currency_raw
    description: "Load currency from raw schema"

  - name: currency_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_currency_raw
    target: v_currency_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as currency_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_currency_raw
      WHERE 1=1

  - name: currency_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_currency_bronze_cleaned
    target: v_currency_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to currency"

  - name: write_currency_bronze
    type: write
    source: v_currency_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "currency"

  - name: tst_currency_bronze_completeness
    type: test
    test_type: completeness
    source: v_currency_bronze_cleaned
    required_columns: [currency_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-currency-B01"

  - name: tst_currency_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_currency_bronze_cleaned
    columns: [currency_key]
    on_violation: warn
    test_id: "PERF-currency-B02"
