pipeline: domain_c_bronze
flowgroup: reconciliation_bronze
presets:
  - default_delta_properties
actions:
  - name: reconciliation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: reconciliation_raw
    target: v_reconciliation_raw
    description: "Load reconciliation from raw schema"

  - name: reconciliation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_reconciliation_raw
    target: v_reconciliation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as reconciliation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_reconciliation_raw

  - name: reconciliation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_reconciliation_bronze_cleaned
    target: v_reconciliation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for reconciliation bronze"

  - name: write_reconciliation_bronze
    type: write
    source: v_reconciliation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "reconciliation"

  - name: reconciliation_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: reconciliation_migration
    target: v_reconciliation_migration
    description: "Load reconciliation migration data"

  - name: reconciliation_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_reconciliation_migration
    target: v_reconciliation_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as reconciliation_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_reconciliation_migration

  - name: write_reconciliation_migration
    type: write
    source: v_reconciliation_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "reconciliation"

  - name: tst_reconciliation_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_reconciliation_bronze_cleaned
    required_columns: [reconciliation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-reconciliation-B01"

  - name: tst_reconciliation_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_reconciliation_bronze_cleaned
    columns: [reconciliation_key]
    on_violation: warn
    test_id: "PERF-reconciliation-B02"
