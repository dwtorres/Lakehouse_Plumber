pipeline: domain_c_bronze
flowgroup: write_off_bronze
presets:
  - default_delta_properties
actions:
  - name: write_off_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: write_off_raw
    target: v_write_off_raw
    description: "Load write_off from raw schema"

  - name: write_off_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_write_off_raw
    target: v_write_off_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as write_off_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_write_off_raw
      WHERE 1=1

  - name: write_off_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_write_off_bronze_cleaned
    target: v_write_off_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to write_off"

  - name: write_write_off_bronze
    type: write
    source: v_write_off_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "write_off"

  - name: tst_write_off_bronze_completeness
    type: test
    test_type: completeness
    source: v_write_off_bronze_cleaned
    required_columns: [write_off_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-write_off-B01"

  - name: tst_write_off_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_write_off_bronze_cleaned
    columns: [write_off_key]
    on_violation: warn
    test_id: "PERF-write_off-B02"
