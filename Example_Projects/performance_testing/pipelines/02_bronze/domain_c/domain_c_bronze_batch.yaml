pipeline: domain_c_bronze
use_template: bronze_cleanse_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: transaction_bronze
    template_parameters:
      entity_name: transaction
      source_table: transaction_raw
    actions:
      - name: tst_transaction_bronze_completeness
        type: test
        test_type: completeness
        source: v_transaction_cleansed
        required_columns: [transaction_key, _etl_timestamp]
        on_violation: warn
        test_id: "PERF-transaction-B01"
      
      - name: tst_transaction_bronze_uniqueness
        type: test
        test_type: uniqueness
        source: v_transaction_cleansed
        columns: [transaction_key]
        on_violation: warn
        test_id: "PERF-transaction-B02"

