pipeline: domain_d_bronze
flowgroup: wearable_data_bronze
presets:
  - default_delta_properties
actions:
  - name: wearable_data_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: wearable_data_raw
    target: v_wearable_data_raw
    description: "Load wearable_data from raw schema"

  - name: wearable_data_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_wearable_data_raw
    target: v_wearable_data_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as wearable_data_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_wearable_data_raw

  - name: wearable_data_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_wearable_data_bronze_cleaned
    target: v_wearable_data_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for wearable_data bronze"

  - name: write_wearable_data_bronze
    type: write
    source: v_wearable_data_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "wearable_data"

  - name: wearable_data_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: wearable_data_migration
    target: v_wearable_data_migration
    description: "Load wearable_data migration data"

  - name: wearable_data_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_wearable_data_migration
    target: v_wearable_data_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as wearable_data_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_wearable_data_migration

  - name: write_wearable_data_migration
    type: write
    source: v_wearable_data_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "wearable_data"

  - name: tst_wearable_data_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_wearable_data_bronze_cleaned
    required_columns: [wearable_data_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-wearable_data-B01"

  - name: tst_wearable_data_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_wearable_data_bronze_cleaned
    columns: [wearable_data_key]
    on_violation: warn
    test_id: "PERF-wearable_data-B02"
