pipeline: domain_d_bronze
flowgroup: consent_form_bronze
presets:
  - default_delta_properties
actions:
  - name: consent_form_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: consent_form_raw
    target: v_consent_form_raw
    description: "Load consent_form from raw schema"

  - name: consent_form_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_consent_form_raw
    target: v_consent_form_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as consent_form_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_consent_form_raw

  - name: consent_form_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_consent_form_bronze_cleaned
    target: v_consent_form_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for consent_form bronze"

  - name: write_consent_form_bronze
    type: write
    source: v_consent_form_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "consent_form"

  - name: consent_form_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: consent_form_migration
    target: v_consent_form_migration
    description: "Load consent_form migration data"

  - name: consent_form_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_consent_form_migration
    target: v_consent_form_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as consent_form_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_consent_form_migration

  - name: write_consent_form_migration
    type: write
    source: v_consent_form_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "consent_form"

  - name: tst_consent_form_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_consent_form_bronze_cleaned
    required_columns: [consent_form_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-consent_form-B01"

  - name: tst_consent_form_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_consent_form_bronze_cleaned
    columns: [consent_form_key]
    on_violation: warn
    test_id: "PERF-consent_form-B02"
