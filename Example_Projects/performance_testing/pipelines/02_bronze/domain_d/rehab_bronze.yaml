pipeline: domain_d_bronze
flowgroup: rehab_bronze
presets:
  - default_delta_properties
actions:
  - name: rehab_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: rehab_raw
    target: v_rehab_raw
    description: "Load rehab from raw schema"

  - name: rehab_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_rehab_raw
    target: v_rehab_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as rehab_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_rehab_raw
      WHERE 1=1

  - name: rehab_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_rehab_bronze_cleaned
    target: v_rehab_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to rehab"

  - name: write_rehab_bronze
    type: write
    source: v_rehab_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "rehab"

  - name: tst_rehab_bronze_completeness
    type: test
    test_type: completeness
    source: v_rehab_bronze_cleaned
    required_columns: [rehab_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-rehab-B01"

  - name: tst_rehab_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_rehab_bronze_cleaned
    columns: [rehab_key]
    on_violation: warn
    test_id: "PERF-rehab-B02"
