pipeline: domain_d_bronze
flowgroup: emergency_bronze
presets:
  - default_delta_properties
actions:
  - name: emergency_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: emergency_raw
    target: v_emergency_raw
    description: "Load emergency from raw schema"

  - name: emergency_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_emergency_raw
    target: v_emergency_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as emergency_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_emergency_raw
      WHERE 1=1

  - name: emergency_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_emergency_bronze_cleaned
    target: v_emergency_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to emergency"

  - name: write_emergency_bronze
    type: write
    source: v_emergency_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "emergency"

  - name: tst_emergency_bronze_completeness
    type: test
    test_type: completeness
    source: v_emergency_bronze_cleaned
    required_columns: [emergency_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-emergency-B01"

  - name: tst_emergency_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_emergency_bronze_cleaned
    columns: [emergency_key]
    on_violation: warn
    test_id: "PERF-emergency-B02"
