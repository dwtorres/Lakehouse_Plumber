pipeline: domain_d_bronze
flowgroup: bed_assignment_bronze
presets:
  - default_delta_properties
actions:
  - name: bed_assignment_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: bed_assignment_raw
    target: v_bed_assignment_raw
    description: "Load bed_assignment from raw schema"

  - name: bed_assignment_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_bed_assignment_raw
    target: v_bed_assignment_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as bed_assignment_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_bed_assignment_raw
      WHERE 1=1

  - name: bed_assignment_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_bed_assignment_bronze_cleaned
    target: v_bed_assignment_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to bed_assignment"

  - name: write_bed_assignment_bronze
    type: write
    source: v_bed_assignment_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "bed_assignment"

  - name: tst_bed_assignment_bronze_completeness
    type: test
    test_type: completeness
    source: v_bed_assignment_bronze_cleaned
    required_columns: [bed_assignment_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-bed_assignment-B01"

  - name: tst_bed_assignment_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_bed_assignment_bronze_cleaned
    columns: [bed_assignment_key]
    on_violation: warn
    test_id: "PERF-bed_assignment-B02"
