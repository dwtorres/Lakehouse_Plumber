pipeline: domain_d_bronze
flowgroup: admission_bronze
presets:
  - default_delta_properties
actions:
  - name: admission_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: admission_raw
    target: v_admission_raw
    description: "Load admission from raw schema"

  - name: admission_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_admission_raw
    target: v_admission_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as admission_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_admission_raw
      WHERE 1=1

  - name: admission_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_admission_bronze_cleaned
    target: v_admission_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to admission"

  - name: write_admission_bronze
    type: write
    source: v_admission_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "admission"

  - name: tst_admission_bronze_completeness
    type: test
    test_type: completeness
    source: v_admission_bronze_cleaned
    required_columns: [admission_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-admission-B01"

  - name: tst_admission_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_admission_bronze_cleaned
    columns: [admission_key]
    on_violation: warn
    test_id: "PERF-admission-B02"
