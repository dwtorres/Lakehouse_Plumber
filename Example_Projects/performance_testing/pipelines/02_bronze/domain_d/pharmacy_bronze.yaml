pipeline: domain_d_bronze
flowgroup: pharmacy_bronze
presets:
  - default_delta_properties
actions:
  - name: pharmacy_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: pharmacy_raw
    target: v_pharmacy_raw
    description: "Load pharmacy from raw schema"

  - name: pharmacy_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_pharmacy_raw
    target: v_pharmacy_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as pharmacy_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_pharmacy_raw
      WHERE 1=1

  - name: pharmacy_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_pharmacy_bronze_cleaned
    target: v_pharmacy_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to pharmacy"

  - name: write_pharmacy_bronze
    type: write
    source: v_pharmacy_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "pharmacy"

  - name: tst_pharmacy_bronze_completeness
    type: test
    test_type: completeness
    source: v_pharmacy_bronze_cleaned
    required_columns: [pharmacy_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-pharmacy-B01"

  - name: tst_pharmacy_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_pharmacy_bronze_cleaned
    columns: [pharmacy_key]
    on_violation: warn
    test_id: "PERF-pharmacy-B02"
