pipeline: domain_d_bronze
flowgroup: recovery_bronze
presets:
  - default_delta_properties
actions:
  - name: recovery_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: recovery_raw
    target: v_recovery_raw
    description: "Load recovery from raw schema"

  - name: recovery_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_recovery_raw
    target: v_recovery_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as recovery_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_recovery_raw
      WHERE 1=1

  - name: recovery_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_recovery_bronze_cleaned
    target: v_recovery_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to recovery"

  - name: write_recovery_bronze
    type: write
    source: v_recovery_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "recovery"

  - name: tst_recovery_bronze_completeness
    type: test
    test_type: completeness
    source: v_recovery_bronze_cleaned
    required_columns: [recovery_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-recovery-B01"

  - name: tst_recovery_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_recovery_bronze_cleaned
    columns: [recovery_key]
    on_violation: warn
    test_id: "PERF-recovery-B02"
