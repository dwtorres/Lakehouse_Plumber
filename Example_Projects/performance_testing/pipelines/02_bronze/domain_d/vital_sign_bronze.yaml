pipeline: domain_d_bronze
flowgroup: vital_sign_bronze
presets:
  - default_delta_properties
actions:
  - name: vital_sign_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: vital_sign_raw
    target: v_vital_sign_raw
    description: "Load vital_sign from raw schema"

  - name: vital_sign_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_vital_sign_raw
    target: v_vital_sign_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as vital_sign_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_vital_sign_raw

  - name: vital_sign_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_vital_sign_bronze_cleaned
    target: v_vital_sign_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for vital_sign bronze"

  - name: write_vital_sign_bronze
    type: write
    source: v_vital_sign_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "vital_sign"

  - name: vital_sign_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: vital_sign_migration
    target: v_vital_sign_migration
    description: "Load vital_sign migration data"

  - name: vital_sign_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_vital_sign_migration
    target: v_vital_sign_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as vital_sign_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_vital_sign_migration

  - name: write_vital_sign_migration
    type: write
    source: v_vital_sign_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "vital_sign"

  - name: tst_vital_sign_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_vital_sign_bronze_cleaned
    required_columns: [vital_sign_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-vital_sign-B01"

  - name: tst_vital_sign_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_vital_sign_bronze_cleaned
    columns: [vital_sign_key]
    on_violation: warn
    test_id: "PERF-vital_sign-B02"
