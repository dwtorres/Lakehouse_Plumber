pipeline: domain_d_bronze
use_template: bronze_cleanse_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: patient_bronze
    template_parameters:
      entity_name: patient
      source_table: patient_raw
    actions:
      - name: tst_patient_bronze_completeness
        type: test
        test_type: completeness
        source: v_patient_cleansed
        required_columns: [patient_key, _etl_timestamp]
        on_violation: warn
        test_id: "PERF-patient-B01"
      
      - name: tst_patient_bronze_uniqueness
        type: test
        test_type: uniqueness
        source: v_patient_cleansed
        columns: [patient_key]
        on_violation: warn
        test_id: "PERF-patient-B02"

