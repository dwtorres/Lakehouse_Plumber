pipeline: domain_d_bronze
flowgroup: telemedicine_bronze
presets:
  - default_delta_properties
actions:
  - name: telemedicine_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: telemedicine_raw
    target: v_telemedicine_raw
    description: "Load telemedicine from raw schema"

  - name: telemedicine_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_telemedicine_raw
    target: v_telemedicine_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as telemedicine_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_telemedicine_raw
      WHERE 1=1

  - name: telemedicine_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_telemedicine_bronze_cleaned
    target: v_telemedicine_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to telemedicine"

  - name: write_telemedicine_bronze
    type: write
    source: v_telemedicine_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "telemedicine"

  - name: tst_telemedicine_bronze_completeness
    type: test
    test_type: completeness
    source: v_telemedicine_bronze_cleaned
    required_columns: [telemedicine_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-telemedicine-B01"

  - name: tst_telemedicine_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_telemedicine_bronze_cleaned
    columns: [telemedicine_key]
    on_violation: warn
    test_id: "PERF-telemedicine-B02"
