pipeline: domain_g_bronze
flowgroup: plat_bronze
presets:
  - default_delta_properties
actions:
  - name: plat_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: plat_raw
    target: v_plat_raw
    description: "Load plat from raw schema"

  - name: plat_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_plat_raw
    target: v_plat_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as plat_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_plat_raw
      WHERE 1=1

  - name: plat_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_plat_bronze_cleaned
    target: v_plat_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to plat"

  - name: write_plat_bronze
    type: write
    source: v_plat_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "plat"

  - name: tst_plat_bronze_completeness
    type: test
    test_type: completeness
    source: v_plat_bronze_cleaned
    required_columns: [plat_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-plat-B01"

  - name: tst_plat_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_plat_bronze_cleaned
    columns: [plat_key]
    on_violation: warn
    test_id: "PERF-plat-B02"
