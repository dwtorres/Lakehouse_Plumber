pipeline: domain_g_bronze
flowgroup: hoa_bronze
presets:
  - default_delta_properties
actions:
  - name: hoa_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: hoa_raw
    target: v_hoa_raw
    description: "Load hoa from raw schema"

  - name: hoa_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_hoa_raw
    target: v_hoa_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as hoa_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_hoa_raw
      WHERE 1=1

  - name: hoa_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_hoa_bronze_cleaned
    target: v_hoa_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to hoa"

  - name: write_hoa_bronze
    type: write
    source: v_hoa_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "hoa"

  - name: tst_hoa_bronze_completeness
    type: test
    test_type: completeness
    source: v_hoa_bronze_cleaned
    required_columns: [hoa_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-hoa-B01"

  - name: tst_hoa_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_hoa_bronze_cleaned
    columns: [hoa_key]
    on_violation: warn
    test_id: "PERF-hoa-B02"
