pipeline: domain_g_bronze
flowgroup: staging_bronze
presets:
  - default_delta_properties
actions:
  - name: staging_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: staging_raw
    target: v_staging_raw
    description: "Load staging from raw schema"

  - name: staging_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_staging_raw
    target: v_staging_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as staging_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_staging_raw
      WHERE 1=1

  - name: staging_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_staging_bronze_cleaned
    target: v_staging_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to staging"

  - name: write_staging_bronze
    type: write
    source: v_staging_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "staging"

  - name: tst_staging_bronze_completeness
    type: test
    test_type: completeness
    source: v_staging_bronze_cleaned
    required_columns: [staging_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-staging-B01"

  - name: tst_staging_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_staging_bronze_cleaned
    columns: [staging_key]
    on_violation: warn
    test_id: "PERF-staging-B02"
