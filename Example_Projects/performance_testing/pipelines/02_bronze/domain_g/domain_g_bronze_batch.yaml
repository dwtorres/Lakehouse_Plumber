pipeline: domain_g_bronze
use_template: bronze_cleanse_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: property_bronze
    template_parameters:
      entity_name: property
      source_table: property_raw
    actions:
      - name: tst_property_bronze_completeness
        type: test
        test_type: completeness
        source: v_property_cleansed
        required_columns: [property_key, _etl_timestamp]
        on_violation: warn
        test_id: "PERF-property-B01"
      
      - name: tst_property_bronze_uniqueness
        type: test
        test_type: uniqueness
        source: v_property_cleansed
        columns: [property_key]
        on_violation: warn
        test_id: "PERF-property-B02"

