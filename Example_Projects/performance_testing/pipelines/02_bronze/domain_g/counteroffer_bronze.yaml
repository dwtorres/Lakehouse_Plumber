pipeline: domain_g_bronze
flowgroup: counteroffer_bronze
presets:
  - default_delta_properties
actions:
  - name: counteroffer_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: counteroffer_raw
    target: v_counteroffer_raw
    description: "Load counteroffer from raw schema"

  - name: counteroffer_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_counteroffer_raw
    target: v_counteroffer_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as counteroffer_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_counteroffer_raw
      WHERE 1=1

  - name: counteroffer_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_counteroffer_bronze_cleaned
    target: v_counteroffer_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to counteroffer"

  - name: write_counteroffer_bronze
    type: write
    source: v_counteroffer_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "counteroffer"

  - name: tst_counteroffer_bronze_completeness
    type: test
    test_type: completeness
    source: v_counteroffer_bronze_cleaned
    required_columns: [counteroffer_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-counteroffer-B01"

  - name: tst_counteroffer_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_counteroffer_bronze_cleaned
    columns: [counteroffer_key]
    on_violation: warn
    test_id: "PERF-counteroffer-B02"
