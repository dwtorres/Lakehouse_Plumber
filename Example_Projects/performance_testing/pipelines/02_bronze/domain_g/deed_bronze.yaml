pipeline: domain_g_bronze
flowgroup: deed_bronze
presets:
  - default_delta_properties
actions:
  - name: deed_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: deed_raw
    target: v_deed_raw
    description: "Load deed from raw schema"

  - name: deed_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_deed_raw
    target: v_deed_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as deed_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_deed_raw
      WHERE 1=1

  - name: deed_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_deed_bronze_cleaned
    target: v_deed_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to deed"

  - name: write_deed_bronze
    type: write
    source: v_deed_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "deed"

  - name: tst_deed_bronze_completeness
    type: test
    test_type: completeness
    source: v_deed_bronze_cleaned
    required_columns: [deed_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-deed-B01"

  - name: tst_deed_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_deed_bronze_cleaned
    columns: [deed_key]
    on_violation: warn
    test_id: "PERF-deed-B02"
