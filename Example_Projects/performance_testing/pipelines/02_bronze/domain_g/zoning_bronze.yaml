pipeline: domain_g_bronze
flowgroup: zoning_bronze
presets:
  - default_delta_properties
actions:
  - name: zoning_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: zoning_raw
    target: v_zoning_raw
    description: "Load zoning from raw schema"

  - name: zoning_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_zoning_raw
    target: v_zoning_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as zoning_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_zoning_raw
      WHERE 1=1

  - name: zoning_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_zoning_bronze_cleaned
    target: v_zoning_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to zoning"

  - name: write_zoning_bronze
    type: write
    source: v_zoning_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "zoning"

  - name: tst_zoning_bronze_completeness
    type: test
    test_type: completeness
    source: v_zoning_bronze_cleaned
    required_columns: [zoning_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-zoning-B01"

  - name: tst_zoning_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_zoning_bronze_cleaned
    columns: [zoning_key]
    on_violation: warn
    test_id: "PERF-zoning-B02"
