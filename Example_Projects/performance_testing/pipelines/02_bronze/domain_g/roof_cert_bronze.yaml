pipeline: domain_g_bronze
flowgroup: roof_cert_bronze
presets:
  - default_delta_properties
actions:
  - name: roof_cert_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: roof_cert_raw
    target: v_roof_cert_raw
    description: "Load roof_cert from raw schema"

  - name: roof_cert_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_roof_cert_raw
    target: v_roof_cert_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as roof_cert_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_roof_cert_raw

  - name: roof_cert_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_roof_cert_bronze_cleaned
    target: v_roof_cert_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for roof_cert bronze"

  - name: write_roof_cert_bronze
    type: write
    source: v_roof_cert_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "roof_cert"

  - name: roof_cert_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: roof_cert_migration
    target: v_roof_cert_migration
    description: "Load roof_cert migration data"

  - name: roof_cert_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_roof_cert_migration
    target: v_roof_cert_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as roof_cert_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_roof_cert_migration

  - name: write_roof_cert_migration
    type: write
    source: v_roof_cert_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "roof_cert"

  - name: tst_roof_cert_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_roof_cert_bronze_cleaned
    required_columns: [roof_cert_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-roof_cert-B01"

  - name: tst_roof_cert_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_roof_cert_bronze_cleaned
    columns: [roof_cert_key]
    on_violation: warn
    test_id: "PERF-roof_cert-B02"
