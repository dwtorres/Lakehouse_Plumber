pipeline: domain_g_bronze
flowgroup: easement_bronze
presets:
  - default_delta_properties
actions:
  - name: easement_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: easement_raw
    target: v_easement_raw
    description: "Load easement from raw schema"

  - name: easement_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_easement_raw
    target: v_easement_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as easement_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_easement_raw
      WHERE 1=1

  - name: easement_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_easement_bronze_cleaned
    target: v_easement_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to easement"

  - name: write_easement_bronze
    type: write
    source: v_easement_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "easement"

  - name: tst_easement_bronze_completeness
    type: test
    test_type: completeness
    source: v_easement_bronze_cleaned
    required_columns: [easement_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-easement-B01"

  - name: tst_easement_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_easement_bronze_cleaned
    columns: [easement_key]
    on_violation: warn
    test_id: "PERF-easement-B02"
