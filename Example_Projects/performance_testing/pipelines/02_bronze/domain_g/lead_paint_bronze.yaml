pipeline: domain_g_bronze
flowgroup: lead_paint_bronze
presets:
  - default_delta_properties
actions:
  - name: lead_paint_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: lead_paint_raw
    target: v_lead_paint_raw
    description: "Load lead_paint from raw schema"

  - name: lead_paint_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_lead_paint_raw
    target: v_lead_paint_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as lead_paint_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_lead_paint_raw
      WHERE 1=1

  - name: lead_paint_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_lead_paint_bronze_cleaned
    target: v_lead_paint_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to lead_paint"

  - name: write_lead_paint_bronze
    type: write
    source: v_lead_paint_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "lead_paint"

  - name: tst_lead_paint_bronze_completeness
    type: test
    test_type: completeness
    source: v_lead_paint_bronze_cleaned
    required_columns: [lead_paint_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-lead_paint-B01"

  - name: tst_lead_paint_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_lead_paint_bronze_cleaned
    columns: [lead_paint_key]
    on_violation: warn
    test_id: "PERF-lead_paint-B02"
