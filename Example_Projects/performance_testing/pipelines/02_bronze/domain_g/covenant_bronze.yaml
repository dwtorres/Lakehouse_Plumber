pipeline: domain_g_bronze
flowgroup: covenant_bronze
presets:
  - default_delta_properties
actions:
  - name: covenant_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: covenant_raw
    target: v_covenant_raw
    description: "Load covenant from raw schema"

  - name: covenant_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_covenant_raw
    target: v_covenant_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as covenant_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_covenant_raw
      WHERE 1=1

  - name: covenant_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_covenant_bronze_cleaned
    target: v_covenant_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to covenant"

  - name: write_covenant_bronze
    type: write
    source: v_covenant_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "covenant"

  - name: tst_covenant_bronze_completeness
    type: test
    test_type: completeness
    source: v_covenant_bronze_cleaned
    required_columns: [covenant_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-covenant-B01"

  - name: tst_covenant_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_covenant_bronze_cleaned
    columns: [covenant_key]
    on_violation: warn
    test_id: "PERF-covenant-B02"
