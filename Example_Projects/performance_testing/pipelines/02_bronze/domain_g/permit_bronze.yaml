pipeline: domain_g_bronze
flowgroup: permit_bronze
presets:
  - default_delta_properties
actions:
  - name: permit_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: permit_raw
    target: v_permit_raw
    description: "Load permit from raw schema"

  - name: permit_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_permit_raw
    target: v_permit_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as permit_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_permit_raw

  - name: permit_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_permit_bronze_cleaned
    target: v_permit_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for permit bronze"

  - name: write_permit_bronze
    type: write
    source: v_permit_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "permit"

  - name: permit_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: permit_migration
    target: v_permit_migration
    description: "Load permit migration data"

  - name: permit_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_permit_migration
    target: v_permit_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as permit_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_permit_migration

  - name: write_permit_migration
    type: write
    source: v_permit_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "permit"

  - name: tst_permit_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_permit_bronze_cleaned
    required_columns: [permit_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-permit-B01"

  - name: tst_permit_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_permit_bronze_cleaned
    columns: [permit_key]
    on_violation: warn
    test_id: "PERF-permit-B02"
