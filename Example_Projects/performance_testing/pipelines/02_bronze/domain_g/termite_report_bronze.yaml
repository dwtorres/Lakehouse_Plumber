pipeline: domain_g_bronze
flowgroup: termite_report_bronze
presets:
  - default_delta_properties
actions:
  - name: termite_report_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: termite_report_raw
    target: v_termite_report_raw
    description: "Load termite_report from raw schema"

  - name: termite_report_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_termite_report_raw
    target: v_termite_report_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as termite_report_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_termite_report_raw
      WHERE 1=1

  - name: termite_report_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_termite_report_bronze_cleaned
    target: v_termite_report_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to termite_report"

  - name: write_termite_report_bronze
    type: write
    source: v_termite_report_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "termite_report"

  - name: tst_termite_report_bronze_completeness
    type: test
    test_type: completeness
    source: v_termite_report_bronze_cleaned
    required_columns: [termite_report_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-termite_report-B01"

  - name: tst_termite_report_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_termite_report_bronze_cleaned
    columns: [termite_report_key]
    on_violation: warn
    test_id: "PERF-termite_report-B02"
