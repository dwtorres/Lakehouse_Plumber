pipeline: domain_g_bronze
flowgroup: lien_bronze
presets:
  - default_delta_properties
actions:
  - name: lien_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: lien_raw
    target: v_lien_raw
    description: "Load lien from raw schema"

  - name: lien_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_lien_raw
    target: v_lien_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as lien_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_lien_raw

  - name: lien_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_lien_bronze_cleaned
    target: v_lien_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for lien bronze"

  - name: write_lien_bronze
    type: write
    source: v_lien_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "lien"

  - name: lien_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: lien_migration
    target: v_lien_migration
    description: "Load lien migration data"

  - name: lien_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_lien_migration
    target: v_lien_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as lien_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_lien_migration

  - name: write_lien_migration
    type: write
    source: v_lien_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "lien"

  - name: tst_lien_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_lien_bronze_cleaned
    required_columns: [lien_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-lien-B01"

  - name: tst_lien_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_lien_bronze_cleaned
    columns: [lien_key]
    on_violation: warn
    test_id: "PERF-lien-B02"
