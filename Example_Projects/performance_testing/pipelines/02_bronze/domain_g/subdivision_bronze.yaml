pipeline: domain_g_bronze
flowgroup: subdivision_bronze
presets:
  - default_delta_properties
actions:
  - name: subdivision_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: subdivision_raw
    target: v_subdivision_raw
    description: "Load subdivision from raw schema"

  - name: subdivision_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_subdivision_raw
    target: v_subdivision_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as subdivision_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_subdivision_raw
      WHERE 1=1

  - name: subdivision_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_subdivision_bronze_cleaned
    target: v_subdivision_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to subdivision"

  - name: write_subdivision_bronze
    type: write
    source: v_subdivision_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "subdivision"

  - name: tst_subdivision_bronze_completeness
    type: test
    test_type: completeness
    source: v_subdivision_bronze_cleaned
    required_columns: [subdivision_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-subdivision-B01"

  - name: tst_subdivision_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_subdivision_bronze_cleaned
    columns: [subdivision_key]
    on_violation: warn
    test_id: "PERF-subdivision-B02"
