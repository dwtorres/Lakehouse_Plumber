pipeline: domain_p_bronze
flowgroup: elisa_bronze
presets:
  - default_delta_properties
actions:
  - name: elisa_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: elisa_raw
    target: v_elisa_raw
    description: "Load elisa from raw schema"

  - name: elisa_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_elisa_raw
    target: v_elisa_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as elisa_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_elisa_raw
      WHERE 1=1

  - name: elisa_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_elisa_bronze_cleaned
    target: v_elisa_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to elisa"

  - name: write_elisa_bronze
    type: write
    source: v_elisa_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "elisa"

  - name: tst_elisa_bronze_completeness
    type: test
    test_type: completeness
    source: v_elisa_bronze_cleaned
    required_columns: [elisa_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-elisa-B01"

  - name: tst_elisa_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_elisa_bronze_cleaned
    columns: [elisa_key]
    on_violation: warn
    test_id: "PERF-elisa-B02"
