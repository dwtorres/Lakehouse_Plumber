pipeline: domain_p_bronze
flowgroup: alignment_bronze
presets:
  - default_delta_properties
actions:
  - name: alignment_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: alignment_raw
    target: v_alignment_raw
    description: "Load alignment from raw schema"

  - name: alignment_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_alignment_raw
    target: v_alignment_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as alignment_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_alignment_raw
      WHERE 1=1

  - name: alignment_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_alignment_bronze_cleaned
    target: v_alignment_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to alignment"

  - name: write_alignment_bronze
    type: write
    source: v_alignment_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "alignment"

  - name: tst_alignment_bronze_completeness
    type: test
    test_type: completeness
    source: v_alignment_bronze_cleaned
    required_columns: [alignment_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-alignment-B01"

  - name: tst_alignment_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_alignment_bronze_cleaned
    columns: [alignment_key]
    on_violation: warn
    test_id: "PERF-alignment-B02"
