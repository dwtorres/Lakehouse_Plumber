pipeline: domain_p_bronze
flowgroup: western_blot_bronze
presets:
  - default_delta_properties
actions:
  - name: western_blot_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: western_blot_raw
    target: v_western_blot_raw
    description: "Load western_blot from raw schema"

  - name: western_blot_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_western_blot_raw
    target: v_western_blot_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as western_blot_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_western_blot_raw
      WHERE 1=1

  - name: western_blot_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_western_blot_bronze_cleaned
    target: v_western_blot_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to western_blot"

  - name: write_western_blot_bronze
    type: write
    source: v_western_blot_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "western_blot"

  - name: tst_western_blot_bronze_completeness
    type: test
    test_type: completeness
    source: v_western_blot_bronze_cleaned
    required_columns: [western_blot_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-western_blot-B01"

  - name: tst_western_blot_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_western_blot_bronze_cleaned
    columns: [western_blot_key]
    on_violation: warn
    test_id: "PERF-western_blot-B02"
