pipeline: domain_p_bronze
flowgroup: biomarker_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: biomarker
  source_table: biomarker_raw
actions:
  - name: tst_biomarker_bronze_completeness
    type: test
    test_type: completeness
    source: v_biomarker_cleansed
    required_columns: [biomarker_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-biomarker-B01"

  - name: tst_biomarker_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_biomarker_cleansed
    columns: [biomarker_key]
    on_violation: warn
    test_id: "PERF-biomarker-B02"
