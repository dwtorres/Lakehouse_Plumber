pipeline: domain_p_bronze
flowgroup: drug_target_bronze
presets:
  - default_delta_properties
actions:
  - name: drug_target_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: drug_target_raw
    target: v_drug_target_raw
    description: "Load drug_target from raw schema"

  - name: drug_target_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_drug_target_raw
    target: v_drug_target_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as drug_target_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_drug_target_raw
      WHERE 1=1

  - name: drug_target_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_drug_target_bronze_cleaned
    target: v_drug_target_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to drug_target"

  - name: write_drug_target_bronze
    type: write
    source: v_drug_target_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "drug_target"

  - name: tst_drug_target_bronze_completeness
    type: test
    test_type: completeness
    source: v_drug_target_bronze_cleaned
    required_columns: [drug_target_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-drug_target-B01"

  - name: tst_drug_target_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_drug_target_bronze_cleaned
    columns: [drug_target_key]
    on_violation: warn
    test_id: "PERF-drug_target-B02"
