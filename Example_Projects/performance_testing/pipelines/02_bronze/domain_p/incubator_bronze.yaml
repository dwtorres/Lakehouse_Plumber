pipeline: domain_p_bronze
flowgroup: incubator_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: incubator
  source_table: incubator_raw
actions:
  - name: tst_incubator_bronze_completeness
    type: test
    test_type: completeness
    source: v_incubator_cleansed
    required_columns: [incubator_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-incubator-B01"

  - name: tst_incubator_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_incubator_cleansed
    columns: [incubator_key]
    on_violation: warn
    test_id: "PERF-incubator-B02"
