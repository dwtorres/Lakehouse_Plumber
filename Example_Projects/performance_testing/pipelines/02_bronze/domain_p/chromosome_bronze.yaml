pipeline: domain_p_bronze
flowgroup: chromosome_bronze
presets:
  - default_delta_properties
actions:
  - name: chromosome_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: chromosome_raw
    target: v_chromosome_raw
    description: "Load chromosome from raw schema"

  - name: chromosome_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_chromosome_raw
    target: v_chromosome_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as chromosome_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_chromosome_raw
      WHERE 1=1

  - name: chromosome_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_chromosome_bronze_cleaned
    target: v_chromosome_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to chromosome"

  - name: write_chromosome_bronze
    type: write
    source: v_chromosome_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "chromosome"

  - name: tst_chromosome_bronze_completeness
    type: test
    test_type: completeness
    source: v_chromosome_bronze_cleaned
    required_columns: [chromosome_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-chromosome-B01"

  - name: tst_chromosome_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_chromosome_bronze_cleaned
    columns: [chromosome_key]
    on_violation: warn
    test_id: "PERF-chromosome-B02"
