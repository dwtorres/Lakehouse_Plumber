pipeline: domain_p_bronze
flowgroup: genome_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: genome
  source_table: genome_raw
actions:
  - name: tst_genome_bronze_completeness
    type: test
    test_type: completeness
    source: v_genome_cleansed
    required_columns: [genome_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-genome-B01"

  - name: tst_genome_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_genome_cleansed
    columns: [genome_key]
    on_violation: warn
    test_id: "PERF-genome-B02"
