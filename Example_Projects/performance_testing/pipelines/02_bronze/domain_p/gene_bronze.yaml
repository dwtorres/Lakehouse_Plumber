pipeline: domain_p_bronze
flowgroup: gene_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: gene
  source_table: gene_raw
actions:
  - name: tst_gene_bronze_completeness
    type: test
    test_type: completeness
    source: v_gene_cleansed
    required_columns: [gene_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-gene-B01"

  - name: tst_gene_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_gene_cleansed
    columns: [gene_key]
    on_violation: warn
    test_id: "PERF-gene-B02"
