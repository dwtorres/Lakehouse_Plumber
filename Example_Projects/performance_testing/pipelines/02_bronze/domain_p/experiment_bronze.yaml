pipeline: domain_p_bronze
flowgroup: experiment_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: experiment
  source_table: experiment_raw
actions:
  - name: tst_experiment_bronze_completeness
    type: test
    test_type: completeness
    source: v_experiment_cleansed
    required_columns: [experiment_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-experiment-B01"

  - name: tst_experiment_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_experiment_cleansed
    columns: [experiment_key]
    on_violation: warn
    test_id: "PERF-experiment-B02"
