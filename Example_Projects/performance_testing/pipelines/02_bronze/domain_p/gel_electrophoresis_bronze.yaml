pipeline: domain_p_bronze
flowgroup: gel_electrophoresis_bronze
presets:
  - default_delta_properties
actions:
  - name: gel_electrophoresis_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: gel_electrophoresis_raw
    target: v_gel_electrophoresis_raw
    description: "Load gel_electrophoresis from raw schema"

  - name: gel_electrophoresis_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_gel_electrophoresis_raw
    target: v_gel_electrophoresis_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as gel_electrophoresis_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_gel_electrophoresis_raw
      WHERE 1=1

  - name: gel_electrophoresis_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_gel_electrophoresis_bronze_cleaned
    target: v_gel_electrophoresis_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to gel_electrophoresis"

  - name: write_gel_electrophoresis_bronze
    type: write
    source: v_gel_electrophoresis_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "gel_electrophoresis"

  - name: tst_gel_electrophoresis_bronze_completeness
    type: test
    test_type: completeness
    source: v_gel_electrophoresis_bronze_cleaned
    required_columns: [gel_electrophoresis_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-gel_electrophoresis-B01"

  - name: tst_gel_electrophoresis_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_gel_electrophoresis_bronze_cleaned
    columns: [gel_electrophoresis_key]
    on_violation: warn
    test_id: "PERF-gel_electrophoresis-B02"
