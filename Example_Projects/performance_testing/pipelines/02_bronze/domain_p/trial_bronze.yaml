pipeline: domain_p_bronze
flowgroup: trial_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: trial
  source_table: trial_raw
actions:
  - name: tst_trial_bronze_completeness
    type: test
    test_type: completeness
    source: v_trial_cleansed
    required_columns: [trial_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-trial-B01"

  - name: tst_trial_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_trial_cleansed
    columns: [trial_key]
    on_violation: warn
    test_id: "PERF-trial-B02"
