pipeline: domain_p_bronze
flowgroup: phenotype_bronze
presets:
  - default_delta_properties
actions:
  - name: phenotype_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: phenotype_raw
    target: v_phenotype_raw
    description: "Load phenotype from raw schema"

  - name: phenotype_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_phenotype_raw
    target: v_phenotype_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as phenotype_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_phenotype_raw
      WHERE 1=1

  - name: phenotype_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_phenotype_bronze_cleaned
    target: v_phenotype_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to phenotype"

  - name: write_phenotype_bronze
    type: write
    source: v_phenotype_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "phenotype"

  - name: tst_phenotype_bronze_completeness
    type: test
    test_type: completeness
    source: v_phenotype_bronze_cleaned
    required_columns: [phenotype_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-phenotype-B01"

  - name: tst_phenotype_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_phenotype_bronze_cleaned
    columns: [phenotype_key]
    on_violation: warn
    test_id: "PERF-phenotype-B02"
