pipeline: domain_p_bronze
flowgroup: placebo_bronze
presets:
  - default_delta_properties
actions:
  - name: placebo_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: placebo_raw
    target: v_placebo_raw
    description: "Load placebo from raw schema"

  - name: placebo_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_placebo_raw
    target: v_placebo_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as placebo_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_placebo_raw
      WHERE 1=1

  - name: placebo_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_placebo_bronze_cleaned
    target: v_placebo_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to placebo"

  - name: write_placebo_bronze
    type: write
    source: v_placebo_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "placebo"

  - name: tst_placebo_bronze_completeness
    type: test
    test_type: completeness
    source: v_placebo_bronze_cleaned
    required_columns: [placebo_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-placebo-B01"

  - name: tst_placebo_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_placebo_bronze_cleaned
    columns: [placebo_key]
    on_violation: warn
    test_id: "PERF-placebo-B02"
