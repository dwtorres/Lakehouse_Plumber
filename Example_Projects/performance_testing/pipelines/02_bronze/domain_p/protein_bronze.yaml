pipeline: domain_p_bronze
flowgroup: protein_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: protein
  source_table: protein_raw
actions:
  - name: tst_protein_bronze_completeness
    type: test
    test_type: completeness
    source: v_protein_cleansed
    required_columns: [protein_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-protein-B01"

  - name: tst_protein_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_protein_cleansed
    columns: [protein_key]
    on_violation: warn
    test_id: "PERF-protein-B02"
