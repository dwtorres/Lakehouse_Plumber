pipeline: domain_p_bronze
flowgroup: mutation_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: mutation
  source_table: mutation_raw
actions:
  - name: tst_mutation_bronze_completeness
    type: test
    test_type: completeness
    source: v_mutation_cleansed
    required_columns: [mutation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-mutation-B01"

  - name: tst_mutation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_mutation_cleansed
    columns: [mutation_key]
    on_violation: warn
    test_id: "PERF-mutation-B02"
