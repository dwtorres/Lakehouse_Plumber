pipeline: domain_p_bronze
flowgroup: microscope_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: microscope
  source_table: microscope_raw
actions:
  - name: tst_microscope_bronze_completeness
    type: test
    test_type: completeness
    source: v_microscope_cleansed
    required_columns: [microscope_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-microscope-B01"

  - name: tst_microscope_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_microscope_cleansed
    columns: [microscope_key]
    on_violation: warn
    test_id: "PERF-microscope-B02"
