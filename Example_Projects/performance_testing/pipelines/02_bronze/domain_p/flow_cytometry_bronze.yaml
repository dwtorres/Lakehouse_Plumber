pipeline: domain_p_bronze
flowgroup: flow_cytometry_bronze
presets:
  - default_delta_properties
actions:
  - name: flow_cytometry_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: flow_cytometry_raw
    target: v_flow_cytometry_raw
    description: "Load flow_cytometry from raw schema"

  - name: flow_cytometry_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_flow_cytometry_raw
    target: v_flow_cytometry_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as flow_cytometry_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_flow_cytometry_raw
      WHERE 1=1

  - name: flow_cytometry_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_flow_cytometry_bronze_cleaned
    target: v_flow_cytometry_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to flow_cytometry"

  - name: write_flow_cytometry_bronze
    type: write
    source: v_flow_cytometry_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "flow_cytometry"

  - name: tst_flow_cytometry_bronze_completeness
    type: test
    test_type: completeness
    source: v_flow_cytometry_bronze_cleaned
    required_columns: [flow_cytometry_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-flow_cytometry-B01"

  - name: tst_flow_cytometry_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_flow_cytometry_bronze_cleaned
    columns: [flow_cytometry_key]
    on_violation: warn
    test_id: "PERF-flow_cytometry-B02"
