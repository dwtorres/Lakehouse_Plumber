pipeline: domain_p_bronze
flowgroup: reagent_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: reagent
  source_table: reagent_raw
actions:
  - name: tst_reagent_bronze_completeness
    type: test
    test_type: completeness
    source: v_reagent_cleansed
    required_columns: [reagent_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-reagent-B01"

  - name: tst_reagent_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_reagent_cleansed
    columns: [reagent_key]
    on_violation: warn
    test_id: "PERF-reagent-B02"
