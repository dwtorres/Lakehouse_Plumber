pipeline: domain_p_bronze
flowgroup: allele_bronze
presets:
  - default_delta_properties
actions:
  - name: allele_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: allele_raw
    target: v_allele_raw
    description: "Load allele from raw schema"

  - name: allele_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_allele_raw
    target: v_allele_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as allele_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_allele_raw
      WHERE 1=1

  - name: allele_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_allele_bronze_cleaned
    target: v_allele_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to allele"

  - name: write_allele_bronze
    type: write
    source: v_allele_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "allele"

  - name: tst_allele_bronze_completeness
    type: test
    test_type: completeness
    source: v_allele_bronze_cleaned
    required_columns: [allele_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-allele-B01"

  - name: tst_allele_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_allele_bronze_cleaned
    columns: [allele_key]
    on_violation: warn
    test_id: "PERF-allele-B02"
