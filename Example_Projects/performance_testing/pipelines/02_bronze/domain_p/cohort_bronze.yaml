pipeline: domain_p_bronze
flowgroup: cohort_bronze
presets:
  - default_delta_properties
actions:
  - name: cohort_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: cohort_raw
    target: v_cohort_raw
    description: "Load cohort from raw schema"

  - name: cohort_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_cohort_raw
    target: v_cohort_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as cohort_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_cohort_raw
      WHERE 1=1

  - name: cohort_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_cohort_bronze_cleaned
    target: v_cohort_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to cohort"

  - name: write_cohort_bronze
    type: write
    source: v_cohort_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "cohort"

  - name: tst_cohort_bronze_completeness
    type: test
    test_type: completeness
    source: v_cohort_bronze_cleaned
    required_columns: [cohort_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-cohort-B01"

  - name: tst_cohort_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_cohort_bronze_cleaned
    columns: [cohort_key]
    on_violation: warn
    test_id: "PERF-cohort-B02"
