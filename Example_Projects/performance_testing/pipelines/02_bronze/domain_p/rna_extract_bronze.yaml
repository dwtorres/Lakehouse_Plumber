pipeline: domain_p_bronze
flowgroup: rna_extract_bronze
presets:
  - default_delta_properties
actions:
  - name: rna_extract_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: rna_extract_raw
    target: v_rna_extract_raw
    description: "Load rna_extract from raw schema"

  - name: rna_extract_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_rna_extract_raw
    target: v_rna_extract_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as rna_extract_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_rna_extract_raw
      WHERE 1=1

  - name: rna_extract_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_rna_extract_bronze_cleaned
    target: v_rna_extract_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to rna_extract"

  - name: write_rna_extract_bronze
    type: write
    source: v_rna_extract_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "rna_extract"

  - name: tst_rna_extract_bronze_completeness
    type: test
    test_type: completeness
    source: v_rna_extract_bronze_cleaned
    required_columns: [rna_extract_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-rna_extract-B01"

  - name: tst_rna_extract_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_rna_extract_bronze_cleaned
    columns: [rna_extract_key]
    on_violation: warn
    test_id: "PERF-rna_extract-B02"
