pipeline: domain_p_bronze
flowgroup: variant_call_bronze
presets:
  - default_delta_properties
actions:
  - name: variant_call_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: variant_call_raw
    target: v_variant_call_raw
    description: "Load variant_call from raw schema"

  - name: variant_call_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_variant_call_raw
    target: v_variant_call_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as variant_call_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_variant_call_raw
      WHERE 1=1

  - name: variant_call_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_variant_call_bronze_cleaned
    target: v_variant_call_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to variant_call"

  - name: write_variant_call_bronze
    type: write
    source: v_variant_call_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "variant_call"

  - name: tst_variant_call_bronze_completeness
    type: test
    test_type: completeness
    source: v_variant_call_bronze_cleaned
    required_columns: [variant_call_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-variant_call-B01"

  - name: tst_variant_call_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_variant_call_bronze_cleaned
    columns: [variant_call_key]
    on_violation: warn
    test_id: "PERF-variant_call-B02"
