pipeline: domain_p_bronze
flowgroup: petri_dish_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: petri_dish
  source_table: petri_dish_raw
actions:
  - name: tst_petri_dish_bronze_completeness
    type: test
    test_type: completeness
    source: v_petri_dish_cleansed
    required_columns: [petri_dish_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-petri_dish-B01"

  - name: tst_petri_dish_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_petri_dish_cleansed
    columns: [petri_dish_key]
    on_violation: warn
    test_id: "PERF-petri_dish-B02"
