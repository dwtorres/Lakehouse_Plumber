pipeline: domain_p_bronze
flowgroup: assay_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: assay
  source_table: assay_raw
actions:
  - name: tst_assay_bronze_completeness
    type: test
    test_type: completeness
    source: v_assay_cleansed
    required_columns: [assay_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-assay-B01"

  - name: tst_assay_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_assay_cleansed
    columns: [assay_key]
    on_violation: warn
    test_id: "PERF-assay-B02"
