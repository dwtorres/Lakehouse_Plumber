pipeline: domain_p_bronze
flowgroup: genotype_bronze
presets:
  - default_delta_properties
actions:
  - name: genotype_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: genotype_raw
    target: v_genotype_raw
    description: "Load genotype from raw schema"

  - name: genotype_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_genotype_raw
    target: v_genotype_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as genotype_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_genotype_raw

  - name: genotype_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_genotype_bronze_cleaned
    target: v_genotype_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for genotype bronze"

  - name: write_genotype_bronze
    type: write
    source: v_genotype_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "genotype"

  - name: genotype_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: genotype_migration
    target: v_genotype_migration
    description: "Load genotype migration data"

  - name: genotype_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_genotype_migration
    target: v_genotype_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as genotype_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_genotype_migration

  - name: write_genotype_migration
    type: write
    source: v_genotype_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "genotype"

  - name: tst_genotype_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_genotype_bronze_cleaned
    required_columns: [genotype_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-genotype-B01"

  - name: tst_genotype_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_genotype_bronze_cleaned
    columns: [genotype_key]
    on_violation: warn
    test_id: "PERF-genotype-B02"
