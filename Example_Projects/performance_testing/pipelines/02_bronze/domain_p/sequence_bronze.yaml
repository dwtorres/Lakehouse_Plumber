pipeline: domain_p_bronze
flowgroup: sequence_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: sequence
  source_table: sequence_raw
actions:
  - name: tst_sequence_bronze_completeness
    type: test
    test_type: completeness
    source: v_sequence_cleansed
    required_columns: [sequence_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-sequence-B01"

  - name: tst_sequence_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_sequence_cleansed
    columns: [sequence_key]
    on_violation: warn
    test_id: "PERF-sequence-B02"
