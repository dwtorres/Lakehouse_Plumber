pipeline: domain_r_bronze
flowgroup: footprint_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: footprint
  source_table: footprint_raw
actions:
  - name: tst_footprint_bronze_completeness
    type: test
    test_type: completeness
    source: v_footprint_cleansed
    required_columns: [footprint_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-footprint-B01"

  - name: tst_footprint_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_footprint_cleansed
    columns: [footprint_key]
    on_violation: warn
    test_id: "PERF-footprint-B02"
