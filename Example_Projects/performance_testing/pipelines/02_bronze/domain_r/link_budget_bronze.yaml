pipeline: domain_r_bronze
flowgroup: link_budget_bronze
presets:
  - default_delta_properties
actions:
  - name: link_budget_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: link_budget_raw
    target: v_link_budget_raw
    description: "Load link_budget from raw schema"

  - name: link_budget_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_link_budget_raw
    target: v_link_budget_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as link_budget_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_link_budget_raw

  - name: link_budget_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_link_budget_bronze_cleaned
    target: v_link_budget_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for link_budget bronze"

  - name: write_link_budget_bronze
    type: write
    source: v_link_budget_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "link_budget"

  - name: link_budget_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: link_budget_migration
    target: v_link_budget_migration
    description: "Load link_budget migration data"

  - name: link_budget_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_link_budget_migration
    target: v_link_budget_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as link_budget_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_link_budget_migration

  - name: write_link_budget_migration
    type: write
    source: v_link_budget_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "link_budget"

  - name: tst_link_budget_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_link_budget_bronze_cleaned
    required_columns: [link_budget_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-link_budget-B01"

  - name: tst_link_budget_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_link_budget_bronze_cleaned
    columns: [link_budget_key]
    on_violation: warn
    test_id: "PERF-link_budget-B02"
