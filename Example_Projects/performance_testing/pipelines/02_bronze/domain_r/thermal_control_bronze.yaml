pipeline: domain_r_bronze
flowgroup: thermal_control_bronze
presets:
  - default_delta_properties
actions:
  - name: thermal_control_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: thermal_control_raw
    target: v_thermal_control_raw
    description: "Load thermal_control from raw schema"

  - name: thermal_control_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_thermal_control_raw
    target: v_thermal_control_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as thermal_control_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_thermal_control_raw
      WHERE 1=1

  - name: thermal_control_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_thermal_control_bronze_cleaned
    target: v_thermal_control_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to thermal_control"

  - name: write_thermal_control_bronze
    type: write
    source: v_thermal_control_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "thermal_control"

  - name: tst_thermal_control_bronze_completeness
    type: test
    test_type: completeness
    source: v_thermal_control_bronze_cleaned
    required_columns: [thermal_control_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-thermal_control-B01"

  - name: tst_thermal_control_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_thermal_control_bronze_cleaned
    columns: [thermal_control_key]
    on_violation: warn
    test_id: "PERF-thermal_control-B02"
