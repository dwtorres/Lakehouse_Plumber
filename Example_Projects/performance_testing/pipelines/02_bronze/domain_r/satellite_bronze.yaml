pipeline: domain_r_bronze
flowgroup: satellite_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: satellite
  source_table: satellite_raw
actions:
  - name: tst_satellite_bronze_completeness
    type: test
    test_type: completeness
    source: v_satellite_cleansed
    required_columns: [satellite_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-satellite-B01"

  - name: tst_satellite_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_satellite_cleansed
    columns: [satellite_key]
    on_violation: warn
    test_id: "PERF-satellite-B02"
