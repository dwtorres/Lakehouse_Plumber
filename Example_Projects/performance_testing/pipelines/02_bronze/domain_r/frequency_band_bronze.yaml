pipeline: domain_r_bronze
flowgroup: frequency_band_bronze
presets:
  - default_delta_properties
actions:
  - name: frequency_band_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: frequency_band_raw
    target: v_frequency_band_raw
    description: "Load frequency_band from raw schema"

  - name: frequency_band_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_frequency_band_raw
    target: v_frequency_band_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as frequency_band_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_frequency_band_raw
      WHERE 1=1

  - name: frequency_band_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_frequency_band_bronze_cleaned
    target: v_frequency_band_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to frequency_band"

  - name: write_frequency_band_bronze
    type: write
    source: v_frequency_band_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "frequency_band"

  - name: tst_frequency_band_bronze_completeness
    type: test
    test_type: completeness
    source: v_frequency_band_bronze_cleaned
    required_columns: [frequency_band_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-frequency_band-B01"

  - name: tst_frequency_band_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_frequency_band_bronze_cleaned
    columns: [frequency_band_key]
    on_violation: warn
    test_id: "PERF-frequency_band-B02"
