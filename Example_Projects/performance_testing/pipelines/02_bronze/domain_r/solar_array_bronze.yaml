pipeline: domain_r_bronze
flowgroup: solar_array_bronze
presets:
  - default_delta_properties
actions:
  - name: solar_array_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: solar_array_raw
    target: v_solar_array_raw
    description: "Load solar_array from raw schema"

  - name: solar_array_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_solar_array_raw
    target: v_solar_array_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as solar_array_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_solar_array_raw
      WHERE 1=1

  - name: solar_array_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_solar_array_bronze_cleaned
    target: v_solar_array_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to solar_array"

  - name: write_solar_array_bronze
    type: write
    source: v_solar_array_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "solar_array"

  - name: tst_solar_array_bronze_completeness
    type: test
    test_type: completeness
    source: v_solar_array_bronze_cleaned
    required_columns: [solar_array_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-solar_array-B01"

  - name: tst_solar_array_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_solar_array_bronze_cleaned
    columns: [solar_array_key]
    on_violation: warn
    test_id: "PERF-solar_array-B02"
