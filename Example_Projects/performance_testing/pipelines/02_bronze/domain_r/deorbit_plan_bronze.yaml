pipeline: domain_r_bronze
flowgroup: deorbit_plan_bronze
presets:
  - default_delta_properties
actions:
  - name: deorbit_plan_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: deorbit_plan_raw
    target: v_deorbit_plan_raw
    description: "Load deorbit_plan from raw schema"

  - name: deorbit_plan_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_deorbit_plan_raw
    target: v_deorbit_plan_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as deorbit_plan_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_deorbit_plan_raw
      WHERE 1=1

  - name: deorbit_plan_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_deorbit_plan_bronze_cleaned
    target: v_deorbit_plan_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to deorbit_plan"

  - name: write_deorbit_plan_bronze
    type: write
    source: v_deorbit_plan_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "deorbit_plan"

  - name: tst_deorbit_plan_bronze_completeness
    type: test
    test_type: completeness
    source: v_deorbit_plan_bronze_cleaned
    required_columns: [deorbit_plan_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-deorbit_plan-B01"

  - name: tst_deorbit_plan_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_deorbit_plan_bronze_cleaned
    columns: [deorbit_plan_key]
    on_violation: warn
    test_id: "PERF-deorbit_plan-B02"
