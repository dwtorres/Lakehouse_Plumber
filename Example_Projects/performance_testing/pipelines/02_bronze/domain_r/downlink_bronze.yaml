pipeline: domain_r_bronze
flowgroup: downlink_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: downlink
  source_table: downlink_raw
actions:
  - name: tst_downlink_bronze_completeness
    type: test
    test_type: completeness
    source: v_downlink_cleansed
    required_columns: [downlink_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-downlink-B01"

  - name: tst_downlink_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_downlink_cleansed
    columns: [downlink_key]
    on_violation: warn
    test_id: "PERF-downlink-B02"
