pipeline: domain_r_bronze
flowgroup: bandwidth_alloc_bronze
presets:
  - default_delta_properties
actions:
  - name: bandwidth_alloc_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: bandwidth_alloc_raw
    target: v_bandwidth_alloc_raw
    description: "Load bandwidth_alloc from raw schema"

  - name: bandwidth_alloc_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_bandwidth_alloc_raw
    target: v_bandwidth_alloc_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as bandwidth_alloc_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_bandwidth_alloc_raw
      WHERE 1=1

  - name: bandwidth_alloc_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_bandwidth_alloc_bronze_cleaned
    target: v_bandwidth_alloc_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to bandwidth_alloc"

  - name: write_bandwidth_alloc_bronze
    type: write
    source: v_bandwidth_alloc_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "bandwidth_alloc"

  - name: tst_bandwidth_alloc_bronze_completeness
    type: test
    test_type: completeness
    source: v_bandwidth_alloc_bronze_cleaned
    required_columns: [bandwidth_alloc_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-bandwidth_alloc-B01"

  - name: tst_bandwidth_alloc_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_bandwidth_alloc_bronze_cleaned
    columns: [bandwidth_alloc_key]
    on_violation: warn
    test_id: "PERF-bandwidth_alloc-B02"
