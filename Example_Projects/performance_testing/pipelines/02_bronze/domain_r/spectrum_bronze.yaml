pipeline: domain_r_bronze
flowgroup: spectrum_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: spectrum
  source_table: spectrum_raw
actions:
  - name: tst_spectrum_bronze_completeness
    type: test
    test_type: completeness
    source: v_spectrum_cleansed
    required_columns: [spectrum_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-spectrum-B01"

  - name: tst_spectrum_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_spectrum_cleansed
    columns: [spectrum_key]
    on_violation: warn
    test_id: "PERF-spectrum-B02"
