pipeline: domain_r_bronze
flowgroup: doppler_shift_bronze
presets:
  - default_delta_properties
actions:
  - name: doppler_shift_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: doppler_shift_raw
    target: v_doppler_shift_raw
    description: "Load doppler_shift from raw schema"

  - name: doppler_shift_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_doppler_shift_raw
    target: v_doppler_shift_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as doppler_shift_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_doppler_shift_raw
      WHERE 1=1

  - name: doppler_shift_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_doppler_shift_bronze_cleaned
    target: v_doppler_shift_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to doppler_shift"

  - name: write_doppler_shift_bronze
    type: write
    source: v_doppler_shift_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "doppler_shift"

  - name: tst_doppler_shift_bronze_completeness
    type: test
    test_type: completeness
    source: v_doppler_shift_bronze_cleaned
    required_columns: [doppler_shift_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-doppler_shift-B01"

  - name: tst_doppler_shift_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_doppler_shift_bronze_cleaned
    columns: [doppler_shift_key]
    on_violation: warn
    test_id: "PERF-doppler_shift-B02"
