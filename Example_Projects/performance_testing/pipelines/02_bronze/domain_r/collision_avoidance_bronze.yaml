pipeline: domain_r_bronze
flowgroup: collision_avoidance_bronze
presets:
  - default_delta_properties
actions:
  - name: collision_avoidance_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: collision_avoidance_raw
    target: v_collision_avoidance_raw
    description: "Load collision_avoidance from raw schema"

  - name: collision_avoidance_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_collision_avoidance_raw
    target: v_collision_avoidance_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as collision_avoidance_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_collision_avoidance_raw
      WHERE 1=1

  - name: collision_avoidance_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_collision_avoidance_bronze_cleaned
    target: v_collision_avoidance_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to collision_avoidance"

  - name: write_collision_avoidance_bronze
    type: write
    source: v_collision_avoidance_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "collision_avoidance"

  - name: tst_collision_avoidance_bronze_completeness
    type: test
    test_type: completeness
    source: v_collision_avoidance_bronze_cleaned
    required_columns: [collision_avoidance_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-collision_avoidance-B01"

  - name: tst_collision_avoidance_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_collision_avoidance_bronze_cleaned
    columns: [collision_avoidance_key]
    on_violation: warn
    test_id: "PERF-collision_avoidance-B02"
