pipeline: domain_r_bronze
flowgroup: multiplexing_bronze
presets:
  - default_delta_properties
actions:
  - name: multiplexing_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: multiplexing_raw
    target: v_multiplexing_raw
    description: "Load multiplexing from raw schema"

  - name: multiplexing_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_multiplexing_raw
    target: v_multiplexing_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as multiplexing_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_multiplexing_raw
      WHERE 1=1

  - name: multiplexing_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_multiplexing_bronze_cleaned
    target: v_multiplexing_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to multiplexing"

  - name: write_multiplexing_bronze
    type: write
    source: v_multiplexing_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "multiplexing"

  - name: tst_multiplexing_bronze_completeness
    type: test
    test_type: completeness
    source: v_multiplexing_bronze_cleaned
    required_columns: [multiplexing_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-multiplexing-B01"

  - name: tst_multiplexing_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_multiplexing_bronze_cleaned
    columns: [multiplexing_key]
    on_violation: warn
    test_id: "PERF-multiplexing-B02"
