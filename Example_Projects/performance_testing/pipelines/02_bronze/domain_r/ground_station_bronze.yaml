pipeline: domain_r_bronze
flowgroup: ground_station_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: ground_station
  source_table: ground_station_raw
actions:
  - name: tst_ground_station_bronze_completeness
    type: test
    test_type: completeness
    source: v_ground_station_cleansed
    required_columns: [ground_station_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-ground_station-B01"

  - name: tst_ground_station_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_ground_station_cleansed
    columns: [ground_station_key]
    on_violation: warn
    test_id: "PERF-ground_station-B02"
