pipeline: domain_r_bronze
flowgroup: ranging_bronze
presets:
  - default_delta_properties
actions:
  - name: ranging_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: ranging_raw
    target: v_ranging_raw
    description: "Load ranging from raw schema"

  - name: ranging_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_ranging_raw
    target: v_ranging_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as ranging_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_ranging_raw
      WHERE 1=1

  - name: ranging_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_ranging_bronze_cleaned
    target: v_ranging_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to ranging"

  - name: write_ranging_bronze
    type: write
    source: v_ranging_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "ranging"

  - name: tst_ranging_bronze_completeness
    type: test
    test_type: completeness
    source: v_ranging_bronze_cleaned
    required_columns: [ranging_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-ranging-B01"

  - name: tst_ranging_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_ranging_bronze_cleaned
    columns: [ranging_key]
    on_violation: warn
    test_id: "PERF-ranging-B02"
