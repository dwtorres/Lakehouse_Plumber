pipeline: domain_r_bronze
flowgroup: propulsion_bronze
presets:
  - default_delta_properties
actions:
  - name: propulsion_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: propulsion_raw
    target: v_propulsion_raw
    description: "Load propulsion from raw schema"

  - name: propulsion_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_propulsion_raw
    target: v_propulsion_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as propulsion_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_propulsion_raw
      WHERE 1=1

  - name: propulsion_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_propulsion_bronze_cleaned
    target: v_propulsion_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to propulsion"

  - name: write_propulsion_bronze
    type: write
    source: v_propulsion_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "propulsion"

  - name: tst_propulsion_bronze_completeness
    type: test
    test_type: completeness
    source: v_propulsion_bronze_cleaned
    required_columns: [propulsion_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-propulsion-B01"

  - name: tst_propulsion_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_propulsion_bronze_cleaned
    columns: [propulsion_key]
    on_violation: warn
    test_id: "PERF-propulsion-B02"
