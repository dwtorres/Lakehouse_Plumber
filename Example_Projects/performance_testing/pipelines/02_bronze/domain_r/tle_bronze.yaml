pipeline: domain_r_bronze
flowgroup: tle_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: tle
  source_table: tle_raw
actions:
  - name: tst_tle_bronze_completeness
    type: test
    test_type: completeness
    source: v_tle_cleansed
    required_columns: [tle_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-tle-B01"

  - name: tst_tle_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_tle_cleansed
    columns: [tle_key]
    on_violation: warn
    test_id: "PERF-tle-B02"
