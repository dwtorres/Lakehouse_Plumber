pipeline: domain_r_bronze
flowgroup: telemetry_frame_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: telemetry_frame
  source_table: telemetry_frame_raw
actions:
  - name: tst_telemetry_frame_bronze_completeness
    type: test
    test_type: completeness
    source: v_telemetry_frame_cleansed
    required_columns: [telemetry_frame_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-telemetry_frame-B01"

  - name: tst_telemetry_frame_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_telemetry_frame_cleansed
    columns: [telemetry_frame_key]
    on_violation: warn
    test_id: "PERF-telemetry_frame-B02"
