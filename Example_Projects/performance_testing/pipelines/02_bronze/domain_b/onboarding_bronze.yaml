pipeline: domain_b_bronze
flowgroup: onboarding_bronze
presets:
  - default_delta_properties
actions:
  - name: onboarding_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: onboarding_raw
    target: v_onboarding_raw
    description: "Load onboarding from raw schema"

  - name: onboarding_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_onboarding_raw
    target: v_onboarding_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as onboarding_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_onboarding_raw
      WHERE 1=1

  - name: onboarding_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_onboarding_bronze_cleaned
    target: v_onboarding_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to onboarding"

  - name: write_onboarding_bronze
    type: write
    source: v_onboarding_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "onboarding"

  - name: tst_onboarding_bronze_completeness
    type: test
    test_type: completeness
    source: v_onboarding_bronze_cleaned
    required_columns: [onboarding_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-onboarding-B01"

  - name: tst_onboarding_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_onboarding_bronze_cleaned
    columns: [onboarding_key]
    on_violation: warn
    test_id: "PERF-onboarding-B02"
