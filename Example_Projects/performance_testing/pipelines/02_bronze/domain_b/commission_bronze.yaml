pipeline: domain_b_bronze
flowgroup: commission_bronze
presets:
  - default_delta_properties
actions:
  - name: commission_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: commission_raw
    target: v_commission_raw
    description: "Load commission from raw schema"

  - name: commission_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_commission_raw
    target: v_commission_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as commission_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_commission_raw
      WHERE 1=1

  - name: commission_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_commission_bronze_cleaned
    target: v_commission_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to commission"

  - name: write_commission_bronze
    type: write
    source: v_commission_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "commission"

  - name: tst_commission_bronze_completeness
    type: test
    test_type: completeness
    source: v_commission_bronze_cleaned
    required_columns: [commission_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-commission-B01"

  - name: tst_commission_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_commission_bronze_cleaned
    columns: [commission_key]
    on_violation: warn
    test_id: "PERF-commission-B02"
