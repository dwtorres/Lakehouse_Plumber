pipeline: domain_b_bronze
flowgroup: alumni_bronze
presets:
  - default_delta_properties
actions:
  - name: alumni_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: alumni_raw
    target: v_alumni_raw
    description: "Load alumni from raw schema"

  - name: alumni_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_alumni_raw
    target: v_alumni_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as alumni_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_alumni_raw
      WHERE 1=1

  - name: alumni_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_alumni_bronze_cleaned
    target: v_alumni_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to alumni"

  - name: write_alumni_bronze
    type: write
    source: v_alumni_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "alumni"

  - name: tst_alumni_bronze_completeness
    type: test
    test_type: completeness
    source: v_alumni_bronze_cleaned
    required_columns: [alumni_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-alumni-B01"

  - name: tst_alumni_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_alumni_bronze_cleaned
    columns: [alumni_key]
    on_violation: warn
    test_id: "PERF-alumni-B02"
