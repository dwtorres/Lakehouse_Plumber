pipeline: domain_b_bronze
flowgroup: offboarding_bronze
presets:
  - default_delta_properties
actions:
  - name: offboarding_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: offboarding_raw
    target: v_offboarding_raw
    description: "Load offboarding from raw schema"

  - name: offboarding_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_offboarding_raw
    target: v_offboarding_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as offboarding_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_offboarding_raw
      WHERE 1=1

  - name: offboarding_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_offboarding_bronze_cleaned
    target: v_offboarding_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to offboarding"

  - name: write_offboarding_bronze
    type: write
    source: v_offboarding_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "offboarding"

  - name: tst_offboarding_bronze_completeness
    type: test
    test_type: completeness
    source: v_offboarding_bronze_cleaned
    required_columns: [offboarding_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-offboarding-B01"

  - name: tst_offboarding_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_offboarding_bronze_cleaned
    columns: [offboarding_key]
    on_violation: warn
    test_id: "PERF-offboarding-B02"
