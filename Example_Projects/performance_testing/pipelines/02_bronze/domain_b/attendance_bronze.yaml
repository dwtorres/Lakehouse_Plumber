pipeline: domain_b_bronze
flowgroup: attendance_bronze
presets:
  - default_delta_properties
actions:
  - name: attendance_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: attendance_raw
    target: v_attendance_raw
    description: "Load attendance from raw schema"

  - name: attendance_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_attendance_raw
    target: v_attendance_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as attendance_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_attendance_raw
      WHERE 1=1

  - name: attendance_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_attendance_bronze_cleaned
    target: v_attendance_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to attendance"

  - name: write_attendance_bronze
    type: write
    source: v_attendance_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "attendance"

  - name: tst_attendance_bronze_completeness
    type: test
    test_type: completeness
    source: v_attendance_bronze_cleaned
    required_columns: [attendance_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-attendance-B01"

  - name: tst_attendance_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_attendance_bronze_cleaned
    columns: [attendance_key]
    on_violation: warn
    test_id: "PERF-attendance-B02"
