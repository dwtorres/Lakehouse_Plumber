pipeline: domain_b_bronze
flowgroup: overtime_bronze
presets:
  - default_delta_properties
actions:
  - name: overtime_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: overtime_raw
    target: v_overtime_raw
    description: "Load overtime from raw schema"

  - name: overtime_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_overtime_raw
    target: v_overtime_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as overtime_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_overtime_raw
      WHERE 1=1

  - name: overtime_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_overtime_bronze_cleaned
    target: v_overtime_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to overtime"

  - name: write_overtime_bronze
    type: write
    source: v_overtime_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "overtime"

  - name: tst_overtime_bronze_completeness
    type: test
    test_type: completeness
    source: v_overtime_bronze_cleaned
    required_columns: [overtime_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-overtime-B01"

  - name: tst_overtime_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_overtime_bronze_cleaned
    columns: [overtime_key]
    on_violation: warn
    test_id: "PERF-overtime-B02"
