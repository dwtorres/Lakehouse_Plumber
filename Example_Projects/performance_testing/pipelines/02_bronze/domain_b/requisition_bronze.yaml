pipeline: domain_b_bronze
flowgroup: requisition_bronze
presets:
  - default_delta_properties
actions:
  - name: requisition_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: requisition_raw
    target: v_requisition_raw
    description: "Load requisition from raw schema"

  - name: requisition_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_requisition_raw
    target: v_requisition_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as requisition_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_requisition_raw

  - name: requisition_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_requisition_bronze_cleaned
    target: v_requisition_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for requisition bronze"

  - name: write_requisition_bronze
    type: write
    source: v_requisition_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "requisition"

  - name: requisition_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: requisition_migration
    target: v_requisition_migration
    description: "Load requisition migration data"

  - name: requisition_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_requisition_migration
    target: v_requisition_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as requisition_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_requisition_migration

  - name: write_requisition_migration
    type: write
    source: v_requisition_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "requisition"

  - name: tst_requisition_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_requisition_bronze_cleaned
    required_columns: [requisition_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-requisition-B01"

  - name: tst_requisition_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_requisition_bronze_cleaned
    columns: [requisition_key]
    on_violation: warn
    test_id: "PERF-requisition-B02"
