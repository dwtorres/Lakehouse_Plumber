pipeline: domain_b_bronze
flowgroup: skill_matrix_bronze
presets:
  - default_delta_properties
actions:
  - name: skill_matrix_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: skill_matrix_raw
    target: v_skill_matrix_raw
    description: "Load skill_matrix from raw schema"

  - name: skill_matrix_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_skill_matrix_raw
    target: v_skill_matrix_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as skill_matrix_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_skill_matrix_raw
      WHERE 1=1

  - name: skill_matrix_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_skill_matrix_bronze_cleaned
    target: v_skill_matrix_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to skill_matrix"

  - name: write_skill_matrix_bronze
    type: write
    source: v_skill_matrix_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "skill_matrix"

  - name: tst_skill_matrix_bronze_completeness
    type: test
    test_type: completeness
    source: v_skill_matrix_bronze_cleaned
    required_columns: [skill_matrix_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-skill_matrix-B01"

  - name: tst_skill_matrix_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_skill_matrix_bronze_cleaned
    columns: [skill_matrix_key]
    on_violation: warn
    test_id: "PERF-skill_matrix-B02"
