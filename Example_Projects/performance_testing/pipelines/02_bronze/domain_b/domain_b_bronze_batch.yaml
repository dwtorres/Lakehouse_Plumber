pipeline: domain_b_bronze
use_template: bronze_cleanse_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: employee_bronze
    template_parameters:
      entity_name: employee
      source_table: employee_raw
    actions:
      - name: tst_employee_bronze_completeness
        type: test
        test_type: completeness
        source: v_employee_cleansed
        required_columns: [employee_key, _etl_timestamp]
        on_violation: warn
        test_id: "PERF-employee-B01"
      
      - name: tst_employee_bronze_uniqueness
        type: test
        test_type: uniqueness
        source: v_employee_cleansed
        columns: [employee_key]
        on_violation: warn
        test_id: "PERF-employee-B02"

