pipeline: domain_b_bronze
flowgroup: offer_letter_bronze
presets:
  - default_delta_properties
actions:
  - name: offer_letter_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: offer_letter_raw
    target: v_offer_letter_raw
    description: "Load offer_letter from raw schema"

  - name: offer_letter_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_offer_letter_raw
    target: v_offer_letter_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as offer_letter_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_offer_letter_raw
      WHERE 1=1

  - name: offer_letter_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_offer_letter_bronze_cleaned
    target: v_offer_letter_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to offer_letter"

  - name: write_offer_letter_bronze
    type: write
    source: v_offer_letter_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "offer_letter"

  - name: tst_offer_letter_bronze_completeness
    type: test
    test_type: completeness
    source: v_offer_letter_bronze_cleaned
    required_columns: [offer_letter_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-offer_letter-B01"

  - name: tst_offer_letter_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_offer_letter_bronze_cleaned
    columns: [offer_letter_key]
    on_violation: warn
    test_id: "PERF-offer_letter-B02"
