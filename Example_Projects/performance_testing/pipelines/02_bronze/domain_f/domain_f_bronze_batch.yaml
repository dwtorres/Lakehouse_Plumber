pipeline: domain_f_bronze
use_template: bronze_cleanse_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: student_bronze
    template_parameters:
      entity_name: student
      source_table: student_raw
    actions:
      - name: tst_student_bronze_completeness
        type: test
        test_type: completeness
        source: v_student_cleansed
        required_columns: [student_key, _etl_timestamp]
        on_violation: warn
        test_id: "PERF-student-B01"
      
      - name: tst_student_bronze_uniqueness
        type: test
        test_type: uniqueness
        source: v_student_cleansed
        columns: [student_key]
        on_violation: warn
        test_id: "PERF-student-B02"

