pipeline: domain_f_bronze
flowgroup: curriculum_bronze
presets:
  - default_delta_properties
actions:
  - name: curriculum_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: curriculum_raw
    target: v_curriculum_raw
    description: "Load curriculum from raw schema"

  - name: curriculum_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_curriculum_raw
    target: v_curriculum_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as curriculum_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_curriculum_raw
      WHERE 1=1

  - name: curriculum_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_curriculum_bronze_cleaned
    target: v_curriculum_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to curriculum"

  - name: write_curriculum_bronze
    type: write
    source: v_curriculum_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "curriculum"

  - name: tst_curriculum_bronze_completeness
    type: test
    test_type: completeness
    source: v_curriculum_bronze_cleaned
    required_columns: [curriculum_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-curriculum-B01"

  - name: tst_curriculum_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_curriculum_bronze_cleaned
    columns: [curriculum_key]
    on_violation: warn
    test_id: "PERF-curriculum-B02"
