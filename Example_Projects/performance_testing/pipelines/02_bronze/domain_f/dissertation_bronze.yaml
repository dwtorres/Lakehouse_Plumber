pipeline: domain_f_bronze
flowgroup: dissertation_bronze
presets:
  - default_delta_properties
actions:
  - name: dissertation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: dissertation_raw
    target: v_dissertation_raw
    description: "Load dissertation from raw schema"

  - name: dissertation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_dissertation_raw
    target: v_dissertation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as dissertation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_dissertation_raw
      WHERE 1=1

  - name: dissertation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_dissertation_bronze_cleaned
    target: v_dissertation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to dissertation"

  - name: write_dissertation_bronze
    type: write
    source: v_dissertation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "dissertation"

  - name: tst_dissertation_bronze_completeness
    type: test
    test_type: completeness
    source: v_dissertation_bronze_cleaned
    required_columns: [dissertation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-dissertation-B01"

  - name: tst_dissertation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_dissertation_bronze_cleaned
    columns: [dissertation_key]
    on_violation: warn
    test_id: "PERF-dissertation-B02"
