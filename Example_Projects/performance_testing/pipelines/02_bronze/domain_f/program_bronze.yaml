pipeline: domain_f_bronze
flowgroup: program_bronze
presets:
  - default_delta_properties
actions:
  - name: program_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: program_raw
    target: v_program_raw
    description: "Load program from raw schema"

  - name: program_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_program_raw
    target: v_program_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as program_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_program_raw

  - name: program_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_program_bronze_cleaned
    target: v_program_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for program bronze"

  - name: write_program_bronze
    type: write
    source: v_program_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "program"

  - name: program_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: program_migration
    target: v_program_migration
    description: "Load program migration data"

  - name: program_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_program_migration
    target: v_program_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as program_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_program_migration

  - name: write_program_migration
    type: write
    source: v_program_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "program"

  - name: tst_program_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_program_bronze_cleaned
    required_columns: [program_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-program-B01"

  - name: tst_program_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_program_bronze_cleaned
    columns: [program_key]
    on_violation: warn
    test_id: "PERF-program-B02"
