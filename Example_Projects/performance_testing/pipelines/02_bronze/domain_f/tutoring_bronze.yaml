pipeline: domain_f_bronze
flowgroup: tutoring_bronze
presets:
  - default_delta_properties
actions:
  - name: tutoring_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: tutoring_raw
    target: v_tutoring_raw
    description: "Load tutoring from raw schema"

  - name: tutoring_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_tutoring_raw
    target: v_tutoring_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as tutoring_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_tutoring_raw
      WHERE 1=1

  - name: tutoring_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_tutoring_bronze_cleaned
    target: v_tutoring_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to tutoring"

  - name: write_tutoring_bronze
    type: write
    source: v_tutoring_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "tutoring"

  - name: tst_tutoring_bronze_completeness
    type: test
    test_type: completeness
    source: v_tutoring_bronze_cleaned
    required_columns: [tutoring_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-tutoring-B01"

  - name: tst_tutoring_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_tutoring_bronze_cleaned
    columns: [tutoring_key]
    on_violation: warn
    test_id: "PERF-tutoring-B02"
