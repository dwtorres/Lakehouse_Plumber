pipeline: domain_f_bronze
flowgroup: study_group_bronze
presets:
  - default_delta_properties
actions:
  - name: study_group_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: study_group_raw
    target: v_study_group_raw
    description: "Load study_group from raw schema"

  - name: study_group_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_study_group_raw
    target: v_study_group_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as study_group_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_study_group_raw
      WHERE 1=1

  - name: study_group_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_study_group_bronze_cleaned
    target: v_study_group_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to study_group"

  - name: write_study_group_bronze
    type: write
    source: v_study_group_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "study_group"

  - name: tst_study_group_bronze_completeness
    type: test
    test_type: completeness
    source: v_study_group_bronze_cleaned
    required_columns: [study_group_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-study_group-B01"

  - name: tst_study_group_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_study_group_bronze_cleaned
    columns: [study_group_key]
    on_violation: warn
    test_id: "PERF-study_group-B02"
