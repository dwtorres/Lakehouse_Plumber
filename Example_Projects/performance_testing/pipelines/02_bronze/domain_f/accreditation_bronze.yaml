pipeline: domain_f_bronze
flowgroup: accreditation_bronze
presets:
  - default_delta_properties
actions:
  - name: accreditation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: accreditation_raw
    target: v_accreditation_raw
    description: "Load accreditation from raw schema"

  - name: accreditation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_accreditation_raw
    target: v_accreditation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as accreditation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_accreditation_raw
      WHERE 1=1

  - name: accreditation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_accreditation_bronze_cleaned
    target: v_accreditation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to accreditation"

  - name: write_accreditation_bronze
    type: write
    source: v_accreditation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "accreditation"

  - name: tst_accreditation_bronze_completeness
    type: test
    test_type: completeness
    source: v_accreditation_bronze_cleaned
    required_columns: [accreditation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-accreditation-B01"

  - name: tst_accreditation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_accreditation_bronze_cleaned
    columns: [accreditation_key]
    on_violation: warn
    test_id: "PERF-accreditation-B02"
