pipeline: domain_h_bronze
flowgroup: basket_size_bronze
presets:
  - default_delta_properties
actions:
  - name: basket_size_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: basket_size_raw
    target: v_basket_size_raw
    description: "Load basket_size from raw schema"

  - name: basket_size_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_basket_size_raw
    target: v_basket_size_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as basket_size_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_basket_size_raw
      WHERE 1=1

  - name: basket_size_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_basket_size_bronze_cleaned
    target: v_basket_size_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to basket_size"

  - name: write_basket_size_bronze
    type: write
    source: v_basket_size_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "basket_size"

  - name: tst_basket_size_bronze_completeness
    type: test
    test_type: completeness
    source: v_basket_size_bronze_cleaned
    required_columns: [basket_size_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-basket_size-B01"

  - name: tst_basket_size_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_basket_size_bronze_cleaned
    columns: [basket_size_key]
    on_violation: warn
    test_id: "PERF-basket_size-B02"
