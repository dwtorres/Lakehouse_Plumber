pipeline: domain_h_bronze
flowgroup: nps_score_bronze
presets:
  - default_delta_properties
actions:
  - name: nps_score_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: nps_score_raw
    target: v_nps_score_raw
    description: "Load nps_score from raw schema"

  - name: nps_score_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_nps_score_raw
    target: v_nps_score_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as nps_score_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_nps_score_raw

  - name: nps_score_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_nps_score_bronze_cleaned
    target: v_nps_score_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for nps_score bronze"

  - name: write_nps_score_bronze
    type: write
    source: v_nps_score_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "nps_score"

  - name: nps_score_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: nps_score_migration
    target: v_nps_score_migration
    description: "Load nps_score migration data"

  - name: nps_score_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_nps_score_migration
    target: v_nps_score_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as nps_score_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_nps_score_migration

  - name: write_nps_score_migration
    type: write
    source: v_nps_score_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "nps_score"

  - name: tst_nps_score_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_nps_score_bronze_cleaned
    required_columns: [nps_score_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-nps_score-B01"

  - name: tst_nps_score_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_nps_score_bronze_cleaned
    columns: [nps_score_key]
    on_violation: warn
    test_id: "PERF-nps_score-B02"
