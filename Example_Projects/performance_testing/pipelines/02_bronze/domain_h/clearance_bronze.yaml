pipeline: domain_h_bronze
flowgroup: clearance_bronze
presets:
  - default_delta_properties
actions:
  - name: clearance_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: clearance_raw
    target: v_clearance_raw
    description: "Load clearance from raw schema"

  - name: clearance_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_clearance_raw
    target: v_clearance_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as clearance_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_clearance_raw
      WHERE 1=1

  - name: clearance_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_clearance_bronze_cleaned
    target: v_clearance_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to clearance"

  - name: write_clearance_bronze
    type: write
    source: v_clearance_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "clearance"

  - name: tst_clearance_bronze_completeness
    type: test
    test_type: completeness
    source: v_clearance_bronze_cleaned
    required_columns: [clearance_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-clearance-B01"

  - name: tst_clearance_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_clearance_bronze_cleaned
    columns: [clearance_key]
    on_violation: warn
    test_id: "PERF-clearance-B02"
