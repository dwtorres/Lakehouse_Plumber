pipeline: domain_h_bronze
flowgroup: checkout_lane_bronze
presets:
  - default_delta_properties
actions:
  - name: checkout_lane_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: checkout_lane_raw
    target: v_checkout_lane_raw
    description: "Load checkout_lane from raw schema"

  - name: checkout_lane_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_checkout_lane_raw
    target: v_checkout_lane_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as checkout_lane_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_checkout_lane_raw
      WHERE 1=1

  - name: checkout_lane_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_checkout_lane_bronze_cleaned
    target: v_checkout_lane_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to checkout_lane"

  - name: write_checkout_lane_bronze
    type: write
    source: v_checkout_lane_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "checkout_lane"

  - name: tst_checkout_lane_bronze_completeness
    type: test
    test_type: completeness
    source: v_checkout_lane_bronze_cleaned
    required_columns: [checkout_lane_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-checkout_lane-B01"

  - name: tst_checkout_lane_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_checkout_lane_bronze_cleaned
    columns: [checkout_lane_key]
    on_violation: warn
    test_id: "PERF-checkout_lane-B02"
