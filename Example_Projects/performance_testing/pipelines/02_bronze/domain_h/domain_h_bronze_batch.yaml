pipeline: domain_h_bronze
use_template: bronze_cleanse_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: store_bronze
    template_parameters:
      entity_name: store
      source_table: store_raw
    actions:
      - name: tst_store_bronze_completeness
        type: test
        test_type: completeness
        source: v_store_cleansed
        required_columns: [store_key, _etl_timestamp]
        on_violation: warn
        test_id: "PERF-store-B01"
      
      - name: tst_store_bronze_uniqueness
        type: test
        test_type: uniqueness
        source: v_store_cleansed
        columns: [store_key]
        on_violation: warn
        test_id: "PERF-store-B02"

