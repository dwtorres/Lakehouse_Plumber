pipeline: domain_h_bronze
flowgroup: click_collect_bronze
presets:
  - default_delta_properties
actions:
  - name: click_collect_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: click_collect_raw
    target: v_click_collect_raw
    description: "Load click_collect from raw schema"

  - name: click_collect_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_click_collect_raw
    target: v_click_collect_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as click_collect_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_click_collect_raw

  - name: click_collect_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_click_collect_bronze_cleaned
    target: v_click_collect_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for click_collect bronze"

  - name: write_click_collect_bronze
    type: write
    source: v_click_collect_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "click_collect"

  - name: click_collect_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: click_collect_migration
    target: v_click_collect_migration
    description: "Load click_collect migration data"

  - name: click_collect_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_click_collect_migration
    target: v_click_collect_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as click_collect_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_click_collect_migration

  - name: write_click_collect_migration
    type: write
    source: v_click_collect_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "click_collect"

  - name: tst_click_collect_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_click_collect_bronze_cleaned
    required_columns: [click_collect_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-click_collect-B01"

  - name: tst_click_collect_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_click_collect_bronze_cleaned
    columns: [click_collect_key]
    on_violation: warn
    test_id: "PERF-click_collect-B02"
