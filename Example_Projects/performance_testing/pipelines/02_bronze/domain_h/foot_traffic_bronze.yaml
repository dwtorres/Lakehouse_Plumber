pipeline: domain_h_bronze
flowgroup: foot_traffic_bronze
presets:
  - default_delta_properties
actions:
  - name: foot_traffic_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: foot_traffic_raw
    target: v_foot_traffic_raw
    description: "Load foot_traffic from raw schema"

  - name: foot_traffic_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_foot_traffic_raw
    target: v_foot_traffic_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as foot_traffic_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_foot_traffic_raw
      WHERE 1=1

  - name: foot_traffic_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_foot_traffic_bronze_cleaned
    target: v_foot_traffic_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to foot_traffic"

  - name: write_foot_traffic_bronze
    type: write
    source: v_foot_traffic_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "foot_traffic"

  - name: tst_foot_traffic_bronze_completeness
    type: test
    test_type: completeness
    source: v_foot_traffic_bronze_cleaned
    required_columns: [foot_traffic_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-foot_traffic-B01"

  - name: tst_foot_traffic_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_foot_traffic_bronze_cleaned
    columns: [foot_traffic_key]
    on_violation: warn
    test_id: "PERF-foot_traffic-B02"
