pipeline: domain_h_bronze
flowgroup: loss_prevention_bronze
presets:
  - default_delta_properties
actions:
  - name: loss_prevention_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: loss_prevention_raw
    target: v_loss_prevention_raw
    description: "Load loss_prevention from raw schema"

  - name: loss_prevention_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_loss_prevention_raw
    target: v_loss_prevention_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as loss_prevention_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_loss_prevention_raw
      WHERE 1=1

  - name: loss_prevention_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_loss_prevention_bronze_cleaned
    target: v_loss_prevention_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to loss_prevention"

  - name: write_loss_prevention_bronze
    type: write
    source: v_loss_prevention_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "loss_prevention"

  - name: tst_loss_prevention_bronze_completeness
    type: test
    test_type: completeness
    source: v_loss_prevention_bronze_cleaned
    required_columns: [loss_prevention_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-loss_prevention-B01"

  - name: tst_loss_prevention_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_loss_prevention_bronze_cleaned
    columns: [loss_prevention_key]
    on_violation: warn
    test_id: "PERF-loss_prevention-B02"
