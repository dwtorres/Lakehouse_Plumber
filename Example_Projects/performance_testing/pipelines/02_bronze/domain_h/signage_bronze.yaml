pipeline: domain_h_bronze
flowgroup: signage_bronze
presets:
  - default_delta_properties
actions:
  - name: signage_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: signage_raw
    target: v_signage_raw
    description: "Load signage from raw schema"

  - name: signage_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_signage_raw
    target: v_signage_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as signage_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_signage_raw
      WHERE 1=1

  - name: signage_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_signage_bronze_cleaned
    target: v_signage_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to signage"

  - name: write_signage_bronze
    type: write
    source: v_signage_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "signage"

  - name: tst_signage_bronze_completeness
    type: test
    test_type: completeness
    source: v_signage_bronze_cleaned
    required_columns: [signage_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-signage-B01"

  - name: tst_signage_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_signage_bronze_cleaned
    columns: [signage_key]
    on_violation: warn
    test_id: "PERF-signage-B02"
