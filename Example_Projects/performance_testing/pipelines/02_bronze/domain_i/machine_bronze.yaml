pipeline: domain_i_bronze
flowgroup: machine_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: machine
  source_table: machine_raw
actions:
  - name: tst_machine_bronze_completeness
    type: test
    test_type: completeness
    source: v_machine_cleansed
    required_columns: [machine_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-machine-B01"

  - name: tst_machine_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_machine_cleansed
    columns: [machine_key]
    on_violation: warn
    test_id: "PERF-machine-B02"
