pipeline: domain_i_bronze
flowgroup: batch_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: batch
  source_table: batch_raw
actions:
  - name: tst_batch_bronze_completeness
    type: test
    test_type: completeness
    source: v_batch_cleansed
    required_columns: [batch_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-batch-B01"

  - name: tst_batch_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_batch_cleansed
    columns: [batch_key]
    on_violation: warn
    test_id: "PERF-batch-B02"
