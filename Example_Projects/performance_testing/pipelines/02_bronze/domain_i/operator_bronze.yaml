pipeline: domain_i_bronze
flowgroup: operator_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: operator
  source_table: operator_raw
actions:
  - name: tst_operator_bronze_completeness
    type: test
    test_type: completeness
    source: v_operator_cleansed
    required_columns: [operator_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-operator-B01"

  - name: tst_operator_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_operator_cleansed
    columns: [operator_key]
    on_violation: warn
    test_id: "PERF-operator-B02"
