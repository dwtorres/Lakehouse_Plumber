pipeline: domain_i_bronze
flowgroup: kanban_bronze
presets:
  - default_delta_properties
actions:
  - name: kanban_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: kanban_raw
    target: v_kanban_raw
    description: "Load kanban from raw schema"

  - name: kanban_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_kanban_raw
    target: v_kanban_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as kanban_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_kanban_raw
      WHERE 1=1

  - name: kanban_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_kanban_bronze_cleaned
    target: v_kanban_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to kanban"

  - name: write_kanban_bronze
    type: write
    source: v_kanban_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "kanban"

  - name: tst_kanban_bronze_completeness
    type: test
    test_type: completeness
    source: v_kanban_bronze_cleaned
    required_columns: [kanban_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-kanban-B01"

  - name: tst_kanban_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_kanban_bronze_cleaned
    columns: [kanban_key]
    on_violation: warn
    test_id: "PERF-kanban-B02"
