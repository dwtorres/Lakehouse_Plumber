pipeline: domain_i_bronze
flowgroup: fixture_bronze
presets:
  - default_delta_properties
actions:
  - name: fixture_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: fixture_raw
    target: v_fixture_raw
    description: "Load fixture from raw schema"

  - name: fixture_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_fixture_raw
    target: v_fixture_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as fixture_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_fixture_raw
      WHERE 1=1

  - name: fixture_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_fixture_bronze_cleaned
    target: v_fixture_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to fixture"

  - name: write_fixture_bronze
    type: write
    source: v_fixture_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "fixture"

  - name: tst_fixture_bronze_completeness
    type: test
    test_type: completeness
    source: v_fixture_bronze_cleaned
    required_columns: [fixture_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-fixture-B01"

  - name: tst_fixture_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_fixture_bronze_cleaned
    columns: [fixture_key]
    on_violation: warn
    test_id: "PERF-fixture-B02"
