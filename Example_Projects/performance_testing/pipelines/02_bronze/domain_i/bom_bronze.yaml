pipeline: domain_i_bronze
flowgroup: bom_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: bom
  source_table: bom_raw
actions:
  - name: tst_bom_bronze_completeness
    type: test
    test_type: completeness
    source: v_bom_cleansed
    required_columns: [bom_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-bom-B01"

  - name: tst_bom_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_bom_cleansed
    columns: [bom_key]
    on_violation: warn
    test_id: "PERF-bom-B02"
