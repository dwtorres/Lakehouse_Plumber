pipeline: domain_i_bronze
flowgroup: changeover_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: changeover
  source_table: changeover_raw
actions:
  - name: tst_changeover_bronze_completeness
    type: test
    test_type: completeness
    source: v_changeover_cleansed
    required_columns: [changeover_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-changeover-B01"

  - name: tst_changeover_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_changeover_cleansed
    columns: [changeover_key]
    on_violation: warn
    test_id: "PERF-changeover-B02"
