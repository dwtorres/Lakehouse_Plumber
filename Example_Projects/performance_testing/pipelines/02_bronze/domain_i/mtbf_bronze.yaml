pipeline: domain_i_bronze
flowgroup: mtbf_bronze
presets:
  - default_delta_properties
actions:
  - name: mtbf_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: mtbf_raw
    target: v_mtbf_raw
    description: "Load mtbf from raw schema"

  - name: mtbf_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_mtbf_raw
    target: v_mtbf_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as mtbf_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_mtbf_raw
      WHERE 1=1

  - name: mtbf_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_mtbf_bronze_cleaned
    target: v_mtbf_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to mtbf"

  - name: write_mtbf_bronze
    type: write
    source: v_mtbf_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "mtbf"

  - name: tst_mtbf_bronze_completeness
    type: test
    test_type: completeness
    source: v_mtbf_bronze_cleaned
    required_columns: [mtbf_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-mtbf-B01"

  - name: tst_mtbf_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_mtbf_bronze_cleaned
    columns: [mtbf_key]
    on_violation: warn
    test_id: "PERF-mtbf-B02"
