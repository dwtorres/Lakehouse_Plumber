pipeline: domain_i_bronze
flowgroup: kaizen_bronze
presets:
  - default_delta_properties
actions:
  - name: kaizen_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: kaizen_raw
    target: v_kaizen_raw
    description: "Load kaizen from raw schema"

  - name: kaizen_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_kaizen_raw
    target: v_kaizen_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as kaizen_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_kaizen_raw
      WHERE 1=1

  - name: kaizen_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_kaizen_bronze_cleaned
    target: v_kaizen_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to kaizen"

  - name: write_kaizen_bronze
    type: write
    source: v_kaizen_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "kaizen"

  - name: tst_kaizen_bronze_completeness
    type: test
    test_type: completeness
    source: v_kaizen_bronze_cleaned
    required_columns: [kaizen_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-kaizen-B01"

  - name: tst_kaizen_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_kaizen_bronze_cleaned
    columns: [kaizen_key]
    on_violation: warn
    test_id: "PERF-kaizen-B02"
