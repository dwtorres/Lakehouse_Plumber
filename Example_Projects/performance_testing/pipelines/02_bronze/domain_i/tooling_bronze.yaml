pipeline: domain_i_bronze
flowgroup: tooling_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: tooling
  source_table: tooling_raw
actions:
  - name: tst_tooling_bronze_completeness
    type: test
    test_type: completeness
    source: v_tooling_cleansed
    required_columns: [tooling_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-tooling-B01"

  - name: tst_tooling_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_tooling_cleansed
    columns: [tooling_key]
    on_violation: warn
    test_id: "PERF-tooling-B02"
