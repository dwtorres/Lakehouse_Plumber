pipeline: domain_i_bronze
flowgroup: scrap_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: scrap
  source_table: scrap_raw
actions:
  - name: tst_scrap_bronze_completeness
    type: test
    test_type: completeness
    source: v_scrap_cleansed
    required_columns: [scrap_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-scrap-B01"

  - name: tst_scrap_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_scrap_cleansed
    columns: [scrap_key]
    on_violation: warn
    test_id: "PERF-scrap-B02"
