pipeline: domain_i_bronze
flowgroup: work_instruction_bronze
presets:
  - default_delta_properties
actions:
  - name: work_instruction_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: work_instruction_raw
    target: v_work_instruction_raw
    description: "Load work_instruction from raw schema"

  - name: work_instruction_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_work_instruction_raw
    target: v_work_instruction_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as work_instruction_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_work_instruction_raw
      WHERE 1=1

  - name: work_instruction_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_work_instruction_bronze_cleaned
    target: v_work_instruction_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to work_instruction"

  - name: write_work_instruction_bronze
    type: write
    source: v_work_instruction_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "work_instruction"

  - name: tst_work_instruction_bronze_completeness
    type: test
    test_type: completeness
    source: v_work_instruction_bronze_cleaned
    required_columns: [work_instruction_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-work_instruction-B01"

  - name: tst_work_instruction_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_work_instruction_bronze_cleaned
    columns: [work_instruction_key]
    on_violation: warn
    test_id: "PERF-work_instruction-B02"
