pipeline: domain_i_bronze
flowgroup: assembly_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: assembly
  source_table: assembly_raw
actions:
  - name: tst_assembly_bronze_completeness
    type: test
    test_type: completeness
    source: v_assembly_cleansed
    required_columns: [assembly_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-assembly-B01"

  - name: tst_assembly_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_assembly_cleansed
    columns: [assembly_key]
    on_violation: warn
    test_id: "PERF-assembly-B02"
