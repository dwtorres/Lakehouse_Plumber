pipeline: domain_i_bronze
flowgroup: takt_time_bronze
presets:
  - default_delta_properties
actions:
  - name: takt_time_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: takt_time_raw
    target: v_takt_time_raw
    description: "Load takt_time from raw schema"

  - name: takt_time_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_takt_time_raw
    target: v_takt_time_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as takt_time_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_takt_time_raw

  - name: takt_time_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_takt_time_bronze_cleaned
    target: v_takt_time_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for takt_time bronze"

  - name: write_takt_time_bronze
    type: write
    source: v_takt_time_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "takt_time"

  - name: takt_time_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: takt_time_migration
    target: v_takt_time_migration
    description: "Load takt_time migration data"

  - name: takt_time_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_takt_time_migration
    target: v_takt_time_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as takt_time_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_takt_time_migration

  - name: write_takt_time_migration
    type: write
    source: v_takt_time_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "takt_time"

  - name: tst_takt_time_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_takt_time_bronze_cleaned
    required_columns: [takt_time_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-takt_time-B01"

  - name: tst_takt_time_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_takt_time_bronze_cleaned
    columns: [takt_time_key]
    on_violation: warn
    test_id: "PERF-takt_time-B02"
