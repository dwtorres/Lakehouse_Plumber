pipeline: domain_i_bronze
flowgroup: spc_chart_bronze
presets:
  - default_delta_properties
actions:
  - name: spc_chart_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: spc_chart_raw
    target: v_spc_chart_raw
    description: "Load spc_chart from raw schema"

  - name: spc_chart_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_spc_chart_raw
    target: v_spc_chart_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as spc_chart_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_spc_chart_raw
      WHERE 1=1

  - name: spc_chart_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_spc_chart_bronze_cleaned
    target: v_spc_chart_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to spc_chart"

  - name: write_spc_chart_bronze
    type: write
    source: v_spc_chart_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "spc_chart"

  - name: tst_spc_chart_bronze_completeness
    type: test
    test_type: completeness
    source: v_spc_chart_bronze_cleaned
    required_columns: [spc_chart_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-spc_chart-B01"

  - name: tst_spc_chart_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_spc_chart_bronze_cleaned
    columns: [spc_chart_key]
    on_violation: warn
    test_id: "PERF-spc_chart-B02"
