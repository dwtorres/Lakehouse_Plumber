pipeline: domain_i_bronze
flowgroup: specification_bronze
presets:
  - default_delta_properties
actions:
  - name: specification_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: specification_raw
    target: v_specification_raw
    description: "Load specification from raw schema"

  - name: specification_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_specification_raw
    target: v_specification_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as specification_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_specification_raw
      WHERE 1=1

  - name: specification_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_specification_bronze_cleaned
    target: v_specification_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to specification"

  - name: write_specification_bronze
    type: write
    source: v_specification_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "specification"

  - name: tst_specification_bronze_completeness
    type: test
    test_type: completeness
    source: v_specification_bronze_cleaned
    required_columns: [specification_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-specification-B01"

  - name: tst_specification_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_specification_bronze_cleaned
    columns: [specification_key]
    on_violation: warn
    test_id: "PERF-specification-B02"
