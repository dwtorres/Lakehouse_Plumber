pipeline: domain_i_bronze
flowgroup: mttr_bronze
presets:
  - default_delta_properties
actions:
  - name: mttr_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: mttr_raw
    target: v_mttr_raw
    description: "Load mttr from raw schema"

  - name: mttr_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_mttr_raw
    target: v_mttr_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as mttr_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_mttr_raw
      WHERE 1=1

  - name: mttr_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_mttr_bronze_cleaned
    target: v_mttr_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to mttr"

  - name: write_mttr_bronze
    type: write
    source: v_mttr_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "mttr"

  - name: tst_mttr_bronze_completeness
    type: test
    test_type: completeness
    source: v_mttr_bronze_cleaned
    required_columns: [mttr_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-mttr-B01"

  - name: tst_mttr_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_mttr_bronze_cleaned
    columns: [mttr_key]
    on_violation: warn
    test_id: "PERF-mttr-B02"
