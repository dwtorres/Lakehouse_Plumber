pipeline: domain_i_bronze
flowgroup: spare_part_bronze
presets:
  - default_delta_properties
actions:
  - name: spare_part_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: spare_part_raw
    target: v_spare_part_raw
    description: "Load spare_part from raw schema"

  - name: spare_part_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_spare_part_raw
    target: v_spare_part_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as spare_part_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_spare_part_raw

  - name: spare_part_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_spare_part_bronze_cleaned
    target: v_spare_part_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for spare_part bronze"

  - name: write_spare_part_bronze
    type: write
    source: v_spare_part_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "spare_part"

  - name: spare_part_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: spare_part_migration
    target: v_spare_part_migration
    description: "Load spare_part migration data"

  - name: spare_part_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_spare_part_migration
    target: v_spare_part_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as spare_part_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_spare_part_migration

  - name: write_spare_part_migration
    type: write
    source: v_spare_part_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "spare_part"

  - name: tst_spare_part_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_spare_part_bronze_cleaned
    required_columns: [spare_part_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-spare_part-B01"

  - name: tst_spare_part_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_spare_part_bronze_cleaned
    columns: [spare_part_key]
    on_violation: warn
    test_id: "PERF-spare_part-B02"
