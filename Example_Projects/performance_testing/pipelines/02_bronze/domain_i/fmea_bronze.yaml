pipeline: domain_i_bronze
flowgroup: fmea_bronze
presets:
  - default_delta_properties
actions:
  - name: fmea_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: fmea_raw
    target: v_fmea_raw
    description: "Load fmea from raw schema"

  - name: fmea_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_fmea_raw
    target: v_fmea_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as fmea_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_fmea_raw
      WHERE 1=1

  - name: fmea_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_fmea_bronze_cleaned
    target: v_fmea_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to fmea"

  - name: write_fmea_bronze
    type: write
    source: v_fmea_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "fmea"

  - name: tst_fmea_bronze_completeness
    type: test
    test_type: completeness
    source: v_fmea_bronze_cleaned
    required_columns: [fmea_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-fmea-B01"

  - name: tst_fmea_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_fmea_bronze_cleaned
    columns: [fmea_key]
    on_violation: warn
    test_id: "PERF-fmea-B02"
