pipeline: domain_i_bronze
flowgroup: raw_material_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: raw_material
  source_table: raw_material_raw
actions:
  - name: tst_raw_material_bronze_completeness
    type: test
    test_type: completeness
    source: v_raw_material_cleansed
    required_columns: [raw_material_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-raw_material-B01"

  - name: tst_raw_material_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_raw_material_cleansed
    columns: [raw_material_key]
    on_violation: warn
    test_id: "PERF-raw_material-B02"
