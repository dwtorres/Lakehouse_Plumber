pipeline: domain_k_bronze
flowgroup: visa_bronze
presets:
  - default_delta_properties
actions:
  - name: visa_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: visa_raw
    target: v_visa_raw
    description: "Load visa from raw schema"

  - name: visa_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_visa_raw
    target: v_visa_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as visa_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_visa_raw
      WHERE 1=1

  - name: visa_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_visa_bronze_cleaned
    target: v_visa_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to visa"

  - name: write_visa_bronze
    type: write
    source: v_visa_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "visa"

  - name: tst_visa_bronze_completeness
    type: test
    test_type: completeness
    source: v_visa_bronze_cleaned
    required_columns: [visa_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-visa-B01"

  - name: tst_visa_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_visa_bronze_cleaned
    columns: [visa_key]
    on_violation: warn
    test_id: "PERF-visa-B02"
