pipeline: domain_k_bronze
flowgroup: baggage_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: baggage
  source_table: baggage_raw
actions:
  - name: tst_baggage_bronze_completeness
    type: test
    test_type: completeness
    source: v_baggage_cleansed
    required_columns: [baggage_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-baggage-B01"

  - name: tst_baggage_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_baggage_cleansed
    columns: [baggage_key]
    on_violation: warn
    test_id: "PERF-baggage-B02"
