pipeline: domain_k_bronze
flowgroup: fuel_tank_bronze
presets:
  - default_delta_properties
actions:
  - name: fuel_tank_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: fuel_tank_raw
    target: v_fuel_tank_raw
    description: "Load fuel_tank from raw schema"

  - name: fuel_tank_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_fuel_tank_raw
    target: v_fuel_tank_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as fuel_tank_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_fuel_tank_raw
      WHERE 1=1

  - name: fuel_tank_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_fuel_tank_bronze_cleaned
    target: v_fuel_tank_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to fuel_tank"

  - name: write_fuel_tank_bronze
    type: write
    source: v_fuel_tank_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "fuel_tank"

  - name: tst_fuel_tank_bronze_completeness
    type: test
    test_type: completeness
    source: v_fuel_tank_bronze_cleaned
    required_columns: [fuel_tank_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-fuel_tank-B01"

  - name: tst_fuel_tank_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_fuel_tank_bronze_cleaned
    columns: [fuel_tank_key]
    on_violation: warn
    test_id: "PERF-fuel_tank-B02"
