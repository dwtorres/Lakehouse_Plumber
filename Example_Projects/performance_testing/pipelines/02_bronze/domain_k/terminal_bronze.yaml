pipeline: domain_k_bronze
flowgroup: terminal_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: terminal
  source_table: terminal_raw
actions:
  - name: tst_terminal_bronze_completeness
    type: test
    test_type: completeness
    source: v_terminal_cleansed
    required_columns: [terminal_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-terminal-B01"

  - name: tst_terminal_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_terminal_cleansed
    columns: [terminal_key]
    on_violation: warn
    test_id: "PERF-terminal-B02"
