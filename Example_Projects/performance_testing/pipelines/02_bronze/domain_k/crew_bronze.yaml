pipeline: domain_k_bronze
flowgroup: crew_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: crew
  source_table: crew_raw
actions:
  - name: tst_crew_bronze_completeness
    type: test
    test_type: completeness
    source: v_crew_cleansed
    required_columns: [crew_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-crew-B01"

  - name: tst_crew_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_crew_cleansed
    columns: [crew_key]
    on_violation: warn
    test_id: "PERF-crew-B02"
