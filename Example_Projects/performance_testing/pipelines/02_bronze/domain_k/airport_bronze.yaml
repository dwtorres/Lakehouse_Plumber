pipeline: domain_k_bronze
flowgroup: airport_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: airport
  source_table: airport_raw
actions:
  - name: tst_airport_bronze_completeness
    type: test
    test_type: completeness
    source: v_airport_cleansed
    required_columns: [airport_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-airport-B01"

  - name: tst_airport_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_airport_cleansed
    columns: [airport_key]
    on_violation: warn
    test_id: "PERF-airport-B02"
