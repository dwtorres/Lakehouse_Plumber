pipeline: domain_k_bronze
flowgroup: immigration_bronze
presets:
  - default_delta_properties
actions:
  - name: immigration_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: immigration_raw
    target: v_immigration_raw
    description: "Load immigration from raw schema"

  - name: immigration_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_immigration_raw
    target: v_immigration_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as immigration_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_immigration_raw
      WHERE 1=1

  - name: immigration_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_immigration_bronze_cleaned
    target: v_immigration_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to immigration"

  - name: write_immigration_bronze
    type: write
    source: v_immigration_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "immigration"

  - name: tst_immigration_bronze_completeness
    type: test
    test_type: completeness
    source: v_immigration_bronze_cleaned
    required_columns: [immigration_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-immigration-B01"

  - name: tst_immigration_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_immigration_bronze_cleaned
    columns: [immigration_key]
    on_violation: warn
    test_id: "PERF-immigration-B02"
