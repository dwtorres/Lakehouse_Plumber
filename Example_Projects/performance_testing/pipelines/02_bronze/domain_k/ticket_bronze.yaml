pipeline: domain_k_bronze
flowgroup: ticket_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: ticket
  source_table: ticket_raw
actions:
  - name: tst_ticket_bronze_completeness
    type: test
    test_type: completeness
    source: v_ticket_cleansed
    required_columns: [ticket_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-ticket-B01"

  - name: tst_ticket_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_ticket_cleansed
    columns: [ticket_key]
    on_violation: warn
    test_id: "PERF-ticket-B02"
