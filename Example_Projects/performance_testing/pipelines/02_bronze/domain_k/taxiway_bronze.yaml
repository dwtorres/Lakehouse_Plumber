pipeline: domain_k_bronze
flowgroup: taxiway_bronze
presets:
  - default_delta_properties
actions:
  - name: taxiway_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: taxiway_raw
    target: v_taxiway_raw
    description: "Load taxiway from raw schema"

  - name: taxiway_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_taxiway_raw
    target: v_taxiway_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as taxiway_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_taxiway_raw
      WHERE 1=1

  - name: taxiway_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_taxiway_bronze_cleaned
    target: v_taxiway_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to taxiway"

  - name: write_taxiway_bronze
    type: write
    source: v_taxiway_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "taxiway"

  - name: tst_taxiway_bronze_completeness
    type: test
    test_type: completeness
    source: v_taxiway_bronze_cleaned
    required_columns: [taxiway_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-taxiway-B01"

  - name: tst_taxiway_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_taxiway_bronze_cleaned
    columns: [taxiway_key]
    on_violation: warn
    test_id: "PERF-taxiway-B02"
