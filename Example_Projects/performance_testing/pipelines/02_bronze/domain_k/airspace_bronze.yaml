pipeline: domain_k_bronze
flowgroup: airspace_bronze
presets:
  - default_delta_properties
actions:
  - name: airspace_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: airspace_raw
    target: v_airspace_raw
    description: "Load airspace from raw schema"

  - name: airspace_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_airspace_raw
    target: v_airspace_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as airspace_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_airspace_raw
      WHERE 1=1

  - name: airspace_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_airspace_bronze_cleaned
    target: v_airspace_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to airspace"

  - name: write_airspace_bronze
    type: write
    source: v_airspace_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "airspace"

  - name: tst_airspace_bronze_completeness
    type: test
    test_type: completeness
    source: v_airspace_bronze_cleaned
    required_columns: [airspace_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-airspace-B01"

  - name: tst_airspace_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_airspace_bronze_cleaned
    columns: [airspace_key]
    on_violation: warn
    test_id: "PERF-airspace-B02"
