pipeline: domain_k_bronze
flowgroup: gate_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: gate
  source_table: gate_raw
actions:
  - name: tst_gate_bronze_completeness
    type: test
    test_type: completeness
    source: v_gate_cleansed
    required_columns: [gate_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-gate-B01"

  - name: tst_gate_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_gate_cleansed
    columns: [gate_key]
    on_violation: warn
    test_id: "PERF-gate-B02"
