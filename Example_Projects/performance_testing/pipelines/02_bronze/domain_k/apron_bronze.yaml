pipeline: domain_k_bronze
flowgroup: apron_bronze
presets:
  - default_delta_properties
actions:
  - name: apron_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: apron_raw
    target: v_apron_raw
    description: "Load apron from raw schema"

  - name: apron_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_apron_raw
    target: v_apron_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as apron_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_apron_raw
      WHERE 1=1

  - name: apron_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_apron_bronze_cleaned
    target: v_apron_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to apron"

  - name: write_apron_bronze
    type: write
    source: v_apron_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "apron"

  - name: tst_apron_bronze_completeness
    type: test
    test_type: completeness
    source: v_apron_bronze_cleaned
    required_columns: [apron_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-apron-B01"

  - name: tst_apron_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_apron_bronze_cleaned
    columns: [apron_key]
    on_violation: warn
    test_id: "PERF-apron-B02"
