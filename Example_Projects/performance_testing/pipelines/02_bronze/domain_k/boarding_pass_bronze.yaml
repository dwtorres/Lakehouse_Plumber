pipeline: domain_k_bronze
flowgroup: boarding_pass_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: boarding_pass
  source_table: boarding_pass_raw
actions:
  - name: tst_boarding_pass_bronze_completeness
    type: test
    test_type: completeness
    source: v_boarding_pass_cleansed
    required_columns: [boarding_pass_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-boarding_pass-B01"

  - name: tst_boarding_pass_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_boarding_pass_cleansed
    columns: [boarding_pass_key]
    on_violation: warn
    test_id: "PERF-boarding_pass-B02"
