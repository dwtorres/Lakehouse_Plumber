pipeline: domain_k_bronze
flowgroup: runway_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: runway
  source_table: runway_raw
actions:
  - name: tst_runway_bronze_completeness
    type: test
    test_type: completeness
    source: v_runway_cleansed
    required_columns: [runway_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-runway-B01"

  - name: tst_runway_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_runway_cleansed
    columns: [runway_key]
    on_violation: warn
    test_id: "PERF-runway-B02"
