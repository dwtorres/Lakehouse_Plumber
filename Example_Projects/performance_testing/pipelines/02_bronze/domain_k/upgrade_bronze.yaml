pipeline: domain_k_bronze
flowgroup: upgrade_bronze
presets:
  - default_delta_properties
actions:
  - name: upgrade_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: upgrade_raw
    target: v_upgrade_raw
    description: "Load upgrade from raw schema"

  - name: upgrade_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_upgrade_raw
    target: v_upgrade_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as upgrade_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_upgrade_raw
      WHERE 1=1

  - name: upgrade_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_upgrade_bronze_cleaned
    target: v_upgrade_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to upgrade"

  - name: write_upgrade_bronze
    type: write
    source: v_upgrade_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "upgrade"

  - name: tst_upgrade_bronze_completeness
    type: test
    test_type: completeness
    source: v_upgrade_bronze_cleaned
    required_columns: [upgrade_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-upgrade-B01"

  - name: tst_upgrade_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_upgrade_bronze_cleaned
    columns: [upgrade_key]
    on_violation: warn
    test_id: "PERF-upgrade-B02"
