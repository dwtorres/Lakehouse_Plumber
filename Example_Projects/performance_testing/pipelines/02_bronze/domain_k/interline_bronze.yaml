pipeline: domain_k_bronze
flowgroup: interline_bronze
presets:
  - default_delta_properties
actions:
  - name: interline_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: interline_raw
    target: v_interline_raw
    description: "Load interline from raw schema"

  - name: interline_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_interline_raw
    target: v_interline_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as interline_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_interline_raw
      WHERE 1=1

  - name: interline_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_interline_bronze_cleaned
    target: v_interline_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to interline"

  - name: write_interline_bronze
    type: write
    source: v_interline_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "interline"

  - name: tst_interline_bronze_completeness
    type: test
    test_type: completeness
    source: v_interline_bronze_cleaned
    required_columns: [interline_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-interline-B01"

  - name: tst_interline_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_interline_bronze_cleaned
    columns: [interline_key]
    on_violation: warn
    test_id: "PERF-interline-B02"
