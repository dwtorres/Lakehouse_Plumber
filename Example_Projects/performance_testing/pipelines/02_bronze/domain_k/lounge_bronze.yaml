pipeline: domain_k_bronze
flowgroup: lounge_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: lounge
  source_table: lounge_raw
actions:
  - name: tst_lounge_bronze_completeness
    type: test
    test_type: completeness
    source: v_lounge_cleansed
    required_columns: [lounge_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-lounge-B01"

  - name: tst_lounge_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_lounge_cleansed
    columns: [lounge_key]
    on_violation: warn
    test_id: "PERF-lounge-B02"
