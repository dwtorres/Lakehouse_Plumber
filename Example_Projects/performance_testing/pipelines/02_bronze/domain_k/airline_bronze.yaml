pipeline: domain_k_bronze
flowgroup: airline_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: airline
  source_table: airline_raw
actions:
  - name: tst_airline_bronze_completeness
    type: test
    test_type: completeness
    source: v_airline_cleansed
    required_columns: [airline_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-airline-B01"

  - name: tst_airline_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_airline_cleansed
    columns: [airline_key]
    on_violation: warn
    test_id: "PERF-airline-B02"
