pipeline: domain_t_bronze
flowgroup: sync_license_bronze
presets:
  - default_delta_properties
actions:
  - name: sync_license_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: sync_license_raw
    target: v_sync_license_raw
    description: "Load sync_license from raw schema"

  - name: sync_license_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_sync_license_raw
    target: v_sync_license_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as sync_license_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_sync_license_raw
      WHERE 1=1

  - name: sync_license_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_sync_license_bronze_cleaned
    target: v_sync_license_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to sync_license"

  - name: write_sync_license_bronze
    type: write
    source: v_sync_license_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "sync_license"

  - name: tst_sync_license_bronze_completeness
    type: test
    test_type: completeness
    source: v_sync_license_bronze_cleaned
    required_columns: [sync_license_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-sync_license-B01"

  - name: tst_sync_license_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_sync_license_bronze_cleaned
    columns: [sync_license_key]
    on_violation: warn
    test_id: "PERF-sync_license-B02"
