pipeline: domain_t_bronze
flowgroup: cd_pressing_bronze
presets:
  - default_delta_properties
actions:
  - name: cd_pressing_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: cd_pressing_raw
    target: v_cd_pressing_raw
    description: "Load cd_pressing from raw schema"

  - name: cd_pressing_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_cd_pressing_raw
    target: v_cd_pressing_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as cd_pressing_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_cd_pressing_raw
      WHERE 1=1

  - name: cd_pressing_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_cd_pressing_bronze_cleaned
    target: v_cd_pressing_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to cd_pressing"

  - name: write_cd_pressing_bronze
    type: write
    source: v_cd_pressing_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "cd_pressing"

  - name: tst_cd_pressing_bronze_completeness
    type: test
    test_type: completeness
    source: v_cd_pressing_bronze_cleaned
    required_columns: [cd_pressing_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-cd_pressing-B01"

  - name: tst_cd_pressing_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_cd_pressing_bronze_cleaned
    columns: [cd_pressing_key]
    on_violation: warn
    test_id: "PERF-cd_pressing-B02"
