pipeline: domain_t_bronze
flowgroup: tour_bronze
presets:
  - default_delta_properties
actions:
  - name: tour_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: tour_raw
    target: v_tour_raw
    description: "Load tour from raw schema"

  - name: tour_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_tour_raw
    target: v_tour_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as tour_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_tour_raw
      WHERE 1=1

  - name: tour_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_tour_bronze_cleaned
    target: v_tour_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to tour"

  - name: write_tour_bronze
    type: write
    source: v_tour_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "tour"

  - name: tst_tour_bronze_completeness
    type: test
    test_type: completeness
    source: v_tour_bronze_cleaned
    required_columns: [tour_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-tour-B01"

  - name: tst_tour_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_tour_bronze_cleaned
    columns: [tour_key]
    on_violation: warn
    test_id: "PERF-tour-B02"
