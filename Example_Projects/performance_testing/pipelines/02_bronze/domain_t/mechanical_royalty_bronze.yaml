pipeline: domain_t_bronze
flowgroup: mechanical_royalty_bronze
presets:
  - default_delta_properties
actions:
  - name: mechanical_royalty_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: mechanical_royalty_raw
    target: v_mechanical_royalty_raw
    description: "Load mechanical_royalty from raw schema"

  - name: mechanical_royalty_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_mechanical_royalty_raw
    target: v_mechanical_royalty_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as mechanical_royalty_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_mechanical_royalty_raw

  - name: mechanical_royalty_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_mechanical_royalty_bronze_cleaned
    target: v_mechanical_royalty_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for mechanical_royalty bronze"

  - name: write_mechanical_royalty_bronze
    type: write
    source: v_mechanical_royalty_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "mechanical_royalty"

  - name: mechanical_royalty_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: mechanical_royalty_migration
    target: v_mechanical_royalty_migration
    description: "Load mechanical_royalty migration data"

  - name: mechanical_royalty_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_mechanical_royalty_migration
    target: v_mechanical_royalty_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as mechanical_royalty_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_mechanical_royalty_migration

  - name: write_mechanical_royalty_migration
    type: write
    source: v_mechanical_royalty_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "mechanical_royalty"

  - name: tst_mechanical_royalty_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_mechanical_royalty_bronze_cleaned
    required_columns: [mechanical_royalty_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-mechanical_royalty-B01"

  - name: tst_mechanical_royalty_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_mechanical_royalty_bronze_cleaned
    columns: [mechanical_royalty_key]
    on_violation: warn
    test_id: "PERF-mechanical_royalty-B02"
