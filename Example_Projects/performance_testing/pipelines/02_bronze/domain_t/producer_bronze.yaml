pipeline: domain_t_bronze
flowgroup: producer_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: producer
  source_table: producer_raw
actions:
  - name: tst_producer_bronze_completeness
    type: test
    test_type: completeness
    source: v_producer_cleansed
    required_columns: [producer_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-producer-B01"

  - name: tst_producer_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_producer_cleansed
    columns: [producer_key]
    on_violation: warn
    test_id: "PERF-producer-B02"
