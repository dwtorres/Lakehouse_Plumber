pipeline: domain_t_bronze
flowgroup: fan_club_bronze
presets:
  - default_delta_properties
actions:
  - name: fan_club_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: fan_club_raw
    target: v_fan_club_raw
    description: "Load fan_club from raw schema"

  - name: fan_club_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_fan_club_raw
    target: v_fan_club_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as fan_club_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_fan_club_raw

  - name: fan_club_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_fan_club_bronze_cleaned
    target: v_fan_club_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for fan_club bronze"

  - name: write_fan_club_bronze
    type: write
    source: v_fan_club_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "fan_club"

  - name: fan_club_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: fan_club_migration
    target: v_fan_club_migration
    description: "Load fan_club migration data"

  - name: fan_club_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_fan_club_migration
    target: v_fan_club_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as fan_club_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_fan_club_migration

  - name: write_fan_club_migration
    type: write
    source: v_fan_club_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "fan_club"

  - name: tst_fan_club_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_fan_club_bronze_cleaned
    required_columns: [fan_club_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-fan_club-B01"

  - name: tst_fan_club_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_fan_club_bronze_cleaned
    columns: [fan_club_key]
    on_violation: warn
    test_id: "PERF-fan_club-B02"
