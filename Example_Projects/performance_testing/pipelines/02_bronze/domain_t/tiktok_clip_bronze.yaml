pipeline: domain_t_bronze
flowgroup: tiktok_clip_bronze
presets:
  - default_delta_properties
actions:
  - name: tiktok_clip_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: tiktok_clip_raw
    target: v_tiktok_clip_raw
    description: "Load tiktok_clip from raw schema"

  - name: tiktok_clip_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_tiktok_clip_raw
    target: v_tiktok_clip_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as tiktok_clip_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_tiktok_clip_raw
      WHERE 1=1

  - name: tiktok_clip_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_tiktok_clip_bronze_cleaned
    target: v_tiktok_clip_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to tiktok_clip"

  - name: write_tiktok_clip_bronze
    type: write
    source: v_tiktok_clip_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "tiktok_clip"

  - name: tst_tiktok_clip_bronze_completeness
    type: test
    test_type: completeness
    source: v_tiktok_clip_bronze_cleaned
    required_columns: [tiktok_clip_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-tiktok_clip-B01"

  - name: tst_tiktok_clip_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_tiktok_clip_bronze_cleaned
    columns: [tiktok_clip_key]
    on_violation: warn
    test_id: "PERF-tiktok_clip-B02"
