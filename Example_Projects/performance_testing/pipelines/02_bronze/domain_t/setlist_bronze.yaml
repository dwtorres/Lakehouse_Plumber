pipeline: domain_t_bronze
flowgroup: setlist_bronze
presets:
  - default_delta_properties
actions:
  - name: setlist_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: setlist_raw
    target: v_setlist_raw
    description: "Load setlist from raw schema"

  - name: setlist_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_setlist_raw
    target: v_setlist_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as setlist_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_setlist_raw
      WHERE 1=1

  - name: setlist_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_setlist_bronze_cleaned
    target: v_setlist_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to setlist"

  - name: write_setlist_bronze
    type: write
    source: v_setlist_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "setlist"

  - name: tst_setlist_bronze_completeness
    type: test
    test_type: completeness
    source: v_setlist_bronze_cleaned
    required_columns: [setlist_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-setlist-B01"

  - name: tst_setlist_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_setlist_bronze_cleaned
    columns: [setlist_key]
    on_violation: warn
    test_id: "PERF-setlist-B02"
