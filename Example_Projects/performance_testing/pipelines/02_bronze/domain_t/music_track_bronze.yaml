pipeline: domain_t_bronze
flowgroup: music_track_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: music_track
  source_table: music_track_raw
actions:
  - name: tst_music_track_bronze_completeness
    type: test
    test_type: completeness
    source: v_music_track_cleansed
    required_columns: [music_track_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-music_track-B01"

  - name: tst_music_track_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_music_track_cleansed
    columns: [music_track_key]
    on_violation: warn
    test_id: "PERF-music_track-B02"
