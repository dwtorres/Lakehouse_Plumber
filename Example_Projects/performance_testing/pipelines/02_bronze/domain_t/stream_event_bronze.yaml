pipeline: domain_t_bronze
flowgroup: stream_event_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: stream_event
  source_table: stream_event_raw
actions:
  - name: tst_stream_event_bronze_completeness
    type: test
    test_type: completeness
    source: v_stream_event_cleansed
    required_columns: [stream_event_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-stream_event-B01"

  - name: tst_stream_event_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_stream_event_cleansed
    columns: [stream_event_key]
    on_violation: warn
    test_id: "PERF-stream_event-B02"
