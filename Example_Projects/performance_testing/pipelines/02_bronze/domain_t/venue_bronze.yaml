pipeline: domain_t_bronze
flowgroup: venue_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: venue
  source_table: venue_raw
actions:
  - name: tst_venue_bronze_completeness
    type: test
    test_type: completeness
    source: v_venue_cleansed
    required_columns: [venue_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-venue-B01"

  - name: tst_venue_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_venue_cleansed
    columns: [venue_key]
    on_violation: warn
    test_id: "PERF-venue-B02"
