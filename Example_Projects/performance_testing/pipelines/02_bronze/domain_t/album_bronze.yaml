pipeline: domain_t_bronze
flowgroup: album_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: album
  source_table: album_raw
actions:
  - name: tst_album_bronze_completeness
    type: test
    test_type: completeness
    source: v_album_cleansed
    required_columns: [album_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-album-B01"

  - name: tst_album_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_album_cleansed
    columns: [album_key]
    on_violation: warn
    test_id: "PERF-album-B02"
