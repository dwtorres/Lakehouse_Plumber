pipeline: domain_t_bronze
flowgroup: press_kit_bronze
presets:
  - default_delta_properties
actions:
  - name: press_kit_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: press_kit_raw
    target: v_press_kit_raw
    description: "Load press_kit from raw schema"

  - name: press_kit_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_press_kit_raw
    target: v_press_kit_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as press_kit_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_press_kit_raw

  - name: press_kit_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_press_kit_bronze_cleaned
    target: v_press_kit_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for press_kit bronze"

  - name: write_press_kit_bronze
    type: write
    source: v_press_kit_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "press_kit"

  - name: press_kit_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: press_kit_migration
    target: v_press_kit_migration
    description: "Load press_kit migration data"

  - name: press_kit_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_press_kit_migration
    target: v_press_kit_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as press_kit_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_press_kit_migration

  - name: write_press_kit_migration
    type: write
    source: v_press_kit_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "press_kit"

  - name: tst_press_kit_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_press_kit_bronze_cleaned
    required_columns: [press_kit_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-press_kit-B01"

  - name: tst_press_kit_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_press_kit_bronze_cleaned
    columns: [press_kit_key]
    on_violation: warn
    test_id: "PERF-press_kit-B02"
