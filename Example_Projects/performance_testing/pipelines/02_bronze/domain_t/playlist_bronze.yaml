pipeline: domain_t_bronze
flowgroup: playlist_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: playlist
  source_table: playlist_raw
actions:
  - name: tst_playlist_bronze_completeness
    type: test
    test_type: completeness
    source: v_playlist_cleansed
    required_columns: [playlist_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-playlist-B01"

  - name: tst_playlist_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_playlist_cleansed
    columns: [playlist_key]
    on_violation: warn
    test_id: "PERF-playlist-B02"
