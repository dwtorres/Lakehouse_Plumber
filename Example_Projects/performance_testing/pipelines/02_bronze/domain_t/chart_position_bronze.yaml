pipeline: domain_t_bronze
flowgroup: chart_position_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: chart_position
  source_table: chart_position_raw
actions:
  - name: tst_chart_position_bronze_completeness
    type: test
    test_type: completeness
    source: v_chart_position_cleansed
    required_columns: [chart_position_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-chart_position-B01"

  - name: tst_chart_position_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_chart_position_cleansed
    columns: [chart_position_key]
    on_violation: warn
    test_id: "PERF-chart_position-B02"
