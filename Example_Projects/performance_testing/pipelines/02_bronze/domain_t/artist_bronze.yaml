pipeline: domain_t_bronze
flowgroup: artist_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: artist
  source_table: artist_raw
actions:
  - name: tst_artist_bronze_completeness
    type: test
    test_type: completeness
    source: v_artist_cleansed
    required_columns: [artist_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-artist-B01"

  - name: tst_artist_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_artist_cleansed
    columns: [artist_key]
    on_violation: warn
    test_id: "PERF-artist-B02"
