pipeline: domain_t_bronze
flowgroup: genre_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: genre
  source_table: genre_raw
actions:
  - name: tst_genre_bronze_completeness
    type: test
    test_type: completeness
    source: v_genre_cleansed
    required_columns: [genre_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-genre-B01"

  - name: tst_genre_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_genre_cleansed
    columns: [genre_key]
    on_violation: warn
    test_id: "PERF-genre-B02"
