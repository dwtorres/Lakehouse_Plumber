pipeline: domain_t_bronze
flowgroup: merch_item_bronze
presets:
  - default_delta_properties
actions:
  - name: merch_item_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: merch_item_raw
    target: v_merch_item_raw
    description: "Load merch_item from raw schema"

  - name: merch_item_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_merch_item_raw
    target: v_merch_item_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as merch_item_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_merch_item_raw
      WHERE 1=1

  - name: merch_item_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_merch_item_bronze_cleaned
    target: v_merch_item_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to merch_item"

  - name: write_merch_item_bronze
    type: write
    source: v_merch_item_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "merch_item"

  - name: tst_merch_item_bronze_completeness
    type: test
    test_type: completeness
    source: v_merch_item_bronze_cleaned
    required_columns: [merch_item_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-merch_item-B01"

  - name: tst_merch_item_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_merch_item_bronze_cleaned
    columns: [merch_item_key]
    on_violation: warn
    test_id: "PERF-merch_item-B02"
