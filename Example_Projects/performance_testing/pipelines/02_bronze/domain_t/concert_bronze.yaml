pipeline: domain_t_bronze
flowgroup: concert_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: concert
  source_table: concert_raw
actions:
  - name: tst_concert_bronze_completeness
    type: test
    test_type: completeness
    source: v_concert_cleansed
    required_columns: [concert_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-concert-B01"

  - name: tst_concert_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_concert_cleansed
    columns: [concert_key]
    on_violation: warn
    test_id: "PERF-concert-B02"
