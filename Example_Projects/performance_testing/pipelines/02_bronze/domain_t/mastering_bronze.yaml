pipeline: domain_t_bronze
flowgroup: mastering_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: mastering
  source_table: mastering_raw
actions:
  - name: tst_mastering_bronze_completeness
    type: test
    test_type: completeness
    source: v_mastering_cleansed
    required_columns: [mastering_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-mastering-B01"

  - name: tst_mastering_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_mastering_cleansed
    columns: [mastering_key]
    on_violation: warn
    test_id: "PERF-mastering-B02"
