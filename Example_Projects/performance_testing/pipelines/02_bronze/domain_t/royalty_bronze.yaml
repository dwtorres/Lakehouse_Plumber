pipeline: domain_t_bronze
flowgroup: royalty_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: royalty
  source_table: royalty_raw
actions:
  - name: tst_royalty_bronze_completeness
    type: test
    test_type: completeness
    source: v_royalty_cleansed
    required_columns: [royalty_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-royalty-B01"

  - name: tst_royalty_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_royalty_cleansed
    columns: [royalty_key]
    on_violation: warn
    test_id: "PERF-royalty-B02"
