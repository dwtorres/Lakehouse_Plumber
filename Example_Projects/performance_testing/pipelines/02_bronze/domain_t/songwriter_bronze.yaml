pipeline: domain_t_bronze
flowgroup: songwriter_bronze
presets:
  - default_delta_properties
actions:
  - name: songwriter_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: songwriter_raw
    target: v_songwriter_raw
    description: "Load songwriter from raw schema"

  - name: songwriter_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_songwriter_raw
    target: v_songwriter_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as songwriter_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_songwriter_raw
      WHERE 1=1

  - name: songwriter_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_songwriter_bronze_cleaned
    target: v_songwriter_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to songwriter"

  - name: write_songwriter_bronze
    type: write
    source: v_songwriter_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "songwriter"

  - name: tst_songwriter_bronze_completeness
    type: test
    test_type: completeness
    source: v_songwriter_bronze_cleaned
    required_columns: [songwriter_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-songwriter-B01"

  - name: tst_songwriter_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_songwriter_bronze_cleaned
    columns: [songwriter_key]
    on_violation: warn
    test_id: "PERF-songwriter-B02"
