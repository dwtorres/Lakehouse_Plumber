pipeline: domain_t_bronze
flowgroup: release_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: release
  source_table: release_raw
actions:
  - name: tst_release_bronze_completeness
    type: test
    test_type: completeness
    source: v_release_cleansed
    required_columns: [release_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-release-B01"

  - name: tst_release_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_release_cleansed
    columns: [release_key]
    on_violation: warn
    test_id: "PERF-release-B02"
