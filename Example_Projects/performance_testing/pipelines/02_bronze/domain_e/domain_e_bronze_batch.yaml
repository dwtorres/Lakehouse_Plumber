pipeline: domain_e_bronze
use_template: bronze_cleanse_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: vehicle_bronze
    template_parameters:
      entity_name: vehicle
      source_table: vehicle_raw
    actions:
      - name: tst_vehicle_bronze_completeness
        type: test
        test_type: completeness
        source: v_vehicle_cleansed
        required_columns: [vehicle_key, _etl_timestamp]
        on_violation: warn
        test_id: "PERF-vehicle-B01"
      
      - name: tst_vehicle_bronze_uniqueness
        type: test
        test_type: uniqueness
        source: v_vehicle_cleansed
        columns: [vehicle_key]
        on_violation: warn
        test_id: "PERF-vehicle-B02"

