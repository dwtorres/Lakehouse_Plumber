pipeline: domain_e_bronze
flowgroup: idle_time_bronze
presets:
  - default_delta_properties
actions:
  - name: idle_time_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: idle_time_raw
    target: v_idle_time_raw
    description: "Load idle_time from raw schema"

  - name: idle_time_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_idle_time_raw
    target: v_idle_time_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as idle_time_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_idle_time_raw
      WHERE 1=1

  - name: idle_time_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_idle_time_bronze_cleaned
    target: v_idle_time_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to idle_time"

  - name: write_idle_time_bronze
    type: write
    source: v_idle_time_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "idle_time"

  - name: tst_idle_time_bronze_completeness
    type: test
    test_type: completeness
    source: v_idle_time_bronze_cleaned
    required_columns: [idle_time_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-idle_time-B01"

  - name: tst_idle_time_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_idle_time_bronze_cleaned
    columns: [idle_time_key]
    on_violation: warn
    test_id: "PERF-idle_time-B02"
