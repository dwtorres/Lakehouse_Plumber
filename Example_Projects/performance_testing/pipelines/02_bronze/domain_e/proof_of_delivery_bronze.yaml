pipeline: domain_e_bronze
flowgroup: proof_of_delivery_bronze
presets:
  - default_delta_properties
actions:
  - name: proof_of_delivery_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: proof_of_delivery_raw
    target: v_proof_of_delivery_raw
    description: "Load proof_of_delivery from raw schema"

  - name: proof_of_delivery_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_proof_of_delivery_raw
    target: v_proof_of_delivery_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as proof_of_delivery_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_proof_of_delivery_raw
      WHERE 1=1

  - name: proof_of_delivery_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_proof_of_delivery_bronze_cleaned
    target: v_proof_of_delivery_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to proof_of_delivery"

  - name: write_proof_of_delivery_bronze
    type: write
    source: v_proof_of_delivery_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "proof_of_delivery"

  - name: tst_proof_of_delivery_bronze_completeness
    type: test
    test_type: completeness
    source: v_proof_of_delivery_bronze_cleaned
    required_columns: [proof_of_delivery_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-proof_of_delivery-B01"

  - name: tst_proof_of_delivery_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_proof_of_delivery_bronze_cleaned
    columns: [proof_of_delivery_key]
    on_violation: warn
    test_id: "PERF-proof_of_delivery-B02"
