pipeline: domain_e_bronze
flowgroup: chain_of_custody_bronze
presets:
  - default_delta_properties
actions:
  - name: chain_of_custody_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: chain_of_custody_raw
    target: v_chain_of_custody_raw
    description: "Load chain_of_custody from raw schema"

  - name: chain_of_custody_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_chain_of_custody_raw
    target: v_chain_of_custody_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as chain_of_custody_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_chain_of_custody_raw

  - name: chain_of_custody_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_chain_of_custody_bronze_cleaned
    target: v_chain_of_custody_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for chain_of_custody bronze"

  - name: write_chain_of_custody_bronze
    type: write
    source: v_chain_of_custody_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "chain_of_custody"

  - name: chain_of_custody_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: chain_of_custody_migration
    target: v_chain_of_custody_migration
    description: "Load chain_of_custody migration data"

  - name: chain_of_custody_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_chain_of_custody_migration
    target: v_chain_of_custody_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as chain_of_custody_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_chain_of_custody_migration

  - name: write_chain_of_custody_migration
    type: write
    source: v_chain_of_custody_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "chain_of_custody"

  - name: tst_chain_of_custody_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_chain_of_custody_bronze_cleaned
    required_columns: [chain_of_custody_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-chain_of_custody-B01"

  - name: tst_chain_of_custody_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_chain_of_custody_bronze_cleaned
    columns: [chain_of_custody_key]
    on_violation: warn
    test_id: "PERF-chain_of_custody-B02"
