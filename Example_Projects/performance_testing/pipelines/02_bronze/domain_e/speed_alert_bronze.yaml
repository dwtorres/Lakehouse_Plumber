pipeline: domain_e_bronze
flowgroup: speed_alert_bronze
presets:
  - default_delta_properties
actions:
  - name: speed_alert_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: speed_alert_raw
    target: v_speed_alert_raw
    description: "Load speed_alert from raw schema"

  - name: speed_alert_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_speed_alert_raw
    target: v_speed_alert_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as speed_alert_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_speed_alert_raw
      WHERE 1=1

  - name: speed_alert_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_speed_alert_bronze_cleaned
    target: v_speed_alert_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to speed_alert"

  - name: write_speed_alert_bronze
    type: write
    source: v_speed_alert_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "speed_alert"

  - name: tst_speed_alert_bronze_completeness
    type: test
    test_type: completeness
    source: v_speed_alert_bronze_cleaned
    required_columns: [speed_alert_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-speed_alert-B01"

  - name: tst_speed_alert_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_speed_alert_bronze_cleaned
    columns: [speed_alert_key]
    on_violation: warn
    test_id: "PERF-speed_alert-B02"
