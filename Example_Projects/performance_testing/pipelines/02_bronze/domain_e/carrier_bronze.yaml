pipeline: domain_e_bronze
flowgroup: carrier_bronze
presets:
  - default_delta_properties
actions:
  - name: carrier_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: carrier_raw
    target: v_carrier_raw
    description: "Load carrier from raw schema"

  - name: carrier_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_carrier_raw
    target: v_carrier_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as carrier_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_carrier_raw

  - name: carrier_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_carrier_bronze_cleaned
    target: v_carrier_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for carrier bronze"

  - name: write_carrier_bronze
    type: write
    source: v_carrier_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "carrier"

  - name: carrier_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: carrier_migration
    target: v_carrier_migration
    description: "Load carrier migration data"

  - name: carrier_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_carrier_migration
    target: v_carrier_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as carrier_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_carrier_migration

  - name: write_carrier_migration
    type: write
    source: v_carrier_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "carrier"

  - name: tst_carrier_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_carrier_bronze_cleaned
    required_columns: [carrier_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-carrier-B01"

  - name: tst_carrier_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_carrier_bronze_cleaned
    columns: [carrier_key]
    on_violation: warn
    test_id: "PERF-carrier-B02"
