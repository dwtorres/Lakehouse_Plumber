pipeline: domain_e_bronze
flowgroup: weight_ticket_bronze
presets:
  - default_delta_properties
actions:
  - name: weight_ticket_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: weight_ticket_raw
    target: v_weight_ticket_raw
    description: "Load weight_ticket from raw schema"

  - name: weight_ticket_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_weight_ticket_raw
    target: v_weight_ticket_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as weight_ticket_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_weight_ticket_raw
      WHERE 1=1

  - name: weight_ticket_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_weight_ticket_bronze_cleaned
    target: v_weight_ticket_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to weight_ticket"

  - name: write_weight_ticket_bronze
    type: write
    source: v_weight_ticket_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "weight_ticket"

  - name: tst_weight_ticket_bronze_completeness
    type: test
    test_type: completeness
    source: v_weight_ticket_bronze_cleaned
    required_columns: [weight_ticket_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-weight_ticket-B01"

  - name: tst_weight_ticket_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_weight_ticket_bronze_cleaned
    columns: [weight_ticket_key]
    on_violation: warn
    test_id: "PERF-weight_ticket-B02"
