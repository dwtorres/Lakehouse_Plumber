pipeline: domain_e_bronze
flowgroup: trailer_bronze
presets:
  - default_delta_properties
actions:
  - name: trailer_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: trailer_raw
    target: v_trailer_raw
    description: "Load trailer from raw schema"

  - name: trailer_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_trailer_raw
    target: v_trailer_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as trailer_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_trailer_raw
      WHERE 1=1

  - name: trailer_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_trailer_bronze_cleaned
    target: v_trailer_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to trailer"

  - name: write_trailer_bronze
    type: write
    source: v_trailer_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "trailer"

  - name: tst_trailer_bronze_completeness
    type: test
    test_type: completeness
    source: v_trailer_bronze_cleaned
    required_columns: [trailer_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-trailer-B01"

  - name: tst_trailer_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_trailer_bronze_cleaned
    columns: [trailer_key]
    on_violation: warn
    test_id: "PERF-trailer-B02"
