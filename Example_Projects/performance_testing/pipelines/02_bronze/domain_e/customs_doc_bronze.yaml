pipeline: domain_e_bronze
flowgroup: customs_doc_bronze
presets:
  - default_delta_properties
actions:
  - name: customs_doc_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: customs_doc_raw
    target: v_customs_doc_raw
    description: "Load customs_doc from raw schema"

  - name: customs_doc_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_customs_doc_raw
    target: v_customs_doc_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as customs_doc_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_customs_doc_raw
      WHERE 1=1

  - name: customs_doc_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_customs_doc_bronze_cleaned
    target: v_customs_doc_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to customs_doc"

  - name: write_customs_doc_bronze
    type: write
    source: v_customs_doc_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "customs_doc"

  - name: tst_customs_doc_bronze_completeness
    type: test
    test_type: completeness
    source: v_customs_doc_bronze_cleaned
    required_columns: [customs_doc_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-customs_doc-B01"

  - name: tst_customs_doc_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_customs_doc_bronze_cleaned
    columns: [customs_doc_key]
    on_violation: warn
    test_id: "PERF-customs_doc-B02"
