pipeline: domain_e_bronze
flowgroup: geofence_bronze
presets:
  - default_delta_properties
actions:
  - name: geofence_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: geofence_raw
    target: v_geofence_raw
    description: "Load geofence from raw schema"

  - name: geofence_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_geofence_raw
    target: v_geofence_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as geofence_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_geofence_raw
      WHERE 1=1

  - name: geofence_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_geofence_bronze_cleaned
    target: v_geofence_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to geofence"

  - name: write_geofence_bronze
    type: write
    source: v_geofence_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "geofence"

  - name: tst_geofence_bronze_completeness
    type: test
    test_type: completeness
    source: v_geofence_bronze_cleaned
    required_columns: [geofence_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-geofence-B01"

  - name: tst_geofence_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_geofence_bronze_cleaned
    columns: [geofence_key]
    on_violation: warn
    test_id: "PERF-geofence-B02"
