pipeline: domain_n_bronze
flowgroup: settlement_bronze
presets:
  - default_delta_properties
actions:
  - name: settlement_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: settlement_raw
    target: v_settlement_raw
    description: "Load settlement from raw schema"

  - name: settlement_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_settlement_raw
    target: v_settlement_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as settlement_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_settlement_raw
      WHERE 1=1

  - name: settlement_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_settlement_bronze_cleaned
    target: v_settlement_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to settlement"

  - name: write_settlement_bronze
    type: write
    source: v_settlement_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "settlement"

  - name: tst_settlement_bronze_completeness
    type: test
    test_type: completeness
    source: v_settlement_bronze_cleaned
    required_columns: [settlement_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-settlement-B01"

  - name: tst_settlement_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_settlement_bronze_cleaned
    columns: [settlement_key]
    on_violation: warn
    test_id: "PERF-settlement-B02"
