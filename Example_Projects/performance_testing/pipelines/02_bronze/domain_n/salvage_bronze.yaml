pipeline: domain_n_bronze
flowgroup: salvage_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: salvage
  source_table: salvage_raw
actions:
  - name: tst_salvage_bronze_completeness
    type: test
    test_type: completeness
    source: v_salvage_cleansed
    required_columns: [salvage_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-salvage-B01"

  - name: tst_salvage_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_salvage_cleansed
    columns: [salvage_key]
    on_violation: warn
    test_id: "PERF-salvage-B02"
