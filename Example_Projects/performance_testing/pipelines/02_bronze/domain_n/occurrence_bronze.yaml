pipeline: domain_n_bronze
flowgroup: occurrence_bronze
presets:
  - default_delta_properties
actions:
  - name: occurrence_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: occurrence_raw
    target: v_occurrence_raw
    description: "Load occurrence from raw schema"

  - name: occurrence_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_occurrence_raw
    target: v_occurrence_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as occurrence_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_occurrence_raw
      WHERE 1=1

  - name: occurrence_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_occurrence_bronze_cleaned
    target: v_occurrence_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to occurrence"

  - name: write_occurrence_bronze
    type: write
    source: v_occurrence_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "occurrence"

  - name: tst_occurrence_bronze_completeness
    type: test
    test_type: completeness
    source: v_occurrence_bronze_cleaned
    required_columns: [occurrence_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-occurrence-B01"

  - name: tst_occurrence_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_occurrence_bronze_cleaned
    columns: [occurrence_key]
    on_violation: warn
    test_id: "PERF-occurrence-B02"
