pipeline: domain_n_bronze
flowgroup: commission_payout_bronze
presets:
  - default_delta_properties
actions:
  - name: commission_payout_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: commission_payout_raw
    target: v_commission_payout_raw
    description: "Load commission_payout from raw schema"

  - name: commission_payout_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_commission_payout_raw
    target: v_commission_payout_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as commission_payout_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_commission_payout_raw
      WHERE 1=1

  - name: commission_payout_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_commission_payout_bronze_cleaned
    target: v_commission_payout_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to commission_payout"

  - name: write_commission_payout_bronze
    type: write
    source: v_commission_payout_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "commission_payout"

  - name: tst_commission_payout_bronze_completeness
    type: test
    test_type: completeness
    source: v_commission_payout_bronze_cleaned
    required_columns: [commission_payout_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-commission_payout-B01"

  - name: tst_commission_payout_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_commission_payout_bronze_cleaned
    columns: [commission_payout_key]
    on_violation: warn
    test_id: "PERF-commission_payout-B02"
