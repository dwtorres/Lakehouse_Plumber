pipeline: domain_n_bronze
flowgroup: reinsurance_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: reinsurance
  source_table: reinsurance_raw
actions:
  - name: tst_reinsurance_bronze_completeness
    type: test
    test_type: completeness
    source: v_reinsurance_cleansed
    required_columns: [reinsurance_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-reinsurance-B01"

  - name: tst_reinsurance_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_reinsurance_cleansed
    columns: [reinsurance_key]
    on_violation: warn
    test_id: "PERF-reinsurance-B02"
