pipeline: domain_n_bronze
flowgroup: bordereaux_bronze
presets:
  - default_delta_properties
actions:
  - name: bordereaux_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: bordereaux_raw
    target: v_bordereaux_raw
    description: "Load bordereaux from raw schema"

  - name: bordereaux_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_bordereaux_raw
    target: v_bordereaux_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as bordereaux_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_bordereaux_raw
      WHERE 1=1

  - name: bordereaux_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_bordereaux_bronze_cleaned
    target: v_bordereaux_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to bordereaux"

  - name: write_bordereaux_bronze
    type: write
    source: v_bordereaux_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "bordereaux"

  - name: tst_bordereaux_bronze_completeness
    type: test
    test_type: completeness
    source: v_bordereaux_bronze_cleaned
    required_columns: [bordereaux_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-bordereaux-B01"

  - name: tst_bordereaux_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_bordereaux_bronze_cleaned
    columns: [bordereaux_key]
    on_violation: warn
    test_id: "PERF-bordereaux-B02"
