pipeline: domain_n_bronze
flowgroup: aggregate_limit_bronze
presets:
  - default_delta_properties
actions:
  - name: aggregate_limit_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: aggregate_limit_raw
    target: v_aggregate_limit_raw
    description: "Load aggregate_limit from raw schema"

  - name: aggregate_limit_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_aggregate_limit_raw
    target: v_aggregate_limit_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as aggregate_limit_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_aggregate_limit_raw
      WHERE 1=1

  - name: aggregate_limit_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_aggregate_limit_bronze_cleaned
    target: v_aggregate_limit_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to aggregate_limit"

  - name: write_aggregate_limit_bronze
    type: write
    source: v_aggregate_limit_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "aggregate_limit"

  - name: tst_aggregate_limit_bronze_completeness
    type: test
    test_type: completeness
    source: v_aggregate_limit_bronze_cleaned
    required_columns: [aggregate_limit_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-aggregate_limit-B01"

  - name: tst_aggregate_limit_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_aggregate_limit_bronze_cleaned
    columns: [aggregate_limit_key]
    on_violation: warn
    test_id: "PERF-aggregate_limit-B02"
