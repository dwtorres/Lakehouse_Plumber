pipeline: domain_n_bronze
flowgroup: risk_score_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: risk_score
  source_table: risk_score_raw
actions:
  - name: tst_risk_score_bronze_completeness
    type: test
    test_type: completeness
    source: v_risk_score_cleansed
    required_columns: [risk_score_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-risk_score-B01"

  - name: tst_risk_score_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_risk_score_cleansed
    columns: [risk_score_key]
    on_violation: warn
    test_id: "PERF-risk_score-B02"
