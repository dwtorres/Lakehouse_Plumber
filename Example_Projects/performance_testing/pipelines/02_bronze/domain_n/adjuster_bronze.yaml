pipeline: domain_n_bronze
flowgroup: adjuster_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: adjuster
  source_table: adjuster_raw
actions:
  - name: tst_adjuster_bronze_completeness
    type: test
    test_type: completeness
    source: v_adjuster_cleansed
    required_columns: [adjuster_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-adjuster-B01"

  - name: tst_adjuster_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_adjuster_cleansed
    columns: [adjuster_key]
    on_violation: warn
    test_id: "PERF-adjuster-B02"
