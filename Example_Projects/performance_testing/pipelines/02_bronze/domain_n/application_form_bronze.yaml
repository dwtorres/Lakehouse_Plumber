pipeline: domain_n_bronze
flowgroup: application_form_bronze
presets:
  - default_delta_properties
actions:
  - name: application_form_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: application_form_raw
    target: v_application_form_raw
    description: "Load application_form from raw schema"

  - name: application_form_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_application_form_raw
    target: v_application_form_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as application_form_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_application_form_raw
      WHERE 1=1

  - name: application_form_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_application_form_bronze_cleaned
    target: v_application_form_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to application_form"

  - name: write_application_form_bronze
    type: write
    source: v_application_form_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "application_form"

  - name: tst_application_form_bronze_completeness
    type: test
    test_type: completeness
    source: v_application_form_bronze_cleaned
    required_columns: [application_form_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-application_form-B01"

  - name: tst_application_form_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_application_form_bronze_cleaned
    columns: [application_form_key]
    on_violation: warn
    test_id: "PERF-application_form-B02"
