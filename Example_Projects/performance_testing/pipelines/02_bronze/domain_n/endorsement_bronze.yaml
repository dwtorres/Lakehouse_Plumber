pipeline: domain_n_bronze
flowgroup: endorsement_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: endorsement
  source_table: endorsement_raw
actions:
  - name: tst_endorsement_bronze_completeness
    type: test
    test_type: completeness
    source: v_endorsement_cleansed
    required_columns: [endorsement_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-endorsement-B01"

  - name: tst_endorsement_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_endorsement_cleansed
    columns: [endorsement_key]
    on_violation: warn
    test_id: "PERF-endorsement-B02"
