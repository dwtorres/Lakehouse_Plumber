pipeline: domain_n_bronze
flowgroup: coverage_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: coverage
  source_table: coverage_raw
actions:
  - name: tst_coverage_bronze_completeness
    type: test
    test_type: completeness
    source: v_coverage_cleansed
    required_columns: [coverage_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-coverage-B01"

  - name: tst_coverage_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_coverage_cleansed
    columns: [coverage_key]
    on_violation: warn
    test_id: "PERF-coverage-B02"
