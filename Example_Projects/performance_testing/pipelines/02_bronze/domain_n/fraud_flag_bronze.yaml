pipeline: domain_n_bronze
flowgroup: fraud_flag_bronze
presets:
  - default_delta_properties
actions:
  - name: fraud_flag_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: fraud_flag_raw
    target: v_fraud_flag_raw
    description: "Load fraud_flag from raw schema"

  - name: fraud_flag_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_fraud_flag_raw
    target: v_fraud_flag_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as fraud_flag_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_fraud_flag_raw
      WHERE 1=1

  - name: fraud_flag_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_fraud_flag_bronze_cleaned
    target: v_fraud_flag_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to fraud_flag"

  - name: write_fraud_flag_bronze
    type: write
    source: v_fraud_flag_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "fraud_flag"

  - name: tst_fraud_flag_bronze_completeness
    type: test
    test_type: completeness
    source: v_fraud_flag_bronze_cleaned
    required_columns: [fraud_flag_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-fraud_flag-B01"

  - name: tst_fraud_flag_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_fraud_flag_bronze_cleaned
    columns: [fraud_flag_key]
    on_violation: warn
    test_id: "PERF-fraud_flag-B02"
