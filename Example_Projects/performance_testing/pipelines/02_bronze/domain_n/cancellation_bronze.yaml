pipeline: domain_n_bronze
flowgroup: cancellation_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: cancellation
  source_table: cancellation_raw
actions:
  - name: tst_cancellation_bronze_completeness
    type: test
    test_type: completeness
    source: v_cancellation_cleansed
    required_columns: [cancellation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-cancellation-B01"

  - name: tst_cancellation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_cancellation_cleansed
    columns: [cancellation_key]
    on_violation: warn
    test_id: "PERF-cancellation-B02"
