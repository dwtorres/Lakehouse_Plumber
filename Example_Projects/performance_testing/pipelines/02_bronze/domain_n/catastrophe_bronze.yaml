pipeline: domain_n_bronze
flowgroup: catastrophe_bronze
presets:
  - default_delta_properties
actions:
  - name: catastrophe_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: catastrophe_raw
    target: v_catastrophe_raw
    description: "Load catastrophe from raw schema"

  - name: catastrophe_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_catastrophe_raw
    target: v_catastrophe_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as catastrophe_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_catastrophe_raw
      WHERE 1=1

  - name: catastrophe_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_catastrophe_bronze_cleaned
    target: v_catastrophe_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to catastrophe"

  - name: write_catastrophe_bronze
    type: write
    source: v_catastrophe_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "catastrophe"

  - name: tst_catastrophe_bronze_completeness
    type: test
    test_type: completeness
    source: v_catastrophe_bronze_cleaned
    required_columns: [catastrophe_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-catastrophe-B01"

  - name: tst_catastrophe_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_catastrophe_bronze_cleaned
    columns: [catastrophe_key]
    on_violation: warn
    test_id: "PERF-catastrophe-B02"
