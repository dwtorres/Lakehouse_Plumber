pipeline: domain_n_bronze
flowgroup: renewal_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: renewal
  source_table: renewal_raw
actions:
  - name: tst_renewal_bronze_completeness
    type: test
    test_type: completeness
    source: v_renewal_cleansed
    required_columns: [renewal_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-renewal-B01"

  - name: tst_renewal_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_renewal_cleansed
    columns: [renewal_key]
    on_violation: warn
    test_id: "PERF-renewal-B02"
