pipeline: domain_n_bronze
flowgroup: policyholder_bronze
presets:
  - default_delta_properties
actions:
  - name: policyholder_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: policyholder_raw
    target: v_policyholder_raw
    description: "Load policyholder from raw schema"

  - name: policyholder_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_policyholder_raw
    target: v_policyholder_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as policyholder_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_policyholder_raw
      WHERE 1=1

  - name: policyholder_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_policyholder_bronze_cleaned
    target: v_policyholder_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to policyholder"

  - name: write_policyholder_bronze
    type: write
    source: v_policyholder_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "policyholder"

  - name: tst_policyholder_bronze_completeness
    type: test
    test_type: completeness
    source: v_policyholder_bronze_cleaned
    required_columns: [policyholder_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-policyholder-B01"

  - name: tst_policyholder_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_policyholder_bronze_cleaned
    columns: [policyholder_key]
    on_violation: warn
    test_id: "PERF-policyholder-B02"
