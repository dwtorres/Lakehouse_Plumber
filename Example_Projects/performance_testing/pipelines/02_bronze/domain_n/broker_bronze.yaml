pipeline: domain_n_bronze
flowgroup: broker_bronze
presets:
  - default_delta_properties
actions:
  - name: broker_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: broker_raw
    target: v_broker_raw
    description: "Load broker from raw schema"

  - name: broker_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_broker_raw
    target: v_broker_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as broker_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_broker_raw
      WHERE 1=1

  - name: broker_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_broker_bronze_cleaned
    target: v_broker_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to broker"

  - name: write_broker_bronze
    type: write
    source: v_broker_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "broker"

  - name: tst_broker_bronze_completeness
    type: test
    test_type: completeness
    source: v_broker_bronze_cleaned
    required_columns: [broker_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-broker-B01"

  - name: tst_broker_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_broker_bronze_cleaned
    columns: [broker_key]
    on_violation: warn
    test_id: "PERF-broker-B02"
