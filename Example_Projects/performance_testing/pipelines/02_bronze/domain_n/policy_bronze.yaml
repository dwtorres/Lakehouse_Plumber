pipeline: domain_n_bronze
flowgroup: policy_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: policy
  source_table: policy_raw
actions:
  - name: tst_policy_bronze_completeness
    type: test
    test_type: completeness
    source: v_policy_cleansed
    required_columns: [policy_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-policy-B01"

  - name: tst_policy_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_policy_cleansed
    columns: [policy_key]
    on_violation: warn
    test_id: "PERF-policy-B02"
