pipeline: domain_n_bronze
flowgroup: subrogation_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: subrogation
  source_table: subrogation_raw
actions:
  - name: tst_subrogation_bronze_completeness
    type: test
    test_type: completeness
    source: v_subrogation_cleansed
    required_columns: [subrogation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-subrogation-B01"

  - name: tst_subrogation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_subrogation_cleansed
    columns: [subrogation_key]
    on_violation: warn
    test_id: "PERF-subrogation-B02"
