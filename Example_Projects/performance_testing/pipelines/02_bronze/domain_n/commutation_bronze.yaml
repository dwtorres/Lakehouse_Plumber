pipeline: domain_n_bronze
flowgroup: commutation_bronze
presets:
  - default_delta_properties
actions:
  - name: commutation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: commutation_raw
    target: v_commutation_raw
    description: "Load commutation from raw schema"

  - name: commutation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_commutation_raw
    target: v_commutation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as commutation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_commutation_raw
      WHERE 1=1

  - name: commutation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_commutation_bronze_cleaned
    target: v_commutation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to commutation"

  - name: write_commutation_bronze
    type: write
    source: v_commutation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "commutation"

  - name: tst_commutation_bronze_completeness
    type: test
    test_type: completeness
    source: v_commutation_bronze_cleaned
    required_columns: [commutation_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-commutation-B01"

  - name: tst_commutation_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_commutation_bronze_cleaned
    columns: [commutation_key]
    on_violation: warn
    test_id: "PERF-commutation-B02"
