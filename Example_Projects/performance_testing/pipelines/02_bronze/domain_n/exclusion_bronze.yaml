pipeline: domain_n_bronze
flowgroup: exclusion_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: exclusion
  source_table: exclusion_raw
actions:
  - name: tst_exclusion_bronze_completeness
    type: test
    test_type: completeness
    source: v_exclusion_cleansed
    required_columns: [exclusion_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-exclusion-B01"

  - name: tst_exclusion_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_exclusion_cleansed
    columns: [exclusion_key]
    on_violation: warn
    test_id: "PERF-exclusion-B02"
