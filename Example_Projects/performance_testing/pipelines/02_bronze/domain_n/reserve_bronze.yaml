pipeline: domain_n_bronze
flowgroup: reserve_bronze
presets:
  - default_delta_properties
actions:
  - name: reserve_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: reserve_raw
    target: v_reserve_raw
    description: "Load reserve from raw schema"

  - name: reserve_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_reserve_raw
    target: v_reserve_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as reserve_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_reserve_raw
      WHERE 1=1

  - name: reserve_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_reserve_bronze_cleaned
    target: v_reserve_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to reserve"

  - name: write_reserve_bronze
    type: write
    source: v_reserve_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "reserve"

  - name: tst_reserve_bronze_completeness
    type: test
    test_type: completeness
    source: v_reserve_bronze_cleaned
    required_columns: [reserve_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-reserve-B01"

  - name: tst_reserve_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_reserve_bronze_cleaned
    columns: [reserve_key]
    on_violation: warn
    test_id: "PERF-reserve-B02"
