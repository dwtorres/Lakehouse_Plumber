pipeline: domain_n_bronze
flowgroup: treaty_bronze
presets:
  - default_delta_properties
actions:
  - name: treaty_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: treaty_raw
    target: v_treaty_raw
    description: "Load treaty from raw schema"

  - name: treaty_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_treaty_raw
    target: v_treaty_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as treaty_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_treaty_raw
      WHERE 1=1

  - name: treaty_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_treaty_bronze_cleaned
    target: v_treaty_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to treaty"

  - name: write_treaty_bronze
    type: write
    source: v_treaty_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "treaty"

  - name: tst_treaty_bronze_completeness
    type: test
    test_type: completeness
    source: v_treaty_bronze_cleaned
    required_columns: [treaty_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-treaty-B01"

  - name: tst_treaty_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_treaty_bronze_cleaned
    columns: [treaty_key]
    on_violation: warn
    test_id: "PERF-treaty-B02"
