pipeline: domain_n_bronze
flowgroup: underwriter_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: underwriter
  source_table: underwriter_raw
actions:
  - name: tst_underwriter_bronze_completeness
    type: test
    test_type: completeness
    source: v_underwriter_cleansed
    required_columns: [underwriter_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-underwriter-B01"

  - name: tst_underwriter_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_underwriter_cleansed
    columns: [underwriter_key]
    on_violation: warn
    test_id: "PERF-underwriter-B02"
