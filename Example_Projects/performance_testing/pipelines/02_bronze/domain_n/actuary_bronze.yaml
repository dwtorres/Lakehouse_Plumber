pipeline: domain_n_bronze
flowgroup: actuary_bronze
presets:
  - default_delta_properties
actions:
  - name: actuary_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: actuary_raw
    target: v_actuary_raw
    description: "Load actuary from raw schema"

  - name: actuary_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_actuary_raw
    target: v_actuary_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as actuary_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_actuary_raw
      WHERE 1=1

  - name: actuary_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_actuary_bronze_cleaned
    target: v_actuary_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to actuary"

  - name: write_actuary_bronze
    type: write
    source: v_actuary_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "actuary"

  - name: tst_actuary_bronze_completeness
    type: test
    test_type: completeness
    source: v_actuary_bronze_cleaned
    required_columns: [actuary_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-actuary-B01"

  - name: tst_actuary_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_actuary_bronze_cleaned
    columns: [actuary_key]
    on_violation: warn
    test_id: "PERF-actuary-B02"
