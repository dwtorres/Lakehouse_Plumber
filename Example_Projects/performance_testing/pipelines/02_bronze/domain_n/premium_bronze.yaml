pipeline: domain_n_bronze
flowgroup: premium_bronze
presets:
  - default_delta_properties
use_template: bronze_cleanse_template
template_parameters:
  entity_name: premium
  source_table: premium_raw
actions:
  - name: tst_premium_bronze_completeness
    type: test
    test_type: completeness
    source: v_premium_cleansed
    required_columns: [premium_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-premium-B01"

  - name: tst_premium_bronze_uniqueness
    type: test
    test_type: uniqueness
    source: v_premium_cleansed
    columns: [premium_key]
    on_violation: warn
    test_id: "PERF-premium-B02"
