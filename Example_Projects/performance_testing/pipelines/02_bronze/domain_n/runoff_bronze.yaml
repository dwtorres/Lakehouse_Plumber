pipeline: domain_n_bronze
flowgroup: runoff_bronze
presets:
  - default_delta_properties
actions:
  - name: runoff_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: runoff_raw
    target: v_runoff_raw
    description: "Load runoff from raw schema"

  - name: runoff_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_runoff_raw
    target: v_runoff_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as runoff_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_runoff_raw

  - name: runoff_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_runoff_bronze_cleaned
    target: v_runoff_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for runoff bronze"

  - name: write_runoff_bronze
    type: write
    source: v_runoff_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "runoff"

  - name: runoff_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: runoff_migration
    target: v_runoff_migration
    description: "Load runoff migration data"

  - name: runoff_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_runoff_migration
    target: v_runoff_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as runoff_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_runoff_migration

  - name: write_runoff_migration
    type: write
    source: v_runoff_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "runoff"

  - name: tst_runoff_bronze_mig_completeness
    type: test
    test_type: completeness
    source: v_runoff_bronze_cleaned
    required_columns: [runoff_key, _etl_timestamp]
    on_violation: warn
    test_id: "PERF-runoff-B01"

  - name: tst_runoff_bronze_mig_uniqueness
    type: test
    test_type: uniqueness
    source: v_runoff_bronze_cleaned
    columns: [runoff_key]
    on_violation: warn
    test_id: "PERF-runoff-B02"
